"391":{"m":"8.7.","a":"Lord Adalbert Percy Cecil (1841-1889)","tn":"Ovio","tc":"L. Mason (1792-1872)","fl":"Oh! the peace for ever flowing","v":[{"n":1,"t":"Oh! the peace for ever flowing\nFrom God's thoughts of His own Son\nOh, the peace of simply knowing,\nOn the cross that all was done.","th":["Rest & Peace","The Cross & Sufferings of Christ"]},{"n":2,"t":"Peace with God, for Christ in heaven\nObject is of faith to me:\nPeace with God! the Lord is risen!\nRighteousness now counts me free.","th":["Rest & Peace","Christ Risen & Glorified","Assurance & Security"]},{"n":3,"t":"Peace with God - for Christ's in glory,\nGod is just and God is love;\nOh! how bless\u00e8d is the story,\nThat we're brought to God above.","th":["God's Love for Us","Rest & Peace","Christ Risen & Glorified"]},{"n":4,"t":"Now free access to the Father,\nThrough the Christ of God, we have;\nBy the Spirit here abiding,\nPromise of the Father's love.","th":["The Father","The Holy Spirit","Sonship & Adoption"]},{"n":5,"t":"Jesus, Saviour, we adore Thee!\nChrist of God - Anointed Son;\nWe confess Thee, Lord of glory,\nFruits of victory Thou hast won!","th":["Worship & Praise","Christ Risen & Glorified","The Person of Christ"]}],"w":{"Rest & Peace":60,"The Cross & Sufferings of Christ":20,"Christ Risen & Glorified":60,"Assurance & Security":20,"God's Love for Us":20,"The Father":20,"The Holy Spirit":20,"Sonship & Adoption":20,"Worship & Praise":20,"The Person of Christ":20}},
"392":{"m":"10.10.10.10.4.","a":"Mary Shekleton (1827-1883)","tn":"Knowledge","tc":"Ira D. Sankey (1840-1908)","fl":"It passeth knowledge, that dear love of Thine,","v":[{"n":1,"t":"It passeth knowledge, that dear love of Thine,\nO Jesus, Saviour; yet this soul of mine\nWould of Thy love, in all its breadth and length,\nIts height and depth and everlasting strength,\nKnow more and more.","th":["God's Love for Us","The Person of Christ","Our Love for The Son/Christ"]},{"n":2,"t":"It passeth telling, that dear love of Thine,\nO Jesus, Saviour; yet these lips of mine\nWould fain proclaim to sinners far and near\nA love which can remove all guilty fear,\nAnd love beget.","th":["God's Love for Us","Forgiveness of Sins"]},{"n":3,"t":"It passeth praises, that dear love of Thine,\nO Jesus, Saviour; yet this heart of mine\nWould sing a love so rich, so full, so free,\nWhich brought a rebel sinner, such as me,\nNigh unto God.","th":["God's Love for Us","Worship & Praise","Redemption"]},{"n":4,"t":"But though I Cannot tell, or sing, or know\nThe fulness of Thy love while here below,\nMy tiny vessel I may freely bring -\nO Thou, who art of love the living Spring,\nMy vessel fill!","th":["God's Love for Us"]},{"n":5,"t":"O fill me, Jesus, Saviour, with Thy love;\nLead, lead me to the living Fount above!\nThither may I in simple faith draw nigh,\nAnd never to another fountain fly,\nBut unto Thee.","th":["God's Love for Us","Our Love for The Son/Christ"]},{"n":6,"t":"Lord Jesus, when Thee face to face I see,\nWhen on Thy lofty throne I sit with Thee,\nThen of Thy love in all its breadth and length,\nIts height and depth, its everlasting strength,\nMy soul shall sing.","th":["Heaven & The Father's House","God's Love for Us","The Lord's Coming / Rapture","Worship & Praise"]}],"w":{"God's Love for Us":100,"The Person of Christ":17,"Our Love for The Son/Christ":33,"Forgiveness of Sins":17,"Worship & Praise":33,"Redemption":17,"Heaven & The Father's House":17,"The Lord's Coming / Rapture":17}},
"393":{"m":"L.M.","a":"W. Yerbury (d. 1863)","tn":"Hamburg","tc":"L. Mason (1792-1872)","fl":"O Lord, by faith we look above,","v":[{"n":1,"t":"O Lord, by faith we look above,\nAnd crowned with brightest glory see\nThyself, by man once crowned with thorns,\nAnd hear Thee say, \"Remember Me.\"","th":["Christ Risen & Glorified","The Cross & Sufferings of Christ","The Lord's Supper / Remembrance"]},{"n":2,"t":"The cross! 'twas there Thou bowedst Thy head;\nThere deeper pangs than mortals know\nDid rend Thy heart, and deepest floods\nOf wrath divine did Thee o'erflow.","th":["The Cross & Sufferings of Christ"]},{"n":3,"t":"Thine anguish, Lord, in that dread hour,\nWhen God in justice hid His face,\nAnd earth and hell conjoined their power,\nSurpasses human thought to trace.","th":["The Cross & Sufferings of Christ"]},{"n":4,"t":"Love brought Thee down, love led Thee on,\nNor ought Thy steadfast heart could move,\nTill all redemption's toil was done;\nOh, matchless mystery of love!","th":["God's Love for Us","Redemption","The Cross & Sufferings of Christ"]}],"w":{"Christ Risen & Glorified":25,"The Cross & Sufferings of Christ":100,"The Lord's Supper / Remembrance":25,"God's Love for Us":25,"Redemption":25}},
"394":{"m":"10s.","a":"H. F. Nunnerley (1873-1953)","tn":"Speranza","tc":"C. Leflaive (1864-1938)","fl":"O glorious Lord! what thoughts Thy mind did fill,","v":[{"n":1,"t":"O glorious Lord! what thoughts Thy mind did fill,\nWhen from Thy God Thou cam'st to do His will!\nHow deep, indeed, the joy that filled Thy heart -\nThat myriad sons with Thee should find their part!","th":["The Father","The Person of Christ","Sonship & Adoption"]},{"n":2,"t":"Thy brethren, Lord, Thine own and one with Thee,\nWere in Thy heart when dying on the tree;\nThy church complete and in Thy beauty dressed -\nThe day of God and love divine at rest.","th":["The Cross & Sufferings of Christ","The Church / Bride of Christ","God's Love for Us"]},{"n":3,"t":"O bless\u00e8d Lord, what treasured thoughts unfold\nIn light divine, as we Thy face behold!\nNow on our view unbounded glories break,\nThat speak Thy fame and songs eternal wake.","th":["Worship & Praise","Christ Risen & Glorified","Heaven & The Father's House"]}],"w":{"The Father":33,"The Person of Christ":33,"Sonship & Adoption":33,"The Cross & Sufferings of Christ":33,"The Church / Bride of Christ":33,"God's Love for Us":33,"Worship & Praise":33,"Christ Risen & Glorified":33,"Heaven & The Father's House":33}},
"395":{"m":"9s.","a":"W. Anglin (1882-1965)","tn":"Meditation","tc":"P. Ellis (1879-1963)","fl":"O Saviour we would contemplate Thee","v":[{"n":1,"t":"O Saviour we would contemplate Thee\nIn all Thy pathway here so lowly,\nThy life so pleasing to Thy Father,\nSo perfect, faithful, and so holy.","th":["The Person of Christ","The Father","Service & Devotion"]},{"n":2,"t":"Though Son of God, yet Man of Sorrows,\nWith human grief Thou wast acquainted,\nThrough want and woe Thy pathway leading,\nYet ever wast with sin untainted.","th":["The Person of Christ","The Cross & Sufferings of Christ"]},{"n":3,"t":"O Lord, we see Thee in the garden,\nIn agony of intercession,\nWith falling blood-drops, tears and crying,\nWe contemplate Thy holy passion.","th":["The Cross & Sufferings of Christ","Christ's Intercession / Priesthood"]},{"n":4,"t":"O Saviour, we Thy cross remember,\nWhen Thou, the weight of sin enduring,\nBecam'st the holy spotless Victim,\nFor us eternal life securing.","th":["The Cross & Sufferings of Christ","The Lamb of God","Redemption"]},{"n":5,"t":"By faith we see Thee high exalted,\nThe crown of glory ever wearing,\nWhere every heart and voice united,\n\"The Lamb is worthy\" are declaring.","th":["Christ Risen & Glorified","Worship & Praise","The Lamb of God"]}],"w":{"The Person of Christ":40,"The Father":20,"Service & Devotion":20,"The Cross & Sufferings of Christ":60,"Christ's Intercession / Priesthood":20,"The Lamb of God":40,"Redemption":20,"Christ Risen & Glorified":20,"Worship & Praise":20}},
"396":{"m":"8.4.8.4.8.8.8.4.","a":"Miss M. Nunn (1778-1847)","tn":"O How He Loves","tc":"H. P. Main (1839-1925)","fl":"One there is above all others,","v":[{"n":1,"t":"One there is above all others,\nOh, how He loves!\nHis is love beyond a brother's,\nOh, how He loves!\nEarthly friends may fail or leave us,\nOne day soothe, the next day grieve us,\nBut this Friend will ne'er deceive us,\nOh, how He loves!","th":["God's Love for Us","The Person of Christ"]},{"n":2,"t":"'Tis eternal life to know Him,\nOh, how He loves!\nThink, oh, think how much we owe Him,\nOh, how He loves!\nWith His precious blood He bought us\nIn the wilderness He sought us;\nTo His flock He safely brought us,\nOh, how He loves!","th":["The Precious Blood / Atonement","Redemption","God's Love for Us"]},{"n":3,"t":"We have found a Friend in Jesus,\nOh, how He loves!\n'Tis His great delight to bless us,\nOh, how He loves!\nHow our hearts delight to hear Him_\nBid us dwell in safety near Him!\nWhy should we distrust or fear Him?\nOh, how He loves!","th":["The Person of Christ","Assurance & Security","God's Love for Us"]},{"n":4,"t":"Through His name we are forgiven,\nOh, how He loves!\nBackward shall our foes be driven,\nOh, how He loves!\nBest of blessings He'll provide us;\nNought but good shall e'er betide us;\nSafe to glory He will guide us,\nOh, how He loves!","th":["Forgiveness of Sins","Assurance & Security","God's Love for Us"]}],"w":{"God's Love for Us":100,"The Person of Christ":50,"The Precious Blood / Atonement":25,"Redemption":25,"Assurance & Security":50,"Forgiveness of Sins":25}},
"397":{"m":"7.6.","a":"P. Gerhardt (1607-1676)","tn":"Cliff College","tc":"C. H. Dale","fl":"We go to meet the Saviour,","v":[{"n":1,"t":"We go to meet the Saviour,\nHis glorious face to see;\nWhat manner of behaviour\nDoth with this hope agree?\nMay God's illumination\nGuide heart and walk aright,\nThat so our preparation\nBe pleasing in His sight.","th":["The Lord's Coming / Rapture","Service & Devotion"]},{"n":2,"t":"Throughout the darksome hours,\nTill night shall pass away,\nWe'll chant with all our powers\nThe blessings of that day;\nTo Thee, the Lord of glory,\nWe raise the happy song,\nAnd make Thy love's bright story\nThe theme of every tongue.","th":["Worship & Praise","God's Love for Us","Pilgrimage / Desert Journey"]},{"n":3,"t":"Love caused Thine incarnation,\nThis brought Thee from on high;\nThy thirst for our salvation,\nThis made Thee come to die;\nOh, love beyond all measure,\nWherewith Thou didst embrace\nThe victims of the pressure\nOf sin and its disgrace.","th":["God's Love for Us","The Cross & Sufferings of Christ","Redemption"]},{"n":4,"t":"Not sinful man's endeavour,\nNor any mortal's care,\nCould draw Thy sovereign favour\nTo sinners in despair;\nUncalled Thou cam'st with gladness\nUs from the fall to raise,\nAnd change our grief and sadness\nTo songs of joy and praise.","th":["Grace","Redemption","Joy & Thanksgiving"]}],"w":{"The Lord's Coming / Rapture":25,"Service & Devotion":25,"Worship & Praise":25,"God's Love for Us":50,"Pilgrimage / Desert Journey":25,"The Cross & Sufferings of Christ":25,"Redemption":50,"Grace":25,"Joy & Thanksgiving":25}},
"398":{"m":"8.8.6.","a":"C. Wesley (1707-1788)","tn":"Plymouth","tc":"T. Hastings (1784-1872)","fl":"O Thou who hast redeemed of old,","v":[{"n":1,"t":"O Thou who hast redeemed of old,\nAnd made me of Thy grace take hold,\nAnd be at peace with Thee,\nHelp me these blessings now to own,\nAnd tell aloud what Thou hast done,\nO holy Lamb, for me.","th":["Redemption","The Lamb of God","Worship & Praise"]},{"n":2,"t":"Out of myself for help I go,\nThy power alone resolved to know,\nThy love's the plea I make;\nGive me the power - 'tis this I claim -\nWith heart and life to praise Thy name,\nGive for Thy mercy's sake.","th":["Service & Devotion","Grace","Worship & Praise"]},{"n":3,"t":"Love, only love, Thy heart inclined,\nAnd brought Thee, Saviour of mankind,\nDown from the throne above;\nLove made Thee here a Man of grief,\nDistressed Thee sore for our relief,\nOh, mystery of love!","th":["God's Love for Us","The Cross & Sufferings of Christ","The Person of Christ"]},{"n":4,"t":"Lord, I am Thine; Thy love to me\nConstrains my soul to cleave to Thee,\nAnd gladly to resign\nWhate'er I have, whate'er I am:\nMy life be all with Thine the same,\nAnd all Thy shame be mine.","th":["Service & Devotion","God's Love for Us","Our Love for The Son/Christ"]}],"w":{"Redemption":25,"The Lamb of God":25,"Worship & Praise":50,"Service & Devotion":50,"Grace":25,"God's Love for Us":50,"The Cross & Sufferings of Christ":25,"The Person of Christ":25,"Our Love for The Son/Christ":25}},
"399":{"m":"8s.","a":"Samuel Medley (1738-1799)","tn":"Dursley","tc":"Anonymous","fl":"Of Jesus the Saviour we sing,","v":[{"n":1,"t":"Of Jesus the Saviour we sing,\nHis person, His name, and His love;\nTo Him the glad tribute we bring,\nFor oh, how His goodness we prove.","th":["The Person of Christ","Worship & Praise","God's Love for Us"]},{"n":2,"t":"Oh, sing of His beauty divine,\nFor none upon earth is so fair;\nHis glories the heavens outshine,\nNo angel with Him can compare.","th":["The Person of Christ","Worship & Praise"]},{"n":3,"t":"His brightness eclipses the sun\nAnd all the vast orbs of the sky;\nBy dying His conquests He won,\nAnd passed to the glory on high.","th":["Christ Risen & Glorified","The Cross & Sufferings of Christ"]},{"n":4,"t":"Oh, sing of His wonderful name\nWith ecstasy, rapture, and joy;\nFor aye let His heavenly fame\nOur loudest hosannas employ.","th":["The Person of Christ","Worship & Praise","Joy & Thanksgiving"]}],"w":{"The Person of Christ":75,"Worship & Praise":75,"God's Love for Us":25,"Christ Risen & Glorified":25,"The Cross & Sufferings of Christ":25,"Joy & Thanksgiving":25}},
"400":{"m":"7.6.","a":"John Nelson Darby (1800-1882)","tn":"Elberfeld","tc":"Anonymous","fl":"Oh, day of deepest sorrow,","v":[{"n":1,"t":"Oh, day of deepest sorrow,\nDay of unfathomed grief,\nWhen Thou didst taste the horror\nOf wrath without relief.","th":["The Cross & Sufferings of Christ"]},{"n":2,"t":"Thou soughtest for compassion,\nSome heart Thy grief to know,\nTo watch Thine hour of passion -\nFor comforters in woe.","th":["The Cross & Sufferings of Christ"]},{"n":3,"t":"No eye was found to pity,\nNo heart to share Thy woe,\nBut shame and scorn and spitting:\nNone cared Thy name to know.","th":["The Cross & Sufferings of Christ"]},{"n":4,"t":"Then, finished all, in meekness\nThou to Thy Father's hand,\nPerfect Thy strength in weakness,\nThy spirit didst commend.","th":["The Cross & Sufferings of Christ","The Father"]},{"n":5,"t":"O Lord, Thy wondrous story\nOur inmost soul doth move;\nWe ponder o'er Thy glory -\nThy lonely path of love.","th":["The Cross & Sufferings of Christ","God's Love for Us","Worship & Praise"]}],"w":{"The Cross & Sufferings of Christ":100,"The Father":20,"God's Love for Us":20,"Worship & Praise":20}},
"401":{"m":"8.6.8.6.8.8.","a":"Josiah Conder (1789-1855)","tn":"Supremacy","tc":"N. Tomblin, 1933","fl":"Thou art the everlasting Word,","v":[{"n":1,"t":"Thou art the everlasting Word,\nThe Father's only Son,\nGod manifest, God seen and heard,\nThe heaven's belov\u00e8d One;\nThe Lamb of God, exalted Lord!\nWorthy art Thou to be adored!","th":["The Person of Christ","The Lamb of God","Worship & Praise","The Father"]},{"n":2,"t":"In Thee most perfectly expressed,\nThe Father's self doth shine;\nFulness of Godhead, too; the Blest,\nEternally divine.\nWith Thee before the Father's face,\nWe celebrate His boundless grace.","th":["The Person of Christ","The Father","Grace","Worship & Praise"]},{"n":3,"t":"Image of the Infinite Unseen,\nWhose being none can know;\nBrightness of light no eye hath seen,\nGod's love revealed below.\nThe light of love has shone in Thee,\nAnd in that love our souls are free.","th":["The Person of Christ","God's Love for Us","Redemption"]},{"n":6,"t":"Of the vast universe of bliss,\nThe Centre Thou and Sun;\nThe eternal theme of praise is this,\nThat God's belov\u00e8d Son\nFills all that scene, where God alone\nIn His own rest is fully known.","th":["The Person of Christ","Heaven & The Father's House","Worship & Praise","Rest & Peace"]}],"w":{"The Person of Christ":100,"The Lamb of God":25,"Worship & Praise":75,"The Father":50,"Grace":25,"God's Love for Us":25,"Redemption":25,"Heaven & The Father's House":25,"Rest & Peace":25}},
"402":{"m":"11.11.11.11. Trochaic","a":"Miss Hannah Kilham Burlingham (1842-1901)","tn":"St. Gertrude","tc":"A. S. Sullivan (1842-1900)","fl":"Everlasting glory unto Jesus be!","v":[{"n":1,"t":"Everlasting glory unto Jesus be!\nSing aloud the story of His victory!\nHow He left the splendour of His home on high,\nCame in love so tender, on the cross to die -","th":["Worship & Praise","The Cross & Sufferings of Christ","God's Love for Us","Christ Risen & Glorified"]},{"n":2,"t":"Yes! He came from heaven, suffered in our stead;\nPraise to Him be given, Firstborn from the dead!\nJesus, meek and lowly, came the lost to save;\nHe, the Victim holy, triumphed o'er the grave.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","Christ Risen & Glorified","Worship & Praise","Grace"]},{"n":3,"t":"Christ is Lord of glory, sing we now today!\nTell abroad the story; own His rightful sway!\nSing aloud, and never cease to spread His fame;\nTriumph, now and ever, in the Saviour's Name.","th":["Christ Risen & Glorified","Worship & Praise","The Eternal Kingdom / Reign of Christ"]}],"w":{"Worship & Praise":100,"The Cross & Sufferings of Christ":67,"God's Love for Us":33,"Christ Risen & Glorified":100,"The Precious Blood / Atonement":33,"Grace":33,"The Eternal Kingdom / Reign of Christ":33}},
"403":{"m":"C.M.","a":"I Watts (1674-1748)","tn":"Arlington","tc":"T. A. Arne (1710-1778)","fl":"Alas! and did my Saviour bleed?","v":[{"n":1,"t":"Alas! and did my Saviour bleed?\nAnd did my Saviour die?\nWould He devote that sacred head,\nFor such a worm as I?","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement"]},{"n":2,"t":"Was it for crimes that I have done\nHe groaned upon the tree?\nAmazing pity! grace unknown!\nAnd love beyond degree!","th":["The Cross & Sufferings of Christ","Grace","God's Love for Us","Forgiveness of Sins"]},{"n":3,"t":"Well might the sun in darkness hide,\nAnd shut his glories in,\nWhen the Incarnate Maker died\nFor man His creature's sin.","th":["The Cross & Sufferings of Christ","The Person of Christ","Forgiveness of Sins"]}],"w":{"The Cross & Sufferings of Christ":100,"The Precious Blood / Atonement":33,"Grace":33,"God's Love for Us":33,"Forgiveness of Sins":67,"The Person of Christ":33}},
"404":{"m":"C.M.","a":"Albert Midlane (1825-1909)","tn":"Boardman","tc":"L. Devereux, 1839","fl":"Oh, what a gift the Father gave","v":[{"n":1,"t":"Oh, what a gift the Father gave\nWhen He bestowed His Son\nTo save poor ruined, guilty man,\nBy sin defiled, undone!","th":["The Father","God's Love for Us","Grace","Redemption","Forgiveness of Sins"]},{"n":2,"t":"For we were lost and vile indeed,\nTo sin a willing prey,\nTill God in mercy interposed,\nAnd turned our night to day.","th":["Redemption","Grace","God's Love for Us"]},{"n":3,"t":"Now we can call the Saviour ours\nThough all unworthy still;\nWe're sheltered by His precious blood\nBeyond the reach of ill.","th":["The Precious Blood / Atonement","Assurance & Security","Redemption"]},{"n":4,"t":"Come all who trust in Jesus now\nAnd tell our joys abroad,\nLet thankful hymns of praise ascend\nFor Christ, the gift of God.","th":["Joy & Thanksgiving","Worship & Praise","The Person of Christ"]}],"w":{"The Father":25,"God's Love for Us":50,"Grace":50,"Redemption":75,"Forgiveness of Sins":25,"The Precious Blood / Atonement":25,"Assurance & Security":25,"Joy & Thanksgiving":25,"Worship & Praise":25,"The Person of Christ":25}},
"405":{"m":"C.M.","a":"Thomas Haweis (1732-1820)","tn":"Arlington","tc":"T. A. Arne (1710-1778)","fl":"Behold the Lamb! 'tis He who bore","v":[{"n":1,"t":"Behold the Lamb! 'tis He who bore\nMy burden on the tree,\nAnd paid in blood the dreadful score,\nThe ransom due for me.","th":["The Lamb of God","The Precious Blood / Atonement","The Cross & Sufferings of Christ","Redemption"]},{"n":2,"t":"I look to Him till sight endear\nThe Saviour to my heart;\nTo Him I look who calms my fear,\nNor from Himself depart.","th":["Rest & Peace","Assurance & Security","Our Love for The Son/Christ"]},{"n":3,"t":"I look until His precious love\nMy every thought control,\nIts vast constraining influence prove\nO'er body, spirit, soul.","th":["God's Love for Us","Service & Devotion","Our Love for The Son/Christ"]},{"n":4,"t":"To Him I look, while still I run,\nMy never - failing Friend:\nFinish He will the work begun,\nAnd grace in glory end.","th":["Assurance & Security","Pilgrimage / Desert Journey","Grace"]}],"w":{"The Lamb of God":25,"The Precious Blood / Atonement":25,"The Cross & Sufferings of Christ":25,"Redemption":25,"Rest & Peace":25,"Assurance & Security":50,"Our Love for The Son/Christ":50,"God's Love for Us":25,"Service & Devotion":25,"Pilgrimage / Desert Journey":25,"Grace":25}},
"406":{"m":"C.M.","a":"John Nelson Darby (1800-1882)","tn":"St. Peter","tc":"A. R. Reinagle (1799-1877)","fl":"Blest Father, infinite in grace,","v":[{"n":1,"t":"Blest Father, infinite in grace,\nSource of eternal joy,\nThou lead'st our hearts to that blest place,\nWhere rest's without alloy.","th":["The Father","Grace","Rest & Peace","Worship & Praise"]},{"n":2,"t":"There will Thy love find perfect rest,\nWhere all around is bliss,\nWhere all in Thee supremely blest,\nThy praise their service is.","th":["Rest & Peace","God's Love for Us","Heaven & The Father's House","Worship & Praise"]},{"n":3,"t":"Eternal love their portion is,\nWhere love has found its rest;\nAnd, filled with Thee, the constant mind\nEternally is blest.","th":["God's Love for Us","Rest & Peace","Heaven & The Father's House"]},{"n":4,"t":"There Christ the centre of the throng\nShall in His glory shine,\nBut not an eye those hosts among\nBut sees His glory Thine.","th":["The Person of Christ","Christ Risen & Glorified","Heaven & The Father's House"]},{"n":5,"t":"Thy counsels too in all thine own,\nFulfilled by power divine,\nSpread wide the glory of Thy throne,\nWhere all in glory shine.","th":["The Father","The Eternal Kingdom / Reign of Christ"]},{"n":6,"t":"Yet deeper, if a calmer, joy\nThe Father's love shall raise,\nAnd every heart find sweet employ\nIn His eternal praise.","th":["The Father","Joy & Thanksgiving","Worship & Praise","Heaven & The Father's House"]},{"n":7,"t":"Nor is its sweetness now unknown,\nWell proved in what it's done;\nOur Father's love with joy we own,\nRevealed in Christ the Son.","th":["The Father","God's Love for Us","The Person of Christ","Joy & Thanksgiving"]}],"w":{"The Father":57,"Grace":14,"Rest & Peace":43,"Worship & Praise":43,"God's Love for Us":43,"Heaven & The Father's House":57,"The Person of Christ":29,"Christ Risen & Glorified":14,"The Eternal Kingdom / Reign of Christ":14,"Joy & Thanksgiving":29}},
"407":{"m":"C.M.","a":"Samuel Tomkins (1841-1926)","tn":"French","tc":"Anonymous","fl":"We worship at Thy holy feet,","v":[{"n":1,"t":"We worship at Thy holy feet,\nThou glorious Lamb of God;\nThy blood has washed us from our sins,\nAnd brought us nigh to God.","th":["Worship & Praise","The Lamb of God","The Precious Blood / Atonement","Forgiveness of Sins"]},{"n":2,"t":"We worship at Thy holy feet,\nOnce hated Nazarene;\nIn heaven's unsullied light Thou art,\nGod's glory in Thee seen.","th":["Worship & Praise","The Person of Christ","Christ Risen & Glorified"]},{"n":3,"t":"We worship at Thy holy feet;\nThou'rt evermore the same,\nThe First and Last, the Faithful, True,\nAll glory to Thy name.","th":["Worship & Praise","The Person of Christ"]},{"n":4,"t":"We worship at Thy holy feet,\nFor we to Thee belong;\nOur life, our peace, our all-in-all,\nOur never-ending song.","th":["Worship & Praise","Assurance & Security","Rest & Peace"]},{"n":5,"t":"We worship at Thy holy feet,\nAnd long to serve Thee still;\nTake Thou our hearts, our lips, our lives,\nAnd mould them to Thy will.","th":["Worship & Praise","Service & Devotion","Our Love for The Son/Christ"]}],"w":{"Worship & Praise":100,"The Lamb of God":20,"The Precious Blood / Atonement":20,"Forgiveness of Sins":20,"The Person of Christ":40,"Christ Risen & Glorified":20,"Assurance & Security":20,"Rest & Peace":20,"Service & Devotion":20,"Our Love for The Son/Christ":20}},
"408":{"m":"7s.","a":"Anonymous","tn":"Harts","tc":"B. Milgrove (1731-1810)","fl":"Christ is risen: sound His praise;","v":[{"n":1,"t":"Christ is risen: sound His praise;\nHe the sleeping saints will raise;\nGrave, boast not of victory,\nChrist arose and vanquished thee.","th":["Christ Risen & Glorified","Worship & Praise"]},{"n":2,"t":"Christ is risen: come He will,\nCease our tears, our sighs be still;\nChrist those bars of death will break -\nBid His own their graves forsake.","th":["Christ Risen & Glorified","The Lord's Coming / Rapture"]},{"n":3,"t":"Christ is risen; His own voice\nShall our longing hearts rejoice;\nWe shall see Him face to face;\nGlory soon shall crown His grace.","th":["Christ Risen & Glorified","The Lord's Coming / Rapture","Joy & Thanksgiving","Grace"]}],"w":{"Christ Risen & Glorified":100,"Worship & Praise":33,"The Lord's Coming / Rapture":67,"Joy & Thanksgiving":33,"Grace":33}},
"409":{"m":"8.8.6.","a":"Samuel Davies (1723-1761)","tn":"Kingston","tc":"W. Hayes (1706-1777)","fl":"Eternal praise, our God, shall rise","v":[{"n":1,"t":"Eternal praise, our God, shall rise\nIn mansions fair beyond the skies\nThy name to celebrate;\nBut joyful songs e'en here we raise,\nOur God and Father now to praise,\nWhile for our Lord we wait.","th":["Worship & Praise","The Father","Heaven & The Father's House","The Lord's Coming / Rapture"]},{"n":2,"t":"When ruined, guilty and undone,\nThou gav'st for us Thine only Son\nTo suffer, bleed and die;\nRejoicing in Thy love we sing,\nPraise for Thy gift of gifts we bring,\nHis name to magnify.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","God's Love for Us","Worship & Praise","The Father"]},{"n":3,"t":"We praise Thee in our pathway here;\nFar off we were, but now brought near\nThrough Jesus Christ our Lord:\nFresh grace for every moment here,\nFresh manna through the desert drear,\nThe Spirit doth afford.","th":["Worship & Praise","Pilgrimage / Desert Journey","Grace","The Holy Spirit","Redemption"]},{"n":4,"t":"When He shall come, for whom we wait,\nWe then shall see and know how great\nThe gain that faith had stored;\nBut here our joyful songs we raise\nOur God and Father now to praise,\nWhile waiting for our Lord.","th":["The Lord's Coming / Rapture","Joy & Thanksgiving","Worship & Praise","The Father"]}],"w":{"Worship & Praise":100,"The Father":75,"Heaven & The Father's House":25,"The Lord's Coming / Rapture":50,"The Cross & Sufferings of Christ":25,"The Precious Blood / Atonement":25,"God's Love for Us":25,"Pilgrimage / Desert Journey":25,"Grace":25,"The Holy Spirit":25,"Redemption":25,"Joy & Thanksgiving":25}},
"410":{"m":"8.6.8.6.8.8.","a":"Anonymous","tn":"Waltham","tc":"T. Willey (1847-1930)","fl":"Eternal Word, eternal Son,","v":[{"n":1,"t":"Eternal Word, eternal Son,\nThe Father's constant joy,\nWhat Thou hast done and what Thou art\nShall all our tongues employ;\nOur life, our Lord, we Thee adore;\nWorthy art Thou for evermore.","th":["The Person of Christ","Worship & Praise","The Father"]},{"n":2,"t":"The eternal glory's living light,\nOf God the image Thou,\nCreator of the universe,\nUpholding all things now;\nOur peace, our strength, we Thee adore;\nWorthy art Thou for evermore.","th":["The Person of Christ","Worship & Praise","Rest & Peace"]},{"n":3,"t":"The Son in whom the fulness dwells,\nThrough whom all glories flow,\nThou hast a servant's form assumed\nThat creatures God might know;\nOur spring, our Head, we Thee adore;\nWorthy art Thou for evermore.","th":["The Person of Christ","Worship & Praise","Grace"]},{"n":4,"t":"Declarer of the Father's name,\nExpression of His grace,\nThe Word of life, the light of men,\nThe Lord with unveiled face;\nOur joy, our hope, we Thee adore;\nWorthy art Thou for evermore.","th":["The Person of Christ","The Father","Grace","Worship & Praise"]}],"w":{"The Person of Christ":100,"Worship & Praise":100,"The Father":50,"Rest & Peace":25,"Grace":50}},
"411":{"m":"7s.","a":"Mary Bowley (Mrs Peters) (1813-1856)","tn":"Mercy","tc":"L. M. Gottschalk (1829-1869)","fl":"Rest, my soul, the work is done,","v":[{"n":1,"t":"Rest, my soul, the work is done,\nDone by God's belov\u00e8d Son;\nThis to faith is now so clear,\nThere's no place for torturing fear.","th":["Rest & Peace","Assurance & Security","The Cross & Sufferings of Christ"]},{"n":2,"t":"Not through works of weary toil\nComes the sunshine of God's smile;\nWon by Christ, if found in Him,\nBrightly falls the glorious beam.","th":["Grace","The Person of Christ"]},{"n":3,"t":"With belief in Jesus blest,\nWe are entering into rest;\nHe who God's salvation brought\nIn us an our works hath wrought.","th":["Rest & Peace","Assurance & Security","Redemption"]},{"n":4,"t":"Come, my soul, take up the cross,\nCount the gain, despise the loss;\nLabour for and with the Lord\nBrings exceeding great reward.","th":["Service & Devotion","The Cross & Sufferings of Christ","Pilgrimage / Desert Journey"]},{"n":5,"t":"Free from every fear of wrath,\nChoose the labourer's happy path;\nTread the way which Christ hath trod\nTill the sabbath of thy God.","th":["Assurance & Security","Service & Devotion","Pilgrimage / Desert Journey"]}],"w":{"Rest & Peace":40,"Assurance & Security":60,"The Cross & Sufferings of Christ":40,"Grace":20,"The Person of Christ":20,"Redemption":20,"Service & Devotion":40,"Pilgrimage / Desert Journey":40}},
"412":{"m":"6-7s.","a":"Augustus Montague Toplady (1740-1778)","tn":"Toplady","tc":"T. Hastings (1784-1872)","fl":"Rock of ages, cleft for me,","v":[{"n":1,"t":"Rock of ages, cleft for me,\nGrace hath hid me safe in Thee,\nWhere the water and the blood,\nFrom Thy riven side which flowed,\nAre of sin the double cure,\nCleansing from its guilt and power.","th":["Grace","The Precious Blood / Atonement","The Cross & Sufferings of Christ","Forgiveness of Sins"]},{"n":2,"t":"Not the labour of my hands\nCould fulfil the law's demands:\nCould my zeal no respite know,\nCould my tears for ever flow,\nNought for sin could e'er atone\nBut Thy blood, and Thine alone.","th":["The Precious Blood / Atonement","Forgiveness of Sins"]},{"n":3,"t":"Found by Thee before I sought,\nUnto Thee in mercy brought,\nI have Thee for righteousness,\nFrom Thy fulness grace for grace:\nThou hast washed me in Thy blood\nMade me live, and live to God.","th":["Grace","The Precious Blood / Atonement","Redemption","Forgiveness of Sins"]},{"n":4,"t":"While I draw this fleeting breath,\nIf mine eyelids close in death,\nWhen I soar to worlds unknown,\nStill of Thee I'll sing alone:\nRock of ages, cleft for me,\nAll my boast and joy's in Thee.","th":["Assurance & Security","Worship & Praise","Heaven & The Father's House","Joy & Thanksgiving"]}],"w":{"Grace":50,"The Precious Blood / Atonement":75,"The Cross & Sufferings of Christ":25,"Forgiveness of Sins":75,"Redemption":25,"Assurance & Security":25,"Worship & Praise":25,"Heaven & The Father's House":25,"Joy & Thanksgiving":25}},
"413":{"m":"8.8.8.8.4.8.","a":"George West Frazer (1830-1896)","tn":"Melita","tc":"J. B. Dykes (1823-1876)","fl":"The Lamb was slain, His precious blood","v":[{"n":1,"t":"The Lamb was slain, His precious blood\nOn Calvary's awful tree was shed;\nHe for the guilty sinner stood,\nAnd bore the judgment in his stead.","th":["The Lamb of God","The Precious Blood / Atonement","The Cross & Sufferings of Christ","Forgiveness of Sins"]},{"n":2,"t":"Proclaimer of that peace to all,\nHe tells of full, unmingled grace,\nTo high and low - who hear the call -\nTo old and young of Adam's race,\nHe preaches peace,\nAnd love divine shines in His face.","th":["Grace","Rest & Peace","God's Love for Us"]},{"n":3,"t":"Behold Him now, exalted high;\nUpon the throne He took His seat;\nOh, wondrous grace, that we brought nigh\nAnd in Him seated are complete;\nHe is our peace,\nFor light divine He's made us meet.","th":["Christ Risen & Glorified","Grace","Redemption","Assurance & Security"]}],"w":{"The Lamb of God":33,"The Precious Blood / Atonement":33,"The Cross & Sufferings of Christ":33,"Forgiveness of Sins":33,"Grace":67,"Rest & Peace":33,"God's Love for Us":33,"Christ Risen & Glorified":33,"Redemption":33,"Assurance & Security":33}},
"414":{"m":"C.M.","a":"Bernard of Clairvaux","tn":"St. Agnes","tc":"J. B. Dykes (1823-1876)","fl":"Jesus, the very thought of Thee","v":[{"n":1,"t":"Jesus, the very thought of Thee\nWith sweetness fills the breast,\nBut sweeter far Thy face to see,\nAnd in Thy presence rest.","th":["The Person of Christ","Rest & Peace","Our Love for The Son/Christ"]},{"n":2,"t":"No voice can sing, no heart can frame,\nNor can the mind conceive,\nA sweeter sound than Jesus' name\nTo sinners who believe.","th":["The Person of Christ","Our Love for The Son/Christ"]},{"n":3,"t":"O hope of every contrite heart!\nO joy of all the meek!\nTo those who fall how kind Thou art!\nHow good to those who seek!","th":["God's Love for Us","Grace","The Person of Christ"]},{"n":4,"t":"But what to those who find? Ah, this\nNo tongue nor pen can show;\nThe love of Jesus, what it is\nNone but His loved ones know.","th":["God's Love for Us","The Person of Christ"]},{"n":5,"t":"Jesus, our only joy be Thou,\nAs Thou our prize wilt be;\nIn Thee be all our glory now\nAnd through eternity.","th":["Joy & Thanksgiving","Worship & Praise","Our Love for The Son/Christ"]}],"w":{"The Person of Christ":80,"Rest & Peace":20,"Our Love for The Son/Christ":60,"God's Love for Us":40,"Grace":20,"Joy & Thanksgiving":20,"Worship & Praise":20}},
"415":{"m":"8.7.","a":"T. Willey (1847-1930)","tn":"Queensland","tc":"Anonymous","fl":"Father, Spring and Source of blessing,","v":[{"n":1,"t":"Father, Spring and Source of blessing,\nGrateful praise to Thee we bring;\nObjects of Thy sovereign favour,\nGladly of Thy love we sing -\nLove that found its full expression\nIn Thy gift unspeakable,\nHim - who dwelling in Thy bosom,\nCould alone its secrets tell.","th":["The Father","God's Love for Us","Grace","Worship & Praise","The Person of Christ"]},{"n":2,"t":"Thine eternal gracious purpose,\nNow to us in Christ is shown,\nPurpose fraught with richest blessing,\nFor the sons Thou hadst foreknown.\nBrought to rest within the circle\nWhere love's treasures are displayed,\nThere we drink the living waters,\nTaste the joys that never fade.","th":["Sonship & Adoption","Grace","Rest & Peace","The Father"]},{"n":3,"t":"Brought to know Thy Well-Belov\u00e8d,\nDrawn to Him in boundless grace,\nThy effulgence, love and glory\nShining in His bless\u00e8d face -\nWe adore Thee, God and Father,\nMay Thy name exalted be!\nPraise and worship we would render\nNow as in eternity.","th":["The Person of Christ","Grace","The Father","Worship & Praise"]}],"w":{"The Father":100,"God's Love for Us":33,"Grace":100,"Worship & Praise":67,"The Person of Christ":67,"Sonship & Adoption":33,"Rest & Peace":33}},
"416":{"m":"7.6.7.6.7.7.7.6.","a":"R. Seagrave (b. 1693)","tn":"St. Peter's (Mancroft)","tc":"Anonymous","fl":"Saviour, who can e'er forget","v":[{"n":1,"t":"Saviour, who can e'er forget\nOr cease to bless Thy name,\nWhich alone hath power to move,\nAnd every heart inflame?\nNe'er was love so great as Thine,\nNe'er was bounty so divine;\nRansomed mortals feel the grace\nWhich angels love to trace.","th":["Grace","God's Love for Us","Redemption","Our Love for The Son/Christ"]},{"n":2,"t":"None could think such love but Thou,\nAnd none below could ask;\nNone but Thou in heaven or earth\nCould execute the task.\nThou beholding from afar\nSaw'st no Mediator near;\nStooping from above the skies\nThou cam'st the Sacrifice.","th":["God's Love for Us","The Cross & Sufferings of Christ","The Person of Christ"]},{"n":3,"t":"Bowing 'neath Thy God's dread hand -\nWe bless Thy constant name;\nRising from the bands of death -\nWe celebrate Thy fame;\nWorthy then art Thou to reign,\nWorthy to be loved again,\nWorthy Thou to be adored,\nOf heaven and earth the Lord.","th":["The Cross & Sufferings of Christ","Christ Risen & Glorified","Worship & Praise"]}],"w":{"Grace":33,"God's Love for Us":67,"Redemption":33,"Our Love for The Son/Christ":33,"The Cross & Sufferings of Christ":67,"The Person of Christ":33,"Christ Risen & Glorified":33,"Worship & Praise":33}},
"417":{"m":"C.M.","a":"R. Beacon","tn":"Jackson's","tc":"T. Jackson (1715-1781)","fl":"Father of lights, whose will divine","v":[{"n":1,"t":"Father of lights, whose will divine\nHas by Thy truthful word\nBegotten us, and made us Thine,\nFor aye be Thou adored.","th":["The Father","The Word of God","Worship & Praise","New Creation"]},{"n":2,"t":"Thine, Father, was the wondrous grace\nThat sent Thine only Son\nTo show Thy glory in the face\nOf Thy belov\u00e8d One.","th":["The Father","Grace","The Person of Christ"]},{"n":3,"t":"He came Thy great and bless\u00e8d name\nOf Father to declare,\nThe Just, to meet Thine every claim,\nThe Sinless, sin to bear.","th":["The Person of Christ","The Father","The Cross & Sufferings of Christ","Forgiveness of Sins"]},{"n":4,"t":"Thus only, Father, couldst Thou raise\nFrom depths of sin and shame\nA chosen people for the praise\nAnd glory of Thy name.","th":["The Father","Redemption","Worship & Praise"]},{"n":5,"t":"Oh, counsel all divine to find\nTrue worshippers in those\nWho once, estranged by carnal mind,\nWere Thine and Jesus' foes!","th":["Worship & Praise","Redemption","Grace"]},{"n":6,"t":"Then glory, Father, be to Thee,\nAnd to Thine only Son;\nAll glory to the One in Three\nAnd to the Three in One.","th":["Worship & Praise","The Father","The Person of Christ"]}],"w":{"The Father":83,"The Word of God":17,"Worship & Praise":67,"New Creation":17,"Grace":33,"The Person of Christ":50,"The Cross & Sufferings of Christ":17,"Forgiveness of Sins":17,"Redemption":33}},
"418":{"m":"C.M.","a":"H. Allen","tn":"Glasgow","tc":"Anonymous","fl":"Father! Thine own unbounded love","v":[{"n":1,"t":"Father! Thine own unbounded love\nHas reached us through Thy Son;\nWe now behold Him crowned above,\nEternity's begun.","th":["The Father","God's Love for Us","The Person of Christ","Christ Risen & Glorified"]},{"n":2,"t":"Once far from Thee and dead in sin,\nIn Him who lives we live;\nOur spirits rise to bless Thy name -\nAnd holy worship give.","th":["Redemption","Worship & Praise","New Creation"]},{"n":3,"t":"The praises led by Thy Beloved,\nDelight Thy holy ear;\nAnd we, with hearts divinely moved,\nRejoice that praise to share.","th":["Worship & Praise","The Person of Christ","The Father"]},{"n":4,"t":"Father, Thy love our portion is,\nThou gav'st us to Thy Son,\nFor Thine own glory and for His,\nMade like that bless\u00e8d One.","th":["The Father","God's Love for Us","Sonship & Adoption"]},{"n":5,"t":"In that bright scene of cloudless light,\nWhere sons at home shall be,\nWith Him we'll share that glory bright,\nAnd all His beauty see.","th":["Heaven & The Father's House","Christ Risen & Glorified","Sonship & Adoption"]}],"w":{"The Father":60,"God's Love for Us":40,"The Person of Christ":40,"Christ Risen & Glorified":40,"Redemption":20,"Worship & Praise":40,"New Creation":20,"Sonship & Adoption":40,"Heaven & The Father's House":20}},
"419":{"m":"8.7.","a":"Miss C. A. Wellesley","tn":"Resting","tc":"C. Jouard 1858-1927 and F. Jouard 1884-1941.","fl":"Gathered to Thy name, Lord Jesus,","v":[{"n":1,"t":"Gathered to Thy name, Lord Jesus,\nLosing sight of all but Thee,\nOh, what joy Thy presence gives us,\nCalling up our hearts to Thee!","th":["Fellowship & Gathering","The Person of Christ","Joy & Thanksgiving","Our Love for The Son/Christ"]},{"n":2,"t":"Yet with reverence we would linger\nIn the shadow of Thy cross,\nWhich has closed our hearts for ever\nTo the world and all its dross.","th":["The Cross & Sufferings of Christ","Separation from the World"]},{"n":3,"t":"Loved with love which knows no measure\nSave the Father's love to Thee,\nBless\u00e8d Lord, our hearts would treasure\nAll the Father's thoughts of Thee.","th":["God's Love for Us","The Father","Our Love for The Father","Our Love for The Son/Christ"]},{"n":4,"t":"Blood-bought, reconciled, forgiven,\nHere Thy death we love to show,\nWaiting till above in heaven\nAll Thy glory we shall know.","th":["The Precious Blood / Atonement","The Lord's Supper / Remembrance","Forgiveness of Sins","Redemption"]},{"n":5,"t":"Oh, the joy, the wondrous singing\nWhen we see Thee as Thou art,\nThy blest name, Lord Jesus, bringing\nSweetest music to God's heart!","th":["Heaven & The Father's House","Joy & Thanksgiving","Worship & Praise"]},{"n":6,"t":"Notes of gladness, songs unceasing,\nHymns of everlasting praise,\nPsalms of glory, joy increasing,\nThrough God's endless day of days!","th":["Worship & Praise","Joy & Thanksgiving","Heaven & The Father's House"]}],"w":{"Fellowship & Gathering":17,"The Person of Christ":17,"Joy & Thanksgiving":50,"Our Love for The Son/Christ":33,"The Cross & Sufferings of Christ":17,"Separation from the World":17,"God's Love for Us":17,"The Father":17,"Our Love for The Father":17,"The Precious Blood / Atonement":17,"The Lord's Supper / Remembrance":17,"Forgiveness of Sins":17,"Redemption":17,"Heaven & The Father's House":33,"Worship & Praise":33}},
"420":{"m":"7s.","a":"William J. Hocking (1864-1953)","tn":"Brandenburg","tc":"Anonymous","fl":"Gladly let us join to sing,","v":[{"n":1,"t":"Gladly let us join to sing,\nHeart and lips united bring,\nIn a strain of sweet accord\nTo our Saviour, Christ the Lord.","th":["Worship & Praise","Fellowship & Gathering","The Person of Christ"]},{"n":2,"t":"Crowned above in heavenly light,\nWhat an all-transcending sight!\nWorthy Lord, we bow the knee,\nPower and praise belong to Thee.","th":["Christ Risen & Glorified","Worship & Praise"]},{"n":3,"t":"Chiefest name in earth or heaven\nTo the Son of man is given;\nHallelujah! nought shall claim\nHigher glory than Thy name.","th":["The Person of Christ","Worship & Praise"]},{"n":4,"t":"Now, O Lord, we sing to Thee,\nThou our song eternally;\nWhen above on Thee we gaze,\nHeaven shall swell with perfect praise.","th":["Worship & Praise","Heaven & The Father's House"]}],"w":{"Worship & Praise":100,"Fellowship & Gathering":25,"The Person of Christ":50,"Christ Risen & Glorified":25,"Heaven & The Father's House":25}},
"421":{"m":"7s.","a":"George West Frazer (1830-1896)","tn":"Lubeck","tc":"Anonymous","fl":"Glory unto Him who died,","v":[{"n":1,"t":"Glory unto Him who died,\nWho for us was crucified;\nWho in rich abounding grace\nTook the guilty sinner's place.","th":["The Cross & Sufferings of Christ","Grace","Forgiveness of Sins"]},{"n":2,"t":"Glory unto Him who lives,\nHim who life eternal gives;\nQuickened from the silent grave,\nHe is mighty now to save.","th":["Christ Risen & Glorified","Redemption"]},{"n":3,"t":"Glory unto Him on high,\nBy whose blood we are made nigh;\nSeated in Him is our place,\nTrophies of His matchless grace.","th":["The Precious Blood / Atonement","Grace","Christ Risen & Glorified","Redemption"]},{"n":4,"t":"Glory unto Him whose voice\nShall each waiting heart rejoice;\nHe will call His saints away\nTo His own eternal day.","th":["The Lord's Coming / Rapture","Joy & Thanksgiving"]}],"w":{"The Cross & Sufferings of Christ":25,"Grace":50,"Forgiveness of Sins":25,"Christ Risen & Glorified":50,"Redemption":50,"The Precious Blood / Atonement":25,"The Lord's Coming / Rapture":25,"Joy & Thanksgiving":25}},
"422":{"m":"8.7.","a":"William Kelly (1821-1906)","tn":"Placida","tc":"H. E. Gebhardt (1832-1899)","fl":"God and Father, we adore Thee","v":[{"n":1,"t":"God and Father, we adore Thee\nFor the Christ, Thine image bright,\nIn whom all Thy holy nature\nDawned on our once hopeless night.","th":["The Father","Worship & Praise","The Person of Christ"]},{"n":2,"t":"Thou didst send Him as the witness\nOf a life beyond compare;\nBy Thy Spirit we received Him;\nNow in Christ how blest we are!","th":["The Person of Christ","The Holy Spirit","Grace"]},{"n":3,"t":"Fellowship with Thee, the Father,\nAnd with Jesus Christ Thy Son -\nSuch Thine own most gracious giving\nBy Thy Spirit to each one.","th":["Fellowship & Gathering","The Father","The Holy Spirit","Sonship & Adoption"]},{"n":4,"t":"For in Christ was life eternal\nOnce beheld and heard below;\nAnd in Him dwelt all the fulness,\nThough in grace He stooped so low.","th":["The Person of Christ","Grace"]},{"n":5,"t":"Now in Him, our God and Father,\nSharers of Thy love are we;\nNow partaking with our Saviour\nHis unceasing rest in Thee.","th":["The Father","God's Love for Us","Rest & Peace","Fellowship & Gathering"]},{"n":6,"t":"Grace divine is this, transcending\nAll that else the heart employs:\n'Tis the Son and Father deigning\nUs to give of Their own joys.","th":["Grace","Joy & Thanksgiving","The Father","Sonship & Adoption"]}],"w":{"The Father":67,"Worship & Praise":17,"The Person of Christ":50,"The Holy Spirit":33,"Grace":50,"Fellowship & Gathering":33,"Sonship & Adoption":33,"God's Love for Us":17,"Rest & Peace":17,"Joy & Thanksgiving":17}},
"423":{"m":"8.7.","a":"Gustaffson","tn":"Northampton","tc":"Philip Paul Bliss (1838-1876)","fl":"God and Father, we Thy children","v":[{"n":1,"t":"God and Father, we Thy children\nWould in meekness hear Thy word,\nUndistracted, hearts responsive,\nAs Thy Spirit strikes the chord;\nAll Thy mind we would be learning,\nAs the desert path we trace,\nThine we are, and would be leaning\nEver on Thy boundless grace.","th":["The Father","The Word of God","The Holy Spirit","Grace","Pilgrimage / Desert Journey"]},{"n":2,"t":"Still the Spirit is revealing\nHeights of glory Thou hast given,\nAnd our eyes by faith are seeing ;\nChrist at Thy right hand in heaven;\nAs on earth His path was trodden,\nEver subject to Thy will,\nAs the man of all Thy counsels,\nWho the universe will fill.","th":["The Holy Spirit","Christ Risen & Glorified","The Person of Christ","The Father"]},{"n":3,"t":"When our hearts this place accord Him,\nWhen, as Isaac, He has come,\nCast the bondslave out and ruleth\nAs the Lord upon His Throne,\nThen our hearts bow down before Him,\nThis world's glory waxeth dim,\nEvery hindrance then must vanish,\nAll be subject unto Him.","th":["The Person of Christ","The Eternal Kingdom / Reign of Christ","Our Love for The Son/Christ"]},{"n":4,"t":"God our Father, Thee we worship,\nPraise Thee evermore that Thou\nLeadest us in triumph, telling\nAll Thy boundless love e'en now;\nMay we therefore still be learning,\nIn Thy word Thy counsels trace,\nTill the day that Thou displayest\nAll the glory of Thy grace.","th":["The Father","Worship & Praise","God's Love for Us","Grace","The Word of God"]}],"w":{"The Father":75,"The Word of God":50,"The Holy Spirit":50,"Grace":50,"Pilgrimage / Desert Journey":25,"Christ Risen & Glorified":25,"The Person of Christ":50,"The Eternal Kingdom / Reign of Christ":25,"Our Love for The Son/Christ":25,"Worship & Praise":25,"God's Love for Us":25}},
"424":{"m":"10s. or 11s.","a":"Anonymous","tn":"The Saviour is Coming","tc":"Anonymous","fl":"Though faint yet pursuing we go on our way;","v":[{"n":1,"t":"Though faint yet pursuing we go on our way;\nThe Lord is our leader, our stronghold and stay;\nThough suffering and sorrow and trial we bear,\nThe Lord is our refuge, and whom shall we fear?","th":["Pilgrimage / Desert Journey","Trial & Conflict","Assurance & Security"]},{"n":2,"t":"He raiseth the fallen, He cheereth the faint;\nIf the weak are oppressed, He hears their complaint;\nThe way may be dreary and thorny the road,\nBut why should we falter? Our help is in God.","th":["God's Love for Us","Trial & Conflict","Assurance & Security"]},{"n":3,"t":"And to His green pastures our footsteps He leads;\nHis flock in the desert how kindly He feeds!\nThe lambs in His bosom He tenderly bears,\nAnd brings back the wanderers safe from the snares.","th":["Pilgrimage / Desert Journey","God's Love for Us","Rest & Peace"]},{"n":4,"t":"Though clouds may surround us, our God is our light;\nThough storms rage around us, our God is our might;\nSo faint yet pursuing, still onward we move,\nThe Lord is our leader; our home is above.","th":["Trial & Conflict","Assurance & Security","Pilgrimage / Desert Journey"]},{"n":5,"t":"And there shall His people eternally dwell\nWith Him who has led them so safely and well;\nThe toilsome way over, the wilderness passed,\nAnd Canaan the bless\u00e8d is theirs at the last.","th":["Heaven & The Father's House","Pilgrimage / Desert Journey","Rest & Peace"]}],"w":{"Pilgrimage / Desert Journey":80,"Trial & Conflict":60,"Assurance & Security":60,"God's Love for Us":40,"Rest & Peace":40,"Heaven & The Father's House":20}},
"425":{"m":"10s. or 11s.","a":"John Newton (1725-1807)","tn":"Lyons","tc":"Franz Joseph Haydn (1732-1809)","fl":"Though troubles assail, and dangers affright,","v":[{"n":1,"t":"Though troubles assail, and dangers affright,\nThough friends should all fail, and foes all unite,\nYet one thing secures us whatever betide;\nThe scripture assures us the Lord will provide.","th":["Assurance & Security","Trial & Conflict","The Word of God"]},{"n":2,"t":"His call we obey, like Abram of old,\nNot knowing our way, but faith makes us bold;\nFor though we are strangers, we have a sure guide,\nAnd trust in all dangers the Lord will provide.","th":["Pilgrimage / Desert Journey","Assurance & Security","Trial & Conflict"]}],"w":{"Assurance & Security":100,"Trial & Conflict":100,"The Word of God":50,"Pilgrimage / Desert Journey":50}},
"426":{"m":"7.6.","a":"Josiah Conder (1789-1855)","tn":"Seine","tc":"W. Brockhaus (1819-1888)","fl":"'Tis not that I did choose Thee,","v":[{"n":1,"t":"'Tis not that I did choose Thee,\nFor, Lord, that could not be;\nThis heart would still refuse Thee,\nBut Thou hast chosen me;\nThou from the sins that stained me\nHast washed and set me free,\nAnd to this end ordained me\nThat I should live to Thee.","th":["Grace","Redemption","Service & Devotion","Our Love for The Son/Christ"]},{"n":2,"t":"'Twas sovereign mercy called me\nAnd taught my opening mind;\nThe world had else enthralled me,\nTo heavenly glories blind,\nMy heart owns none above Thee;\nFor Thine own self I thirst;\nThis knowing, if I love Thee,\nThat Thou didst love me first.","th":["Grace","God's Love for Us","Our Love for The Son/Christ"]}],"w":{"Grace":100,"Redemption":50,"Service & Devotion":50,"Our Love for The Son/Christ":100,"God's Love for Us":50}},
"427":{"m":"8.4.8.4.8.8.8.4.","a":"J. Kent","tn":"'Peace, be still'","tc":"Anonymous","fl":"'Tis the church triumphant singing,","v":[{"n":1,"t":"'Tis the church triumphant singing,\nWorthy the Lamb!\nHeaven throughout with praises ringing,\nWorthy the Lamb!\nThrones and powers before Him bending;\nOdours sweet, with voice, ascending;\nSwells the chorus never-ending,\nWorthy the Lamb!","th":["The Lamb of God","Worship & Praise","The Church / Bride of Christ","Heaven & The Father's House"]},{"n":2,"t":"Every kindred, tongue, and nation,\nWorthy the Lamb!\nJoin to sing the great salvation,\nWorthy the Lamb!\nLoud as mighty thunders roaring,\nFloods of mighty waters pouring,\nProstrate at His feet adoring,\nWorthy the Lamb!","th":["Worship & Praise","Redemption","The Lamb of God"]},{"n":3,"t":"Sing with blest anticipation,\nWorthy the Lamb!\nThrough the vale of tribulation,\nWorthy the Lamb!\nSweetest notes, all notes excelling,\nOn His love for ever dwelling,\nStill untold, though ever telling,\nWorthy the Lamb!","th":["Worship & Praise","God's Love for Us","Trial & Conflict","The Lamb of God"]}],"w":{"The Lamb of God":100,"Worship & Praise":100,"The Church / Bride of Christ":33,"Heaven & The Father's House":33,"Redemption":33,"God's Love for Us":33,"Trial & Conflict":33}},
"428":{"m":"C.M.","a":"Catesby Paget (19th Century)","tn":"Evan","tc":"W. H. Havergal (1793-1870)","fl":"A mind at perfect peace with God:","v":[{"n":1,"t":"A mind at perfect peace with God:\nOh, what a word is this!\nA sinner reconciled through blood:\nThis, this indeed is peace.","th":["Rest & Peace","The Precious Blood / Atonement","Redemption"]},{"n":2,"t":"By nature and by practice far,\nHow very far from God!\nYet now by grace brought nigh to Him\nThrough faith in Jesus' blood.","th":["Grace","The Precious Blood / Atonement","Redemption"]},{"n":3,"t":"So nigh, so very nigh to God,\nI cannot nearer be;\nFor in the person of His Son,\nI am as near as He.","th":["Assurance & Security","Sonship & Adoption","The Person of Christ"]},{"n":4,"t":"So dear, so very dear to God,\nMore dear I cannot be;\nThe love wherewith He loves the Son,\nSuch is His love to me.","th":["God's Love for Us","Assurance & Security","Sonship & Adoption"]},{"n":5,"t":"Why should I ever anxious be\nSince such a God is mine?\nHe watches o'er me night and day,\nAnd tells me, \"Thou art Mine\".","th":["Assurance & Security","God's Love for Us"]}],"w":{"Rest & Peace":20,"The Precious Blood / Atonement":40,"Redemption":40,"Grace":20,"Assurance & Security":60,"Sonship & Adoption":40,"The Person of Christ":20,"God's Love for Us":40}},
"429":{"m":"L.M.","a":"James Montgomery (1771-1854)","tn":"Warrington","tc":"R. Harrison (1748-1810)","fl":"To Him who suffered on the tree","v":[{"n":1,"t":"To Him who suffered on the tree\nOur souls at His soul's price to gain,\nBlessing, and praise, and glory be:\nWorthy the Lamb, for He was slain.","th":["The Cross & Sufferings of Christ","Worship & Praise","The Lamb of God","Redemption"]},{"n":2,"t":"He hath redeemed us by His blood,\nHath cleansed from every sinful stain,\nAnd made us kings ant priests to God:\nWorthy the Lamb, for He was slain.","th":["The Precious Blood / Atonement","Redemption","The Lamb of God","Forgiveness of Sins"]},{"n":3,"t":"To Him, enthroned by every right,\nAll power in heaven and earth proclaim;\nHonour, and majesty, and might:\nWorthy the Lamb, for He was slain.","th":["Christ Risen & Glorified","The Eternal Kingdom / Reign of Christ","Worship & Praise","The Lamb of God"]}],"w":{"The Cross & Sufferings of Christ":33,"Worship & Praise":67,"The Lamb of God":100,"Redemption":67,"The Precious Blood / Atonement":33,"Forgiveness of Sins":33,"Christ Risen & Glorified":33,"The Eternal Kingdom / Reign of Christ":33}},
"430":{"m":"8.8.6.","a":"Thomas Kelly (1769-1854)","tn":"Hull","tc":"S. Chandler, born 1760","fl":"To wait for that appointed day,","v":[{"n":1,"t":"To wait for that appointed day,\nWhen Christ His glories will display,\nBe this our one great care:\nTo do His will, our business here;\nNo toil to shun, no danger fear,\nResolved the cross to bear.","th":["The Lord's Coming / Rapture","Service & Devotion","The Cross & Sufferings of Christ"]},{"n":2,"t":"And though He should prolong His stay,\nAnd sinners mock at the delay,\nHis people need not fear!\nThe Man who wore the crown of thorns,\nWhose claim the world rejects and scorns,\nIn glory will appear.","th":["The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ","The Cross & Sufferings of Christ"]},{"n":3,"t":"In patience then we now may rest,\nAssured the Father's time is best,\nAnd all His word obey;\nWe wait till that blest day shall come;\nThe Lord will first convey us home,\nAnd then His power display.","th":["Rest & Peace","The Lord's Coming / Rapture","Assurance & Security","The Word of God"]}],"w":{"The Lord's Coming / Rapture":100,"Service & Devotion":33,"The Cross & Sufferings of Christ":67,"The Eternal Kingdom / Reign of Christ":33,"Rest & Peace":33,"Assurance & Security":33,"The Word of God":33}},
"431":{"m":"10s.","a":"John Nelson Darby (1800-1882)","tn":"Langran","tc":"J. Langran (1835-1909)","fl":"We praise Thee, Lord, in strains of deepest joy,","v":[{"n":1,"t":"We praise Thee, Lord, in strains of deepest joy,\nResponsive to Thy voice of holy love;\nWe hail Thee, source of bliss without alloy,\nBright inlet to the light of heaven above.","th":["Worship & Praise","Joy & Thanksgiving","God's Love for Us","Heaven & The Father's House"]},{"n":2,"t":"We praise Thee, Lord, for in Thy bless\u00e8d face\nGod's glory shines for us without a veil;\nAnd now Thou leadest us in righteous grace\nTo that blest place where praises never fail.","th":["Worship & Praise","The Person of Christ","Grace"]},{"n":3,"t":"We live of Thee, we've heard Thy quickening voice\nSpeaking of love beyond all human thought,\nThy Father's love, in which we now rejoice,\nAs those in spirit to Thy Father brought.","th":["The Father","God's Love for Us","Our Love for The Father","Our Love for The Son/Christ"]},{"n":4,"t":"Thou hast made known the Father whom we've seen\nIn Thy blest Person - infinite delight!\nIt more than satisfies, as here we glean\nThe foretaste of His love, till all be light.","th":["The Father","The Person of Christ","God's Love for Us"]},{"n":5,"t":"Father, Thou lovest! favour all divine,\nA cloudless favour rests upon us here;\nThy face shines on us as it still doth shine\nOn Thy blest Son, whose image we shall bear.","th":["The Father","God's Love for Us","Sonship & Adoption"]}],"w":{"Worship & Praise":40,"Joy & Thanksgiving":20,"God's Love for Us":80,"Heaven & The Father's House":20,"The Person of Christ":40,"Grace":20,"The Father":60,"Our Love for The Father":20,"Our Love for The Son/Christ":20,"Sonship & Adoption":20}},
"432":{"m":"C.M.","a":"Anne Steele (1716-1778)","tn":"Mapleton","tc":"Anonymous","fl":"And did the Holy and the Just,","v":[{"n":1,"t":"And did the Holy and the Just,\nThe Sovereign of the skies,\nStoop down to man's estate and dust\nThat guilty worms might rise?","th":["The Person of Christ","The Cross & Sufferings of Christ","Grace"]},{"n":2,"t":"Yes, the Redeemer left the throne,\nThe radiant throne on high -\nSurprising mercy, love unknown -\nTo suffer, bleed, and die.","th":["Redemption","The Cross & Sufferings of Christ","God's Love for Us"]},{"n":3,"t":"He took the guilty culprit's place\nAnd suffered in his stead;\nFor man - oh, miracle of grace -\nFor man the Saviour bled.","th":["The Cross & Sufferings of Christ","Grace","Forgiveness of Sins"]},{"n":4,"t":"Blest Lord, what heavenly wonders dwell\nIn Thine atoning blood!\nBy this are sinners saved from hell,\nAnd rebels brought to God.","th":["The Precious Blood / Atonement","Redemption","Forgiveness of Sins"]},{"n":5,"t":"Jesus, my soul adoring bends\nTo love so full, so free;\nThy word declares that love extends\nIn saving power to me.","th":["Worship & Praise","God's Love for Us","Our Love for The Son/Christ"]},{"n":6,"t":"What glad returns can I impart,\nFor favour so divine?\nOh, take me, all, and fill my heart,\nAnd make me wholly Thine.","th":["Service & Devotion","Our Love for The Son/Christ"]}],"w":{"The Person of Christ":17,"The Cross & Sufferings of Christ":50,"Grace":33,"Redemption":33,"God's Love for Us":33,"Forgiveness of Sins":33,"The Precious Blood / Atonement":17,"Worship & Praise":17,"Our Love for The Son/Christ":33,"Service & Devotion":17}},
"433":{"m":"8s.","a":"Mrs. E. Mills (1805-1829)","tn":"Celeste","tc":"Anonymous","fl":"We sing of the realms of the blest,","v":[{"n":1,"t":"We sing of the realms of the blest,\nThat country so bright and so fair,\nThe glorious mansions of rest -\nBut what must it be to be there?","th":["Heaven & The Father's House","Rest & Peace"]},{"n":2,"t":"We tell of its service of love,\nThe robes which the glorified wear,\nThe church of the first-born above -\nBut what must it be to be there?","th":["Heaven & The Father's House","The Church / Bride of Christ","God's Love for Us"]},{"n":3,"t":"We tell of its freedom from sin,\nFrom sorrow, temptation, and care,\nFrom trials without and within -\nBut what must it be to be there?","th":["Heaven & The Father's House","Forgiveness of Sins","Rest & Peace"]},{"n":4,"t":"Do Thou, Lord, 'midst pleasure and woe,\nStill for heaven our spirits prepare;\nAnd shortly we also shall know\nAnd feel what it is to be there.","th":["Heaven & The Father's House","Pilgrimage / Desert Journey"]}],"w":{"Heaven & The Father's House":100,"Rest & Peace":50,"The Church / Bride of Christ":25,"God's Love for Us":25,"Forgiveness of Sins":25,"Pilgrimage / Desert Journey":25}},
"434":{"m":"7.6.","a":"Mary Bowley (Mrs Peters) (1813-1856)","tn":"Ellacombe","tc":"Anonymous","fl":"We're pilgrims in the wilderness:","v":[{"n":1,"t":"We're pilgrims in the wilderness:\nOur dwelling is a camp;\nCreated things, though pleasant,\nNow bear to us death's stamp.\nBut onward we are speeding,\nThough often sorely tried:\nThe Holy Ghost is leading\nHome to the Lamb, His bride.","th":["Pilgrimage / Desert Journey","Separation from the World","The Holy Spirit","The Church / Bride of Christ"]},{"n":2,"t":"With fellow-pilgrims meeting,\nWho seek the rest to come,\n'Tis sweet to sing together,\n\"We are not far from home.\"\nAnd when we've learned our lesson,\nOur work in suffering done,\nOur ever-loving Father\nWill welcome every one.","th":["Fellowship & Gathering","Pilgrimage / Desert Journey","Rest & Peace","The Father"]},{"n":3,"t":"We look to meet our brethren,\nFrom every distant shore;\nNot one will seem a stranger,\nThough never seen before;\nWith angel hosts attending,\nIn myriads through the sky:\nYet 'midst them all, Thou only,\nO Lord, wilt fix the eye.","th":["The Lord's Coming / Rapture","Fellowship & Gathering","The Person of Christ"]},{"n":4,"t":"Lord, since we sing as pilgrims,\nO give us pilgrims' ways,\nLow thoughts of self, befitting\nProclaimers of Thy praise;\nO make us each more holy,\nIn spirit pure and meek:\nMore like to heavenly citizens,\nAs more of heaven we speak.","th":["Pilgrimage / Desert Journey","Worship & Praise","Separation from the World","Service & Devotion"]}],"w":{"Pilgrimage / Desert Journey":75,"Separation from the World":50,"The Holy Spirit":25,"The Church / Bride of Christ":25,"Fellowship & Gathering":50,"Rest & Peace":25,"The Father":25,"The Lord's Coming / Rapture":25,"The Person of Christ":25,"Worship & Praise":25,"Service & Devotion":25}},
"435":{"m":"7s.","a":"Miss Hannah Kilham Burlingham (1842-1901)","tn":"Clementia","tc":"C. Jouard 1858-1927 and F. Jouard 1884-1941.","fl":"God in mercy sent His Son","v":[{"n":1,"t":"God in mercy sent His Son\nTo a world by sin undone;\nJesus Christ was crucified -\n'Twas for sinners Jesus died.","th":["The Cross & Sufferings of Christ","Grace","God's Love for Us"]},{"n":2,"t":"Oh! the glory of the grace,\nShining in the Saviour's face,\nTelling sinners from above,\n\"God is Light\" and \"God is Love.\"","th":["Grace","The Person of Christ","God's Love for Us"]},{"n":3,"t":"Sin and death no more shall reign,\nJesus died and lives again.\nIn the glory's highest height\nSee Him God's supreme delight.","th":["Christ Risen & Glorified","Redemption"]},{"n":4,"t":"All who in His name believe,\nEverlasting life receive;\nLord of all is Jesus now;\nEvery knee to Him must bow.","th":["Assurance & Security","The Eternal Kingdom / Reign of Christ","The Person of Christ"]},{"n":5,"t":"Christ the Lord will come again;\nHe who suffered once will reign;\nEvery tongue at last shall own,\n\"Worthy is the Lamb\" alone.","th":["The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ","The Lamb of God"]}],"w":{"The Cross & Sufferings of Christ":20,"Grace":40,"God's Love for Us":40,"The Person of Christ":40,"Christ Risen & Glorified":20,"Redemption":20,"Assurance & Security":20,"The Eternal Kingdom / Reign of Christ":40,"The Lord's Coming / Rapture":20,"The Lamb of God":20}},
"436":{"m":"8.7.","a":"Edward Henry Chater (1845-1915)","tn":"Blaenwern","tc":"W. P. Rowlands (1860-1937)","fl":"God and Father, we adore Thee,","v":[{"n":1,"t":"God and Father, we adore Thee,\nNow revealed in Christ the Son,\nJoying in Thy holy presence\nThrough the work that He has done.","th":["The Father","Worship & Praise","The Person of Christ","Joy & Thanksgiving"]},{"n":2,"t":"Filled with praise we bow before Thee;\nThou art evermore the same;\nWith adoring hearts we bless Thee,\nMagnify Thy holy name.","th":["Worship & Praise","The Father"]},{"n":3,"t":"Worship, honour, praise and glory,\nWould we render unto Thee;\nHeights unsearched and depths unfathomed\nIn Thy wondrous love we see.","th":["Worship & Praise","God's Love for Us"]},{"n":4,"t":"All Thy glory shines transcendent\nIn the person of the Son,\nJesus Christ, Thy Well-belov\u00e8d,\nWho redemption's glory won.","th":["The Person of Christ","Redemption","The Father"]},{"n":5,"t":"In Thy presence we behold Him,\nObject of Thy heart's deep love,\nBoundless theme of adoration\nIn that scene of joy above.","th":["The Father","God's Love for Us","Worship & Praise","Heaven & The Father's House"]},{"n":6,"t":"In Thy grace Thou now hast called us\nSharers of Thy joy to be,\nAnd to know the bless\u00e8d secret\nOf His preciousness to Thee.","th":["Grace","Joy & Thanksgiving","The Father"]}],"w":{"The Father":83,"Worship & Praise":67,"The Person of Christ":33,"Joy & Thanksgiving":33,"God's Love for Us":33,"Redemption":17,"Heaven & The Father's House":17,"Grace":17}},
"437":{"m":"C.M.","a":"William Cowper (1731-1800)","tn":"St. Anne","tc":"W. Croft (1678-1727)","fl":"God moves in a mysterious way,","v":[{"n":1,"t":"God moves in a mysterious way,\nHis wonders to perform;\nHe plants His footsteps in the sea,\nAnd rides upon the storm.","th":["The Father","Trial & Conflict"]},{"n":2,"t":"Deep in unfathomable mines\nOf never-failing skill,\nHe treasures up His bright designs,\nAnd works His sovereign will.","th":["The Father","Trial & Conflict"]},{"n":3,"t":"Ye fearful saints, fresh courage take,\nThe clouds ye so much dread\nAre big with mercy, and shall break\nIn blessings on your head.","th":["Trial & Conflict","Assurance & Security","Grace"]},{"n":4,"t":"Judge not the Lord by feeble sense,\nBut trust Him for His grace:\nBehind a frowning providence\nHe hides a smiling face.","th":["Grace","Trial & Conflict","Assurance & Security"]},{"n":5,"t":"His purposes will ripen fast,\nUnfolding every hour;\nThe bud may have a bitter taste,\nBut sweet will be the flower.","th":["Trial & Conflict","Assurance & Security"]},{"n":6,"t":"Blind unbelief is sure to err,\nAnd scan His work in vain;\nGot is His own interpreter,\nAnd He will make it plain.","th":["The Father","Assurance & Security"]}],"w":{"The Father":50,"Trial & Conflict":83,"Assurance & Security":67,"Grace":33}},
"438":{"m":"10s.","a":"A. von der Kammer","tn":"Eventide","tc":"W. H. Monk (1823-1889)","fl":"How wonderful! that Thou the Son hast come,","v":[{"n":1,"t":"How wonderful! that Thou the Son hast come,\nAnd here for us as Son of man hast died;\nOur sins were laid on Thee, Thou didst become\nSalvation's Rock, when Thou wast crucified;\nAnd faith perceives Thy finished work - the rest\nWhere love well known, yet passing human thought,\nHas set our feet; as those Thy love has blessed,\nWe praise and worship by Thy Spirit taught","th":["The Person of Christ","The Cross & Sufferings of Christ","Redemption","Rest & Peace","God's Love for Us","Worship & Praise","The Holy Spirit"]},{"n":2,"t":"To Thee, O Lord, we bring our note of praise -\nTo Thee who bore for us the cross of shame:\nWhat grief Thou knewest on that day of days,\nWhen curse and death on Thee, the Victim came!\nHow great Thy grace! no mind of man can grasp\nThe love told out in suffering on the tree;\nLove that has gathered now within its clasp\nThose once far off, but now brought home to Thee.","th":["Worship & Praise","The Cross & Sufferings of Christ","God's Love for Us","Grace","Redemption"]},{"n":3,"t":"How wonderful that love made manifest\nIn Thee - its fulness told! so that the heart,\nTouched by Thy kindness, finds in Thee its rest,\nAnd lost in Thee, adoring, knows its part;\nThere to our hearts Thy rich unmeasured grace,\nAnd love's full fountain more and more revealed,\nCall forth from every mouth Thine endless praise,\nAnd willing lips their heart-felt homage yield.","th":["God's Love for Us","Grace","Worship & Praise","Rest & Peace"]}],"w":{"The Person of Christ":33,"The Cross & Sufferings of Christ":67,"Redemption":67,"Rest & Peace":67,"God's Love for Us":100,"Worship & Praise":100,"The Holy Spirit":33,"Grace":67}},
"439":{"m":"C.M.D.","a":"Mrs. J. A. Trench (1843-1925)","tn":"The Home","tc":"Miss S. M. Walker (1848-1918)","fl":"How blest a home, the Father's house!","v":[{"n":1,"t":"How blest a home, the Father's house!\nThere love divine doth rest;\nWhat else could satisfy the hearts\nOf those in Jesus blest?\nHis home made ours: His Father's love\nOur hearts full portion given,\nThe portion of the First-born Son,\nThe full delight of heaven.","th":["Heaven & The Father's House","God's Love for Us","The Father","Sonship & Adoption","Rest & Peace"]},{"n":2,"t":"O what a home! The Son who knows -\nHe only - all His love;\nAnd brings us as His well-beloved\nTo that bright rest above;\nDwells in His bosom; knoweth all\nThat in that bosom lies;\nAnd came to earth to make it known,\nThat we might share His joys.","th":["Heaven & The Father's House","The Person of Christ","God's Love for Us","Joy & Thanksgiving"]},{"n":3,"t":"O what a home! there fullest love\nFlows through its courts of light;\nThe Son's divine affections flow\nThroughout its depth and height;\nAnd full response the Father gives\nTo fill with joy the heart;\nNo cloud is there to dim the scene,\nOr shadow to impart.","th":["Heaven & The Father's House","God's Love for Us","The Father"]},{"n":4,"t":"O what a home! But such His love\nThat He must bring us there,\nTo fill that home, to be with Him,\nAnd in His glory share.\nThe Father's house, the Father's heart,\nAll that the Son is given,\nMade ours, the objects of His love,\nAnd He, our joy in heaven.","th":["Heaven & The Father's House","God's Love for Us","Sonship & Adoption","The Father"]}],"w":{"Heaven & The Father's House":100,"God's Love for Us":100,"The Father":75,"Sonship & Adoption":50,"Rest & Peace":25,"The Person of Christ":25,"Joy & Thanksgiving":25}},
"440":{"m":"6.6.11.6.6.11.","a":"Miss Hannah Kilham Burlingham (1842-1901)","tn":"Waiting","tc":"Anonymous","fl":"I'm waiting for Thee, Lord,","v":[{"n":1,"t":"I'm waiting for Thee, Lord,\nThy beauty to see, Lord;\nI'm waiting for Thee, for Thy coming again.\nThou'rt gone over there, Lord,\nA place to prepare, Lord;\nThy home I shall share at Thy coming again.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","Our Love for The Son/Christ"]},{"n":2,"t":"'Mid danger and fear, Lord,\nI'm oft weary here, Lord;\nThe day must be near of Thy coming again.\n'Tis all sunshine there, Lord,\nNo sighing nor care, Lord,\nBut glory so fair, at Thy coming again.","th":["The Lord's Coming / Rapture","Pilgrimage / Desert Journey","Trial & Conflict","Heaven & The Father's House"]},{"n":3,"t":"Whilst Thou art away, Lord,\nI stumble and stray, Lord;\nOh! hasten the day of Thy coming again.\nThis is not my rest, Lord,\nA pilgrim confessed, Lord,\nI wait to be blest, at Thy coming again.","th":["The Lord's Coming / Rapture","Pilgrimage / Desert Journey","Our Love for The Son/Christ"]},{"n":4,"t":"E'en now let my ways, Lord,\nBe bright with Thy praise, Lord;\nFor brief are the days ere Thy coming again.\nI'm waiting for Thee, Lord,\nThy beauty to see, Lord;\nNo triumph for me, like Thy coming again.","th":["The Lord's Coming / Rapture","Worship & Praise","Service & Devotion"]}],"w":{"The Lord's Coming / Rapture":100,"Heaven & The Father's House":50,"Our Love for The Son/Christ":50,"Pilgrimage / Desert Journey":50,"Trial & Conflict":25,"Worship & Praise":25,"Service & Devotion":25}},
"441":{"m":"C.M.","a":"Sir Edward Denny (1796-1889)","tn":"Merton","tc":"H. K. Oliver (1800-1885)","fl":"Hope of our hearts, O Lord, appear,","v":[{"n":1,"t":"Hope of our hearts, O Lord, appear,\nThou glorious Star of day;\nShine forth and chase the dreary night\nWith all our tears away.","th":["The Lord's Coming / Rapture","The Person of Christ"]},{"n":2,"t":"Strangers on earth, we wait for Thee;\nOh, leave the Father's throne!\nCome with a shout of victory, Lord,\nAnd claim us as Thine own.","th":["The Lord's Coming / Rapture","Pilgrimage / Desert Journey"]},{"n":3,"t":"No resting-place we seek on earth;\nNo loveliness we see;\nOur eye is on the royal crown\nPrepared for us with Thee.","th":["Pilgrimage / Desert Journey","Separation from the World","Heaven & The Father's House"]},{"n":4,"t":"But bless\u00e8d Lord, however bright\nThat crown of joy above,\nWhat is it to the brighter hope\nOf dwelling in Thy love?","th":["Heaven & The Father's House","Joy & Thanksgiving"]},{"n":5,"t":"What to the joy, the deeper joy,\nUnmingled, pure, and free,\nOf union with our living Head,\nOf fellowship with Thee?","th":["Joy & Thanksgiving","Fellowship & Gathering","Our Love for The Son/Christ"]},{"n":6,"t":"This joy e'en now on earth is ours;\nBut only, Lord, above,\nOur hearts, without a pang, shall know\nThe fulness of Thy love.","th":["Joy & Thanksgiving","God's Love for Us","Our Love for The Son/Christ"]},{"n":7,"t":"There near Thy heart upon the throne,\nThy ransomed Bride shall see,\nWhat grace was in the suffering Lamb,\nWho died to make us free.","th":["Heaven & The Father's House","The Church / Bride of Christ","The Lamb of God","God's Love for Us","Redemption"]}],"w":{"The Lord's Coming / Rapture":29,"The Person of Christ":14,"Pilgrimage / Desert Journey":29,"Separation from the World":14,"Heaven & The Father's House":43,"Joy & Thanksgiving":43,"Fellowship & Gathering":14,"Our Love for The Son/Christ":29,"God's Love for Us":29,"The Church / Bride of Christ":14,"The Lamb of God":14,"Redemption":14}},
"442":{"m":"10s. or 11s.","a":"Richard de Courcy (1743-1803)","tn":"Hiding in Thee","tc":"Ira D. Sankey (1840-1908)","fl":"In weakness and trial with God we may plead;","v":[{"n":1,"t":"In weakness and trial with God we may plead;\nNo fear of denial, we're sure to succeed:\nFor, though we oft grieve Him, His promise is clear,\nAnd love will believe Him: our Father will hear.","th":["The Father","Trial & Conflict","Assurance & Security"]},{"n":2,"t":"'Gainst the giant-like might of our foes we can bring,\nAs our weapons of fight, but a stone and a sling;\nShould this have dismayed us, our souls it may cheer\nThat, called on to aid us, out Father will hear.","th":["Trial & Conflict","The Father","Assurance & Security"]},{"n":3,"t":"Our calls may be weak as the voice of a child;\nAnd much that we speak may by sin be defiled;\nYet, Christ for us pleading, we may persevere;\nThrough Him interceding, our Father will hear.","th":["Christ's Intercession / Priesthood","The Father","Trial & Conflict","Forgiveness of Sins"]}],"w":{"The Father":100,"Trial & Conflict":100,"Assurance & Security":67,"Christ's Intercession / Priesthood":33,"Forgiveness of Sins":33}},
"443":{"m":"S.M.D.","a":"Horatius Bonar (1808-1889)","tn":"Lebanon","tc":"J. Zundel (1815-1882)","fl":"I was a wandering sheep,","v":[{"n":1,"t":"I was a wandering sheep,\nI did not love the fold,\nI did not love my Shepherd's voice,\nI would not be controlled.\nI was a wayward child,\nI did not love my home,\nI did not love my Father's voice\nI loved afar to roam.","th":["Pilgrimage / Desert Journey","The Father","Sonship & Adoption"]},{"n":2,"t":"The Shepherd sought His sheep,\nThe Father sought His child,\nHe followed me o'er vale and hill,\nO'er deserts waste and wild;\nHe found me nigh to death,\nFamished, and faint, and lone;\nHe bound me with the chains of love,\nHe saved the wandering one.","th":["God's Love for Us","The Father","Redemption"]},{"n":3,"t":"Jesus my Shepherd is,\n'Twas He that loved my soul,\n'Twas He that washed me in His blood,\n'Twas He that made me whole;\n'Twas He that sought the lost,\nThat found the wandering sheep;\n'Twas He that brought me to the flock,\n'Tis He that still doth keep.","th":["The Precious Blood / Atonement","God's Love for Us","The Person of Christ","Redemption"]},{"n":4,"t":"No more a wandering sheep,\nI love to be controlled;\nI love my tender Shepherd's voice,\nI love the peaceful fold:\nNo more a wayward child,\nI seek no more to roam;\nI love my heavenly Father's voice;\nI love, I love His home.","th":["Rest & Peace","Sonship & Adoption","The Father","Our Love for The Father","Our Love for The Son/Christ"]}],"w":{"Pilgrimage / Desert Journey":25,"The Father":75,"Sonship & Adoption":50,"God's Love for Us":50,"Redemption":50,"The Precious Blood / Atonement":25,"The Person of Christ":25,"Rest & Peace":25,"Our Love for The Father":25,"Our Love for The Son/Christ":25}},
"444":{"m":"P.M.","a":"Emil Donges (1853-1923)","tn":"Lobe den Herren","tc":"Anonymous","fl":"Jesus, God's Lamb, in the midst","v":[{"n":1,"t":"Jesus, God's Lamb, in the midst\nOf the throne Thou art crowned;\nThou once on Calvary sufferedst,\nOf man the disowned;\nWorthy art Thou,\nGlory encircles Thy brow,\nSon of the Father enthron\u00e8d.","th":["The Lamb of God","Christ Risen & Glorified","The Cross & Sufferings of Christ","Worship & Praise"]},{"n":2,"t":"We Thy belov\u00e8d assembled\nRemember Thy dying;\nUnto the death of our Lord\nOur full hearts are replying;\nThou hast loved us,\nJesus, who gav'st Thyself thus;\nWe on Thy love are relying.","th":["The Lord's Supper / Remembrance","God's Love for Us","The Cross & Sufferings of Christ"]},{"n":3,"t":"Here upon earth till Thy coming\nThy death we are showing;\nBut unto Thee in the glory\nOur hearts are outgoing;\nTo Thee above,\nCentre of glory and love,\nGladly our worship is flowing.","th":["The Lord's Supper / Remembrance","The Lord's Coming / Rapture","Worship & Praise","Our Love for The Son/Christ"]}],"w":{"The Lamb of God":33,"Christ Risen & Glorified":33,"The Cross & Sufferings of Christ":67,"Worship & Praise":67,"The Lord's Supper / Remembrance":67,"God's Love for Us":33,"The Lord's Coming / Rapture":33,"Our Love for The Son/Christ":33}},
"445":{"m":"8.7.8.7.4.7.","a":"G. de Mattos","tn":"Melbourne","tc":"W L Viner (1790-1867)","fl":"Jesus Lord, Almighty Saviour,","v":[{"n":1,"t":"Jesus Lord, Almighty Saviour,\nBowed in death on Calvary's tree!\nDarkest hour of bitter judgment\nBorne to set Thy people free!\nSweet our portion,\nAs we thus remember Thee.","th":["The Cross & Sufferings of Christ","Redemption","The Lord's Supper / Remembrance"]},{"n":2,"t":"From the highest height of glory\nTo the cross of deepest shame,\nThus accomplishing redemption\nJesus in His pity came;\nPrecious Saviour,\nWe adore Thy matchless name.","th":["The Cross & Sufferings of Christ","Redemption","The Person of Christ","Worship & Praise"]},{"n":3,"t":"From the darkness and the distance,\nFrom the crushing sense of sin,\nBless\u00e8d Lord, Thou now hast freed us,\nBy Thy blood hast made us clean;\nIn Thy beauty\nNow Thy ransomed ones are seen.","th":["Redemption","The Precious Blood / Atonement","Forgiveness of Sins"]}],"w":{"The Cross & Sufferings of Christ":67,"Redemption":100,"The Lord's Supper / Remembrance":33,"The Person of Christ":33,"Worship & Praise":33,"The Precious Blood / Atonement":33,"Forgiveness of Sins":33}},
