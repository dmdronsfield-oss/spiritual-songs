"279":{"m":"10s.","a":"Miss Catherine Helene von Poseck (1859-1953)","tn":"Ellers","tc":"E. J. Hopkins (1818-1901)","fl":"Thou, Lord, Thyself, the Bright, the Morning Star,","v":[{"n":1,"t":"Thou, Lord, Thyself, the Bright, the Morning Star,\nWilt soon arise and chase our woes afar;\nWhat gladness then, what bliss without a cloud,\nShall fill these hearts so oft with sorrow bowed!","th":["The Lord's Coming / Rapture","Joy & Thanksgiving","The Person of Christ"]},{"n":2,"t":"Lord Jesus, shall we gaze upon Thy face -\nThat face of perfect beauty, love and grace?\nThat bless\u00e8d form, once nailed upon the tree,\nLord, shall these very eyes in glory see?","th":["The Lord's Coming / Rapture","The Person of Christ","The Cross & Sufferings of Christ","God's Love for Us"]},{"n":3,"t":"We shall, we shall! for Thou hast said it, Lord,\nAnd faith rests ever on Thy changeless word:\n\"Behold, I come,\" \"surely I quickly come;\"\nE'en so, Amen: oh, take Thy loved ones home!","th":["The Lord's Coming / Rapture","Assurance & Security","The Word of God"]},{"n":4,"t":"Lord Jesus, come: the Spirit calls for Thee,\nThe bride desireth sore Thy face to see;\nLord Jesus, come: our hearts within us burn,\nWe hasten forth to greet Thy glad return.","th":["The Lord's Coming / Rapture","The Holy Spirit","The Church / Bride of Christ","Our Love for The Son/Christ"]}],"w":{"The Lord's Coming / Rapture":100,"Joy & Thanksgiving":25,"The Person of Christ":50,"The Cross & Sufferings of Christ":25,"God's Love for Us":25,"Assurance & Security":25,"The Word of God":25,"The Holy Spirit":25,"The Church / Bride of Christ":25,"Our Love for The Son/Christ":25}},
"280":{"m":"8.8.6.","a":"Thomas Kelly (1769-1854)","tn":"Hull","tc":"S. Chandler, born 1760","fl":"O joyful day! O glorious hour!","v":[{"n":1,"t":"O joyful day! O glorious hour!\nWhen Jesus, by almighty power,\nRevived and left the grave;\nIn all His works behold Him great,\nBefore, almighty to create,\nAlmighty now to save.","th":["Christ Risen & Glorified","Joy & Thanksgiving","Redemption"]},{"n":2,"t":"The First-begotten from the dead,\nHe's risen now, His people's Head,\nAnd thus their life's secure;\nAnd if, like Him, they yield their breath,\nLike Him they'll burst the bonds of death,\nTheir resurrection sure.","th":["Christ Risen & Glorified","Assurance & Security","The Church / Bride of Christ"]},{"n":3,"t":"Why should His people, then, be sad?\nNone have such reason to be glad\nAs those redeemed to God:\nJesus, the mighty Saviour, lives,\nTo them eternal life He gives,\nThe purchase of His blood.","th":["Redemption","Joy & Thanksgiving","The Precious Blood / Atonement"]},{"n":4,"t":"Then let our gladsome praise resound,\nAnd let us in His work abound,\nWhose bless\u00e8d name is Love;\nWe're sure our labour's not in vain,\nFor we with Him ere long shall reign,\nWith Jesus dwell above.","th":["Worship & Praise","Service & Devotion","Heaven & The Father's House","God's Love for Us"]}],"w":{"Christ Risen & Glorified":50,"Joy & Thanksgiving":50,"Redemption":50,"Assurance & Security":25,"The Church / Bride of Christ":25,"The Precious Blood / Atonement":25,"Worship & Praise":25,"Service & Devotion":25,"Heaven & The Father's House":25,"God's Love for Us":25}},
"281":{"m":"C.M.","a":"I Watts (1674-1748)","tn":"Friedrich","tc":"George Frederick Handel (1685-1759)","fl":"With joy we meditate the grace","v":[{"n":1,"t":"With joy we meditate the grace\nOf God's High Priest above;\nHis heart is filled with tenderness,\nHis very name is Love.","th":["Christ's Intercession / Priesthood","Grace","God's Love for Us"]},{"n":2,"t":"Touched with a sympathy within,\nHe knows our feeble frame;\nHe knows what sore temptations mean\nFor He has felt the same.","th":["Christ's Intercession / Priesthood","The Person of Christ"]},{"n":3,"t":"But spotless, undefiled and pure,\nThe great Redeemer stood;\nWhile Satan's fiery darts He bore\nAnd did resist to blood.","th":["The Person of Christ","The Precious Blood / Atonement","Trial & Conflict"]},{"n":4,"t":"He, in the days of sorrowing flesh,\nPoured out His cries and tears,\nAnd, though ascended, feels afresh\nWhat every member bears.","th":["The Cross & Sufferings of Christ","Christ's Intercession / Priesthood"]},{"n":5,"t":"Then boldly let our faith address\nThe throne of grace and power:\nWe shall obtain delivering grace\nIn every needed hour.","th":["Grace","Christ's Intercession / Priesthood"]}],"w":{"Christ's Intercession / Priesthood":80,"Grace":40,"God's Love for Us":20,"The Person of Christ":40,"The Precious Blood / Atonement":20,"Trial & Conflict":20,"The Cross & Sufferings of Christ":20}},
"282":{"m":"7.7.7.3.","a":"Miss Charlotte Elliott (1789-1871)","tn":"Panoply","tc":"Mrs. Hazel Dixon","fl":"Christian, seek not yet repose,","v":[{"n":1,"t":"Christian, seek not yet repose,\nCast thy dreams of ease away;\nThou art in the midst of foes:\nWatch and pray.","th":["Trial & Conflict"]},{"n":2,"t":"Canaan has for thee been won,\nChrist triumphant led the way;\nIn His might possess thine own!\nWatch and pray.","th":["Heaven & The Father's House","Christ Risen & Glorified","Trial & Conflict"]},{"n":3,"t":"In the heavenlies see that land,\nSatan would thine entrance stay;\nThou against his wiles must stand:\nWatch and pray.","th":["Trial & Conflict","Heaven & The Father's House"]},{"n":4,"t":"Principalities and powers,\nMustering their unseen array,\nWait for thy unguarded hours:\nWatch and pray.","th":["Trial & Conflict"]},{"n":5,"t":"Gird thy heavenly armour on,\nWear it ever, night and day;\nAmbushed lies the evil one:\nWatch and pray.","th":["Trial & Conflict"]},{"n":6,"t":"Watch, as if on that alone\nHung the issue of the day;\nPray that help may be sent down:\nWatch and pray.","th":["Trial & Conflict"]}],"w":{"Trial & Conflict":100,"Heaven & The Father's House":33,"Christ Risen & Glorified":17}},
"283":{"m":"L.M.","a":"I Watts (1674-1748)","tn":"Rockingham","tc":"E. Miller (1731-1807)","fl":"When I survey the wondrous cross","v":[{"n":1,"t":"When I survey the wondrous cross\nOn which the Prince of glory died,\nMy richest gain I count but loss,\nAnd pour contempt on all my pride.","th":["The Cross & Sufferings of Christ","The Person of Christ","Separation from the World"]},{"n":2,"t":"Forbid it, Lord, that I should boast,\nSave in the cross of Christ my God:\nAll the vain things that charm me most,\nI sacrifice them to His blood.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","Separation from the World"]},{"n":3,"t":"See from His head, His hands, His feet,\nSorrow and love flow mingled down:\nDid e'er such love and sorrow meet,\nOr thorns compose so rich a crown?","th":["The Cross & Sufferings of Christ","God's Love for Us"]},{"n":4,"t":"Were the whole realm of nature mine,\nThat were an offering far too small;\nLove so amazing, so divine,\nDemands my soul, my life, my all.","th":["God's Love for Us","Service & Devotion","Our Love for The Son/Christ"]}],"w":{"The Cross & Sufferings of Christ":75,"The Person of Christ":25,"Separation from the World":50,"The Precious Blood / Atonement":25,"God's Love for Us":50,"Service & Devotion":25,"Our Love for The Son/Christ":25}},
"284":{"m":"6-8s.","a":"C. Wesley (1707-1788)","tn":"St. Catherine","tc":"H. F. Hemy (1818-1888)","fl":"Thou hidden Source of calm repose!","v":[{"n":1,"t":"Thou hidden Source of calm repose!\nThou all-sufficient Love divine!\nOur help and refuge from our foes,\nSecure we are, for we are Thine;\nAnd, lo! from guilt and grief and shame\nWe're hidden, Saviour, by Thy name.","th":["Assurance & Security","God's Love for Us","Forgiveness of Sins","The Person of Christ"]},{"n":2,"t":"Thy mighty name Salvation is,\nAnd keeps our happy souls above;\nComfort it brings, and power and peace\nAnd joy and everlasting love;\nTo us, with Thy dear name, are given\nPardon and holiness and heaven.","th":["Redemption","Rest & Peace","Joy & Thanksgiving","Forgiveness of Sins"]},{"n":3,"t":"O Lord, our All in all Thou art,\nOur rest in toil, our ease in pain;\nThe medicine of a broken heart;\n'Mid storms, our peace; in loss, our gain;\nOur smile beneath the tyrant's frown;\nIn shame, our glory and our crown.","th":["Rest & Peace","Trial & Conflict","The Person of Christ"]},{"n":4,"t":"In want, our plentiful supply;\nIn weakness, our almighty power;\nIn bonds, our perfect liberty;\nOur refuge in temptation's hour;\nOur comfort 'midst all grief and thrall,\nOur life in death, our All in all.","th":["Assurance & Security","Trial & Conflict","The Person of Christ"]}],"w":{"Assurance & Security":50,"God's Love for Us":25,"Forgiveness of Sins":50,"The Person of Christ":75,"Redemption":25,"Rest & Peace":50,"Joy & Thanksgiving":25,"Trial & Conflict":50}},
"285":{"m":"C.M.","a":"Thomas Kelly (1769-1854)","tn":"Barrow","tc":"Anonymous","fl":"The head that once was crowned with thorns,","v":[{"n":1,"t":"The head that once was crowned with thorns,\nIs crowned with glory now;\nHeaven's royal diadem adorns\nThe mighty Victor's brow.","th":["Christ Risen & Glorified","The Cross & Sufferings of Christ"]},{"n":2,"t":"Thou glorious light of courts above,\nJoy of the saints below,\nTo us still manifest Thy love,\nThat we its depths may know.","th":["God's Love for Us","Christ Risen & Glorified","Joy & Thanksgiving"]},{"n":3,"t":"To us Thy cross with all its shame,\nWith all its grace be given;\nThough earth disowns Thy lowly name\nGod honours it in heaven.","th":["The Cross & Sufferings of Christ","Grace"]},{"n":4,"t":"Who suffer with Thee, Lord, below,\nShall reign with Thee above:\nThen let it be our joy to know\nThis way of peace and love.","th":["The Cross & Sufferings of Christ","The Eternal Kingdom / Reign of Christ","Rest & Peace"]},{"n":5,"t":"To us Thy cross is life and health;\n'Twas shame and death to Thee;\nOur present glory, joy and wealth,\nOur everlasting stay.","th":["The Cross & Sufferings of Christ","Assurance & Security"]}],"w":{"Christ Risen & Glorified":40,"The Cross & Sufferings of Christ":80,"God's Love for Us":20,"Joy & Thanksgiving":20,"Grace":20,"The Eternal Kingdom / Reign of Christ":20,"Rest & Peace":20,"Assurance & Security":20}},
"286":{"m":"8.7.","a":"Thomas Kelly (1769-1854)","tn":"Grebe","tc":"J. G. Ebeling (1637-1676)","fl":"\"Stricken, smitten, and afflicted,\"","v":[{"n":1,"t":"\"Stricken, smitten, and afflicted,\"\nSee Him dying on the tree;\n'Tis the Christ by man rejected;\nYes, my soul, 'tis He, 'tis He.\nMark the sacrifice appointed,\nSee who bears the awful load;\n'Tis the Word, the Lord's Anointed,\nSon of man and Son of God.","th":["The Cross & Sufferings of Christ","The Lamb of God","The Person of Christ"]},{"n":2,"t":"Here we have a firm foundation,\nHere's the refuge of the lost;\nChrist's the rock of our salvation;\nHis the name of which we boast.\nLamb of God, for sinners wounded,\nSacrifice to cancel guilt,\nNone shall ever be confounded\nWho on Thee their hope have built.","th":["Assurance & Security","The Lamb of God","The Precious Blood / Atonement","Redemption"]}],"w":{"The Cross & Sufferings of Christ":50,"The Lamb of God":100,"The Person of Christ":50,"Assurance & Security":50,"The Precious Blood / Atonement":50,"Redemption":50}},
"287":{"m":"C.M.D.","a":"Miss Catherine Helene von Poseck (1859-1953)","tn":"Prospect","tc":"Anonymous","fl":"Father divine, in grateful love","v":[{"n":1,"t":"Father divine, in grateful love\nWe bow before Thy face,\nWhile for Thy gift unspeakable\nOur souls o'erflow with praise;\nThine only Son, Thy heart's delight\nFar back, ere time began,\nThou in Thy boundless love didst give\nTo die for ruined man.","th":["The Father","God's Love for Us","Worship & Praise","The Person of Christ"]},{"n":2,"t":"Thou gavest Him, well knowing all\nThat lay before Him here -\nThe thorny crown, the purple robe,\nThe gall, the cruel spear,\nAnd in that hour of woe supreme\nDid Jesus bear our sin -\nThe patient, holy, suffering Lamb,\nOf God forsaken then.","th":["The Cross & Sufferings of Christ","The Lamb of God","God's Love for Us","Forgiveness of Sins"]},{"n":3,"t":"Father, this mystery of love\nMust all our praise excel:\nNo human, no angelic tongue\nIts wondrous depths can tell;\nFor what were we that Thou on us\nSuch love shouldst ever pour?\nWe bow, and, filled with joy and awe,\nFather and Son adore.","th":["God's Love for Us","The Father","Worship & Praise"]}],"w":{"The Father":67,"God's Love for Us":100,"Worship & Praise":67,"The Person of Christ":33,"The Cross & Sufferings of Christ":33,"The Lamb of God":33,"Forgiveness of Sins":33}},
"288":{"m":"8.6.","a":"Anonymous","tn":"Prospect","tc":"Anonymous","fl":"O Thou, whose mercies far exceed","v":[{"n":1,"t":"O Thou, whose mercies far exceed\nAll we can do or say,\nAs in Thy people Thou indeed\nDost daily more display;\nLet, for our happiness, O God,\nOn us while here below,\nBy virtue of Christ's death and blood,\nThy richest blessings flow.","th":["God's Love for Us","The Precious Blood / Atonement","Grace"]},{"n":2,"t":"Preserve Thy flock most graciously,\nBy Thine all-powerful hand;\nMove them from every harm away,\n'Twixt them and danger stand;\nTill Thou shalt fully have obtained\nIn us the fruits of grace,\nAnd we, in joys that never end,\nShall see Thee, face to face.","th":["Assurance & Security","Grace","Pilgrimage / Desert Journey"]},{"n":3,"t":"Do Thou, the very God of peace,\nUs wholly sanctify,\nAnd grant us such a rich increase\nOf power from on high,\nThat spirit, soul and body may,\nPreserv\u00e8d free from stain,\nBe blameless until that great day;\nLord Jesus Christ, Amen!","th":["The Holy Spirit","The Lord's Coming / Rapture","Service & Devotion"]}],"w":{"God's Love for Us":33,"The Precious Blood / Atonement":33,"Grace":67,"Assurance & Security":33,"Pilgrimage / Desert Journey":33,"The Holy Spirit":33,"The Lord's Coming / Rapture":33,"Service & Devotion":33}},
"289":{"m":"6-10s.","a":"Katharina Amalia Dorothea von Schlegel (b. 1697)","tn":"Yorkshire","tc":"J. Wainwright (1723-1768)","fl":"Be still, my soul: the Lord is on thy side;","v":[{"n":1,"t":"Be still, my soul: the Lord is on thy side;\nBear patiently the cross of grief or pain;\nLeave to Thy God to order and provide;\nIn every change He faithful will remain.\nBe still, my soul: thy best, thy heavenly Friend\nThrough thorny ways leads to a joyful end.","th":["Assurance & Security","Trial & Conflict","Rest & Peace","The Cross & Sufferings of Christ"]},{"n":2,"t":"Be still, my soul: thy God doth undertake\nTo guide the future as He has the past.\nThy hope, thy confidence let nothing shake;\nAll now mysterious shall be bright at last.\nBe still, my soul: the waves and winds still know\nHis voice who ruled them while He dwelt below.","th":["Assurance & Security","The Father","Rest & Peace"]},{"n":3,"t":"Be still my soul; the hour is hastening on\nWhen we shall be for ever with the Lord,\nWhen disappointment, grief and fear are gone,\nSorrow forgot, love's purest joys restored.\nBe still, my soul: when change and tears are past,\nAll safe and bless\u00e8d we shall meet at last.","th":["The Lord's Coming / Rapture","Rest & Peace","God's Love for Us","Assurance & Security"]}],"w":{"Assurance & Security":100,"Trial & Conflict":33,"Rest & Peace":100,"The Cross & Sufferings of Christ":33,"The Father":33,"The Lord's Coming / Rapture":33,"God's Love for Us":33}},
"290":{"m":"8.7.8.7.4.7.","a":"Thomas Kelly (1769-1854)","tn":"Stanford","tc":"Anonymous","fl":"Why those fears! Behold 'tis Jesus","v":[{"n":1,"t":"Why those fears! Behold 'tis Jesus\nHolds the helm, and guides the ship;\nSpread the sails, and catch the breezes\nSent to waft us through the deep,\nTo the regions\nWhere the mourners cease to weep.","th":["Assurance & Security","The Person of Christ","Pilgrimage / Desert Journey"]},{"n":2,"t":"Though the shore we hope to land on,\nOnly by report is known,\nYet we freely all abandon,\nLed by that report alone,\nAnd with Jesus,\nThrough the trackless deep move","th":["Pilgrimage / Desert Journey","Assurance & Security"]},{"n":3,"t":"Led by faith, we brave the ocean;\nLed by faith, the storm defy;\nCalm amidst tumultuous motion,\nKnowing that the Lord is nigh:\nWaves obey Him,\nAnd the storms before Him fly.","th":["Pilgrimage / Desert Journey","Trial & Conflict","Assurance & Security"]},{"n":4,"t":"Rendered safe by His protection,\nWe shall pass the watery waste,\nTrusting to His wise direction\nWe shall gain the port at last;\nAnd with wonder\nThink on toils and dangers past.","th":["Assurance & Security","Pilgrimage / Desert Journey"]},{"n":5,"t":"Oh, what pleasures there await us!\nThere the tempests cease to roar:\nThere it is that those who hate us\nCan molest our peace no more:\nTrouble ceases\nOn that tranquil, happy shore.","th":["Rest & Peace","Heaven & The Father's House"]}],"w":{"Assurance & Security":80,"The Person of Christ":20,"Pilgrimage / Desert Journey":80,"Trial & Conflict":20,"Rest & Peace":20,"Heaven & The Father's House":20}},
"291":{"m":"8s.","a":"William Cowper (1731-1800)","tn":"Shepherd","tc":"C. Jouard 1858-1927 and F. Jouard 1884-1941.","fl":"O Saviour, whom absent we love,","v":[{"n":1,"t":"O Saviour, whom absent we love,\nWhom not having seen we adore,\nWhose name is exalted above\nAll glory, dominion, and power;","th":["Worship & Praise","The Person of Christ","Our Love for The Son/Christ"]},{"n":2,"t":"O come and display us as Thine,\nAnd leave us no longer to roam.\nLet the light of Thy presence, Lord, shine,\nLet the trumpet soon summon us home.","th":["The Lord's Coming / Rapture"]},{"n":3,"t":"Oh, then shall the mists be removed,\nAnd round us Thy brightness be poured.\nWe shall meet Thee whom absent we loved,\nWe shall see whom unseen we adored.","th":["The Lord's Coming / Rapture","Joy & Thanksgiving","Our Love for The Son/Christ"]},{"n":4,"t":"Oh, then never more shall the fears,\nThe trials, temptations, and woes,\nWhich darken this valley of tears,\nIntrude on our blissful repose.","th":["The Lord's Coming / Rapture","Rest & Peace","Heaven & The Father's House"]},{"n":5,"t":"Or, if yet remembered above,\nRemembrance no sadness shall raise;\nThey will bring us fresh thoughts of Thy love,\nNew themes for our wonder and praise.","th":["God's Love for Us","Worship & Praise"]}],"w":{"Worship & Praise":40,"The Person of Christ":20,"Our Love for The Son/Christ":40,"The Lord's Coming / Rapture":60,"Joy & Thanksgiving":20,"Rest & Peace":20,"Heaven & The Father's House":20,"God's Love for Us":20}},
"292":{"m":"8.7.8.7.4.7.","a":"Miss Catherine Helene von Poseck (1859-1953)","tn":"Calvary","tc":"S. Stanley (1767-1822)","fl":"Hallelujah ! Christ hath conquered -","v":[{"n":1,"t":"Hallelujah ! Christ hath conquered -\nConquered sin and death and hell:\nSing aloud His mighty triumphs,\nGladly now His praises tell;\nHallelujah !\nJesus hath done all things well.","th":["Christ Risen & Glorified","Redemption","Worship & Praise"]},{"n":2,"t":"Him, who once as Man of sorrows\nBore for us our sins and shame,\nGlad we hail as King of glory -\nHis a never-ending fame;\nHallelujah !\nPraise, for ever praise, His name.","th":["The Cross & Sufferings of Christ","Christ Risen & Glorified","Worship & Praise"]},{"n":3,"t":"Son of God, in adoration\nLow we bow before Thy face,\nAnd with loving hearts, Lord Jesus,\nSing the marvels of Thy grace;\nHallelujah !\nThee we worship, Thee we praise.","th":["Worship & Praise","The Person of Christ","Grace","God's Love for Us"]}],"w":{"Christ Risen & Glorified":67,"Redemption":33,"Worship & Praise":100,"The Cross & Sufferings of Christ":33,"The Person of Christ":33,"Grace":33,"God's Love for Us":33}},
"293":{"m":"8.7.8.7.","a":"Mrs. Cecil F. Alexander (1823-1895)","tn":"Galilee","tc":"W. H. Jude (1851-1922)","fl":"Jesus calls us; o'er the tumult","v":[{"n":1,"t":"Jesus calls us; o'er the tumult\nOf our life's wild, restless sea,\nDay by day His sweet voice soundeth,\nSaying, \"Christian, follow Me.\"","th":["Service & Devotion","The Person of Christ"]},{"n":2,"t":"As of old apostles heard it\nBy the Galilean lake,\nTurned from home and toil and kindred,\nLeaving all for His dear sake.","th":["Service & Devotion","Separation from the World"]},{"n":3,"t":"Jesus calls us from the worship\nOf the vain world's golden store:\nFrom each idol that would keep us,\nSaying, \"Christian, love Me more.\"","th":["Separation from the World","Our Love for The Son/Christ"]},{"n":4,"t":"In our joys, and in our sorrows,\nDays of toil, and hours of ease,\nStill He calls, in cares and pleasures,\n\"Christian, love Me more than these.\"","th":["Service & Devotion","Trial & Conflict","Our Love for The Son/Christ"]},{"n":5,"t":"Jesus calls us-by Thy mercies,\nSaviour, may we hear Thy call;\nGive our hearts to Thy obedience,\nServe and love Thee best of all.","th":["Service & Devotion","Grace","Our Love for The Son/Christ"]}],"w":{"Service & Devotion":80,"The Person of Christ":20,"Separation from the World":40,"Our Love for The Son/Christ":60,"Trial & Conflict":20,"Grace":20}},
"294":{"m":"L.M.","a":"Count Nicolaus Ludwig von Zinzendorf (1700-1760)","tn":"Pentecost","tc":"W. Boyd (1847-1928)","fl":"O Come, Thou stricken Lamb of God!","v":[{"n":1,"t":"O Come, Thou stricken Lamb of God!\nWho shed'st for us Thine own life-blood,\nAnd teach us all Thy love - then pain\nIn life were sweet and death were gain.","th":["The Lamb of God","The Cross & Sufferings of Christ","God's Love for Us"]},{"n":2,"t":"Take Thou our hearts, and let them be\nFor ever closed to all but Thee;\nThy willing servants, let us wear\nThe seal of love for ever there.","th":["Service & Devotion","Our Love for The Son/Christ"]},{"n":3,"t":"How blest are they who still abide\nClose sheltered by Thy watchful side;\nWho life and strength from Thee receive,\nAnd with Thee move, and in Thee live.","th":["Assurance & Security","God's Love for Us"]},{"n":4,"t":"Ah, Lord! enlarge our scanty thought,\nTo know the wonders Thou hast wrought;\nUnloose our stammering tongues to tell\nThy love, immense, unsearchable.","th":["God's Love for Us","Worship & Praise"]},{"n":5,"t":"Firstborn of many brethren, Thou!\nTo whom both heaven and earth must bow;\nHeirs of Thy shame and of Thy throne,\nWe bear the cross, and seek the crown.","th":["Sonship & Adoption","The Cross & Sufferings of Christ","The Eternal Kingdom / Reign of Christ"]}],"w":{"The Lamb of God":20,"The Cross & Sufferings of Christ":40,"God's Love for Us":60,"Service & Devotion":20,"Our Love for The Son/Christ":20,"Assurance & Security":20,"Worship & Praise":20,"Sonship & Adoption":20,"The Eternal Kingdom / Reign of Christ":20}},
"295":{"m":"8.7.8.7.4.7.","a":"Samuel Prideaux Tregelles (1813-1875)","tn":"Regent Square","tc":"H. T. Smart (1813-1879)","fl":"Holy Saviour, we adore Thee","v":[{"n":1,"t":"Holy Saviour, we adore Thee\nSeated on the throne of God;\nSoon in glory all before Thee\nShall proclaim Thy praise abroad;\nThou art worthy,\nWe were ransomed by Thy blood.","th":["Worship & Praise","Christ Risen & Glorified","The Precious Blood / Atonement","Redemption"]},{"n":2,"t":"Saviour, though the world despised Thee,\nThough Thou here wast crucified,\nYet the Father's glory raised Thee,\nLord of all creation wide;\nThou art worthy,\nWe shall live, for Thou hast died.","th":["Christ Risen & Glorified","The Cross & Sufferings of Christ","The Eternal Kingdom / Reign of Christ"]},{"n":3,"t":"And though here on earth rejected,\n'Tis but fellowship with Thee;\nShould we not with joy expect it\nHere like Thee, our Lord, to be?\nThou art worthy,\nThou from earth hast set us free.","th":["Separation from the World","Fellowship & Gathering","The Person of Christ"]},{"n":4,"t":"Haste the day of Thy returning\nWith Thy ransomed saints to reign;\nThen shall end all days of mourning,\nWe shall sing with triumph then;\nThou art worthy,\nCome, Lord Jesus, come, Amen.","th":["The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ","Redemption"]}],"w":{"Worship & Praise":25,"Christ Risen & Glorified":50,"The Precious Blood / Atonement":25,"Redemption":50,"The Cross & Sufferings of Christ":25,"The Eternal Kingdom / Reign of Christ":50,"Separation from the World":25,"Fellowship & Gathering":25,"The Person of Christ":25,"The Lord's Coming / Rapture":25}},
"296":{"m":"8.7.","a":"C. Wesley (1707-1788)","tn":"Beecher","tc":"J. Zundel (1815-1882)","fl":"Love divine, all praise excelling,","v":[{"n":1,"t":"Love divine, all praise excelling,\nJoy of heaven, to earth come down,\nBless us with Thy rich indwelling,\nAll Thy faithful mercies crown.\nSaviour, Thee we'd still be blessing,\nServe Thee here, as soon above,\nPraise Thee, Saviour, without ceasing,\nGlory in Thy dying love.","th":["God's Love for Us","Worship & Praise","Service & Devotion","Grace","The Cross & Sufferings of Christ"]},{"n":2,"t":"Firstfruits of Thy new creation,\nFaithful, holy, may we be,\nJoyful in Thy full salvation,\nMore and more conformed to Thee,\nChanged from glory into glory,\nTill in heaven we take our place,\nThen to worship and adore Thee,\nLost in wonder, love and praise.","th":["New Creation","Service & Devotion","Heaven & The Father's House","Worship & Praise"]}],"w":{"God's Love for Us":50,"Worship & Praise":100,"Service & Devotion":100,"Grace":50,"The Cross & Sufferings of Christ":50,"New Creation":50,"Heaven & The Father's House":50}},
"297":{"m":"C.M.","a":"Joseph Addison (1672-1719)","tn":"Contemplation","tc":"F. A. G. Ouseley (1825-1889)","fl":"When all Thy mercies, O my God,","v":[{"n":1,"t":"When all Thy mercies, O my God,\nMy rising soul surveys,\nTransported with the view, I'm lost\nIn wonder, love and praise.","th":["God's Love for Us","Worship & Praise","Joy & Thanksgiving"]},{"n":2,"t":"Unnumbered comforts to my soul\nThy tender care bestowed,\nBefore my infant heart conceived\nFrom whom those comforts flowed.","th":["God's Love for Us","The Father"]},{"n":3,"t":"Ten thousand thousand precious gifts\nMy daily thanks employ;\nNor is the least a cheerful heart\nTo taste those gifts with joy.","th":["Joy & Thanksgiving","God's Love for Us"]},{"n":4,"t":"Through every period of my life\nThy goodness I'll pursue;\nThe desert past, in glory bright,\nThe precious theme renew.","th":["Pilgrimage / Desert Journey","Heaven & The Father's House","Worship & Praise"]},{"n":5,"t":"Through all eternity to Thee\nA joyful song I'll raise;\nBut, oh, eternity's too short\nTo utter all Thy praise !","th":["Worship & Praise","Joy & Thanksgiving","Heaven & The Father's House"]}],"w":{"God's Love for Us":60,"Worship & Praise":60,"Joy & Thanksgiving":60,"The Father":20,"Pilgrimage / Desert Journey":20,"Heaven & The Father's House":40}},
"298":{"m":"8.7.","a":"G. de Mattos","tn":"Bartimeus","tc":"S. Jenks","fl":"To Thy name, Lord Jesus, gathered,","v":[{"n":1,"t":"To Thy name, Lord Jesus, gathered,\nIn Thy presence we rejoice,\nAnd in songs of adoration\nGladly join with heart and voice.","th":["Fellowship & Gathering","Worship & Praise","Joy & Thanksgiving"]},{"n":2,"t":"Thou hast loved us, gracious Saviour,\nWith an everlasting love,\nTasted death from all to save us,\nSeated us in Thee above.","th":["God's Love for Us","The Cross & Sufferings of Christ","Redemption","Christ Risen & Glorified"]},{"n":3,"t":"We rejoice in Thy salvation,\nBoasting in our Saviour God,\nWhile we gratefully remember\nAll the path which Thou hast trod.","th":["Redemption","Joy & Thanksgiving","Worship & Praise"]}],"w":{"Fellowship & Gathering":33,"Worship & Praise":67,"Joy & Thanksgiving":67,"God's Love for Us":33,"The Cross & Sufferings of Christ":33,"Redemption":67,"Christ Risen & Glorified":33}},
"299":{"m":"C.M.","a":"F. Rous","tn":"Crimond","tc":"J. S. Irvine (1836-1887)","fl":"The Lord's my Shepherd, I'll not want:","v":[{"n":1,"t":"The Lord's my Shepherd, I'll not want:\nHe makes me down to lie\nIn pastures green; He leadeth me\nThe quiet waters by.","th":["Rest & Peace","The Person of Christ","Assurance & Security"]},{"n":2,"t":"My soul He doth restore again:\nAnd me to walk doth make\nWithin the paths of righteousness,\nE'en for His own Name's sake.","th":["Rest & Peace","The Person of Christ"]},{"n":3,"t":"Yea, though I walk in death's dark vale,\nYet will I fear none ill:\nFor Thou art with me; and Thy rod\nAnd staff me comfort still.","th":["Assurance & Security","Trial & Conflict","Rest & Peace"]},{"n":4,"t":"My table Thou hast furnished\nIn presence of my foes;\nMy head Thou dost with oil anoint,\nAnd my cup overflows.","th":["Assurance & Security","God's Love for Us"]},{"n":5,"t":"Goodness and mercy all my life\nShall surely follow me;\nAnd in God's house for evermore\nMy dwelling-place shall be.","th":["God's Love for Us","Assurance & Security","Heaven & The Father's House"]}],"w":{"Rest & Peace":60,"The Person of Christ":40,"Assurance & Security":80,"Trial & Conflict":20,"God's Love for Us":40,"Heaven & The Father's House":20}},
"300":{"m":"10s. or 11s.","a":"C. Wesley (1707-1788)","tn":"Houghton","tc":"H. J. Gauntlett (1805-1876)","fl":"Ye servants of God, your Master proclaim,","v":[{"n":1,"t":"Ye servants of God, your Master proclaim,\nAnd publish abroad His wonderful name,\nThe name, all victorious, of Jesus extol,\nHis kingdom is glorious - He'll reign over all.","th":["Worship & Praise","The Person of Christ","The Eternal Kingdom / Reign of Christ","Service & Devotion"]},{"n":2,"t":"God ruleth on high, almighty to save,\nBut still He is nigh, His presence we have;\nThe great congregation His triumph shall sing,\nAscribing salvation to Jesus, their King.","th":["Worship & Praise","Redemption","The Person of Christ"]},{"n":3,"t":"Salvation to God, who sits on the throne,\nLet all shout aloud, and honour the Son!\nThe praises of Jesus God's saints will proclaim,\nAnd fall on their faces to worship the Lamb.","th":["Worship & Praise","The Lamb of God","Redemption"]}],"w":{"Worship & Praise":100,"The Person of Christ":67,"The Eternal Kingdom / Reign of Christ":33,"Service & Devotion":33,"Redemption":67,"The Lamb of God":33}},
"301":{"m":"10s. or 11s.","a":"Henry Francis Lyte (1793-1847)","tn":"Bury Thy Sorrow","tc":"Philip Paul Bliss (1838-1876)","fl":"Our rest is in heaven, our rest is not here:","v":[{"n":1,"t":"Our rest is in heaven, our rest is not here:\nThen why should we tremble when trials are near?\nBe hushed, our sad spirits, the worst that can come\nBut shortens the journey, and hastens us home.","th":["Heaven & The Father's House","Rest & Peace","Trial & Conflict","Pilgrimage / Desert Journey"]},{"n":2,"t":"It is not for us to be seeking our bliss,\nAnd building our hopes in a region like this:\nWe look for a city which hands have not piled,\nWe long for a country by sin undefiled.","th":["Heaven & The Father's House","Pilgrimage / Desert Journey","Separation from the World"]},{"n":3,"t":"The thorn and the thistle around us may grow -\nWe would not lie down, e'en on roses below:\nWe ask not our portion, we seek not a rest,\nTill in glory for ever with Christ we are blest.","th":["Pilgrimage / Desert Journey","Heaven & The Father's House","Trial & Conflict"]},{"n":4,"t":"Let trial and danger our progress oppose,\nThey'll only make heaven more sweet at the close;\nCome joy or come sorrow, whate'er may befall,\nA home with our God will repay us for all.","th":["Heaven & The Father's House","Trial & Conflict","Pilgrimage / Desert Journey"]},{"n":5,"t":"With a scrip on the back, and a staff in the hand,\nWe march on in haste through an enemy's land.\nThe road may be rough, but it cannot be long,\nLet us smooth it with hope, and cheer it with song.","th":["Pilgrimage / Desert Journey","Trial & Conflict"]}],"w":{"Heaven & The Father's House":80,"Rest & Peace":20,"Trial & Conflict":80,"Pilgrimage / Desert Journey":100,"Separation from the World":20}},
"302":{"m":"C.M.","a":"Mary Bowley (Mrs Peters) (1813-1856)","tn":"Manoah","tc":"G. Rossini (1792-1868)","fl":"O blessed Lord, what hast Thou done,","v":[{"n":1,"t":"O blessed Lord, what hast Thou done,\nHow vast a ransom given?\nThyself of God the eternal Son,\nThe Lord of earth and heaven.","th":["Redemption","The Person of Christ","God's Love for Us","The Father"]},{"n":2,"t":"Thy Father, in His gracious love,\nDid spare Thee from His side:\nAnd Thou didst stoop to bear above,\nAt such a cost, Thy bride.","th":["The Father","God's Love for Us","The Cross & Sufferings of Christ","The Church / Bride of Christ"]},{"n":3,"t":"Lord, while our souls in faith repose\nUpon Thy precious blood,\nPeace like an even river flows,\nAnd mercy, like a flood.","th":["The Precious Blood / Atonement","Rest & Peace","Assurance & Security"]},{"n":4,"t":"But boundless joy shall fill our hearts,\nWhen, gazing on Thy face,\nWe fully see what faith imparts,\nAnd glory crowns Thy grace.","th":["Joy & Thanksgiving","Heaven & The Father's House","Grace"]},{"n":5,"t":"Unseen, we love Thee; dear Thy name!\nBut when our eyes behold,\nWith joyful wonder we'll exclaim,\n\"The half had not been told.\"","th":["Joy & Thanksgiving","Our Love for The Son/Christ"]},{"n":6,"t":"For Thou exceedest all the fame\nOur ears have ever heard;\nHow happy we who know Thy name,\nAnd trust Thy faithful word!","th":["The Person of Christ","Worship & Praise","The Word of God"]}],"w":{"Redemption":17,"The Person of Christ":33,"God's Love for Us":33,"The Father":33,"The Cross & Sufferings of Christ":17,"The Church / Bride of Christ":17,"The Precious Blood / Atonement":17,"Rest & Peace":17,"Assurance & Security":17,"Joy & Thanksgiving":33,"Heaven & The Father's House":17,"Grace":17,"Our Love for The Son/Christ":17,"Worship & Praise":17,"The Word of God":17}},
"303":{"m":"C.M.","a":"John Newton (1725-1807)","tn":"Martyrdom","tc":"H. Wilson (1766-1824)","fl":"When Israel, by divine command,","v":[{"n":1,"t":"When Israel, by divine command,\nThe pathless desert trod,\nThey found, throughout the barren land,\nA sure resource in God.","th":["Pilgrimage / Desert Journey","Assurance & Security"]},{"n":2,"t":"A cloudy pillar marked the road,\nAnd screened them from the heat;\nFrom the hard rock the water flowed,\nAnd manna was their meat.","th":["Pilgrimage / Desert Journey"]},{"n":3,"t":"Like them, we have a rest in view,\nSecure from hostile powers:\nLike them, we pass a desert too,\nBut Israel's God is ours.","th":["Rest & Peace","Pilgrimage / Desert Journey","Assurance & Security"]},{"n":4,"t":"His word a light before us spreads,\nBy which our path we see;\nHis love, a banner o'er our heads,\nFrom harm preserves us free.","th":["The Word of God","God's Love for Us","Assurance & Security"]},{"n":5,"t":"Jesus, the Bread of life, is given\nTo be our daily food;\nWithin us dwells that spring from heaven,\nThe Spirit of our God.","th":["The Person of Christ","The Holy Spirit","Pilgrimage / Desert Journey"]},{"n":6,"t":"Lord, 'tis enough, we ask no more;\nThy grace around us pours\nIts rich and unexhausted store,\nAnd all its joy is ours.","th":["Grace","Joy & Thanksgiving","Worship & Praise"]}],"w":{"Pilgrimage / Desert Journey":67,"Assurance & Security":50,"Rest & Peace":17,"The Word of God":17,"God's Love for Us":17,"The Person of Christ":17,"The Holy Spirit":17,"Grace":17,"Joy & Thanksgiving":17,"Worship & Praise":17}},
"304":{"m":"8.7.","a":"Thomas Kelly (1769-1854)","tn":"Rathbun","tc":"I. Conkey (1815-1867)","fl":"Soon the saints in glory singing,","v":[{"n":1,"t":"Soon the saints in glory singing,\nWill with joy exalt the Lamb;\nAll in heaven their tribute bringing,\nRaising high the Saviour's name.","th":["Heaven & The Father's House","Worship & Praise","The Lamb of God"]},{"n":2,"t":"To us now the earnest's given;\nHere by grace these themes belong;\nLet us sing the song of heaven;\n'Tis our everlasting song.","th":["The Holy Spirit","Worship & Praise","Grace"]},{"n":3,"t":"See how God has now enthroned Him\nAt His own right hand in heaven;\nThere the heavenly hosts have owned Him\nLord, to whom all power is given.","th":["Christ Risen & Glorified","The Eternal Kingdom / Reign of Christ"]},{"n":4,"t":"Endless life in Him possessing,\nLet us praise His glorious name:\nGlory, honour, power, and blessing,\nBe for ever to the Lamb.","th":["Worship & Praise","The Lamb of God","Joy & Thanksgiving"]}],"w":{"Heaven & The Father's House":25,"Worship & Praise":75,"The Lamb of God":50,"The Holy Spirit":25,"Grace":25,"Christ Risen & Glorified":25,"The Eternal Kingdom / Reign of Christ":25,"Joy & Thanksgiving":25}},
"305":{"m":"L.M.","a":"William J. Hocking (1864-1953)","tn":"Arizona","tc":"R. H. Earnshaw","fl":"Our God and Father unto Thee","v":[{"n":1,"t":"Our God and Father unto Thee\nAs pilgrims weak we now draw near\nTo breathe our prayers on bended knee,\nAnd supplicate Thy gracious ear.","th":["The Father","Pilgrimage / Desert Journey","Worship & Praise"]},{"n":2,"t":"In former days Thou oft hast heard\nAnd amply answered in Thy grace;\nBy those rich bounties deeply stirred\nWe bless Thy name and seek Thy face.","th":["Grace","Worship & Praise","Joy & Thanksgiving"]},{"n":3,"t":"Though granted much, we still need more,\nFor some are weak and some have grief;\nSupply us all from Thy rich store\nWith grace and strength and glad relief.","th":["Grace","Trial & Conflict"]},{"n":4,"t":"Our prayers we bring in that great name,\nThe name Thou gavest to Thy Son;\nIn Jesus' name we mercy claim,\nAnd humbly say, \"Thy will be done.\"","th":["The Person of Christ","The Father"]}],"w":{"The Father":50,"Pilgrimage / Desert Journey":25,"Worship & Praise":50,"Grace":50,"Joy & Thanksgiving":25,"Trial & Conflict":25,"The Person of Christ":25}},
"306":{"m":"8.7.8.7.D","a":"Joseph Medicott Scriven (1819-1886)","tn":"Converse","tc":"C. C. Converse (1832-1918)","fl":"What a Friend we have in Jesus","v":[{"n":1,"t":"What a Friend we have in Jesus\nAll our sins and griefs to bear!\nWhat a privilege to carry\nEverything to God in prayer!\nOh, what peace we often forfeit!\nOh, what needless pain we bear!\nAll because we do not carry\nEverything to God in prayer.","th":["The Person of Christ","Rest & Peace","Forgiveness of Sins","Trial & Conflict"]},{"n":2,"t":"Have we trials and temptations?\nIs there trouble anywhere?\nWe should never be discouraged;\nTake it to the Lord in prayer.\nCan we find a friend so faithful\nWho will all our sorrows share?\nJesus knows our every weakness;\nTake it to the Lord in prayer.","th":["Trial & Conflict","The Person of Christ","Rest & Peace"]},{"n":3,"t":"Are we weak and heavy-laden,\nCumbered with a load of care?\nPrecious Saviour, still our refuge -\nTake it to the Lord in prayer;\nDo thy friends despise, forsake thee?\nTake it to the Lord in prayer;\nIn His arms He'll take and shield thee,\nThou wilt find a solace there.","th":["The Person of Christ","Rest & Peace","Trial & Conflict","Assurance & Security"]}],"w":{"The Person of Christ":100,"Rest & Peace":100,"Forgiveness of Sins":33,"Trial & Conflict":100,"Assurance & Security":33}},
"307":{"m":"7s.","a":"Anna Dober (1713-1739)","tn":"Hendon","tc":"Henri Abraham Cesar Malan (1787-1864)","fl":"Poor and feeble though we be,","v":[{"n":1,"t":"Poor and feeble though we be,\nSaviour, we belong to Thee;\nThine we are, Thou Son of God,\nThine, the purchase of Thy blood.","th":["The Precious Blood / Atonement","The Person of Christ","Redemption"]},{"n":2,"t":"Boundless wisdom, power divine\nLove unspeakable, are Thine;\nPraise by all to Thee be given,\nSon of God, and Heir of Heaven !","th":["Worship & Praise","The Person of Christ","God's Love for Us"]}],"w":{"The Precious Blood / Atonement":50,"The Person of Christ":100,"Redemption":50,"Worship & Praise":50,"God's Love for Us":50}},
"308":{"m":"8.7.8.7.","a":"Miss Ora Rowan (1834-1879)","tn":"Sunset","tc":"G. C. Stebbins (1846-1945)","fl":"Hast thou heard Him, seen Him, known Him?","v":[{"n":1,"t":"Hast thou heard Him, seen Him, known Him?\nIs not thine a captured heart?\nChief among ten thousand own Him,\nJoyful choose the better part.","th":["The Person of Christ","Our Love for The Son/Christ"]},{"n":2,"t":"Idols once they won thee, charmed thee,\nLovely things of time and sense;\nGilded thus does sin disarm thee,\nHoneyed lest thou turn thee thence.","th":["Separation from the World"]},{"n":3,"t":"What has stripped the seeming beauty\nFrom the idols of the earth?\nNot a sense of right or duty,\nBut the sight of peerless worth.","th":["The Person of Christ","Separation from the World"]},{"n":4,"t":"Not the crushing of those idols,\nWith its bitter void and smart;\nBut the beaming of His beauty,\nThe unveiling of His heart.","th":["The Person of Christ","God's Love for Us"]},{"n":5,"t":"Who extinguishes their taper\nTill they hail the rising sun?\nWho discards the garb of winter\nTill the summer has begun?","th":["The Person of Christ"]},{"n":6,"t":"'Tis the look that melted Peter,\n'Tis the face that Stephen saw,\n'Tis the heart that wept with Mary,\nCan alone from idols draw:","th":["The Person of Christ","God's Love for Us"]},{"n":7,"t":"Draw and win and fill completely,\nTill the cup o'erflow the brim;\nWhat have we to do with idols\nWho have companied with Him?","th":["Separation from the World","The Person of Christ","Our Love for The Son/Christ"]}],"w":{"The Person of Christ":86,"Our Love for The Son/Christ":29,"Separation from the World":43,"God's Love for Us":29}},
"309":{"m":"L.M.","a":"Samuel Medley (1738-1799)","tn":"Walton","tc":"Ludwig Van Beethoven (1770-1827)","fl":"Saviour, before Thy face we fall,","v":[{"n":1,"t":"Saviour, before Thy face we fall,\nOur Lord, our life, our hope, our all;\nFor we have nowhere else to flee,\nNo sanctuary, Lord, but Thee.","th":["The Person of Christ","Assurance & Security"]},{"n":2,"t":"In Thee we every glory view\nOf safety, strength and beauty too\n'Tis all our rest and peace to see\nOur sanctuary, Lord, in Thee.","th":["Rest & Peace","Assurance & Security","The Person of Christ"]},{"n":3,"t":"Whatever foes or fears betide,\nIn Thy blest presence let us hide;\nAnd while we rest our souls on Thee,\nThou shalt our sanctuary be.","th":["Assurance & Security","Trial & Conflict"]},{"n":4,"t":"Through time, with all its changing scenes\nAnd all the grief that intervenes,\nLet this support each fainting heart,\nThat Thou our sanctuary art.","th":["Pilgrimage / Desert Journey","Trial & Conflict","Assurance & Security"]}],"w":{"The Person of Christ":50,"Assurance & Security":100,"Rest & Peace":25,"Trial & Conflict":50,"Pilgrimage / Desert Journey":25}},
"310":{"m":"8.7.","a":"Charles Andrew Coates (1862-1945)","tn":"Wycliff","tc":"J. Stainer (1840-1901)","fl":"Son of God, in heaven we view Thee","v":[{"n":1,"t":"Son of God, in heaven we view Thee\nOf God's love the Object meet;\nWhile, Lord Jesus Christ, 'tis through Thee\nAll our blessing is complete.","th":["The Person of Christ","God's Love for Us","Christ Risen & Glorified"]},{"n":2,"t":"As Thy brethren we surround Thee,\nFirstborn of a heavenly race;\nHe who has with glory crowned Thee\nCalled us to this bless\u00e8d place.","th":["Sonship & Adoption","Christ Risen & Glorified"]},{"n":3,"t":"From the triumph and the glory\nOf Thy rest in love divine,\nComes to us the wondrous story,\nHow God's purpose made us Thine;","th":["God's Love for Us","The Father"]},{"n":4,"t":"How by dying Thou hast freed us\nFrom the man of sin and shame,\nThat, unhindered, Thou might'st lead us\nNow to know Thy Father's name.","th":["Redemption","The Cross & Sufferings of Christ","Sonship & Adoption","The Father"]},{"n":5,"t":"And responsive to Thy longing,\nWe would now abide in love;\nKnow Thy joy, as those belonging\nTo Thyself in heaven above.","th":["God's Love for Us","Heaven & The Father's House","Our Love for The Son/Christ"]}],"w":{"The Person of Christ":20,"God's Love for Us":60,"Christ Risen & Glorified":40,"Sonship & Adoption":40,"The Father":40,"Redemption":20,"The Cross & Sufferings of Christ":20,"Heaven & The Father's House":20,"Our Love for The Son/Christ":20}},
"311":{"m":"8.5.8.3.","a":"Inglis Fleming (1859-1955)","tn":"Stephanos","tc":"H. W. Baker (1821-1877)","fl":"Thee we praise, our God and Father,","v":[{"n":1,"t":"Thee we praise, our God and Father,\nThou Thy love hast shown;\nEre the world was, Thou didst choose us\nFor Thine own.","th":["Worship & Praise","The Father","God's Love for Us"]},{"n":2,"t":"Thou Thine only Son hast given,\nThou art glorified,\nFor in love to bring us near Thee,\nHe has died.","th":["The Cross & Sufferings of Christ","The Father","God's Love for Us"]},{"n":3,"t":"By the Holy Ghost indwelling\nWe with Christ have part,\nFather, we Thy children call Thee,\nFrom our heart.","th":["The Holy Spirit","Sonship & Adoption","The Father"]},{"n":4,"t":"Love divine, our present portion,\nHeaven's choicest store,\nThee we worship, God and Father,\nThee adore.","th":["God's Love for Us","Worship & Praise","The Father"]},{"n":5,"t":"Soon in Thine own house around Thee\nStill our praise shall swell,\nSons before Thee ever joying\nWe shall dwell.","th":["Heaven & The Father's House","Sonship & Adoption","Worship & Praise"]},{"n":6,"t":"For His praise who glorified Thee,\nWe like Him shall be,\nFirstborn among many brethren\nPraising Thee.","th":["Christ Risen & Glorified","Sonship & Adoption","Worship & Praise"]}],"w":{"Worship & Praise":67,"The Father":67,"God's Love for Us":50,"The Cross & Sufferings of Christ":17,"The Holy Spirit":17,"Sonship & Adoption":50,"Heaven & The Father's House":17,"Christ Risen & Glorified":17}},
"312":{"m":"S.M.","a":"Thomas Kelly (1769-1854)","tn":"St. Michael","tc":"L. Bourgeois, c. 1510- c. 1561","fl":"Lead on, Almighty Lord,","v":[{"n":1,"t":"Lead on, Almighty Lord,\nLead on to victory:\nEncouraged by Thy bless\u00e8d word,\nWith joy we follow Thee.","th":["The Person of Christ","The Word of God","Joy & Thanksgiving"]},{"n":2,"t":"We follow Thee, our Guide,\nWho didst salvation bring:\nWe follow Thee, through grace supplied\nFrom heaven's eternal spring:","th":["Pilgrimage / Desert Journey","Grace","Redemption"]},{"n":3,"t":"Till of the prize possessed,\nWe hear of war no more,\nAnd, Oh, sweet thought! for ever rest\nOn yonder peaceful shore.","th":["Rest & Peace","Heaven & The Father's House"]}],"w":{"The Person of Christ":33,"The Word of God":33,"Joy & Thanksgiving":33,"Pilgrimage / Desert Journey":33,"Grace":33,"Redemption":33,"Rest & Peace":33,"Heaven & The Father's House":33}},
"313":{"m":"8.7.8.7. Double","a":"James Grindley Small (1817-1888)","tn":"Friend","tc":"G. C. Stebbins (1846-1945)","fl":"I've found a Friend, oh, such a Friend!","v":[{"n":1,"t":"I've found a Friend, oh, such a Friend!\nHe loved me ere I knew Him,\nHe drew me with the cords of love,\nAnd thus He bound me to Him;\nAnd round my heart still closely twine\nThose ties which nought can sever,\nFor I am His, and He is mine,\nFor ever and for ever.","th":["God's Love for Us","The Person of Christ","Assurance & Security"]},{"n":2,"t":"I've found a Friend, oh, such a friend!\nHe bled, He died to save me;\nAnd not alone the gift of life,\nBut His own self He gave me.\nNought that I have my own I call,\nI hold it for the Giver:\nMy heart, my strength, my life, my all,\nAre His, and His for ever.","th":["The Precious Blood / Atonement","The Cross & Sufferings of Christ","Service & Devotion"]},{"n":3,"t":"I've found a Friend, oh, such a Friend!\nAll power to Him is given\nTo guard me on my onward course,\nAnd bring me safe to heaven.\nTh' eternal glories gleam afar\nTo nerve my faint endeavour:\nSo now to watch! to work! to war!\nAnd then - to rest for ever!","th":["Assurance & Security","Heaven & The Father's House","Service & Devotion","Pilgrimage / Desert Journey"]},{"n":4,"t":"I've found a Friend, oh, such a Friend!\nSo kind and true and tender,\nSo wise a Counsellor and Guide,\nSo mighty a Defender!\nFrom Him, who loves me now so well,\nWhat power my soul can sever?\nShall life, or death, or earth, or hell?\nNo; I am His for ever.","th":["The Person of Christ","Assurance & Security","God's Love for Us"]}],"w":{"God's Love for Us":50,"The Person of Christ":50,"Assurance & Security":75,"The Precious Blood / Atonement":25,"The Cross & Sufferings of Christ":25,"Service & Devotion":50,"Heaven & The Father's House":25,"Pilgrimage / Desert Journey":25}},
"314":{"m":"10s.","a":"John Nelson Darby (1800-1882)","tn":"O Perfect Love","tc":"J. Barnby (1838-1896)","fl":"Lord, to our souls Thy light is ever pure,","v":[{"n":1,"t":"Lord, to our souls Thy light is ever pure,\nAnd brings from heaven what Thou alone canst give.\nYea, brings Thyself, the revelation sure\nOf heaven's eternal bliss: in Thee we live.","th":["The Person of Christ","Heaven & The Father's House"]},{"n":2,"t":"We bless Thee, Lord! Of Thee our song shall speak -\nPoor and unworthy strains, yet still of Thee.\nCome, fill our souls! This only would we seek,\nTo dwell in love, and God our dwelling be.","th":["Worship & Praise","God's Love for Us","Our Love for The Father","Our Love for The Son/Christ"]},{"n":3,"t":"Be Thou with us! Let no distracting thought\nIntrude to hide from us that heavenly light.\nBe Thou our strength! Let not what Thou hast brought\nBe chased by idle nature's poor delight.","th":["The Person of Christ"]},{"n":4,"t":"Be Thou our all! Thy love can fill the soul -\nThat love that soars beyond all creature thought;\nIn spirit bring where endless praises roll,\nAnd fill our longing hearts till there we're brought.","th":["God's Love for Us","Worship & Praise","Heaven & The Father's House"]}],"w":{"The Person of Christ":50,"Heaven & The Father's House":50,"Worship & Praise":50,"God's Love for Us":50,"Our Love for The Father":25,"Our Love for The Son/Christ":25}},
"315":{"m":"6.6.6.6.8.8.","a":"C. Wesley (1707-1788)","tn":"Darwall","tc":"J. Darwall (1731-1789)","fl":"Jesus, life-giving sound,","v":[{"n":1,"t":"Jesus, life-giving sound,\nThe joy of earth and heaven!\nNo other help is found,\nNo other name is given,\nIn which the sons of men can boast,\nBut His who seeks and saves the lost.","th":["The Person of Christ","Redemption","Joy & Thanksgiving"]},{"n":2,"t":"His name the sinner hears,\nAnd is from guilt set free;\n'Tis music in his ears,\n'Tis life and victory:\nHis heart o'erflows with sacred joy,\nAnd songs of praise his lips employ.","th":["Forgiveness of Sins","Joy & Thanksgiving","Worship & Praise"]},{"n":3,"t":"Jesus, all praise above!\nWe sing Thy bless\u00e8d name,\nWe sing Thy dying love,\nThy rising power proclaim:\nBut soon to give Thee worthy praise,\nBoth heaven and earth their songs shall raise.","th":["Worship & Praise","The Cross & Sufferings of Christ","Christ Risen & Glorified"]}],"w":{"The Person of Christ":33,"Redemption":33,"Joy & Thanksgiving":67,"Forgiveness of Sins":33,"Worship & Praise":67,"The Cross & Sufferings of Christ":33,"Christ Risen & Glorified":33}},
"316":{"m":"6.6.8.4.","a":"Mary Bowley (Mrs Peters) (1813-1856)","tn":"Priory","tc":"Anonymous","fl":"We are by Christ redeemed:","v":[{"n":1,"t":"We are by Christ redeemed:\nThe cost - His precious blood;\nBe nothing by our souls esteemed\nLike this great good.\nWere the vast world our own,\nWith all its varied store,\nAnd Thou, Lord Jesus, wert unknown,\nWe still were poor.","th":["Redemption","The Precious Blood / Atonement","The Person of Christ"]},{"n":2,"t":"Our earthen vessels break;\nThe world itself grows old;\nBut Christ our precious dust will take,\nAnd freshly mould:\nHe'll give these bodies vile\nA fashion like His own;\nHe'll bid the whole creation smile,\nAnd hush its groan.","th":["Christ Risen & Glorified","New Creation"]},{"n":3,"t":"Thus far, by grace preserved,\nEach moment speeds us on;\nThe crown and kingdom are reserved\nWhere Christ is gone.\nWhen cloudless morning shines,\nWe shall His glory share;\nIn pleasant places are the lines;\nThe home how fair!","th":["Grace","Heaven & The Father's House","The Eternal Kingdom / Reign of Christ","Assurance & Security"]},{"n":4,"t":"To Him our weakness clings\nThrough tribulation sore,\nAnd seeks the covert of His wings\nTill all be o'er.\nAnd when we've run the race,\nAnd fought the faithful fight,\nWe then shall see Him face to face,\nWith saints in light.","th":["Trial & Conflict","Assurance & Security","Heaven & The Father's House"]}],"w":{"Redemption":25,"The Precious Blood / Atonement":25,"The Person of Christ":25,"Christ Risen & Glorified":25,"New Creation":25,"Grace":25,"Heaven & The Father's House":50,"The Eternal Kingdom / Reign of Christ":25,"Assurance & Security":50,"Trial & Conflict":25}},
"317":{"m":"L.M.","a":"Thomas Kelly (1769-1854)","tn":"Wareham","tc":"W. Knapp (1698-1768)","fl":"How pleasant is the sound of praise!","v":[{"n":1,"t":"How pleasant is the sound of praise!\nIt well becomes the saints of God:\nShould we refuse our songs to raise,\nThe stones might tell our shame abroad.","th":["Worship & Praise"]},{"n":2,"t":"For Him who washed us in His blood,\nLet us our sweetest songs prepare;\nHe sought us wandering far from God,\nAnd now preserves us by His care.","th":["The Precious Blood / Atonement","Worship & Praise","Redemption"]},{"n":3,"t":"One string there is of sweetest tone,\nReserved for sinners saved by grace;\n'Tis sacred to one class alone,\nAnd touched by one peculiar race.","th":["Grace","Redemption"]},{"n":4,"t":"Though angels may with rapture see\nHow mercy flows in Jesus' blood,\nIt is not theirs to prove, as we,\nThe cleansing virtue of this flood.","th":["The Precious Blood / Atonement","Grace"]},{"n":5,"t":"Lord, we adore the wondrous love\nWhich brought Thee here to bleed and die;\nSoon shall we meet in heaven above,\nAnd sing Thy praises in the sky.","th":["Worship & Praise","God's Love for Us","The Cross & Sufferings of Christ","Heaven & The Father's House"]}],"w":{"Worship & Praise":60,"The Precious Blood / Atonement":40,"Redemption":40,"Grace":40,"God's Love for Us":20,"The Cross & Sufferings of Christ":20,"Heaven & The Father's House":20}},
"318":{"m":"7.6.","a":"James George Deck (1802-1884)","tn":"Petition","tc":"Franz Joseph Haydn (1732-1809)","fl":"O Lamb of God, still keep us","v":[{"n":1,"t":"O Lamb of God, still keep us\nClose to Thy pierced side;\n'Tis only there in safety\nAnd peace we can abide;\nWith foes and snares around us,\nAnd lusts and fears within;\nThe grace that sought and found us,\nAlone can keep us clean.","th":["The Lamb of God","Assurance & Security","Grace","Trial & Conflict"]},{"n":2,"t":"'Tis only in Thee hiding\nWe feel ourselves secure;\nOnly in Thee abiding,\nThe conflict can endure:\nThine arm the victory gaineth\nO'er every hateful foe;\nThy love our hearts sustaineth\nIn all their cares and woe.","th":["Assurance & Security","Trial & Conflict","God's Love for Us"]},{"n":3,"t":"Soon shall our eyes behold Thee\nWith rapture face to face;\nAnd, resting there in glory,\nWe'll sing Thy power and grace:\nThy beauty, Lord, and glory,\nThe wonders of Thy love,\nShall be the endless story\nOf all Thy saints above.","th":["Heaven & The Father's House","Worship & Praise","God's Love for Us","Grace","The Lord's Coming / Rapture"]}],"w":{"The Lamb of God":33,"Assurance & Security":67,"Grace":67,"Trial & Conflict":67,"God's Love for Us":67,"Heaven & The Father's House":33,"Worship & Praise":33,"The Lord's Coming / Rapture":33}},
"319":{"m":"7.6.","a":"Horatius Bonar (1808-1889)","tn":"Fulness","tc":"W. Brockhaus (1819-1888)","fl":"Our sins were borne by Jesus,","v":[{"n":1,"t":"Our sins were borne by Jesus,\nThe holy Lamb of God:\nHe took them all, and freed us\nFrom that condemning load.\nOur guilt was borne by Jesus,\nWho washed the crimson stains\nWhite in His blood most precious,\nTill not a spot remains.","th":["The Lamb of God","The Precious Blood / Atonement","Forgiveness of Sins"]},{"n":2,"t":"Our wants are known to Jesus;\nAll fulness dwells in Him:\nHe healeth all diseases,\nWho did our souls redeem.\nWe tell our griefs to Jesus,\nOur burdens and our cares;\nHe from them all releases,\nWho all our sorrow shares.","th":["The Person of Christ","Redemption","Trial & Conflict"]},{"n":3,"t":"We love the name of Jesus,\nThe Christ of God, the Lord;\nLike fragrance on the breezes,\nHis name is spread abroad.\nWe long to be with Jesus,\nWith all the ransomed throng,\nFor ever sing His praises,\nThe one eternal song.","th":["Worship & Praise","Heaven & The Father's House","Redemption","Our Love for The Son/Christ"]}],"w":{"The Lamb of God":33,"The Precious Blood / Atonement":33,"Forgiveness of Sins":33,"The Person of Christ":33,"Redemption":67,"Trial & Conflict":33,"Worship & Praise":33,"Heaven & The Father's House":33,"Our Love for The Son/Christ":33}},
"320":{"m":"C.M.","a":"William Trotter (1818-1865)","tn":"Ignatius","tc":"J. H. Lester, c. 1850","fl":"Farewell to this world's fleeting joys,","v":[{"n":1,"t":"Farewell to this world's fleeting joys,\nOur home is not below;\nThere was no home for Jesus here,\nAnd 'tis to Him we go,","th":["Separation from the World","Heaven & The Father's House","The Person of Christ"]},{"n":2,"t":"To Him in yonder home of love,\nWhere He has gone before,\nThe home He changed for Calvary's cross,\nWhere all our sins He bore.","th":["Heaven & The Father's House","The Cross & Sufferings of Christ","God's Love for Us"]},{"n":3,"t":"He bore our sins that we might be\nHis partners on the throne,\nThe throne He'll shortly share with those\nFor whom He did atone.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","The Eternal Kingdom / Reign of Christ"]},{"n":4,"t":"Up to our Father's house we go,\nTo that sweet home of love:\nMany the mansions that are found,\nWhere Jesus dwells above!","th":["Heaven & The Father's House","The Father","God's Love for Us"]},{"n":5,"t":"And He who left that home above,\nTo be a sufferer here,\nHas left this world again, for us\nA mansion to prepare.","th":["Heaven & The Father's House","The Cross & Sufferings of Christ","God's Love for Us"]},{"n":6,"t":"To all His ransomed ones He'll give,\n(To us amongst the rest)\nWith Him to dwell, with Him to reign,\nWith Him for ever blest.","th":["Redemption","The Eternal Kingdom / Reign of Christ","Heaven & The Father's House"]},{"n":7,"t":"Farewell, farewell, poor faithless world,\nWith all thy boasted store;\nWe'd not have joy where He had woe -\nBe rich where He was poor.","th":["Separation from the World","The Cross & Sufferings of Christ"]}],"w":{"Separation from the World":29,"Heaven & The Father's House":71,"The Person of Christ":14,"The Cross & Sufferings of Christ":57,"God's Love for Us":43,"The Precious Blood / Atonement":14,"The Eternal Kingdom / Reign of Christ":29,"The Father":14,"Redemption":14}},
"321":{"m":"C.M.","a":"William Trotter (1818-1865)","tn":"Manoah","tc":"G. Rossini (1792-1868)","fl":"Behold the Lamb, whose precious blood","v":[{"n":1,"t":"Behold the Lamb, whose precious blood\nDrawn from His riven side,\nHad power to make our peace with God,\nNor lets one spot abide.","th":["The Lamb of God","The Precious Blood / Atonement","Rest & Peace"]},{"n":2,"t":"The dying thief beheld that Lamb\nExpiring by his side,\nAnd proved the value of the Name\nOf Jesus crucified.","th":["The Cross & Sufferings of Christ","The Lamb of God"]},{"n":3,"t":"His soul, by virtue of the blood,\nTo paradise received,\nRedemption's earliest trophy stood,\nFrom sin and death retrieved.","th":["Redemption","The Precious Blood / Atonement"]},{"n":4,"t":"We, too, the cleansing power have known\nOf Christ's atoning blood,\nBy grace have learnt His name to own,\nBy which we're brought to God.","th":["The Precious Blood / Atonement","Grace","Redemption"]},{"n":5,"t":"To Him, then, let our songs ascend,\nWho stooped in grace so low:\nTo Christ, the Lamb, the sinner's Friend,\nLet ceaseless praises flow.","th":["Worship & Praise","Grace","The Lamb of God"]}],"w":{"The Lamb of God":60,"The Precious Blood / Atonement":60,"Rest & Peace":20,"The Cross & Sufferings of Christ":20,"Redemption":40,"Grace":40,"Worship & Praise":20}},
"322":{"m":"C.M.","a":"William Cowper (1731-1800)","tn":"Fountain","tc":"H. E. Gebhardt (1832-1899)","fl":"There is a stream of precious blood","v":[{"n":1,"t":"There is a stream of precious blood\nWhich flowed from Jesus' veins;\nAnd sinners washed in that blest flood\nLose all their guilty stains.","th":["The Precious Blood / Atonement","Forgiveness of Sins"]},{"n":2,"t":"The dying thief rejoiced to see\nThat Saviour in his day;\nAnd by that blood, though vile as he,\nMy sins are washed away.","th":["The Precious Blood / Atonement","Forgiveness of Sins"]},{"n":3,"t":"Blest Lamb of God, Thy precious blood\nShall never lose its power,\nTill every ransomed saint of God\nBe saved to sin no more.","th":["The Lamb of God","The Precious Blood / Atonement","Redemption"]},{"n":4,"t":"E'er since by faith I saw the stream\nThy wounds supplied for me,\nRedeeming love has been my theme,\nAnd shall for ever be.","th":["The Precious Blood / Atonement","Redemption","God's Love for Us"]},{"n":5,"t":"Soon in a nobler, sweeter song,\nI'll sing Thy power to save;\nNo more with lisping, stammering tongue,\nBut conqueror o'er the grave.","th":["Heaven & The Father's House","Worship & Praise"]},{"n":6,"t":"Lord, I believe Thou hast prepared,\nUnworthy though I be,\nFor me a blood-bought free reward,\nA harp of God for me.","th":["The Precious Blood / Atonement","Heaven & The Father's House"]},{"n":7,"t":"'Tis strung and tuned for endless years,\nAnd formed by power divine,\nTo sound in God the Father's ears\nNo other name but Thine.","th":["Worship & Praise","The Father","The Person of Christ"]}],"w":{"The Precious Blood / Atonement":71,"Forgiveness of Sins":29,"The Lamb of God":14,"Redemption":29,"God's Love for Us":14,"Heaven & The Father's House":29,"Worship & Praise":29,"The Father":14,"The Person of Christ":14}},
"323":{"m":"S.M.","a":"James Montgomery (1771-1854)","tn":"Festal Song","tc":"W. H. Walter (1825-1893)","fl":"The Lord Himself shall come","v":[{"n":1,"t":"The Lord Himself shall come\nAnd shout a quickening word;\nThousands shall answer from the tomb;\n\"For ever with the Lord\".","th":["The Lord's Coming / Rapture","Christ Risen & Glorified"]},{"n":2,"t":"Then as we upward fly,\nThat resurrection-word\nShall be our shout of victory:\n\"For ever with the Lord\".","th":["The Lord's Coming / Rapture"]},{"n":3,"t":"How shall we meet those eyes?\nOurs on Himself we'll cast,\nAnd own ourselves the Saviour's prize,\nMercy from first to last.","th":["The Lord's Coming / Rapture","Grace"]},{"n":4,"t":"There with unwearied gaze\nOur eyes on Him we'll rest,\nAnd satisfy with endless praise\nOur hearts supremely blest.","th":["Heaven & The Father's House","Worship & Praise","Rest & Peace"]},{"n":5,"t":"Knowing as we are known,\nHow shall we love that word!\nHow oft repeat before the throne,\n\"For ever with the Lord!\"","th":["Heaven & The Father's House","The Lord's Coming / Rapture"]},{"n":6,"t":"That resurrection-word,\nThat shout of victory !\nOnce more \"For ever with the Lord,\"\nAmen, so let it be.","th":["The Lord's Coming / Rapture"]}],"w":{"The Lord's Coming / Rapture":83,"Christ Risen & Glorified":17,"Grace":17,"Heaven & The Father's House":33,"Worship & Praise":17,"Rest & Peace":17}},
"324":{"m":"4.6.8.8.4.","a":"G. Jeckyll,","tn":"Come","tc":"G. Tremblay","fl":"Lord Jesus, come,","v":[{"n":1,"t":"Lord Jesus, come,\nNor let us longer roam\nAfar from Thee, and that bright place\nWhere we shall see Thee face to face;\nLord Jesus, come.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","Our Love for The Son/Christ"]},{"n":2,"t":"Lord Jesus, come,\nThine absence here we mourn;\nNo joy we know apart from Thee,\nNo sorrow in Thy presence see;\nLord Jesus, come.","th":["The Lord's Coming / Rapture","Our Love for The Son/Christ"]},{"n":3,"t":"Lord Jesus, come,\nAnd claim us as Thine own;\nWith longing hearts the path we tread,\nWhich Thee to heavenly glory led;\nCome, Saviour, come.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","Pilgrimage / Desert Journey"]},{"n":4,"t":"Lord Jesus, come,\nAnd take Thy people home;\nThat all Thy flock, so scattered here,\nWith Thee in glory may appear;\nLord Jesus, come.","th":["The Lord's Coming / Rapture","The Church / Bride of Christ","Heaven & The Father's House"]}],"w":{"The Lord's Coming / Rapture":100,"Heaven & The Father's House":75,"Our Love for The Son/Christ":50,"Pilgrimage / Desert Journey":25,"The Church / Bride of Christ":25}},
"325":{"m":"8.7.8.7.8.7.7.","a":"Philip Freidrich Hiller (1699-1769)","tn":"Jena","tc":"S. Gastorius (1646-1682)","fl":"We wait for Thee, O Son of God,","v":[{"n":1,"t":"We wait for Thee, O Son of God,\nAnd long for Thine appearing;\n\"A little while\" - Thou'lt come, O Lord,\nThy waiting people cheering.\nThus hast Thou said: we lift the head\nIn joyful expectation,\nFor Thou wilt bring salvation.","th":["The Lord's Coming / Rapture","Joy & Thanksgiving"]},{"n":2,"t":"We wait for Thee, content to share\nIn patience, days of trial;\nSo meekly Thou the cross didst bear,\nOur sin, reproach, denial.\nHow should not we receive with Thee\nThe cup of shame and sorrow,\nUntil the promised morrow?","th":["Trial & Conflict","The Cross & Sufferings of Christ","Pilgrimage / Desert Journey"]},{"n":3,"t":"We wait for Thee, for Thou, e'en here,\nHast won our hearts' affection;\nIn spirit still we find Thee near,\nOur solace and protection.\nIn cloudless light and glory bright\nWe soon with joy shall greet Thee,\nAnd in the air shall meet Thee.","th":["Assurance & Security","The Lord's Coming / Rapture","Our Love for The Son/Christ"]},{"n":4,"t":"We wait for Thee; Thou wilt arise\nWhilst hope her watch is keeping;\nForgotten then, in glad surprise,\nShall be our years of weeping.\nOur hearts beat high, the dawn is nigh\nThat ends our pilgrim story\nIn Thine eternal glory.","th":["The Lord's Coming / Rapture","Pilgrimage / Desert Journey","Heaven & The Father's House"]}],"w":{"The Lord's Coming / Rapture":75,"Joy & Thanksgiving":25,"Trial & Conflict":25,"The Cross & Sufferings of Christ":25,"Pilgrimage / Desert Journey":50,"Assurance & Security":25,"Our Love for The Son/Christ":25,"Heaven & The Father's House":25}},
"326":{"m":"8s.","a":"Augustus Montague Toplady (1740-1778)","tn":"De Fleury","tc":"Anonymous","fl":"As debtors to mercy alone,","v":[{"n":1,"t":"As debtors to mercy alone,\nOf heavenly mercy we sing;\nNor fear to draw near to the throne,\nOur praise and our worship to bring:\nThe wrath of a sin-hating God\nWith us can have nothing to do;\nThe Saviour's obedience and blood\nHide all our transgressions from view.","th":["Grace","Worship & Praise","The Precious Blood / Atonement","Assurance & Security"]},{"n":2,"t":"The work which His goodness began,\nThe arm of His strength will complete:\nHis promise is Yea and Amen,\nAnd never was forfeited yet:\nThings future, nor things that are now,\nNor all things below nor above,\nCan make Him His purpose forgo,\nOr sever our souls from His love.","th":["Assurance & Security","God's Love for Us"]},{"n":3,"t":"Our names from the palms of His hands\nEternity will not erase:\nImpressed on His heart they remain\nIn marks of indelible grace:\nAnd we to the end shall endure,\nAs sure as the earnest is given;\nMore happy, but not more secure,\nThe spirits departed to heaven.","th":["Assurance & Security","Grace","Heaven & The Father's House"]}],"w":{"Grace":67,"Worship & Praise":33,"The Precious Blood / Atonement":33,"Assurance & Security":100,"God's Love for Us":33,"Heaven & The Father's House":33}},
"327":{"m":"C.M.","a":"James George Deck (1802-1884)","tn":"Richmond","tc":"Thomas Haweis (1732-1820)","fl":"Lord Jesus, are we one with Thee?","v":[{"n":1,"t":"Lord Jesus, are we one with Thee?\nOh height, oh depth, of love!\nOnce slain for us upon the tree,\nWe're one with Thee above.","th":["God's Love for Us","The Cross & Sufferings of Christ"]},{"n":2,"t":"Such was Thy grace, that for our sake\nThou didst from heaven come down;\nWith us of flesh and blood partake,\nAnd make our woes Thine own.","th":["God's Love for Us","The Person of Christ","Grace"]},{"n":3,"t":"Our sins, our guilt, in love divine,\nConfessed and borne by Thee;\nThe gall, the curse, the wrath were Thine,\nTo set Thy ransomed free.","th":["Forgiveness of Sins","The Cross & Sufferings of Christ","Redemption","God's Love for Us"]},{"n":4,"t":"Ascended now in glory bright,\nLife-giving Head Thou art;\nNor life, nor death, nor depth, nor height,\nThy saints and Thee can part.","th":["Christ Risen & Glorified","Assurance & Security"]},{"n":5,"t":"Soon, soon shall come that glorious day,\nWhen, seated on Thy throne,\nThou shalt to wondering worlds display\nThat we with Thee are one.","th":["The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ"]}],"w":{"God's Love for Us":60,"The Cross & Sufferings of Christ":40,"The Person of Christ":20,"Grace":20,"Forgiveness of Sins":20,"Redemption":20,"Christ Risen & Glorified":20,"Assurance & Security":20,"The Lord's Coming / Rapture":20,"The Eternal Kingdom / Reign of Christ":20}},
"328":{"m":"7.6.","a":"P. W. Dolton","tn":"Dedekam","tc":"Sophie H. Dedekam (1820-1894)","fl":"O Jesus, Lord, we love Thee,","v":[{"n":1,"t":"O Jesus, Lord, we love Thee,\nExalt Thy Name alone;\nNo other name is worthy,\nNo other Lord we own.\nFor Thou cam'st down from glory\nGod's holy will to do,\nAll righteousness fulfilling -\nThe Holy and the True.","th":["Worship & Praise","The Person of Christ","Our Love for The Son/Christ"]},{"n":2,"t":"As when on earth Thou drewest\nThine own around Thee, Lord,\nTo learn Thy love's sweet story,\nTo hear Thy bless\u00e8d word;\nSo now, O Lord, we gather\nUnto Thy precious Name;\nThy love's appeal and greatness\nOur hearts' affections claim.","th":["Fellowship & Gathering","The Word of God","God's Love for Us"]}],"w":{"Worship & Praise":50,"The Person of Christ":50,"Our Love for The Son/Christ":50,"Fellowship & Gathering":50,"The Word of God":50,"God's Love for Us":50}},
"329":{"m":"C.M.","a":"Anonymous","tn":"Eagley","tc":"J. J. Walch (1837-1901)","fl":"We thank Thee, Lord, for weary days","v":[{"n":1,"t":"We thank Thee, Lord, for weary days\nWhen desert springs were dry,\nAnd first we knew what depth of need\nThy love could satisfy.","th":["Joy & Thanksgiving","Pilgrimage / Desert Journey","God's Love for Us"]},{"n":2,"t":"Days when beneath the desert sun,\nAlong the toilsome road,\nO'er roughest ways we walked with One -\nThat One the Son of God.","th":["Pilgrimage / Desert Journey","The Person of Christ"]},{"n":3,"t":"We thank Thee for that rest in Thee\nThe weary only know,\nThat perfect wondrous sympathy\nWe only learn below.","th":["Rest & Peace","Joy & Thanksgiving","The Person of Christ"]},{"n":4,"t":"The sweet companionship of One\nWho once the desert trod:\nThe glorious fellowship with One\nUpon the throne of God.","th":["Fellowship & Gathering","The Person of Christ","Christ Risen & Glorified"]},{"n":5,"t":"We know Thee as we could not know\nThrough heaven's golden years;\nWe there shall see Thy glorious face -\nHere understand Thy tears!","th":["Heaven & The Father's House","The Cross & Sufferings of Christ"]},{"n":6,"t":"And here in peace, with Thee we go\nWhere Thou, our Shepherd, trod,\nStill, learning through our need below\nDepths of the heart of God.","th":["Rest & Peace","Pilgrimage / Desert Journey","The Father"]}],"w":{"Joy & Thanksgiving":33,"Pilgrimage / Desert Journey":50,"God's Love for Us":17,"The Person of Christ":50,"Rest & Peace":33,"Fellowship & Gathering":17,"Christ Risen & Glorified":17,"Heaven & The Father's House":17,"The Cross & Sufferings of Christ":17,"The Father":17}},
"330":{"m":"S.M.","a":"George V. Wigram (1805-1879)","tn":"Silchester","tc":"Henri Abraham Cesar Malan (1787-1864)","fl":"What raised the wondrous thought,","v":[{"n":1,"t":"What raised the wondrous thought,\nOr who did it suggest,\nThat we, the church, to glory brought,\nShould with the Son be blest?","th":["The Church / Bride of Christ","Heaven & The Father's House"]},{"n":2,"t":"O God! the thought was Thine,\n(Thine only it could be),\nFruit of the wisdom, love divine,\nPeculiar unto Thee:","th":["The Father","God's Love for Us"]},{"n":3,"t":"For, sure, no other mind,\nFor thoughts so bold, so free,\nGreatness or strength, could ever find;\nThine only it could be.","th":["The Father"]},{"n":4,"t":"The motives, too, Thine own,\nThe plan, the counsel, Thine!\nMade for Thy Son, bone of His bone,\nIn glory bright to shine.","th":["The Father","The Church / Bride of Christ"]},{"n":5,"t":"O God, with great delight\nThy wondrous thought we see,\nUpon His throne, in glory bright\nThe bride of Christ shall be.","th":["The Church / Bride of Christ","Heaven & The Father's House","The Eternal Kingdom / Reign of Christ"]},{"n":6,"t":"Sealed with the Holy Ghost,\nWe triumph in that love,\nThy wondrous thought has made our boast,\nGlory with Christ above.","th":["The Holy Spirit","God's Love for Us","Heaven & The Father's House"]}],"w":{"The Church / Bride of Christ":50,"Heaven & The Father's House":50,"The Father":50,"God's Love for Us":33,"The Eternal Kingdom / Reign of Christ":17,"The Holy Spirit":17}},
"331":{"m":"L.M.","a":"John Nelson Darby (1800-1882)","tn":"Saved By Grace","tc":"G. C. Stebbins (1846-1945)","fl":"Father, Thy sovereign love has sought","v":[{"n":1,"t":"Father, Thy sovereign love has sought\nCaptives to sin, gone far from Thee;\nThe work that Thine own Son hath wrought,\nHas brought us back in peace and free.","th":["The Father","Redemption","God's Love for Us","Rest & Peace"]},{"n":2,"t":"And now as sons before thy face,\nWith joyful steps the path we tread,\nWhich leads us on to that blest place\nPrepared for us by Christ our Head.","th":["Sonship & Adoption","Pilgrimage / Desert Journey","Heaven & The Father's House"]},{"n":3,"t":"Thou gav'st us, in eternal love,\nTo Him to bring us home to Thee,\nSuited to Thine own thought above,\nAs sons like Him, with Him to be","th":["God's Love for Us","The Father","Sonship & Adoption"]},{"n":4,"t":"In Thine own house. There love divine\nFills the bright courts with cloudless joy;\nBut 'tis the love that made us Thine,\nFills all that house without alloy.","th":["God's Love for Us","Heaven & The Father's House","The Father"]},{"n":5,"t":"O boundless grace which fills with joy\nUnmingled all that enter there!\nGod's nature, love without alloy,\nOur hearts are given e'en now to share.","th":["Grace","Joy & Thanksgiving","Heaven & The Father's House"]},{"n":6,"t":"God's righteousness with glory bright,\nWhich with its radiance fills that sphere,\nE'en Christ, of God the power and light,\nOur title is that light to share.","th":["God's Love for Us","Heaven & The Father's House"]},{"n":7,"t":"O mind divine, so must it be\nThat glory all belongs to God:\nO love divine, that did decree\nWe should be part, through Jesus' blood.","th":["The Precious Blood / Atonement","God's Love for Us"]},{"n":8,"t":"O keep us, love divine near Thee,\nThat we our nothingness may know,\nAnd ever to Thy glory be\nWalking in faith while here below.","th":["God's Love for Us","Pilgrimage / Desert Journey"]}],"w":{"The Father":38,"Redemption":12,"God's Love for Us":75,"Rest & Peace":12,"Sonship & Adoption":25,"Pilgrimage / Desert Journey":25,"Heaven & The Father's House":50,"Grace":12,"Joy & Thanksgiving":12,"The Precious Blood / Atonement":12}},
"332":{"m":"11.10.11.10.","a":"Edith Gilling Cherry (d. 1897)","tn":"O Perfect Love","tc":"J. Barnby (1838-1896)","fl":"`We rest on Thee,' our shield and our defender;","v":[{"n":1,"t":"`We rest on Thee,' our shield and our defender;\nWe go not forth alone against the foe;\nStrong in Thy strength, safe in Thy keeping tender,\n`We rest on Thee, and in Thy name we go.'","th":["Assurance & Security","The Person of Christ","Rest & Peace"]},{"n":2,"t":"Yea, `in Thy name', O Captain of salvation!\nIn Thy dear name, all other names above;\nJesus our righteousness, our sure foundation,\nOur Prince of glory and our King of love.","th":["The Person of Christ","Worship & Praise","God's Love for Us"]},{"n":3,"t":"`We go' in faith, our own great weakness feeling,\nAnd needing more each day Thy grace to know:\nYet from our hearts a song of triumph pealing;\n`We rest on Thee, and in Thy name we go.'","th":["Grace","Pilgrimage / Desert Journey","Trial & Conflict","Worship & Praise"]},{"n":4,"t":"`We rest on Thee', our shield and our defender;\nThine is the battle; Thine shall be the praise;\nWhen passing through the gates of pearly splendour,\nVictors, we rest, with Thee, through endless days.","th":["Assurance & Security","Rest & Peace","Heaven & The Father's House","Worship & Praise"]}],"w":{"Assurance & Security":50,"The Person of Christ":50,"Rest & Peace":50,"Worship & Praise":75,"God's Love for Us":25,"Grace":25,"Pilgrimage / Desert Journey":25,"Trial & Conflict":25,"Heaven & The Father's House":25}},
"333":{"m":"L.M.","a":"Mrs. Margaret Mackay (1802-1887)","tn":"Whitburn","tc":"H. W. Baker (1821-1877)","fl":"Asleep through Jesus, bless\u00e8d sleep","v":[{"n":1,"t":"Asleep through Jesus, bless\u00e8d sleep\nFrom which none ever wakes to weep;\nA calm and undisturbed repose,\nWhere powerless is the last of foes.","th":["Rest & Peace","Assurance & Security"]},{"n":2,"t":"Asleep through Jesus, oh, how sweet\nTo be for such a slumber meet,\nWith holy confidence to sing\nThat death has lost its venomed sting!","th":["Assurance & Security","Rest & Peace"]},{"n":3,"t":"Asleep through Jesus, peaceful rest,\nWhence waking we're supremely blest;\nNo fear, no woe shall dim the hour\nThat manifests the Saviour's power.","th":["Rest & Peace","Christ Risen & Glorified","Assurance & Security"]},{"n":4,"t":"Asleep through Jesus: Yes, to be\nFrom every earthly hindrance free,\nWhile, in the consciousness of love\nThe spirit lives with Christ above.","th":["Rest & Peace","God's Love for Us","Heaven & The Father's House"]}],"w":{"Rest & Peace":100,"Assurance & Security":75,"Christ Risen & Glorified":25,"God's Love for Us":25,"Heaven & The Father's House":25}},
"334":{"m":"8.4.8.4.8.8.8.4.","a":"Mary Bowley (Mrs Peters) (1813-1856)","tn":"Ar Hyd Y Nos","tc":"Anonymous","fl":"Through the love of God our Saviour,","v":[{"n":1,"t":"Through the love of God our Saviour,\nAll will be well;\nFree and changeless is His favour,\nAll, all is well.\nPrecious is the blood that healed us,\nPerfect is the grace that sealed us,\nStrong the hand stretched forth to shield us,\nAll must be well.","th":["God's Love for Us","The Precious Blood / Atonement","Grace","Assurance & Security"]},{"n":2,"t":"Though we pass through tribulation,\nAll will be well.\nOurs is such a full salvation,\nAll, all is well.\nHappy still in God confiding;\nFruitful if in Christ abiding;\nSteadfast through the Spirit's guiding:\nAll must be well.","th":["Trial & Conflict","Redemption","Assurance & Security","The Holy Spirit"]},{"n":3,"t":"We expect a bright tomorrow;\nAll will be well.\nFaith can sing through days of sorrow,\nAll, all is well.\nOn our Father's love relying,\nJesus every need supplying;\nOr in living or in dying;\nAll must be well.","th":["The Father","Assurance & Security","Joy & Thanksgiving"]}],"w":{"God's Love for Us":33,"The Precious Blood / Atonement":33,"Grace":33,"Assurance & Security":100,"Trial & Conflict":33,"Redemption":33,"The Holy Spirit":33,"The Father":33,"Joy & Thanksgiving":33}},
