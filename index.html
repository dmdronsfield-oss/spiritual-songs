"222":{"m":"7s.","a":"J. Wilson Smith (1842-1922)","tn":"Innocents","tc":"G. B. Pergolesi (1710-1736)","fl":"Everlasting glory be,","v":[{"n":1,"t":"Everlasting glory be,\nGod and Father, unto Thee!\n'Tis with joy Thy children raise\nHearts and voices in Thy praise.","th":["The Father","Worship & Praise","Joy & Thanksgiving","Sonship & Adoption"]},{"n":2,"t":"Thine the light that showed our sin,\nShowed how guilty we had been:\nThine the love that us to save\nThine own Son for sinners gave.","th":["Forgiveness of Sins","God's Love for Us","The Precious Blood / Atonement"]},{"n":3,"t":"Called to share the rest of God\nIn the Father's blest abode,\nGod of love and God of light,\nIn Thy praises we unite.","th":["Rest & Peace","The Father","Heaven & The Father's House"]},{"n":4,"t":"Gladly we Thy grace proclaim,\nKnowing now the Father's name:\nGod and Father, unto Thee\nEverlasting glory be!","th":["Grace","The Father","Worship & Praise","Sonship & Adoption"]}],"w":{"The Father":75,"Worship & Praise":50,"Joy & Thanksgiving":25,"Sonship & Adoption":50,"Forgiveness of Sins":25,"God's Love for Us":25,"The Precious Blood / Atonement":25,"Rest & Peace":25,"Heaven & The Father's House":25,"Grace":25}},
"223":{"m":"6-8s.","a":"Robert Cleaver Chapman (1803-1902)","tn":"St. Catherine","tc":"H. F. Hemy (1818-1888)","fl":"O God whose wondrous name is Love,","v":[{"n":1,"t":"O God whose wondrous name is Love,\nWhose grace has fashioned us anew,\nBefore Thy face now stands the Lamb,\nWhom sinful man once pierced and slew\nFor us Thy Son Thou didst not spare,\nFor us how canst Thou cease to care?","th":["God's Love for Us","The Lamb of God","The Cross & Sufferings of Christ","The Father"]},{"n":2,"t":"O God our Father, grant us all\nThe little child's simplicity!\nFrom us the doubtful mind remove;\nWe boast a God that cannot lie !\nTaught to repose, through love divine,\nOn truth itself, on truth divine.","th":["The Father","Sonship & Adoption","Assurance & Security"]},{"n":3,"t":"Thou art the Potter, we the clay,\nThy will be ours, Thy truth our light,\nThy love the fountain of our joy,\nThine arm a safeguard day and night,\nTill Thou shalt wipe all tears away,\nAnd bring forth everlasting day.","th":["God's Love for Us","Assurance & Security","Joy & Thanksgiving","The Father"]}],"w":{"God's Love for Us":67,"The Lamb of God":33,"The Cross & Sufferings of Christ":33,"The Father":100,"Sonship & Adoption":33,"Assurance & Security":67,"Joy & Thanksgiving":33}},
"224":{"m":"6-8s.","a":"R. Viney","tn":"Pater Omnium","tc":"H. J. E. Holmes (1852-1938)","fl":"O that we never might forget","v":[{"n":1,"t":"O that we never might forget\nWhat Christ has suffered for our sake\nTo save our souls and make us meet\nOf all His glory to partake;\nBut keeping this in mind, press on\nTo glory and the victor's crown!","th":["The Cross & Sufferings of Christ","Heaven & The Father's House","Service & Devotion"]},{"n":2,"t":"But, gracious Lord, when we reflect\nHow apt to turn the eye from Thee,\nForget Thee, too, with sad neglect,\nAnd listen to the enemy!\nAnd yet to find Thee still the same!\n'Tis this that humbles us with shame.","th":["Grace","God's Love for Us","Our Love for The Son/Christ"]},{"n":3,"t":"Astonished at Thy feet we fall,\nThy love exceeds our highest thought;\nHenceforth be Thou our all in all,\nThou who our souls with blood hast\nbought;\nMay we henceforth more faithful prove,\nAnd ne'er forget Thy ceaseless love.","th":["The Precious Blood / Atonement","Worship & Praise","God's Love for Us","Our Love for The Son/Christ"]}],"w":{"The Cross & Sufferings of Christ":33,"Heaven & The Father's House":33,"Service & Devotion":33,"Grace":33,"God's Love for Us":67,"Our Love for The Son/Christ":67,"The Precious Blood / Atonement":33,"Worship & Praise":33}},
"225":{"m":"S.M.","a":"T. Porter","tn":"Trentham","tc":"R. Jackson (1842-1914)","fl":"Oh scenes of heavenly joy!","v":[{"n":1,"t":"Oh scenes of heavenly joy!\nThe Father's house above,\nWhere cloudless peace without alloy,\nFills all that home of love.","th":["Heaven & The Father's House","Rest & Peace","God's Love for Us"]},{"n":2,"t":"There glory bright and fair,\nShines with celestial beam;\nFor He who suffered once is there,\nIts centre and its theme.","th":["Heaven & The Father's House","The Cross & Sufferings of Christ","The Person of Christ"]},{"n":3,"t":"The Father's full delight\nIs centred in the Son,\nAnd countless tongues in heaven unite\nTo tell what He hath done.","th":["The Father","The Person of Christ","Heaven & The Father's House"]},{"n":4,"t":"The Lamb enthroned shall there\nEngage each raptured heart,\nWhile myriad saints Christ's likeness\nbear\nAnd have with Him their part.","th":["The Lamb of God","Heaven & The Father's House","Worship & Praise"]},{"n":5,"t":"'Tis He who made us meet\nWith saints in light to dwell;\nAnd now we chant His praises sweet,\nWhose love we know so well.","th":["Worship & Praise","God's Love for Us"]},{"n":6,"t":"E'en now we taste the love,\nAnd know the mighty power,\nBy which we'll rise to realms above\nWhen waiting time is o'er.","th":["God's Love for Us","Heaven & The Father's House"]},{"n":7,"t":"Praise Him again, again -\nFor us the cross He bore;\nNow all is Yea, and all Amen,\nIn Him for evermore.","th":["Worship & Praise","The Cross & Sufferings of Christ"]}],"w":{"Heaven & The Father's House":71,"Rest & Peace":14,"God's Love for Us":43,"The Cross & Sufferings of Christ":29,"The Person of Christ":29,"The Father":14,"The Lamb of God":14,"Worship & Praise":43}},
"226":{"m":"6-8s.","a":"Thomas Kelly (1769-1854)","tn":"St. Petersburg","tc":"D. S. Bortniansky (1752-1825)","fl":"And art Thou, gracious Master, gone","v":[{"n":1,"t":"And art Thou, gracious Master, gone\nFor us a mansion to prepare?\nShall we behold Thee on Thy Throne,\nAnd sit for ever with Thee there?\nThen let the world approve or blame,\nWe'll triumph in Thy glorious name.","th":["Heaven & The Father's House","The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ"]},{"n":2,"t":"Should we to gain the world's applause,\nOr to escape its harmless frown,\nRefuse to countenance Thy cause,\nAnd make Thy people's lot our own,\nWhat shame would fill us in that day,\nWhen Thou Thy glory wilt display!","th":["Separation from the World","Service & Devotion"]},{"n":3,"t":"Yea, let the world cast out our name,\nAnd vile account us if it will;\nIf to confess our Lord be shame,\nOh, then we would be viler still;\nFor Thee, O Lord, we all resign,\nContent that Thou dost call us Thine.","th":["Separation from the World","Service & Devotion","Our Love for The Son/Christ"]},{"n":4,"t":"What transports then will fill our heart\nWhen Thou Thyself our names wilt own,\nWhen we shall see Thee as Thou art\nAnd know as we ourselves are known,\nAnd then from sin and sorrow free\nFind our eternal rest with Thee.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","Joy & Thanksgiving","Rest & Peace"]}],"w":{"Heaven & The Father's House":50,"The Lord's Coming / Rapture":50,"The Eternal Kingdom / Reign of Christ":25,"Separation from the World":50,"Service & Devotion":50,"Our Love for The Son/Christ":25,"Joy & Thanksgiving":25,"Rest & Peace":25}},
"227":{"m":"C.M.","a":"H. L. Rossier (1834-1928)","tn":"Sympathy","tc":"Miss S. M. Walker (1848-1918)","fl":"Lord, e'en to death Thy love could go,","v":[{"n":1,"t":"Lord, e'en to death Thy love could go,\nA death of shame and loss,\nTo vanquish for us every foe,\nAnd break the strong man's force.","th":["God's Love for Us","The Cross & Sufferings of Christ"]},{"n":2,"t":"Oh! what a load was Thine to bear\nAlone in that dark hour,\nOur sins in all their terror there,\nGod's wrath and Satan's power!","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","Forgiveness of Sins"]},{"n":3,"t":"The storm that bowed thy bless\u00e8d head\nIs hushed for ever now,\nAnd rest divine is ours instead,\nWhilst glory crowns Thy brow.","th":["Rest & Peace","Christ Risen & Glorified","The Cross & Sufferings of Christ"]},{"n":4,"t":"Within the Father's house on high,\nWe soon shall sing Thy praise;\nBut here, where Thou didst bleed and die,\nWe learn that song to raise.","th":["Heaven & The Father's House","Worship & Praise","The Precious Blood / Atonement"]}],"w":{"God's Love for Us":25,"The Cross & Sufferings of Christ":75,"The Precious Blood / Atonement":50,"Forgiveness of Sins":25,"Rest & Peace":25,"Christ Risen & Glorified":25,"Heaven & The Father's House":25,"Worship & Praise":25}},
"228":{"m":"6.6.6.6.8.8.","a":"I Watts (1674-1748)","tn":"Darwall","tc":"J. Darwall (1731-1789)","fl":"Join all the glorious names","v":[{"n":1,"t":"Join all the glorious names\nOf wisdom, love, and power,\nThat mortals ever knew,\nThat angels ever bore,\nAll are too mean to speak His worth,\nToo mean to set the Saviour forth.\nGreat Prophet of our God,\nOur tongues must bless Thy name,\nBy whom the joyful news\nOf free salvation came;\nThe joyful news of sins forgiven,\nOf hell subdued, of peace with heaven.","th":["The Person of Christ","Worship & Praise","Forgiveness of Sins","Rest & Peace"]},{"n":3,"t":"Thou art our Counsellor,\nOur Pattern and our Guide,\nAnd Thou our Shepherd art,\nAh, keep us near Thy side;\nNor let our feet e'er turn astray\nTo wander in the crooked way.","th":["The Person of Christ","Service & Devotion","Pilgrimage / Desert Journey"]},{"n":4,"t":"We love the Shepherd's voice;\nHis watchful eye shall keep\nOur pilgrim souls among\nThe thousands of God's sheep;\nHe feeds His flock, He calls their names,\nAnd gently leads the tender lambs.","th":["Pilgrimage / Desert Journey","God's Love for Us","The Person of Christ"]}],"w":{"The Person of Christ":100,"Worship & Praise":33,"Forgiveness of Sins":33,"Rest & Peace":33,"Service & Devotion":33,"Pilgrimage / Desert Journey":67,"God's Love for Us":33}},
"229":{"m":"8.8.6.8.8.8.6.","a":"Robert Cleaver Chapman (1803-1902)","tn":"Praise","tc":"A. Radiger, 1790","fl":"O happy morn! the Lord will come","v":[{"n":1,"t":"O happy morn! the Lord will come\nAnd take His waiting people home\nBeyond the reach of care,\nWhere guilt and sin are all unknown.\nThe Lord will come and claim His own,\nAnd place them with Him on His throne,\nThe glory bright to share.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","The Eternal Kingdom / Reign of Christ"]},{"n":2,"t":"The resurrection-morn will break,\nAnd every sleeping saint awake,\nBrought forth in light again;\nO morn, too bright for mortal eyes!\nWhen all the ransomed saints shall rise\nAnd wing their way to yonder skies -\nCalled up with Christ to reign.","th":["Christ Risen & Glorified","The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ"]},{"n":3,"t":"0 Lord! our pilgrim-spirits long\nTo sing the everlasting song\nOf glory, honour, power;\nTill then when Thou all power shalt wield,\nBlest Saviour, Thou wilt be our shield,\nFor Thou hast to our souls revealed\nThyself our strength and tower.","th":["Worship & Praise","Pilgrimage / Desert Journey","Assurance & Security"]}],"w":{"The Lord's Coming / Rapture":67,"Heaven & The Father's House":33,"The Eternal Kingdom / Reign of Christ":67,"Christ Risen & Glorified":33,"Worship & Praise":33,"Pilgrimage / Desert Journey":33,"Assurance & Security":33}},
"230":{"m":"C.M.","a":"James George Deck (1802-1884)","tn":"Sawley","tc":"J. J. Walch (1837-1901)","fl":"O Lord, when we the path retrace","v":[{"n":1,"t":"O Lord, when we the path retrace\nWhich Thou on earth hast trod,\nTo man Thy wondrous love and grace,\nThy faithfulness to God;","th":["The Person of Christ","God's Love for Us","Grace"]},{"n":2,"t":"Thy love, by man so sorely tried,\nProved stronger than the grave;\nThe very spear that pierced Thy side\nDrew forth the blood to save;","th":["God's Love for Us","The Cross & Sufferings of Christ","The Precious Blood / Atonement"]},{"n":3,"t":"Faithful amidst unfaithfulness,\n'Mid darkness only light,\nThou didst Thy Father's name confess,\nAnd in His will delight;","th":["The Person of Christ","The Father","Service & Devotion"]},{"n":4,"t":"Unmoved by Satan's subtle wiles,\nOr suffering, shame and loss,\nThy path, uncheered by earthly smiles,\nLed only to the cross:-","th":["The Cross & Sufferings of Christ","Trial & Conflict"]},{"n":5,"t":"We wonder at Thy lowly mind,\nAnd fain would like Thee be,\nAnd all our rest and pleasure find\nIn learning, Lord, of Thee.","th":["The Person of Christ","Service & Devotion","Our Love for The Son/Christ"]}],"w":{"The Person of Christ":60,"God's Love for Us":40,"Grace":20,"The Cross & Sufferings of Christ":40,"The Precious Blood / Atonement":20,"The Father":20,"Service & Devotion":40,"Trial & Conflict":20,"Our Love for The Son/Christ":20}},
"231":{"m":"C.M.","a":"Anonymous","tn":"Abridge","tc":"I. Smith (1725-1800)","fl":"To Thee our God, with joy we sing","v":[{"n":1,"t":"To Thee our God, with joy we sing\nOf Jesus' walk and ways;\nA pure \"meal-offering\" thus we bring,\nAll fragrant to His praise.","th":["Worship & Praise","The Person of Christ","The Father"]},{"n":2,"t":"In all His perfect path from birth\nWe see Thy glory shine;\nIn every step He took on earth\nWas grace and truth divine.","th":["The Person of Christ","Grace"]},{"n":3,"t":"Thy faithful Witness, holy, true,\nHe was indeed the light;\nThough only those His glory knew\nTo whom Thou gavest sight.","th":["The Person of Christ","The Word of God"]},{"n":4,"t":"Here was He come - 'twas meet for Him\nThy Servant Just to be;\nThough sorrow's cup o'erflowed its brim,\nThe joy He gave to Thee.","th":["The Person of Christ","The Cross & Sufferings of Christ","Service & Devotion"]},{"n":5,"t":"'Tis little we to thee can show\nOf all that He hath done;\nBut Thou dost all the virtues know\nOf Thy belov\u00e8d One.","th":["Worship & Praise","The Father","The Person of Christ"]},{"n":6,"t":"His praises we would fain proclaim,\nAnd, in His name divine,\nUpraise to Thee pure worship's flame -\nThe \"frankincense\" is Thine.","th":["Worship & Praise","The Person of Christ"]}],"w":{"Worship & Praise":50,"The Person of Christ":100,"The Father":33,"Grace":17,"The Word of God":17,"The Cross & Sufferings of Christ":17,"Service & Devotion":17}},
"232":{"m":"8.7.","a":"William J. Hocking (1864-1953)","tn":"Hope","tc":"R. Davies","fl":"Gathered to Thy name, Lord Jesus,","v":[{"n":1,"t":"Gathered to Thy name, Lord Jesus,\nGathered here with one accord,\nThine own self we own among us,\nFaithful to Thy promised word;\nMay our eyes on Thee, blest Saviour,\nRest with one unceasing gaze,\nAnd our hearts, with Thee enraptured,\nOverflow with songs of praise.","th":["Fellowship & Gathering","The Person of Christ","Worship & Praise","The Word of God"]},{"n":2,"t":"As we wait in Thine own presence,\nBrought by Thee to God so nigh,\nAs we solemnly remember,\nThou for us didst deign to die;\nMay our souls bow down before Thee\nWho didst bear our every sin,\nAnd in hallowed sweet communion\nHere below Thy praise begin.","th":["Worship & Praise","The Lord's Supper / Remembrance","The Cross & Sufferings of Christ","Forgiveness of Sins","Fellowship & Gathering"]}],"w":{"Fellowship & Gathering":100,"The Person of Christ":50,"Worship & Praise":100,"The Word of God":50,"The Lord's Supper / Remembrance":50,"The Cross & Sufferings of Christ":50,"Forgiveness of Sins":50}},
"233":{"m":"8.7.8.7.","a":"Thomas Henry Reynolds (1830-1930)","tn":"Gotha","tc":"Albert, Prince Consort of England (1819-1861)","fl":"Jesus, Lord, we come together","v":[{"n":1,"t":"Jesus, Lord, we come together\nIn the bonds of Thine own love;\nThou hast drawn our footsteps hither,\nIts deep meaning now to prove.","th":["Fellowship & Gathering","God's Love for Us"]},{"n":2,"t":"Closed the door - we leave behind us\nToil and conflict, foes and strife;\nAnd within, Thy love doth bind us\nIn one fellowship of life.","th":["Fellowship & Gathering","Separation from the World","Rest & Peace"]},{"n":3,"t":"Here together we recall Thee,\nIn Thy presence break the bread;\nNever more can grief befall Thee,\nThou art risen from the dead.","th":["The Lord's Supper / Remembrance","Christ Risen & Glorified"]},{"n":4,"t":"But Thy love remains, that entered\nInto death to make us Thine;\nIn that death all love was centred -\nThankful now we drink the wine.","th":["The Lord's Supper / Remembrance","God's Love for Us","The Cross & Sufferings of Christ","The Precious Blood / Atonement"]},{"n":5,"t":"Thou dost make us taste the blessing,\nSoon to fill a world of bliss;\nAnd we bless Thy name confessing\nThine own love our portion is.","th":["Joy & Thanksgiving","God's Love for Us"]},{"n":6,"t":"Sweet it is to sit before Thee,\nSweet to hear Thy bless\u00e8d voice,\nSweet to worship and adore Thee,\nWhile our hearts in Thee rejoice.","th":["Worship & Praise","Joy & Thanksgiving","Our Love for The Son/Christ"]}],"w":{"Fellowship & Gathering":33,"God's Love for Us":50,"Separation from the World":17,"Rest & Peace":17,"The Lord's Supper / Remembrance":33,"Christ Risen & Glorified":17,"The Cross & Sufferings of Christ":17,"The Precious Blood / Atonement":17,"Joy & Thanksgiving":33,"Worship & Praise":17,"Our Love for The Son/Christ":17}},
"234":{"m":"10s. or 11s.","a":"James George Deck (1802-1884)","tn":"Lion of Juda","tc":"Anonymous","fl":"We're not of the world which fadeth away,","v":[{"n":1,"t":"We're not of the world which fadeth away,\nWe're not of the night, but children of day;\nThe chains that once bound us by Jesus are riven,\nWe're strangers on earth, and our home is in heaven.","th":["Separation from the World","Heaven & The Father's House","Redemption","Sonship & Adoption"]},{"n":2,"t":"Our path is most rugged, and dangerous too,\nA wide trackless waste our journey lies through;\nBut the pillar of cloud that shows us our way\nIs our sure light by night, and shades us by day.","th":["Pilgrimage / Desert Journey","Assurance & Security"]},{"n":3,"t":"Our Shepherd is still our Guardian and Guide;\nBefore us He goes to help and provide;\nThe springs that refresh us by Him have been given,\nOur bread is the Manna that came down from heaven.","th":["Pilgrimage / Desert Journey","The Person of Christ","Assurance & Security"]},{"n":4,"t":"'Mid mightiest foes most feeble are we,\nYet trembling before our great Leader they flee;\nThe Lord is our banner, the battle is His,\nThe weakest of saints more than conqueror is.","th":["Trial & Conflict","Assurance & Security"]},{"n":5,"t":"And soon shall we enter our own promised land,\nBefore His bright throne in glory shall stand;\nOur song then for ever and ever shall be,\nAll glory and blessing, Lord Jesus, to Thee!","th":["Heaven & The Father's House","Worship & Praise","The Eternal Kingdom / Reign of Christ"]}],"w":{"Separation from the World":20,"Heaven & The Father's House":40,"Redemption":20,"Sonship & Adoption":20,"Pilgrimage / Desert Journey":40,"Assurance & Security":60,"The Person of Christ":20,"Trial & Conflict":20,"Worship & Praise":20,"The Eternal Kingdom / Reign of Christ":20}},
"235":{"m":"S.M.","a":"John Nelson Darby (1800-1882)","tn":"St. Michael","tc":"L. Bourgeois, c. 1510- c. 1561","fl":"We'll praise Thee, glorious Lord,","v":[{"n":1,"t":"We'll praise Thee, glorious Lord,\nWho died to set us free,\nNo earthly songs can joy afford\nLike heavenly melody.","th":["Worship & Praise","Redemption","Joy & Thanksgiving"]},{"n":2,"t":"Love that no suffering stayed,\nWe'll praise true love divine;\nLove that for us atonement made,\nLove that has made us Thine.","th":["God's Love for Us","The Precious Blood / Atonement","Worship & Praise"]},{"n":3,"t":"Love in Thy lonely life\nOf sorrow here below;\nThy words of grace, with mercy rife,\nMake grateful praises flow.","th":["God's Love for Us","The Person of Christ","Grace","Worship & Praise"]},{"n":4,"t":"Love that on death's dark vale\nIts sweetest odours spread,\nWhere sin o'er all seemed to prevail,\nRedemption's glory shed.","th":["The Cross & Sufferings of Christ","Redemption"]},{"n":5,"t":"And now we see Thee risen,\nWho once for us hast died,\nSeated above the highest heaven,\nThe Father's glorified.","th":["Christ Risen & Glorified","The Father"]},{"n":6,"t":"Soon wilt Thou take Thy throne,\nThy foes Thy footstool made,\nAnd take us with Thee for Thine own,\nIn glory love displayed.","th":["The Eternal Kingdom / Reign of Christ","The Lord's Coming / Rapture","God's Love for Us"]},{"n":7,"t":"Jesus we wait for thee,\nWith Thee to have our part;\nWhat can full joy and blessing be\nBut being where Thou art?","th":["The Lord's Coming / Rapture","Joy & Thanksgiving","Our Love for The Son/Christ"]}],"w":{"Worship & Praise":43,"Redemption":29,"Joy & Thanksgiving":29,"God's Love for Us":43,"The Precious Blood / Atonement":14,"The Person of Christ":14,"Grace":14,"The Cross & Sufferings of Christ":14,"Christ Risen & Glorified":14,"The Father":14,"The Eternal Kingdom / Reign of Christ":14,"The Lord's Coming / Rapture":29,"Our Love for The Son/Christ":14}},
"236":{"m":"C.M.","a":"Philip Doddridge (1702-1751)","tn":"Los Angeles","tc":"Anonymous","fl":"O gracious Father, God of love,","v":[{"n":1,"t":"O gracious Father, God of love,\nWe own Thy power to save,\nThat power by which the Shepherd rose\nVictorious o'er the grave.","th":["The Father","Grace","Christ Risen & Glorified"]},{"n":2,"t":"Him from the dead Thou brought'st again,\nWhen, by His precious blood\nConfirmed and sealed for evermore,\nThe eternal covenant stood.","th":["The Precious Blood / Atonement","Assurance & Security"]},{"n":3,"t":"0 may Thy Spirit guide our souls,\nAnd mould them to Thy will,\nThat from Thy paths we ne'er may stray,\nBut keep Thy precepts still!","th":["The Holy Spirit","Service & Devotion"]},{"n":4,"t":"That to the Saviour's stature fill\nWe nearer still may rise,\nAnd all we think, or say, or do,\nBe pleasing in Thine eyes.","th":["The Person of Christ","Service & Devotion"]}],"w":{"The Father":25,"Grace":25,"Christ Risen & Glorified":25,"The Precious Blood / Atonement":25,"Assurance & Security":25,"The Holy Spirit":25,"Service & Devotion":50,"The Person of Christ":25}},
"237":{"m":"L.M.","a":"J. H. Evans","tn":"Walton","tc":"Ludwig Van Beethoven (1770-1827)","fl":"Rejoice, ye saints, rejoice and praise","v":[{"n":1,"t":"Rejoice, ye saints, rejoice and praise\nThe blessings of redeeming grace;\nJesus, our everlasting tower,\nMocks at the angry tempest's roar.","th":["Joy & Thanksgiving","Redemption","Worship & Praise","Assurance & Security"]},{"n":2,"t":"His love's a refuge ever nigh,\nHis watchfulness, a mountain high;\nHis name's a rock, which winds above\nOr waves below can never move.","th":["God's Love for Us","Assurance & Security"]},{"n":3,"t":"His faithfulness, for ever sure,\nFor endless ages will endure;\nHis perfect work will ever prove\nThe depths of His unchanging love.","th":["Assurance & Security","God's Love for Us"]},{"n":4,"t":"While all things change, He changes not,\nNor e'er forgets, though oft forgot;\nHis love's unchangeably the same,\nAnd as enduring as His name.","th":["God's Love for Us","Assurance & Security"]}],"w":{"Joy & Thanksgiving":25,"Redemption":25,"Worship & Praise":25,"Assurance & Security":100,"God's Love for Us":75}},
"238":{"m":"P.M.","a":"J. Beaumont","tn":"Priory","tc":"Anonymous","fl":"Our Shepherd is the Lord,","v":[{"n":1,"t":"Our Shepherd is the Lord,\nThe living Lord who died:\nWith all His fulness can afford\nWe are supplied.\nHe richly feeds our souls\nWith blessings from above;\nAnd leads us where the river rolls\nOf endless love.","th":["The Person of Christ","The Cross & Sufferings of Christ","God's Love for Us","Rest & Peace"]},{"n":2,"t":"Our souls He doth restore,\nAnd keeps us in His way;\nHe makes our cup of joy run o'er,\nFrom day to day;\nThrough love so full, so deep,\nAnointed is our head;\nMercy and goodness us shall keep,\nWhere'er we tread.","th":["Rest & Peace","Joy & Thanksgiving","God's Love for Us"]},{"n":3,"t":"When faith and hope shall cease,\nAnd love abide alone,\nThen shall we see Him face to face,\nAnd know as known:\nStill shall we lift our voice,\nHis praise our song shall be;\nAnd we shall in His love rejoice\nWho set us free.","th":["Heaven & The Father's House","Worship & Praise","God's Love for Us","Redemption"]}],"w":{"The Person of Christ":33,"The Cross & Sufferings of Christ":33,"God's Love for Us":100,"Rest & Peace":67,"Joy & Thanksgiving":33,"Heaven & The Father's House":33,"Worship & Praise":33,"Redemption":33}},
"239":{"m":"6-8s.","a":"C. Wesley (1707-1788)","tn":"Solid Rock","tc":"W. B. Bradbury (1816-1868)","fl":"Salvation's Captain, and the Guide","v":[{"n":1,"t":"Salvation's Captain, and the Guide\nOf all that seek the rest above,\nBeneath Thy shadow we abide,\nThe cloud of Thy protecting love;\nOur strength Thy grace; our rule, Thy word;\nOur end, the glory of our Lord.","th":["Pilgrimage / Desert Journey","Grace","The Word of God","Assurance & Security"]},{"n":2,"t":"Lord, by Thy Word and Spirit led,\nWe shall not in the desert stray,\nOr light for our direction need,\nOr lose, if dark and drear, our way;\nStill kept from danger and from fear,\nSince Thy almighty love is near.","th":["Pilgrimage / Desert Journey","The Word of God","The Holy Spirit","Assurance & Security","God's Love for Us"]}],"w":{"Pilgrimage / Desert Journey":100,"Grace":50,"The Word of God":100,"Assurance & Security":100,"The Holy Spirit":50,"God's Love for Us":50}},
"240":{"m":"8.7.","a":"Philip Doddridge (1702-1751)","tn":"Melbourne Hall","tc":"Anonymous","fl":"May the Saviour's love and merit","v":[{"n":1,"t":"May the Saviour's love and merit\nFill our hearts both night ant day,\nAnd the unction of His Spirit\nAll our thoughts and actions sway.","th":["The Person of Christ","The Holy Spirit","Our Love for The Son/Christ"]},{"n":2,"t":"May we thus, in God confiding,\nAnd from self-dependence flee,\nFind our rest - in Christ abiding -\nTill with joy Himself we see.","th":["Assurance & Security","The Lord's Coming / Rapture","Rest & Peace"]}],"w":{"The Person of Christ":50,"The Holy Spirit":50,"Our Love for The Son/Christ":50,"Assurance & Security":50,"The Lord's Coming / Rapture":50,"Rest & Peace":50}},
"241":{"m":"8.7.8.7.4.7.","a":"Thomas Kelly (1769-1854)","tn":"Bradbury","tc":"W. B. Bradbury (1816-1868)","fl":"Saviour, through the desert lead us,","v":[{"n":1,"t":"Saviour, through the desert lead us,\nWithout Thee we cannot go;\nThou from cruel chains hast freed us,\nAnd hast laid the tyrant low:\nLet Thy presence\nCheer us all our journey through.","th":["Pilgrimage / Desert Journey","Redemption","The Person of Christ"]},{"n":2,"t":"Through a desert waste and cheerless\nThough our destined journey lie,\nRendered by Thy presence fearless,\nWe may every foe defy:\nNought shall move us,\nWhile we see Thee, Saviour, nigh.","th":["Pilgrimage / Desert Journey","Assurance & Security","Trial & Conflict"]},{"n":3,"t":"With a price Thy love has bought us,\n(Saviour, what a love is Thine!)\nHitherto Thy power has brought us,\n(Power and love in Thee combine):\nLord of glory,\nEver on Thy loved ones shine!","th":["God's Love for Us","Redemption","The Precious Blood / Atonement"]}],"w":{"Pilgrimage / Desert Journey":67,"Redemption":67,"The Person of Christ":33,"Assurance & Security":33,"Trial & Conflict":33,"God's Love for Us":33,"The Precious Blood / Atonement":33}},
"242":{"m":"7.7.7.7.8.8.","a":"Thomas Kelly (1769-1854)","tn":"Berry Head","tc":"C. T. Lambert","fl":"Sing aloud to God our strength;","v":[{"n":1,"t":"Sing aloud to God our strength;\nHe has brought us hitherto:\nHe will bring us home at length;\nThis the Lord our God will do:\nDoubt not, for His word is stable;\nFear not, for His arm is able.","th":["Worship & Praise","Assurance & Security","The Word of God"]},{"n":2,"t":"Sing aloud to God our strength;\nSing with wonder of His love;\nWho can tell its breadth or length,\nWho below, or who above?\nWho its depth and height can measure?\n'Tis a rich unbounded treasure!","th":["God's Love for Us","Worship & Praise"]},{"n":3,"t":"Sing aloud to God our strength;\nHe is with us where we go;\nFear we not the journey's length,\nFear we not the mighty foe:\nAll our foes shall be defeated,\nAnd our journey safe completed.","th":["Pilgrimage / Desert Journey","Assurance & Security","Trial & Conflict","Worship & Praise"]}],"w":{"Worship & Praise":100,"Assurance & Security":67,"The Word of God":33,"God's Love for Us":33,"Pilgrimage / Desert Journey":33,"Trial & Conflict":33}},
"243":{"m":"C.M.","a":"John Ryland (1753-1825)","tn":"Merton","tc":"H. K. Oliver (1800-1885)","fl":"O Lord, we would delight in Thee,","v":[{"n":1,"t":"O Lord, we would delight in Thee,\nAnd on Thy care depend;\nTo Thee in every trouble flee,\nOur safe, unfailing Friend.","th":["Assurance & Security","The Person of Christ","Our Love for The Son/Christ"]},{"n":2,"t":"When human cisterns all are dried,\nThy fulness is the same;\nMay we with this be satisfied,\nAnd glory in Thy name.","th":["Assurance & Security","The Person of Christ"]},{"n":3,"t":"Why should we thirst for ought below,\nWhile there's a fountain near,\nA fountain which doth ever flow\nThe fainting heart to cheer?","th":["The Person of Christ","Joy & Thanksgiving"]},{"n":4,"t":"No good in creatures can be found;\nAll, all is found in Thee:\nWe must have all things and abound\nThrough Thy sufficiency.","th":["The Person of Christ","Assurance & Security"]},{"n":5,"t":"Thou that hast made our heaven secure\nWilt here all good provide;\nWhile Thou art rich, can we be poor -\nThou who for us hast died?","th":["Assurance & Security","Heaven & The Father's House","The Cross & Sufferings of Christ"]},{"n":6,"t":"0 Lord, we cast each care on Thee,\nAnd triumph and adore;\nO that our great concern may be\nTo love and praise Thee more.","th":["Worship & Praise","Our Love for The Son/Christ"]}],"w":{"Assurance & Security":67,"The Person of Christ":67,"Our Love for The Son/Christ":33,"Joy & Thanksgiving":17,"Heaven & The Father's House":17,"The Cross & Sufferings of Christ":17,"Worship & Praise":17}},
"244":{"m":"8.8.6.","a":"George West Frazer (1830-1896)","tn":"Meribah","tc":"L. Mason (1792-1872)","fl":"That bright and bless\u00e8d morn is near","v":[{"n":1,"t":"That bright and bless\u00e8d morn is near\nWhen He, the Bridegroom, shall appear,\nAnd call His bride away.\nHer blessing then shall be complete,\nWhen with her Lord she takes her seat\nIn everlasting day.","th":["The Lord's Coming / Rapture","The Church / Bride of Christ","Heaven & The Father's House"]},{"n":2,"t":"The days and months are gliding past,\nSoon shall be heard the trumpet's blast\nWhich wakes the sleeping saints.\nThe dead in Christ in glory rise,\nWhen we with them shall reach the skies,\nWhere Jesus for us waits.","th":["The Lord's Coming / Rapture","Christ Risen & Glorified"]},{"n":3,"t":"What wonder, joy, and glad surprise\nShall fill our hearts as thus we rise\nTo meet Him in the air;\nTo see His face, to hear His voice,\nAnd in His perfect love rejoice,\nWhose glory then we'll share !","th":["The Lord's Coming / Rapture","Joy & Thanksgiving","God's Love for Us"]},{"n":4,"t":"No more deferred our hope shall be,\nNo longer through a glass we'll see,\nBut clearly, face to face.\nWe'll dwell with Jesus then above,\nWhom absent we have learned to love,\nBlest objects of His grace.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","Grace"]},{"n":5,"t":"O may this hope our sprits cheer,\nWhile waiting for our Saviour here!\nHe'll quickly come again.\nO may our hearts look for that day,\nAnt to His word responsive say,\n\"Come, Jesus Lord, Amen\".","th":["The Lord's Coming / Rapture","Our Love for The Son/Christ"]}],"w":{"The Lord's Coming / Rapture":100,"The Church / Bride of Christ":20,"Heaven & The Father's House":40,"Christ Risen & Glorified":20,"Joy & Thanksgiving":20,"God's Love for Us":20,"Grace":20,"Our Love for The Son/Christ":20}},
"245":{"m":"7.6.","a":"George West Frazer (1830-1896)","tn":"Aurelia","tc":"S. S. Wesley (1810-1876)","fl":"On that same night, Lord Jesus,","v":[{"n":1,"t":"On that same night, Lord Jesus,\nWhen all around combined\nTo cast its darkest shadow\nAcross Thy holy mind,\nWe hear Thy voice, blest Saviour,\n\"This do, remember Me:\"\nWith joyful hearts responding,\nWe do remember Thee.","th":["The Lord's Supper / Remembrance","The Cross & Sufferings of Christ","Joy & Thanksgiving"]},{"n":2,"t":"The depth of all Thy suffering\nNo heart could e'er conceive\nThe cup of wrath unmingled\nFor us Thou didst receive;\nThou wast of God forsaken\nOn the accurs\u00e8d tree;\nWith grateful hearts, Lord Jesus,\nWe now remember Thee.","th":["The Cross & Sufferings of Christ","The Lord's Supper / Remembrance","The Precious Blood / Atonement"]},{"n":3,"t":"We think of all the darkness\nWhich round Thy spirit pressed,\nOf all those waves and billows,\nWhich rolled across Thy breast.\nOh, there Thy grace unbounded\nAnd perfect love we see;\nWith joy and sorrow mingling,\nWe would remember Thee.","th":["The Cross & Sufferings of Christ","God's Love for Us","Grace","The Lord's Supper / Remembrance"]},{"n":4,"t":"We know thee now as risen'\nThe Firstborn from the dead;\nWe see Thee now ascended,\nThe church's glorious Head.\nIn Thee by grace accepted,\nThe heart and mind set free\nTo think of all Thy sorrow,\nAnd thus remember Thee.","th":["Christ Risen & Glorified","The Church / Bride of Christ","Grace","The Lord's Supper / Remembrance"]},{"n":5,"t":"Till Thou shalt come in glory\nAnd call us hence away,\nTo rest in all the brightness\nOf that unclouded day,\nWe show Thy death, Lord Jesus,\nAnd here would seek to be\nMore to Thy death conformed,\nWhilst we remember Thee.","th":["The Lord's Coming / Rapture","The Lord's Supper / Remembrance","The Cross & Sufferings of Christ"]}],"w":{"The Lord's Supper / Remembrance":100,"The Cross & Sufferings of Christ":80,"Joy & Thanksgiving":20,"The Precious Blood / Atonement":20,"God's Love for Us":20,"Grace":40,"Christ Risen & Glorified":20,"The Church / Bride of Christ":20,"The Lord's Coming / Rapture":20}},
"246":{"m":"L.M.","a":"Hugh Stowell (1799-1865)","tn":"Retreat","tc":"T. Hastings (1784-1872)","fl":"From every stormy wind that blows,","v":[{"n":1,"t":"From every stormy wind that blows,\nFrom every swelling tide of woes,\nThere is a calm, a sweet retreat;\n'Tis found before the mercy-seat.","th":["Rest & Peace","Trial & Conflict"]},{"n":2,"t":"There is a place where mercy sheds\nThe oil of gladness on our heads,\nA place than all beside more sweet:\nIt is the heavenly mercy-seat.","th":["Rest & Peace","Joy & Thanksgiving"]},{"n":3,"t":"There is a spot where souls unite,\nAnd saint meets saint in heavenly light;\nThough sundered far, by faith they meet\nBefore the common mercy-seat.","th":["Fellowship & Gathering","Rest & Peace"]},{"n":4,"t":"Ah, whither could we flee for aid\nWhen tempted, desolate, dismayed?\nOr how the hosts of hell defeat,\nHad suffering saints no mercy-seat?","th":["Trial & Conflict","Rest & Peace"]},{"n":5,"t":"Thither by faith we'd upward soar,\nLet time and sense seem all no more;\nFor freely God our souls can greet\nWhere glory crowns the mercy-seat.","th":["Worship & Praise","Heaven & The Father's House"]}],"w":{"Rest & Peace":80,"Trial & Conflict":40,"Joy & Thanksgiving":20,"Fellowship & Gathering":20,"Worship & Praise":20,"Heaven & The Father's House":20}},
"247":{"m":"10s.","a":"John Nelson Darby (1800-1882)","tn":"Eventide","tc":"W. H. Monk (1823-1889)","fl":"And is it so? we shall be like Thy Son!","v":[{"n":1,"t":"And is it so? we shall be like Thy Son!\nIs this the grace which He for us has won?\nFather of glory, thought beyond all thought,\nIn glory, to His own blest likeness brought.","th":["The Father","Grace","Sonship & Adoption","Heaven & The Father's House"]},{"n":2,"t":"0 Jesus Lord, who loved us like to Thee?\nFruit of Thy work, with Thee, too, there to see\nThy glory, Lord, while endless ages roll,\nThy saints the prize and travail of Thy soul.","th":["Heaven & The Father's House","God's Love for Us","Our Love for The Son/Christ"]},{"n":3,"t":"Yet it must be, Thy love had not its rest\nWere Thy redeemed not with Thee fully blest;\nThat love that gives not as the world, but shares\nAll it possesses with its loved co-heirs.","th":["God's Love for Us","Redemption"]},{"n":4,"t":"Nor we alone, Thy loved ones all, complete\nIn glory round Thee there with joy shall meet,\nAll like Thee, for Thy glory like Thee, Lord,\nObject supreme of all, by all adored.","th":["Heaven & The Father's House","Worship & Praise","God's Love for Us"]}],"w":{"The Father":25,"Grace":25,"Sonship & Adoption":25,"Heaven & The Father's House":75,"God's Love for Us":75,"Our Love for The Son/Christ":25,"Redemption":25,"Worship & Praise":25}},
"248":{"m":"S.M.","a":"Miss Catherine Helene von Poseck (1859-1953)","tn":"Ferguson","tc":"G. Kingsley (1811-1884)","fl":"Thou, Thou art worthy, Lord,","v":[{"n":1,"t":"Thou, Thou art worthy, Lord,\nOf most untiring praise;\nThe Lamb once slain shall be adored\nThrough everlasting days.","th":["Worship & Praise","The Lamb of God"]},{"n":2,"t":"Heaven's vault with praise shall ring\nLouder and yet more loud;\nMillions of saints Thy worth shall sing\nEach heart in worship bowed.","th":["Worship & Praise","The Lamb of God","Heaven & The Father's House"]},{"n":3,"t":"Worthy! again, again -\nAngels with saints combine,\nAscribing to the Lamb once slain\nWisdom and power divine.","th":["Worship & Praise","The Lamb of God"]},{"n":4,"t":"The tide shall still roll on, -\nThat tide of endless praise,\nTill every creature to Thy throne\nIts voice in blessing raise.","th":["Worship & Praise"]},{"n":5,"t":"0 Lord, the glad new song\nIs ours e'en here to sing;\nWith loyal heart and joyful tongue\nWe now our homage bring.","th":["Worship & Praise","Joy & Thanksgiving"]},{"n":6,"t":"\"Worthy\" we cry again,\n\"Worthy for evermore!\"\nAnd at Thy feet, O Lamb once slain,\nWe worship, we adore.","th":["Worship & Praise","The Lamb of God"]}],"w":{"Worship & Praise":100,"The Lamb of God":67,"Heaven & The Father's House":17,"Joy & Thanksgiving":17}},
"249":{"m":"7.6.","a":"Samuel Prideaux Tregelles (1813-1875)","tn":"Baptisma","tc":"C. Jouard 1858-1927 and F. Jouard 1884-1941.","fl":"O Lord, in Thee believing,","v":[{"n":1,"t":"O Lord, in Thee believing,\nOur souls have peace with God,\nEternal life receiving,\nThe purchase of Thy blood.","th":["Rest & Peace","The Precious Blood / Atonement","Assurance & Security"]},{"n":2,"t":"Our curse and condemnation\nThou barest in our stead;\nSecure is our salvation,\nIn Thee our risen Head.","th":["Redemption","Christ Risen & Glorified","Assurance & Security"]},{"n":3,"t":"The Holy Ghost revealing\nThy grace hath given us rest,\nThy stripes have been our healing,\nThy love doth make us blest;","th":["The Holy Spirit","Grace","Rest & Peace","The Cross & Sufferings of Christ"]},{"n":4,"t":"In Thee the Father sees us\nAccepted and complete:\nGrace which from evil frees us\nFor glory makes us meet.","th":["The Father","Grace","Assurance & Security","Forgiveness of Sins"]}],"w":{"Rest & Peace":50,"The Precious Blood / Atonement":25,"Assurance & Security":75,"Redemption":25,"Christ Risen & Glorified":25,"The Holy Spirit":25,"Grace":50,"The Cross & Sufferings of Christ":25,"The Father":25,"Forgiveness of Sins":25}},
"250":{"m":"8.8.6.","a":"J. Gambold (1711-1771)","tn":"Kingston","tc":"W. Hayes (1706-1777)","fl":"From various cares our hearts retire,","v":[{"n":1,"t":"From various cares our hearts retire,\nThough deep and boundless their desire,\nWe've now to please but One,\nHim, before whom each knee shall bow,\nWith Him is all our business now,\nAnd those that are His own.","th":["Worship & Praise","Service & Devotion","The Eternal Kingdom / Reign of Christ"]},{"n":2,"t":"With these our happy lot is cast,\nThrough the world's deserts rude and waste,\nOr through its gardens fair;\nWhether the storms of trouble sweep,\nOr all in dead supineness sleep,\nTo advance be all our care.","th":["Pilgrimage / Desert Journey","Fellowship & Gathering"]},{"n":3,"t":"O Lord, the way, the truth, the life,\nHenceforth let sorrow, doubt and strife\nDrop off like autumn leaves;\nHenceforth, as privileged by Thee,\nSimple and undistracted be\nThe soul which to Thee cleaves.","th":["The Person of Christ","Rest & Peace","Service & Devotion"]},{"n":4,"t":"Let us our feebleness recline\nOn that eternal love of Thine,\nAnd human thoughts forget;\nChildlike attend what Thou wilt say,\nGo forth and serve Thee while 'tis day,\nNor leave our sweet retreat.","th":["God's Love for Us","Service & Devotion","Rest & Peace"]}],"w":{"Worship & Praise":25,"Service & Devotion":75,"The Eternal Kingdom / Reign of Christ":25,"Pilgrimage / Desert Journey":25,"Fellowship & Gathering":25,"The Person of Christ":25,"Rest & Peace":50,"God's Love for Us":25}},
"251":{"m":"C.M.","a":"T. E. Purdom (c.1852-1942)","tn":"Crimond","tc":"J. S. Irvine (1836-1887)","fl":"Lord Jesus Christ, our Saviour Thou,","v":[{"n":1,"t":"Lord Jesus Christ, our Saviour Thou,\nWith joy we worship Thee,\nWe know Thou hast redeem\u00e8d us,\nBy dying on the tree.","th":["Worship & Praise","Redemption","The Cross & Sufferings of Christ"]},{"n":2,"t":"We know the love that brought thee down,\nDown from that bliss on high;\nTo meet our ruined souls in need,\nOn Calvary's cross to die.","th":["God's Love for Us","The Cross & Sufferings of Christ"]},{"n":3,"t":"Our Saviour Jesus - Lord Thou art,\nEternal is Thy love;\nEternal, too, our songs of praise,\nWhen with Thee, Lord, above.","th":["God's Love for Us","Worship & Praise","Heaven & The Father's House"]},{"n":4,"t":"E'en now we praise the grace divine,\nThe love that shines in Thee;\nThe rich One Thou - for us made poor,\nBy death to set us free.","th":["Grace","God's Love for Us","Redemption"]},{"n":5,"t":"We praise, we worship, we adore,\nAs round Thyself we meet;\nThy beauty, Lord, our souls transports,\nWhile bowing at Thy feet.","th":["Worship & Praise","Fellowship & Gathering","The Person of Christ"]},{"n":6,"t":"Our theme of praise art Thou alone,\nThy cross, Thy work, Thy word;\nOh! who can fathom all Thy love,\nThou living bless\u00e8d Lord?","th":["Worship & Praise","The Cross & Sufferings of Christ","The Word of God","God's Love for Us"]}],"w":{"Worship & Praise":67,"Redemption":33,"The Cross & Sufferings of Christ":50,"God's Love for Us":67,"Heaven & The Father's House":17,"Grace":17,"Fellowship & Gathering":17,"The Person of Christ":17,"The Word of God":17}},
"252":{"m":"8.7.","a":"James Allen (1734-1804), and W. W. Shirley (1725-1786)","tn":"Halle","tc":"K. Muller (1815-1898)","fl":"Sweet the moments, rich in blessing,","v":[{"n":1,"t":"Sweet the moments, rich in blessing,\nMusing o'er the cross we spend;\nLife, and health, and peace possessing\nFrom the dying sinners' Friend.","th":["The Cross & Sufferings of Christ","Rest & Peace","God's Love for Us"]},{"n":2,"t":"Here we rest - in wonder viewing\nAll our guilt on Jesus laid,\nAnd a full redemption flowing\nFrom the sacrifice He made.","th":["Forgiveness of Sins","Redemption","The Precious Blood / Atonement"]},{"n":3,"t":"Here we find the dawn of heaven,\nWhile upon the Lamb we gaze,\nSee our trespasses forgiven,\nAnd our songs of triumph raise","th":["The Lamb of God","Forgiveness of Sins","Joy & Thanksgiving"]},{"n":4,"t":"0 that strong in faith abiding,\nWe may to the Saviour cleave,\nNought with Him our hearts dividing,\nAll for Him content to leave!","th":["Service & Devotion","Our Love for The Son/Christ"]},{"n":5,"t":"May we still, God's mind discerning,\nTo the Lamb for wisdom go;\nThere new wonders daily learning,\nAll the depths of mercy know.","th":["The Lamb of God","God's Love for Us"]}],"w":{"The Cross & Sufferings of Christ":20,"Rest & Peace":20,"God's Love for Us":40,"Forgiveness of Sins":40,"Redemption":20,"The Precious Blood / Atonement":20,"The Lamb of God":40,"Joy & Thanksgiving":20,"Service & Devotion":20,"Our Love for The Son/Christ":20}},
"253":{"m":"S.M.","a":"Philip Doddridge (1702-1751)","tn":"Austin","tc":"A. E. Lord","fl":"Since Christ and we are one,","v":[{"n":1,"t":"Since Christ and we are one,\nWhat room for doubt or fear?\nHe sits upon the Father's throne,\nAnd we are in Him there.","th":["Assurance & Security","The Father","Christ Risen & Glorified"]},{"n":2,"t":"The Spirit doth unite\nOur souls to Him our Head,\nAnd forms us to His image bright,\nWhile in His steps we tread.","th":["The Holy Spirit","The Person of Christ","New Creation"]},{"n":3,"t":"And grace it is, free grace,\nWhich keeps us on the road,\nTill we behold the Saviour's face,\nAnd city of our God.","th":["Grace","Pilgrimage / Desert Journey","Heaven & The Father's House"]}],"w":{"Assurance & Security":33,"The Father":33,"Christ Risen & Glorified":33,"The Holy Spirit":33,"The Person of Christ":33,"New Creation":33,"Grace":33,"Pilgrimage / Desert Journey":33,"Heaven & The Father's House":33}},
"254":{"m":"8.7.","a":"Mrs. J. A. Trench (1843-1925)","tn":"Batavia","tc":"J. C. Kuehnau (1735-1805)","fl":"Death and judgment are behind us,","v":[{"n":1,"t":"Death and judgment are behind us,\nGrace and glory are before;\nAll the billows rolled o'er Jesus,\nThere they spent their utmost power.","th":["Grace","The Cross & Sufferings of Christ","Assurance & Security"]},{"n":2,"t":"First-fruits of the resurrection,\nHe is risen from the tomb;\nNow we stand in new creation,\nFree; because beyond our doom.","th":["Christ Risen & Glorified","New Creation"]},{"n":3,"t":"Jesus died, and we died with Him,\nBuried in His grave we lay,\nOne with Him in resurrection,\nNow in Him in heaven's bright day.","th":["The Cross & Sufferings of Christ","Christ Risen & Glorified","Heaven & The Father's House","New Creation"]}],"w":{"Grace":33,"The Cross & Sufferings of Christ":67,"Assurance & Security":33,"Christ Risen & Glorified":67,"New Creation":67,"Heaven & The Father's House":33}},
"255":{"m":"C.M.","a":"Robert Cleaver Chapman (1803-1902)","tn":"Azmon","tc":"C. G. Glaeser (1784-1829)","fl":"The Prince of life, once slain for us,","v":[{"n":1,"t":"The Prince of life, once slain for us,\nIs now gone up on high;\nCaptivity is captive led,\nAnd Christ no more can die.","th":["Christ Risen & Glorified","The Cross & Sufferings of Christ","Redemption"]},{"n":2,"t":"His word is faithfulness and truth,\n\"Behold, I quickly come\";\nAnd faith, that counts the promise sure,\nCan pierce the midnight gloom.","th":["The Lord's Coming / Rapture","The Word of God","Assurance & Security"]},{"n":3,"t":"Far spent already is the night,\nIn hope we hail the day\nOf our belov\u00e8d Lord's return\nTo wipe all tears away.","th":["The Lord's Coming / Rapture","Joy & Thanksgiving"]},{"n":4,"t":"Jesus, at the appointed hour,\nIn glory shall appear;\nThen, fashioned by His mighty hand,\nWe shall His image bear.","th":["The Lord's Coming / Rapture","Christ Risen & Glorified"]},{"n":5,"t":"Soon shall the saints with glory crowned\nDwell in that cloudless light,\nAnd see their Lord in glory owned,\nHeaven's constant sweet delight.","th":["Heaven & The Father's House","Christ Risen & Glorified"]}],"w":{"Christ Risen & Glorified":60,"The Cross & Sufferings of Christ":20,"Redemption":20,"The Lord's Coming / Rapture":60,"The Word of God":20,"Assurance & Security":20,"Joy & Thanksgiving":20,"Heaven & The Father's House":20}},
"256":{"m":"7.6.","a":"James Montgomery (1771-1854)","tn":"Petition","tc":"Franz Joseph Haydn (1732-1809)","fl":"Hail to the Lord's Anointed,","v":[{"n":1,"t":"Hail to the Lord's Anointed,\nGreat David's greater Son,\nWhen to the time appointed\nThe rolling years have run:\nHe comes to break oppression,\nTo set the captive free,\nTo take away transgression,\nAnd rule in equity!","th":["The Person of Christ","The Eternal Kingdom / Reign of Christ","Redemption"]},{"n":2,"t":"The heavens, which now conceal Him\nIn counsels deep and wise,\nIn glory shall reveal Him\nTo our rejoicing eyes;\nHe, who with hands uplifted\nWent from this earth below,\nShall come again, all gifted,\nHis blessing to bestow.","th":["Christ Risen & Glorified","The Lord's Coming / Rapture","Joy & Thanksgiving"]},{"n":3,"t":"He shall come down like showers\nUpon the new-mown grass,\nAnd joy and hope like flowers\nSpring up where He doth pass;\nBefore Him on the mountains\nShall peace, the herald, go;\nAnd righteousness in fountains\nFrom hill to valley flow.","th":["The Eternal Kingdom / Reign of Christ","Joy & Thanksgiving","Rest & Peace"]},{"n":4,"t":"Kings shall fall down before Him,\nAnd gold and incense bring;\nAll nations shall adore Him,\nHis praise all peoples sing,\nOutstretched His wide dominion\nO'er river, sea and shore,\nFar as the eagle's pinion,\nOr dove's light wing can soar.","th":["The Eternal Kingdom / Reign of Christ","Worship & Praise"]}],"w":{"The Person of Christ":25,"The Eternal Kingdom / Reign of Christ":75,"Redemption":25,"Christ Risen & Glorified":25,"The Lord's Coming / Rapture":25,"Joy & Thanksgiving":50,"Rest & Peace":25,"Worship & Praise":25}},
"257":{"m":"6.6.6.6.8.8.","a":"Albert Midlane (1825-1909)","tn":"Lenox","tc":"L. Edson (1748-1820)","fl":"Himself He could not save,","v":[{"n":1,"t":"Himself He could not save,\nHe on the cross must die,\nOr mercy could not come\nTo ruined sinners nigh;\nYes, Christ, the Son of God, must bleed,\nThat sinners might from sin be freed.","th":["The Cross & Sufferings of Christ","The Person of Christ","Redemption","Forgiveness of Sins"]},{"n":2,"t":"Himself He could not save,\nFor justice must be done;\nOur sins' full weight must fall\nUpon the sinless One;\nFor nothing less could God accept\nIn payment of that fearful debt.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement"]},{"n":3,"t":"Himself He could not save,\nFor He the Surety stood\nFor all who now rely\nUpon His precious blood;\nHe bore the penalty of guilt\nWhen on the cross His blood was spilt.","th":["The Precious Blood / Atonement","The Cross & Sufferings of Christ","Assurance & Security"]},{"n":4,"t":"Himself He could not save,\nLove's stream too deeply flowed,\nIn love Himself He gave,\nTo pay the debt we owed.\nObedience to His Father's will,\nAnd love to Him did all fulfil.","th":["God's Love for Us","The Cross & Sufferings of Christ","Service & Devotion"]},{"n":5,"t":"And now exalted high: -\nA Prince and Saviour He,\nThat sinners might draw nigh\nAnd drink of mercy free,\nOf mercy now so richly shed,\nFor Jesus liveth who was dead.","th":["Christ Risen & Glorified","Grace","Redemption"]}],"w":{"The Cross & Sufferings of Christ":80,"The Person of Christ":20,"Redemption":40,"Forgiveness of Sins":20,"The Precious Blood / Atonement":40,"Assurance & Security":20,"God's Love for Us":20,"Service & Devotion":20,"Christ Risen & Glorified":20,"Grace":20}},
"258":{"m":"7.6.7.6. Double","a":"John Ernest Bode (1816-1874)","tn":"Angel's Story","tc":"A. H. Mann (1850-1929)","fl":"O Jesus, Thou hast promised","v":[{"n":1,"t":"O Jesus, Thou hast promised\nTo all who follow Thee\nThat where Thou art in glory\nThere shall Thy servant be;\nAnd Jesus, I have promised\nTo serve Thee to the end;\nOh, give me grace to follow\nMy Master and my Friend.","th":["Service & Devotion","Heaven & The Father's House","Grace","Our Love for The Son/Christ"]},{"n":2,"t":"Oh, let me feel thee near me;\nThe world is ever near;\nI see the sights that dazzle,\nThe tempting sounds I hear;\nMy foes are ever near me,\nAround me and within;\nBut, Jesus, draw Thou nearer,\nAnd shield my soul from sin.","th":["Trial & Conflict","Separation from the World","The Person of Christ"]},{"n":3,"t":"Oh, let me hear Thee speaking,\nIn accents clear and still,\nAbove the storms of passion,\nThe murmurs of self-will.\nOh, speak to reassure me,\nTo hasten, or control;\nOh, speak, and make me listen,\nThou Guardian of my soul.","th":["The Word of God","Service & Devotion","The Person of Christ"]}],"w":{"Service & Devotion":67,"Heaven & The Father's House":33,"Grace":33,"Our Love for The Son/Christ":33,"Trial & Conflict":33,"Separation from the World":33,"The Person of Christ":67,"The Word of God":33}},
"259":{"m":"C.M.","a":"Samuel Prideaux Tregelles (1813-1875)","tn":"Spohr","tc":"L. Spohr (1785-1859)","fl":"The gloomy night will soon be past,","v":[{"n":1,"t":"The gloomy night will soon be past,\nThe morning will appear,\nThe harbinger of day at last\nEach waiting eye will cheer.","th":["The Lord's Coming / Rapture","Joy & Thanksgiving"]},{"n":2,"t":"Thou Bright and Morning Star, Thy light\nWill to our joy be seen;\nThou, Lord, wilt meet our longing sight\nWithout a cloud between.","th":["The Lord's Coming / Rapture","The Person of Christ"]},{"n":3,"t":"Ah, yes, Lord Jesus (Thou whose heart\nStill for Thy saints doth care),\nWe shall behold Thee as Thou art\nAnd Thy full image bear.","th":["The Lord's Coming / Rapture","God's Love for Us","Heaven & The Father's House"]},{"n":4,"t":"Thy love sustains us by the way,\nWhile pilgrims here below;\nThou dost, O Saviour, day by day\nThy suited grace bestow.","th":["Pilgrimage / Desert Journey","God's Love for Us","Grace"]},{"n":5,"t":"But oh! The more we learn of Thee,\nAnd Thy rich mercy prove,\nThe more we long Thy face to see,\nAnd fully prove Thy love.","th":["God's Love for Us","Our Love for The Son/Christ"]},{"n":6,"t":"Then, shine, Thou Bright and Morning Star,\nWe wait for Thee to come\nAnd take, from sin and grief afar,\nThy blood-bought people home.","th":["The Lord's Coming / Rapture","The Precious Blood / Atonement","Redemption"]}],"w":{"The Lord's Coming / Rapture":67,"Joy & Thanksgiving":17,"The Person of Christ":17,"God's Love for Us":50,"Heaven & The Father's House":17,"Pilgrimage / Desert Journey":17,"Grace":17,"Our Love for The Son/Christ":17,"The Precious Blood / Atonement":17,"Redemption":17}},
"260":{"m":"8.7.8.7.","a":"L. M. Grant","tn":"Wellesley","tc":"L. S. Tourjee (1858-1913)","fl":"Father, Oh, what boundless glory","v":[{"n":1,"t":"Father, Oh, what boundless glory\nIn Thy name of love we know,\nNo more sweet, more wondrous story,\nThan Thy heart revealed below.","th":["The Father","God's Love for Us"]},{"n":2,"t":"Thou whose bless\u00e8d name is holy -\nMajesty supreme is Thine;\nYet in One so meek and lowly\nWe behold Thy brightness shine!","th":["The Father","The Person of Christ"]},{"n":3,"t":"He in whom Thy heart delighted,\nSent to earth, to grief and shame:\nHere, where all before had slighted,\nHe alone declared Thy Name.","th":["The Person of Christ","The Cross & Sufferings of Christ","The Father"]},{"n":4,"t":"'Mid the darkness, Light resplendent,\nPurest, gentlest Stranger, He;\nWhile the world, in bitter ferment,\nHated both Himself and Thee.","th":["The Person of Christ","Separation from the World","The Father"]},{"n":5,"t":"Then the cup, from Thy hand given,\nE'en to Thy belov\u00e8d Son!\nPerfume sweet ascends to heaven:\nHis most glorious work is done.","th":["The Cross & Sufferings of Christ","The Father","The Person of Christ"]},{"n":6,"t":"Bless\u00e8d, beauteous contemplation -\nTheme more full than all beside -\nCause of deepest adoration -\nThou, through Christ, art glorified!","th":["Worship & Praise","The Father","Christ Risen & Glorified"]}],"w":{"The Father":100,"God's Love for Us":17,"The Person of Christ":67,"The Cross & Sufferings of Christ":33,"Separation from the World":17,"Worship & Praise":17,"Christ Risen & Glorified":17}},
"261":{"m":"C.M.D.","a":"Miss Hannah Kilham Burlingham (1842-1901)","tn":"No Other Plea","tc":"Anonymous","fl":"The Holy One who knew no sin,","v":[{"n":1,"t":"The Holy One who knew no sin,\nGod made Him sin for us;\nThe Saviour died our souls to win,\nUpon the shameful cross.\nHis precious blood alone availed\nTo wash our sins away;\nThrough weakness He o'er hell prevailed,\nThrough death He won the day.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","Forgiveness of Sins","Redemption","The Person of Christ"]},{"n":2,"t":"His beauty shineth far above\nOur feeble power of praise;\nAnd we shall live and learn His love\nThrough everlasting days.\nThe knowing this, that us He loves,\nHath made our cup run o'er;\nJesus, Thy name our spirit moves,\nToday and evermore.","th":["God's Love for Us","The Person of Christ","Worship & Praise","Joy & Thanksgiving"]}],"w":{"The Cross & Sufferings of Christ":50,"The Precious Blood / Atonement":50,"Forgiveness of Sins":50,"Redemption":50,"The Person of Christ":100,"God's Love for Us":50,"Worship & Praise":50,"Joy & Thanksgiving":50}},
"262":{"m":"10.4.10.4.10.10.","a":"William Easton (1850-1926)","tn":"Lux Benigna","tc":"J. B. Dykes (1823-1876)","fl":"O Jesus, Lord, Great Shepherd of Thy sheep,","v":[{"n":1,"t":"O Jesus, Lord, Great Shepherd of Thy sheep,\nLead Thou us on:\nFoolish and weak, we need Thee still to keep\nAnd lead us on:\nDangers abound, and we are not yet home,\nO keep us near, nor let us from Thee roam.","th":["Pilgrimage / Desert Journey","The Person of Christ","Assurance & Security"]},{"n":2,"t":"Thy blood was shed that we might with Thee be\nAt home on high,\nAmid that scene of light and radiancy\nBeyond the sky.\nYet even here we know Thee near, and hear\nThy voice, and follow, Saviour, without fear.","th":["The Precious Blood / Atonement","Heaven & The Father's House","Assurance & Security"]},{"n":3,"t":"Dark though the path may be, we follow thee\nAlong the way,\nWhich leads us on, Thy glory soon to see\nIn cloudless day:\nThus led by Thee, Thy tender shepherd care\nWill keep, and guard, and guide us safely there.","th":["Pilgrimage / Desert Journey","Heaven & The Father's House","Assurance & Security"]},{"n":4,"t":"What will it be when dangers all are past,\nAnd led by Thee,\nWe reach our home - the Father's house, at last,\nTo dwell with Thee?\nHow loud the chorus which we then shall raise,\nAnd sing for ever to Thee, in Thy praise!","th":["Heaven & The Father's House","The Father","Worship & Praise","Joy & Thanksgiving"]}],"w":{"Pilgrimage / Desert Journey":50,"The Person of Christ":25,"Assurance & Security":75,"The Precious Blood / Atonement":25,"Heaven & The Father's House":75,"The Father":25,"Worship & Praise":25,"Joy & Thanksgiving":25}},
"263":{"m":"6.6.6.6.8.8.","a":"Thomas Kelly (1769-1854)","tn":"Alban's","tc":"W. H. Havergal (1793-1870)","fl":"The night is now far spent,","v":[{"n":1,"t":"The night is now far spent,\nThe day is drawing nigh,\nSoon will the morning break\nIn radiance through the sky;\nO let the thought our spirits cheer,\nThe Lord Himself will soon appear.","th":["The Lord's Coming / Rapture"]},{"n":2,"t":"Though men our hope deride,\nNor will the truth believe,\nWe in His word confide,\nAnd it will ne'er deceive,\nSoon all that grieves shall pass away,\nAnd saints shall see a glorious day.","th":["The Word of God","Assurance & Security","The Lord's Coming / Rapture"]},{"n":3,"t":"For us the Lord intends\nA bright abode on high,\nThe place where sorrow ends,\nAnd nought is known but joy:\nWith such a hope let us rejoice,\nWe soon shall hear the Saviour's voice.","th":["Heaven & The Father's House","Joy & Thanksgiving","The Lord's Coming / Rapture"]}],"w":{"The Lord's Coming / Rapture":100,"The Word of God":33,"Assurance & Security":33,"Heaven & The Father's House":33,"Joy & Thanksgiving":33}},
"264":{"m":"L.M.","a":"R. Morshead","tn":"Deep Harmony","tc":"H. Parker","fl":"Enthroned on high, eternal Word,","v":[{"n":1,"t":"Enthroned on high, eternal Word,\nAs Son of man, as sovereign Lord,\n'Tis now by faith on Thee we rest,\nTill all Thy title have confessed.","th":["Christ Risen & Glorified","The Person of Christ","Assurance & Security"]},{"n":2,"t":"Thou hast our souls from sins made clean,\nThy Spirit gives us strength within;\nWhilst Thou for us in all our need,\nAt God's right hand dost ever plead.","th":["Forgiveness of Sins","The Holy Spirit","Christ's Intercession / Priesthood"]},{"n":3,"t":"O keep us in the narrow way,\nThat ne'er from Thee our footsteps stray;\nSustain our weakness, calm our fear,\nAnd to Thy presence keep us near.","th":["Service & Devotion","Assurance & Security","Pilgrimage / Desert Journey"]},{"n":4,"t":"O be it thus till that blest day\nWhen God shall wipe all tears away;\nQuickly, 'tis promised in the word,\nE'en so, Amen. Come, Jesus, Lord.","th":["The Lord's Coming / Rapture","The Word of God"]}],"w":{"Christ Risen & Glorified":25,"The Person of Christ":25,"Assurance & Security":50,"Forgiveness of Sins":25,"The Holy Spirit":25,"Christ's Intercession / Priesthood":25,"Service & Devotion":25,"Pilgrimage / Desert Journey":25,"The Lord's Coming / Rapture":25,"The Word of God":25}},
"265":{"m":"7.6.","a":"George West Frazer (1830-1896)","tn":"Munich","tc":"Anonymous","fl":"O God of grace, our Father,","v":[{"n":1,"t":"O God of grace, our Father,\nWe bless Thy holy name,\nWe who enjoy Thy favour,\nMade holy, without blame;\nIn love, which sought and found us,\nAnd brought us nigh to Thee,\nAnd won the rest of glory,\nOur heavenly home shall be.","th":["The Father","Grace","God's Love for Us","Heaven & The Father's House"]},{"n":2,"t":"Thy deep eternal counsel\nChose us in Christ the Son\nBefore the earth's foundation,\nOr time had yet begun;\nThat we might all the nearness\nOf the Belov\u00e8d know,\nAnd brought to Thee as children\nOur children's praises flow.","th":["The Father","Sonship & Adoption","The Person of Christ","Grace"]},{"n":3,"t":"We worship Thee, our Father,\nSoon shall Thy children be\nAt home in heavenly glory,\nThy house their home shall be;\nWe worship Thee, our Father,\nAnd praise Thy perfect love,\nSoon shall we chant Thy glory\nIn better strains above.","th":["The Father","Worship & Praise","Heaven & The Father's House","Sonship & Adoption","God's Love for Us"]}],"w":{"The Father":100,"Grace":67,"God's Love for Us":67,"Heaven & The Father's House":67,"Sonship & Adoption":67,"The Person of Christ":33,"Worship & Praise":33}},
"266":{"m":"7s.","a":"Joseph Swain (1761-1796)","tn":"Brandenburg","tc":"Anonymous","fl":"Christ the Lord will come again,","v":[{"n":1,"t":"Christ the Lord will come again,\nNone shall wait for Him in vain;\nWe shall then His glory see,\nHis, who died to set us free.","th":["The Lord's Coming / Rapture","Redemption"]},{"n":2,"t":"Then, when the Redeemer's voice\nCalls the sleeping saints to rise,\nRising millions shall proclaim\nBlessings on the Saviour's name.","th":["The Lord's Coming / Rapture","Christ Risen & Glorified","Worship & Praise"]},{"n":3,"t":"\"This is our redeeming God\",\nRansomed hosts will shout aloud:\nPraise, eternal praise, be given\nTo the Lord of earth and heaven.","th":["Redemption","Worship & Praise","The Lamb of God"]}],"w":{"The Lord's Coming / Rapture":67,"Redemption":67,"Christ Risen & Glorified":33,"Worship & Praise":67,"The Lamb of God":33}},
"267":{"m":"10s. or 11s.","a":"John Fawcett (1739-1817)","tn":"Comfort","tc":"E. L. White","fl":"All fulness resides in Jesus our Head,","v":[{"n":1,"t":"All fulness resides in Jesus our Head,\nAnd ever abides to answer all need:\nThe Father's good pleasure has laid up a store,\nA plentiful treasure, to give to the poor.","th":["The Person of Christ","Grace","The Father"]},{"n":2,"t":"Whatever distress awaits us below,\nSuch plentiful grace the Lord will bestow\nAs still shall support us and silence our fear,\nAnd nothing can hurt us while Jesus is near.","th":["Trial & Conflict","Grace","Assurance & Security"]},{"n":3,"t":"When sorrows assail us, or terrors draw nigh,\nHis love will not fail us, He'll guide with His eye;\nAnd when we are fainting, and ready to fail,\nHe'll give what is wanting, and make us prevail.","th":["God's Love for Us","Assurance & Security","Trial & Conflict"]},{"n":4,"t":"We trust His protection; we'll lean on His might;\nWe're sure His direction will guide us aright;\nWe know who surrounds us, almighty to save,\nAnd no one confounds us the Saviour who have.","th":["Assurance & Security","The Person of Christ"]}],"w":{"The Person of Christ":50,"Grace":50,"The Father":25,"Trial & Conflict":50,"Assurance & Security":75,"God's Love for Us":25}},
"268":{"m":"7.7.7.6.","a":"William Wooldridge Fereday (1863-1959)","tn":"Worship","tc":"Samuel Trevor Francis (1834-1925)","fl":"Holy Lord, we think of Thee,","v":[{"n":1,"t":"Holy Lord, we think of Thee,\nOf Thy woe and agony,\nOf Thy suffering on the tree;\nSaviour, we adore Thee.","th":["The Cross & Sufferings of Christ","Worship & Praise"]},{"n":2,"t":"Wondrous grace to ruined man\nIn that vast eternal plan;\nFar too vast for thought to scan;\nSaviour, we adore Thee.","th":["Grace","Worship & Praise"]},{"n":3,"t":"Ponder we Thy lowly bed,\nSon of God in manger laid,\nBorn to Calvary to be led;\nSaviour, we adore Thee.","th":["The Person of Christ","The Cross & Sufferings of Christ","Worship & Praise"]},{"n":4,"t":"Saviour, we Thy path retrace,\nPatient love and lowly grace,\nMatchless, holy, all Thy ways;\nSaviour, we adore Thee.","th":["The Person of Christ","Grace","Worship & Praise"]},{"n":5,"t":"To Thy cross we turn our eyes,\nSlain that guilty worms might rise;\nPrecious, perfect sacrifice!\nSaviour, we adore Thee.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","Worship & Praise"]},{"n":6,"t":"Gaze we at the empty tomb;\nGone our sins, dispelled our gloom,\nWe are free - beyond sin's doom;\nSaviour, we adore Thee.","th":["Christ Risen & Glorified","Forgiveness of Sins","Worship & Praise"]},{"n":7,"t":"Look we to the throne of God;\nThere in glory's blest abode,\nWe behold Thee, risen Lord;\nSaviour, we adore Thee.","th":["Christ Risen & Glorified","Heaven & The Father's House","Worship & Praise"]},{"n":8,"t":"Soon for us Thou wilt return;\nLord, for Thee our spirits yearn;\nHaste we to that blissful morn;\nSaviour, we adore Thee.","th":["The Lord's Coming / Rapture","Worship & Praise"]}],"w":{"The Cross & Sufferings of Christ":38,"Worship & Praise":100,"Grace":25,"The Person of Christ":25,"The Precious Blood / Atonement":12,"Christ Risen & Glorified":25,"Forgiveness of Sins":12,"Heaven & The Father's House":12,"The Lord's Coming / Rapture":12}},
"269":{"m":"7.6.","a":"Anonymous","tn":"Llanelly","tc":"Anonymous","fl":"WeE love to sing Thy praises,","v":[{"n":1,"t":"WeE love to sing Thy praises,\nO Jesus Christ the Lord;\nIt is our new-born gladness\nThy goodness to record:\nThe one absorbing treasure\nThat fills our heart and eye\nIs love that came to suffer,\nFor enemies to die.","th":["Worship & Praise","God's Love for Us","The Cross & Sufferings of Christ"]},{"n":2,"t":"Oh, love beyond all telling,\nBeyond all ken or thought,\nWhich Thou, O bless\u00e8d Saviour,\nTo us from heaven hast brought!\nIn Thee we see united\nBoth God and man in one;\nHence power and love unmeasured\nCombined in Thee are shown.","th":["God's Love for Us","The Person of Christ","Grace"]},{"n":3,"t":"The power of the Creator\nGives glory to Thy name;\nThe love of the Redeemer\nEnhances all Thy fame:\nCreator and Redeemer,\nAlmighty Saviour Lord,\nThe power and love that saved us\nFor ever be adored.","th":["The Person of Christ","Worship & Praise","Redemption","God's Love for Us"]}],"w":{"Worship & Praise":67,"God's Love for Us":100,"The Cross & Sufferings of Christ":33,"The Person of Christ":67,"Grace":33,"Redemption":33}},
"270":{"m":"S.M.","a":"John Nelson Darby (1800-1882)","tn":"Silchester","tc":"Henri Abraham Cesar Malan (1787-1864)","fl":"And shall we see Thy face,","v":[{"n":1,"t":"And shall we see Thy face,\nAnd hear Thy heavenly voice,\nWell known to us in present grace?\nWell may our hearts rejoice.","th":["The Lord's Coming / Rapture","Grace","Joy & Thanksgiving"]},{"n":2,"t":"With Thee in garments white,\nLord Jesus, we shall walk;\nAnd spotless in that heavenly light,\nOf all Thy sufferings talk.","th":["Heaven & The Father's House","The Cross & Sufferings of Christ","Fellowship & Gathering"]},{"n":3,"t":"Close to Thy trusted side,\nIn fellowship divine;\nNo cloud, no distance, e'er shall hide\nGlories that then shall shine.","th":["Fellowship & Gathering","Heaven & The Father's House"]},{"n":4,"t":"Fruit of Thy boundless love,\nThat gave Thyself for us;\nFor ever we shall with Thee prove\nThat Thou still lov'st us thus.","th":["God's Love for Us","The Cross & Sufferings of Christ"]},{"n":5,"t":"And we love Thee, blest Lord,\nE'en now, though feeble here,\nThy sorrow and Thy cross record\nWhat makes us know Thee near.","th":["The Cross & Sufferings of Christ","Our Love for The Son/Christ"]},{"n":6,"t":"We wait to see Thee, Lord,\nYet now within our hearts\nThou dwell'st in love that doth afford\nThe joy that love imparts.","th":["God's Love for Us","Our Love for The Son/Christ"]},{"n":7,"t":"Yet still we wait for Thee,\nTo see Thee as Thou art;\nBe with Thee, like Thee, Lord, and free\nTo love with all our heart.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","Our Love for The Son/Christ"]}],"w":{"The Lord's Coming / Rapture":29,"Grace":14,"Joy & Thanksgiving":14,"Heaven & The Father's House":43,"The Cross & Sufferings of Christ":43,"Fellowship & Gathering":29,"God's Love for Us":29,"Our Love for The Son/Christ":43}},
"271":{"m":"6.4.6.4.6.6.6.4.","a":"Anonymous","tn":"Lowry","tc":"Robert Lowry (1826-1899)","fl":"O God, through Christ we sing","v":[{"n":1,"t":"O God, through Christ we sing\nGlory to Thee;\nIn His blest name we bring\nGlory to Thee.\nHis heavenly face displays\nAll Thy refulgent rays,\nAnd wakes our hymn of praise,\nGlory to Thee.","th":["Worship & Praise","The Father","The Person of Christ"]},{"n":2,"t":"He gave, when here on earth,\nGlory to Thee;\nAngels had hailed His birth,\nGlory to Thee.\nThe wondrous works He wrought,\nThe precious truths He taught,\nHis holy footsteps brought\nGlory to Thee.","th":["The Person of Christ","Worship & Praise","The Father"]},{"n":3,"t":"On Calvary's cross He gave\nGlory to Thee;\nWon from the vanquished grave\nGlory to Thee:\nExalted now, and crowned,\nHim countless hosts surround,\nAnd swell the lofty sound,\nGlory to Thee.","th":["The Cross & Sufferings of Christ","Christ Risen & Glorified","Worship & Praise"]},{"n":4,"t":"With joy we strike the chord,\nGlory to Thee!\nAscribe, through Christ the Lord,\nGlory to Thee:\nIn Jesus' name shalt Thou\nConstrain all knees to bow;\nThrough Him we worship now;\nGlory to Thee!","th":["Worship & Praise","The Eternal Kingdom / Reign of Christ","The Person of Christ"]}],"w":{"Worship & Praise":100,"The Father":50,"The Person of Christ":75,"The Cross & Sufferings of Christ":25,"Christ Risen & Glorified":25,"The Eternal Kingdom / Reign of Christ":25}},
"272":{"m":"S.M.","a":"Albert Midlane (1825-1909)","tn":"Festal Song","tc":"W. H. Walter (1825-1893)","fl":"Revive Thy work, O Lord;","v":[{"n":1,"t":"Revive Thy work, O Lord;\nExalt Thy precious Name;\nAnd may Thy love in every heart\nBe kindled to a flame.","th":["Service & Devotion","Our Love for The Son/Christ"]},{"n":2,"t":"Revive Thy work, O Lord;\nCreate soul-thirst for Thee,\nAnd hungering for the bread of life,\nOh, may our spirits be.","th":["Service & Devotion","The Word of God"]},{"n":3,"t":"Revive Thy work, O Lord!\nGive power unto Thy Word;\nGrant that Thy bless\u00e8d Gospel may\nIn living faith be heard.","th":["The Word of God","Service & Devotion"]},{"n":4,"t":"Revive Thy work, O Lord;\nAnd give refreshing showers:\nThe glory shall be all Thine own;\nThe blessing, Lord, be ours!","th":["Service & Devotion","Worship & Praise"]}],"w":{"Service & Devotion":100,"Our Love for The Son/Christ":25,"The Word of God":50,"Worship & Praise":25}},
"273":{"m":"8.7.","a":"Bagstaff or Littlewood","tn":"Dominus Regit Me","tc":"J. B. Dykes (1823-1876)","fl":"O Lord, how does Thy mercy throw","v":[{"n":1,"t":"O Lord, how does Thy mercy throw\nIts guardian shadow o'er us,\nPreserving while we're here below,\nSafe to the rest before us.","th":["God's Love for Us","Assurance & Security","Pilgrimage / Desert Journey"]},{"n":2,"t":"As weaker than a bruised reed,\nWe cannot do without Thee;\nWe want Thee here each hour of need,\nShall want Thee too in glory.","th":["Assurance & Security","Heaven & The Father's House"]},{"n":3,"t":"And though our efforts now to praise\nAre often cold and lowly,\nA nobler, sweeter song we'll raise\nWith all Thy saints in glory.","th":["Worship & Praise","Heaven & The Father's House"]},{"n":4,"t":"We'll lay our trophies at Thy feet,\nWe'll worship and adore Thee,\nWhose precious blood has made us meet\nTo dwell with Thee in glory.","th":["Worship & Praise","The Precious Blood / Atonement","Heaven & The Father's House"]}],"w":{"God's Love for Us":25,"Assurance & Security":50,"Pilgrimage / Desert Journey":25,"Heaven & The Father's House":75,"Worship & Praise":50,"The Precious Blood / Atonement":25}},
"274":{"m":"6-8S.","a":"P. Gerhardt (1607-1676)","tn":"Stella","tc":"Anonymous","fl":"O Lord, Thy rich, Thy boundless love","v":[{"n":1,"t":"O Lord, Thy rich, Thy boundless love\nNo thought can reach, no tongue declare;\nO give our hearts its depths to prove,\nAnd reign without a rival there!\nFrom Thee, O Lord, we all receive,\nThine, wholly Thine, alone we'd live.","th":["God's Love for Us","Our Love for The Son/Christ"]},{"n":2,"t":"O Lord, how cheering is Thy way!\nHow blest, how gracious in our eyes!\nCare, anguish, sorrow, pass away,\nAnd fear before Thy presence flies.\nLord Jesus! nothing would we see,\nNothing desire, apart from Thee!","th":["God's Love for Us","Grace","Rest & Peace","Joy & Thanksgiving"]},{"n":3,"t":"In conflict be Thy love our peace!\nIn weakness be Thy love our strength!\nAnd when the storms of life shall cease,\nAnd Thou to meet us com'st at length,\nLord Jesus, then these hearts shall be\nFor ever satisfied with Thee.","th":["God's Love for Us","Trial & Conflict","Rest & Peace","The Lord's Coming / Rapture"]}],"w":{"God's Love for Us":100,"Our Love for The Son/Christ":33,"Grace":33,"Rest & Peace":67,"Joy & Thanksgiving":33,"Trial & Conflict":33,"The Lord's Coming / Rapture":33}},
"275":{"m":"C.M.","a":"Mary Bowley (Mrs Peters) (1813-1856)","tn":"Martyrdom","tc":"H. Wilson (1766-1824)","fl":"Our God is light: and though we go","v":[{"n":1,"t":"Our God is light: and though we go\nAcross a trackless wild,\nOur Saviour's footsteps ever show\nThe path for every child.","th":["Pilgrimage / Desert Journey","The Person of Christ","Assurance & Security"]},{"n":2,"t":"At every step afresh we prove\nHow sure our heavenly Guide;\nThe faithful and forbearing love\nThat never turns aside.","th":["Pilgrimage / Desert Journey","God's Love for Us","Assurance & Security"]},{"n":3,"t":"Thou weariest not, most gracious Lord,\nThough we may weary grow\nIn season, the sustaining word\nThou giv'st our hearts to know.","th":["God's Love for Us","The Word of God","Grace"]},{"n":4,"t":"Death's bitter waters met our thirst,\nThy cross has made them sweet;\nThen on our gladdened vision burst\nGod's shady, cool retreat.","th":["The Cross & Sufferings of Christ","Pilgrimage / Desert Journey"]},{"n":5,"t":"The manna and the springing well\nSuffice for every need;\nAnd Eshcol's grapes the story tell\nOf where Thy path doth lead.","th":["Pilgrimage / Desert Journey"]}],"w":{"Pilgrimage / Desert Journey":80,"The Person of Christ":20,"Assurance & Security":40,"God's Love for Us":40,"The Word of God":20,"Grace":20,"The Cross & Sufferings of Christ":20}},
"276":{"m":"8.7.8.7.4.7.","a":"William Williams (1717-1791)","tn":"Cwm Rhondda","tc":"J. Hughes (1873-1932)","fl":"Guide us, O Thou gracious Saviour,","v":[{"n":1,"t":"Guide us, O Thou gracious Saviour,\nPilgrims through this barren land;\nWe are weak, but Thou art mighty;\nHold us with Thy powerful hand;\nBread of heaven,\nFeed us now and evermore.","th":["Pilgrimage / Desert Journey","The Person of Christ","Grace"]},{"n":2,"t":"While we tread this vale of sorrow,\nMay we in Thy love abide:\nKeep us ever, gracious Saviour,\nCleaving closely to Thy side,\nStill relying\nOn the Father's changeless love.","th":["Pilgrimage / Desert Journey","God's Love for Us","The Father"]},{"n":3,"t":"Saviour, come, we long to see Thee\nLong to dwell with Thee above,\nAnd to know in full communion\nAll the sweetness of Thy love;\nCome, Lord Jesus,\nTake Thy waiting people home.","th":["The Lord's Coming / Rapture","God's Love for Us","Heaven & The Father's House","Our Love for The Son/Christ"]}],"w":{"Pilgrimage / Desert Journey":67,"The Person of Christ":33,"Grace":33,"God's Love for Us":67,"The Father":33,"The Lord's Coming / Rapture":33,"Heaven & The Father's House":33,"Our Love for The Son/Christ":33}},
"277":{"m":"6-8s.","a":"Joseph Swain (1761-1796)","tn":"Creation","tc":"Franz Joseph Haydn (1732-1809)","fl":"Christ's glory fills eternity,","v":[{"n":1,"t":"Christ's glory fills eternity,\nEternity which was and is;\nAnd all eternity to be\nWill shine with His undying praise;\nTo Him who lives but once was slain\nBe honour, power, and praise, Amen.","th":["Christ Risen & Glorified","Worship & Praise","The Cross & Sufferings of Christ"]},{"n":2,"t":"To Him who shines before our eyes\nIn robes of uncreated light;\nWhose glories ever on us rise\nAnd fill us with supreme delight;\nTo Him who lives but once was slain\nBe honour, power, and praise, Amen.","th":["Christ Risen & Glorified","The Person of Christ","Joy & Thanksgiving"]},{"n":3,"t":"To Him whose everlasting love\nSent forth those precious streams of grace,\nWhich made us long to dwell above,\nAnd led us to this blissful place;\nTo Him who lives but once was slain\nBe honour, power, and praise, Amen.","th":["God's Love for Us","Grace","Worship & Praise","The Cross & Sufferings of Christ"]}],"w":{"Christ Risen & Glorified":67,"Worship & Praise":67,"The Cross & Sufferings of Christ":67,"The Person of Christ":33,"Joy & Thanksgiving":33,"God's Love for Us":33,"Grace":33}},
"278":{"m":"C.M.","a":"James George Deck (1802-1884)","tn":"Spohr","tc":"L. Spohr (1785-1859)","fl":"Saviour, we long to follow Thee,","v":[{"n":1,"t":"Saviour, we long to follow Thee,\nDaily Thy cross to bear,\nAnd count all else, whate'er it be,\nUnworthy of our care.","th":["Service & Devotion","The Cross & Sufferings of Christ","Our Love for The Son/Christ"]},{"n":2,"t":"We are not now our own, but Thine,\nThe purchase of Thy blood,\nAnd made, by grace and love divine,\nThe sons and heirs of God.","th":["The Precious Blood / Atonement","Sonship & Adoption","Redemption"]},{"n":3,"t":"Thy Spirit, too, the present seal\nOf all the Father's love,\nDwells in our souls and does reveal,\nThe glorious rest above.","th":["The Holy Spirit","The Father","God's Love for Us","Heaven & The Father's House"]},{"n":4,"t":"Thy life is now beyond the grave;\nOur souls Thou hast set free;\nLife, strength, and grace in Thee we have,\nFor we are one with Thee.","th":["Christ Risen & Glorified","Redemption","Assurance & Security"]},{"n":5,"t":"O teach us so the power to know\nOf risen life with Thee;\nNot we may live while here below,\nBut Christ our life may be.","th":["Christ Risen & Glorified","New Creation","Service & Devotion"]}],"w":{"Service & Devotion":40,"The Cross & Sufferings of Christ":20,"Our Love for The Son/Christ":20,"The Precious Blood / Atonement":20,"Sonship & Adoption":20,"Redemption":40,"The Holy Spirit":20,"The Father":20,"God's Love for Us":20,"Heaven & The Father's House":20,"Christ Risen & Glorified":40,"Assurance & Security":20,"New Creation":20}},
