"110":{"m":"6-8s.","a":"James George Deck (1802-1884)","tn":"Treue Liebe","tc":"Anonymous","fl":"O GOD, Thou now hast glorified","v":[{"n":1,"t":"O GOD, Thou now hast glorified\nThy holy, blest eternal Son;\nThe Nazarene, the Crucified,\nNow sits exalted on Thy throne:\nTo Him in faith we cry aloud,\nWorthy art Thou, O Lamb of God.","th":["Christ Risen & Glorified","The Lamb of God","Worship & Praise","The Father"]},{"n":2,"t":"Father, Thy holy name we bless,\nAnd gladly hail Thy just decree\nThat every tongue shall soon confess\nJesus the Lord of all to be;\nBut oh, Thy grace has taught us now\nBefore that Lord the knee to bow.","th":["The Father","Worship & Praise","Grace","The Eternal Kingdom / Reign of Christ"]},{"n":3,"t":"Him as our Lord we gladly own:\nTo Him alone we now would live,\nWho bowed our hearts before Thy throne,\nAnd gave us all that love could give.\nOur willing voices cry aloud,\nWorthy art Thou, O Lamb of God.","th":["Worship & Praise","God's Love for Us","The Lamb of God","Our Love for The Father","Our Love for The Son/Christ"]}],"w":{"Christ Risen & Glorified":33,"The Lamb of God":67,"Worship & Praise":100,"The Father":67,"Grace":33,"The Eternal Kingdom / Reign of Christ":33,"God's Love for Us":33,"Our Love for The Father":33,"Our Love for The Son/Christ":33}},
"111":{"m":"7.6.","a":"Mary Bowley (Mrs Peters) (1813-1856)","tn":"Missionary","tc":"L. Mason (1792-1872)","fl":"BY Thee, O God, invited,","v":[{"n":1,"t":"BY Thee, O God, invited,\nWe look unto the Son,\nIn whom Thy soul delighted,\nWho all Thy will hath done;\nAnd by the one chief treasure\nThy bosom freely gave,\nThine own pure love we measure,\nThy willing mind to save.","th":["The Father","God's Love for Us","The Person of Christ"]},{"n":2,"t":"O God of mercy - Father!\nThe one unchanging claim,\nThe brightest hopes, we gather\nFrom Christ's most precious name:\nWhat always sounds so sweetly\nIn Thine unwearied ear,\nHas freed our souls completely\nFrom all our sinful fear.","th":["The Father","Grace","The Person of Christ","Forgiveness of Sins"]},{"n":3,"t":"The trembling sinner feareth\nThat God can ne'er forget,\nBut one full payment cleareth\nHis memory of all debt.\nWhen nought beside could free us\nOr set our souls at large,\nThy holy work, Lord Jesus,\nSecured a full discharge.","th":["The Precious Blood / Atonement","Forgiveness of Sins","The Cross & Sufferings of Christ"]},{"n":4,"t":"No wrath God's heart retaineth\nTo us-ward who believe;\nNo dread in ours remaineth\nAs we His love receive;\nReturning sons He kisses,\nAnd with His robe invests;\nHis perfect love dismisses\nAll terror from our breasts.","th":["Assurance & Security","God's Love for Us","Sonship & Adoption","Forgiveness of Sins"]}],"w":{"The Father":50,"God's Love for Us":50,"The Person of Christ":50,"Grace":25,"Forgiveness of Sins":75,"The Precious Blood / Atonement":25,"The Cross & Sufferings of Christ":25,"Assurance & Security":25,"Sonship & Adoption":25}},
"112":{"m":"P.M.","a":"T. Ryder","tn":"Resurrection Life","tc":"T. Ryder","fl":"\"BURIED with Christ,\" and raised with Him too;","v":[{"n":1,"t":"\"BURIED with Christ,\" and raised with Him too;\nWhat is there left for me to do?\nSimply to cease from struggling and strife,\nSimply to \"walk in newness of life.\"\nGlory be to God.","th":["New Creation","Christ Risen & Glorified","Worship & Praise"]},{"n":2,"t":"\"Risen with Christ,\" my glorious Head;\nHoliness now the pathway I tread,\nBeautiful thought, while walking therein:\n\"He that is dead is freed from sin.\"\nGlory be to God.","th":["Christ Risen & Glorified","New Creation","Forgiveness of Sins"]},{"n":3,"t":"\"Living with Christ,\" who \"dieth no more,\"\nFollowing Christ, who goeth before,\nI am from bondage utterly freed,\nReckoning self as \"dead indeed.\"\nGlory be to God.","th":["Christ Risen & Glorified","New Creation","Assurance & Security"]},{"n":4,"t":"Living for Christ,my members I yield,\nServants to God, for evermore sealed,\n\"Not under law,\" I'm now \"under grace,\"\nSin is dethroned, and Christ takes its place.\nGlory be to God.","th":["Service & Devotion","Grace","New Creation"]},{"n":5,"t":"Growing in Christ; no more shall be named\nThings of which now I'm truly ashamed,\n\"Fruit unto holiness\" will I bear,\nLife evermore, the end I shall share.\nGlory be to God.","th":["New Creation","Grace","Separation from the World"]}],"w":{"New Creation":100,"Christ Risen & Glorified":60,"Worship & Praise":20,"Forgiveness of Sins":20,"Assurance & Security":20,"Service & Devotion":20,"Grace":40,"Separation from the World":20}},
"113":{"m":"8.6.8.4.","a":"H. D'Arcy Champney (1854-1942)","tn":"St. Cuthbert","tc":"J. B. Dykes (1823-1876)","fl":"'TWAS not for our great love to Thee","v":[{"n":1,"t":"'TWAS not for our great love to Thee\nThat Thou didst send Thy Son;\nThat spring of love, O God, we see\nIn Thee alone.","th":["God's Love for Us","The Father"]},{"n":2,"t":"What love, Lord Jesus, brought Thee down\nOur hardened hearts to win,\nTo be despised and spit upon,\nAnd bear our sin!","th":["God's Love for Us","The Cross & Sufferings of Christ","The Person of Christ"]},{"n":3,"t":"The sins of many Thou didst bear,\nOf all who look to Thee,\nWhen God, Thy God, forsook Thee there\nOn Calvary's tree.","th":["The Precious Blood / Atonement","The Cross & Sufferings of Christ","Forgiveness of Sins"]},{"n":4,"t":"'Tis finished! loud triumphant cry,\nEre Thou didst yield Thy breath!\nThe veil was rent, and we draw nigh\nTo God, through death.","th":["The Cross & Sufferings of Christ","Redemption"]},{"n":5,"t":"That glorious resurrection morn\nBids doubts for ever cease,\nFor far and wide the news is borne\nOf perfect peace.","th":["Christ Risen & Glorified","Rest & Peace"]},{"n":6,"t":"Yes, peace! since every claim is met,\nLord Jesus, by Thy blood,\nAnd Thou \"our peace\" art risen and set\nOn high by God.","th":["The Precious Blood / Atonement","Rest & Peace","Christ Risen & Glorified"]},{"n":7,"t":"Thy grace, O Lord, alone revealed\nThat wondrous heart of Thine;\nWe thank Thee, and ourselves we yield\nTo love divine.","th":["Grace","God's Love for Us","Service & Devotion"]}],"w":{"God's Love for Us":43,"The Father":14,"The Cross & Sufferings of Christ":43,"The Person of Christ":14,"The Precious Blood / Atonement":29,"Forgiveness of Sins":14,"Redemption":14,"Christ Risen & Glorified":29,"Rest & Peace":29,"Grace":14,"Service & Devotion":14}},
"114":{"m":"7.6.","a":"Mary Bowley (Mrs Peters) (1813-1856)","tn":"Aurelia","tc":"S. S. Wesley (1810-1876)","fl":"THE holiest we enter","v":[{"n":1,"t":"THE holiest we enter\nIn perfect peace with God;\nThrough whom we found our centre\nIn Jesus and His blood:\nThough great may be our dullness\nIn thought and word and deed,\nWe glory in the fulness\nOf Him that meets our need.","th":["The Precious Blood / Atonement","Rest & Peace","Worship & Praise","The Person of Christ"]},{"n":2,"t":"Much incense is ascending\nBefore the eternal throne;\nGod graciously is bending\nTo hear each feeble one;\nTo all our prayers and praises\nChrist adds His sweet perfume,\nAnd He the censer raises\nThese odours to consume.","th":["Christ's Intercession / Priesthood","Worship & Praise"]},{"n":3,"t":"O God, we come with singing,\nBecause Thy great High Priest\nOur names to Thee is bringing,\nNor e'er forgets the least:\nFor us He wears the mitre,\nWhere \"Holiness\" shines bright;\nFor us His robes are whiter\nThan heaven's unsullied light.","th":["Christ's Intercession / Priesthood","Worship & Praise","The Person of Christ"]}],"w":{"The Precious Blood / Atonement":33,"Rest & Peace":33,"Worship & Praise":100,"The Person of Christ":67,"Christ's Intercession / Priesthood":67}},
"115":{"m":"7.7.4.4.7.","a":"G. Gilpin","tn":"Worship","tc":"Franz Joseph Haydn (1732-1809)","fl":"HEAD of the Church, Thy body,","v":[{"n":1,"t":"HEAD of the Church, Thy body,\nO Christ, the great salvation,\nSweet to the saints\nIt is to think\nOf all Thine exaltation;\nAll power's to Thee committed,\nAll power on earth, in heaven;\nTo Thee a name\nOf widest fame\nAbove all glory's given.","th":["The Church / Bride of Christ","Christ Risen & Glorified","The Person of Christ"]},{"n":2,"t":"With Thee believers rais\u00e8d\nIn Thee on high are seated;\nAll guilty once,\nBut cleared by Thee;\nRedemption-toil completed.\nAnd when Thou, Lord and Saviour,\nShalt come again in glory,\nThere by Thy side\nThy spotless bride\nShall crown the wondrous story.","th":["Christ Risen & Glorified","Redemption","The Church / Bride of Christ","The Lord's Coming / Rapture"]},{"n":3,"t":"At length, the final kingdom\nNo bound, no end possessing,\nWhen heaven and earth\nGod all in all\nShall fill with largest blessing:\nAll root of evil banished;\nNo breath of sin to wither;\nOn earth, on high,\nNought else but joy\nAnd blissful peace for ever.","th":["The Eternal Kingdom / Reign of Christ","Rest & Peace","Joy & Thanksgiving"]}],"w":{"The Church / Bride of Christ":67,"Christ Risen & Glorified":67,"The Person of Christ":33,"Redemption":33,"The Lord's Coming / Rapture":33,"The Eternal Kingdom / Reign of Christ":33,"Rest & Peace":33,"Joy & Thanksgiving":33}},
"116":{"m":"L.M.","a":"Nahum Tate (1652-1715)","tn":"Living Springs","tc":"Anonymous","fl":"O RENDER thanks to God above,","v":[{"n":1,"t":"O RENDER thanks to God above,\nThe fountain of eternal love,\nWhose mercy firm through ages past\nHath stood, and doth for ever last.","th":["Worship & Praise","God's Love for Us","Joy & Thanksgiving"]},{"n":2,"t":"The Father's boundless love we sing,\nThe fountain whence our blessings spring;\nHow great the depth, how high it flows,\nNo saint can tell, no angel knows.","th":["The Father","God's Love for Us","Worship & Praise"]},{"n":3,"t":"Its length and breadth no eye can trace,\nNo thought explore the bounds of grace;\nThe love that saved our souls from hell\nTranscends the creature's power to tell.","th":["Grace","God's Love for Us","Redemption"]}],"w":{"Worship & Praise":67,"God's Love for Us":100,"Joy & Thanksgiving":33,"The Father":33,"Grace":33,"Redemption":33}},
"117":{"m":"S.M.","a":"Augustus Montague Toplady (1740-1778)","tn":"Summerfield","tc":"Anonymous","fl":"NOT to ourselves we owe","v":[{"n":1,"t":"NOT to ourselves we owe\nThat we, O God, are Thine;\nJesus the Lord, our night broke through,\nAnd gave us light divine.","th":["Grace","The Person of Christ"]},{"n":2,"t":"The Father's grace and love\nThis bless\u00e8d mercy gave,\nAnd Jesus left the throne above,\nHis wandering sheep to save.","th":["The Father","Grace","God's Love for Us"]},{"n":3,"t":"No more the heirs of wrath -\nThy sovereign love we see;\nAnd, Father, in confiding faith\nWe cast our souls on Thee.","th":["Sonship & Adoption","God's Love for Us","The Father"]},{"n":4,"t":"Our hearts look up to see\nThe glory Thou hast given,\nIn spirit dwell where we shall be\nWith Christ, Thine heirs, in heaven.","th":["Heaven & The Father's House","Christ Risen & Glorified"]},{"n":5,"t":"With the adopted band\nSoon shall we see Him there:\nWith them and Him in glory stand,\nAnd in His honours share.","th":["Sonship & Adoption","Heaven & The Father's House","Christ Risen & Glorified"]}],"w":{"Grace":40,"The Person of Christ":20,"The Father":40,"God's Love for Us":40,"Sonship & Adoption":40,"Heaven & The Father's House":40,"Christ Risen & Glorified":40}},
"118":{"m":"L.M.","a":"Samuel Medley (1738-1799)","tn":"Vom Himmel Hoch","tc":"M. Luther (1483-1546)","fl":"AWAKE, each saint, in joyful lays,","v":[{"n":1,"t":"AWAKE, each saint, in joyful lays,\nTo sing the great Redeemer's praise;\nHe justly claims a song from thee:\nHis loving-kindness, oh how free!","th":["Worship & Praise","Redemption","God's Love for Us"]},{"n":2,"t":"He saw us ruined in the fall,\nYet loved us notwithstanding all:\nHe saved us from our lost estate:\nHis loving-kindness, oh how great!","th":["God's Love for Us","Redemption","Grace"]},{"n":3,"t":"Though numerous hosts of mighty foes,\nThough earth and hell, our way oppose,\nHe safely leads His saints along:\nHis loving-kindness, oh how strong!","th":["Assurance & Security","Trial & Conflict","God's Love for Us"]},{"n":4,"t":"When trouble, like a gloomy cloud,\nHas gathered thick, and thundered loud,\nHe with His Church has always stood;\nHis loving-kindness, oh how good!","th":["Trial & Conflict","The Church / Bride of Christ","God's Love for Us"]},{"n":5,"t":"Soon shall we mount and soar away\nTo the bright realms of endless day,\nAnd sing with rapture and surprise\nHis loving-kindness in the skies.","th":["Heaven & The Father's House","The Lord's Coming / Rapture","Joy & Thanksgiving","God's Love for Us"]}],"w":{"Worship & Praise":20,"Redemption":40,"God's Love for Us":100,"Grace":20,"Assurance & Security":20,"Trial & Conflict":40,"The Church / Bride of Christ":20,"Heaven & The Father's House":20,"The Lord's Coming / Rapture":20,"Joy & Thanksgiving":20}},
"119":{"m":"7.6.","a":"P. Gerhardt (1607-1676)","tn":"Passion Chorale","tc":"H. L. Hassler (1564-1612)","fl":"O HEAD once full of bruises,","v":[{"n":1,"t":"O HEAD once full of bruises,\nSo full of pain and scorn,\n'Mid other sore abuses\nMocked with a crown of thorn;\nO Head! e'en now surrounded\nWith brightest majesty,\nIn death once bowed and wounded\nOn the accurs\u00e8d tree.","th":["The Cross & Sufferings of Christ","Christ Risen & Glorified","The Person of Christ"]},{"n":2,"t":"Thou Countenance transcendent!\nThou life-creating Sun!\nTo worlds on Thee dependent -\nYet bruised and spit upon:\nO Lord! what Thee tormented\nWas our sin's heavy load,\nWe had the debt augmented\nWhich Thou didst pay in blood.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","Forgiveness of Sins"]},{"n":3,"t":"We give Thee thanks unfeign\u00e8d,\nO Saviour! Friend in need,\nFor what Thy soul sustain\u00e8d\nWhen Thou for us didst bleed;\nGrant us to lean unshaken\nUpon Thy faithfulness;\nUntil to glory taken,\nWe see Thee face to face.","th":["Joy & Thanksgiving","The Cross & Sufferings of Christ","Assurance & Security","Heaven & The Father's House"]}],"w":{"The Cross & Sufferings of Christ":100,"Christ Risen & Glorified":33,"The Person of Christ":33,"The Precious Blood / Atonement":33,"Forgiveness of Sins":33,"Joy & Thanksgiving":33,"Assurance & Security":33,"Heaven & The Father's House":33}},
"120":{"m":"8.8.6.","a":"Augustus Montague Toplady (1740-1778)","tn":"Meribah","tc":"L. Mason (1792-1872)","fl":"O THOU who didst Thy glory leave,","v":[{"n":1,"t":"O THOU who didst Thy glory leave,\nRebellious sinners to retrieve\nFrom nature's deadly fall!\nThou, Thou hast bought us with a price,\nOur sins against us ne'er can rise,\nFor Thou hast borne them all.","th":["The Cross & Sufferings of Christ","Redemption","The Precious Blood / Atonement","Forgiveness of Sins"]},{"n":2,"t":"See Him for our transgressions given;\nSee the blest Lamb of God from heaven,\nFor us, His foes, expire;\nRejoice! rejoice! the tidings hear!\nHe bore, that we might never bear,\n'Gainst sin, God's righteous ire.","th":["The Lamb of God","The Precious Blood / Atonement","The Cross & Sufferings of Christ","Joy & Thanksgiving"]},{"n":3,"t":"Ye saints, the Man of sorrows bless,\nThe Lord, for your unrighteousness\nDeputed to atone;\nPraise, till with all the ransomed throng\nYe sing the never-ending song,\nAnd sit upon His throne.","th":["Worship & Praise","The Precious Blood / Atonement","Heaven & The Father's House","The Eternal Kingdom / Reign of Christ"]}],"w":{"The Cross & Sufferings of Christ":67,"Redemption":33,"The Precious Blood / Atonement":100,"Forgiveness of Sins":33,"The Lamb of God":33,"Joy & Thanksgiving":33,"Worship & Praise":33,"Heaven & The Father's House":33,"The Eternal Kingdom / Reign of Christ":33}},
"121":{"m":"7s.","a":"Archibald J. Rutherford (19th Century)","tn":"Harts","tc":"B. Milgrove (1731-1810)","fl":"GLORY unto Jesus be!","v":[{"n":1,"t":"GLORY unto Jesus be!\nFrom the curse who set us free;\nAll our guilt on Him was laid;\nHe the ransom fully paid","th":["Worship & Praise","Redemption","Forgiveness of Sins","The Precious Blood / Atonement"]},{"n":2,"t":"All that bless\u00e8d work is done;\nGod's well-pleased with His Son;\nHe has raised Him from the dead,\nSet Him over all as Head.","th":["Christ Risen & Glorified","The Father"]},{"n":3,"t":"This we know, and cease to mourn,\nPatient wait His sure return:\nFor His saints with Him shall reign -\nCome, Lord Jesus, come! Amen!","th":["The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ","Assurance & Security"]}],"w":{"Worship & Praise":33,"Redemption":33,"Forgiveness of Sins":33,"The Precious Blood / Atonement":33,"Christ Risen & Glorified":33,"The Father":33,"The Lord's Coming / Rapture":33,"The Eternal Kingdom / Reign of Christ":33,"Assurance & Security":33}},
"122":{"m":"C.M.","a":"Sir Edward Denny (1796-1889)","tn":"St. Agnes","tc":"J. B. Dykes (1823-1876)","fl":"O LORD, the bright and bless\u00e8d hope,","v":[{"n":1,"t":"O LORD, the bright and bless\u00e8d hope,\nThat's cheered us through the past,\nOf full eternal rest in Thee,\nWill be fulfilled at last.","th":["The Lord's Coming / Rapture","Rest & Peace","Assurance & Security"]},{"n":2,"t":"Undazzled by the glorious light\nWhich shines upon Thy face,\nWe'll see Thee then without a cloud -\nBrought there through boundless grace.","th":["Grace","Heaven & The Father's House","Christ Risen & Glorified"]},{"n":3,"t":"Praise, endless praise, alone becomes\nThat bright and bless\u00e8d place,\nWhere every eye beholds unveiled,\nThe mysteries of Thy grace.","th":["Worship & Praise","Heaven & The Father's House","Grace"]},{"n":4,"t":"Past conflict then; O Lord, 'tis ours\nThrough everlasting days,\nTo sing our song of victory there,\nAnd only live to praise.","th":["Worship & Praise","Heaven & The Father's House","Joy & Thanksgiving"]}],"w":{"The Lord's Coming / Rapture":25,"Rest & Peace":25,"Assurance & Security":25,"Grace":50,"Heaven & The Father's House":75,"Christ Risen & Glorified":25,"Worship & Praise":50,"Joy & Thanksgiving":25}},
"123":{"m":"7s.","a":"James George Deck (1802-1884)","tn":"Mozart","tc":"Wolfgang Amadeus Mozart (1756-1791)","fl":"JESUS, spotless Lamb of God,","v":[{"n":1,"t":"JESUS, spotless Lamb of God,\nThou hast bought us with Thy blood;\nWe are Thine, and Thine alone,\nThis we gladly, fully own.","th":["The Lamb of God","The Precious Blood / Atonement","Our Love for The Son/Christ"]},{"n":2,"t":"Help us to confess Thy name,\nBear with joy the cross and shame;\nOnly seek to follow Thee,\nThough reproach our portion be.","th":["Service & Devotion","The Cross & Sufferings of Christ","Separation from the World"]},{"n":3,"t":"When we are to glory come,\nAnd have reached our heavenly home,\nLouder then each lip shall own,\nWe are Thine and Thine alone.","th":["Heaven & The Father's House","Worship & Praise"]}],"w":{"The Lamb of God":33,"The Precious Blood / Atonement":33,"Our Love for The Son/Christ":33,"Service & Devotion":33,"The Cross & Sufferings of Christ":33,"Separation from the World":33,"Heaven & The Father's House":33,"Worship & Praise":33}},
"124":{"m":"C.M.","a":"Miss A. E. Price (1838-1919)","tn":"Beatitudo","tc":"J. B. Dykes (1823-1876)","fl":"JESUS, our Lord, Thou Morning Star,","v":[{"n":1,"t":"JESUS, our Lord, Thou Morning Star,\nHow well we know Thy name,\nJesus, the Lord, the Crucified,\nIn glory still the same.","th":["The Person of Christ","The Cross & Sufferings of Christ","Christ Risen & Glorified"]},{"n":2,"t":"Jesus, the One who left the throne\nTo save a ruined race,\nThy love and lowliness still shine\nUpon Thy glorious face.","th":["God's Love for Us","Christ Risen & Glorified","Redemption"]},{"n":3,"t":"Jesus, the One who trod the earth,\nThe lowly, subject One,\nObedience unto death was Thine,\nGod's well-belov\u00e8d Son!","th":["The Person of Christ","The Cross & Sufferings of Christ","The Father"]},{"n":4,"t":"Jesus, what memories thrill our hearts\nOf Thy blest footprints here,\nWhile now to heaven our eyes we turn\nAnd gaze upon Thee there!","th":["The Person of Christ","Heaven & The Father's House","Our Love for The Son/Christ"]},{"n":5,"t":"Jesus, our Saviour, quickly come!\nThat we may with Thee be;\nHeaven's morning breaks and glory dawns,\nWhen Thy blest face we see.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","Joy & Thanksgiving"]}],"w":{"The Person of Christ":60,"The Cross & Sufferings of Christ":40,"Christ Risen & Glorified":40,"God's Love for Us":20,"Redemption":20,"The Father":20,"Heaven & The Father's House":40,"Our Love for The Son/Christ":20,"The Lord's Coming / Rapture":20,"Joy & Thanksgiving":20}},
"125":{"m":"C.M.","a":"Thomas Kelly (1769-1854)","tn":"Paraclete","tc":"F. C. Maker (1844-1927)","fl":"BEHOLD the Lamb with glory crowned,","v":[{"n":1,"t":"BEHOLD the Lamb with glory crowned,\nTo Him all power be given;\nNo place too high for Him is found,\nNo place too high in heaven.","th":["The Lamb of God","Christ Risen & Glorified","Worship & Praise"]},{"n":2,"t":"He fills the throne, the throne above,\nIts rights to Him belong;\nThe object of His Father's love,\nTheme of the ransomed's song.","th":["Christ Risen & Glorified","The Father","Worship & Praise","Redemption"]},{"n":3,"t":"Though high yet He accepts the praise\nHis people offer here;\nThe faintest, feeblest cry they raise\nWill reach the Saviour's ear.","th":["Worship & Praise","Christ's Intercession / Priesthood"]},{"n":4,"t":"This song be ours, and this alone,\nTo celebrate the name\nOf Him that sits upon the throne,\nAnd to exalt the Lamb.","th":["Worship & Praise","The Lamb of God"]},{"n":5,"t":"To Him whom men despise and slight\nTo Him be glory given;\nThe crown is His, and His by right\nThe highest place in heaven.","th":["Worship & Praise","Christ Risen & Glorified"]}],"w":{"The Lamb of God":40,"Christ Risen & Glorified":60,"Worship & Praise":100,"The Father":20,"Redemption":20,"Christ's Intercession / Priesthood":20}},
"126":{"m":"C.M.","a":"Theophilus Ruse","tn":"Attercliffe","tc":"W. Mather, 1802","fl":"JESUS, our Lord, with joy we wait","v":[{"n":1,"t":"JESUS, our Lord, with joy we wait\nTo see Thy bless\u00e8d face;\nThough weak on earth our present state,\nOur strength is in Thy grace.","th":["The Lord's Coming / Rapture","Grace","Our Love for The Son/Christ"]},{"n":2,"t":"Thy precious blood shed by that grace\nTo God has made us nigh,\nAnd sanctified us for the place\nOf worshippers on high.","th":["The Precious Blood / Atonement","Grace","Worship & Praise"]},{"n":3,"t":"By faith within the veil we're led,\nWhere Thou hast entered in;\n\"Not made with hands\" the courts we tread,\nNor e'er defiled by sin.","th":["Worship & Praise","Heaven & The Father's House"]},{"n":4,"t":"Responsive to the Father's heart\nIn worship we would bow;\nThy Spirit doth this grace impart\nTo those who trust Thee now.","th":["The Father","Worship & Praise","The Holy Spirit"]},{"n":5,"t":"The way, the worshippers, the place,\nAll sanctified by blood;\nThy Spirit leads - sweet fruit of grace -\nIn worship now to God.","th":["The Precious Blood / Atonement","Worship & Praise","The Holy Spirit","Grace"]}],"w":{"The Lord's Coming / Rapture":20,"Grace":60,"Our Love for The Son/Christ":20,"The Precious Blood / Atonement":40,"Worship & Praise":80,"Heaven & The Father's House":20,"The Father":20,"The Holy Spirit":40}},
"127":{"m":"C.M.","a":"Richard Burnham (1749-1810)","tn":"Nativity","tc":"H. Lahee (1826-1912)","fl":"COME, saints, your grateful voices raise","v":[{"n":1,"t":"COME, saints, your grateful voices raise\nFor grace's boundless store;\nDwell on the Lord's unchanging love,\nAnd praise Him evermore.","th":["Grace","Worship & Praise","God's Love for Us"]},{"n":2,"t":"His mercy, who our ransom paid,\nAnd all our sorrows bore,\nSing with a note of loftiest joy,\nAnd praise Him evermore.","th":["Redemption","The Cross & Sufferings of Christ","Worship & Praise"]},{"n":3,"t":"Soon the redeeming Lord shall come,\nAnd we whose sins He bore\nShall see the glories of the Lamb\nAnd praise Him evermore.","th":["The Lord's Coming / Rapture","Worship & Praise","The Lamb of God"]},{"n":4,"t":"Then endless praise our lips shall move,\nAnd joy our spirits fill;\nThe objects of His love divine,\nOh who that joy can tell?","th":["Joy & Thanksgiving","God's Love for Us","Worship & Praise"]}],"w":{"Grace":25,"Worship & Praise":100,"God's Love for Us":50,"Redemption":25,"The Cross & Sufferings of Christ":25,"The Lord's Coming / Rapture":25,"The Lamb of God":25,"Joy & Thanksgiving":25}},
"128":{"m":"L.M.","a":"R. Sandeman (1718-1771)","tn":"Dusseldorf","tc":"Robert Schumann (1810-1856)","fl":"SEE mercy, mercy from on high","v":[{"n":1,"t":"SEE mercy, mercy from on high\nDescend to rebels doomed to die;\n'Tis mercy free, which knows no bound;\nHow sweet, how pleasant is the sound!","th":["Grace","God's Love for Us"]},{"n":2,"t":"Soon as the reign of sin began,\nThe light of mercy dawned on man,\nWhen God announced the bless\u00e8d news,\n\"The woman's Seed thy head shall bruise.\"","th":["Redemption","Grace"]},{"n":3,"t":"Brightly it beamed on men forlorn,\nWhen Christ, the holy child, was born;\nAnd brighter still in splendour shone\nWhen Jesus, dying, cried, \" 'Tis done\".","th":["The Person of Christ","The Cross & Sufferings of Christ","God's Love for Us"]},{"n":4,"t":"Complete in power when He arose,\nAnd burst the bands of all His foes,\nThen captive led captivity,\nAnd took for us His seat on high.","th":["Christ Risen & Glorified","Redemption"]},{"n":5,"t":"Till we around Him there shall throng,\nThis mercy shall be still our song:\nFor God shall every scheme confound\nOf all that seek its course to bound.","th":["Worship & Praise","Grace"]}],"w":{"Grace":60,"God's Love for Us":40,"Redemption":40,"The Person of Christ":20,"The Cross & Sufferings of Christ":20,"Christ Risen & Glorified":20,"Worship & Praise":20}},
"129":{"m":"C.M.","a":"Thomas Kelly (1769-1854)","tn":"Milton","tc":"Anonymous","fl":"AWAKE each soul! awake each tongue!","v":[{"n":1,"t":"AWAKE each soul! awake each tongue!\nThe subject is divine;\nThe Saviour's love demands our song;\nLet all His people join.","th":["Worship & Praise","God's Love for Us"]},{"n":2,"t":"This Saviour is the Mighty God,\nThe God of heaven above;\nRevealed in flesh, He shed His blood,\nBlest proof of endless love.","th":["The Person of Christ","The Precious Blood / Atonement","God's Love for Us"]},{"n":3,"t":"0 Lord, Thy love exceeds our thought;\nBut this at least we see,\nThe soul that knows Thy love is taught\nTo value nought but Thee.","th":["God's Love for Us","Our Love for The Son/Christ"]},{"n":4,"t":"And though Thy love be faintly seen\nWhat's seen demands our praise;\nWithout it, Lord, we still had been\nEnsnared in Satan's ways.","th":["Worship & Praise","God's Love for Us","Redemption"]}],"w":{"Worship & Praise":50,"God's Love for Us":100,"The Person of Christ":25,"The Precious Blood / Atonement":25,"Our Love for The Son/Christ":25,"Redemption":25}},
"130":{"m":"6.6.6.6.8.8.","a":"C. Wesley (1707-1788)","tn":"Lischer","tc":"F. Schneider","fl":"WITH Christ our theme begins,","v":[{"n":1,"t":"WITH Christ our theme begins,\nThe Lord of truth and love;\nWhen He had purged our sins,\nHe took His seat above.\nOur hearts are glad; we raise the voice;\nThe Lord has made us to rejoice.","th":["The Person of Christ","Christ Risen & Glorified","Forgiveness of Sins","Joy & Thanksgiving"]},{"n":2,"t":"His power can never fail,\nHe'll rule o'er earth in heaven;\nThe keys of death and hell\nTo Him alone are given.\nOur hearts are glad; we raise the voice;\nThe Lord has made us to rejoice.","th":["The Eternal Kingdom / Reign of Christ","Christ Risen & Glorified","Joy & Thanksgiving"]},{"n":3,"t":"And sweet that bless\u00e8d hope:\nJesus the Lord shall come\nAnd take His brethren up\nE'en to His Father's home.\nOur hearts are glad; we raise the voice;\nThe Lord has made us to rejoice.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","Joy & Thanksgiving"]}],"w":{"The Person of Christ":33,"Christ Risen & Glorified":67,"Forgiveness of Sins":33,"Joy & Thanksgiving":100,"The Eternal Kingdom / Reign of Christ":33,"The Lord's Coming / Rapture":33,"Heaven & The Father's House":33}},
"131":{"m":"7s.","a":"James Montgomery (1771-1854)","tn":"Mozart","tc":"Wolfgang Amadeus Mozart (1756-1791)","fl":"PRAISE we to the Father give,","v":[{"n":1,"t":"PRAISE we to the Father give,\nGod in whom we move and live;\nChildren's praise He loves to hear;\nChildren's songs delight His ear.","th":["The Father","Worship & Praise","Sonship & Adoption"]},{"n":2,"t":"Praise we to the First-born bring,\nChrist the Prophet, Priest and King;\nGlad we raise our sweetest strain\nTo the Lamb that once was slain.","th":["Worship & Praise","The Lamb of God","Christ's Intercession / Priesthood"]},{"n":3,"t":"Praises for the Holy Ghost\nSent from heaven at Pentecost;\n'Tis through Him alone we live,\nAnd the precious truth receive.","th":["The Holy Spirit","Worship & Praise"]},{"n":4,"t":"Blest our portion, thus to be\nGlorying in the Trinity;\nFor the Gospel from above,\nFor the word that God is love.","th":["Joy & Thanksgiving","God's Love for Us","Worship & Praise"]}],"w":{"The Father":25,"Worship & Praise":100,"Sonship & Adoption":25,"The Lamb of God":25,"Christ's Intercession / Priesthood":25,"The Holy Spirit":25,"Joy & Thanksgiving":25,"God's Love for Us":25}},
"132":{"m":"S.M.","a":"George V. Wigram (1805-1879)","tn":"Carlisle","tc":"C. Lockhart (1745-1815)","fl":"THE person of the Christ,","v":[{"n":1,"t":"THE person of the Christ,\nEnfolding every grace,\nOnce slain, but now alive again,\nIn heaven demands our praise.","th":["The Person of Christ","Grace","Christ Risen & Glorified","Worship & Praise"]},{"n":2,"t":"Gladly of Him we sing,\nSince we with Him are dead;\nOur life is hid with Christ in God,\nIn Christ the church's Head.","th":["The Church / Bride of Christ","New Creation","Christ Risen & Glorified"]},{"n":3,"t":"The heavens are opened now!\nSound it through earth abroad;\nAnd we, by faith in heaven behold\nJesus the Christ our Lord.","th":["Christ Risen & Glorified","Worship & Praise"]}],"w":{"The Person of Christ":33,"Grace":33,"Christ Risen & Glorified":100,"Worship & Praise":67,"The Church / Bride of Christ":33,"New Creation":33}},
"133":{"m":"C.M.","a":"Jonathan Evans (1748-1809)","tn":"Miles' Lane","tc":"W. Shrubsole (1760-1806)","fl":"LET saints on earth their anthems raise,","v":[{"n":1,"t":"LET saints on earth their anthems raise,\nWho taste the Saviour's grace;\nSing, till in heaven they tune His praise,\nAnd hail Him Prince of Peace.","th":["Worship & Praise","Grace","Rest & Peace"]},{"n":2,"t":"Praise Him who laid His glory by,\nFor man's rebellious race;\nPraise Him who stooped to bleed and die,\nAnd hail Him Prince of Peace.","th":["Worship & Praise","The Cross & Sufferings of Christ","Rest & Peace"]},{"n":3,"t":"We soon shall reach the blissful shore,\nAnd view His glorious face,\nHis name for ever to adore,\nAnd hail Him Prince of Peace.","th":["Heaven & The Father's House","Worship & Praise","Christ Risen & Glorified"]}],"w":{"Worship & Praise":100,"Grace":33,"Rest & Peace":67,"The Cross & Sufferings of Christ":33,"Heaven & The Father's House":33,"Christ Risen & Glorified":33}},
"134":{"m":"8.7.8.7.7.7.","a":"Richard Holden (d. 1886)","tn":"Evening Prayer","tc":"L. Mason (1792-1872)","fl":"LORD of glory, we adore Thee,","v":[{"n":1,"t":"LORD of glory, we adore Thee,\nChrist of God, ascended high;\nHeart and soul we bow before Thee,\nGlorious now beyond the sky;\nThee we worship,\nThee we praise,\nExcellent in all Thy ways.","th":["Worship & Praise","Christ Risen & Glorified","The Person of Christ"]},{"n":2,"t":"Mighty King, with glory crown\u00e8d,\nRightful Heir and Lord of all:\nOnce rejected, scorned, disown\u00e8d,\nE'en by those Thou cam'st to call:\nThee we honour,\nThee adore,\nGlorious now and evermore.","th":["Christ Risen & Glorified","The Cross & Sufferings of Christ","Worship & Praise","The Eternal Kingdom / Reign of Christ"]},{"n":3,"t":"Lord of life, to death made subject,\nBlesser, yet a curse once made;\nOf Thy Father's heart the object,\nYet in depths of anguish laid:\nThee we gaze on,\nThee recall,\nBearing here our sorrows all.","th":["The Cross & Sufferings of Christ","The Father","The Lord's Supper / Remembrance"]},{"n":4,"t":"Royal robes shall soon invest Thee,\nRoyal splendours crown Thy brow;\nChrist of God, our souls confess Thee\nKing and Sovereign even now;\nThee we reverence,\nThee obey,\nOwn Thee Lord and Christ alway.","th":["The Eternal Kingdom / Reign of Christ","Worship & Praise","Our Love for The Son/Christ"]}],"w":{"Worship & Praise":75,"Christ Risen & Glorified":50,"The Person of Christ":25,"The Cross & Sufferings of Christ":50,"The Eternal Kingdom / Reign of Christ":50,"The Father":25,"The Lord's Supper / Remembrance":25,"Our Love for The Son/Christ":25}},
"135":{"m":"10s. or 11s.","a":"W. Yerbury (d. 1863)","tn":"Hanover","tc":"W. Croft (1678-1727)","fl":"WE joy in our God, and we sing of that love,","v":[{"n":1,"t":"WE joy in our God, and we sing of that love,\nSo sovereign and free, which did His heart move,\nWhen lost our condition, all ruined, undone,\nHe saw with compassion, and spared not His Son.","th":["God's Love for Us","Joy & Thanksgiving","The Father"]},{"n":2,"t":"His Son, His delight, His loved one He gave\nThe wrath to endure, by suffering to save;\nSure love so amazing, unmeasured, untold,\nSince Him it hath given, no good will withhold.","th":["The Cross & Sufferings of Christ","God's Love for Us","The Precious Blood / Atonement"]},{"n":5,"t":"We praise then our God; how rich is His grace!\nWe were far from Him once, estranged from His face.\nBy blood we are purchased, are cleansed and made nigh,\nAnd blessed in His presence,in Jesus on high.","th":["Worship & Praise","The Precious Blood / Atonement","Redemption","Grace"]}],"w":{"God's Love for Us":67,"Joy & Thanksgiving":33,"The Father":33,"The Cross & Sufferings of Christ":33,"The Precious Blood / Atonement":67,"Worship & Praise":33,"Redemption":33,"Grace":33}},
"136":{"m":"C.M.","a":"James George Deck (1802-1884)","tn":"Martyrdom","tc":"H. Wilson (1766-1824)","fl":"THE veil is rent: our souls draw near","v":[{"n":1,"t":"THE veil is rent: our souls draw near\nUnto the throne of grace;\nThe merits of the Lord appear,\nThey fill the holy place.","th":["The Precious Blood / Atonement","Grace","Worship & Praise"]},{"n":2,"t":"His precious blood avails us there\nAs we approach the throne;\nAnd His own wounds in heaven declare\nThe atoning work is done.","th":["The Precious Blood / Atonement","Christ's Intercession / Priesthood"]},{"n":3,"t":"'Tis finished: here our souls have rest,\nHis work can never fail;\nBy Him, our Sacrifice and Priest,\nWe pass within the veil.","th":["Rest & Peace","The Cross & Sufferings of Christ","Christ's Intercession / Priesthood"]},{"n":4,"t":"Within the holiest of all,\nCleansed by His precious blood,\nBefore the throne we prostrate fall,\nAnd worship Thee, O God.","th":["Worship & Praise","The Precious Blood / Atonement"]},{"n":5,"t":"Boldly the heart and voice we raise,\nHis blood, His name, our plea;\nAssured our prayers and songs of praise\nAscend, by Christ, to Thee.","th":["Worship & Praise","The Precious Blood / Atonement","Assurance & Security"]}],"w":{"The Precious Blood / Atonement":80,"Grace":20,"Worship & Praise":60,"Christ's Intercession / Priesthood":40,"Rest & Peace":20,"The Cross & Sufferings of Christ":20,"Assurance & Security":20}},
"137":{"m":"8.5.8.3.","a":"Inglis Fleming (1859-1955)","tn":"Stephanos","tc":"H. W. Baker (1821-1877)","fl":"JESUS, Lord, we joy before Thee,","v":[{"n":1,"t":"JESUS, Lord, we joy before Thee,\nSorrow's night is o'er;\nFoes are vanquished, Thou art Victor,\nEvermore.","th":["Christ Risen & Glorified","Joy & Thanksgiving"]},{"n":2,"t":"All the way Thy love has trodden,\nWe with gladness trace,\nAll Thy faithfulness and meekness,\nAll Thy grace.","th":["God's Love for Us","Grace","The Person of Christ"]},{"n":3,"t":"To Thy Father's will obedient,\nThou to death hast been,\nRighteousness and peace embracing\nThere are seen.","th":["The Cross & Sufferings of Christ","The Father","Rest & Peace"]},{"n":4,"t":"'Tis as risen, Lord, we hail Thee,\nShadows passed away;\nLove has triumphed; Thou hast made us\nThine for aye.","th":["Christ Risen & Glorified","God's Love for Us"]},{"n":5,"t":"Now the Father's name Thou tellest;\nJoy is in Thine heart;\nIn His love in which Thou dwellest\nWe have part.","th":["The Father","God's Love for Us","Joy & Thanksgiving"]},{"n":6,"t":"Joy we thus in Thee, Lord Jesus,\nGladly praising Thee;\nThine the triumph, Thine the glory\nEver be.","th":["Joy & Thanksgiving","Worship & Praise"]}],"w":{"Christ Risen & Glorified":33,"Joy & Thanksgiving":50,"God's Love for Us":50,"Grace":17,"The Person of Christ":17,"The Cross & Sufferings of Christ":17,"The Father":33,"Rest & Peace":17,"Worship & Praise":17}},
"138":{"m":"8.6.","a":"Mrs. Anne Ross Cousin (1824-1906)","tn":"Substitution","tc":"Ira D. Sankey (1840-1908)","fl":"O CHRIST, what burdens bowed Thy head!","v":[{"n":1,"t":"O CHRIST, what burdens bowed Thy head!\nOur load was laid on Thee;\nThou stoodest in the sinner's stead -\nTo bear all ill for me.\nA victim led, Thy blood was shed;\nNow there's no load for me.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","The Lamb of God"]},{"n":2,"t":"Death and the curse were in our cup -\nO Christ, 'twas full for Thee!\nBut Thou hast drained the last dark drop,\n'Tis empty now for me.\nThat bitter cup - love drank it up;\nLeft but the love for me.","th":["The Cross & Sufferings of Christ","God's Love for Us","The Precious Blood / Atonement"]},{"n":3,"t":"Jehovah lifted up His rod -\nO Christ, it fell on Thee!\nThou wast forsaken of Thy God;\nNo distance now for me.\nThy blood beneath that rod has flowed:\nThy bruising healeth me.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement"]},{"n":4,"t":"The tempest's awful voice was heard,\nO Christ, it broke on Thee;\nThy open bosom was my ward;\nIt bore the storm for me.\nThy form was scarred, Thy visage marred;\nNow cloudless peace for me.","th":["The Cross & Sufferings of Christ","Rest & Peace"]},{"n":5,"t":"For me, Lord Jesus, Thou hast died,\nAnd I have died in Thee;\nThou'rt risen: my bands are all untied;\nAnd now Thou liv'st in me.\nThe Father's face of radiant grace\nShines now in light on me.","th":["The Cross & Sufferings of Christ","Christ Risen & Glorified","The Father","New Creation"]}],"w":{"The Cross & Sufferings of Christ":100,"The Precious Blood / Atonement":60,"The Lamb of God":20,"God's Love for Us":20,"Rest & Peace":20,"Christ Risen & Glorified":20,"The Father":20,"New Creation":20}},
"139":{"m":"8s. or 9s.","a":"John Nelson Darby (1800-1882)","tn":"De Fleury","tc":"Anonymous","fl":"THIS world is a wilderness wide;","v":[{"n":1,"t":"THIS world is a wilderness wide;\nWe have nothing to seek or to choose;\nWe've no thought in the waste to abide;\nWe've nought to regret nor to lose.","th":["Pilgrimage / Desert Journey","Separation from the World"]},{"n":2,"t":"The Lord is Himself gone before,\nHe has marked out the path that we tread;\nIt's as sure as the love we adore,\nWe have nothing to fear nor to dread.","th":["Pilgrimage / Desert Journey","God's Love for Us","Assurance & Security"]},{"n":3,"t":"There is but that one in the waste,\nWhich His footsteps have marked as His own;\nAnd we follow in diligent haste\nTo the seats where He's put on His crown.","th":["Pilgrimage / Desert Journey","Christ Risen & Glorified"]},{"n":4,"t":"For the path where our Saviour is gone\nHas led up to His Father and God,\nTo the place where He's now on the throne;\nAnd His strength shall be ours on the road.","th":["Heaven & The Father's House","The Father","Pilgrimage / Desert Journey"]},{"n":5,"t":"And with Him shall our rest be on high,\nWhen in holiness bright we sit down,\nIn the joy of His love ever nigh,\nIn the peace that His presence shall crown.","th":["Rest & Peace","Heaven & The Father's House","Joy & Thanksgiving"]},{"n":6,"t":"'Tis the treasure we've found in His love,\nThat has made us now pilgrims below,\nAnd 'tis there, when we reach Him above,\nAs we're known, all His fulness we'll know.","th":["God's Love for Us","Pilgrimage / Desert Journey","Heaven & The Father's House"]},{"n":7,"t":"And, Saviour, 'tis Thee from on high,\nWe await till the time Thou shalt come,\nTo take those Thou hast led by Thine eye\nTo Thyself in Thy heavenly home.","th":["The Lord's Coming / Rapture","Heaven & The Father's House"]},{"n":8,"t":"Till then 'tis the path Thou hast trod,\nOur delight and our comfort shall be;\nWe're content with Thy staff and Thy rod,\nTill with Thee all Thy glory we see.","th":["Pilgrimage / Desert Journey","Heaven & The Father's House","Our Love for The Son/Christ"]}],"w":{"Pilgrimage / Desert Journey":75,"Separation from the World":12,"God's Love for Us":25,"Assurance & Security":12,"Christ Risen & Glorified":12,"Heaven & The Father's House":62,"The Father":12,"Rest & Peace":12,"Joy & Thanksgiving":12,"The Lord's Coming / Rapture":12,"Our Love for The Son/Christ":12}},
"140":{"m":"7.6.","a":"George West Frazer (1830-1896)","tn":"St. Theodulph","tc":"M. Teschner (1584-1635)","fl":"O LORD, our hearts are waiting","v":[{"n":1,"t":"O LORD, our hearts are waiting\nThe archangel's heaven-sent cry,\nWhich wakes the church now sleeping,\nAnd to Thee brings them nigh.\nWhen we, with them ascending,\nShall meet Thee in the air,\nTo gaze upon Thy glory,\nAnd all Thy likeness bear.","th":["The Lord's Coming / Rapture","The Church / Bride of Christ","Christ Risen & Glorified"]},{"n":2,"t":"O hour, for which in patience\nThou'st waited through the night,\nWhilst we Thy saints were gathered,\nAnd brought into the light;\nThen, then, the church completed,\nGod makes no more delay;\nO Lord, with shouts of triumph,\nWe pass into the day.","th":["The Lord's Coming / Rapture","The Church / Bride of Christ"]},{"n":3,"t":"O hour of richest blessing,\nWhen brought to Thee so nigh,\nTo be Thy joy for ever,\nWe share Thy throne on high;\nTo rest in all that brightness,\nAnd ever there abide;\nTo find Thy heart delighting\nIn us, Thy ransomed bride.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","The Church / Bride of Christ","Joy & Thanksgiving"]},{"n":4,"t":"O bless\u00e8d, coming Saviour,\nSpeak, then, the joyous word,\nTo which our hearts responding -\n\"For ever with the Lord\",\nFor ever with Thee, Saviour -\nWe evermore shall be,\nIn deepest, fullest blessing\nFor ever one with Thee.","th":["The Lord's Coming / Rapture","Assurance & Security","Joy & Thanksgiving"]}],"w":{"The Lord's Coming / Rapture":100,"The Church / Bride of Christ":75,"Christ Risen & Glorified":25,"Heaven & The Father's House":25,"Joy & Thanksgiving":50,"Assurance & Security":25}},
"141":{"m":"7.6.","a":"George West Frazer (1830-1896)","tn":"Ellacombe","tc":"Anonymous","fl":"IN deep, eternal counsel,","v":[{"n":1,"t":"IN deep, eternal counsel,\nBefore the world was made,\nBefore its deep foundations\nOn nothingness were laid,\nGod purposed us for blessing,\nAnd chose us in His Son,\nTo Him to be conform\u00e8d,\nWhen here our course was run.","th":["The Father","Sonship & Adoption","God's Love for Us"]},{"n":2,"t":"In present, blest acceptance\nIn Him who came to die;\nIn Him who now is seated\nAt God's right hand on high;\nIn grace which is unchanging,\nWe stand from day to day,\nAnd prove the boundless mercies\nWhich strew our pilgrim way.","th":["Grace","Christ Risen & Glorified","Assurance & Security","Pilgrimage / Desert Journey"]},{"n":3,"t":"And when the day of glory\nShall burst upon this scene,\nDispelling all the darkness\nWhich deep'ning still had been;\nOh, then He'll come in brightness,\nWhom every eye shall see,\nArrayed in power and glory;\nAnd we shall with Him be.","th":["The Lord's Coming / Rapture","Christ Risen & Glorified"]},{"n":4,"t":"For He who left the glory,\nTo die upon the tree,\nWill soon complete the story\nAnd come again; and we\nConform\u00e8d to His image,\nAs known, be brought to know;\nAnd with increasing fervour\nOur ceaseless praise shall flow.","th":["The Cross & Sufferings of Christ","The Lord's Coming / Rapture","Worship & Praise"]}],"w":{"The Father":25,"Sonship & Adoption":25,"God's Love for Us":25,"Grace":25,"Christ Risen & Glorified":50,"Assurance & Security":25,"Pilgrimage / Desert Journey":25,"The Lord's Coming / Rapture":50,"The Cross & Sufferings of Christ":25,"Worship & Praise":25}},
"142":{"m":"6.6.4 6.6.6.4.","a":"Thomas Kelly (1769-1854)","tn":"Olivet","tc":"L. Mason (1792-1872)","fl":"GLORY to God on high,","v":[{"n":1,"t":"GLORY to God on high,\nPeace upon earth and joy,\nGoodwill to man!\nWe who God's blessing prove,\nHis name all names above,\nSing now the Saviour's love,\nToo vast to scan.","th":["Worship & Praise","Rest & Peace","God's Love for Us"]},{"n":2,"t":"Mercy and truth unite,\nOh, 'tis a wondrous sight,\nAll sights above!\nJesus the curse sustains,\nGuilt's bitter cup He drains,\nNothing for us remains,\nNothing but love.","th":["The Cross & Sufferings of Christ","God's Love for Us","The Precious Blood / Atonement"]},{"n":3,"t":"Love that no tongue can teach,\nLove that no thought can reach,\nNo love like His!\nGod is its bless\u00e8d source,\nDeath ne'er can stop its course,\nNothing can stay its force,\nMatchless it is.","th":["God's Love for Us"]},{"n":4,"t":"Blest in this love we sing,\nTo God our praises bring,\nAll sins forgiven:\nJesus, our Lord, to Thee\nHonour and majesty\nNow and for ever be\nHere, and in heaven.","th":["Worship & Praise","Forgiveness of Sins","Joy & Thanksgiving","Heaven & The Father's House"]}],"w":{"Worship & Praise":50,"Rest & Peace":25,"God's Love for Us":75,"The Cross & Sufferings of Christ":25,"The Precious Blood / Atonement":25,"Forgiveness of Sins":25,"Joy & Thanksgiving":25,"Heaven & The Father's House":25}},
"143":{"m":"7s.","a":"Robert Cleaver Chapman (1803-1902)","tn":"Innocents","tc":"G. B. Pergolesi (1710-1736)","fl":"KING of glory, set on high,","v":[{"n":1,"t":"KING of glory, set on high,\nGirt with strength and majesty,\nWe Thy holy name confess,\nThee with adoration bless.","th":["Worship & Praise","Christ Risen & Glorified","The Person of Christ"]},{"n":2,"t":"Jesus, mighty Son of God,\nWondrous gift on man bestowed!\nMany crowns are on Thy head,\nGlorious First-born from the dead.","th":["The Person of Christ","Christ Risen & Glorified","The Lamb of God"]},{"n":3,"t":"Gladly, Lord, we bow the knee,\nBy the Father's just decree,\nTo His own anointed One,\nTo His well-belov\u00e8d Son.","th":["Worship & Praise","The Father","The Person of Christ"]}],"w":{"Worship & Praise":67,"Christ Risen & Glorified":67,"The Person of Christ":100,"The Lamb of God":33,"The Father":33}},
"144":{"m":"C.M.","a":"I Watts (1674-1748)","tn":"Arlington C.M., Doxology","tc":"T. A. Arne (1710-1778)","fl":"SALVATION! Oh, the joyful sound!","v":[{"n":1,"t":"SALVATION! Oh, the joyful sound!\nWhat pleasure to our ears!\nA sovereign balm for every wound,\nA cordial for our fears!\n8s.\nGlory, honour, praise and power,\nBe unto the Lamb for ever !\nJesus Christ is our Redeemer!\nHallelujah! praise ye the Lord.","th":["Redemption","Joy & Thanksgiving","Worship & Praise","The Lamb of God"]},{"n":2,"t":"Salvation! O ascended Lamb,\nTo Thee the praise belongs;\nSalvation shall inspire our hearts,\nAnd dwell upon our tongues.","th":["Redemption","Worship & Praise","The Lamb of God"]}],"w":{"Redemption":100,"Joy & Thanksgiving":50,"Worship & Praise":100,"The Lamb of God":100}},
"145":{"m":"S.M.","a":"Sir Edward Denny (1796-1889)","tn":"Silchester","tc":"Henri Abraham Cesar Malan (1787-1864)","fl":"SAVIOUR, in love divine,","v":[{"n":1,"t":"SAVIOUR, in love divine,\n'Tis Thou hast made us free\nTo eat the bread and drink the wine\nIn memory, Lord, of Thee.","th":["The Lord's Supper / Remembrance","God's Love for Us","Redemption"]},{"n":2,"t":"Here every welcome guest\nWaits, Lord, from Thee to learn\nThe secrets of Thy Father's breast,\nAnd all Thy grace discern.","th":["The Lord's Supper / Remembrance","The Father","Grace"]},{"n":3,"t":"Conscience has closed its strife,\nAnd faith delights to prove\nThe sweetness of the Bread of life,\nThe fulness of Thy love.","th":["Rest & Peace","God's Love for Us","Assurance & Security"]},{"n":4,"t":"Oh, if this taste of love\nTo us is now so sweet,\nWhat will it be, O Lord, above\nThy bless\u00e8d self to meet?","th":["God's Love for Us","Heaven & The Father's House"]},{"n":5,"t":"To see Thee face to face,\nThy perfect likeness wear,\nAnd all Thy ways of wondrous grace\nThrough endless years declare!","th":["Heaven & The Father's House","The Lord's Coming / Rapture","Grace"]}],"w":{"The Lord's Supper / Remembrance":40,"God's Love for Us":60,"Redemption":20,"The Father":20,"Grace":40,"Rest & Peace":20,"Assurance & Security":20,"Heaven & The Father's House":40,"The Lord's Coming / Rapture":20}},
"146":{"m":"S.M.","a":"James George Deck (1802-1884)","tn":"Dennis","tc":"J. H. G. Naegeli (1768-1836)","fl":"WE bless our Saviour's name;","v":[{"n":1,"t":"WE bless our Saviour's name;\nOur sins are all forgiven:\nTo suffer once to earth He came;\nHe now is crowned in heaven.","th":["Forgiveness of Sins","Christ Risen & Glorified","Worship & Praise"]},{"n":2,"t":"His precious blood was shed,\nHis body bruised for sin;\nRemembering Him, we break the bread,\nAnd, thankful, drink the wine.","th":["The Precious Blood / Atonement","The Lord's Supper / Remembrance","The Cross & Sufferings of Christ"]},{"n":3,"t":"Lord, let us ne'er forget\nThy rich, Thy precious love,\nOur theme of joy and wonder here,\nOur endless song above.","th":["God's Love for Us","Joy & Thanksgiving","Our Love for The Son/Christ"]},{"n":4,"t":"O let Thy love constrain\nOur souls to cleave to Thee,\nAnd ever in our hearts remain\nThat word, Remember me.","th":["God's Love for Us","The Lord's Supper / Remembrance","Our Love for The Son/Christ"]}],"w":{"Forgiveness of Sins":25,"Christ Risen & Glorified":25,"Worship & Praise":25,"The Precious Blood / Atonement":25,"The Lord's Supper / Remembrance":50,"The Cross & Sufferings of Christ":25,"God's Love for Us":50,"Joy & Thanksgiving":25,"Our Love for The Son/Christ":50}},
"147":{"m":"8.6.","a":"John Mason (d. 1694)","tn":"Green Hill","tc":"G. C. Stebbins (1846-1945)","fl":"TO Him that loved us, gave Himself,","v":[{"n":1,"t":"TO Him that loved us, gave Himself,\nAnd died to do us good;\nHas washed us from our scarlet sins\nIn His most precious blood;\nWho made us kings and priests to God,\nHis Father infinite;\nTo Him eternal glory be,\nAnd everlasting might.","th":["God's Love for Us","The Precious Blood / Atonement","Redemption","Worship & Praise"]},{"n":2,"t":"Through Him to God, the God most high,\nPraise for all grace be given;\nWhose gifts through all eternity\nWe'll gladly sing in heaven;\nHis Christ has loved us, given Himself,\nAnd died to do us good,\nHas washed us from our scarlet sins\nIn His own precious blood.","th":["Worship & Praise","The Father","The Precious Blood / Atonement","Heaven & The Father's House"]}],"w":{"God's Love for Us":50,"The Precious Blood / Atonement":100,"Redemption":50,"Worship & Praise":100,"The Father":50,"Heaven & The Father's House":50}},
"148":{"m":"8.7.","a":"Miss Catherine Helene von Poseck (1859-1953)","tn":"Faith's Expectancy","tc":"Anonymous","fl":"HERE around Thy table gathered,","v":[{"n":1,"t":"HERE around Thy table gathered,\nShowing forth Thy dying love,\nLooking back upon Thy sorrow,\nJoying in Thy joy above,\nNow as one we raise our voices,\nAnd we plead Thy parting word:\nCome, Thou risen Christ, to claim us;\nWe are waiting for Thee, Lord.","th":["The Lord's Supper / Remembrance","The Cross & Sufferings of Christ","Christ Risen & Glorified","The Lord's Coming / Rapture","Fellowship & Gathering"]},{"n":2,"t":"'Tis Thy face we yearn to gaze on,\n'Tis Thy voice we long to hear;\n'Tis with Thee we would be dwelling;\n'Tis Thy likeness we would bear.\nLord, the Spirit cries within us,\nCome and take Thy heavenly bride; .\nThou and we shall then, Lord Jesus,\nBe for ever satisfied.","th":["The Lord's Coming / Rapture","The Church / Bride of Christ","The Holy Spirit","Our Love for The Son/Christ"]}],"w":{"The Lord's Supper / Remembrance":50,"The Cross & Sufferings of Christ":50,"Christ Risen & Glorified":50,"The Lord's Coming / Rapture":100,"Fellowship & Gathering":50,"The Church / Bride of Christ":50,"The Holy Spirit":50,"Our Love for The Son/Christ":50}},
"149":{"m":"7.6.","a":"James George Deck (1802-1884)","tn":"St. Christopher","tc":"F. C. Maker (1844-1927)","fl":"LORD Jesus, we remember","v":[{"n":1,"t":"LORD Jesus, we remember\nThe travail of Thy soul,\nWhen, through Thy love's deep pity,\nThe waves did o'er Thee roll;\nBaptised in death's dark waters,\nFor us Thy blood was shed;\nFor us Thou, Lord of glory,\nWast numbered with the dead.","th":["The Lord's Supper / Remembrance","The Cross & Sufferings of Christ","The Precious Blood / Atonement","God's Love for Us"]},{"n":2,"t":"O Lord! Thou now art risen,\nThy travail all is o'er;\nFor sin Thou once hast suffered,\nThou liv'st to die no more;\nSin, death and hell are vanquished\nBy Thee, the church's Head;\nAnd lo! we share Thy triumphs,\nThou First-born from the dead.","th":["Christ Risen & Glorified","The Church / Bride of Christ","Redemption"]},{"n":3,"t":"Unto Thy death baptis\u00e8d,\nWe own with Thee we died:\nWith Thee, our Life, we're risen,\nAnd shall be glorified.\nFrom sin, the world, and Satan,\nWe're ransomed by Thy blood,\nAnd here would walk as strangers,\nAlive with Thee to God.","th":["New Creation","Christ Risen & Glorified","The Precious Blood / Atonement","Separation from the World","Redemption"]}],"w":{"The Lord's Supper / Remembrance":33,"The Cross & Sufferings of Christ":33,"The Precious Blood / Atonement":67,"God's Love for Us":33,"Christ Risen & Glorified":67,"The Church / Bride of Christ":33,"Redemption":67,"New Creation":33,"Separation from the World":33}},
"150":{"m":"8.6.8.6.8.8.","a":"Josiah Conder (1789-1855)","tn":"Arabia","tc":"W. Wilson, 1820","fl":"THOU art the everlasting Word,","v":[{"n":1,"t":"THOU art the everlasting Word,\nThe Father's only Son;\nGod manifest, God seen and heard,\nThe heaven's belov\u00e8d One;\nWorthy, O Lamb of God, art Thou,\nThat every knee to Thee should bow!","th":["The Person of Christ","The Father","The Lamb of God","Worship & Praise"]},{"n":2,"t":"In Thee, most perfectly expressed,\nThe Father's self doth shine;\nFulness of Godhead, too: the Blest,\nEternally Divine;\nWorthy, O Lamb of God, art Thou,\nThat every knee to Thee should bow!","th":["The Person of Christ","The Father","Worship & Praise"]},{"n":3,"t":"Image of the of the Infinite\nWhose being none can know;\nBrightness of light no eye hath seen,\nGod's love revealed below;\nWorthy, O Lamb of God, art Thou,\nThat every knee to Thee should!","th":["The Person of Christ","God's Love for Us","Worship & Praise"]},{"n":4,"t":"The higher mysteries of Thy fame\nThe creature's grasp transcend;\nThe Father only Thy blest name\nOf Son can comprehend.\nWorthy, O Lamb of God, art Thou,\nThat every knee to Thee should bow!","th":["The Person of Christ","The Father","The Lamb of God"]},{"n":5,"t":"Yet loving Thee, on whom His love\nIneffable doth rest,\nThe worshippers, O Lord, above,\nAs one with Thee, are blest;\nWorthy, O Lamb of God, art Thou,\nThat every knee to Thee should bow!","th":["God's Love for Us","Worship & Praise","The Lamb of God"]},{"n":6,"t":"Of the vast universe of bliss,\nThe centre Thou, and Sun;\nThe eternal theme of praise is this,\nTo Heaven's belov\u00e8d One,\nWorthy, O Lamb of God, art Thou,\nThat every knee to Thee should bow!","th":["Worship & Praise","The Person of Christ","The Lamb of God"]}],"w":{"The Person of Christ":83,"The Father":50,"The Lamb of God":67,"Worship & Praise":83,"God's Love for Us":33}},
"151":{"m":"C.M.","a":"James George Deck (1802-1884)","tn":"Wiltshire","tc":"G. T. Smart (1776-1867)","fl":"LORD Jesus, when we think of Thee,","v":[{"n":1,"t":"LORD Jesus, when we think of Thee,\nOf all Thy love and grace,\nOur spirits long and fain would see\nThy beauty, face to face.","th":["God's Love for Us","Grace","Our Love for The Son/Christ"]},{"n":2,"t":"And though the wilderness we tread,\nA barren, thirsty ground,\nWith thorns and briars overspread,\nWhere foes and snares abound,","th":["Pilgrimage / Desert Journey","Trial & Conflict"]},{"n":3,"t":"Yet in Thy love such depths we see,\nOur souls o'erflow with praise -\nContent ourselves, while, Lord, to Thee\nA joyful song we raise.","th":["God's Love for Us","Joy & Thanksgiving","Worship & Praise"]},{"n":4,"t":"Our Lord, our Life, our Rest, our Shield,\nOur Rock, our Food, our Light;\nEach thought of Thee doth constant yield\nUnchanging, fresh delight.","th":["The Person of Christ","Rest & Peace","Joy & Thanksgiving"]},{"n":5,"t":"Blest Saviour, keep our spirits stayed,\nHard following after Thee,\nTill we, in robes of white arrayed,\nThy face in glory see.","th":["Pilgrimage / Desert Journey","Heaven & The Father's House","Assurance & Security"]}],"w":{"God's Love for Us":40,"Grace":20,"Our Love for The Son/Christ":20,"Pilgrimage / Desert Journey":40,"Trial & Conflict":20,"Joy & Thanksgiving":40,"Worship & Praise":20,"The Person of Christ":20,"Rest & Peace":20,"Heaven & The Father's House":20,"Assurance & Security":20}},
"152":{"m":"7.7.8.7.","a":"W. Yerbury (d. 1863)","tn":"Victory","tc":"Anonymous","fl":"THY name we love, Lord Jesus;","v":[{"n":1,"t":"THY name we love, Lord Jesus;\nAnd lowly bow before Thee;\nAnd while we live, to Thee we give,\nAll blessing, worship, glory;\nWe sing aloud Thy praises,\nOur hearts and voices blending\n'Tis Thou alone we worthy own;\nThy beauty's all transcending","th":["Worship & Praise","The Person of Christ","Our Love for The Son/Christ"]},{"n":2,"t":"Thy name we love, Lord Jesus;\nIt tells God's love unbounded\nTo ruined man, ere time began,\nOr heaven and earth were founded;\nThine is a love eternal,\nThat found in us its pleasure,\nThat brought Thee low, to bear our woe,\nAnd make us Thine own treasure.","th":["God's Love for Us","The Cross & Sufferings of Christ","Our Love for The Father","Our Love for The Son/Christ"]},{"n":3,"t":"Thy name we love, Lord Jesus;\nIt tells Thy birth so lowly,\nThy patience, grace, Thy gentleness,\nThy lonely path, so holy;\nThou wast the Man of sorrows:\nOur grief, too, Thou didst bear it;\nThe bitter cup, Thou drankest up;\nThe thorny crown, didst wear it.","th":["The Person of Christ","The Cross & Sufferings of Christ","Grace"]},{"n":4,"t":"Thy name we love, Lord Jesus;\nGod's Lamb Thou wast ordain\u00e8d\nTo bear our sins (Thyself all clean) -\nOur judgment hast sustain\u00e8d;\nWe see Thee crowned in glory,\nAbove the heavens now seated,\nThe victory won, Thy work well done,\nOur righteousness completed.","th":["The Lamb of God","The Precious Blood / Atonement","Christ Risen & Glorified"]}],"w":{"Worship & Praise":25,"The Person of Christ":50,"Our Love for The Son/Christ":50,"God's Love for Us":25,"The Cross & Sufferings of Christ":50,"Our Love for The Father":25,"Grace":25,"The Lamb of God":25,"The Precious Blood / Atonement":25,"Christ Risen & Glorified":25}},
"153":{"m":"S.M.","a":"Mary Bowley (Mrs Peters) (1813-1856)","tn":"Moreland","tc":"Anonymous","fl":"WHOM have we, Lord, but Thee,","v":[{"n":1,"t":"WHOM have we, Lord, but Thee,\nSoul thirst to satisfy?\nExhaustless spring! The waters free!\nAll other streams are dry.","th":["The Person of Christ","Our Love for The Son/Christ"]},{"n":2,"t":"Our hearts by Thee are set\nOn brighter things above;\nStrange that we ever should forget\nThine own most faithful love.","th":["Heaven & The Father's House","Our Love for The Son/Christ"]},{"n":3,"t":"Yet oft we credit not\nThat Thou dost give as God,\nThough well we know our happy lot\nIn trusting to Thy blood.","th":["The Precious Blood / Atonement","Assurance & Security"]},{"n":4,"t":"None like the ransomed host\nThat precious blood have known;\nRedemption gives faith's holy boast\nTo draw so near the throne.","th":["Redemption","The Precious Blood / Atonement","Worship & Praise"]},{"n":5,"t":"Higher and higher yet!\nPleading that same life-blood,\nWe taste the love that knows no let,\nOf Abba, as of God.","th":["The Precious Blood / Atonement","The Father","God's Love for Us","Sonship & Adoption"]}],"w":{"The Person of Christ":20,"Our Love for The Son/Christ":40,"Heaven & The Father's House":20,"The Precious Blood / Atonement":60,"Assurance & Security":20,"Redemption":20,"Worship & Praise":20,"The Father":20,"God's Love for Us":20,"Sonship & Adoption":20}},
"154":{"m":"7.6.","a":"Anonymous","tn":"Hankey","tc":"W. G. Fischer (1835-1912)","fl":"OUR Father we would worship,","v":[{"n":1,"t":"OUR Father we would worship,\nIn Jesus' holy name,\nFor He, whate'er our changes,\nFor ever is the same:\nThrough Him our childlike praises\nAs incense sweet will be;\nThe songs Thy Spirit raises\nCan ne'er want melody.","th":["The Father","Worship & Praise","The Holy Spirit","Sonship & Adoption"]},{"n":2,"t":"The fire Thy love hath kindled,\nShall never be put out;\nThe Spirit keeps it burning,\n(Though dimmed by things without);\nO make it burn more brightly,\nBy faith more freely shine!\nThat we may value rightly\nThe grace that made us Thine.","th":["God's Love for Us","The Holy Spirit","Grace","Our Love for The Son/Christ"]}],"w":{"The Father":50,"Worship & Praise":50,"The Holy Spirit":100,"Sonship & Adoption":50,"God's Love for Us":50,"Grace":50,"Our Love for The Son/Christ":50}},
"155":{"m":"6.6.6.6.8.8.","a":"A. Taylor (Mrs. Gilbert), (1782-1866)","tn":"Lenox","tc":"L. Edson (1748-1820)","fl":"WHAT was it bless\u00e8d God,","v":[{"n":1,"t":"WHAT was it bless\u00e8d God,\nLed Thee to give Thy Son,\nTo yield Thy well-beloved\nFor us by sin undone?\n'Twas love unbounded led Thee thus\nTo give Thy well-beloved for us.","th":["God's Love for Us","The Father","The Person of Christ"]},{"n":2,"t":"What led Thy Son, O God,\nTo leave Thy throne on high,\nTo shed His precious blood,\nTo suffer and to die?\n'Twas love, unbounded love to us,\nLed Him to die and suffer thus.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","God's Love for Us"]},{"n":3,"t":"What moved Thee to impart\nThy Spirit from above,\nTherewith to fill our heart\nWith heavenly peace and love?\n'Twas love, unbounded love to us,\nMoved Thee to give Thy Spirit thus.","th":["The Holy Spirit","God's Love for Us","Rest & Peace"]},{"n":4,"t":"What love to Thee we owe,\nOur God, for all Thy grace!\nOur hearts may well o'erflow\nIn everlasting praise:\nMake us, O God, to praise Thee thus\nFor all Thy boundless love to us.","th":["Grace","Worship & Praise","Our Love for The Father"]}],"w":{"God's Love for Us":75,"The Father":25,"The Person of Christ":25,"The Cross & Sufferings of Christ":25,"The Precious Blood / Atonement":25,"The Holy Spirit":25,"Rest & Peace":25,"Grace":25,"Worship & Praise":25,"Our Love for The Father":25}},
"156":{"m":"C.M.","a":"Mary Bowley (Mrs Peters) (1813-1856)","tn":"Warwick","tc":"S. Stanley (1767-1822)","fl":"\"PRAISE ye the Lord,\" again, again,","v":[{"n":1,"t":"\"PRAISE ye the Lord,\" again, again,\nThe Spirit strikes the chord;\nNor toucheth He our hearts in vain;\nWe praise, we praise the Lord.","th":["Worship & Praise","The Holy Spirit"]},{"n":2,"t":"\"Rejoice in Him,\" again, again,\nThe Spirit speaks the word,\nAnd faith takes up the happy strain;\nOur joy is in the Lord.","th":["Joy & Thanksgiving","The Holy Spirit"]},{"n":3,"t":"\"Stand fast in Christ;\" ah! yet again\nHe teacheth all the band;\nIf human efforts are in vain,\nIn Christ it is we stand.","th":["Assurance & Security","The Holy Spirit"]},{"n":4,"t":"\"Clean every whit;\" Thou saidst it, Lord!\nShall one suspicion lurk?\nThine, surely, is a faithful word,\nAnd Thine a finished work.","th":["Assurance & Security","Forgiveness of Sins"]},{"n":5,"t":"For ever be the glory given\nTo Thee, O Lamb of God!\nOur every joy on earth, in heaven,\nWe owe it to Thy blood.","th":["Worship & Praise","The Lamb of God","The Precious Blood / Atonement","Joy & Thanksgiving"]}],"w":{"Worship & Praise":40,"The Holy Spirit":60,"Joy & Thanksgiving":40,"Assurance & Security":40,"Forgiveness of Sins":20,"The Lamb of God":20,"The Precious Blood / Atonement":20}},
"157":{"m":"7.6.","a":"H. C. Rice (Mrs. W.N. Tomkins)","tn":"St. Alphege","tc":"H. J. Gauntlett (1805-1876)","fl":"THOU brightness of God's glory,","v":[{"n":1,"t":"THOU brightness of God's glory,\nThou light of all above,\nPerfect art Thou in wisdom,\nIn righteous power, and love.","th":["The Person of Christ","Worship & Praise"]},{"n":2,"t":"Worthy art Thou, Lord Jesus,\nBeyond all songs we raise;\nWorthy of highest glory\nAnd everlasting praise.","th":["Worship & Praise","Christ Risen & Glorified"]},{"n":3,"t":"Thou, Thou alone, art worthy;\nFor Thou, the Lamb, hast died,\nAnd made us, once lost sinners,\nThy body and Thy bride.","th":["The Lamb of God","The Cross & Sufferings of Christ","Redemption","The Church / Bride of Christ"]}],"w":{"The Person of Christ":33,"Worship & Praise":67,"Christ Risen & Glorified":33,"The Lamb of God":33,"The Cross & Sufferings of Christ":33,"Redemption":33,"The Church / Bride of Christ":33}},
"158":{"m":"8.7.","a":"George West Frazer (1830-1896)","tn":"Neander","tc":"J. Neander (1650-1680)","fl":"GOD, our Father, we adore Thee!","v":[{"n":1,"t":"GOD, our Father, we adore Thee!\nWe, Thy children, bless Thy name!\nChosen in the Christ before Thee,\nWe are holy without blame.\nWe adore Thee! we adore Thee!\nAbba's praises we proclaim!","th":["The Father","Sonship & Adoption","Worship & Praise"]},{"n":2,"t":"Son eternal, we adore Thee!\nLamb upon the throne on high!\nLamb of God, we bow before Thee,\nThou hast brought Thy people nigh!\nWe adore Thee! we adore Thee!\nSon of God who came to die!","th":["The Lamb of God","Christ Risen & Glorified","Worship & Praise","The Cross & Sufferings of Christ"]},{"n":3,"t":"Father, Son and Holy Spirit -\nThree in One! We give Thee praise!\nFor the riches we inherit\nHeart and voice to Thee we raise!\nWe adore Thee! We adore Thee!\nThee we bless through endless days.","th":["The Father","The Holy Spirit","Worship & Praise","Joy & Thanksgiving"]}],"w":{"The Father":67,"Sonship & Adoption":33,"Worship & Praise":100,"The Lamb of God":33,"Christ Risen & Glorified":33,"The Cross & Sufferings of Christ":33,"The Holy Spirit":33,"Joy & Thanksgiving":33}},
"159":{"m":"8.7. Iambic","a":"Frank Binford Hole (1874-1964)","tn":"Bishopgarth","tc":"A. S. Sullivan (1842-1900)","fl":"O GOD of grace whose saving power","v":[{"n":1,"t":"O GOD of grace whose saving power\nCan reach the chiefest sinner,\nWe seem to reach earth's darkest hour,\nThe ranks of faith grow thinner;\nBefore Thee now in thought we stand,\nOur sin, our need confessing;\nWe long to see Thy gracious hand\nBestow eternal blessing.","th":["Grace","God's Love for Us"]},{"n":2,"t":"Earth's honours fade, its glories pale;\nHow soon is told life's story!\nAnd nothing can the least avail\nTo meet the claims of glory.\nIf Thou, Lord Jesus, hadst not been\nIn death, Thy work completed,\nWe never had salvation seen,\nNor viewed our foes defeated.","th":["The Cross & Sufferings of Christ","Redemption"]},{"n":3,"t":"Thou sittest, Lord, upon the throne,\nAbove this world of sadness;\nThou hearest every sinner's groan;\nLet woe be changed to gladness;\nStretch out Thine arm, and from above,\nThrough every tribe and nation,\nRoll forth the tide of saving love,\nO God of all salvation.","th":["Christ Risen & Glorified","Grace","God's Love for Us"]}],"w":{"Grace":67,"God's Love for Us":67,"The Cross & Sufferings of Christ":33,"Redemption":33,"Christ Risen & Glorified":33}},
"160":{"m":"6.4.","a":"John Nelson Darby (1800-1882)","tn":"Lathbury","tc":"W. F. Sherwin (1826-1888)","fl":"OH bright and bless\u00e8d hope!","v":[{"n":1,"t":"OH bright and bless\u00e8d hope!\nWhen shall it be,\nThat we His face, long loved,\nRevealed shall see?\nOh! when, without a cloud,\nHis features trace,\nWhose faithful love, so long,\nWe've known in grace?","th":["The Lord's Coming / Rapture","Grace","Our Love for The Son/Christ"]},{"n":2,"t":"That love itself enjoy,\nWhich, ever true,\nDid, in our feeble path,\nIts work pursue!\nO Jesus! not unknown,\nThy love shall fill\nThe heart in which Thou dwell'st,\nAnd shalt dwell still!","th":["God's Love for Us","Our Love for The Son/Christ"]},{"n":3,"t":"Still, Lord, to see Thy face,\nThy voice to hear;\nTo know Thy present love,\nFor ever near;\nTo gaze upon Thyself\nSo faithful known,\nLong proved in secret help\nWith Thee alone;","th":["God's Love for Us","The Lord's Coming / Rapture","Our Love for The Son/Christ"]},{"n":4,"t":"To see that love, content\nOn us flow forth,\nFor ever Thy delight,\nClothed with Thy worth.\nNor, what is next Thy heart,\nCan we forget;\nThy saints, O Lord, with Thee\nIn glory met.","th":["God's Love for Us","Grace","The Church / Bride of Christ"]},{"n":5,"t":"Perfect in comeliness\nBefore Thy face,\nTh' eternal witness, all,\nOf Thine own grace;\nTogether, then, their songs\nOf endless praise,\nWith one harmonious voice,\nIn joy they'll raise!","th":["Worship & Praise","Heaven & The Father's House","Grace"]}],"w":{"The Lord's Coming / Rapture":40,"Grace":60,"Our Love for The Son/Christ":60,"God's Love for Us":60,"The Church / Bride of Christ":20,"Worship & Praise":20,"Heaven & The Father's House":20}},
"161":{"m":"S.M.D.","a":"James Montgomery (1771-1854)","tn":"Nearer Home","tc":"I. B Woodbury (1819-1858)","fl":"FOR ever with the Lord,","v":[{"n":1,"t":"FOR ever with the Lord,\nAmen, so let it be;\nLife from the dead is in that word,\n'Tis immortality.\nHere in the body pent,\nAbsent from Him we roam,\nYet nightly pitch our moving tent\nA day's march nearer home.","th":["Heaven & The Father's House","Pilgrimage / Desert Journey","Assurance & Security"]},{"n":2,"t":"Our Father's house on high,\nHome of our souls, how near\nE'en now to faith's transpiercing eye\nThy gates of pearl appear!\nThe thirsty spirit faints\nTo reach the home we love;\nThe bright inheritance of saints,\nJerusalem above.","th":["Heaven & The Father's House","The Father"]},{"n":3,"t":"And though there intervene\nRough roads and stormy skies,\nFaith will not suffer ought to screen\nThy glory from our eyes.\nThere shall all clouds depart,\nThe wilderness shall cease,\nAnd sweetly shall each gladdened heart\nEnjoy eternal peace.","th":["Trial & Conflict","Rest & Peace","Heaven & The Father's House","Assurance & Security"]}],"w":{"Heaven & The Father's House":100,"Pilgrimage / Desert Journey":33,"Assurance & Security":67,"The Father":33,"Trial & Conflict":33,"Rest & Peace":33}},
"162":{"m":"8.8.6.","a":"George West Frazer (1830-1896)","tn":"Ariel","tc":"L. Mason (1792-1872)","fl":"WHAT rich eternal bursts of praise","v":[{"n":1,"t":"WHAT rich eternal bursts of praise\nShall fill yon courts through endless days,\nWhen time shall cease to be!\nRound and around the notes shall swell,\nAs each redeemed one joins to tell\nThy love, so vast and free.","th":["Worship & Praise","Heaven & The Father's House","God's Love for Us"]},{"n":2,"t":"Each shall the Saviour's likeness bear,\nA royal crown each brow shall wear,\nAnd robes unsullied white.\nThe everlasting song shall be,\nTo Thee, O Lamb of God, to Thee,\n'Mid scenes of purest light.","th":["Christ Risen & Glorified","The Lamb of God","Heaven & The Father's House","Worship & Praise"]},{"n":3,"t":"Our joy unhindered then with Thee,\nOur eyes undimmed Thy glory see,\nWhilst worthy praise we give.\nThrough that eternal cloudless day,\nOur burning hearts with rapture say,\nHe died that we might live.","th":["Joy & Thanksgiving","Heaven & The Father's House","Worship & Praise","The Cross & Sufferings of Christ"]}],"w":{"Worship & Praise":100,"Heaven & The Father's House":100,"God's Love for Us":33,"Christ Risen & Glorified":33,"The Lamb of God":33,"Joy & Thanksgiving":33,"The Cross & Sufferings of Christ":33}},
"163":{"m":"7.6.","a":"George West Frazer (1830-1896)","tn":"Webb","tc":"G. J. Webb (1803-1887)","fl":"THE Lord of life is risen,","v":[{"n":1,"t":"THE Lord of life is risen,\nHas left the darksome grave,\nAnd, death by Him abolished,\nHe's mighty now to save;\nAnd we with Him are risen,\nThe fruit of all His toil,\nThe firstfruits of His harvest,\nHis suffering's richest spoil.","th":["Christ Risen & Glorified","Redemption","New Creation"]},{"n":2,"t":"The Lord of life is seated\nAt God's right hand on high -\nGod's just and righteous answer\nTo grace which stooped to die;\nIn Him we too are seated,\nOh, bless\u00e8d, wondrous grace!\nAccepted and belov\u00e8d,\nIn Him, in sonship's place.","th":["Christ Risen & Glorified","Grace","Sonship & Adoption"]},{"n":3,"t":"The Lord of life is coming\nTo perfect all His grace;\nTo take His blood-bought people\nTo fill their heavenly place;\nOh, with what joy ascending\nWe'll meet Him in the air,\nTo dwell with Him in glory,\nAnd His blest image bear!","th":["The Lord's Coming / Rapture","The Precious Blood / Atonement","Heaven & The Father's House","Grace"]}],"w":{"Christ Risen & Glorified":67,"Redemption":33,"New Creation":33,"Grace":67,"Sonship & Adoption":33,"The Lord's Coming / Rapture":33,"The Precious Blood / Atonement":33,"Heaven & The Father's House":33}},
"164":{"m":"8.7.","a":"Mrs. Emma Francis Bevan (1827-1909)","tn":"Friendship","tc":"Miss La Thangue, c. 1900","fl":"LORD, we love to trace Thy footprints","v":[{"n":1,"t":"LORD, we love to trace Thy footprints\nHere amidst the desert sand,\nPonder o'er Thy path of suffering -\nWondrous heart and healing hand;\nLearn Thy love at Bethlehem's manger,\nHear Thee still the raging wave,\nSee Thee at the well of Sychar,\nOn the cross, and in the grave.","th":["The Person of Christ","The Cross & Sufferings of Christ","Pilgrimage / Desert Journey"]},{"n":2,"t":"Lord, we bow in adoration\nAs we watch that stream of love;\nFind its mighty tide still flowing\nFrom Thee now as crowned above.\n'Tis a love no heart can fathom,\nWhich to us Thou dost unfold,\nInexhaustible and boundless -\nWondrous theme that ne'er grows old.","th":["God's Love for Us","Worship & Praise","Christ Risen & Glorified"]}],"w":{"The Person of Christ":50,"The Cross & Sufferings of Christ":50,"Pilgrimage / Desert Journey":50,"God's Love for Us":50,"Worship & Praise":50,"Christ Risen & Glorified":50}},
"165":{"m":"7.7.8.7.","a":"C. Wesley (1707-1788)","tn":"Victory","tc":"Anonymous","fl":"HEAD of the church triumphant!","v":[{"n":1,"t":"HEAD of the church triumphant!\nWe joyfully adore Thee;\nTill Thou appear, Thy members here\nWould sing Thy love and glory.\nWe lift our hearts and voices,\nIn blest anticipation,\nAnd cry aloud, and give to God\nThe praise of our salvation.","th":["The Church / Bride of Christ","Worship & Praise","The Lord's Coming / Rapture","Redemption"]},{"n":2,"t":"While in affliction's furnace\nAnd passing through the fire,\nThe love we praise which tries our ways,\nAnd ever brings us nigher;\nWe lift our hearts exulting\nIn Thine almighty favour:\nThe love divine which made us Thine\nShall keep us Thine for ever.","th":["Trial & Conflict","God's Love for Us","Assurance & Security"]},{"n":3,"t":"Thou dost conduct Thy people\nSafely through all temptation:\nNor will we fear, since Thou art near,\nThe fire of tribulation;\nThe world with sin and Satan,\nDisplay their strength before us;\nBy Thee we shall break through them all,\nAnd join the heavenly chorus.","th":["Trial & Conflict","Assurance & Security","Pilgrimage / Desert Journey"]},{"n":4,"t":"By faith we see the glory\nOf which Thou dost assure us;\nThe world despise, for that high prize\nWhich Thou hast set before us;\nAnd may we, counted worthy\nTo meet the Son from heaven,\nThere see our Lord, by all adored,\nTo us in glory given.","th":["Heaven & The Father's House","Separation from the World","The Lord's Coming / Rapture"]}],"w":{"The Church / Bride of Christ":25,"Worship & Praise":25,"The Lord's Coming / Rapture":50,"Redemption":25,"Trial & Conflict":50,"God's Love for Us":25,"Assurance & Security":50,"Pilgrimage / Desert Journey":25,"Heaven & The Father's House":25,"Separation from the World":25}},
"166":{"m":"6-8s.","a":"P. Gerhardt (1607-1676)","tn":"Treasures","tc":"J. L. F. Hainlin (1750-1823)","fl":"LORD, Thou hast drawn us after Thee,","v":[{"n":1,"t":"LORD, Thou hast drawn us after Thee,\nNow let us run and never tire;\nThy presence shall our comfort be,\nThyself our hope, our sole desire,\nOur present Saviour, while nor fear\nNor sin can come if Thou art near.","th":["Service & Devotion","Assurance & Security","Our Love for The Son/Christ"]},{"n":2,"t":"What in Thy love possess we not?\nOur star by night, our sun by day,\nOur spring of life when parched with drought,\nOur wine to cheer, our bread to stay,\nOur strength, our shield, our safe abode,\nOur robe before the throne of God!","th":["God's Love for Us","The Person of Christ"]},{"n":3,"t":"Unchangeable Thy gracious love\nOur earthly path has ceaseless viewed;\nEre yet these beating hearts could move,\nThy tender mercies still pursued;\nEver with us may they abide,\nAnd close us in on every side.","th":["God's Love for Us","Grace","Assurance & Security"]}],"w":{"Service & Devotion":33,"Assurance & Security":67,"Our Love for The Son/Christ":33,"God's Love for Us":67,"The Person of Christ":33,"Grace":33}},
"167":{"m":"7.7.8.7.","a":"W. Yerbury (d. 1863)","tn":"Cyprus","tc":"Anonymous","fl":"THY love we own, Lord Jesus,","v":[{"n":1,"t":"THY love we own, Lord Jesus,\nIn service unremitting;\nWithin the veil Thou dost prevail,\nEach soul for worship fitting:\nEncompassed here with failure,\nEach earthly refuge fails us;\nWithout, within, at war with sin,\nThy name alone avails us.","th":["God's Love for Us","Christ's Intercession / Priesthood","Worship & Praise","Trial & Conflict"]},{"n":2,"t":"Thy love we own, Lord Jesus,\nFor though Thy toils are ended,\nThy tender heart doth take its part\nWith those Thy grace befriended;\nThy sympathy how precious!\nThou succourest in sorrow,\nAnd bidst us cheer, while pilgrims here,\nAnd haste the hopeful morrow.","th":["God's Love for Us","Pilgrimage / Desert Journey","Christ's Intercession / Priesthood"]},{"n":3,"t":"Thy love we own, Lord Jesus;\nThy way is traced before Thee;\nThou wilt descend and we ascend,\nTo meet in heavenly glory;\nSoon shall the blissful morning\nCall forth Thy saints to meet Thee;\nOur only Lord, alone adored,\nWith gladness then we'll greet Thee.","th":["The Lord's Coming / Rapture","God's Love for Us","Heaven & The Father's House"]},{"n":4,"t":"Thy love we own, Lord Jesus,\nAnd wait to see Thy glory,\nTo know as known, and fully own\nThy perfect grace before Thee;\nWe plead Thy parting promise,\nCome, Saviour, to release us;\nThen endless praise our lips shall raise\nFor love like Thine, Lord Jesus.","th":["The Lord's Coming / Rapture","Worship & Praise","Grace","Our Love for The Son/Christ"]}],"w":{"God's Love for Us":75,"Christ's Intercession / Priesthood":50,"Worship & Praise":50,"Trial & Conflict":25,"Pilgrimage / Desert Journey":25,"The Lord's Coming / Rapture":50,"Heaven & The Father's House":25,"Grace":25,"Our Love for The Son/Christ":25}},
