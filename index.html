let currentHymn=1;
let currentSort='number';
let recentHymns=JSON.parse(localStorage.getItem('ss_recent')||'[]');
let showTags=localStorage.getItem('ss_tags')!=='off';
let navHistory=[];

// Tags toggle
function toggleTags(){
  showTags=!showTags;
  localStorage.setItem('ss_tags',showTags?'on':'off');
  document.getElementById('tags-toggle').style.opacity=showTags?'.7':'.3';
  document.querySelectorAll('.verse-themes').forEach(el=>el.style.display=showTags?'':'none');
}
(function(){
  if(!showTags)document.getElementById('tags-toggle').style.opacity='.3';
})();

// Back navigation
function pushNav(view,scrollPos){
  navHistory.push({view,scrollPos});
  document.getElementById('back-btn').classList.add('visible');
}
function goBack(){
  if(!navHistory.length)return;
  const prev=navHistory.pop();
  if(!navHistory.length)document.getElementById('back-btn').classList.remove('visible');
  // Switch to the previous view
  const btn=document.querySelector(`.nav button:nth-child(${prev.view==='hymn'?1:prev.view==='index'?2:3})`);
  showView(prev.view,btn,true);
  setTimeout(()=>window.scrollTo(0,prev.scrollPos),50);
}

// Dark mode
function toggleDark(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',isDark?'':'dark');
  document.getElementById('dark-toggle').innerHTML=isDark?'&#9790;':'&#9788;';
  localStorage.setItem('ss_dark',isDark?'':'dark');
}
(function(){
  const saved=localStorage.getItem('ss_dark');
  if(saved==='dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('dark-toggle').innerHTML='&#9788;';
  }
})();

function addRecent(n){
  recentHymns=recentHymns.filter(x=>x!==n);
  recentHymns.unshift(n);
  if(recentHymns.length>10)recentHymns=recentHymns.slice(0,10);
  localStorage.setItem('ss_recent',JSON.stringify(recentHymns));
}
function renderRecent(){
  const el=document.getElementById('recent-bar');
  if(!el)return;
  if(!recentHymns.length){el.innerHTML='';return;}
  const pills=recentHymns.map(n=>{
    const h=H[n];
    const fl=h?h.fl.split(',')[0].split(';')[0].substring(0,25):'';
    return `<span class="recent-pill" onclick="showHymn(${n})"><span class="pill-num">${n}</span>${fl}</span>`;
  }).join('');
  el.innerHTML=`<h4>Recent</h4><div class="recent-pills">${pills}</div>`;
}

function getBarColor(pct){
  const r=Math.round(27+(201-27)*(1-pct/100));
  const g=Math.round(58+(168-58)*(1-pct/100));
  const b=Math.round(92+(76-92)*(1-pct/100));
  return `rgb(${r},${g},${b})`;
}

function showHymn(n){
  const h=H[n];if(!h)return;
  currentHymn=n;
  addRecent(n);
  document.getElementById('hymn-input').value=n;
  document.getElementById('btn-prev').disabled=(n<=1);
  document.getElementById('btn-next').disabled=(n>=500);

  let html=`<div class="hymn-number">${n}</div>`;
  html+=`<div class="hymn-first-line">${h.fl}</div>`;

  h.v.forEach(v=>{
    const lines=v.t.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    const thStyle=showTags?'':'display:none';
    const th=v.th.length?`<div class="verse-themes" style="${thStyle}">${v.th.join(', ')}</div>`:'';
    html+=`<div class="verse"><div class="verse-num">${v.n}</div><div><div class="verse-text">${lines}</div>${th}</div></div>`;
  });

  html+=`<div class="hymn-meta">
    <div><span class="label">Author</span><div class="value">${h.a||'—'}</div></div>
    <div><span class="label">Meter</span><div class="value">${h.m||'—'}</div></div>
    <div><span class="label">Tune</span><div class="value">${h.tn||'—'}</div></div>
    <div><span class="label">Composer</span><div class="value">${h.tc||'—'}</div></div>
  </div>`;

  // Theme weights
  const sorted=Object.entries(h.w).sort((a,b)=>b[1]-a[1]);
  if(sorted.length){
    html+=`<div class="theme-weights"><h3>Theme Weighting</h3>`;
    sorted.forEach(([theme,pct])=>{
      html+=`<div class="weight-bar">
        <div class="weight-label">${theme}</div>
        <div class="weight-track"><div class="weight-fill" style="width:${pct}%;background:${getBarColor(pct)}"></div></div>
        <div class="weight-pct">${pct}%</div>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`<div id="recent-bar"></div>`;
  document.getElementById('hymn-display').innerHTML=html;
  renderRecent();
  document.getElementById('view-hymn').scrollTop=0;
  window.scrollTo(0,0);
}

function goHymn(){
  const v=parseInt(document.getElementById('hymn-input').value);
  if(v>=1&&v<=500)showHymn(v);
}

function navHymn(d){
  const n=currentHymn+d;
  if(n>=1&&n<=500)showHymn(n);
}

function currentView(){
  if(document.getElementById('view-hymn').classList.contains('active'))return 'hymn';
  if(document.getElementById('view-index').classList.contains('active'))return 'index';
  return 'themes';
}
function showView(name,btn,isBack){
  if(!isBack){
    const cur=currentView();
    if(cur!==name)pushNav(cur,window.scrollY);
  }
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(!isBack)window.scrollTo(0,0);
  if(name==='index'&&!document.getElementById('index-list').children.length)buildIndex();
  if(name==='themes'&&!document.getElementById('themes-container').children.length)buildThemes();
}

// Index
let indexData=[];
function buildIndex(){
  indexData=[];
  for(let i=1;i<=500;i++){
    const h=H[i];if(!h)continue;
    // Collect all lines from all verses
    const allLines=h.v.flatMap(v=>v.t.split('\n'));
    indexData.push({n:i,fl:h.fl,a:h.a,lines:allLines});
  }
  renderIndex();
}

function renderIndex(){
  const norm=s=>s.toLowerCase().replace(/[^a-z0-9 ]/g,'');
  const q=norm(document.getElementById('index-search').value);
  let filtered=[];
  indexData.forEach(h=>{
    if(!q){filtered.push({...h,matchLines:null});return;}
    // Check number, first line, author first
    if(String(h.n).includes(q)||norm(h.fl).includes(q)||norm(h.a).includes(q)){
      filtered.push({...h,matchLines:null});return;
    }
    // Search all lines
    const found=h.lines.filter(l=>norm(l).includes(q));
    if(found.length)filtered.push({...h,matchLines:found});
  });
  const stripPunc=s=>s.replace(/^[^A-Za-z]+/,'');
  // If searching, put first-line matches on top
  if(q){
    filtered.sort((a,b)=>{
      const aFirst=!a.matchLines?0:1;
      const bFirst=!b.matchLines?0:1;
      if(aFirst!==bFirst)return aFirst-bFirst;
      return a.n-b.n;
    });
  } else if(currentSort==='firstline'){
    filtered.sort((a,b)=>stripPunc(a.fl).localeCompare(stripPunc(b.fl)));
  } else if(currentSort==='author'){
    filtered.sort((a,b)=>a.a.localeCompare(b.a));
  } else {
    filtered.sort((a,b)=>a.n-b.n);
  }

  const el=document.getElementById('index-list');
  el.innerHTML=filtered.map(h=>{
    const matchHtml=h.matchLines?h.matchLines.map(l=>`<div class="index-match">&hellip; ${l}</div>`).join(''):'';
    return `<div class="index-item" onclick="showHymn(${h.n});showView('hymn',document.querySelector('.nav button'))">
      <span class="index-num">${h.n}</span>
      <span class="index-fl">${h.fl}${matchHtml}</span>
      <span class="index-author">${h.a.split('(')[0].trim()}</span>
    </div>`;
  }).join('');
}

function filterIndex(){renderIndex()}
function sortIndex(s,btn){
  currentSort=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderIndex();
}

// Themes
let themeSort='alpha';
let themeMapCache=null;
function buildThemes(){
  if(!themeMapCache){
    themeMapCache={};
    for(let i=1;i<=500;i++){
      const h=H[i];if(!h)continue;
      Object.entries(h.w).forEach(([theme,pct])=>{
        if(!themeMapCache[theme])themeMapCache[theme]=[];
        themeMapCache[theme].push({n:i,fl:h.fl,pct});
      });
    }
  }
  const themeGroups={
    'God & The Father':["God's Love for Us","The Father","Grace"],
    'The Person & Work of Christ':["The Person of Christ","The Lamb of God","The Cross & Sufferings of Christ","The Precious Blood / Atonement","Christ Risen & Glorified","Christ's Intercession / Priesthood","Redemption","Forgiveness of Sins"],
    'The Christian Life':["Our Love for The Father","Our Love for The Son/Christ","Pilgrimage / Desert Journey","Rest & Peace","Assurance & Security","Trial & Conflict","Service & Devotion","Separation from the World"],
    'Worship & Fellowship':["Worship & Praise","Joy & Thanksgiving","The Lord's Supper / Remembrance","Fellowship & Gathering"],
    'The Holy Spirit & The Word':["The Holy Spirit","The Word of God"],
    'The Church & Future Hope':["The Church / Bride of Christ","Sonship & Adoption","New Creation","The Lord's Coming / Rapture","Heaven & The Father's House","The Eternal Kingdom / Reign of Christ"]
  };

  function renderCard(theme,hymns){
    hymns.sort((a,b)=>b.pct-a.pct);
    const hymnHtml=hymns.map(h=>
      `<div class="theme-hymn-item" onclick="event.stopPropagation();showHymn(${h.n});showView('hymn',document.querySelector('.nav button'))">
        <span class="theme-hymn-num">${h.n}</span>
        <span class="theme-hymn-fl">${h.fl}</span>
        <div class="theme-hymn-bar"><div class="theme-hymn-fill" style="width:${h.pct}%;background:${getBarColor(h.pct)}"></div></div>
        <span class="theme-hymn-pct">${h.pct}%</span>
      </div>`
    ).join('');
    return `<div class="theme-card" onclick="this.classList.toggle('expanded')">
      <div class="theme-card-header">
        <span class="theme-name">${theme}</span>
        <span class="theme-count">${hymns.length}</span>
      </div>
      <div class="theme-hymns">${hymnHtml}</div>
    </div>`;
  }

  const el=document.getElementById('themes-container');

  if(themeSort==='grouped'){
    let html='';
    Object.entries(themeGroups).forEach(([group,members])=>{
      html+=`<div style="margin:20px 0 8px;padding:6px 12px;font-weight:700;color:var(--navy);font-size:1rem;border-bottom:2px solid var(--gold);font-family:var(--serif)">${group}</div>`;
      members.forEach(theme=>{
        const hymns=themeMapCache[theme];
        if(hymns)html+=renderCard(theme,hymns);
      });
    });
    el.innerHTML=html;
  } else {
    const sorted=Object.entries(themeMapCache).sort((a,b)=>
      themeSort==='alpha'?a[0].localeCompare(b[0]):b[1].length-a[1].length
    );
    el.innerHTML=sorted.map(([theme,hymns])=>renderCard(theme,hymns)).join('');
  }
}

function sortThemes(s,btn){
  themeSort=s;
  document.querySelectorAll('.themes-sort .sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildThemes();
}

// Init
document.getElementById('js-blocked').style.display='none';
showHymn(1);
</script>
