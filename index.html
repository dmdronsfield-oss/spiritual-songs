"335":{"m":"10s.","a":"T. Willey (1847-1930)","tn":"Morecambe","tc":"F. C. Atkinson (1841-1897)","fl":"Lord Jesus, gladly do our lips express","v":[{"n":1,"t":"Lord Jesus, gladly do our lips express\nOur hearts' deep sense of all Thy worthiness;\nThou Risen One, the Holy and the True,\nWe give Thee now the praise so justly due.","th":["Worship & Praise","Christ Risen & Glorified","The Person of Christ"]},{"n":2,"t":"Thou giv'st us, Lord, once more to taste down here,\nThe joy Thy presence brings, its warmth and cheer;\nWith great delight we 'neath Thy shadow rest,\nThy fruit is sweet to those Thy love has blessed.","th":["Joy & Thanksgiving","Rest & Peace","God's Love for Us"]},{"n":3,"t":"Thou wast alone, till like the precious grain,\nIn death Thou layest, but did'st rise again;\nAnd in Thy risen life, a countless host\nAre \"all of one\" with Thee, Thy joy and boast.","th":["Christ Risen & Glorified","The Cross & Sufferings of Christ"]},{"n":4,"t":"We bless Thee, Lord, Thou lov'st to take Thy place\nAmongst Thine own, who taste Thy boundless grace;\n'Tis here we learn Thee, as Thou'rt known above,\nIn heavenly glory - home of perfect love.","th":["Grace","Fellowship & Gathering","God's Love for Us","Worship & Praise"]}],"w":{"Worship & Praise":50,"Christ Risen & Glorified":50,"The Person of Christ":25,"Joy & Thanksgiving":25,"Rest & Peace":25,"God's Love for Us":50,"The Cross & Sufferings of Christ":25,"Grace":25,"Fellowship & Gathering":25}},
"336":{"m":"6-8s.","a":"W. Sanders","tn":"Pater Omnium","tc":"H. J. E. Holmes (1852-1938)","fl":"Behold, what wondrous love and grace!","v":[{"n":1,"t":"Behold, what wondrous love and grace!\nWhen we were wretched and undone,\nTo save a ruined, helpless race,\nThe Father gave His only Son!\nOf twice ten thousand gifts divine,\nNo gift like this could ever shine.","th":["God's Love for Us","Grace","The Father","Redemption"]},{"n":2,"t":"O gift of love unspeakable!\nO gift of mercy all divine !\nWe once were slaves of death and hell,\nBut in Christ's image we shall shine:\nFor every gift a song we raise,\nBut this demands eternal praise.","th":["God's Love for Us","Grace","Redemption","Worship & Praise"]},{"n":3,"t":"Praise shall employ these tongues of ours,\nTill we with all the saints above,\nExtol His name with nobler powers,\nAnd see the ocean of His love:\nThen, while we look, and wondering gaze,\nWe'll fill the heavens with endless praise.","th":["Worship & Praise","Heaven & The Father's House","God's Love for Us"]}],"w":{"God's Love for Us":100,"Grace":67,"The Father":33,"Redemption":67,"Worship & Praise":67,"Heaven & The Father's House":33}},
"337":{"m":"7.6.","a":"Samuel Prideaux Tregelles (1813-1875)","tn":"Watcher","tc":"E. L. White","fl":"O God of grace, our Father,","v":[{"n":1,"t":"O God of grace, our Father,\nAll praise we give to Thee,\n'Tis in Thy sovereign favour\nAll blessedness we see;\nThere only is the fountain\nWhence living waters flow,\nWhich like a glorious river\nStill gladden as they go.","th":["The Father","Grace","Worship & Praise"]},{"n":2,"t":"As Thine, Thou didst foreknow us\nFrom all eternity;\nThy chosen loved ones ever,\nKept present to Thine eye;\nAnd when was come the moment,\nThou calling by Thy grace\nDidst gently, firmly draw us\nEach from his hiding-place.","th":["The Father","God's Love for Us","Grace"]},{"n":3,"t":"Thy word, Thyself revealing,\nDoth sanctify by truth,\nStill leading on Thy children\nWith gentle heavenly growth:\nThus still the work proceedeth,\n(The work begun by grace),\nFor each is meet, and training,\nFather, to see Thy face.","th":["The Word of God","The Father","Grace"]}],"w":{"The Father":100,"Grace":100,"Worship & Praise":33,"God's Love for Us":33,"The Word of God":33}},
"338":{"m":"7.6.","a":"O. L. Barnes","tn":"Aurelia","tc":"S. S. Wesley (1810-1876)","fl":"Though deep, O Lord, our sorrow","v":[{"n":1,"t":"Though deep, O Lord, our sorrow\nWhen earthly ties are rent,\nWe wait the glorious morrow\nWhen life's last day is spent;\nTo see Thee, Lord, in glory\nWith all Thy loved ones there,\nAt home - O wondrous story! -\nGod's endless rest to share.","th":["Trial & Conflict","Heaven & The Father's House","The Lord's Coming / Rapture","Rest & Peace"]},{"n":2,"t":"There we shall see the answer\nTo all Thy grief and shame;\nFor ever then in nearness\nWe'll magnify Thy name.\nBut now Thy love sustains us,\nSore though the hour of grief;\nWhat solace, O Lord Jesus,\nIn Thee to find relief!","th":["The Cross & Sufferings of Christ","God's Love for Us","Worship & Praise","Rest & Peace"]},{"n":3,"t":"As resting in Thy will, Lord,\nWe prove Thy wondrous love;\nThe Spirit's power and comfort\nLift our poor hearts above,\nBeyond earth's mortal dwelling,\nTo yonder glory bright,\nWhere endless anthems swelling\nShall soon our hearts delight.","th":["God's Love for Us","The Holy Spirit","Heaven & The Father's House"]}],"w":{"Trial & Conflict":33,"Heaven & The Father's House":67,"The Lord's Coming / Rapture":33,"Rest & Peace":67,"The Cross & Sufferings of Christ":33,"God's Love for Us":67,"Worship & Praise":33,"The Holy Spirit":33}},
"339":{"m":"8.7.8.7.4.7.","a":"Thomas Kelly (1769-1854)","tn":"Mannheim","tc":"F. Filitz (1804-1876)","fl":"Lord, dismiss us hence with gladness;","v":[{"n":1,"t":"Lord, dismiss us hence with gladness;\nBe Thine outcast lot our choice:\n'Tis Thy foes have need of sadness,\nBut Thine own may well rejoice;\nWho shall harm us\nWhile we know and hear Thy voice?","th":["Joy & Thanksgiving","Assurance & Security","The Person of Christ"]},{"n":2,"t":"Saviour, keep us from all evil,\nGo before us in the way;\nTill we reach the rest of heaven\nBe Thy word our guide and stay;\nJoy and triumph\nNow are ours and in that day.","th":["Pilgrimage / Desert Journey","The Word of God","Rest & Peace","Heaven & The Father's House"]}],"w":{"Joy & Thanksgiving":50,"Assurance & Security":50,"The Person of Christ":50,"Pilgrimage / Desert Journey":50,"The Word of God":50,"Rest & Peace":50,"Heaven & The Father's House":50}},
"340":{"m":"8.7.","a":"Miss Dorothy Ann Thrupp (1779-1847)","tn":"Evening Blessing","tc":"G. C. Stebbins (1846-1945)","fl":"Father, we commend our spirits","v":[{"n":1,"t":"Father, we commend our spirits\nTo Thy love in Jesus' name,\nLove which His atoning merits\nGive us confidence to claim.","th":["The Father","God's Love for Us","The Precious Blood / Atonement"]},{"n":2,"t":"Oh, how sweet, how real a pleasure\nFlows from love so full and free!\n'Tis a vast exhaustless treasure,\nSaviour, we possess in Thee.","th":["God's Love for Us","Joy & Thanksgiving","The Person of Christ"]},{"n":3,"t":"From the world and its confusion\nHere we turn and find our rest;\nFrom its care and its delusion\nTurn to Thee, in whom we're blest.","th":["Rest & Peace","Separation from the World"]},{"n":4,"t":"By the Holy Ghost anointed,\nMay we do the Father's will,\nWalk the path by Him appointed\nAll His pleasure to fulfil.","th":["The Holy Spirit","The Father","Service & Devotion"]}],"w":{"The Father":50,"God's Love for Us":50,"The Precious Blood / Atonement":25,"Joy & Thanksgiving":25,"The Person of Christ":25,"Rest & Peace":25,"Separation from the World":25,"The Holy Spirit":25,"Service & Devotion":25}},
"341":{"m":"7.6.","a":"Miss C. Thompson (1822-1909)","tn":"Day of Rest","tc":"J. W. Elliott (1833-1915)","fl":"O gracious God, Thy pleasure","v":[{"n":1,"t":"O gracious God, Thy pleasure\nIs in Thy Christ made known,\nAnd tells the boundless measure\nOf blessing for Thine own:\nHe has Thy presence entered,\nAs Man in heaven is known;\nIn Him Thy glory's centred,\nIn Him Thy purpose shown.","th":["The Father","The Person of Christ","Christ Risen & Glorified","Heaven & The Father's House"]},{"n":2,"t":"And oh, what love is beaming\nRefulgent in that face!\nWhat bless\u00e8d light is streaming\nFrom that most glorious place!\nBoth love and light proclaiming\nWhat Thou, the Father, art,\nAnd wondrous grace revealing,\nWith Thine own Son, our part.","th":["God's Love for Us","The Father","Grace"]},{"n":3,"t":"Thou Source of every blessing,\nThou Spring of all delight;\nThy name with joy confessing\nLet all the saints unite.\nEach heart its praise outpouring\nTo Thee all praise above,\nEach voice in strains adoring,\nRe-echoes - \"God is love.\"","th":["Worship & Praise","The Father","God's Love for Us","Joy & Thanksgiving"]}],"w":{"The Father":100,"The Person of Christ":33,"Christ Risen & Glorified":33,"Heaven & The Father's House":33,"God's Love for Us":67,"Grace":33,"Worship & Praise":33,"Joy & Thanksgiving":33}},
"342":{"m":"7.6.","a":"A. Cutting","tn":"St. Theodulph","tc":"M. Teschner (1584-1635)","fl":"O God, our hearts are lifted","v":[{"n":1,"t":"O God, our hearts are lifted\nTo Thee in grateful praise;\nResponsive to Thy Spirit\nA joyful song we raise;\nFor He Thy gracious purpose\nIn Christ to us has shown,\nThat now as sons before Thee,\nHis favour is our own.","th":["The Father","Worship & Praise","The Holy Spirit","Sonship & Adoption","Joy & Thanksgiving"]},{"n":2,"t":"In nature's darkness shrouded,\nAnd dead in sins we lay,\nUntil Thy Holy Spirit\nTransformed our night to day,\nAwakened needs within us,\nBegetting us anew,\nAnd by love's strong compelling,\nOur souls to Jesus drew.","th":["The Holy Spirit","New Creation","God's Love for Us"]},{"n":3,"t":"We trusted Him as Saviour,\nWhen rest and peace we sought,\nAnd now Thy Spirit seals us,\nAs those His love has bought.\nMade Thine He ne'er will leave us,\nFor He is pledged to stay,\nAs earnest of our portion,\nUntil redemption's day.","th":["Redemption","Rest & Peace","The Holy Spirit","Assurance & Security"]},{"n":4,"t":"O may Thy Holy Spirit,\nBlest unction from on high,\nWith all His rich infilling,\nLead us to glorify\nThe risen Christ, our Saviour,\nBy loyal witness true,\nConstraining us to serve Him\nIn all we say and do.","th":["The Holy Spirit","Christ Risen & Glorified","Service & Devotion"]}],"w":{"The Father":25,"Worship & Praise":25,"The Holy Spirit":100,"Sonship & Adoption":25,"Joy & Thanksgiving":25,"New Creation":25,"God's Love for Us":25,"Redemption":25,"Rest & Peace":25,"Assurance & Security":25,"Christ Risen & Glorified":25,"Service & Devotion":25}},
"343":{"m":"7.6.","a":"John Nelson Darby (1800-1882)","tn":"Lancashire","tc":"H. T. Smart (1813-1879)","fl":"O Lord, Thy love's unbounded,","v":[{"n":1,"t":"O Lord, Thy love's unbounded,\nSo sweet, so full, so free;\nMy soul is all transported\nWhene'er I think on Thee.","th":["God's Love for Us","Our Love for The Son/Christ"]},{"n":2,"t":"Yet, Lord, alas, what weakness\nWithin myself I find:\nNo infant's changing pleasure\nIs like my wandering mind.","th":["Trial & Conflict"]},{"n":3,"t":"And yet Thy love's unchanging,\nAnd doth recall my heart\nTo joy in all its brightness -\nThe peace its beams impart.","th":["God's Love for Us","Rest & Peace"]},{"n":4,"t":"Yet sure, if in Thy presence\nMy soul still constant were,\nMine eye would, more familiar,\nIts brighter glories bear.","th":["Our Love for The Son/Christ"]},{"n":5,"t":"And thus Thy deep perfections\nMuch better should I know,\nAnd with adoring fervour\nIn this Thy nature grow.","th":["Worship & Praise","Our Love for The Son/Christ"]},{"n":6,"t":"Still sweet 'tis to discover,\nIf clouds have dimmed my sight,\nWhen passed, eternal Lover,\nTowards me, as e'er, Thou'rt bright.","th":["God's Love for Us"]},{"n":7,"t":"O keep my soul, then, Jesus,\nAbiding still with Thee;\nAnd if I wander, teach me\nSoon back to Thee to flee,","th":["The Person of Christ","Our Love for The Son/Christ"]},{"n":8,"t":"That all Thy gracious favour\nMay to my soul be known;\nAnd, versed in this Thy goodness,\nMy hopes Thyself shall crown.","th":["Grace","God's Love for Us"]}],"w":{"God's Love for Us":50,"Our Love for The Son/Christ":50,"Trial & Conflict":12,"Rest & Peace":12,"Worship & Praise":12,"The Person of Christ":12,"Grace":12}},
"344":{"m":"11.10.11.10.","a":"Mrs. A. A. Whiddington (19th Century)","tn":"Exaltation","tc":"C. H. Forrest, 19th C.","fl":"Not I, but Christ, be honoured, loved, exalted;","v":[{"n":1,"t":"Not I, but Christ, be honoured, loved, exalted;\nNot I, but Christ, be seen, be known, be heard;\nNot I, but Christ, in every look and action;\nNot I, but Christ, in every thought and word.","th":["The Person of Christ","Service & Devotion"]},{"n":2,"t":"Not I, but Christ, to gently soothe in sorrow;\nNot I, but Christ, to wipe the falling tear;\nNot I, but Christ, to lift the weary burden;\nNot I, but Christ, to hush away all fear.","th":["Service & Devotion","The Person of Christ"]},{"n":3,"t":"Not I, but Christ, in lowly, silent labour;\nNot I, but Christ, in humble, earnest toil;\nChrist, only Christ! no show, no ostentation;\nChrist, none but Christ, the gatherer of the spoil.","th":["Service & Devotion","The Person of Christ"]},{"n":4,"t":"Christ, only Christ, ere long will fill my vision;\nGlory excelling, soon, full soon, I'll see -\nChrist, only Christ, my every wish fulfilling -\nChrist, only Christ, my All in all to be.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","The Person of Christ"]}],"w":{"The Person of Christ":100,"Service & Devotion":75,"The Lord's Coming / Rapture":25,"Heaven & The Father's House":25}},
"345":{"m":"6.8.6.4.","a":"W. J. Blew","tn":"Troyte's Chant","tc":"A. H. D. Troyte (1811-1857)","fl":"A shameful death He dies,","v":[{"n":1,"t":"A shameful death He dies,\nUplifted with transgressors twain,\nThe Lamb for sacrifice,\nBy sinners slain.","th":["The Cross & Sufferings of Christ","The Lamb of God"]},{"n":2,"t":"Full was the cup of woe;\nIn death His thorn-crowned head declined;\n\" 'Tis done,\" He cried, and then\nHis soul resigned.","th":["The Cross & Sufferings of Christ"]},{"n":3,"t":"O come my soul, and gaze\nOn that great grief, that crown of thorn:\nSee there, in deep amaze,\nThy sentence borne.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement"]},{"n":4,"t":"To Thee, O Saviour Lord,\nWho washed in blood our sins away,\nOur boundless gratitude\nIts thanks would pay.","th":["Worship & Praise","The Precious Blood / Atonement","Joy & Thanksgiving"]}],"w":{"The Cross & Sufferings of Christ":75,"The Lamb of God":25,"The Precious Blood / Atonement":50,"Worship & Praise":25,"Joy & Thanksgiving":25}},
"346":{"m":"6.6.6.6.8.8.","a":"I Watts (1674-1748)","tn":"Darwall","tc":"J. Darwall (1731-1789)","fl":"Lord of the worlds above,","v":[{"n":1,"t":"Lord of the worlds above,\nHow pleasant and how fair\nThe dwellings of Thy love,\nThe heavenly mansions are!\nTo Thine abode\nOur hearts aspire,\nWith warm desire\nTo see our God.","th":["Heaven & The Father's House","God's Love for Us","Our Love for The Father"]},{"n":2,"t":"There is Thy throne of grace,\nThe virtue of the blood;\nThere lives before Thy face\nOur great High Priest, O God;\nHis name our plea,\nWe now draw near\nIn holy fear,\nTo worship Thee.","th":["Christ's Intercession / Priesthood","The Precious Blood / Atonement","Worship & Praise","Grace"]},{"n":3,"t":"We go from strength to strength\nThrough this dark vale of tears,\nTill each arrives at length,\nAnd safe in heaven appears:\nO glorious seat,\nWhere God the King\nShall shortly bring\nOur willing feet.","th":["Pilgrimage / Desert Journey","Heaven & The Father's House","Trial & Conflict"]}],"w":{"Heaven & The Father's House":67,"God's Love for Us":33,"Our Love for The Father":33,"Christ's Intercession / Priesthood":33,"The Precious Blood / Atonement":33,"Worship & Praise":33,"Grace":33,"Pilgrimage / Desert Journey":33,"Trial & Conflict":33}},
"347":{"m":"8.7.8.7.4.7.","a":"Thomas Kelly (1769-1854)","tn":"Praise My Soul","tc":"J. Goss (1800-1880)","fl":"Gracious Lord, my heart is fixed;","v":[{"n":1,"t":"Gracious Lord, my heart is fixed;\nSing I will, and sing of Thee,\nSince the cup that justice mixed,\nThou hast drunk, and drunk for me;\nGreat Deliverer,\nThou hast set the prisoner free.","th":["Worship & Praise","Redemption","Joy & Thanksgiving"]},{"n":2,"t":"Many were the chains that bound me,\nBut the Lord has loosed them all;\nArms of mercy now surround me,\nFavours these, nor few nor small;\nSaviour, keep me,\nKeep Thy servant lest he fall.","th":["Redemption","Grace","God's Love for Us"]},{"n":3,"t":"Fair the scene that lies before me;\nLife eternal Jesus gives;\nWhile He waves His banner o'er me,\nPeace and joy my soul receives:\nSure His promise;\nI shall live because He lives.","th":["Assurance & Security","Rest & Peace"]},{"n":4,"t":"When the world would bid me leave Thee,\nTelling me of shame and loss,\nSaviour, guard me, lest I grieve Thee,\nLest I cease to love Thy cross;\nThis is treasure;\nAll the rest I count but loss.","th":["The Cross & Sufferings of Christ","Separation from the World","Our Love for The Son/Christ"]}],"w":{"Worship & Praise":25,"Redemption":50,"Joy & Thanksgiving":25,"Grace":25,"God's Love for Us":25,"Assurance & Security":25,"Rest & Peace":25,"The Cross & Sufferings of Christ":25,"Separation from the World":25,"Our Love for The Son/Christ":25}},
"348":{"m":"C.M.","a":"John Nelson Darby (1800-1882)","tn":"Warwick","tc":"S. Stanley (1767-1822)","fl":"Blest Lord, Thou spakest! 'twas Thy voice","v":[{"n":1,"t":"Blest Lord, Thou spakest! 'twas Thy voice\nThat led our hearts to Thee;\nThat drew us to that better choice,\nWhere grace has set us free.","th":["Grace","The Word of God","Our Love for The Son/Christ"]},{"n":2,"t":"Thou wouldest that we should rejoice\nAnd walk by faith below;\nEnough, that we have heard Thy voice,\nAnd learned Thy love's deep woe -","th":["Joy & Thanksgiving","God's Love for Us","The Cross & Sufferings of Christ"]},{"n":3,"t":"Thy glory, Lord - this living waste\nTo us no rest can give;\nOur path is on with earnest haste,\nLord, in Thy rest to live.","th":["Pilgrimage / Desert Journey","Rest & Peace","Separation from the World"]},{"n":4,"t":"Our happiness, O Lord, with Thee\nIs long laid up in store,\nFor that blest day when Thee we'll see,\nAnd conflict will be o'er.","th":["Heaven & The Father's House","Rest & Peace"]},{"n":5,"t":"Yes, love divine in Thee we know;\nThe Father's glories soon\nShall burst upon our ravished view,\nThyself our endless crown.","th":["God's Love for Us","The Father","Heaven & The Father's House"]},{"n":6,"t":"Soon shall we see Thee as Thou art,\nO hope for ever blest!\nThou'lt call us, in our heavenly part,\nThe Father's house, to rest.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","The Father"]},{"n":7,"t":"O rest ineffable, divine,\nThe rest of God above,\nWhere we shall ever see Thee shine,\nOur joy, eternal love!","th":["Rest & Peace","Heaven & The Father's House","God's Love for Us"]}],"w":{"Grace":14,"The Word of God":14,"Our Love for The Son/Christ":14,"Joy & Thanksgiving":14,"God's Love for Us":43,"The Cross & Sufferings of Christ":14,"Pilgrimage / Desert Journey":14,"Rest & Peace":43,"Separation from the World":14,"Heaven & The Father's House":57,"The Father":29,"The Lord's Coming / Rapture":14}},
"349":{"m":"S.M.","a":"I Watts (1674-1748)","tn":"Scott","tc":"J. H. G. Naegeli (1768-1836)","fl":"MY soul repeat His praise","v":[{"n":1,"t":"MY soul repeat His praise\nWhose mercies are so great;\nWhose anger is so slow to rise,\nSo ready to abate.","th":["Worship & Praise","Grace"]},{"n":2,"t":"High as the heavens are raised\nAbove the earth we tread,\nSo far the riches of God's grace\nOur highest thoughts exceed.","th":["Grace","God's Love for Us"]},{"n":3,"t":"His power subdues our sin;\nAnd His forgiving love,\nFar as the east is from the west,\nDid all our guilt remove.","th":["Forgiveness of Sins","God's Love for Us"]},{"n":4,"t":"Man's life is as the grass,\nOr like the morning flower;\nIf one sharp blast sweep o'er the field,\nIt withers in an hour.","th":["Pilgrimage / Desert Journey"]},{"n":5,"t":"But Thy compassions, Lord,\nTo endless years endure;\nAnd all Thy people ever find\nThy word of promise sure.","th":["God's Love for Us","Assurance & Security","The Word of God"]}],"w":{"Worship & Praise":20,"Grace":40,"God's Love for Us":60,"Forgiveness of Sins":20,"Pilgrimage / Desert Journey":20,"Assurance & Security":20,"The Word of God":20}},
"350":{"m":"10.4.10.4.10.10.","a":"James Boyd (1851-1936)","tn":"Sandon","tc":"C. H. Purday (1799-1885)","fl":"O TEACH us, Lord, Thy searchless love to know,","v":[{"n":1,"t":"O TEACH us, Lord, Thy searchless love to know,\nThou, who hast died.\nBefore our feeble faith, Lord Jesus, show\nThy hands and side;\nThat our glad hearts, responsive unto Thine,\nMay wake with all the power of love divine.","th":["God's Love for Us","The Cross & Sufferings of Christ"]},{"n":2,"t":"Thy death has brought to light the Father's heart,\nAnd ours has won;\nAnd now we contemplate Thee as Thou art,\nGod's glorious Son!\nAnd know that we are loved with that great love,\nThat rests on Thee in those bright courts above.","th":["The Father","God's Love for Us","Christ Risen & Glorified"]},{"n":3,"t":"Thy flesh is meat, Thy blood, blest Saviour, shed,\nIs drink indeed;\nOn Thee, the true, the heavenly, living Bread,\nOur souls would feed,\nAnd live with Thee in life's eternal home,\nWhere sin, nor want, nor woe, nor death can come.","th":["The Lord's Supper / Remembrance","The Precious Blood / Atonement","Heaven & The Father's House"]}],"w":{"God's Love for Us":67,"The Cross & Sufferings of Christ":33,"The Father":33,"Christ Risen & Glorified":33,"The Lord's Supper / Remembrance":33,"The Precious Blood / Atonement":33,"Heaven & The Father's House":33}},
"351":{"m":"C.M.","a":"Sir Edward Denny (1796-1889)","tn":"Ortonville","tc":"T. Hastings (1784-1872)","fl":"Bride of the Lamb, awake, awake;","v":[{"n":1,"t":"Bride of the Lamb, awake, awake;\nWhy sleep for sorrow now?\nThe hope of glory, Christ, is thine,\nA child of glory thou.","th":["The Church / Bride of Christ","Heaven & The Father's House"]},{"n":2,"t":"Thy spirit, through the lonely night,\nFrom earthly joy apart,\nHath sighed for one that's far away,\nThe Bridegroom of thy heart.","th":["Pilgrimage / Desert Journey","Our Love for The Son/Christ"]},{"n":3,"t":"But see, the night is waning fast,\nThe breaking morn is near;\nAnd Jesus comes, with voice of love,\nThy drooping heart to cheer.","th":["The Lord's Coming / Rapture","The Church / Bride of Christ"]},{"n":4,"t":"He comes, for, oh! His yearning heart\nNo more can bear delay,\nTo scenes of full unmingled joy\nTo call His bride away.","th":["The Lord's Coming / Rapture","God's Love for Us","The Church / Bride of Christ"]},{"n":5,"t":"This earth, the scene of all His woe,\nA homeless wild to thee,\nFull soon upon His heavenly throne\nIts rightful King shall see.","th":["The Eternal Kingdom / Reign of Christ"]},{"n":6,"t":"Thou too shalt reign; He will not wear\nHis crown of joy alone;\nAnd earth His royal bride shall see\nBeside Him on the throne.","th":["The Church / Bride of Christ","The Eternal Kingdom / Reign of Christ"]},{"n":7,"t":"Then weep no more; 'tis all thine own,\nHis crown, His joy divine;\nAnd sweeter far than all beside,\nHe, He Himself, is thine.","th":["Joy & Thanksgiving","The Lord's Coming / Rapture","The Person of Christ"]}],"w":{"The Church / Bride of Christ":57,"Heaven & The Father's House":14,"Pilgrimage / Desert Journey":14,"Our Love for The Son/Christ":14,"The Lord's Coming / Rapture":43,"God's Love for Us":14,"The Eternal Kingdom / Reign of Christ":29,"Joy & Thanksgiving":14,"The Person of Christ":14}},
"352":{"m":"8.7.","a":"Mrs. Emma Francis Bevan (1827-1909)","tn":"Halle","tc":"K. Muller (1815-1898)","fl":"From the palace of His glory,","v":[{"n":1,"t":"From the palace of His glory,\nFrom the home of joy and love,\nCame the Lord Himself to seek us;\nHe would have us there above.","th":["God's Love for Us","Heaven & The Father's House"]},{"n":2,"t":"There from that eternal brightness\nHave His thoughts flowed forth in love;\nHe in His great love would have us\nEver there with Him above.","th":["God's Love for Us","Heaven & The Father's House"]},{"n":3,"t":"Trembling, we had hoped for mercy -\nSome lone place within the door;\nBut the crown, the throne, the mansion\nAll were purposed long before.","th":["Grace","Heaven & The Father's House"]},{"n":4,"t":"And in past and distant ages,\nIn those courts so bright and fair,\nEre we were, was He rejoicing,\nAll He won with us to share.","th":["God's Love for Us","Heaven & The Father's House","Joy & Thanksgiving"]}],"w":{"God's Love for Us":75,"Heaven & The Father's House":100,"Grace":25,"Joy & Thanksgiving":25}},
"353":{"m":"6-8s.","a":"Samuel Davies (1723-1761)","tn":"Pardon","tc":"J. H. Egli ?  (1742-1810)","fl":"Great God of wonders, all Thy ways","v":[{"n":1,"t":"Great God of wonders, all Thy ways\nAre righteous, matchless and divine;\nBut the blest triumphs of Thy grace\nMost marvellous, unrivalled, shine;\nWho is a pardoning God like Thee?\nOr who has grace so rich and free?","th":["Grace","Forgiveness of Sins","Worship & Praise"]},{"n":2,"t":"Crimes of such horror to forgive,\nSuch guilty, daring worms to spare;\nThis is Thy grand prerogative,\nAnd none can in that honour share:\nPardon, O God, is only Thine;\nMercy and grace are all divine.","th":["Forgiveness of Sins","Grace"]},{"n":3,"t":"In wonder lost, with trembling joy,\nWe hail the pardon of our God,\nPardon for crimes of deepest dye,\nA pardon traced in Jesus' blood.\nTo pardon thus is Thine alone;\nMercy and grace are both Thine own.","th":["Forgiveness of Sins","The Precious Blood / Atonement","Joy & Thanksgiving"]},{"n":4,"t":"Soon shall this strange, this wondrous grace,\nThis perfect miracle of love,\nFill the wide earth, while sweeter praise\nSounds its own note in heaven above:\nWho is a pardoning God like Thee?\nOr who has grace so rich, so free?","th":["Grace","Worship & Praise","God's Love for Us","Heaven & The Father's House"]}],"w":{"Grace":75,"Forgiveness of Sins":75,"Worship & Praise":50,"The Precious Blood / Atonement":25,"Joy & Thanksgiving":25,"God's Love for Us":25,"Heaven & The Father's House":25}},
"354":{"m":"8.7.","a":"Robert Robinson (1735-1790)","tn":"West","tc":"Miss L. C. Wellesley","fl":"Come, Thou fount of every blessing,","v":[{"n":1,"t":"Come, Thou fount of every blessing,\nTune my heart to sing Thy grace;\nStreams of mercy, never ceasing,\nCall for ceaseless songs of praise.","th":["Grace","Worship & Praise"]},{"n":2,"t":"Jesus sought me when a stranger,\nWandering from the ways of God:\nHe, to rescue me from danger,\nInterposed His precious blood.","th":["The Precious Blood / Atonement","Redemption","The Person of Christ"]},{"n":3,"t":"Oh, to grace how great a debtor\nDaily I'm constrained to be!\nLet that grace, Lord, like a fetter,\nBind my wandering heart to Thee.","th":["Grace","Our Love for The Son/Christ"]},{"n":4,"t":"Prone to wander, Lord, I feel it,\nProne to grieve the One I love:\nYet Thou, Lord, hast deigned to seal it,\nWith Thy Spirit from above.","th":["The Holy Spirit","Our Love for The Son/Christ"]},{"n":5,"t":"Rescued thus from sin and danger,\nPurchased by the Saviour's blood,\nMay I walk on earth a stranger,\nAs a son and heir of God.","th":["Redemption","The Precious Blood / Atonement","Sonship & Adoption","Separation from the World"]}],"w":{"Grace":40,"Worship & Praise":20,"The Precious Blood / Atonement":40,"Redemption":40,"The Person of Christ":20,"Our Love for The Son/Christ":40,"The Holy Spirit":20,"Sonship & Adoption":20,"Separation from the World":20}},
"355":{"m":"S.M.","a":"I Watts (1674-1748)","tn":"Trentham","tc":"R. Jackson (1842-1914)","fl":"Come, ye that love the Lord,","v":[{"n":1,"t":"Come, ye that love the Lord,\nAnd let your joys be known;\nJoin in a song with sweet accord,\nAnd thus approach the throne.","th":["Worship & Praise","Joy & Thanksgiving"]},{"n":2,"t":"Let those refuse to sing\nWho never knew our God;\nBut children should their praises bring\nAnd speak their joys abroad.","th":["Worship & Praise","Sonship & Adoption"]},{"n":3,"t":"The God who rules on high\nAnd all the earth surveys,\nWho rides upon the stormy sky\nAnd calms the roaring seas,","th":["Worship & Praise","The Father"]},{"n":4,"t":"This sovereign God is ours,\nA God of boundless love;\nWhose faithful grace and mighty powers\nShall carry us above.","th":["God's Love for Us","Grace","Worship & Praise"]},{"n":5,"t":"There we shall see His face,\nAnd never, never sin;\nThere from the fountain of His grace\nDrink endless pleasures in.","th":["Heaven & The Father's House","Grace"]}],"w":{"Worship & Praise":80,"Joy & Thanksgiving":20,"Sonship & Adoption":20,"The Father":20,"God's Love for Us":20,"Grace":40,"Heaven & The Father's House":20}},
"356":{"m":"L.M.","a":"John Nelson Darby (1800-1882)","tn":"Maryton","tc":"H. P. Smith (1825-1898)","fl":"A holy Father's constant care","v":[{"n":1,"t":"A holy Father's constant care\nKeeps watch, with an unwearying eye,\nTo see what fruits His children bear -\nFruits that may suit their calling high;","th":["The Father","Sonship & Adoption"]},{"n":2,"t":"Takes ever knowledge of our state,\nWhat dims communion with His love,\nMight check our growth, or separate\nOur hearts from what's revealed above.","th":["The Father","God's Love for Us"]},{"n":3,"t":"O wondrous love! that ne'er forgets\nThe objects of its tender care;\nMay chasten still, while sin besets,\nTo warn and guard them where they are:","th":["God's Love for Us","The Father","Trial & Conflict"]},{"n":4,"t":"Yet ne'er forgets, but feeds them still\nWith tokens of His tender love;\nWill keep till, freed from every ill,\nThey find their rest with Him above.","th":["God's Love for Us","Rest & Peace","Heaven & The Father's House","The Father"]}],"w":{"The Father":100,"Sonship & Adoption":25,"God's Love for Us":75,"Trial & Conflict":25,"Rest & Peace":25,"Heaven & The Father's House":25}},
"357":{"m":"7.6.","a":"James George Deck (1802-1884)","tn":"Passion Chorale","tc":"H. L. Hassler (1564-1612)","fl":"Thou hast stood here, Lord Jesus","v":[{"n":1,"t":"Thou hast stood here, Lord Jesus\nBeside the still, cold grave,\nAnd proved Thy deep compassion,\nThy mightiness to save;\nThy tears of tender pity,\nThy spirit's anguished groan,\nTeach how for us Thou feelest\nNow seated on the throne.","th":["The Person of Christ","God's Love for Us","Christ's Intercession / Priesthood"]},{"n":2,"t":"Thou hast lain here, Lord Jesus,\nThyself the Victim then;\nThe Lord of life and glory\nOnce slain for sinful men.\nFrom sin and condemnation,\nWhen none but Thou could'st save,\nThy love than death was stronger,\nAnd deeper than the grave.","th":["The Cross & Sufferings of Christ","Redemption","God's Love for Us"]},{"n":3,"t":"Thou hast been here, Lord Jesus,\nBut Thou art here no more;\nThe terror and the darkness,\nThe night of death are o'er;\nGreat Captain of salvation,\nThy triumphs now we sing;\nO grave, where is thy victory?\nO death, where is thy sting?","th":["Christ Risen & Glorified","Worship & Praise"]},{"n":4,"t":"We wait for Thine appearing:\nWe weep, but we rejoice;\nIn all our grief and sorrow\nWe still can hear Thy voice:\n\"I am the Resurrection;\nI live, who once was slain;\nFear not, the one thou mournest\nShall rise with Me to reign.\"","th":["The Lord's Coming / Rapture","Christ Risen & Glorified"]}],"w":{"The Person of Christ":25,"God's Love for Us":50,"Christ's Intercession / Priesthood":25,"The Cross & Sufferings of Christ":25,"Redemption":25,"Christ Risen & Glorified":50,"Worship & Praise":25,"The Lord's Coming / Rapture":25}},
"358":{"m":"C.M.","a":"E. C. Rubie (1846-1942)","tn":"Wiltshire","tc":"G. T. Smart (1776-1867)","fl":"O God of love, how measureless","v":[{"n":1,"t":"O God of love, how measureless\nThy thoughts to us are shown!\nMore precious they than tongue can tell,\nTheir fulness none have known!","th":["God's Love for Us","The Father"]},{"n":2,"t":"We can but bless Thee for the light\nWhich shines in Christ Thy Son,\nThe favour of Thy countenance,\nWhich He for us has won.","th":["The Person of Christ","The Father","Grace"]},{"n":3,"t":"Our hearts are more than filled with joy,\nOur cup indeed runs o'er,\nAnd, Father, in Thy presence now\nWe worship and adore.","th":["Joy & Thanksgiving","Worship & Praise","The Father"]},{"n":4,"t":"We boast in Thee, Thou Source of good,\nThy glory fills our sight,\nNow reconciled through Jesus' death,\nWe praise with great delight.","th":["Worship & Praise","The Precious Blood / Atonement","Joy & Thanksgiving"]}],"w":{"God's Love for Us":25,"The Father":75,"The Person of Christ":25,"Grace":25,"Joy & Thanksgiving":50,"Worship & Praise":50,"The Precious Blood / Atonement":25}},
"359":{"m":"C.M.","a":"Charles Andrew Coates (1862-1945)","tn":"Remember Me","tc":"A. Hull","fl":"No act of power could e'er atone,","v":[{"n":1,"t":"No act of power could e'er atone,\nNo wonder-working word\nCould, from the brightness of the throne,\nMake love's sweet voice be heard.","th":["The Cross & Sufferings of Christ","God's Love for Us"]},{"n":2,"t":"If sinners ever were to know\nThe depths of love divine,\nAll Calvary's weakness and its woe,\nBlest Saviour, must be Thine.","th":["The Cross & Sufferings of Christ","God's Love for Us"]},{"n":3,"t":"God's righteousness is there proclaimed,\nHis mercy's depths are known,\nWhile to the full Thou hast maintained\nThe glory of His throne.","th":["The Cross & Sufferings of Christ","Grace"]},{"n":4,"t":"God now is glorified in Thee,\nIn Thee, His only Son;\nHis hand, His house, His heart are free,\nBecause Thy work is done.","th":["Christ Risen & Glorified","The Father","Redemption"]}],"w":{"The Cross & Sufferings of Christ":75,"God's Love for Us":50,"Grace":25,"Christ Risen & Glorified":25,"The Father":25,"Redemption":25}},
"360":{"m":"7.6.","a":"Samuel C. G. Kaester, (1762-1838)","tn":"Day of Rest","tc":"J. W. Elliott (1833-1915)","fl":"O Jesus, Friend unfailing,","v":[{"n":1,"t":"O Jesus, Friend unfailing,\nHow dear art Thou to me!\nAre cares or fears assailing?\nI find my strength in Thee!\nWhy should my feet grow weary\nOf this my pilgrim way?\nRough though the path and dreary,\nIt ends in perfect day!","th":["The Person of Christ","Pilgrimage / Desert Journey","Trial & Conflict","Rest & Peace"]},{"n":2,"t":"Nought, nought I count as pleasure,\nCompared, O Christ, with Thee!\nThy sorrow without measure,\nEarned peace and joy for me.\nI love to own, Lord Jesus,\nThy claims o'er me divine,\nBought with Thy blood most precious\nWhose can I be but Thine?","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","Separation from the World","Our Love for The Son/Christ"]},{"n":3,"t":"What fills my heart with gladness?\n'Tis Thine abounding grace!\nWhere can I look in sadness,\nBut, Jesus, on Thy face?\nMy all is Thy providing -\nThy love can ne'er grow cold;\nIn Thee, my refuge, hiding -\nNo good wilt Thou withhold.","th":["Grace","God's Love for Us","The Person of Christ"]},{"n":4,"t":"Why should I droop in sorrow?\nThou'rt ever by my side!\nWhy, trembling, dread the morrow?\nWhat ill can e'er betide?\nIf I my cross have taken,\n'Tis but to follow Thee;\nIf scorned, despised, forsaken,\nNought severs Thee from me.","th":["Assurance & Security","Trial & Conflict","The Cross & Sufferings of Christ"]},{"n":5,"t":"O worldly pomp and glory,\nYour charms are spread in vain!\nI've heard a sweeter story!\nI've found a truer gain!\nWhere Christ a place prepareth,\nThere is my loved abode;\nThere shall I gaze on Jesus:\nThere shall I dwell with God.","th":["Separation from the World","Heaven & The Father's House"]},{"n":6,"t":"For every tribulation,\nFor every sore distress,\nIn Christ I've full salvation,\nSure help and quiet rest.\nNo fear of foes prevailing,\nI triumph, Lord, in Thee!\nO Jesus, Friend unfailing,\nHow dear art Thou to me!","th":["Redemption","Trial & Conflict","Rest & Peace","The Person of Christ"]}],"w":{"The Person of Christ":50,"Pilgrimage / Desert Journey":17,"Trial & Conflict":50,"Rest & Peace":33,"The Cross & Sufferings of Christ":33,"The Precious Blood / Atonement":17,"Separation from the World":33,"Our Love for The Son/Christ":17,"Grace":17,"God's Love for Us":17,"Assurance & Security":17,"Heaven & The Father's House":17,"Redemption":17}},
"361":{"m":"7.6.","a":"Miss Annie L. Waring (1820-1910)","tn":"Confidence","tc":"Anonymous","fl":"In heavenly love abiding,","v":[{"n":1,"t":"In heavenly love abiding,\nNo change my heart shall fear;\nAnd safe is such confiding,\nFor nothing changes here;\nThe storm may roar without me,\nMy heart may low be laid,\nBut God is round about me,\nAnd can I be dismayed?","th":["God's Love for Us","Assurance & Security","Rest & Peace"]},{"n":2,"t":"Wherever He may guide me,\nNo want shall turn me back;\nMy Shepherd is beside me,\nAnd nothing can I lack;\nHis wisdom ever waketh,\nHis sight is never dim;\nHe knows the way He taketh,\nAnd I will walk with Him.","th":["Pilgrimage / Desert Journey","Assurance & Security","The Person of Christ"]},{"n":3,"t":"Green pastures are before me,\nWhich yet I have not seen;\nBright skies will soon be o'er me,\nWhere the dark clouds have been:\nMy hope I cannot measure,\nMy path to life is free,\nMy Saviour has my treasure,\nAnd He will walk with me.","th":["Assurance & Security","The Lord's Coming / Rapture","The Person of Christ"]},{"n":4,"t":"We'll see Thee soon, Lord Jesus,\nAmid the ransomed throng,\nIts glory, joy and beauty,\nIts never-ending song:\nOh, day of wondrous promise,\nThe Bridegroom and the bride\nAre seen in glory ever,\nFor ever satisfied!","th":["The Lord's Coming / Rapture","The Church / Bride of Christ","Heaven & The Father's House","Joy & Thanksgiving"]}],"w":{"God's Love for Us":25,"Assurance & Security":75,"Rest & Peace":25,"Pilgrimage / Desert Journey":25,"The Person of Christ":50,"The Lord's Coming / Rapture":50,"The Church / Bride of Christ":25,"Heaven & The Father's House":25,"Joy & Thanksgiving":25}},
"362":{"m":"10s.","a":"Anonymous","tn":"Heiland","tc":"L. Burgmiller","fl":"Oh! what a Saviour is Jesus the Lord,","v":[{"n":1,"t":"Oh! what a Saviour is Jesus the Lord,\nWell may His name by His saints be adored!\nHe has redeemed them from hell by His blood,\nSaved them for ever, and brought them to God.","th":["Worship & Praise","Redemption","The Precious Blood / Atonement","The Person of Christ"]},{"n":2,"t":"Now in the glory He waits to impart\nPeace to the conscience and joy to the heart -\nWaits to be gracious, to pardon and heal\nAll who their sin and their wretchedness feel.","th":["Rest & Peace","Grace","Forgiveness of Sins","Christ Risen & Glorified"]},{"n":3,"t":"Thousands have fled to His spear-pierced side,\nWelcome they all have been, none are denied;\nWeary and laden, they all have been blest,\nJoyfully now in the Saviour they rest.","th":["The Precious Blood / Atonement","Rest & Peace","Redemption"]}],"w":{"Worship & Praise":33,"Redemption":67,"The Precious Blood / Atonement":67,"The Person of Christ":33,"Rest & Peace":67,"Grace":33,"Forgiveness of Sins":33,"Christ Risen & Glorified":33}},
"363":{"m":"L.M.","a":"Mrs. G. Helyar","tn":"Whitburn","tc":"H. W. Baker (1821-1877)","fl":"O Lord and Saviour, we recline","v":[{"n":1,"t":"O Lord and Saviour, we recline\nOn that eternal love of Thine.\nThou art our rest, and Thou alone\nRemainest when all else is gone.","th":["God's Love for Us","The Person of Christ","Rest & Peace"]},{"n":2,"t":"Yes! \"Thou remainest\"; sea and land,\nE'en heaven shall pass, but Thou shalt stand:\nUndimmed Thy radiancy appears,\nChangeless through all the changing years.","th":["The Person of Christ","Assurance & Security"]},{"n":3,"t":"Lord, on the throne Thy love's the same\nAs once upon Thy cross of shame:\nIn lowliness Thou cam'st to die;\nThou livest now for us on high.","th":["The Cross & Sufferings of Christ","God's Love for Us","Christ's Intercession / Priesthood"]},{"n":4,"t":"We see Thee there, the Lamb once slain;\nThy loss was our eternal gain;\nWe see Thee crowned with glory now,\nNo shade on Thy victorious brow.","th":["The Lamb of God","Christ Risen & Glorified","The Cross & Sufferings of Christ"]},{"n":5,"t":"The shadow dwelt on Calvary's tree,\nAnd now Thine unveiled face we see;\nPraise be to God for that blest word,\nThat \"Thou remainest\", bless\u00e8d Lord.","th":["Worship & Praise","The Person of Christ"]}],"w":{"God's Love for Us":40,"The Person of Christ":60,"Rest & Peace":20,"Assurance & Security":20,"The Cross & Sufferings of Christ":40,"Christ's Intercession / Priesthood":20,"The Lamb of God":20,"Christ Risen & Glorified":20,"Worship & Praise":20}},
"364":{"m":"6-8s.","a":"George West Frazer (1830-1896)","tn":"Saved By Grace","tc":"G. C. Stebbins (1846-1945)","fl":"Have I an object, Lord, below,","v":[{"n":1,"t":"Have I an object, Lord, below,\nWhich would divide my heart from Thee;\nWhich would divert its even flow\nIn answer to Thy constancy?\nOh, teach me quickly to return,\nAnd cause my heart afresh to burn!","th":["Service & Devotion","Our Love for The Son/Christ"]},{"n":2,"t":"Have I a hope, however dear,\nWhich would defer Thy coming, Lord,\nWhich would detain my spirit here,\nWhere nought can lasting joy afford?\nFrom it, my Saviour, set me free\nTo look and long and wait for Thee.","th":["The Lord's Coming / Rapture","Our Love for The Son/Christ"]},{"n":3,"t":"Be Thou the object bright and fair\nTo fill and satisfy the heart;\nMy hope to meet Thee in the air,\nAnd nevermore from Thee to part;\nThat I may undistracted be\nTo follow, serve, and wait for Thee.","th":["The Lord's Coming / Rapture","Service & Devotion","Our Love for The Son/Christ"]}],"w":{"Service & Devotion":67,"Our Love for The Son/Christ":100,"The Lord's Coming / Rapture":67}},
"365":{"m":"8.7.","a":"Mrs. J. A. Trench (1843-1925)","tn":"Hyfrydol","tc":"R. H. Prichard (1811-1887)","fl":"Oh, the brightness of the glory","v":[{"n":1,"t":"Oh, the brightness of the glory\nShining in the Saviour's face!\nTelling all the bless\u00e8d story\nOf the ways of God in grace:\nLowly, hated, and rejected\nIn the world He came to save,\nBy the glory of the Father\nRaised triumphant from the grave.","th":["Christ Risen & Glorified","Grace","The Cross & Sufferings of Christ","The Father"]},{"n":2,"t":"Centre of the Father's counsels,\nHe for whom all things were made!\nObject of the Father's pleasure,\nWho the Father's name displayed!\nAll the Father's will accomplished,\nHe to death obedient trod;\nNow in highest glory seated,\nCentre of the throne of God.","th":["The Father","The Person of Christ","Christ Risen & Glorified","The Eternal Kingdom / Reign of Christ"]},{"n":3,"t":"There we see Him crowned with glory,\nGlory in His unveiled face,\nAnd in peace and rest before Him\nIn that glory learn of grace:\nFor it shineth in the visage\nOf the One who for us died,\nBore our sins and all their judgment,\nJesus Christ the crucified.","th":["Christ Risen & Glorified","Grace","The Cross & Sufferings of Christ","Rest & Peace"]},{"n":4,"t":"Called to share the Father's pleasure\nIn His well-belov\u00e8d Son,\nSeated on His throne in heaven\nFor the work on earth well done,\nWe adore Him, and are waiting\nTo behold Him face to face,\nIn His presence praise the glory,\nLearn the riches of His grace.","th":["The Father","Christ Risen & Glorified","Worship & Praise","Grace"]}],"w":{"Christ Risen & Glorified":100,"Grace":75,"The Cross & Sufferings of Christ":50,"The Father":75,"The Person of Christ":25,"The Eternal Kingdom / Reign of Christ":25,"Rest & Peace":25,"Worship & Praise":25}},
"366":{"m":"8.6.","a":"Horatius Bonar (1808-1889)","tn":"Vox Dilecti","tc":"J. B. Dykes (1823-1876)","fl":"I Heard the voice of Jesus say,","v":[{"n":1,"t":"I Heard the voice of Jesus say,\n\"Come unto me and rest;\nLay down, thou weary one, lay down\nThy head upon My breast.\"\nI came to Jesus as I was,\nWeary, and worn, and sad;\nI found in Him a resting-place,\nAnd He has made me glad.","th":["Rest & Peace","The Person of Christ","God's Love for Us","Joy & Thanksgiving"]},{"n":2,"t":"I heard the voice of Jesus say,\n\"Behold, I freely give\nThe living water - thirsty one,\nStoop down, and drink, and live.\"\nI came to Jesus and I drank\nOf that life-giving stream;\nMy thirst was quenched, my soul revived,\nAnd now I live in Him.","th":["The Person of Christ","God's Love for Us"]},{"n":3,"t":"I heard the voice of Jesus say,\n\"I am this dark world's light;\nLook unto Me: thy morn shall rise\nAnd all thy day be bright.\"\nI looked to Jesus, and I found\nIn Him my Star, my Sun;\nAnd in that light of life I'll walk\nTill travelling days are done.","th":["The Person of Christ","Pilgrimage / Desert Journey"]}],"w":{"Rest & Peace":33,"The Person of Christ":100,"God's Love for Us":67,"Joy & Thanksgiving":33,"Pilgrimage / Desert Journey":33}},
"367":{"m":"10s. or 11s.","a":"Richard Keene (d. 1787)","tn":"Foundation","tc":"Anonymous","fl":"How firm a foundation, ye saints of the Lord,","v":[{"n":1,"t":"How firm a foundation, ye saints of the Lord,\nIs laid up for faith in God's excellent word!\nWhat more can He say, than to you He has said -\nYou who to the Saviour for refuge have fled?","th":["The Word of God","Assurance & Security"]},{"n":2,"t":"In every condition, in sickness, in health;\nIn poverty's vale, or abounding in wealth;\nAt home, or abroad; on the land, on the sea;\nAs need may demand shall our strength ever be.","th":["Assurance & Security","Trial & Conflict"]},{"n":3,"t":"If through the deep waters He cause us to go,\nThe rivers of grief shall not overflow:\nAnd He will be with us in trouble to bless,\nAnd sanctify to us our deepest distress.","th":["Trial & Conflict","Assurance & Security"]},{"n":4,"t":"If through fiery trials our pathway should lie,\nHis grace all-sufficient shall be our supply;\nThe flame shall not hurt us; His only design\nIs the dross to consume and the gold to refine.","th":["Trial & Conflict","Grace"]},{"n":5,"t":"Fear not, He is with us; oh be not dismayed!\nFor He is our God, and will still be our aid;\nHe'll strengthen us, help us, and cause us to stand,\nUpheld by His gracious omnipotent hand.","th":["Assurance & Security","God's Love for Us"]},{"n":6,"t":"The soul that on Jesus hath leaned for repose,\nHe will not (He's said it) give up to its foes;\nThat soul, though all hell should endeavour to shake,\nHe'll never - no, never - no, never forsake.","th":["Rest & Peace","Assurance & Security"]}],"w":{"The Word of God":17,"Assurance & Security":83,"Trial & Conflict":50,"Grace":17,"God's Love for Us":17,"Rest & Peace":17}},
"368":{"m":"L.M.","a":"Anonymous","tn":"Old Hundredth","tc":"Anonymous","fl":"There is no other name than Thine,","v":[{"n":1,"t":"There is no other name than Thine,\nJehovah-Jesus, name divine,\nOn which to rest for sins forgiven,\nFor peace with God, for hope of heaven.","th":["The Person of Christ","Forgiveness of Sins","Rest & Peace","Heaven & The Father's House"]},{"n":2,"t":"Name above every name, Thy praise\nShall fill yon courts through endless days;\nJehovah-Jesus, name divine,\nRock of salvation, Thou art mine.","th":["Worship & Praise","The Person of Christ","Assurance & Security"]}],"w":{"The Person of Christ":100,"Forgiveness of Sins":50,"Rest & Peace":50,"Heaven & The Father's House":50,"Worship & Praise":50,"Assurance & Security":50}},
"369":{"m":"8.5.8.3.","a":"Frances Ridley Havergal (1836-1879)","tn":"Stephanos","tc":"H. W. Baker (1821-1877)","fl":"Precious, precious blood of Jesus,","v":[{"n":1,"t":"Precious, precious blood of Jesus,\nShed on Calvary;\nShed for rebels, shed for sinners,\nShed for me.","th":["The Precious Blood / Atonement","The Cross & Sufferings of Christ"]},{"n":2,"t":"Precious, precious blood of Jesus,\nAll the price is paid;\nPerfect pardon now is offered,\nPeace is made.","th":["The Precious Blood / Atonement","Rest & Peace","Forgiveness of Sins"]},{"n":3,"t":"Precious, precious blood of Jesus,\nJesus, God's own Son,\nTelling that the work is finished;\nAll is done.","th":["The Precious Blood / Atonement","The Person of Christ","Redemption"]},{"n":4,"t":"Though thy sins are red like crimson,\nDeep in scarlet glow,\nJesus' precious blood can make them\nWhite as snow.","th":["The Precious Blood / Atonement","Forgiveness of Sins"]},{"n":5,"t":"Precious blood, whose full atonement\nBringeth us to God!\nPrecious blood, our song and glory,\nPraise and laud!","th":["The Precious Blood / Atonement","Worship & Praise","Redemption"]}],"w":{"The Precious Blood / Atonement":100,"The Cross & Sufferings of Christ":20,"Rest & Peace":20,"Forgiveness of Sins":40,"The Person of Christ":20,"Redemption":40,"Worship & Praise":20}},
"370":{"m":"8.7.8.7.7.7.","a":"J. J. Hopkins","tn":"Till He Come","tc":"L. Mason (1792-1872)","fl":"Lord, Thy love has sought and found us","v":[{"n":1,"t":"Lord, Thy love has sought and found us\nWandering in this desert wide,\nThou hast thrown Thine arms around us,\nFor us suffered, bled and died:\nSing my soul! He loved thee,\nJesus gave Himself for me.","th":["God's Love for Us","The Cross & Sufferings of Christ","Pilgrimage / Desert Journey"]},{"n":2,"t":"Hark! what sounds of bitter weeping,\nFrom yon lonesome garden sweep,\n'Tis the Lord His vigil keeping,\nWhilst His followers sink in sleep.\nAh, my soul, He loved Thee,\nYes, He gave Himself for me.","th":["The Cross & Sufferings of Christ","God's Love for Us"]},{"n":3,"t":"He is speaking to His Father,\nTasting deep that bitter cup,\nYet He takes it, willing rather\nFor our sakes to drink it up.\nOh what love! He loved me!\nGave Himself, my soul, for me.","th":["The Cross & Sufferings of Christ","God's Love for Us","The Father"]},{"n":4,"t":"Then that closing scene of anguish;\nAll God's waves and billows roll\nOver Him, there left to languish\nOn the cross to save my soul.\nMatchless love! how vast, how free,\nJesus gave Himself for me.","th":["The Cross & Sufferings of Christ","God's Love for Us","Redemption"]},{"n":5,"t":"Hark again! His cries are waking\nEchoes on dark Calvary's hill;\nGod, my God, art Thou forsaking\nHim who always did Thy will?\nAh! my soul, it was for thee,\nYes! He gave Himself for me.","th":["The Cross & Sufferings of Christ","God's Love for Us"]},{"n":6,"t":"Lord, we joy, Thy toils are ended,\nGlad Thy suffering time is o'er,\nTo Thy Father's throne ascended,\nThere Thou liv'st to die no more.\nYes, my soul! He lives for thee,\nHe who gave Himself for me.","th":["Christ Risen & Glorified","Joy & Thanksgiving"]},{"n":7,"t":"Lord, we worship and adore Thee\nFor Thy rich, Thy matchless grace;\nPerfect soon in joy before Thee,\nWe shall see Thee face to face.\nYet e'en now our song shall be,\nJesus gave Himself for me.","th":["Worship & Praise","Grace","Heaven & The Father's House"]}],"w":{"God's Love for Us":71,"The Cross & Sufferings of Christ":71,"Pilgrimage / Desert Journey":14,"The Father":14,"Redemption":14,"Christ Risen & Glorified":14,"Joy & Thanksgiving":14,"Worship & Praise":14,"Grace":14,"Heaven & The Father's House":14}},
"371":{"m":"8.7.8.7.4.7.","a":"Thomas Kelly (1769-1854)","tn":"Cwm Rhondda","tc":"J. Hughes (1873-1932)","fl":"Look, ye saints, the sight is glorious;","v":[{"n":1,"t":"Look, ye saints, the sight is glorious;\nSee \"The Man of Sorrows\" now!\nFrom the fight returned victorious,\nEvery knee to Him shall bow.\nCrown Him! Crown Him!\nCrowns become the Victor's brow!","th":["Christ Risen & Glorified","Worship & Praise","The Cross & Sufferings of Christ"]},{"n":2,"t":"Crown the Saviour! angels own Him,\nRich the trophies Jesus brings;\nIn the seat of power enthrone Him,\nWhile the vault of heaven rings.\nCrown Him! Crown Him!\nCrown the Saviour \"King of kings\"!","th":["Worship & Praise","Christ Risen & Glorified","The Eternal Kingdom / Reign of Christ"]},{"n":3,"t":"Sinners in derision crowned Him,\nMocking thus the Saviour's claim;\nSaints and angels now surround Him,\nOwn His title, praise His name.\nCrown Him! Crown Him!\nSpread abroad the Victor's fame!","th":["The Cross & Sufferings of Christ","Worship & Praise","Christ Risen & Glorified"]},{"n":4,"t":"Hark! those bursts of acclamation!\nHark! those loud triumphant chords!\nJesus takes the highest station;\nOh, what joy the sight affords!\nCrown Him! Crown Him!\n\"King of kings, and Lord of lords\"!","th":["Worship & Praise","Christ Risen & Glorified","The Eternal Kingdom / Reign of Christ","Joy & Thanksgiving"]}],"w":{"Christ Risen & Glorified":100,"Worship & Praise":100,"The Cross & Sufferings of Christ":50,"The Eternal Kingdom / Reign of Christ":50,"Joy & Thanksgiving":25}},
"372":{"m":"8.7.","a":"Thomas Henry Reynolds (1830-1930)","tn":"Blaenwern","tc":"W. P. Rowlands (1860-1937)","fl":"Saved for glory! yes, for glory!","v":[{"n":1,"t":"Saved for glory! yes, for glory!\nBy the work of God's blest Son;\nSaved for glory, wondrous story,\nWe believe what Christ has done.\nSaved for glory, saved by Jesus,\nAll our meetness His alone;\nMeetness which the Father pleases\nOurs should be, in Christ the Son.","th":["Heaven & The Father's House","Redemption","Grace","The Person of Christ"]},{"n":2,"t":"All of grace, yes, grace surpassing,\nSuch a portion to bestow;\nBut the love all knowledge passing,\nGrace has called us now to know;\nLove that bore the stripes and sorrow,\nLove that suffered on the tree,\nLove that shares the bright tomorrow\nWith the loved ones, you and me.","th":["Grace","God's Love for Us","The Cross & Sufferings of Christ"]},{"n":3,"t":"Through that perfect offering, never\nCan our sins against us rise,\nPerfected are we for ever\nBy that wondrous sacrifice.\nJesus, Saviour! we are graven\nEver on Thy heart of love;\nWe shall reach the wished-for haven\nIn Thy Father's house above.","th":["The Precious Blood / Atonement","Assurance & Security","Heaven & The Father's House","God's Love for Us"]}],"w":{"Heaven & The Father's House":67,"Redemption":33,"Grace":67,"The Person of Christ":33,"God's Love for Us":67,"The Cross & Sufferings of Christ":33,"The Precious Blood / Atonement":33,"Assurance & Security":33}},
"373":{"m":"8.7.","a":"Mrs. J. A. Trench (1843-1925)","tn":"Oakham","tc":"Anonymous","fl":"All the path the saints are treading","v":[{"n":1,"t":"All the path the saints are treading\nTrodden by the Son of God:\nAll the sorrows they are feeling,\nFelt by Him upon the road:\nAll the darkness and the sorrow\nFrom around and from within,\nAll the joy and all the triumph,\nHe passed through apart from sin.","th":["The Person of Christ","Pilgrimage / Desert Journey","The Cross & Sufferings of Christ","Trial & Conflict"]},{"n":2,"t":"Now come forth in resurrection,\nPassing onward to the throne,\nHaving suffered all the judgment,\nBorne the storm of wrath alone:\nHe is able thus to succour\nThose who tread the desert sand,\nPressing on to resurrection,\nWhere He sits at God's right hand.","th":["Christ Risen & Glorified","The Cross & Sufferings of Christ","Pilgrimage / Desert Journey","Christ's Intercession / Priesthood"]},{"n":3,"t":"Now He praises in the assembly,\nNow the sorrow all is passed;\nHis the earnest of our portion,\nWe must reach the goal at last.\nYes, He praises, grace recounting\nAll the path already trod -\nWe associated with Him -\nGod, our Father and our God.","th":["Christ Risen & Glorified","The Father","Worship & Praise","Fellowship & Gathering"]},{"n":4,"t":"Join the singing that He leadeth,\nLoud to God our voices raise;\nEvery step of faith yet trodden\nIs a triumph of His grace:\nWhether joy, or whether trial,\nAll can only work for good,\nFor He healeth all - who loves us\nAnd hath bought us with His blood.","th":["Worship & Praise","Grace","The Precious Blood / Atonement"]},{"n":5,"t":"It is finished! It is finished!\nWho can tell redemption's worth!\nHe who knows it leads the singing -\nFull the joy, as fierce the wrath.\nTaken up in resurrection,\nDesert ways rehearsed above,\nTell the power of God's salvation,\nAnd His never-failing love.","th":["Redemption","Christ Risen & Glorified","God's Love for Us","Worship & Praise"]}],"w":{"The Person of Christ":20,"Pilgrimage / Desert Journey":40,"The Cross & Sufferings of Christ":40,"Trial & Conflict":20,"Christ Risen & Glorified":60,"Christ's Intercession / Priesthood":20,"The Father":20,"Worship & Praise":60,"Fellowship & Gathering":20,"Grace":20,"The Precious Blood / Atonement":20,"Redemption":20,"God's Love for Us":20}},
"374":{"m":"L.M.","a":"Horatius Bonar (1808-1889)","tn":"Whitburn","tc":"H. W. Baker (1821-1877)","fl":"Go, labour on; spend, and be spent,","v":[{"n":1,"t":"Go, labour on; spend, and be spent,\nThy joy to do the Father's will;\nIt is the way the Master went;\nShould not the servant tread it still?","th":["Service & Devotion","The Father"]},{"n":2,"t":"Go, labour on; 'tis not for nought;\nThy earthly loss is heavenly gain;\nMen heed thee, love thee, praise thee not;\nThe Master praises - what are men?","th":["Service & Devotion"]},{"n":3,"t":"Go, labour on; your hands are weak,\nYour knees are faint, your soul cast down;\nYet falter not; the prize you seek\nIs near - a kingdom and a crown.","th":["Service & Devotion","The Eternal Kingdom / Reign of Christ"]},{"n":4,"t":"Go, labour on while it is day:\nThe world's dark night is hastening on;\nSpeed, speed thy work; cast sloth away:\nIt is not thus that souls are won.","th":["Service & Devotion"]},{"n":5,"t":"Toil on, faint not, keep watch and pray;\nBe wise, the erring soul to win;\nGo forth into the world's highway,\nCompel the wanderer to come in.","th":["Service & Devotion"]},{"n":6,"t":"Toil on, and in thy toil rejoice;\nFor toil comes rest, for exile home;\nSoon shalt thou hear the Bridegroom's voice,\nAt daybreak say \"Arise and Come!\"","th":["Service & Devotion","The Lord's Coming / Rapture","Rest & Peace"]}],"w":{"Service & Devotion":100,"The Father":17,"The Eternal Kingdom / Reign of Christ":17,"The Lord's Coming / Rapture":17,"Rest & Peace":17}},
"375":{"m":"8.5.","a":"E. Williams","tn":"Lynton","tc":"T. Willey (1847-1930)","fl":"Lord, we do not ask the question,","v":[{"n":1,"t":"Lord, we do not ask the question,\nWhere abidest Thou?\nWell we know where Thou art dwelling,\nWell we know it now.","th":["The Person of Christ"]},{"n":2,"t":"Thou abidest in the bosom\nOf the Father's love;\nIn that love for ever living,\nLove - all thought above.","th":["The Father","God's Love for Us"]},{"n":3,"t":"And we know that Thou would'st have us\nEver dwell with Thee,\nIn that holy, heavenly circle,\nHome of liberty.","th":["Heaven & The Father's House","God's Love for Us","Fellowship & Gathering"]},{"n":4,"t":"Lord, we thank Thee, this our portion\nWhile we wait for Thee;\nNow to live in love unbounded,\nAnd eternally.","th":["The Lord's Coming / Rapture","God's Love for Us","Joy & Thanksgiving"]},{"n":5,"t":"Hold our hearts, O Lord, we pray Thee\nBy and in Thy love,\nTill we dwell with Thee in glory\nEvermore above.","th":["God's Love for Us","Heaven & The Father's House","Our Love for The Son/Christ"]}],"w":{"The Person of Christ":20,"The Father":20,"God's Love for Us":80,"Heaven & The Father's House":40,"Fellowship & Gathering":20,"The Lord's Coming / Rapture":20,"Joy & Thanksgiving":20,"Our Love for The Son/Christ":20}},
"376":{"m":"8.5.8.3.","a":"E. E. Nichols","tn":"Come Thou Weary","tc":"Ira D. Sankey (1840-1908)","fl":"Precious Name! the name of Jesus,","v":[{"n":1,"t":"Precious Name! the name of Jesus,\nSon of God most high,\nWho in love to guilty sinners,\nCame to die.","th":["The Person of Christ","God's Love for Us"]},{"n":2,"t":"Precious Name! the story telling\nOf His humble birth;\nOf His lonely pathway, trodden\nHere on earth.","th":["The Person of Christ","Pilgrimage / Desert Journey"]},{"n":3,"t":"Precious Name of Him the Saviour,\nCome the lost to save;\nIn His grace, for ruined sinners\nAll He gave.","th":["Redemption","Grace","The Person of Christ"]},{"n":4,"t":"Precious Name of Him who suffered\nOn the shameful tree,\nGave Himself, the willing victim,\nSpotless He.","th":["The Cross & Sufferings of Christ","The Lamb of God"]},{"n":5,"t":"Precious Name! enthroned in heaven,\nStill that name He bears;\nOn His brow the crown of glory\nNow He wears.","th":["Christ Risen & Glorified","The Person of Christ"]},{"n":6,"t":"Precious, peerless Name of Jesus,\nNone can tell its worth;\nSweetest Name there is in heaven,\nOr on earth.","th":["The Person of Christ","Worship & Praise"]}],"w":{"The Person of Christ":83,"God's Love for Us":17,"Pilgrimage / Desert Journey":17,"Redemption":17,"Grace":17,"The Cross & Sufferings of Christ":17,"The Lamb of God":17,"Christ Risen & Glorified":17,"Worship & Praise":17}},
"377":{"m":"S.M.","a":"Miss Hannah Kilham Burlingham (1842-1901)","tn":"Austin","tc":"A. E. Lord","fl":"O blessed living Lord,","v":[{"n":1,"t":"O blessed living Lord,\nEngage our hearts with Thee,\nAnd strike within the answering chord\nTo love so rich and free.","th":["God's Love for Us","Our Love for The Son/Christ"]},{"n":2,"t":"To know Thy loving heart,\nAnd cleave to Thy blest side;\nAnd gaze upon Thee where Thou art,\nAnd in Thy love abide;","th":["The Person of Christ","God's Love for Us","Our Love for The Son/Christ"]},{"n":3,"t":"Be this our one desire;\nThyself our object here;\nThe goal to which our hearts aspire,\nTo meet Thee in the air.","th":["The Lord's Coming / Rapture","Service & Devotion","Our Love for The Son/Christ"]}],"w":{"God's Love for Us":67,"Our Love for The Son/Christ":100,"The Person of Christ":33,"The Lord's Coming / Rapture":33,"Service & Devotion":33}},
"378":{"m":"7.6.","a":"Anonymous","tn":"Remembrance","tc":"Anonymous","fl":"Lord Jesus, our Redeemer,","v":[{"n":1,"t":"Lord Jesus, our Redeemer,\nWhat pains, what sufferings sore,\nWere borne by Thee in patience,\nTo save us evermore !\nThy hands, Thy feet, both wounded;\nThy soul an offering made;\nThy precious blood outpouring,\nWherewith our peace was made.","th":["The Cross & Sufferings of Christ","Redemption","The Precious Blood / Atonement","Rest & Peace"]},{"n":2,"t":"For us Thou wast forsaken,\nFor us made sin by God:\nWe think upon Thine anguish,\nThy pain beneath the rod;\nWe thank Thee for Thy sorrows,\nThy suffering and Thy woe;\nThough little, O Lord Jesus,\nOur hearts those depths can know.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","Forgiveness of Sins"]}],"w":{"The Cross & Sufferings of Christ":100,"Redemption":50,"The Precious Blood / Atonement":100,"Rest & Peace":50,"Forgiveness of Sins":50}},
"379":{"m":"8.8.6.","a":"Robert S. Hawker (1804-1873)","tn":"Innsbruck New","tc":"H. Isaak, c. 1450-1517","fl":"We bless Thee, O Thou great Amen!","v":[{"n":1,"t":"We bless Thee, O Thou great Amen!\nGod's glorious pledge to sinful men,\nConfirming all His word!\nDoubtful no promises remain,\nFor all are Yea, and all Amen,\nIn Thee, the faithful Lord.","th":["The Person of Christ","The Word of God","Assurance & Security"]},{"n":2,"t":"How great the grace of God to bless\nBy Thee, the Lord, our righteousness!\nBy Thee, we say again:\nFor to us all things thus are sure,\nThrough life, in death, and evermore,\nBy Thee, the great Amen.","th":["Grace","The Person of Christ","Assurance & Security"]},{"n":3,"t":"O faithful Witness of our God,\nWho cam'st by water and by blood!\nIn Thee the Holy One,\nGod's record doth for ever stand\nOf life eternal, from - His hand,\nTo all in Thee the Son.","th":["The Person of Christ","The Holy Spirit"]},{"n":4,"t":"Gladly His promises we hear,\nFor God's \"Amen\" dispels all fear,\nHis faithfulness it proves;\nAnd while such grace from God is shown,\nTo His Amen we add our own;\nFor our Amen He loves.","th":["Assurance & Security","Grace","Worship & Praise"]},{"n":5,"t":"Secured in Christ, their Head on high,\nThe saints below may boldly cry -\nPraise to our God, Amen!\nTo God in Christ all praise be given,\nFor evermore, on earth, in heaven.\nAmen! Amen! Amen!","th":["Worship & Praise","Christ Risen & Glorified","Assurance & Security"]}],"w":{"The Person of Christ":60,"The Word of God":20,"Assurance & Security":80,"Grace":40,"The Holy Spirit":20,"Worship & Praise":40,"Christ Risen & Glorified":20}},
"380":{"m":"6-8s.","a":"Anonymous","tn":"Melita","tc":"J. B. Dykes (1823-1876)","fl":"What love it was that brought Thee down,","v":[{"n":1,"t":"What love it was that brought Thee down,\nDown to the depths in which I lay,\nThat made Thee leave Thy glory-throne,\nIn Servant's form to tread Thy way;\nYet lower still to death to go,\nThat I might never judgment know.","th":["God's Love for Us","The Cross & Sufferings of Christ","The Person of Christ"]},{"n":2,"t":"My place is now in Thee above,\nBy virtue of Thy precious blood,\nBefore Thy Father's face in love,\nMade now my Father and my God.\nOh! that my feeble voice might swell,\nThe praise of Him who loves so well.","th":["The Precious Blood / Atonement","The Father","Sonship & Adoption","Worship & Praise"]},{"n":3,"t":"'Tis love that cannot be explained,\nIt is too wonderful, too vast;\nThe heart of God alone contained,\nSuch thoughts divine in ages past.\nBut oh! I know it rests on me,\nAnd will throughout eternity.","th":["God's Love for Us"]},{"n":4,"t":"O fill me Lord yet more and more,\nSo that my heart e'en here below,\nFrom Thy love's rich and boundless store,\nBe satisfied and overflow.\nFull with the blessing Thou hast given,\nThe foretaste now of what makes heaven.","th":["God's Love for Us","Heaven & The Father's House"]}],"w":{"God's Love for Us":75,"The Cross & Sufferings of Christ":25,"The Person of Christ":25,"The Precious Blood / Atonement":25,"The Father":25,"Sonship & Adoption":25,"Worship & Praise":25,"Heaven & The Father's House":25}},
"381":{"m":"8.7.","a":"William Williams (1717-1791)","tn":"Bavaria","tc":"Anonymous","fl":"Saviour, lead us by Thy power","v":[{"n":1,"t":"Saviour, lead us by Thy power\nSafe into the promised rest;\nChoose the path, the way whatever,\nSeems to Thee, O Lord, the best;\nBe our guide in every peril,\nWatch and keep us night and day,\nElse our foolish hearts will wander\nFrom the strait and narrow way.","th":["Pilgrimage / Desert Journey","Rest & Peace","The Person of Christ"]},{"n":2,"t":"Since in Thee is our redemption\nAnd salvation full and free,\nNothing need our souls dishearten\nBut forgetfulness of Thee;\nNought can stay our steady progress,\nMore than conquerors we shall be,\nIf our eye, whate'er the danger,\nLooks to Thee, and none but Thee.","th":["Redemption","Assurance & Security"]},{"n":3,"t":"In Thy presence we are happy,\nIn Thy presence we're secure;\nIn Thy presence all afflictions\nWe can easily endure;\nIn Thy presence we can conquer,\nWe can suffer, we can die;\nWandering from Thee, we are feeble;\nLet Thy love, Lord, keep us nigh.","th":["Assurance & Security","Rest & Peace","Trial & Conflict","God's Love for Us"]}],"w":{"Pilgrimage / Desert Journey":33,"Rest & Peace":67,"The Person of Christ":33,"Redemption":33,"Assurance & Security":67,"Trial & Conflict":33,"God's Love for Us":33}},
"382":{"m":"7.6.","a":"Anonymous","tn":"St. Christopher","tc":"F. C. Maker (1844-1927)","fl":"Love bound Thee to the altar,","v":[{"n":1,"t":"Love bound Thee to the altar,\nThe Father's love and Thine,\nFor us, O peerless Victim,\nThat we with Thee might shine.\nThy wealth Thou didst surrender,\nThyself didst freely give,\nThy life in grace unbounded,\nThat we with Thee might live.","th":["God's Love for Us","The Cross & Sufferings of Christ","The Father","Redemption"]},{"n":2,"t":"In those long hours of anguish,\nWhen men passed scoffing by,\nWhen Satan sore assailed Thee,\nWhen God heard not Thy cry,\nThen were our sins Thy burden,\nOur guilt, our grief, Thy bands;\nAnd then our names were graven\nFor ever on Thy hands.","th":["The Cross & Sufferings of Christ","Forgiveness of Sins","Assurance & Security"]},{"n":3,"t":"We praise Thee, Lord most holy,\nThou First-born from the dead;\nNow o'er all powers triumphant,\nO'er all things Lord and Head;\nBut ever and for ever\nThe memory of Thy pain\nShall raise our songs in worship,\nFor Thou for us wast slain.","th":["Worship & Praise","Christ Risen & Glorified","The Cross & Sufferings of Christ","The Lamb of God"]}],"w":{"God's Love for Us":33,"The Cross & Sufferings of Christ":100,"The Father":33,"Redemption":33,"Forgiveness of Sins":33,"Assurance & Security":33,"Worship & Praise":33,"Christ Risen & Glorified":33,"The Lamb of God":33}},
"383":{"m":"10s. or 11s.","a":"D. Denham (1791-1848)","tn":"Sweet Home","tc":"H. R. Bishop","fl":"Mid scenes of confusion and creature complaints,","v":[{"n":1,"t":"Mid scenes of confusion and creature complaints,\nHow sweet to the soul is communion with saints!\nTo find at the banquet of mercy there's room,\nTo feel in communion a foretaste of home.","th":["Fellowship & Gathering","Heaven & The Father's House"]},{"n":2,"t":"Sweet bonds that unite all the children of peace\nWith Thee, bless\u00e8d Saviour, whose love cannot cease;\nThough oft amid trials and dangers we roam,\nWith Thine we're united, and hasting toward home.","th":["God's Love for Us","Pilgrimage / Desert Journey","Trial & Conflict"]},{"n":3,"t":"While here in the valley of conflict we stay,\nO give us submission, and strength as the day;\nSoon, free from afflictions, to Thee we shall come,\nFor aye dwell with Thee in that glorious home.","th":["Trial & Conflict","Heaven & The Father's House","Pilgrimage / Desert Journey"]},{"n":4,"t":"We wait, bless\u00e8d Lord, in Thy beauties to shine,\nTo see Thee in glory - the glory divine;\nWith all Thy redeemed, from the earth, from the tomb,\nTo join in Thy praise, bless\u00e8d Saviour, at home.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","Worship & Praise","Redemption"]}],"w":{"Fellowship & Gathering":25,"Heaven & The Father's House":75,"God's Love for Us":25,"Pilgrimage / Desert Journey":50,"Trial & Conflict":50,"The Lord's Coming / Rapture":25,"Worship & Praise":25,"Redemption":25}},
"384":{"m":"7.6.","a":"Mrs. Anne Ross Cousin (1824-1906)","tn":"Rutherford","tc":"C. Urhan (1790-1845)","fl":"The sands of time are sinking,","v":[{"n":1,"t":"The sands of time are sinking,\nThe dawn of heaven breaks,\nThe summer morn I've sighed for,\nThe fair sweet morn awakes.\nDark, dark hath been the midnight,\nBut dayspring is at hand,\nAnd glory, glory dwelleth\nIn Immanuel's land.","th":["Heaven & The Father's House","The Lord's Coming / Rapture","Pilgrimage / Desert Journey"]},{"n":2,"t":"Oh, Christ, He is the fountain,\nThe deep sweet well of love;\nThe streams on earth I've tasted,\nMore deep I'll drink above;\nThere to an ocean fulness,\nHis mercy doth expand,\nAnd glory, glory dwelleth\nIn Immanuel's land.","th":["The Person of Christ","God's Love for Us","Heaven & The Father's House"]},{"n":3,"t":"With mercy and with judgment\nMy web of time He wove,\nAnd aye the dews of sorrow\nWere lustred with His love.\nI'll bless the hand that guided,\nI'll bless the heart that planned,\nWhen throned where glory dwelleth\nIn Immanuel's land.","th":["Grace","God's Love for Us","Trial & Conflict"]},{"n":4,"t":"Oh, I am my Belov\u00e8d's,\nAnd my Belov\u00e8d's mine;\nHe brings a poor vile sinner\nInto His \"house of wine.\"\nI stand upon His merit;\nI know no safer stand,\nNot e'en where glory dwelleth\nIn Immanuel's land.","th":["Assurance & Security","Our Love for The Son/Christ"]},{"n":5,"t":"The bride eyes not her garment,\nBut her dear bridegroom's face\nI will not gaze at glory,\nBut on my King of grace;\nNot at the crown He giveth,\nBut on His pierced hand:\nThe Lamb is all the glory\nOf Immanuel's land.","th":["The Church / Bride of Christ","The Lamb of God","Grace","The Cross & Sufferings of Christ"]}],"w":{"Heaven & The Father's House":40,"The Lord's Coming / Rapture":20,"Pilgrimage / Desert Journey":20,"The Person of Christ":20,"God's Love for Us":40,"Grace":40,"Trial & Conflict":20,"Assurance & Security":20,"Our Love for The Son/Christ":20,"The Church / Bride of Christ":20,"The Lamb of God":20,"The Cross & Sufferings of Christ":20}},
"385":{"m":"6.6.8.4.","a":"Miss Hannah Kilham Burlingham (1842-1901)","tn":"Westland","tc":"J. C. Trench","fl":"The Father sent the Son","v":[{"n":1,"t":"The Father sent the Son\nA ruined world to save;\nMan meted to the Sinless One\nThe cross - the grave:\nBlest Substitute from God,\nWrath's awful cup He drained;\nLaid down His life, and e'en the tomb's\nReproach sustained.","th":["The Father","The Cross & Sufferings of Christ","Redemption","The Precious Blood / Atonement"]},{"n":2,"t":"The new and living way\nStands open now to heaven;\nThence, where the blood doth speak alway,\nGod's gift is given.\nThe river of His grace,\nThrough righteousness supplied,\nIs flowing o'er the barren place\nWhere Jesus died!","th":["The Precious Blood / Atonement","Grace","Heaven & The Father's House"]},{"n":3,"t":"The Lord shall come again!\nThe Conqueror must reign!\nNo tongue but shall confess Him then,\nThe Lamb once slain:\nJesus is worthy now\nAll homage to receive;\nOh, let us now before Him bow,\nAnd to Him cleave.","th":["The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ","The Lamb of God","Worship & Praise"]}],"w":{"The Father":33,"The Cross & Sufferings of Christ":33,"Redemption":33,"The Precious Blood / Atonement":67,"Grace":33,"Heaven & The Father's House":33,"The Lord's Coming / Rapture":33,"The Eternal Kingdom / Reign of Christ":33,"The Lamb of God":33,"Worship & Praise":33}},
"386":{"m":"C.M.","a":"E. L. Bevir (1847-1922)","tn":"St. Anne","tc":"W. Croft (1678-1727)","fl":"Where glory lights the courts on high,","v":[{"n":1,"t":"Where glory lights the courts on high,\nWith highest glory crowned,\nThee, Lord of power and majesty,\nCelestial hosts surround.","th":["Christ Risen & Glorified","Heaven & The Father's House","Worship & Praise"]},{"n":2,"t":"Oh, who shall sing that path of worth,\nThat led up to the throne?\nThe Corn of wheat upon this earth,\nCould but abide alone.","th":["The Cross & Sufferings of Christ","The Person of Christ"]},{"n":3,"t":"But Thou art risen from the dead,\nAnd we as one with Thee,\nNow sing Thy name, our Lord, our Head,\nA heavenly company.","th":["Christ Risen & Glorified","Worship & Praise"]},{"n":4,"t":"Blest Saviour, Thou art waiting yet\nTill perfect at Thy side,\nThy blest companion shall be set,\nThy fair and ransomed bride.","th":["The Church / Bride of Christ","Redemption","The Lord's Coming / Rapture"]},{"n":5,"t":"And, bless\u00e8d Lord, Thou soon shalt hear\nThat rising shout of praise,\nWhen Thou shalt come into the air\nThy sleeping saints to raise.","th":["The Lord's Coming / Rapture","Worship & Praise","Christ Risen & Glorified"]}],"w":{"Christ Risen & Glorified":60,"Heaven & The Father's House":20,"Worship & Praise":60,"The Cross & Sufferings of Christ":20,"The Person of Christ":20,"The Church / Bride of Christ":20,"Redemption":20,"The Lord's Coming / Rapture":40}},
"387":{"m":"8.7.","a":"John Nelson Darby (1800-1882)","tn":"Beaumaris","tc":"Anonymous","fl":"Where the saints in glory thronging,","v":[{"n":1,"t":"Where the saints in glory thronging,\nWhere they feed on life's blest tree -\nThere is stilled each earnest longing,\nSatisfied our souls shall be.","th":["Heaven & The Father's House","Rest & Peace"]},{"n":2,"t":"Safety - where no foe approaches;\nRest - where toil shall be no more;\nJoy - whereon no grief encroaches;\nPeace - where strife shall all be o'er.","th":["Rest & Peace","Heaven & The Father's House"]},{"n":3,"t":"Where deceiver ne'er can enter,\nSin-soiled feet have never trod;\nFree - our peaceful feet may venture\nIn the paradise of God.","th":["Heaven & The Father's House"]},{"n":4,"t":"Drink of life's perennial river,\nFeed on life's perennial food,\nChrist, the fruit of life, and giver -\nSafe through His redeeming blood.","th":["The Precious Blood / Atonement","Redemption","The Person of Christ"]},{"n":5,"t":"Object of eternal pleasure,\nPerfect in Thy work divine!\nLord of glory! without measure\nWorship, joy and praise are Thine.","th":["Worship & Praise","The Person of Christ"]}],"w":{"Heaven & The Father's House":60,"Rest & Peace":40,"The Precious Blood / Atonement":20,"Redemption":20,"The Person of Christ":40,"Worship & Praise":20}},
"388":{"m":"L.M.","a":"Samuel O'Malley Cluff (1837-1910)","tn":"Hursley","tc":"P. Ritter (1760-1846)","fl":"Nothing but Christ, as on we tread,","v":[{"n":1,"t":"Nothing but Christ, as on we tread,\nThe Gift unpriced, God's living Bread;\nWith staff in hand and feet well shod,\nNothing but Christ - the Christ of God.","th":["The Person of Christ","Pilgrimage / Desert Journey"]},{"n":2,"t":"Everything loss for Him below,\nTaking the cross where'er we go;\nShowing to all, where once He trod,\nNothing but Christ - the Christ of God.","th":["The Cross & Sufferings of Christ","Separation from the World","Pilgrimage / Desert Journey"]},{"n":3,"t":"Nothing save Him, in all our ways,\nGiving the theme for ceaseless praise;\nOur whole resource along the road,\nNothing but Christ - the Christ of God.","th":["The Person of Christ","Worship & Praise","Pilgrimage / Desert Journey"]}],"w":{"The Person of Christ":67,"Pilgrimage / Desert Journey":100,"The Cross & Sufferings of Christ":33,"Separation from the World":33,"Worship & Praise":33}},
"389":{"m":"6.6.6.6.8.8.","a":"J. Irons (1785-1852)","tn":"Millennium","tc":"Anonymous","fl":"Now let our hearts unite","v":[{"n":1,"t":"Now let our hearts unite\nTo praise the Saviour's name;\nLet ransomed souls delight\nHis triumph to proclaim,\nTill heaven and earth shall hear our songs:\nSalvation to our God belongs.","th":["Worship & Praise","Redemption"]},{"n":2,"t":"He gave for us His Son\nIn everlasting love;\nAnd lo, our Lord came down\nHis faithfulness to prove;\nObeyed and suffered, died and rose\nIn triumph over all our foes.","th":["God's Love for Us","The Cross & Sufferings of Christ","Christ Risen & Glorified"]},{"n":3,"t":"Now He's exalted high,\nAnd from yon glorious throne\nHe hears His people cry,\nAnd claims them as His own;\nHe bears them all upon His breast:\nIn Him we are completely blest.","th":["Christ Risen & Glorified","Christ's Intercession / Priesthood","Assurance & Security"]},{"n":4,"t":"For ever justified\nBy His atoning blood,\nWe shall be glorified\nIn presence of our God;\nEre long we shall our Saviour see,\nFor where He is His saints must be.","th":["The Precious Blood / Atonement","Heaven & The Father's House","Assurance & Security","The Lord's Coming / Rapture"]}],"w":{"Worship & Praise":25,"Redemption":25,"God's Love for Us":25,"The Cross & Sufferings of Christ":25,"Christ Risen & Glorified":50,"Christ's Intercession / Priesthood":25,"Assurance & Security":50,"The Precious Blood / Atonement":25,"Heaven & The Father's House":25,"The Lord's Coming / Rapture":25}},
"390":{"m":"L.M.","a":"Albert Midlane (1825-1909)","tn":"Mendon","tc":"Anonymous","fl":"The perfect righteousness of God","v":[{"n":1,"t":"The perfect righteousness of God\nIs witnessed in the Saviour's blood;\n'Tis in the cross of Christ we trace\nHis righteousness, yet wondrous grace.","th":["The Precious Blood / Atonement","The Cross & Sufferings of Christ","Grace"]},{"n":2,"t":"God could not pass the sinner by,\nJustice demands that he should die;\nBut in the cross of Christ we see\nHow God can save, yet righteous be.","th":["The Cross & Sufferings of Christ","Grace"]},{"n":3,"t":"The judgment fell on Jesus' head,\n'Twas in His blood sin's debt was paid;\nStern Justice can demand no more,\nAnd Mercy can dispense her store.","th":["The Precious Blood / Atonement","The Cross & Sufferings of Christ","Grace"]},{"n":4,"t":"The sinner who believes is free,\nCan say, \"The Saviour died for me:\"\nCan point to the atoning blood.\nAnd say, \"This made my peace with God.\"","th":["The Precious Blood / Atonement","Forgiveness of Sins","Assurance & Security"]}],"w":{"The Precious Blood / Atonement":75,"The Cross & Sufferings of Christ":75,"Grace":75,"Forgiveness of Sins":25,"Assurance & Security":25}},
