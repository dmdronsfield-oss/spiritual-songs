<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spiritual Songs</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF7F2;--bg2:#F2EDE5;--navy:#1B3A5C;--navy-light:#2A5580;
  --gold:#C9A84C;--gold-light:#E8D494;--text:#3A3A3A;--text-light:#6B6B6B;
  --card-bg:#fff;--border-light:#eee;
  --serif:Georgia,'Times New Roman',Times,serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
[data-theme="dark"]{
  --bg:#000;--bg2:#111;--navy:#fff;--navy-light:#ccc;
  --gold:#888;--gold-light:#222;--text:#e0e0e0;--text-light:#999;
  --card-bg:#111;--border-light:#333;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:70px}

/* Header */
.header{background:var(--navy);color:#fff;padding:12px 16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;position:relative}
.header h1{font-family:var(--serif);font-size:1.4rem;font-weight:400;letter-spacing:1px}
.header-btn{position:absolute;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.2rem;opacity:.7;transition:opacity .2s;padding:4px;line-height:1;color:#fff}
.header-btn:hover{opacity:1}
.dark-toggle{right:14px}
.tags-toggle{left:14px;font-size:1rem}
.back-btn{position:fixed;top:58px;left:10px;z-index:99;background:var(--card-bg);border:2px solid var(--gold);border-radius:50%;width:36px;height:36px;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:var(--navy);box-shadow:0 2px 6px rgba(0,0,0,.15)}
.back-btn.visible{display:flex}
.header-sub{font-size:.7rem;opacity:.6;margin-top:2px;letter-spacing:2px;text-transform:uppercase}

/* Bottom Nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--card-bg);display:flex;border-top:2px solid var(--gold);z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.08)}
.nav button{flex:1;padding:10px 0 8px;border:none;background:none;cursor:pointer;font-family:var(--sans);font-size:.7rem;color:var(--text-light);display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s}
.nav button.active{color:var(--navy);font-weight:600}
.nav button .nav-icon{font-size:1.3rem}

/* Views */
.view{display:none;animation:fadeIn .25s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Hymn View */
.hymn-nav{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;background:var(--bg2)}
.hymn-nav input[type=number]{width:70px;padding:8px;border:2px solid var(--gold);border-radius:8px;font-size:1.1rem;text-align:center;font-family:var(--sans);background:var(--card-bg);color:var(--text)}
.hymn-nav input:focus{outline:none;border-color:var(--navy)}
.hymn-nav input::-webkit-inner-spin-button{-webkit-appearance:none}
.hymn-nav input[type=number]{-moz-appearance:textfield}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-family:var(--sans);font-size:.85rem;transition:all .2s}
.btn-go{background:var(--navy);color:#fff}
.btn-go:hover{background:var(--navy-light)}
.btn-arrow{background:var(--bg);border:2px solid var(--gold)!important;color:var(--navy);font-size:1.1rem;padding:6px 14px;font-weight:700}
.btn-arrow:hover{background:var(--gold-light)}
.btn-arrow:disabled{opacity:.3;cursor:default}

.hymn-display{max-width:700px;margin:0 auto;padding:20px 16px 30px}
.hymn-number{font-family:var(--serif);font-size:3rem;color:var(--navy);text-align:center;font-weight:700;line-height:1}
.hymn-first-line{font-family:var(--serif);font-size:1.15rem;color:var(--gold);text-align:center;margin:6px 0 16px;font-style:italic}
.hymn-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;padding:12px 16px;background:var(--bg2);border-radius:10px;margin-bottom:24px;font-size:.8rem}
.hymn-meta .label{color:var(--text-light);font-size:.65rem;text-transform:uppercase;letter-spacing:1px}
.hymn-meta .value{color:var(--text);font-weight:500}

.verse{margin-bottom:20px;display:flex;gap:12px}
.verse-num{font-family:var(--serif);font-size:1rem;color:var(--gold);font-weight:700;min-width:20px;padding-top:2px;text-align:right}
.verse-text{font-family:var(--serif);font-size:1.05rem;line-height:1.7;color:var(--text);white-space:pre-line}
.verse-themes{font-size:.7rem;color:var(--text-light);margin-top:4px;font-family:var(--sans);font-style:italic}

.theme-weights{margin-top:30px;padding-top:20px;border-top:1px solid var(--gold-light)}
.theme-weights h3{font-family:var(--serif);font-size:.95rem;color:var(--navy);margin-bottom:14px;text-align:center}
.weight-bar{display:flex;align-items:center;margin-bottom:6px;font-size:.75rem;gap:8px}
.weight-label{min-width:180px;text-align:right;color:var(--text);flex-shrink:0}
.weight-track{flex:1;height:16px;background:var(--bg2);border-radius:8px;overflow:hidden;position:relative}
.weight-fill{height:100%;border-radius:8px;transition:width .4s ease;min-width:2px}
.weight-pct{min-width:36px;color:var(--text-light);font-size:.7rem}

/* Index View */
.index-search{padding:12px 16px;background:var(--bg2);position:sticky;top:0;z-index:101}
.index-search input{width:100%;padding:10px 14px;border:2px solid var(--gold);border-radius:10px;font-size:.95rem;font-family:var(--sans);background:var(--card-bg);color:var(--text)}
.index-search input:focus{outline:none;border-color:var(--navy)}
.index-sort{display:flex;gap:6px;margin-top:8px;justify-content:center}
.sort-btn{padding:4px 12px;border:1px solid var(--gold);border-radius:20px;background:none;cursor:pointer;font-size:.7rem;color:var(--text-light);font-family:var(--sans)}
.sort-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.index-list{max-width:700px;margin:0 auto;padding:8px 16px}
.index-item{padding:10px 12px;border-bottom:1px solid var(--bg2);cursor:pointer;display:flex;gap:12px;align-items:baseline;transition:background .15s}
.index-item:hover{background:var(--bg2);border-radius:6px}
.index-num{font-weight:700;color:var(--navy);min-width:32px;font-size:.85rem}
.index-fl{font-family:var(--serif);font-size:.9rem;flex:1}
.index-author{font-size:.7rem;color:var(--text-light);white-space:nowrap}
.index-match{font-size:.75rem;color:var(--gold);font-style:italic;margin-top:2px;font-family:var(--serif)}

/* Themes View */
.themes-container{max-width:700px;margin:0 auto;padding:16px}
.theme-card{padding:12px 16px;margin-bottom:8px;background:var(--card-bg);border-radius:10px;border-left:4px solid var(--gold);cursor:pointer;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.theme-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);transform:translateY(-1px)}
.theme-card-header{display:flex;justify-content:space-between;align-items:center}
.theme-name{font-weight:600;color:var(--navy);font-size:.9rem}
.theme-count{background:var(--navy);color:#fff;padding:2px 8px;border-radius:10px;font-size:.7rem}
.theme-hymns{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--bg2)}
.theme-card.expanded .theme-hymns{display:block}
.theme-card.expanded{border-left-color:var(--navy)}
.theme-hymn-item{display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer;font-size:.8rem}
.theme-hymn-item:hover{color:var(--navy)}
.theme-hymn-num{font-weight:700;color:var(--navy);min-width:28px}
.theme-hymn-fl{flex:1;font-family:var(--serif);font-size:.8rem}
.theme-hymn-bar{width:80px;height:10px;background:var(--bg2);border-radius:5px;overflow:hidden;flex-shrink:0}
.theme-hymn-fill{height:100%;border-radius:5px}
.theme-hymn-pct{min-width:30px;text-align:right;font-size:.7rem;color:var(--text-light)}

/* Recent Hymns */
.recent-bar{max-width:700px;margin:0 auto;padding:24px 16px 0}
.recent-bar h4{font-size:.7rem;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.recent-pills{display:flex;gap:6px;flex-wrap:wrap}
.recent-pill{padding:4px 12px;border:1px solid var(--gold);border-radius:16px;font-size:.75rem;cursor:pointer;color:var(--navy);background:var(--card-bg);transition:all .15s;font-family:var(--sans)}
.recent-pill:hover{background:var(--gold-light);border-color:var(--navy)}
.recent-pill .pill-num{font-weight:700;margin-right:4px}

/* Responsive */
@media(max-width:500px){
  .hymn-meta{grid-template-columns:1fr}
  .weight-label{min-width:120px;font-size:.65rem}
  .index-author{display:none}
  .theme-hymn-bar{width:50px}
}
@media(min-width:768px){
  .hymn-display{padding:30px 40px 40px}
  .hymn-number{font-size:4rem}
  .verse-text{font-size:1.15rem}
}
</style>
</head>
<body>

<div class="header">
  <button class="header-btn tags-toggle" id="tags-toggle" onclick="toggleTags()" title="Toggle verse themes">&#9998;</button>
  <h1>Spiritual Songs</h1>
  <button class="header-btn dark-toggle" id="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">&#9790;</button>
</div>
<button class="back-btn" id="back-btn" onclick="goBack()" title="Go back">&#8593;</button>

<!-- Hymn View -->
<div id="js-blocked" style="padding:40px 20px;text-align:center;font-family:Georgia,serif;color:#1B3A5C">
  <h2 style="margin-bottom:12px">Open in Browser</h2>
  <p style="color:#666;line-height:1.6;font-size:.95rem">This app needs to run in Safari or Chrome.<br>Tap the <b>share</b> button and choose <b>"Open in Safari"</b><br>or <b>"Open in Chrome"</b>.</p>
</div>
<div id="view-hymn" class="view active">
  <div class="hymn-nav">
    <button class="btn btn-arrow" id="btn-prev" onclick="navHymn(-1)">&larr;</button>
    <input type="number" id="hymn-input" min="1" max="500" value="1" onkeydown="if(event.key==='Enter')goHymn()">
    <button class="btn btn-go" onclick="goHymn()">Go</button>
    <button class="btn btn-arrow" id="btn-next" onclick="navHymn(1)">&rarr;</button>
  </div>
  <div class="hymn-display" id="hymn-display"></div>
</div>

<!-- Index View -->
<div id="view-index" class="view">
  <div class="index-search">
    <input type="text" id="index-search" placeholder="Search hymns..." oninput="filterIndex()">
    <div class="index-sort">
      <button class="sort-btn active" data-sort="number" onclick="sortIndex('number',this)">By Number</button>
      <button class="sort-btn" data-sort="firstline" onclick="sortIndex('firstline',this)">By First Line</button>
      <button class="sort-btn" data-sort="author" onclick="sortIndex('author',this)">By Author</button>
    </div>
  </div>
  <div class="index-list" id="index-list"></div>
</div>

<!-- Themes View -->
<div id="view-themes" class="view">
  <div class="themes-sort" style="padding:12px 16px;text-align:center">
    <button class="sort-btn active" onclick="sortThemes('alpha',this)">A-Z</button>
    <button class="sort-btn" onclick="sortThemes('count',this)">By Count</button>
    <button class="sort-btn" onclick="sortThemes('grouped',this)">Grouped</button>
  </div>
  <div class="themes-container" id="themes-container"></div>
</div>

<!-- Bottom Nav -->
<div class="nav">
  <button class="active" onclick="showView('hymn',this)">
    <span class="nav-icon">&#9834;</span>Hymn
  </button>
  <button onclick="showView('index',this)">
    <span class="nav-icon">&#9776;</span>Index
  </button>
  <button onclick="showView('themes',this)">
    <span class="nav-icon">&#9733;</span>Themes
  </button>
</div>

<script>
window.onerror=function(msg,url,line){document.getElementById('hymn-display').innerHTML='<p style="color:red;padding:20px">Error: '+msg+' (line '+line+')</p>';};

const H={
"1":{"m":"C.M.","a":"William Cowper (1731-1800)","tn":"Claremont","tc":"J Foster (1807-1885)","fl":"OF all the gifts Thy love bestows,","v":[{"n":1,"t":"OF all the gifts Thy love bestows,\nThou Giver of all good,\nNot heaven itself a richer knows\nThan the Redeemer's blood.","th":["God's Love for Us","The Precious Blood / Atonement","The Person of Christ","Redemption"]},{"n":2,"t":"Faith too that trusts the blood through grace\nFrom that same love we gain;\nElse, sweetly as it suits our case,\nThe gift had been in vain.","th":["Grace","The Precious Blood / Atonement"]},{"n":3,"t":"We praise Thee, and would praise Thee more;\nTo Thee our all we owe;\nThe precious Saviour, and the power\nThat makes Him precious too.","th":["Worship & Praise","The Person of Christ"]}],"w":{"God's Love for Us":33,"The Precious Blood / Atonement":67,"The Person of Christ":67,"Redemption":33,"Grace":33,"Worship & Praise":33}},
"2":{"m":"8.7.8.7.4.7.","a":"James George Deck (1802-1884)","tn":"Melbourne","tc":"W L Viner (1790-1867)","fl":"'TWAS Thy love, O God, that knew us","v":[{"n":1,"t":"'TWAS Thy love, O God, that knew us\nEarth's foundation long before;\nThat same love to Jesus drew us\nBy its sweet constraining power,\nAnd will keep us\nSafely now, and ever more.","th":["God's Love for Us","Assurance & Security"]},{"n":2,"t":"God of love, our souls adore Thee;\nWe would still Thy grace proclaim,\nTill we cast our crowns before Thee,\nAnd in glory praise Thy name;\nPraise and worship\nBe to God and to the Lamb.","th":["Worship & Praise","Grace","The Lamb of God","Heaven & The Father's House"]}],"w":{"God's Love for Us":50,"Assurance & Security":50,"Worship & Praise":50,"Grace":50,"The Lamb of God":50,"Heaven & The Father's House":50}},
"3":{"m":"L.M.","a":"I Watts (1674-1748)","tn":"Arizona","tc":"R. H. Earnshaw","fl":"O GOD, we see Thee in the Lamb","v":[{"n":1,"t":"O GOD, we see Thee in the Lamb\nTo be our hope, our joy, our rest;\nThe glories that compose Thy name\nStanding engaged to make us blest.","th":["The Lamb of God","Rest & Peace","Joy & Thanksgiving","The Person of Christ"]},{"n":2,"t":"Thou great and good! Thou just and wise!\nHail, as our Father and our God,\nFor we are Thine by sacred ties,\nThy sons and daughters - bought with blood.","th":["The Father","Sonship & Adoption","The Precious Blood / Atonement","Worship & Praise"]},{"n":3,"t":"Then, oh, to us this grace afford,\nThat far from Thee we ne'er may move;\nOur guard - the presence of the Lord;\nOur joy - Thy perfect present love.","th":["Grace","God's Love for Us"]},{"n":4,"t":"This gives us ever to rejoice,\nTurning to light our darkest days;\nAnd lifts on high each feeble voice,\nWhile we have breath to pray or praise.","th":["Joy & Thanksgiving","Worship & Praise"]}],"w":{"The Lamb of God":25,"Rest & Peace":25,"Joy & Thanksgiving":50,"The Person of Christ":25,"The Father":25,"Sonship & Adoption":25,"The Precious Blood / Atonement":25,"Worship & Praise":50,"Grace":25,"God's Love for Us":25}},
"4":{"m":"7.6.","a":"William Cowper (1731-1800)","tn":"Lymington","tc":"R. Jackson (1842-1914)","fl":"ERE God had built the mountains,","v":[{"n":1,"t":"ERE God had built the mountains,\nOr raised the fruitful hills,\nBefore He filled the fountains\nThat feed the running rills,\nIn Thee from everlasting,\nThe wonderful I AM\nFound pleasures never wasting,\nAnd Wisdom is Thy name.","th":["The Person of Christ","The Father"]},{"n":2,"t":"When like a tent to dwell in,\nHe spread the skies abroad,\nAnd swathed about the swelling\nOf ocean's mighty flood,\nHe wrought by weight and measure;\nAnd Thou wast with Him then,\nThyself the Father's pleasure,\nAnd Thine, the sons of men.","th":["The Father","The Person of Christ"]},{"n":3,"t":"And couldst Thou be delighted\nWith creatures such as we,\nWho, when we saw Thee, slighted,\nAnd nailed Thee to the tree?\nUnfathomable wonder,\nAnd mystery divine!\nThe voice that speaks in thunder,\nSays, \"Sinner I am thine\".","th":["The Cross & Sufferings of Christ","God's Love for Us","Grace"]},{"n":4,"t":"And art Thou, Lord, delighted\nTo call us now Thine own -\nThe love no longer slighted\nWhich Thou to us hast shown?\nOh, way of purposed blessing\nIn death told out to man!\nThe fruit we re now possessing,\nOf Wisdom's wondrous plan.","th":["God's Love for Us","The Cross & Sufferings of Christ","Redemption"]}],"w":{"The Person of Christ":50,"The Father":50,"The Cross & Sufferings of Christ":50,"God's Love for Us":50,"Grace":25,"Redemption":25}},
"5":{"m":"8.7.","a":"Samuel M. Waring (1792-1827)","tn":"Rousseau","tc":"J. J. Rousseau (1712-1778)","fl":"UNTO Him who loves us - gave us","v":[{"n":1,"t":"UNTO Him who loves us - gave us\nEvery pledge that love could give,\nFreely shed His blood to save us,\nGave His life that we might live,\nBe the kingdom\nAnd dominion,\nAnd the glory evermore.","th":["God's Love for Us","The Precious Blood / Atonement","Worship & Praise","The Eternal Kingdom / Reign of Christ","Redemption"]}],"w":{"God's Love for Us":100,"The Precious Blood / Atonement":100,"Worship & Praise":100,"The Eternal Kingdom / Reign of Christ":100,"Redemption":100}},
"6":{"m":"C.M.","a":"Mary Bowley (Mrs Peters) (1813-1856)","tn":"St. Agnes","tc":"J. B. Dykes (1823-1876)","fl":"JESUS - how much Thy name unfolds","v":[{"n":1,"t":"JESUS - how much Thy name unfolds\nTo every opened ear;\nThe pardoned sinner's memory holds\nNone other half so dear.","th":["The Person of Christ","Forgiveness of Sins"]},{"n":2,"t":"Thy name encircles every grace\nThat God as man could show;\nThere only could He fully trace\nA life divine below.","th":["The Person of Christ","Grace"]},{"n":3,"t":"Jesus - it speaks a life of love,\nOf sorrows meekly borne;\nIt tells of sympathy above,\nWhatever makes us mourn.","th":["God's Love for Us","The Person of Christ","The Cross & Sufferings of Christ"]},{"n":4,"t":"Jesus, the One who knew no sin,\nMade sin to make us just;\nThou gav'st Thyself our love to win,\nOur full confiding trust.","th":["The Cross & Sufferings of Christ","Forgiveness of Sins","The Precious Blood / Atonement"]},{"n":5,"t":"The mention of Thy name shall bow\nOur hearts to worship Thee;\nThe chiefest of ten thousand Thou,\nWhose love has set us free.","th":["Worship & Praise","The Person of Christ","Redemption"]}],"w":{"The Person of Christ":80,"Forgiveness of Sins":40,"Grace":20,"God's Love for Us":20,"The Cross & Sufferings of Christ":40,"The Precious Blood / Atonement":20,"Worship & Praise":20,"Redemption":20}},
"7":{"m":"10S.","a":"Charles Andrew Coates (1862-1945)","tn":"Toulon","tc":"C. Goudimel (1510-1572)","fl":"THY grace, O Lord, that measured once the deep","v":[{"n":1,"t":"THY grace, O Lord, that measured once the deep\nOf Calvary's woe, to seek and save Thy sheep\nHas touched our hearts and made them long for Thee,\nThyself our treasure and our all to be.","th":["Grace","The Cross & Sufferings of Christ","Our Love for The Son/Christ"]},{"n":2,"t":"Thy glory, Lord, at God's right hand above,\nSupreme of all in that blest scene of love,\nIn sonship tells our hearts their wondrous place,\nIn Thee accepted by the Father's grace.","th":["Christ Risen & Glorified","Sonship & Adoption","The Father","Grace"]},{"n":3,"t":"Thy fulness, Lord, of light and love divine,\nNo thought can grasp, nor human mind define.\nThe whole vast scene of glory will display\nThat fulness in a quickly-coming day.","th":["The Person of Christ","The Lord's Coming / Rapture"]},{"n":4,"t":"When all things filled by Thee are wholly blest.\nAnd God's deep love eternally shall rest\nIn that which ever speaks to Him of Thee,\nThy greatness, Lord, the universe shall see.","th":["The Eternal Kingdom / Reign of Christ","God's Love for Us","The Person of Christ"]},{"n":5,"t":"Thy beauties, Lord, Thy holy precious worth,\nSurpassing far the deepest joys of earth,\nAttract our hearts - our joy Thy constant love\nThyself our object in those scenes above.","th":["The Person of Christ","Heaven & The Father's House","Our Love for The Son/Christ"]}],"w":{"Grace":40,"The Cross & Sufferings of Christ":20,"Our Love for The Son/Christ":40,"Christ Risen & Glorified":20,"Sonship & Adoption":20,"The Father":20,"The Person of Christ":60,"The Lord's Coming / Rapture":20,"The Eternal Kingdom / Reign of Christ":20,"God's Love for Us":20,"Heaven & The Father's House":20}},
"8":{"m":"6.6.6.5.","a":"F. Naylor","tn":"Adeste Fideles","tc":"J. F. Wade c. 1711-1786","fl":"O LORD, we adore Thee,","v":[{"n":1,"t":"O LORD, we adore Thee,\nFor Thou art the slain One\nThat livest for ever,\nEnthron\u00e8d in heaven;\nO Lord, we adore Thee,\nFor Thou hast redeemed us;\nOur title to glory\nWe read in Thy blood.","th":["Worship & Praise","The Lamb of God","Christ Risen & Glorified","Redemption","The Precious Blood / Atonement"]},{"n":2,"t":"O God, we acknowledge\nThy greatness, Thy glory,\nFor of Thee are all things\nOn earth and in heaven;\nHow rich is Thy mercy,\nHow great Thy salvation!\nWe bless Thee, we praise Thee,\nAmen, and Amen.","th":["Worship & Praise","The Father","Grace","Redemption"]}],"w":{"Worship & Praise":100,"The Lamb of God":50,"Christ Risen & Glorified":50,"Redemption":100,"The Precious Blood / Atonement":50,"The Father":50,"Grace":50}},
"9":{"m":"8.7.","a":"Samuel Prideaux Tregelles (1813-1875)","tn":"Adoption","tc":"J. S. Bach (1685-1750)","fl":"FATHER, we Thy children bless Thee","v":[{"n":1,"t":"FATHER, we Thy children bless Thee\nFor Thy love on us bestowed;\nAs our Father we address Thee,\nCalled to be the sons of God.\nWondrous was Thy love in giving\nJesus for our sins to die;\nWondrous was His grace in leaving\nFor our sakes, the heavens on high.","th":["The Father","Sonship & Adoption","God's Love for Us","The Cross & Sufferings of Christ","Worship & Praise"]},{"n":2,"t":"Now the sprinkled blood has freed us,\nHast'ning onward to our rest,\nThrough the desert Thou dost lead us,\nWith Thy constant favour blest;\nBy Thy truth and Spirit guiding,\nEarnest He of what's to come,\nAnd, with daily strength providing,\nThou dost lead Thy children home.","th":["The Precious Blood / Atonement","Pilgrimage / Desert Journey","The Holy Spirit","Rest & Peace"]},{"n":3,"t":"Though our pilgrimage be dreary,\nThis is not our resting place;\nShall we of the way be weary\nWhen we see our Master's face?\nNo: e'en now anticipating,\nIn this hope our souls rejoice,\nAnd His promised advent waiting,\nSoon shall hear His welcome voice.","th":["Pilgrimage / Desert Journey","The Lord's Coming / Rapture","Joy & Thanksgiving"]}],"w":{"The Father":33,"Sonship & Adoption":33,"God's Love for Us":33,"The Cross & Sufferings of Christ":33,"Worship & Praise":33,"The Precious Blood / Atonement":33,"Pilgrimage / Desert Journey":67,"The Holy Spirit":33,"Rest & Peace":33,"The Lord's Coming / Rapture":33,"Joy & Thanksgiving":33}},
"10":{"m":"S.M.","a":"Thomas Kelly (1769-1854)","tn":"Huddersfield","tc":"Anonymous","fl":"GRACE is the sweetest sound","v":[{"n":1,"t":"GRACE is the sweetest sound\nThat ever reached our ears;\nWhen conscience charged and justice frowned,\n'Twas grace removed our fears.","th":["Grace","Rest & Peace"]},{"n":2,"t":"'Tis freedom to the slave,\n'Tis light and liberty;\nIt takes its terror from the grave,\nFrom death its victory.","th":["Grace","Redemption"]},{"n":3,"t":"Grace is a mine of wealth\nLaid open to the poor;\nGrace is the sovereign spring of health;\n'Tis life for evermore.","th":["Grace"]},{"n":4,"t":"Of grace then let us sing,\nA joyful, wondrous theme,\nWho grace has brought, shall glory bring,\nAnd we shall reign with Him.","th":["Grace","Worship & Praise","The Eternal Kingdom / Reign of Christ"]},{"n":5,"t":"Then shall we see His face\nWith all the saints above,\nAnd sing for ever of His grace,\nFor ever of His love.","th":["Heaven & The Father's House","Grace","God's Love for Us"]}],"w":{"Grace":100,"Rest & Peace":20,"Redemption":20,"Worship & Praise":20,"The Eternal Kingdom / Reign of Christ":20,"Heaven & The Father's House":20,"God's Love for Us":20}},
"11":{"m":"6.6.6.6.8.8.","a":"Thomas Haweis (1732-1820)","tn":"Darwall","tc":"J. Darwall (1731-1789)","fl":"JESUS, the Lord, is risen","v":[{"n":1,"t":"JESUS, the Lord, is risen\nTriumphant o'er the grave;\nFor us He burst the prison,\nAlmighty now to save.\nCaptivity is captive led,\nSince Jesus liveth that was dead.","th":["Christ Risen & Glorified","Redemption"]},{"n":2,"t":"Who to our charge shall lay\nIniquity or guilt?\nOur sins are washed away\nSince Jesus' blood was spilt.\nCaptivity is captive led,\nSince Jesus liveth that was dead.","th":["Forgiveness of Sins","The Precious Blood / Atonement","Assurance & Security"]},{"n":3,"t":"Who now accuseth them\nWhom God hath justified?\nOr who shall those condemn\nFor whom the Surety died?\nCaptivity is captive led,\nSince Jesus liveth that was dead.","th":["Assurance & Security","Christ's Intercession / Priesthood"]},{"n":4,"t":"Christ has the ransom paid,\nThe wondrous work is done;\nOn Him our help is laid,\nThe victory is won.\nCaptivity is captive led,\nSince Jesus liveth that was dead.","th":["Redemption","The Precious Blood / Atonement","Christ Risen & Glorified"]}],"w":{"Christ Risen & Glorified":50,"Redemption":50,"Forgiveness of Sins":25,"The Precious Blood / Atonement":50,"Assurance & Security":50,"Christ's Intercession / Priesthood":25}},
"12":{"m":"S.M.","a":"John Nelson Darby (1800-1882)","tn":"Venice","tc":"W. Amps (1824-1910)","fl":"SING, without ceasing sing","v":[{"n":1,"t":"SING, without ceasing sing\nThe Saviour's present grace,\nHow all things shine in light divine\nFor those who've seen His face.","th":["Worship & Praise","Grace"]},{"n":2,"t":"He's gone within the veil,\nFor us that place has won;\nIn Him we stand, a heavenly band.\nWhere He Himself is gone.","th":["Christ Risen & Glorified","Heaven & The Father's House"]},{"n":3,"t":"There all's unsullied light,\nOur hearts let in its rays;\nAnd heavenly light makes all things bright,\nSeen in that blissful gaze.","th":["Heaven & The Father's House"]},{"n":4,"t":"Such here on earth we are,\nThough we in weakness roam;\nOur place on high, God's self so nigh,\nHis presence is our home.","th":["Pilgrimage / Desert Journey","Heaven & The Father's House"]},{"n":5,"t":"And stayed by joy divine,\nAs hireling fills his day,\nThrough scenes of strife and desert life\nWe tread in peace our way.","th":["Pilgrimage / Desert Journey","Rest & Peace"]},{"n":6,"t":"That way is upward still,\nWhere life and glory are;\nOur rest's above, in perfect love\nThe glory we shall share.","th":["Heaven & The Father's House","God's Love for Us"]},{"n":7,"t":"For ever with the Lord,\nFor ever like Him then,\nWe'll see His face in that blest place,\nOur Father's house in heaven.","th":["Heaven & The Father's House","The Father"]}],"w":{"Worship & Praise":14,"Grace":14,"Christ Risen & Glorified":14,"Heaven & The Father's House":71,"Pilgrimage / Desert Journey":29,"Rest & Peace":14,"God's Love for Us":14,"The Father":14}},
"13":{"m":"7.7.8.7.","a":"C. Wesley (1707-1788)","tn":"Worship","tc":"Franz Joseph Haydn (1732-1809)","fl":"WORSHIP and thanks and blessing,","v":[{"n":1,"t":"WORSHIP and thanks and blessing,\nAnd strength ascribe to Jesus;\nThe Lord alone defends His own,\nWhen earth or hell oppresses.\nOmnipotent Redeemer,\nOur ransomed souls adore Thee:\nOur Saviour Thou, we own it now,\nAnd give to Thee the glory.","th":["Worship & Praise","The Lamb of God","Redemption"]},{"n":2,"t":"Thine arm hath safely brought us\nA way no more expected,\nThan when Thy sheep passed through the deep,\nBy crystal walls protected.\nWe sing Thine arm unshortened,\nBrought through each sore temptation,\nWith heart and voice in Thee rejoice,\nThou God of our salvation.","th":["Redemption","Trial & Conflict","Worship & Praise"]},{"n":3,"t":"Thy glory is our rear-ward,\nThy hand our lives doth cover;\nAnd we, e'en we, have passed the sea,\nAnd marched triumphant over;\nWe own Thy great deliverance,\nAnd triumph in Thy favour,\nAnd for the love which now we prove,\nShall praise Thy name for eve","th":["Redemption","Worship & Praise","God's Love for Us"]}],"w":{"Worship & Praise":100,"The Lamb of God":33,"Redemption":100,"Trial & Conflict":33,"God's Love for Us":33}},
"14":{"m":"8.7.","a":"John Nelson Darby (1800-1882)","tn":"Stuttgart","tc":"C. F. Witt (1660-1716)","fl":"HARK! ten thousand voices crying","v":[{"n":1,"t":"HARK! ten thousand voices crying\n\"Lamb of God\" with one accord;\nThousand thousand saints replying,\nWake at once the echoing chord.","th":["The Lamb of God","Worship & Praise"]},{"n":2,"t":"\"Praise the Lamb\", the chorus waking,\nAll in heaven together throng\nLoud and far each tongue partaking\nRolls around the endless song.","th":["The Lamb of God","Worship & Praise","Heaven & The Father's House"]},{"n":3,"t":"Grateful incense this, ascending\nEver to the Father's throne;\nEvery knee to Jesus bending,\nAll the mind in heaven is one.","th":["The Father","Worship & Praise","The Person of Christ"]},{"n":4,"t":"All the Father's counsels claiming\nEqual honours to the Son;\nAll the Son's effulgence beaming\nMakes the Father's glory known.","th":["The Father","The Person of Christ"]},{"n":5,"t":"By the Spirit all-pervading,\nHosts unnumbered round the Lamb,\nCrowned with light and joy unfading,\nHail Him as the great \"I AM\".","th":["The Holy Spirit","The Lamb of God","The Person of Christ"]},{"n":6,"t":"Joyful now the new creation\nRests in undisturbed repose,\nBlest in Jesus' full salvation,\nSorrow now nor thraldom knows.","th":["New Creation","Redemption","Rest & Peace"]},{"n":7,"t":"Hark! the heavenly notes resounding,\nHigher swells the song of praise;\nThrough creation's vault responding\nLoud Amens which joy doth raise.","th":["Worship & Praise","Joy & Thanksgiving"]}],"w":{"The Lamb of God":43,"Worship & Praise":57,"Heaven & The Father's House":14,"The Father":29,"The Person of Christ":43,"The Holy Spirit":14,"New Creation":14,"Redemption":14,"Rest & Peace":14,"Joy & Thanksgiving":14}},
"15":{"m":"C.M.","a":"Horatius Bonar (1808-1889)","tn":"French","tc":"Anonymous","fl":"ALL that we were - our sins, our guilt,","v":[{"n":1,"t":"ALL that we were - our sins, our guilt,\nOur death - was all our own:\nAll that we are we owe to Thee,\nThou God of grace alone.","th":["Grace"]},{"n":2,"t":"Thy mercy found us in our sins,\nAnd gave us to believe;\nThen, in believing, peace we found;\nAnd in Thy Christ we live.","th":["Grace","Rest & Peace","Forgiveness of Sins"]},{"n":3,"t":"All that we are, as saints on earth,\nAll that we hope to be\nWhen Jesus comes and glory dawns\nWe owe it all to Thee.","th":["Grace","The Lord's Coming / Rapture"]}],"w":{"Grace":100,"Rest & Peace":33,"Forgiveness of Sins":33,"The Lord's Coming / Rapture":33}},
"16":{"m":"8.7.","a":"Mary Bowley (Mrs Peters) (1813-1856)","tn":"Rhineland","tc":"W. Brockhaus (1819-1888)","fl":"MANY sons to glory bringing,","v":[{"n":1,"t":"MANY sons to glory bringing,\nGod sets forth His heavenly name;\nOn we march in chorus singing,\n\"Worthy the ascended Lamb!\"","th":["Sonship & Adoption","The Lamb of God","Worship & Praise"]},{"n":2,"t":"God who gave the blood to screen us,\nGod looks down in perfect love;\nClouds may seem to pass between us,\nThere's no change in Him above.","th":["God's Love for Us","The Precious Blood / Atonement"]},{"n":3,"t":"Though the restless foe accuses,\nSins recounting like a flood,\nEvery charge our God refuses:\nChrist has answered with His blood.","th":["Assurance & Security","The Precious Blood / Atonement"]},{"n":4,"t":"In the refuge God provided,\nThough the world's destruction lowers,\nWe are safe, to Christ confided,\nEverlasting life is ours.","th":["Assurance & Security","Redemption"]},{"n":5,"t":"And, ere long, when come to glory,\nWe shall sing a well-known strain,\nThis the never-tiring story,\n\"Worthy is the Lamb once slain!\"","th":["Heaven & The Father's House","The Lamb of God","Worship & Praise"]}],"w":{"Sonship & Adoption":20,"The Lamb of God":40,"Worship & Praise":40,"God's Love for Us":20,"The Precious Blood / Atonement":40,"Assurance & Security":40,"Redemption":20,"Heaven & The Father's House":20}},
"17":{"m":"8.7.","a":"John Newton (1725-1807)","tn":"Vesper Hymn","tc":"D. S. Bortniansky (1752-1825)","fl":"MAY the grace of Christ our Saviour,","v":[{"n":1,"t":"MAY the grace of Christ our Saviour,\nAnd the Father's boundless love,\nWith the Holy Spirit's favour,\nRest upon us from above.","th":["Grace","God's Love for Us","The Holy Spirit"]},{"n":2,"t":"Thus may we abide in union\nWith each other and the Lord,\nAnd possess, in sweet communion,\nJoys which earth can ne'er afford.","th":["Fellowship & Gathering","Joy & Thanksgiving"]}],"w":{"Grace":50,"God's Love for Us":50,"The Holy Spirit":50,"Fellowship & Gathering":50,"Joy & Thanksgiving":50}},
"18":{"m":"8.7.","a":"John Bakewell (1721-1819)","tn":"Hyfrydol","tc":"R. H. Prichard (1811-1887)","fl":"PASCHAL Lamb, by God appointed,","v":[{"n":1,"t":"PASCHAL Lamb, by God appointed,\nAll our sins were on Thee laid\nBy Almighty love anointed,\nThou hast full atonement made.\nAll Thy people are forgiven\nThrough the virtue of Thy blood\nOpened is the gate of heaven,\nPeace is made for us with God.","th":["The Lamb of God","The Precious Blood / Atonement","Forgiveness of Sins","Rest & Peace","Redemption"]},{"n":2,"t":"Saviour, hail! enthroned in glory,\nThere for ever to abide;\nAll the heavenly hosts adore Thee\nSeated at Thy Father's side;\nWorship, honour, power, and blessing,\nThou art worthy to receive;\nLoudest praises, without ceasing,\nMeet it is for us to give.","th":["Christ Risen & Glorified","Worship & Praise","Heaven & The Father's House"]}],"w":{"The Lamb of God":50,"The Precious Blood / Atonement":50,"Forgiveness of Sins":50,"Rest & Peace":50,"Redemption":50,"Christ Risen & Glorified":50,"Worship & Praise":50,"Heaven & The Father's House":50}},
"19":{"m":"11s.","a":"Marie de Fleury (d. 1794)","tn":"Lion of Juda","tc":"Anonymous","fl":"LORD Jesus, we worship and bow at Thy feet,","v":[{"n":1,"t":"LORD Jesus, we worship and bow at Thy feet,\nAnd give Thee the glory, the honour that's meet;\nWhile through Thee, O Saviour, our praises ascend\nTo God and the Father through worlds without end.","th":["Worship & Praise","The Father","The Person of Christ"]}],"w":{"Worship & Praise":100,"The Father":100,"The Person of Christ":100}},
"20":{"m":"8.5.8.5.8.5.8.5.","a":"H. D'Arcy Champney (1854-1942)","tn":"The Pleading Voice","tc":"Clara H. Scott (1841-1897)","fl":"BLESSED Lord, our hallelujahs","v":[{"n":1,"t":"BLESSED Lord, our hallelujahs\nNow to Thee we raise;\nNever could we fully utter\nAll Thy worth and praise.\nPraise the Lamb ! yes, Thou art worthy,\nWho didst shed Thy blood\nTo redeem Thy saints and make us\nKings and priests to God.","th":["Worship & Praise","The Lamb of God","The Precious Blood / Atonement","Redemption"]},{"n":2,"t":"Yes, we praise Thee, for Thou lov'st us;\nAnd we bless Thee, Lord,\nFor the peace and joy and gladness\nWhich Thou dost afford.\nHallelujah! Thou, Lord Jesus,\nCanst not cease to love;\nThine we are, and Thine for ever,\nOne with Thee above.","th":["God's Love for Us","Rest & Peace","Joy & Thanksgiving","Worship & Praise"]},{"n":3,"t":"Praise the Lord! Yes, hallelujah!\nWho would hush the song?\nJoin with saint's from every nation,\nEvery tribe and tongue.\nPraise the Lamb, for He is worthy,\nSweet eternal strain!\nHallelujah! Hallelujah!\nPraise the Lord! Amen.","th":["Worship & Praise","The Lamb of God"]}],"w":{"Worship & Praise":100,"The Lamb of God":67,"The Precious Blood / Atonement":33,"Redemption":33,"God's Love for Us":33,"Rest & Peace":33,"Joy & Thanksgiving":33}},
"21":{"m":"8.7.","a":"James George Deck (1802-1884)","tn":"Grebe","tc":"J. G. Ebeling (1637-1676)","fl":"ABBA, Father, we approach Thee","v":[{"n":1,"t":"ABBA, Father, we approach Thee\nIn our Saviour's precious name;\nWe, Thy children, here assembling,\nNow the promised blessing claim.\nFrom our guilt His blood has washed us,\n'Tis through Him our souls draw nigh;\nAnd Thy Spirit too has taught us\n\"Abba, Father\", thus to cry.","th":["The Father","Sonship & Adoption","The Precious Blood / Atonement","The Holy Spirit","Fellowship & Gathering"]},{"n":2,"t":"Once as prodigals we wandered\nIn our folly far from Thee;\nBut Thy grace, o'er sin abounding,\nRescued us from misery;\nThou the prodigals hast pardoned,\nKissed us with a Father's love;\nKilled the fatted calf, and called us\nE'er to dwell with Thee above.","th":["Grace","The Father","Forgiveness of Sins","Sonship & Adoption"]},{"n":3,"t":"Clothed in garments of salvation,\nAt Thy table is our place;\nWe rejoice, and Thou rejoicest,\nIn the riches of Thy grace.\n\"It is meet,\" we hear Thee saying,\n\"We should merry be and glad;\nI have found My once lost children,\nNow they live who once were dead.\"","th":["Grace","Joy & Thanksgiving","Redemption"]},{"n":4,"t":"Abba, Father, we adore Thee,\nWhile the hosts in heaven above\nE'en in us now learn the wonders\nOf Thy wisdom, grace, and love.\nSoon before Thy throne assembled,\nAll Thy children shall proclaim\nAbba's love as shown in Jesus,\nAnd how full is Abba's name!","th":["The Father","Sonship & Adoption","Worship & Praise","Grace","God's Love for Us"]}],"w":{"The Father":75,"Sonship & Adoption":75,"The Precious Blood / Atonement":25,"The Holy Spirit":25,"Fellowship & Gathering":25,"Grace":75,"Forgiveness of Sins":25,"Joy & Thanksgiving":25,"Redemption":25,"Worship & Praise":25,"God's Love for Us":25}},
"22":{"m":"S.M.","a":"James George Deck (1802-1884)","tn":"Vigil","tc":"G. Paisiello","fl":"O LORD, a few of Thine","v":[{"n":1,"t":"O LORD, a few of Thine\nAre gathered to Thy name;\nMay hearts o'erflow with joy divine\nAs we Thy promise claim.","th":["Fellowship & Gathering","Joy & Thanksgiving"]},{"n":2,"t":"We are, O Lord, Thine own,\nThe purchase of Thy blood;\nBy Thee we would approach the throne,\nConfiding in our God.","th":["The Precious Blood / Atonement","Assurance & Security"]},{"n":3,"t":"In us the Spirit dwells,\nThe witness of God's love;\nOur hearts rejoice while He reveals\nThy glorious things above.","th":["The Holy Spirit","God's Love for Us","Joy & Thanksgiving","Heaven & The Father's House"]}],"w":{"Fellowship & Gathering":33,"Joy & Thanksgiving":67,"The Precious Blood / Atonement":33,"Assurance & Security":33,"The Holy Spirit":33,"God's Love for Us":33,"Heaven & The Father's House":33}},
"23":{"m":"8s.","a":"Joseph Hart (1712-1768)","tn":"Celeste","tc":"Anonymous","fl":"How good is the God we adore,","v":[{"n":1,"t":"How good is the God we adore,\nOur faithful unchangeable Friend:\nWhose love is as great as His power,\nAnd knows neither measure nor end!","th":["God's Love for Us","Worship & Praise"]},{"n":2,"t":"'Tis Jesus, the First and the Last,\nWhose Spirit shall guide us safe home;\nWe'll praise Him for all that is past,\nAnd trust Him for all that's to come.","th":["The Person of Christ","The Holy Spirit","Worship & Praise","Assurance & Security"]}],"w":{"God's Love for Us":50,"Worship & Praise":100,"The Person of Christ":50,"The Holy Spirit":50,"Assurance & Security":50}},
"24":{"m":"S.M.","a":"S. Whitlock Gandy (d. 1851)","tn":"Falcon Street","tc":"Anonymous","fl":"HIS be the Victor's name","v":[{"n":1,"t":"HIS be the Victor's name\nWho fought the fight alone;\nTriumphant saints no honour claim,\nHis conquest was their own.","th":["The Cross & Sufferings of Christ","Christ Risen & Glorified"]},{"n":2,"t":"By weakness and defeat,\nHe won the meed and crown;\nTrod all our foes beneath His feet\nBy being trodden down.","th":["The Cross & Sufferings of Christ"]},{"n":3,"t":"He Satan's power laid low;\nMade sin, He sin o'erthrew;\nBowed to the grave, destroyed it so,\nAnd death by dying slew.","th":["The Cross & Sufferings of Christ","Christ Risen & Glorified"]},{"n":4,"t":"Bless, bless the Conqueror slain,\nSlain in His victory;\nWho lived, who died, who lives again -\nFor thee, His church, for thee!","th":["Worship & Praise","Christ Risen & Glorified","The Church / Bride of Christ"]}],"w":{"The Cross & Sufferings of Christ":75,"Christ Risen & Glorified":75,"Worship & Praise":25,"The Church / Bride of Christ":25}},
"25":{"m":"C.M.","a":"John Nelson Darby (1800-1882)","tn":"Barrow","tc":"Anonymous","fl":"FATHER, Thy name our souls would bless,","v":[{"n":1,"t":"FATHER, Thy name our souls would bless,\nAs children taught by grace,\nLift up our hearts in righteousness\nAnd joy before Thy face.","th":["The Father","Sonship & Adoption","Grace","Worship & Praise"]},{"n":2,"t":"Sweet is the confidence Thou giv'st,\nThough high above our praise;\nOur hearts resort to where Thou liv'st\nIn heaven's unclouded rays.","th":["Assurance & Security","Heaven & The Father's House"]},{"n":3,"t":"There in the purpose of Thy love\nOur place is now prepared,\nAs sons with Him who is above,\nWho all our sorrows shared.","th":["God's Love for Us","Sonship & Adoption","Heaven & The Father's House"]},{"n":4,"t":"Eternal ages shall declare\nThe riches of Thy grace,\nTo those who with Thy Son shall share\nA son's eternal place.","th":["Grace","Sonship & Adoption"]},{"n":5,"t":"Absent as yet, we rest in hope,\nTreading the desert path,\nWaiting for Him who takes us up\nBeyond the power of death.","th":["Pilgrimage / Desert Journey","The Lord's Coming / Rapture"]},{"n":6,"t":"We joy in Thee, Thy holy love\nOur endless portion is,\nLike Thine own Son, with Him above,\nIn brightest heavenly bliss.","th":["Joy & Thanksgiving","God's Love for Us","Heaven & The Father's House"]},{"n":7,"t":"O Holy Father, keep us here\nIn that blest name of love,\nWalking before Thee without fear\nTill all be joy above.","th":["The Father","God's Love for Us","Assurance & Security"]}],"w":{"The Father":29,"Sonship & Adoption":43,"Grace":29,"Worship & Praise":14,"Assurance & Security":29,"Heaven & The Father's House":43,"God's Love for Us":43,"Pilgrimage / Desert Journey":14,"The Lord's Coming / Rapture":14,"Joy & Thanksgiving":14}},
"26":{"m":"11.10.11.10.Dactyl","a":"Miss A. M. Harding","tn":"Epiphany Hymn","tc":"J. F. Thrupp (1827-1867)","fl":"THINE is the love, Lord, that draws us together,","v":[{"n":1,"t":"THINE is the love, Lord, that draws us together,\nGuiding our steps from the wilderness ways;\nSoon face to face we'll adore Thee for ever,\nNow our glad hearts would be filled with Thy praise.","th":["God's Love for Us","Fellowship & Gathering","Worship & Praise","Pilgrimage / Desert Journey"]},{"n":2,"t":"Faithful Thy grace o'er our pathway has waited,\nDeep the delight we have found, Lord, in Thee;\nNow with this treasure our spirits are freighted,\nBowed at Thy feet, and the fragrance set free.","th":["Grace","Worship & Praise","Our Love for The Son/Christ"]},{"n":3,"t":"For us,Lord Jesus, Thyself Thou hast given;\nSufferings unfathomed for us Thou hast known;\nNow, in accord with the homage of heaven,\nRises a song from the hearts of Thine own.","th":["The Cross & Sufferings of Christ","God's Love for Us","Worship & Praise"]},{"n":4,"t":"Jesus, Lord Jesus, we love and adore Thee,\nGlorious Thy Name, all our praises above;\nPeerless Thy beauty, we worship before Thee;\nHushed are our spirits, at rest in Thy love.","th":["Worship & Praise","The Person of Christ","Rest & Peace","Our Love for The Son/Christ"]}],"w":{"God's Love for Us":50,"Fellowship & Gathering":25,"Worship & Praise":100,"Pilgrimage / Desert Journey":25,"Grace":25,"Our Love for The Son/Christ":50,"The Cross & Sufferings of Christ":25,"The Person of Christ":25,"Rest & Peace":25}},
"27":{"m":"8.7.","a":"James George Deck (1802-1884)","tn":"Vision","tc":"G. C. Tullar (1869-1950)","fl":"LAMB of God, our souls adore Thee,","v":[{"n":1,"t":"LAMB of God, our souls adore Thee,\nWhile upon Thy face we gaze;\nThere the Father's love and glory\nShine in all their brightest rays;\nThy almighty power and wisdom\nAll creation's works proclaim;\nHeaven and earth alike confess Thee\nAs the ever great I AM.","th":["The Lamb of God","Worship & Praise","The Father","The Person of Christ"]},{"n":2,"t":"Son of God, Thy Father's bosom\nEver was Thy dwelling-place;\nHis delight, in Him rejoicing,\nOne with Him in power and grace.\nO what wondrous love and mercy!\nThou didst lay Thy glory by,\nAnd for us didst come from heaven,\nAs the Lamb of God to die.","th":["The Person of Christ","The Father","Grace","The Lamb of God","The Cross & Sufferings of Christ"]},{"n":3,"t":"Lamb of God, when we behold Thee\nLowly in the manger laid;\nWandering as a homeless Stranger,\nIn the world Thy hands had made;\nWhen we see Thee in the garden\nIn Thine agony of blood,\nAt Thy grace we are confounded,\nHoly, spotless, Lamb of God.","th":["The Lamb of God","The Cross & Sufferings of Christ","The Person of Christ","Grace"]},{"n":4,"t":"When we see Thee, as the Victim,\nNailed to the accursed tree,\nFor our guilt and folly stricken,\nAll our judgment borne by Thee,\nLord, we own with hearts adoring,\nThou hast washed us in Thy blood:\nGlory, glory everlasting,\nBe to Thee, Thou Lamb of God!","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","Worship & Praise","The Lamb of God","Forgiveness of Sins"]}],"w":{"The Lamb of God":100,"Worship & Praise":50,"The Father":50,"The Person of Christ":75,"Grace":50,"The Cross & Sufferings of Christ":75,"The Precious Blood / Atonement":25,"Forgiveness of Sins":25}},
"28":{"m":"8.7.","a":"James George Deck (1802-1884)","tn":"Beecher","tc":"J. Zundel (1815-1882)","fl":"LAMB of God, Thou now art seated","v":[{"n":1,"t":"LAMB of God, Thou now art seated\nHigh upon Thy Father's throne;\nAll Thy gracious work completed,\nAll Thy mighty victory won:\nEvery knee in heaven is bending\nTo the Lamb for sinners slain;\nEvery voice and heart is swelling,\n\"Worthy is the Lamb to reign\".","th":["The Lamb of God","Christ Risen & Glorified","Worship & Praise","The Eternal Kingdom / Reign of Christ"]},{"n":2,"t":"Lord,in all Thy power and glory,\nStill Thy thoughts and eyes are here;\nWatching o'er Thy ransomed people,\nTo Thy gracious heart so dear;\nThou for us art interceding;\nEverlasting is Thy love;\nAnd a blessed rest preparing\nIn our Father's house above.","th":["Christ's Intercession / Priesthood","God's Love for Us","Heaven & The Father's House","Redemption"]},{"n":3,"t":"Lamb of God, Thy faithful promise\nSays, \"Behold, I quickly come;\nAnd our hearts, to Thine responsive,\nCry, \"Come, Lord, and take us home.\"\nOh, the rapture that awaits us,\nWhen we meet Thee in the air,\nAnd with Thee ascend in triumph,\nAll Thy deepest joys to share.","th":["The Lord's Coming / Rapture","The Lamb of God","Joy & Thanksgiving"]},{"n":4,"t":"Lamb of God, when Thou in glory\nShalt to this sad earth return,\nAll Thy foes shall quake before Thee,\nAll who now despise Thee mourn,\nThen shall we at Thine appearing,\nWith Thee in Thy kingdom reign;\nThine the praise, and Thine the glory,\nLamb of God for sinners slain.","th":["The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ","The Lamb of God"]}],"w":{"The Lamb of God":75,"Christ Risen & Glorified":25,"Worship & Praise":25,"The Eternal Kingdom / Reign of Christ":50,"Christ's Intercession / Priesthood":25,"God's Love for Us":25,"Heaven & The Father's House":25,"Redemption":25,"The Lord's Coming / Rapture":50,"Joy & Thanksgiving":25}},
"29":{"m":"8.8.6.","a":"James George Deck (1802-1884)","tn":"Meribah","tc":"L. Mason (1792-1872)","fl":"O BLESSED Saviour, Son of God,","v":[{"n":1,"t":"O BLESSED Saviour, Son of God,\nWho hast redeemed us with Thy blood\nFrom guilt, and death, and shame,\nWith joy and praise Thy people see\nThe crown of glory worn by Thee,\nAnd worthy Thee proclaim.","th":["Redemption","The Precious Blood / Atonement","Worship & Praise","Christ Risen & Glorified"]},{"n":2,"t":"Exalted by the Father's love,\nAll thrones, and powers, and names above,\nAt God's right hand in heaven:\nWisdom and riches, power divine,\nBlessing and honour, Lord, are Thine -\nAll things to Thee are given.","th":["Christ Risen & Glorified","The Person of Christ"]},{"n":3,"t":"Head of the church, Thou sittest there;\nThy members all the blessings share\nThy blessing, Lord, is ours:\nOur life Thou art; Thy grace sustains;\nThy strength in us each victory gains\nO'er sin and Satan's powers.","th":["The Church / Bride of Christ","Grace"]},{"n":4,"t":"And soon, the day of glory come,\nThy bride shall reach her destined home\nAnd all Thy beauty see:\nHow great our joy to see Thee shine,\nTo hear Thee own us, Lord, as Thine,\nAnd ever dwell with Thee!","th":["The Lord's Coming / Rapture","The Church / Bride of Christ","Heaven & The Father's House"]}],"w":{"Redemption":25,"The Precious Blood / Atonement":25,"Worship & Praise":25,"Christ Risen & Glorified":50,"The Person of Christ":25,"The Church / Bride of Christ":50,"Grace":25,"The Lord's Coming / Rapture":25,"Heaven & The Father's House":25}},
"30":{"m":"C.M.","a":"Harold P. Barker (1869-1952)","tn":"Stracathro","tc":"C. Hutcheson (1792-1860)","fl":"WE praise Thee for Thy Spirit, Lord,","v":[{"n":1,"t":"WE praise Thee for Thy Spirit, Lord,\nThe bless\u00e8d Holy Ghost.\nThe promised Comforter from heaven,\nWho came at Pentecost.","th":["The Holy Spirit","Worship & Praise"]},{"n":2,"t":"We praise Thee for His sovereign grace,\nThat broke our darkness through;\nAnd wrought within us by Thy word\nA birth divinely new.","th":["The Holy Spirit","Grace","New Creation"]},{"n":3,"t":"We praise Thee that He is the Seal,\nWhereby we're marked as Thine,\nUntil redemption's day shall dawn,\nAnd we in glory shine.","th":["The Holy Spirit","Assurance & Security","Redemption"]},{"n":4,"t":"We praise Thee for the Earnest given,\nOf blessings yet in store,\nThe great inheritance which we\nShall share for evermore.","th":["The Holy Spirit","Heaven & The Father's House"]},{"n":5,"t":"We praise Thee that the Unction sent\nAbides in us for aye,\nT o be our Teacher, Guide and Strength,\nAlong life's upward way.","th":["The Holy Spirit","Service & Devotion"]},{"n":6,"t":"We praise Thee for those ties divine\nThat bind Thy saints to Thee,\nAs members of Thy body one -\nThe Spirit's unity.","th":["The Holy Spirit","The Church / Bride of Christ","Fellowship & Gathering"]},{"n":7,"t":"We praise Thee for the work\nHath in our souls begun,\nTo form in us a transcript here\nOf God's belov\u00e8d Son.","th":["The Holy Spirit","The Person of Christ"]}],"w":{"The Holy Spirit":100,"Worship & Praise":14,"Grace":14,"New Creation":14,"Assurance & Security":14,"Redemption":14,"Heaven & The Father's House":14,"Service & Devotion":14,"The Church / Bride of Christ":14,"Fellowship & Gathering":14,"The Person of Christ":14}},
"31":{"m":"S.M.","a":"Mrs. W. N. Tomkins","tn":"Boylston","tc":"L. Mason (1792-1872)","fl":"To Him who gave Himself","v":[{"n":1,"t":"To Him who gave Himself\nTo God an offering sweet,\nAnd purged away our guilt of\nAscribe we praises meet.","th":["The Cross & Sufferings of Christ","Worship & Praise","Forgiveness of Sins"]},{"n":2,"t":"To Him who gave Himself\nFor us, that we might be\nRedeemed, and purchased for His own,\nSing we eternally.","th":["Redemption","The Cross & Sufferings of Christ"]},{"n":3,"t":"To Him who gave Himself\nFor her, the church He loved,\nAnd in the dark domain of death\nHis deep affection proved,","th":["The Church / Bride of Christ","God's Love for Us","The Cross & Sufferings of Christ"]},{"n":4,"t":"To Him who gave Himself,\nSound we our note of praise;\nOur lives, our hearts, our all would we\nUpon His altar raise.","th":["Worship & Praise","Service & Devotion"]},{"n":5,"t":"To Him bow every knee;\nTo Him raise glad the song;\nAll honour, glory, thanks and praise\nTo Him by right belong.","th":["Worship & Praise","The Person of Christ"]}],"w":{"The Cross & Sufferings of Christ":60,"Worship & Praise":60,"Forgiveness of Sins":20,"Redemption":20,"The Church / Bride of Christ":20,"God's Love for Us":20,"Service & Devotion":20,"The Person of Christ":20}},
"32":{"m":"L.M.","a":"Sir Edward Denny (1796-1889)","tn":"Holley","tc":"G. Hews (1806-1873)","fl":"OH, wondrous hour when Saviour Thou,","v":[{"n":1,"t":"OH, wondrous hour when Saviour Thou,\nCo-equal with the eternal God,\nBeneath our sins didst deign to bow\nAnd shed for us Thy precious blood!","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","The Person of Christ"]},{"n":2,"t":"On Thee, the Father's bless\u00e8d Son,\nAs Lamb of God our judgment fell;\nThat all was borne, that all is done,\nThine agony, Thy cross can tell.","th":["The Lamb of God","The Cross & Sufferings of Christ","The Precious Blood / Atonement"]},{"n":3,"t":"Thy cross, Thy cross! 'tis there we see\nWhat Thou, our bless\u00e8d Saviour, art;\nThere all the love that dwells in Thee\nWas labouring in Thy breaking heart.","th":["The Cross & Sufferings of Christ","God's Love for Us"]},{"n":4,"t":"For us it was: our life we owe,\nOur joy, our glory, all to Thee;\nThy sufferings in that hour of woe,\nThy victory, Lord, have made us free.","th":["The Cross & Sufferings of Christ","Redemption","Joy & Thanksgiving"]}],"w":{"The Cross & Sufferings of Christ":100,"The Precious Blood / Atonement":50,"The Person of Christ":25,"The Lamb of God":25,"God's Love for Us":25,"Redemption":25,"Joy & Thanksgiving":25}},
"33":{"m":"C.M.","a":"Frances George Burkitt (1864-1929)","tn":"St. Peter","tc":"A. R. Reinagle (1799-1877)","fl":"GLORY to Thee, our Father, God,","v":[{"n":1,"t":"GLORY to Thee, our Father, God,\nThou source of every joy;\nO'erflowing praise to Thee we give;\nThis is our sweet employ.","th":["The Father","Joy & Thanksgiving","Worship & Praise"]},{"n":2,"t":"In Thee our souls have found their rest;\nOf love divine the spring,\nGiver of every perfect gift,\nThy praise we gladly sing.","th":["God's Love for Us","Rest & Peace","Worship & Praise"]},{"n":3,"t":"Glory to Thee, O Son of God!\nWe celebrate Thy worth,\nThou central Sun of life and joy\nIn heaven and on earth.","th":["The Person of Christ","Worship & Praise"]},{"n":4,"t":"Thyself the Son, the Eternal God,\nThe Word, the great I AM,\nRevealed in flesh Thou didst become,\nIn nature, truly man.","th":["The Person of Christ"]},{"n":5,"t":"Praise for the Holy Spirit given,\nOur Teacher and our Guide,\nBy whom from heaven's unbounded store\nOur every need's supplied.","th":["The Holy Spirit","Worship & Praise"]},{"n":6,"t":"The Comforter, whose service is\nTo glorify the Son,\nTo take the treasures of His love\nAnd make them all our own:","th":["The Holy Spirit","The Person of Christ"]},{"n":7,"t":"Glory to Thee, God Infinite,\nAnd praise below - above;\nAngelic hosts proclaim Thy power,\nRedeemed ones sing Thy love.","th":["Worship & Praise","Redemption","God's Love for Us"]}],"w":{"The Father":14,"Joy & Thanksgiving":14,"Worship & Praise":71,"God's Love for Us":29,"Rest & Peace":14,"The Person of Christ":43,"The Holy Spirit":29,"Redemption":14}},
"34":{"m":"P.M.","a":"August Gottlieb Spangenberg (1704-1792)","tn":"Hallelujah","tc":"H. Carey, c. 1690-1743","fl":"WE adore Thee evermore, Hallelujah!","v":[{"n":1,"t":"WE adore Thee evermore, Hallelujah!\nSaviour, for Thy boundless grace, Hallelujah!\nFor the cross, whereby to us, Hallelujah!\nSure is made eternal bliss; Hallelujah!","th":["Worship & Praise","The Cross & Sufferings of Christ","Grace","Heaven & The Father's House"]},{"n":2,"t":"For Thy death which set us free, Hallelujah!\nFrom sin's cruel slavery, Hallelujah!\nFor Thine all-atoning blood, Hallelujah!\nWhich hath brought us nigh to God: Hallelujah!","th":["Redemption","The Precious Blood / Atonement","Forgiveness of Sins","Worship & Praise"]}],"w":{"Worship & Praise":100,"The Cross & Sufferings of Christ":50,"Grace":50,"Heaven & The Father's House":50,"Redemption":50,"The Precious Blood / Atonement":50,"Forgiveness of Sins":50}},
"35":{"m":"8.7.","a":"J. Denham Smith (1817-1889)","tn":"Safety","tc":"F. A. Schulz (1810-1893)","fl":"RISE, my soul! behold 'tis Jesus,","v":[{"n":1,"t":"RISE, my soul! behold 'tis Jesus,\nJesus fills thy wondering eyes;\nSee Him now in glory seated,\nWhere thy sins no more can rise.","th":["Christ Risen & Glorified","Forgiveness of Sins","The Person of Christ"]},{"n":2,"t":"There in righteousness transcendent,\nLo! He doth in heaven appear,\nAnd the blood of His atonement\nIs thy title to be there.","th":["The Precious Blood / Atonement","Assurance & Security","Heaven & The Father's House"]},{"n":3,"t":"All thy sins were laid upon Him,\nJesus bore them on the tree;\nGod, who knew them, laid them on Him\nAnd, believing, thou art free.","th":["Forgiveness of Sins","The Cross & Sufferings of Christ","Assurance & Security"]},{"n":4,"t":"God now brings thee to His dwelling,\nSpreads for thee His feast divine,\nBids thee welcome, ever telling,\nWhat a portion there is thine.","th":["The Father","Heaven & The Father's House"]},{"n":5,"t":"Bless\u00e8d circle of His favour,\nCircle of the Father's love!\nBless\u00e8d to be there for ever\nIn His perfect rest above!","th":["The Father","God's Love for Us","Rest & Peace","Heaven & The Father's House"]},{"n":6,"t":"Bless\u00e8d, glorious word, \"for ever\"!\nYea, \"for ever\" is the word;\nNothing can the ransomed sever,\nNought divide them from the Lord.","th":["Assurance & Security","Redemption"]}],"w":{"Christ Risen & Glorified":17,"Forgiveness of Sins":33,"The Person of Christ":17,"The Precious Blood / Atonement":17,"Assurance & Security":50,"Heaven & The Father's House":50,"The Cross & Sufferings of Christ":17,"The Father":33,"God's Love for Us":17,"Rest & Peace":17,"Redemption":17}},
"36":{"m":"8.5.","a":"P. Ellis (1879-1963)","tn":"Hold the Fort","tc":"Philip Paul Bliss (1838-1876)","fl":"SAVIOUR, unto Thee assembling,","v":[{"n":1,"t":"SAVIOUR, unto Thee assembling,\nTurn we now to praise,\nThankful hearts, Thy name adoring,\nSweetest song can raise.\nThou hast loved us, Thou hast bought us,\nThou hast made us free,\nHearts and voices blended, singing\n\"Glory unto Thee.\"","th":["Worship & Praise","Fellowship & Gathering","God's Love for Us","Redemption"]},{"n":2,"t":"Thine the cost and Thine the suffering\nThine the cross and shame;\nOurs the never-ending blessing\nThrough Thy precious name;\nThine it is, Lord, now the travail\nOf Thy soul to see,\nThus o'erflowing with Thy praises\nSing we now to Thee.","th":["The Cross & Sufferings of Christ","Worship & Praise"]}],"w":{"Worship & Praise":100,"Fellowship & Gathering":50,"God's Love for Us":50,"Redemption":50,"The Cross & Sufferings of Christ":50}},
"37":{"m":"6.6.6.6.8.8.","a":"Thomas Kelly (1769-1854)","tn":"Alban's","tc":"W. H. Havergal (1793-1870)","fl":"THE atoning work is done,","v":[{"n":1,"t":"THE atoning work is done,\nThe Victim's blood is shed;\nAnd Jesus now is gone\nHis people's cause to plead:\nHe lives in heaven their great High Priest,\nAnd bears their names upon His breast.","th":["The Precious Blood / Atonement","Christ's Intercession / Priesthood","Christ Risen & Glorified"]},{"n":2,"t":"For us His blood was shed:\nFor us He lives above:\nSecured in Him our Head,\nGod's purposes of love.\nGod's righteousness throws wide the door,\nWhence mercy yields her boundless store.","th":["The Precious Blood / Atonement","Grace","Assurance & Security"]},{"n":3,"t":"And though awhile He be\nHid from the eyes of men,\nHis people look to see\nTheir great High Priest again.\nIn brightest glory He will come,\nAnd take His waiting people home.","th":["The Lord's Coming / Rapture","Christ's Intercession / Priesthood","Christ Risen & Glorified"]}],"w":{"The Precious Blood / Atonement":67,"Christ's Intercession / Priesthood":67,"Christ Risen & Glorified":67,"Grace":33,"Assurance & Security":33,"The Lord's Coming / Rapture":33}},
"38":{"m":"10s or 11s.","a":"C. Wesley (1707-1788)","tn":"Lyons","tc":"Franz Joseph Haydn (1732-1809)","fl":"OH, what shall we do the Saviour to praise?","v":[{"n":1,"t":"OH, what shall we do the Saviour to praise?\nSo faithful and true, so plenteous in grace,\nSo strong to deliver, so good to redeem\nThe weakest believer that looks up to Him!","th":["Worship & Praise","Grace","Redemption","The Person of Christ"]},{"n":2,"t":"How happy the man whose heart is set free,\nThe people that can be joyful in Thee!\nTheir joy is to walk in the light of Thy face,\nAnd ever to talk of Thy mercy and grace.","th":["Joy & Thanksgiving","Grace","Rest & Peace"]}],"w":{"Worship & Praise":50,"Grace":100,"Redemption":50,"The Person of Christ":50,"Joy & Thanksgiving":50,"Rest & Peace":50}},
"39":{"m":"8.7.8.7.4.7.","a":"Miss Hannah Kilham Burlingham (1842-1901)","tn":"Regent Square","tc":"H. T. Smart (1813-1879)","fl":"On His Fathers throne is seated","v":[{"n":1,"t":"On His Fathers throne is seated\nChrist the Lord, the living One,\nAll His toil on earth completed,\nAll His work for sinners done:\nIn the glory\nSee Him, God's eternal Son.","th":["Christ Risen & Glorified","The Father","The Person of Christ"]},{"n":2,"t":"Every knee shall bow before Him,\nEvery tongue confess His name;\nRansomed myriads shall adore Him,\nWho endured the sinner's shame:\nFrom the glory\nGod doth now His worth proclaim.","th":["Worship & Praise","The Cross & Sufferings of Christ","Redemption"]},{"n":3,"t":"Man the cross to Him awarded;\nMan the Saviour crucified;\nThis world's judgment stands recorded,\nGod's own justice satisfied!\nBy the glory\nChrist was claimed on earth who died.","th":["The Cross & Sufferings of Christ","Redemption"]},{"n":4,"t":"Son of God, His incarnation\nOpened first the tale of grace;\nSon of Man, in new creation\nLeader of a chosen race!\nWell may glory\nCrown Him, in the ordered place!","th":["Grace","The Person of Christ","New Creation"]}],"w":{"Christ Risen & Glorified":25,"The Father":25,"The Person of Christ":50,"Worship & Praise":25,"The Cross & Sufferings of Christ":50,"Redemption":50,"Grace":25,"New Creation":25}},
"40":{"m":"8.7.","a":"Miss C. A. Wellesley","tn":"Ellesdie","tc":"Anonymous","fl":"O THOU great all-gracious Shepherd,","v":[{"n":1,"t":"O THOU great all-gracious Shepherd,\nShedding for us Thy life's blood,\nUnto shame and death delivered,\nAll to bring us nigh to God!\nNow our willing hearts adore Thee,\nNow we taste Thy dying love,\nWhile by faith we come before Thee -\nFaith which lifts our souls above.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","Worship & Praise","The Person of Christ"]},{"n":2,"t":"As our Surety we behold Thee,\nRansoming our souls from death;\nAs the willing Victim view Thee\nYielding up to God Thy breath.\nIn the broken bread we own Thee,\nBruised for us and put to shame;\nAnd the cup, O Lord, we thank Thee,\nSpeaks of pardon through Thy name.","th":["The Lord's Supper / Remembrance","The Precious Blood / Atonement","Redemption","Forgiveness of Sins"]},{"n":3,"t":"But 'tis past, and, Lord, we hail Thee\nCrowned with glory on the throne;\nMeet it is Thy saints should bless Thee\nFor the place Thy death hath won:\nWon for us - that in full measure\nWe should have our part with Thee -\nTaste the river of Thy pleasure,\nShare in all Thy victory.","th":["Christ Risen & Glorified","Worship & Praise","The Cross & Sufferings of Christ"]}],"w":{"The Cross & Sufferings of Christ":67,"The Precious Blood / Atonement":67,"Worship & Praise":67,"The Person of Christ":33,"The Lord's Supper / Remembrance":33,"Redemption":33,"Forgiveness of Sins":33,"Christ Risen & Glorified":33}},
"41":{"m":"P.M.","a":"Robert Lowry (1826-1899)","tn":"Christ Arose","tc":"Robert Lowry (1826-1899)","fl":"LOW in the grave He lay -","v":[{"n":1,"t":"LOW in the grave He lay -\nJesus, my Saviour!\nWaiting the coming day -\nJesus, my Lord!\nUp from the grave He arose,\nWith a mighty triumph o'er His foes;\nHe arose a Victor from the dark domain,\nAnd He lives for ever with His saints to reign.\nHe arose! He arose!\nHallelujah! Christ arose!","th":["Christ Risen & Glorified","The Eternal Kingdom / Reign of Christ","Worship & Praise"]},{"n":2,"t":"Vainly they watch His bed -\nJesus, my Saviour!\nVainly they seal the dead -\nJesus, my Lord!","th":["Christ Risen & Glorified"]},{"n":3,"t":"Death cannot keep his prey -\nJesus, my Saviour!\nHe tore the bars away\nJesus, my Lord!","th":["Christ Risen & Glorified"]}],"w":{"Christ Risen & Glorified":100,"The Eternal Kingdom / Reign of Christ":33,"Worship & Praise":33}},
"42":{"m":"C.M.","a":"C. C. Elliott (1866-1949)","tn":"Eagley","tc":"J. J. Walch (1837-1901)","fl":"LORD Jesus Christ, our living Head,","v":[{"n":1,"t":"LORD Jesus Christ, our living Head,\nHow bright Thy glories shine!\nUnique in Thy humanity:\nEternally divine.","th":["The Person of Christ","Christ Risen & Glorified"]},{"n":2,"t":"Thou wast before created things,\nOf all the Author Thou;\nUpholder of the universe,\nTo Thee as God we bow.","th":["The Person of Christ","Worship & Praise"]},{"n":3,"t":"The creature mind, howe'er sublime,\nThine essence cannot know,\nYet we to Thee in majesty,\nWith reverence bend low.","th":["The Person of Christ","Worship & Praise"]},{"n":4,"t":"But in Thy manhood's glorious state\nOur thankful hearts rejoice;\nFor of Thy body, Lord, are we,\nOf love divine the choice.","th":["The Church / Bride of Christ","Joy & Thanksgiving"]},{"n":5,"t":"Great source of wisdom, power and food,\nAll riches from Thee flow;\nThou on Thy church, Thy fulness here,\nAll treasure dost bestow.","th":["The Church / Bride of Christ","The Person of Christ"]},{"n":6,"t":"So unto Thee, our glorious Head,\nLove's tribute now we bring,\nIn nearness here to Thee on high\nIn heavenly measures sing.","th":["Worship & Praise","Our Love for The Son/Christ"]}],"w":{"The Person of Christ":67,"Christ Risen & Glorified":17,"Worship & Praise":50,"The Church / Bride of Christ":33,"Joy & Thanksgiving":17,"Our Love for The Son/Christ":17}},
"43":{"m":"S.M.","a":"I Watts (1674-1748)","tn":"Moreland","tc":"Anonymous","fl":"NOT all the blood of beasts","v":[{"n":1,"t":"NOT all the blood of beasts\nOn Jewish altars slain\nCould give the guilty conscience peace,\nOr wash away its stain.","th":["The Precious Blood / Atonement"]},{"n":2,"t":"But Christ, the heavenly Lamb,\nTook all our guilt away,\nA sacrifice of nobler name\nAnd richer blood than they.","th":["The Lamb of God","Forgiveness of Sins","The Precious Blood / Atonement"]},{"n":3,"t":"Our souls look back to see\nThe burden Thou didst bear,\nWhen hanging on the accursed tree,\nFor all our guilt was there.","th":["The Cross & Sufferings of Christ","Forgiveness of Sins"]},{"n":4,"t":"Believing, we rejoice\nTo see the curse remove,\nAnd bless the Lamb with cheerful voice,\nAnd sing redeeming love.","th":["Redemption","Worship & Praise","The Lamb of God"]}],"w":{"The Precious Blood / Atonement":50,"The Lamb of God":50,"Forgiveness of Sins":50,"The Cross & Sufferings of Christ":25,"Redemption":25,"Worship & Praise":25}},
"44":{"m":"7.7.8.7.","a":"Henry Ware (1794-1843)","tn":"Cyprus","tc":"Anonymous","fl":"MAKER of earth and heaven,","v":[{"n":1,"t":"MAKER of earth and heaven,\nWhose arm upholds creation,\nTo Thee we raise the voice of praise,\nAnd bend in adoration.\nWe praise the power that made us;\nWe praise the love that blesses;\nWhile every day that rolls away,\nThy gracious care confesses.","th":["Worship & Praise","God's Love for Us","Grace"]},{"n":2,"t":"Though trials and affliction\nMay cast their shadows o'er us,\nThy love doth throw a heavenly glow\nOf light on all before us;\nThat love has smiled from heaven,\nTo cheer our path of sadness,\nAnd lead the way through earth's dark day\nTo realms of joy and gladness.","th":["Trial & Conflict","God's Love for Us","Heaven & The Father's House"]},{"n":3,"t":"The light of love and glory\nHas shone through Christ our Saviour,\nThe Crucified - who lived and died,\nThat we might live for ever.\nAnd since Thy great compassion\nThus brings Thy children near Thee,\nMay we to praise devote our days,\nAnd keep for ever near Thee.","th":["The Cross & Sufferings of Christ","Redemption","Worship & Praise"]}],"w":{"Worship & Praise":67,"God's Love for Us":67,"Grace":33,"Trial & Conflict":33,"Heaven & The Father's House":33,"The Cross & Sufferings of Christ":33,"Redemption":33}},
"45":{"m":"L.M.","a":"Count Nicolaus Ludwig von Zinzendorf (1700-1760)","tn":"Walton","tc":"Ludwig Van Beethoven (1770-1827)","fl":"JESUS, the Lord, our righteousness!","v":[{"n":1,"t":"JESUS, the Lord, our righteousness!\nOur beauty Thou, our glorious dress!\nMidst flaming worlds in this arrayed,\nWith joy shall we lift up the head.","th":["The Person of Christ","Joy & Thanksgiving","Assurance & Security"]},{"n":2,"t":"Bold shall we stand in that great day,\nFor who ought to our charge shall lay,\nWhile by Thy blood absolved we are\nFrom sin and guilt, from shame and fear?","th":["Assurance & Security","The Precious Blood / Atonement","Forgiveness of Sins"]},{"n":3,"t":"Thus Abraham, the friend of God,\nThus all the saints redeemed with blood,\nSaviour of sinners, Thee proclaim,\nAnd all their boast is in Thy name.","th":["Redemption","The Precious Blood / Atonement"]},{"n":4,"t":"This spotless robe the same appears\nIn new creation's endless years;\nNo age can change its glorious hue;\nThe robe of Christ is ever new.","th":["New Creation","Assurance & Security"]},{"n":5,"t":"Till we behold Thee on Thy throne,\nIn Thee we boast, in Thee alone,\nOur beauty this, our glorious dress,\nJesus the Lord,our righteousness.","th":["Worship & Praise","The Person of Christ","Assurance & Security"]}],"w":{"The Person of Christ":40,"Joy & Thanksgiving":20,"Assurance & Security":80,"The Precious Blood / Atonement":40,"Forgiveness of Sins":20,"Redemption":20,"New Creation":20,"Worship & Praise":20}},
"46":{"m":"8.7.","a":"Malcolm W. Biggs (1875-1941)","tn":"Cross of Jesus","tc":"J. Stainer (1840-1901)","fl":"LORD, we treasure with affection,","v":[{"n":1,"t":"LORD, we treasure with affection,\nAll Thy path of sorrow here,\nAnd those closing scenes of anguish\nTo our hearts Thyself endear.","th":["The Cross & Sufferings of Christ","Our Love for The Son/Christ"]},{"n":2,"t":"Deep Thy sorrow then, Lord Jesus,\nDeeper far than thought can reach,\nGrief intense and sufferings holy,\nFar beyond all tongues to teach.","th":["The Cross & Sufferings of Christ"]},{"n":3,"t":"None could follow there, blest Saviour,\nWhen Thou didst for sins atone;\nFor those sufferings, deep, unfathomed,\nWere, Lord Jesus, Thine alone.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement"]},{"n":4,"t":"Thou didst measure then sin's distance;\nDarkness, wrath and curse were Tine;\nMan-betrayed, by God forsaken;\nThus we learn Thy love divine.","th":["God's Love for Us","The Cross & Sufferings of Christ"]}],"w":{"The Cross & Sufferings of Christ":100,"Our Love for The Son/Christ":25,"The Precious Blood / Atonement":25,"God's Love for Us":25}},
"47":{"m":"S.M.","a":"Philip Doddridge (1702-1751)","tn":"Fairhead","tc":"Anonymous","fl":"GRACE taught our wandering feet","v":[{"n":1,"t":"GRACE taught our wandering feet\nTo tread the heavenly road;\nAnd new supplies each hour we meet\nWhile travelling home to God.","th":["Grace","Pilgrimage / Desert Journey"]},{"n":2,"t":"'Twas grace that wrote each name\nIn life's eternal book;\n'Twas grace that gave the spotless Lamb\nWho all our sorrows took.","th":["Grace","The Lamb of God"]},{"n":3,"t":"Grace saved us from the foe,\nGrace taught us how to pray;\nAnd God will ne'er His grace forgo,\nTill we have won the day.","th":["Grace","Assurance & Security"]},{"n":4,"t":"May grace, free grace, inspire\nOur souls with strength divine;\nMay every thought to God aspire,\nAnd grace in service shine.","th":["Grace","Service & Devotion"]},{"n":5,"t":"Grace all the work shall crown\nThrough everlasting days;\nIt lays in heaven the topmost stone,\nAnd well deserves the praise.","th":["Grace","Heaven & The Father's House","Worship & Praise"]}],"w":{"Grace":100,"Pilgrimage / Desert Journey":20,"The Lamb of God":20,"Assurance & Security":20,"Service & Devotion":20,"Heaven & The Father's House":20,"Worship & Praise":20}},
"48":{"m":"C.M.","a":"James George Deck (1802-1884)","tn":"Home","tc":"G. A. Wellesley (1735-1781)","fl":"HIGH in the Father's house above,","v":[{"n":1,"t":"HIGH in the Father's house above,\nOur mansion is prepared;\nThere is the home, the rest we love,\nAnd there our bright reward.","th":["Heaven & The Father's House","Rest & Peace"]},{"n":2,"t":"With Him we love, in spotless white,\nIn glory we shall shine;\nHis blissful presence our delight\nIn love and joy divine.","th":["Heaven & The Father's House","Joy & Thanksgiving","God's Love for Us"]},{"n":3,"t":"All taint of sin shall be removed,\nAll evil done away;\nAnd we shall dwell with God's Beloved,\nThrough God's eternal day.","th":["Heaven & The Father's House","Redemption"]}],"w":{"Heaven & The Father's House":100,"Rest & Peace":33,"Joy & Thanksgiving":33,"God's Love for Us":33,"Redemption":33}},
"49":{"m":"7s.","a":"William Cowper (1731-1800)","tn":"St. Bees","tc":"J. B. Dykes (1823-1876)","fl":"CHRIST delivered us when bound,","v":[{"n":1,"t":"CHRIST delivered us when bound,\nAnd, when wounded, healed our wound,\nSought us wandering, set us right,\nTurned our darkness into light.","th":["God's Love for Us","Redemption"]},{"n":2,"t":"Can a mother's tender care\nCease towards the child she bare?\nYes, she may forgetful prove;\nHe will never cease to love.","th":["God's Love for Us"]},{"n":3,"t":"His is an unchanging love,\nHigher than the heights above,\nDeeper than the depths beneath,\nFree and faithful, strong as death.","th":["God's Love for Us","Assurance & Security"]},{"n":4,"t":"We shall see His glory soon,\nWhen the work of grace is done,\nPartners of His throne above;\nSuch to us His wondrous love!","th":["Heaven & The Father's House","Grace","God's Love for Us"]},{"n":5,"t":"This alone is our complaint,\nThat our love is weak and faint;\nYet we love Him, and adore,\nO for grace to love Him more!","th":["Our Love for The Son/Christ"]}],"w":{"God's Love for Us":80,"Redemption":20,"Assurance & Security":20,"Heaven & The Father's House":20,"Grace":20,"Our Love for The Son/Christ":20}},
"50":{"m":"10s.","a":"Miss N. Vergette","tn":"Morecambe","tc":"F. C. Atkinson (1841-1897)","fl":"OUR God and Father, we draw near to Thee","v":[{"n":1,"t":"OUR God and Father, we draw near to Thee\nIn all the worth of Thy belov\u00e8d Son;\nThou hast e'er desired from man we see\nIn Him, Thy Christ, Thine own anointed One.","th":["The Father","The Person of Christ","Worship & Praise"]},{"n":2,"t":"No thought of His e'er moved apart from Thine;\nEach holy footstep gave Thee fresh delight;\nPerfect expression of Thy will divine\nThou hadst in Him - come forth from glory bright.","th":["The Person of Christ","The Father"]},{"n":3,"t":"Thou ever lovedst Him - ere time began\nHe was beside Thee, object of Thy heart;\nOne with Thyself in Thine eternal plan,\nIn Godhead glory one in all Thou art.","th":["The Father","The Person of Christ"]},{"n":4,"t":"And now Thou lov'st Him, for Himself He gave -\nTheme of our song when time shall cease to be;\nLaid down His life that Thou, O God, shouldst have\nFruit of Thy love in sons who worship Thee.","th":["God's Love for Us","The Cross & Sufferings of Christ","Sonship & Adoption","Worship & Praise"]}],"w":{"The Father":75,"The Person of Christ":75,"Worship & Praise":50,"God's Love for Us":25,"The Cross & Sufferings of Christ":25,"Sonship & Adoption":25}},
"51":{"m":"8.7.","a":"Anonymous","tn":"Whither Pilgrim","tc":"W. B. Bradbury (1816-1868)","fl":"ABBA, Father, we adore Thee","v":[{"n":1,"t":"ABBA, Father, we adore Thee\nAs Thy saints before Thy throne;\nSweet it is to praise and bless Thee\nFor Thy love in Christ made known.\nIn the emblem of His body\nWe behold the wondrous price,\nWhich was given for our ransom:\nNought could else for sin suffice.","th":["The Father","Worship & Praise","The Lord's Supper / Remembrance","The Precious Blood / Atonement","Sonship & Adoption"]},{"n":2,"t":"Of our guilt His cross the measure,\nThere our sins' desert we learn;\nIn the cup of blessing given us\nWe Thy love, O God, discern,\nThrough His blood to us vouchsafing\nBoldness to draw near the throne;\nHow complete our needed cleansing\nThine unsullied light makes known.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","God's Love for Us","Forgiveness of Sins"]}],"w":{"The Father":50,"Worship & Praise":50,"The Lord's Supper / Remembrance":50,"The Precious Blood / Atonement":100,"Sonship & Adoption":50,"The Cross & Sufferings of Christ":50,"God's Love for Us":50,"Forgiveness of Sins":50}},
"52":{"m":"L.M.D.","a":"James George Deck (1802-1884)","tn":"Saved By Grace","tc":"G. C. Stebbins (1846-1945)","fl":"LORD we are Thine, bought by Thy blood,","v":[{"n":1,"t":"LORD we are Thine, bought by Thy blood,\nOnce the poor guilty slaves of sin;\nBut Thou redeemedst us to God,\nAnd mad'st Thy Spirit dwell within;\nThou hast our sinful wanderings borne\nWith love and patience all divine;\nAs brands, then, from the burning torn,\nWe own that we are wholly Thine.","th":["Redemption","The Precious Blood / Atonement","The Holy Spirit","Assurance & Security"]},{"n":2,"t":"Lord, we are Thine: Thy claims we own,\nOurselves to Thee we'd wholly give.\nReign Thou within our hearts alone,\nAnd let us to Thy glory live;\nHere let us each Thy mind display,\nIn all Thy gracious image shine;\nAnd haste that long-expected day\nWhen Thou shalt own that we are Thine.","th":["Service & Devotion","The Lord's Coming / Rapture","Our Love for The Son/Christ"]}],"w":{"Redemption":50,"The Precious Blood / Atonement":50,"The Holy Spirit":50,"Assurance & Security":50,"Service & Devotion":50,"The Lord's Coming / Rapture":50,"Our Love for The Son/Christ":50}},
"53":{"m":"C.M.","a":"Thomas Henry Reynolds (1830-1930)","tn":"French","tc":"Anonymous","fl":"BLEST God and Father, in Thy sight","v":[{"n":1,"t":"BLEST God and Father, in Thy sight\nWe bow and own Thy grace;\nWe worship in Thy glorious light,\nWhich shines in Jesus' face.","th":["The Father","Worship & Praise","Grace","The Person of Christ"]},{"n":2,"t":"The glories of His work we bring -\nThee glorified we see;\nHis deep perfections gladly sing,\nAnd tell them forth to Thee.","th":["The Person of Christ","Worship & Praise"]},{"n":3,"t":"He fills Thy presence, fully known\nTo Thee alone His worth;\nBut in our hearts Thy light hath shone,\nAs sons of heavenly birth.","th":["The Person of Christ","Sonship & Adoption"]},{"n":4,"t":"Lord Jesus Christ, we praise Thy name\nIn God the Father's ear;\nAnd worship Thee, Thou holy Lamb,\nWhose blood has brought us near.","th":["Worship & Praise","The Lamb of God","The Precious Blood / Atonement","The Father"]}],"w":{"The Father":50,"Worship & Praise":75,"Grace":25,"The Person of Christ":75,"Sonship & Adoption":25,"The Lamb of God":25,"The Precious Blood / Atonement":25}},
