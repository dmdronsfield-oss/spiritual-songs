"168":{"m":"10s. or 11s.","a":"Thomas Kelly (1769-1854)","tn":"Hanover","tc":"W. Croft (1678-1727)","fl":"THE night is far spent, and the day is at hand:","v":[{"n":1,"t":"THE night is far spent, and the day is at hand:\nNo sign to be looked for; the Star's in the sky;\nRejoice then, ye saints, 'tis your Lord's own command;\nRejoice, for the coming of Jesus draws nigh.","th":["The Lord's Coming / Rapture","Joy & Thanksgiving"]},{"n":2,"t":"What a day will that be, when the Saviour appears!\nHow welcome to those who have shared in His cross!\nA crown incorruptible then will be theirs,\nA rich compensation for suffering and loss.","th":["The Lord's Coming / Rapture","The Cross & Sufferings of Christ","Christ Risen & Glorified"]},{"n":3,"t":"What is loss in this world, when compared to that day,\nTo the glory that then will from heaven be revealed?\n\"The Saviour is coming,\" His people may say;\n\"The Lord whom we look for, our Sun and our Shield.\"","th":["The Lord's Coming / Rapture","Assurance & Security"]},{"n":4,"t":"O pardon us, Lord! that our love to Thy name\nIs so faint, with so much our affections to move;\nOur coldness might fill us with grief and with shame,\nSo much to be loved, and so little to love.","th":["Service & Devotion","Our Love for The Son/Christ"]},{"n":5,"t":"O kindle within us a holy desire,\nLike that which was found in Thy people of old,\nWho tasted Thy love, and whose hearts were on fire,\nWhile they waited, in patience, Thy face to behold.","th":["The Lord's Coming / Rapture","Our Love for The Son/Christ"]}],"w":{"The Lord's Coming / Rapture":80,"Joy & Thanksgiving":20,"The Cross & Sufferings of Christ":20,"Christ Risen & Glorified":20,"Assurance & Security":20,"Service & Devotion":20,"Our Love for The Son/Christ":40}},
"169":{"m":"8.8.11.8.","a":"John Nelson Darby (1800-1882)","tn":"There is Rest","tc":"C. T. Lambert","fl":"THERE is rest for the weary soul -","v":[{"n":1,"t":"THERE is rest for the weary soul -\nThere is rest in the Saviour's love;\nThere is rest in the grace that has made us whole,\nAnd that seeketh out those who rove.","th":["Rest & Peace","God's Love for Us","Grace"]},{"n":2,"t":"There is rest in the tender love\nThat has trodden our path below,\nThat has found us a place in the realms above,\nBut can now all our sorrows know.","th":["God's Love for Us","Rest & Peace","Heaven & The Father's House"]},{"n":3,"t":"There is rest in the calming grace\nThat flows out from those realms above;\nOh what rest in the thought - we shall see His face,\nWho has given us to know His love!","th":["Grace","Rest & Peace","God's Love for Us","The Lord's Coming / Rapture"]},{"n":4,"t":"There is rest in the midst of grief -\nFor His grief was the proof of love;\nOh 'tis sweet in that love now to find relief,\nWhen the sorrows of earth we prove.","th":["Rest & Peace","God's Love for Us","Trial & Conflict"]},{"n":5,"t":"There is rest in the Saviour's heart,\nWho would never turn grief away:\nBut has found, in what sin once had made our part,\nThe domain of His love's display.","th":["Rest & Peace","God's Love for Us"]},{"n":6,"t":"There is rest in the bless\u00e8d yoke,\nAnd in proving no will but His,\nWhile we learn from His path, and the words He spoke,\nWhat the patience of Jesus is!","th":["Rest & Peace","The Person of Christ","Service & Devotion"]},{"n":7,"t":"So where Jesus has gone before,\nIs the path which we have to tread;\nAnd it leads to the rest where all sorrow's o'er -\nTo the place where His steps have led.","th":["Pilgrimage / Desert Journey","Rest & Peace","Heaven & The Father's House"]}],"w":{"Rest & Peace":100,"God's Love for Us":71,"Grace":29,"Heaven & The Father's House":29,"The Lord's Coming / Rapture":14,"Trial & Conflict":14,"The Person of Christ":14,"Service & Devotion":14,"Pilgrimage / Desert Journey":14}},
"170":{"m":"8.7.8.7.4.7.","a":"C. Wesley (1707-1788)","tn":"Regent Square","tc":"H. T. Smart (1813-1879)","fl":"Lo, He comes from heaven descending,","v":[{"n":1,"t":"Lo, He comes from heaven descending,\nOnce for favoured sinners slain;\nThousand thousand saints attending\nSwell the triumph of His train:\nHallelujah!\nJesus comes, and comes to reign!","th":["The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ","The Cross & Sufferings of Christ"]},{"n":2,"t":"See the Saviour, long expected,\nNow in solemn pomp appear;\nAnd His saints, by man rejected,\nAll His heavenly glory share;\nHallelujah!\nSee the Son of Man appear!","th":["The Lord's Coming / Rapture","Christ Risen & Glorified","The Cross & Sufferings of Christ"]},{"n":3,"t":"Lo, the tokens of His passion,\nThough in glory, still He bears,\nCause of endless exultation\nTo His ransomed worshippers;\nHallelujah!\nChrist, the Lamb of God appears.","th":["The Cross & Sufferings of Christ","The Lamb of God","Worship & Praise","Christ Risen & Glorified"]},{"n":4,"t":"'Tis Thy heavenly bride and Spirit,\nJesus, Lord, that bids Thee come\nAll the glory to inherit\nAnd to take Thy people home:\nAll creation\nGroans and travails till Thou come.","th":["The Church / Bride of Christ","The Holy Spirit","The Lord's Coming / Rapture"]},{"n":5,"t":"Israel's race shall now behold Thee\nFull of grace and majesty;\nThough they set at nought and sold Thee,\nPierced and nailed Thee to the tree,\nThey in glory\nShall their great Messiah see.","th":["The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ"]},{"n":6,"t":"Yea, Amen, let all adore Thee\nHigh on Thine exalted throne:\nSaviour, take the power and glory,\nClaim the kingdoms for Thine own:\nCome, Lord Jesus,\nHallelujah, come, Lord, come.","th":["Worship & Praise","The Eternal Kingdom / Reign of Christ","The Lord's Coming / Rapture"]}],"w":{"The Lord's Coming / Rapture":83,"The Eternal Kingdom / Reign of Christ":50,"The Cross & Sufferings of Christ":50,"Christ Risen & Glorified":33,"The Lamb of God":17,"Worship & Praise":33,"The Church / Bride of Christ":17,"The Holy Spirit":17}},
"171":{"m":"7.6.7.6.","a":"G. A. Lucas","tn":"Heidelberg","tc":"M. Vulpius, c. 1560-1615","fl":"THY suffering love, Lord Jesus,","v":[{"n":1,"t":"THY suffering love, Lord Jesus,\nOur hearts delight to trace;\nThe love that sought and claimed us,\nIn strong yet tender grace.","th":["God's Love for Us","Grace","The Cross & Sufferings of Christ"]},{"n":2,"t":"We think of Thy devotion,\nThy blest obedience rare;\nThy holy, deep emotion,\nThy grief that none could share.","th":["The Person of Christ","The Cross & Sufferings of Christ","Our Love for The Son/Christ"]},{"n":3,"t":"Thus to our hearts Thou speakest;\nBlest Lord, we hear Thy voice;\nWe know its charm, its sweetness;\nAnd in Thy love rejoice.","th":["God's Love for Us","Joy & Thanksgiving"]},{"n":4,"t":"We wait the consummation\nOf love's own work divine,\nAnd now in adoration\nWe joy that we are Thine.","th":["Worship & Praise","Our Love for The Son/Christ"]}],"w":{"God's Love for Us":50,"Grace":25,"The Cross & Sufferings of Christ":50,"The Person of Christ":25,"Our Love for The Son/Christ":50,"Joy & Thanksgiving":25,"Worship & Praise":25}},
"172":{"m":"C.M.","a":"J. Hutton","tn":"Ignatius","tc":"J. H. Lester, c. 1850","fl":"O TEACH us more of Thy blest ways,","v":[{"n":1,"t":"O TEACH us more of Thy blest ways,\nThou Holy Lamb of God,\nAnd fix and root us in Thy grace,\nAs those redeemed by blood.","th":["The Lamb of God","Grace","The Precious Blood / Atonement"]},{"n":2,"t":"O tell us often of Thy love,\nOf all Thy grief and pain;\nAnd let our hearts with joy confess\nThat thence comes all our gain.","th":["God's Love for Us","The Cross & Sufferings of Christ","Joy & Thanksgiving"]},{"n":3,"t":"For this, O may we freely count\nWhate'er we have but loss;\nThe dearest object of our love,\nCompared with Thee, but dross.","th":["Separation from the World","Our Love for The Son/Christ"]},{"n":4,"t":"Engrave this deeply on our hearts\nWith an eternal pen,\nThat we may, in some small degree,\nReturn Thy love again.","th":["God's Love for Us","Our Love for The Son/Christ"]}],"w":{"The Lamb of God":25,"Grace":25,"The Precious Blood / Atonement":25,"God's Love for Us":50,"The Cross & Sufferings of Christ":25,"Joy & Thanksgiving":25,"Separation from the World":25,"Our Love for The Son/Christ":50}},
"173":{"m":"6-8s.","a":"James George Deck (1802-1884)","tn":"Stella","tc":"Anonymous","fl":"\"A LITTLE while\" - the Lord shall come,","v":[{"n":1,"t":"\"A LITTLE while\" - the Lord shall come,\nAnd we shall wander here no more;\nHe'll take us to His Father's home,\nWhere He for us is gone before,\nTo dwell with Him, to see His face,\nAnd sing the glories of His grace.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","Grace"]},{"n":2,"t":"\"A little while\" - He'll come again;\nLet us the precious hours redeem,\nOur only grief to give Him pain,\nOur joy to serve and follow Him.\nWatching and ready may we be,\nAs those that wait their Lord to see.","th":["The Lord's Coming / Rapture","Service & Devotion"]},{"n":3,"t":"\"A little while\" - 'twill soon be past,\nWhy should we shun the promised cross?\nO let us in His footsteps haste,\nCounting for Him all else but loss;\nFor how will recompense His smile,\nThe sufferings of this \"little while\"!","th":["The Cross & Sufferings of Christ","Pilgrimage / Desert Journey","Trial & Conflict"]},{"n":4,"t":"\"A little while\" - come, Saviour, come;\nFor Thee Thy bride has tarried long:\nTake Thy poor waiting pilgrims home\nTo sing the new eternal song,\nTo see Thy glory, and to be\nIn everything conformed to Thee!","th":["The Lord's Coming / Rapture","The Church / Bride of Christ","Heaven & The Father's House","Pilgrimage / Desert Journey"]}],"w":{"The Lord's Coming / Rapture":75,"Heaven & The Father's House":50,"Grace":25,"Service & Devotion":25,"The Cross & Sufferings of Christ":25,"Pilgrimage / Desert Journey":50,"Trial & Conflict":25,"The Church / Bride of Christ":25}},
"174":{"m":"S.M.","a":"Christian Andreas Bernstein (1672-1699)","tn":"Spotless One","tc":"Anonymous","fl":"O PATIENT, spotless One!","v":[{"n":1,"t":"O PATIENT, spotless One!\nOur hearts in meekness train,\nTo bear Thy yoke, and learn of Thee,\nThat we may rest obtain.","th":["The Person of Christ","Rest & Peace","Service & Devotion"]},{"n":2,"t":"Jesus, Thou art enough\nThe mind and heart to fill;\nThy patient life - to calm the soul;\nThy love - its fear dispel.","th":["The Person of Christ","Rest & Peace","God's Love for Us"]},{"n":3,"t":"O fix our earnest gaze\nSo wholly, Lord, on Thee,\nThat, with Thy beauty occupied,\nWe elsewhere none may see.","th":["The Person of Christ","Our Love for The Son/Christ"]}],"w":{"The Person of Christ":100,"Rest & Peace":67,"Service & Devotion":33,"God's Love for Us":33,"Our Love for The Son/Christ":33}},
"175":{"m":"L.M.","a":"Thomas Kelly (1769-1854)","tn":"Federal Street","tc":"H. K. Oliver (1800-1885)","fl":"WE sing the praise of Him who died,","v":[{"n":1,"t":"WE sing the praise of Him who died,\nOf Him who died upon the cross,\nThe sinner's Hope - let men deride;\nFor this we count the world but loss.","th":["The Cross & Sufferings of Christ","Worship & Praise","Separation from the World"]},{"n":2,"t":"Inscribed upon the cross we see,\nIn shining letters, God is Love,\nThe Lamb who died upon the tree,\nHas brought us mercy from above.","th":["The Cross & Sufferings of Christ","God's Love for Us","The Lamb of God","Grace"]},{"n":3,"t":"The Cross - it took our guilt away,\nIt holds the fainting spirit up;\nIt cheers with hope the gloomy day,\nAnd sweetens every bitter cup.","th":["The Cross & Sufferings of Christ","Forgiveness of Sins","Assurance & Security"]},{"n":4,"t":"It makes the coward spirit brave,\nAnd nerves the feeble arm for fight;\nIt takes its terror from the grave,\nAnd gilds the bed of death with light.","th":["The Cross & Sufferings of Christ","Trial & Conflict","Assurance & Security"]},{"n":5,"t":"The balm of life, the cure of woe,\nThe measure and the pledge of love,\nThe sinner's refuge here below,\nThe theme of praise in heaven above!","th":["The Cross & Sufferings of Christ","God's Love for Us","Worship & Praise","Heaven & The Father's House"]}],"w":{"The Cross & Sufferings of Christ":100,"Worship & Praise":40,"Separation from the World":20,"God's Love for Us":40,"The Lamb of God":20,"Grace":20,"Forgiveness of Sins":20,"Assurance & Security":40,"Trial & Conflict":20,"Heaven & The Father's House":20}},
"176":{"m":"C.M.","a":"Anonymous","tn":"Jackson's","tc":"T. Jackson (1715-1781)","fl":"Lord, we shall see Thee as Thou art,","v":[{"n":1,"t":"Lord, we shall see Thee as Thou art,\nIn all Thy glory there,\nWe shall behold Thee face to face,\nThy glorious image bear.","th":["The Lord's Coming / Rapture","Christ Risen & Glorified","Heaven & The Father's House"]},{"n":2,"t":"With what delight, what wondering love,\nEach thrilling heart shall swell,\nWhen we, as sharers of Thy joy,\nAre called with Thee to dwell!","th":["Joy & Thanksgiving","Heaven & The Father's House","God's Love for Us"]},{"n":3,"t":"For ever our still wondering eyes\nShall o'er His beauties rove;\nTo endless ages we'll adore\nThe riches of His love!","th":["Worship & Praise","God's Love for Us","Heaven & The Father's House"]},{"n":4,"t":"O hasten, hasten on that hour,\nAnd call us to Thy seat:\nFor Thou without us ne'er wilt count\nThy work, Thy joy complete.","th":["The Lord's Coming / Rapture","Our Love for The Son/Christ"]}],"w":{"The Lord's Coming / Rapture":50,"Christ Risen & Glorified":25,"Heaven & The Father's House":75,"Joy & Thanksgiving":25,"God's Love for Us":50,"Worship & Praise":25,"Our Love for The Son/Christ":25}},
"177":{"m":"S.M.","a":"Augustus Montague Toplady (1740-1778)","tn":"Russian","tc":"H. E. Gebhardt (1832-1899)","fl":"Though in a foreign land,","v":[{"n":1,"t":"Though in a foreign land,\nWe are not far from home;\nAnd nearer to our rest above,\nWe every moment come.","th":["Pilgrimage / Desert Journey","Heaven & The Father's House"]},{"n":2,"t":"Secure within the veil,\nChrist is our anchor strong;\nWhile power supreme and love divine\nStill guide us safe along.","th":["Assurance & Security","Christ's Intercession / Priesthood","God's Love for Us"]},{"n":3,"t":"And should the surges rise,\nShould sore afflictions come,\nBlest is the sorrow, kind the storm,\nThat drives us nearer home.","th":["Trial & Conflict","Heaven & The Father's House"]},{"n":4,"t":"God's grace will to the end\nClearer and brighter shine;\nNor present things, nor things to come,\nCan change His love divine.","th":["Grace","God's Love for Us","Assurance & Security"]},{"n":5,"t":"Soon shall our pains and fears\nFor ever pass away;\nFor we shall soon the Saviour see\nIn everlasting day.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","Rest & Peace"]}],"w":{"Pilgrimage / Desert Journey":20,"Heaven & The Father's House":60,"Assurance & Security":40,"Christ's Intercession / Priesthood":20,"God's Love for Us":40,"Trial & Conflict":20,"Grace":20,"The Lord's Coming / Rapture":20,"Rest & Peace":20}},
"178":{"m":"7.6.","a":"Lord Adalbert Percy Cecil (1841-1889)","tn":"Deutschland","tc":"W. Brockhaus (1819-1888)","fl":"Our great High Priest is sitting","v":[{"n":1,"t":"Our great High Priest is sitting\nAt God's right hand above,\nFor us His hands uplifting,\nIn sympathy and love;\nWhilst here below, in weakness,\nWe onward speed our way;\nIn sorrow oft and sickness,\nWe sigh and groan and pray.","th":["Christ's Intercession / Priesthood","Christ Risen & Glorified","God's Love for Us"]},{"n":2,"t":"Through manifold temptation,\nMy soul holds on her course,\nChrist's mighty intercession\nAlone is her resource;\nMy gracious High Priest's pleadings,\nWho on the cross did bleed,\nBring down God's grace and blessings,\nHelp in each hour of need.","th":["Christ's Intercession / Priesthood","Trial & Conflict","The Cross & Sufferings of Christ","Grace"]},{"n":3,"t":"O Jesus bless\u00e8d Saviour,\nWe hope to see Thee soon,\nWho once on earth didst suffer,\nWho soon for us wilt come.\n'Twas God's most gracious favour\nGave Thee, His Son, to die;\nTo live our Intercessor;\nTo plead for us on high.","th":["The Lord's Coming / Rapture","Christ's Intercession / Priesthood","God's Love for Us"]}],"w":{"Christ's Intercession / Priesthood":100,"Christ Risen & Glorified":33,"God's Love for Us":67,"Trial & Conflict":33,"The Cross & Sufferings of Christ":33,"Grace":33,"The Lord's Coming / Rapture":33}},
"179":{"m":"8.7.","a":"Robert Robinson (1735-1790)","tn":"Dijon","tc":"J. C. Bitthauer, 1842","fl":"Brightness of the eternal glory","v":[{"n":1,"t":"Brightness of the eternal glory\nShall Thy praise unuttered lie?\nWho would hush the heaven-sent story\nOf the Lamb who came to die?","th":["Christ Risen & Glorified","Worship & Praise","The Lamb of God","The Cross & Sufferings of Christ"]},{"n":2,"t":"Came from Godhead's fullest glory\nDown to Calvary's depth of woe;\nNow on high, we bow before Thee;\nStreams of praises ceaseless flow !","th":["The Cross & Sufferings of Christ","Christ Risen & Glorified","Worship & Praise"]},{"n":3,"t":"Sing His blest triumphant rising;\nSing Him on the Father's throne;\nSing - till heaven and earth surprising,\nReigns the Nazarene alone.","th":["Christ Risen & Glorified","The Eternal Kingdom / Reign of Christ","Worship & Praise"]}],"w":{"Christ Risen & Glorified":100,"Worship & Praise":100,"The Lamb of God":33,"The Cross & Sufferings of Christ":67,"The Eternal Kingdom / Reign of Christ":33}},
"180":{"m":"6.4.6.4.6.6.6.4.","a":"T. R. Taylor","tn":"Oak","tc":"C. F. Witt (1660-1716)","fl":"We are but strangers here;","v":[{"n":1,"t":"We are but strangers here;\nHeaven is our home;\nEarth is a desert drear;\nHeaven is our home.\nDangers and sorrows stand\nRound us on every hand;\nHeaven is our fatherland,\nHeaven is our home.","th":["Pilgrimage / Desert Journey","Heaven & The Father's House","Trial & Conflict"]},{"n":2,"t":"What though the tempest rage,\nHeaven is our home;\nShort is our pilgrimage,\nHeaven is our home:\nThis life's wild wintry blast\nSoon will be overpast;\nWe shall reach home at last;\nHeaven is our home.","th":["Pilgrimage / Desert Journey","Heaven & The Father's House","Trial & Conflict"]},{"n":3,"t":"There at our Saviour's side,\nIn heaven our home,\nWe shall be glorified;\nHeaven is our home.\nThere with the good and blest,\nThose we love most and best,\nWe shall for ever rest,\nIn heaven our home.","th":["Heaven & The Father's House","Rest & Peace","Christ Risen & Glorified"]},{"n":4,"t":"Therefore we'll murmur not,\nHeaven is our home;\nWhate'er our earthly lot,\nHeaven is our home.\nWe shall yet surely stand\nThere at our Lord's right hand;\nHeaven is our fatherland,\nHeaven is our home.","th":["Pilgrimage / Desert Journey","Heaven & The Father's House","Assurance & Security"]}],"w":{"Pilgrimage / Desert Journey":75,"Heaven & The Father's House":100,"Trial & Conflict":50,"Rest & Peace":25,"Christ Risen & Glorified":25,"Assurance & Security":25}},
"181":{"m":"8.7.","a":"E. Williams","tn":"Blaenwern","tc":"W. P. Rowlands (1860-1937)","fl":"Glory, Lord, is Thine for ever,","v":[{"n":1,"t":"Glory, Lord, is Thine for ever,\nEver Thine - Thou art the Son!\nGreat the glory Thou art given,\nGreat the glory Thou hast won;\nGreat the glory and the splendour\nOf the holy heavenly place;\nGreater far the Godhead glory\nShining, Saviour, in Thy face!","th":["Christ Risen & Glorified","The Person of Christ","Worship & Praise"]},{"n":2,"t":"Lord of glory, Thou didst enter\nThis dark world of sin and woe;\nVeiled Thy glory, yet 'twas witnessed\nBy Thine own while here below.\nThou didst die, and now we praise Thee\nIn Thy glory, Lord, above;\nFor in death Thou hast declared\nAll the fulness of God's love.","th":["The Cross & Sufferings of Christ","God's Love for Us","Christ Risen & Glorified","Worship & Praise"]},{"n":3,"t":"Yes, we see Thee crowned with glory,\nHighest honour to Thee given;\nBut the glory of Thy Person\nIs the light that shines in heaven.\nThou art greater, glorious Saviour,\nThan the glory Thou hast won;\nThis the greatness of Thy glory -\nEver blest - Thou art the Son !","th":["The Person of Christ","Christ Risen & Glorified","Heaven & The Father's House"]}],"w":{"Christ Risen & Glorified":100,"The Person of Christ":67,"Worship & Praise":67,"The Cross & Sufferings of Christ":33,"God's Love for Us":33,"Heaven & The Father's House":33}},
"182":{"m":"8.8.6.","a":"T. Porter","tn":"Hull","tc":"S. Chandler, born 1760","fl":"O Lord, how blest - as day by day","v":[{"n":1,"t":"O Lord, how blest - as day by day\nWe pass along our pilgrim way -\nTo know that we are Thine!\nThine - through redemption's precious blood,\nWhich cleansed, which brought us nigh to God\nIn righteousness divine.","th":["Pilgrimage / Desert Journey","Redemption","The Precious Blood / Atonement","Assurance & Security"]},{"n":2,"t":"Thine, ever Thine - to be with Thee -\nFor where Thou art Thine own must be,\nLove will not be alone;\nLove's resting - place together shared\nBy Thee, by those Thou hast declared\nThrough grace to be Thine own.","th":["God's Love for Us","Heaven & The Father's House","Assurance & Security"]},{"n":3,"t":"O Lord, in meek and godly fear,\nTo follow and to serve Thee here,\nDo Thou our hearts incline;\nTo be for Thee where Thou hast been,\nUntil we reach Thee in that scene\nWhere Thou wilt own us Thine.","th":["Service & Devotion","Pilgrimage / Desert Journey","Our Love for The Son/Christ"]},{"n":4,"t":"Lord, may we always own Thy claim,\nAnd overcoming in Thy name\nFrom earthliness be free.\nAnd by the daily manna fed,\nRenewed in strength, the path we'd tread\nWhich leads us up to Thee.","th":["Pilgrimage / Desert Journey","Separation from the World","Service & Devotion"]}],"w":{"Pilgrimage / Desert Journey":75,"Redemption":25,"The Precious Blood / Atonement":25,"Assurance & Security":50,"God's Love for Us":25,"Heaven & The Father's House":25,"Service & Devotion":50,"Our Love for The Son/Christ":25,"Separation from the World":25}},
"183":{"m":"8.7.8.7.4.7.","a":"Thomas Kelly (1769-1854)","tn":"Cwm Rhondda","tc":"J. Hughes (1873-1932)","fl":"Saviour, come, Thy saints are waiting,","v":[{"n":1,"t":"Saviour, come, Thy saints are waiting,\nWaiting for the nuptial day,\nThence their promised glory dating;\nCome and bear Thy saints away.\nCome, Lord Jesus,\nThus Thy waiting people pray.","th":["The Lord's Coming / Rapture","The Church / Bride of Christ","Heaven & The Father's House"]},{"n":2,"t":"Base the wish, and vain the endeavour,\nHere on earth to find our rest;\nTill we see Thy face, we never\nShall or can be fully blest;\nIn Thy presence\nNothing shall our peace molest.","th":["Rest & Peace","The Lord's Coming / Rapture","Our Love for The Son/Christ"]},{"n":3,"t":"Lord, we wait for Thine appearing;\n\"Quickly come\" Thy people say;\nBright the prospect is and cheering,\nOf beholding Thee that day;\nWhen our sorrow\nShall for ever pass away.","th":["The Lord's Coming / Rapture","Joy & Thanksgiving"]},{"n":4,"t":"Till it comes, O keep us steady,\nKeep us walking in Thy ways;\nAt Thy call may we be ready,\nOn Thee, Lord, with joy to gaze;\nAnd in heaven\nSing Thine everlasting praise.","th":["Service & Devotion","The Lord's Coming / Rapture","Worship & Praise"]}],"w":{"The Lord's Coming / Rapture":100,"The Church / Bride of Christ":25,"Heaven & The Father's House":25,"Rest & Peace":25,"Our Love for The Son/Christ":25,"Joy & Thanksgiving":25,"Service & Devotion":25,"Worship & Praise":25}},
"184":{"m":"C.M.","a":"Frederick Whitfield (1829-1904)","tn":"Belmont","tc":"S. Webbe (1740-1816)","fl":"There is a Name we love to hear,","v":[{"n":1,"t":"There is a Name we love to hear,\nWe love to sing its worth;\nIt sounds like music in our ear,\nThe sweetest Name on earth.","th":["The Person of Christ","Our Love for The Son/Christ"]},{"n":2,"t":"It tells us of a Saviour's love,\nWho died to set us free;\nIt tells us of His precious blood,\nThe sinner's perfect plea.","th":["God's Love for Us","The Precious Blood / Atonement","Redemption"]},{"n":3,"t":"Jesus! the Name we love so well,\nThe Name we love to hear!\nNo saint on earth its worth can tell,\nNo heart conceive how dear.","th":["The Person of Christ","Our Love for The Son/Christ"]},{"n":4,"t":"This Name shall shed its fragrance still\nAlong life's thorny road,\nShall sweetly smooth the rugged hill\nThat leads us up to God.","th":["Pilgrimage / Desert Journey","The Person of Christ"]},{"n":5,"t":"And there the whole triumphant throng,\nOf blood-bought saints on high,\nShall sing the new eternal song\nWith Jesus ever nigh.","th":["Heaven & The Father's House","The Precious Blood / Atonement","Worship & Praise"]}],"w":{"The Person of Christ":60,"Our Love for The Son/Christ":40,"God's Love for Us":20,"The Precious Blood / Atonement":40,"Redemption":20,"Pilgrimage / Desert Journey":20,"Heaven & The Father's House":20,"Worship & Praise":20}},
"185":{"m":"S.M.","a":"Henry Bennett (1813-1868)","tn":"Franconia","tc":"W. H. Havergal (1793-1870)","fl":"We have a home above,","v":[{"n":1,"t":"We have a home above,\nFrom sin and sorrow free;\nA mansion which eternal love\nPrepared our rest to be.","th":["Heaven & The Father's House","God's Love for Us"]},{"n":2,"t":"The Father's gracious hand\nHas built this blest abode;\nFrom everlasting it was planned;\nThe dwelling-place of God.","th":["The Father","Heaven & The Father's House"]},{"n":3,"t":"The Saviour's precious blood\nHas made our title sure;\nHe passed through death's dark raging flood\nTo make our rest secure.","th":["The Precious Blood / Atonement","The Cross & Sufferings of Christ","Assurance & Security"]},{"n":4,"t":"The Comforter is come,\nThe Earnest has been given;\nHe leads us onward to the home\nReserved for us in heaven.","th":["The Holy Spirit","Heaven & The Father's House","Pilgrimage / Desert Journey"]},{"n":5,"t":"Thy love, most gracious Lord,\nOur joy and strength shall be,\nTill Thou shalt speak the gladdening word\nThat bids us rise to Thee.","th":["God's Love for Us","The Lord's Coming / Rapture"]},{"n":6,"t":"And then through endless days,\nWhere all Thy glories shine,\nIn happier, holier strains we'll praise\nThe grace that made us Thine.","th":["Heaven & The Father's House","Worship & Praise","Grace"]}],"w":{"Heaven & The Father's House":67,"God's Love for Us":33,"The Father":17,"The Precious Blood / Atonement":17,"The Cross & Sufferings of Christ":17,"Assurance & Security":17,"The Holy Spirit":17,"Pilgrimage / Desert Journey":17,"The Lord's Coming / Rapture":17,"Worship & Praise":17,"Grace":17}},
"186":{"m":"L.M.","a":"Mrs. Hazel Dixon","tn":"Maryton","tc":"H. P. Smith (1825-1898)","fl":"Sower divine, send forth Thy word,","v":[{"n":1,"t":"Sower divine, send forth Thy word,\nHere let each heart the ground prepare;\nFulfil Thy glorious purpose, Lord,\nAnd give Thy people ears to hear.","th":["The Word of God","Service & Devotion"]},{"n":2,"t":"No wayside heart be here today,\nStill barren, hard and unforgiven,\nLest Satan come and snatch away\nThe seed that bears the life of heaven.","th":["The Word of God","Trial & Conflict"]},{"n":3,"t":"Nor, as in dry and stony ground,\nAt once to spring, yet, by and by,\nRootless in trial's heat, be found\nAs swift to wither and to die.","th":["The Word of God","Trial & Conflict"]},{"n":4,"t":"Lord, from this world our hearts set free,\nIts riches, cares and pleasures vain;\nLest growing strong, they prove to be\nLike thorns that choke the precious grain.","th":["Separation from the World","The Word of God"]},{"n":5,"t":"But to Thy wise and gracious ways\nPatient and meek we would be found;\nThy Spirit's streams, Thy love's warm rays,\nMaking that good and fruitful ground.","th":["The Holy Spirit","Grace","The Word of God"]},{"n":6,"t":"Then shall Thy word, the living seed,\nAccomplish that for which it came,\nSpring up a hundredfold indeed,\nA harvest worthy of Thy Name.","th":["The Word of God","Service & Devotion"]}],"w":{"The Word of God":100,"Service & Devotion":33,"Trial & Conflict":33,"Separation from the World":17,"The Holy Spirit":17,"Grace":17}},
"187":{"m":"7.6.","a":"James George Deck (1802-1884)","tn":"Missionary","tc":"L. Mason (1792-1872)","fl":"O Jesus, gracious Saviour,","v":[{"n":1,"t":"O Jesus, gracious Saviour,\nUpon the Father's throne -\nWhose wondrous love and favour\nHave made our cause Thine own;\nThy people to Thee ever\nFor grace and help repair,\nFor Thou, they know, wilt never\nRefuse their griefs to share.","th":["Christ Risen & Glorified","Christ's Intercession / Priesthood","God's Love for Us"]},{"n":2,"t":"O Lord, through tribulation\nOur pilgrim-journey lies,\nThrough scorn and sore temptation,\nAnd watchful enemies;\nMidst never-ceasing dangers\nWe through the desert roam;\nAs pilgrims here and strangers,\nWe seek the rest to come.","th":["Pilgrimage / Desert Journey","Trial & Conflict","Rest & Peace"]},{"n":3,"t":"O Lord, Thou too once hasted\nThis weary desert through,\nOnce fully tried and tasted\nIts bitterness and woe;\nAnd hence Thy heart is tender\nIn truest sympathy,\nThough now the heavens render\nAll praise to Thee on high.","th":["The Person of Christ","Pilgrimage / Desert Journey","Christ's Intercession / Priesthood"]},{"n":4,"t":"O by Thy Holy Spirit\nReveal in us Thy love,\nThe joy we shall inherit\nWith Thee, our Head above;\nMay all this consolation\nOur trembling hearts sustain,\nSure - though through tribulation -\nThe promised rest to gain.","th":["The Holy Spirit","God's Love for Us","Rest & Peace","Trial & Conflict"]}],"w":{"Christ Risen & Glorified":25,"Christ's Intercession / Priesthood":50,"God's Love for Us":50,"Pilgrimage / Desert Journey":50,"Trial & Conflict":50,"Rest & Peace":50,"The Person of Christ":25,"The Holy Spirit":25}},
"188":{"m":"8.7.8.7.8.8.","a":"George West Frazer (1830-1896)","tn":"Arabia","tc":"W. Wilson, 1820","fl":"'Twas on that night of deepest woe,","v":[{"n":1,"t":"'Twas on that night of deepest woe,\nWhen darkness round did thicken,\nWhen through deep waters Thou didst go,\nAnd for our sins wast stricken;\nThou, Lord, didst seek that we should be\nWith grateful hearts remembering Thee.","th":["The Lord's Supper / Remembrance","The Cross & Sufferings of Christ"]},{"n":2,"t":"How deep the sorrow, who can tell,\nWhich was for us endured?\nO love divine, that broke the spell\nWhich had our hearts allured!\nWith heart and conscience now set free,\nIt is our joy to think of Thee.","th":["The Cross & Sufferings of Christ","God's Love for Us","Redemption"]},{"n":3,"t":"O Lord, how precious is Thy thought,\nHow wondrous Thy desire,\nTo win our hearts, once worse than nought,\nWho now by grace aspire\nTo seek Thy glory, bear Thy shame,\nTo keep Thy word, and love Thy name.","th":["Grace","Service & Devotion","Our Love for The Son/Christ"]},{"n":4,"t":"We know Thee now exalted high,\nOurselves in Thee accepted;\nWe wait the hour which now draws nigh,\nThy coming long expected;\nTill Thou dost come we still would be\nWith grateful hearts remembering Thee.","th":["Christ Risen & Glorified","Assurance & Security","The Lord's Coming / Rapture","The Lord's Supper / Remembrance"]}],"w":{"The Lord's Supper / Remembrance":50,"The Cross & Sufferings of Christ":50,"God's Love for Us":25,"Redemption":25,"Grace":25,"Service & Devotion":25,"Our Love for The Son/Christ":25,"Christ Risen & Glorified":25,"Assurance & Security":25,"The Lord's Coming / Rapture":25}},
"189":{"m":"6.6.8.6.8.8.","a":"Miss Hannah Kilham Burlingham (1842-1901)","tn":"Liege","tc":"Anonymous","fl":"O God of matchless grace,","v":[{"n":1,"t":"O God of matchless grace,\nWe sing unto Thy name;\nWe stand accepted in the place\nThat none but Christ could claim;\nOur willing hearts have heard Thy voice,\nAnd in Thy mercy we rejoice.","th":["Grace","Worship & Praise","Joy & Thanksgiving"]},{"n":2,"t":"'Tis meet that Thy delight\nShould centre in the Son,\nThat Thou shouldst place us in Thy sight\nIn Him, Thy Holy One;\nThy perfect love has cast out fear;\nThy favour shines upon us here.","th":["The Father","The Person of Christ","God's Love for Us","Assurance & Security"]},{"n":3,"t":"Eternal is our rest,\nO Christ of God, in Thee;\nNow of Thy peace, Thy joy, possessed,\nWe wait Thy face to see;\nNow to the Father's heart received,\nWe know in whom we have believed.","th":["Rest & Peace","Assurance & Security","The Father","The Lord's Coming / Rapture"]}],"w":{"Grace":33,"Worship & Praise":33,"Joy & Thanksgiving":33,"The Father":67,"The Person of Christ":33,"God's Love for Us":33,"Assurance & Security":67,"Rest & Peace":33,"The Lord's Coming / Rapture":33}},
"190":{"m":"6.4.6.4 Double","a":"Mary Artemisia Lathbury (1841-1913)","tn":"Lathbury","tc":"W. F. Sherwin (1826-1888)","fl":"Break Thou the Bread of Life,","v":[{"n":1,"t":"Break Thou the Bread of Life,\nDear Lord, to me,\nAs Thou didst break the bread\nBeside the sea;\nBeyond the sacred page\nI seek Thee, Lord;\nMy spirit longs for Thee,\nThou living Word.","th":["The Word of God","The Person of Christ","Our Love for The Son/Christ"]},{"n":2,"t":"Thou art the Bread of Life,\nO Lord, to me,\nThy Holy Word the truth\nThat saveth me;\nGive me to eat and live\nWith Thee above;\nTeach me to love Thy truth,\nFor Thou art love.","th":["The Word of God","The Person of Christ","God's Love for Us"]},{"n":3,"t":"Speak by Thy Spirit, Lord,\nNow unto me,\nThat He may touch my eyes\nAnd make me see;\nShow me the truth concealed\nWithin Thy Word,\nAnd in Thy Book revealed,\nI see Thee, Lord.","th":["The Holy Spirit","The Word of God"]},{"n":4,"t":"Bless Thou the Bread of Life\nTo me, to me,\nAs Thou didst bless the loaves\nBy Galilee;\nThen shall all bondage cease,\nAll fetters fall,\nAnd I shall find my peace,\nMy All in all.","th":["The Word of God","Rest & Peace"]}],"w":{"The Word of God":100,"The Person of Christ":50,"Our Love for The Son/Christ":25,"God's Love for Us":25,"The Holy Spirit":25,"Rest & Peace":25}},
"191":{"m":"8.7.","a":"Miss Catherine Helene von Poseck (1859-1953)","tn":"Hymn to Joy","tc":"Ludwig Van Beethoven (1770-1827)","fl":"Abba, Father, oh, what wonders","v":[{"n":1,"t":"Abba, Father, oh, what wonders\nDoth that precious name reveal!\nWhile in Christ we gaze upon Thee,\nSongs of joy our spirits fill.\nLooking back, we can but bless Thee,\nLooking forward, but adore;\nFor Thy present favour give Thee\nChildren's praises evermore.","th":["The Father","Sonship & Adoption","Joy & Thanksgiving","Worship & Praise"]},{"n":2,"t":"Enemies were we, and rebels,\nRuined, wretched, and undone;\nThou didst give, from wrath to save us,\nFor Thy foes Thine only Son.\nNow, oh, joy beyond all telling,\nFoes no more, but sons are we,\nChildren in a Father's presence,\nBlest in Him, and loved as He.","th":["Redemption","God's Love for Us","Sonship & Adoption","The Cross & Sufferings of Christ"]},{"n":3,"t":"Stretched before us lies a future\nFilled with bliss no tongue can tell -\nThine own house of many mansions,\nWhere we shall for ever dwell.\nYet, O Father, we, Thy children,\nWhile we through the desert move,\nDwell already in Thy presence,\nTaste by faith the joys above.","th":["Heaven & The Father's House","Pilgrimage / Desert Journey","The Father","Sonship & Adoption"]}],"w":{"The Father":67,"Sonship & Adoption":100,"Joy & Thanksgiving":33,"Worship & Praise":33,"Redemption":33,"God's Love for Us":33,"The Cross & Sufferings of Christ":33,"Heaven & The Father's House":33,"Pilgrimage / Desert Journey":33}},
"192":{"m":"7.7.8.7.","a":"James George Deck (1802-1884)","tn":"Bishopgarth","tc":"A. S. Sullivan (1842-1900)","fl":"Great Captain of salvation,","v":[{"n":1,"t":"Great Captain of salvation,\nNow crowned with highest glory,\nJoyful we raise\nOur songs of praise,\nAnd lowly bow before Thee;\nWe worship and adore Thee,\nEach heart and tongue confessing\nWorthy to reign,\nThe Lamb once slain,\nOf honour, power, and blessing.","th":["Worship & Praise","Christ Risen & Glorified","The Lamb of God"]},{"n":2,"t":"Thou hast the cross endured\nIn love beyond all measure,\nThe curse, the grave,\nThy saints to save,\nAnd have us as Thy treasure;\nWe see Thee as the Victim\nOur sins and sorrows bearing;\nThe Lamb, once slain,\nAlive again,\nThe crown of glory wearing.","th":["The Cross & Sufferings of Christ","God's Love for Us","The Lamb of God","Christ Risen & Glorified"]},{"n":3,"t":"Head of the new creation,\nTo God's right hand ascended,\nThy saints rejoice\nWith heart and voice\nBefore Thy feet low bended;\nWe own Thee, Lord, exulting\nIn all Thy joy and glory;\nAnd long to be\nOn high with Thee,\nWhere all shall bow before Thee.","th":["New Creation","Christ Risen & Glorified","Worship & Praise","Heaven & The Father's House"]}],"w":{"Worship & Praise":67,"Christ Risen & Glorified":100,"The Lamb of God":67,"The Cross & Sufferings of Christ":33,"God's Love for Us":33,"New Creation":33,"Heaven & The Father's House":33}},
"193":{"m":"L.M.","a":"James George Deck (1802-1884)","tn":"Holley","tc":"G. Hews (1806-1873)","fl":"Jesus, my Saviour, Thou art mine,","v":[{"n":1,"t":"Jesus, my Saviour, Thou art mine,\nThe Father's gift of love divine;\nAll Thou hast done, and all Thou art\nAre now the portion of my heart.","th":["God's Love for Us","The Father","The Person of Christ"]},{"n":2,"t":"Poor, feeble, wretched, as I am,\nI now can glory in Thy name;\nNow cleansed in Thy most precious blood\nAnd made the righteousness of God.","th":["The Precious Blood / Atonement","Worship & Praise","Forgiveness of Sins"]},{"n":3,"t":"All Thou hast, Thou hast for me;\nAll my fresh springs are hid in Thee;\nIn Thee I live; while I confess\nI nothing am, yet all possess.","th":["Assurance & Security","The Person of Christ"]},{"n":4,"t":"O Saviour, teach me to abide\nClose sheltered at Thy wounded side,\nEach hour receiving \"grace on grace\"\nUntil I see Thee face to face.","th":["Grace","The Lord's Coming / Rapture","Our Love for The Son/Christ"]}],"w":{"God's Love for Us":25,"The Father":25,"The Person of Christ":50,"The Precious Blood / Atonement":25,"Worship & Praise":25,"Forgiveness of Sins":25,"Assurance & Security":25,"Grace":25,"The Lord's Coming / Rapture":25,"Our Love for The Son/Christ":25}},
"194":{"m":"","a":"William J. Hocking (1864-1953)","tn":"Bullinger","tc":"E. W. Bullinger (1837-1913)","fl":"Lord and Saviour, we remember,","v":[{"n":1,"t":"Lord and Saviour, we remember,\nIn that hour of shame,\nThou to God Thyself didst render:\nPraise Thy name.","th":["The Lord's Supper / Remembrance","The Cross & Sufferings of Christ","Worship & Praise"]},{"n":2,"t":"Bless\u00e8d Saviour, we remember\nThou hadst met the foe;\nYet the darkness gathered round Thee,\nAnd the woe.","th":["The Cross & Sufferings of Christ","Trial & Conflict","The Lord's Supper / Remembrance"]},{"n":3,"t":"Holy Saviour, we remember\nBitter was Thy cry,\nWhen, for sin by God forsaken,\nWrath was nigh.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement"]},{"n":4,"t":"Precious Saviour, we remember\nThou didst overcome;\nThrough Thy victory we who wandered\nAre brought home.","th":["Redemption","The Cross & Sufferings of Christ"]},{"n":5,"t":"Lord and Saviour, we remember\nSomewhat of Thy love;\nAll its fulness do Thou teach us\nFrom above.","th":["God's Love for Us","The Lord's Supper / Remembrance"]}],"w":{"The Lord's Supper / Remembrance":60,"The Cross & Sufferings of Christ":80,"Worship & Praise":20,"Trial & Conflict":20,"The Precious Blood / Atonement":20,"Redemption":20,"God's Love for Us":20}},
"195":{"m":"L.M.","a":"Miss F. T. Wigram (19th Century)","tn":"Talis's Canon","tc":"Thomas Tallis, c. 1505-1585","fl":"Worthy of homage and of praise;","v":[{"n":1,"t":"Worthy of homage and of praise;\nWorthy by all to be adored:\nExhaustless theme of heavenly lays!\nThou, Thou art worthy, Jesus, Lord.","th":["Worship & Praise","The Person of Christ","Heaven & The Father's House"]},{"n":2,"t":"To Thee, e'en now, our song we raise,\nThough sure the tribute mean must prove:\nNo mortal tongue can tell Thy ways,\nSo full of life, and light, and love.","th":["Worship & Praise","God's Love for Us","The Person of Christ"]},{"n":3,"t":"Yet, Saviour, Thou shalt have full praise;\nWe soon shall meet Thee on the cloud;\nWe soon shall see Thee face to face,\nIn glory praising as we would.","th":["The Lord's Coming / Rapture","Worship & Praise","Heaven & The Father's House"]}],"w":{"Worship & Praise":100,"The Person of Christ":67,"Heaven & The Father's House":67,"God's Love for Us":33,"The Lord's Coming / Rapture":33}},
"196":{"m":"8.8.6. Double","a":"Samuel Medley (1738-1799)","tn":"Ariel","tc":"L. Mason (1792-1872)","fl":"Come, let us sing the matchless worth","v":[{"n":1,"t":"Come, let us sing the matchless worth\nAnd sweetly sound the glories forth\nWhich in the Saviour shine:\nTo God and Christ our praises bring,\nThe song with which high heaven will ring,\nPraises for grace divine.","th":["Worship & Praise","Grace","The Person of Christ"]},{"n":2,"t":"How rich the precious blood He spilt,\nOur ransom from the dreadful guilt\nOf sin against our God;\nHow perfect is that righteousness,\nIn which unspotted beauteous dress\nHis saints have ever stood!","th":["The Precious Blood / Atonement","Redemption","Forgiveness of Sins"]},{"n":3,"t":"How rich the character He bears,\nAnd all the form of love He wears,\nExalted on the throne;\nIn songs of sweet untiring praise,\nWe e'er would sing His perfect ways,\nAnd make His glories known.","th":["The Person of Christ","Christ Risen & Glorified","Worship & Praise","God's Love for Us"]},{"n":4,"t":"And soon the happy day shall come,\nWhen we shall reach our destined home,\nAnd see Him face to face;\nThen with our Saviour, Lord and Friend,\nThe one unbroken day we'll spend\nIn singing still His grace.","th":["Heaven & The Father's House","The Lord's Coming / Rapture","Grace"]}],"w":{"Worship & Praise":50,"Grace":50,"The Person of Christ":50,"The Precious Blood / Atonement":25,"Redemption":25,"Forgiveness of Sins":25,"Christ Risen & Glorified":25,"God's Love for Us":25,"Heaven & The Father's House":25,"The Lord's Coming / Rapture":25}},
"197":{"m":"C.M.","a":"Philip Doddridge (1702-1751)","tn":"Crimond","tc":"J. S. Irvine (1836-1887)","fl":"O God, what cords of love are Thine,","v":[{"n":1,"t":"O God, what cords of love are Thine,\nHow gentle, yet how strong!\nThy truth and grace their strength combine\nTo draw our souls along.","th":["God's Love for Us","Grace"]},{"n":2,"t":"The guilt of twice ten thousand sins\nOne moment takes away;\nAnd when the fight of faith begins,\nOur strength is as our day.","th":["Forgiveness of Sins","Grace","Trial & Conflict"]},{"n":3,"t":"Comfort, through all this vale of tears,\nIn blest profusion flows;\nAnd glory of unnumbered years\nEternity bestows.","th":["Rest & Peace","Trial & Conflict","Heaven & The Father's House"]},{"n":4,"t":"Drawn by such cords we'll onward move,\nTill round the throne we meet,\nAnd, captives in the chains of love,\nEmbrace our Saviour's feet.","th":["Heaven & The Father's House","Pilgrimage / Desert Journey","Our Love for The Son/Christ"]}],"w":{"God's Love for Us":25,"Grace":50,"Forgiveness of Sins":25,"Trial & Conflict":50,"Rest & Peace":25,"Heaven & The Father's House":50,"Pilgrimage / Desert Journey":25,"Our Love for The Son/Christ":25}},
"198":{"m":"7s.","a":"Thomas Kelly (1769-1854)","tn":"Hendon","tc":"Henri Abraham Cesar Malan (1787-1864)","fl":"Lord, accept our feeble song!","v":[{"n":1,"t":"Lord, accept our feeble song!\nPower and praise to Thee belong;\nWe would all Thy grace record,\nHoly, holy, holy Lord !","th":["Worship & Praise","Grace"]},{"n":2,"t":"Rich in glory, Thou didst stoop,\nThence is all Thy people's hope;\nThou wast poor, that we might be\nRich in glory, Lord, with Thee.","th":["Christ Risen & Glorified","Grace","The Cross & Sufferings of Christ"]},{"n":3,"t":"When We think of love like this,\nJoy and shame our hearts possess;\nJoy, that Thou couldst pity thus;\nShame, for such returns from us.","th":["God's Love for Us","Joy & Thanksgiving","Our Love for The Son/Christ"]},{"n":4,"t":"Yet we hope the day to see\nWhen from every hindrance free,\nWhen to Thee in glory brought,\nWe shall serve Thee as we ought.","th":["Heaven & The Father's House","The Lord's Coming / Rapture","Service & Devotion"]}],"w":{"Worship & Praise":25,"Grace":50,"Christ Risen & Glorified":25,"The Cross & Sufferings of Christ":25,"God's Love for Us":25,"Joy & Thanksgiving":25,"Our Love for The Son/Christ":25,"Heaven & The Father's House":25,"The Lord's Coming / Rapture":25,"Service & Devotion":25}},
"199":{"m":"7.7.7.8.","a":"Philip Paul Bliss (1838-1876)","tn":"Hallelujah! What a Saviour","tc":"Philip Paul Bliss (1838-1876)","fl":"Man of Sorrows! what a name","v":[{"n":1,"t":"Man of Sorrows! what a name\nFor the Son of God, who came\nRuined sinners to reclaim!\nHalleluiah! What a Saviour!","th":["The Person of Christ","The Cross & Sufferings of Christ","Redemption"]},{"n":2,"t":"Bearing shame and scoffing rude,\nIn my place condemned He stood,\nSealed my pardon with His blood.\nHallelujah! What a Saviour!","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","Forgiveness of Sins"]},{"n":3,"t":"Guilty, vile, and helpless, we;\nSpotless Lamb of God was He:\nFull atonement - can it be?\nHallelujah! What a Saviour!","th":["The Lamb of God","The Precious Blood / Atonement"]},{"n":4,"t":"Lifted up was He to die,\n\"It is finished'' was His cry;\nNow in heaven, exalted high:\nHallelujah! What a Saviour!","th":["The Cross & Sufferings of Christ","Christ Risen & Glorified","Heaven & The Father's House"]},{"n":5,"t":"When He comes, as Lord and King,\nAll His ransomed home to bring,\nThen anew this song we'll sing -\nHallelujah! What a Saviour!","th":["The Lord's Coming / Rapture","Redemption","The Eternal Kingdom / Reign of Christ"]}],"w":{"The Person of Christ":20,"The Cross & Sufferings of Christ":60,"Redemption":40,"The Precious Blood / Atonement":40,"Forgiveness of Sins":20,"The Lamb of God":20,"Christ Risen & Glorified":20,"Heaven & The Father's House":20,"The Lord's Coming / Rapture":20,"The Eternal Kingdom / Reign of Christ":20}},
"200":{"m":"C.M.","a":"Anonymous","tn":"Jackson's","tc":"T. Jackson (1715-1781)","fl":"Father, how precious unto Thee","v":[{"n":1,"t":"Father, how precious unto Thee\nIs Thy belov\u00e8d Son,\nIn whom Thou dost perfection see,\nThy holy, bless\u00e8d One!","th":["The Father","The Person of Christ"]},{"n":2,"t":"When He in flesh the desert passed,\nHe loved to do Thy will;\nHis food it was, through to the last,\nThy pleasure to fulfil.","th":["The Person of Christ","Service & Devotion","Pilgrimage / Desert Journey"]},{"n":3,"t":"Only-begotten, He revealed\nThyself unto Thy praise:\nThe Father, until then concealed,\nWas seen in all His ways.","th":["The Person of Christ","The Father"]},{"n":4,"t":"As in His life, so in His death,\nHe was devoted still;\nFor us in love resigned His breath,\nObedient to Thy will.","th":["The Cross & Sufferings of Christ","God's Love for Us","Service & Devotion"]},{"n":5,"t":"He glorified Thee on the earth:\nThy work by Him was done;\nAnd Thou, who knewest all His\nDidst glorify Thy Son.","th":["Christ Risen & Glorified","The Father"]},{"n":6,"t":"Now crowned and seated on Thy throne,\nHe is Thy joy and rest;\nAnd we who are through grace Thine own\nIn Him are fully blest.","th":["Christ Risen & Glorified","Rest & Peace","Grace","Assurance & Security"]},{"n":7,"t":"He, preciousness itself to Thee,\nTo us is precious too;\nWe every beauty in Him see,\nAnd Thine own glory view.","th":["The Person of Christ","The Father","Our Love for The Father","Our Love for The Son/Christ"]}],"w":{"The Father":57,"The Person of Christ":57,"Service & Devotion":29,"Pilgrimage / Desert Journey":14,"The Cross & Sufferings of Christ":14,"God's Love for Us":14,"Christ Risen & Glorified":29,"Rest & Peace":14,"Grace":14,"Assurance & Security":14,"Our Love for The Father":14,"Our Love for The Son/Christ":14}},
"201":{"m":"S.M.","a":"Lord Adalbert Percy Cecil (1841-1889)","tn":"Cambridge","tc":"R. Harrison (1748-1810)","fl":"Thou holy One and true,","v":[{"n":1,"t":"Thou holy One and true,\nOur hearts in Thee confide,\nAnd in the circle of Thy love,\nAs brethren we abide.","th":["The Person of Christ","Fellowship & Gathering","Our Love for The Son/Christ"]},{"n":2,"t":"In Thee the Father rests,\nHis own anointed One;\nIn Thee alone He finds delight,\nHis well-belov\u00e8d Son.","th":["The Father","The Person of Christ","Sonship & Adoption"]},{"n":3,"t":"In Thee we find delight,\nFirst-born 'mongst brethren Thou;\nTo Thy dear Name alone we cling,\nTo Thy sure word we bow.","th":["The Person of Christ","The Word of God","Fellowship & Gathering","Our Love for The Son/Christ"]},{"n":4,"t":"Teach us that Name to own,\nWhilst waiting, Lord, for Thee,\nUnholiness and sin to shun,\nFrom all untruth to flee.","th":["Service & Devotion","The Lord's Coming / Rapture","Separation from the World"]}],"w":{"The Person of Christ":75,"Fellowship & Gathering":50,"Our Love for The Son/Christ":50,"The Father":25,"Sonship & Adoption":25,"The Word of God":25,"Service & Devotion":25,"The Lord's Coming / Rapture":25,"Separation from the World":25}},
"202":{"m":"6-8s.","a":"Joseph Swain (1761-1796)","tn":"Sagina","tc":"T. Campbell (1774-1844)","fl":"What will it be to dwell above,","v":[{"n":1,"t":"What will it be to dwell above,\nAnd with the Lord of glory reign,\nSince the blest knowledge of His love\nSo brightens all this dreary plain?\nNo heart can think, no tongue can tell,\nWhat joy 'twill be with Christ to dwell.","th":["Heaven & The Father's House","The Eternal Kingdom / Reign of Christ","God's Love for Us","Joy & Thanksgiving"]},{"n":2,"t":"When sin no more obstructs the sight,\nAnd flesh and sense deceive no more,\nWhen we shall see the Prince of light,\nAnd all His works of grace explore,\nWhat heights and depths of love divine\nWill there through endless ages shine!","th":["The Person of Christ","Grace","God's Love for Us","Heaven & The Father's House"]},{"n":3,"t":"And God has fixed the happy day,\nWhen the last tear shall dim our eyes;\nWhen He will wipe these tears away,\nAnd fill our hearts with glad surprise;\nTo hear His voice, and see His face,\nAnd know the fulness of His grace!","th":["The Lord's Coming / Rapture","Grace","Heaven & The Father's House","Joy & Thanksgiving"]}],"w":{"Heaven & The Father's House":100,"The Eternal Kingdom / Reign of Christ":33,"God's Love for Us":67,"Joy & Thanksgiving":67,"The Person of Christ":33,"Grace":67,"The Lord's Coming / Rapture":33}},
"203":{"m":"6.6.8.4.","a":"Anonymous","tn":"Easton","tc":"William Easton (1850-1926)","fl":"Lord Jesus, Lamb of God,","v":[{"n":1,"t":"Lord Jesus, Lamb of God,\nWho, us to save from loss,\nDidst taste the bitter cup of death\nUpon the cross,","th":["The Lamb of God","The Cross & Sufferings of Christ","The Precious Blood / Atonement"]},{"n":2,"t":"Most merciful High Priest,\nOur Saviour, Shepherd, Friend,\n'Tis in Thy love alone we trust\nUntil the end.","th":["Christ's Intercession / Priesthood","The Person of Christ","Our Love for The Son/Christ"]},{"n":3,"t":"Thou wilt our souls sustain,\nOur guide and strength wilt be,\nUntil in glory, Lord, above\nThy face we see.","th":["Assurance & Security","Pilgrimage / Desert Journey","Heaven & The Father's House"]}],"w":{"The Lamb of God":33,"The Cross & Sufferings of Christ":33,"The Precious Blood / Atonement":33,"Christ's Intercession / Priesthood":33,"The Person of Christ":33,"Our Love for The Son/Christ":33,"Assurance & Security":33,"Pilgrimage / Desert Journey":33,"Heaven & The Father's House":33}},
"204":{"m":"C.M.","a":"Samuel Prideaux Tregelles (1813-1875)","tn":"Cross","tc":"T. Hastings (1784-1872)","fl":"Tis sweet to think of those at rest,","v":[{"n":1,"t":"Tis sweet to think of those at rest,\nWho sleep in Christ the Lord,\nWhose spirits now with Him are blest\nAccording to His word.","th":["Rest & Peace","Assurance & Security","The Word of God"]},{"n":2,"t":"They once were pilgrims here with us;\nThrough Jesus now they sleep:\nAnd we for them, while resting thus,\nAs hopeless cannot weep.","th":["Pilgrimage / Desert Journey","Rest & Peace","The Lord's Coming / Rapture"]},{"n":3,"t":"How bright the resurrection-morn\nOn all the saints will break!\nThe Lord Himself will then return\nHis ransomed church to take.","th":["Christ Risen & Glorified","The Lord's Coming / Rapture","The Church / Bride of Christ"]},{"n":4,"t":"Or raised or changed His saints will meet,\nAll grief and care removed:\nWhat joy 'twill be to us to greet\nEach saint whom here we loved!","th":["The Lord's Coming / Rapture","Joy & Thanksgiving","Fellowship & Gathering"]},{"n":5,"t":"Our Lord Himself we then shall see,\nWhose blood for us was shed;\nWith Him for ever we shall be,\nMade like our glorious Head.","th":["The Lord's Coming / Rapture","The Precious Blood / Atonement","Heaven & The Father's House","Christ Risen & Glorified"]},{"n":6,"t":"We cannot linger o'er the tomb:\nThe resurrection-day\nTo faith shines bright beyond its gloom,\nChrist's glory to display.","th":["Christ Risen & Glorified","The Lord's Coming / Rapture"]}],"w":{"Rest & Peace":33,"Assurance & Security":17,"The Word of God":17,"Pilgrimage / Desert Journey":17,"The Lord's Coming / Rapture":83,"Christ Risen & Glorified":50,"The Church / Bride of Christ":17,"Joy & Thanksgiving":17,"Fellowship & Gathering":17,"The Precious Blood / Atonement":17,"Heaven & The Father's House":17}},
"205":{"m":"7.7.8.7.","a":"Samuel Prideaux Tregelles (1813-1875)","tn":"Bishopgarth","tc":"A. S. Sullivan (1842-1900)","fl":"Thou God of grace our Father,","v":[{"n":1,"t":"Thou God of grace our Father,\nWe now rejoice before Thee;\nThy children we, and loved by Thee,\n'Tis meet we should adore Thee:\nAs Thine Thou didst foreknow us,\nFor such was Thine election;\nAnd Thou hast shown to us, Thine own,\nThy fulness of affection.","th":["The Father","God's Love for Us","Sonship & Adoption","Worship & Praise","Joy & Thanksgiving"]},{"n":2,"t":"The grace of Thy salvation\nThe Holy Ghost has taught us;\nBy Him we're sealed, for He revealed\nHow Jesus blood has bought us.\nSoon all the church in glory\nIn its predestined station\nShall bless Thy name, with Christ the Lamb.\nThou God of all salvation.","th":["Grace","The Holy Spirit","The Precious Blood / Atonement","Redemption","The Church / Bride of Christ","The Lamb of God"]}],"w":{"The Father":50,"God's Love for Us":50,"Sonship & Adoption":50,"Worship & Praise":50,"Joy & Thanksgiving":50,"Grace":50,"The Holy Spirit":50,"The Precious Blood / Atonement":50,"Redemption":50,"The Church / Bride of Christ":50,"The Lamb of God":50}},
"206":{"m":"C.M.","a":"Mary Bowley (Mrs Peters) (1813-1856)","tn":"St. Stephen","tc":"W. Jones (1726-1800)","fl":"O Lord, we know it matters nought,","v":[{"n":1,"t":"O Lord, we know it matters nought,\nHow sweet the song may be,\nNo heart but of the Spirit taught\nMakes melody to Thee.","th":["Worship & Praise","The Holy Spirit"]},{"n":2,"t":"Then teach Thy gathered saints, O Lord,\nTo worship in Thy fear;\nAnd let Thy grace mould every word\nThat meets Thy holy ear.","th":["Worship & Praise","Grace","Fellowship & Gathering"]},{"n":3,"t":"Thou hast by blood made sinners meet,\nAs saints in light, to come\nAnd worship at the mercy-seat,\nBefore the eternal throne.","th":["The Precious Blood / Atonement","Worship & Praise","Forgiveness of Sins"]},{"n":4,"t":"Thy precious name is all we show,\nOur only passport, Lord;\nAnd full assurance now we know,\nConfiding in Thy word.","th":["Assurance & Security","The Word of God","The Person of Christ"]},{"n":5,"t":"O largely give, 'tis all Thine own,\nThe Spirit's goodly fruit;\nPraise, issuing forth in life, alone\nOur living Lord can suit.","th":["The Holy Spirit","Worship & Praise"]}],"w":{"Worship & Praise":80,"The Holy Spirit":40,"Grace":20,"Fellowship & Gathering":20,"The Precious Blood / Atonement":20,"Forgiveness of Sins":20,"Assurance & Security":20,"The Word of God":20,"The Person of Christ":20}},
"207":{"m":"C.M.","a":"Thomas Gibbons (1720-1785)","tn":"St. Anne","tc":"W. Croft (1678-1727)","fl":"Now may the God of peace and love,","v":[{"n":1,"t":"Now may the God of peace and love,\nWho from the silent grave,\nBrought back the Shepherd of the sheep,\nOmnipotent to save,","th":["Rest & Peace","Christ Risen & Glorified","The Person of Christ"]},{"n":2,"t":"Through the rich merits of that blood\nWhich He on Calvary spilt,\nTo make the gracious work secure,\nOn which our hopes are built -","th":["The Precious Blood / Atonement","The Cross & Sufferings of Christ","Assurance & Security"]},{"n":3,"t":"Perfect our souls in every grace,\nTo do His bless\u00e8d will,\nAnd all that's pleasing in His sight\nInspire us to fulfil.","th":["Grace","Service & Devotion"]},{"n":4,"t":"For His, the risen Shepherd's sake,\nWe every blessing pray;\nWith glory let His name be crowned\nThrough heaven's eternal day.","th":["Christ Risen & Glorified","Worship & Praise","Heaven & The Father's House"]}],"w":{"Rest & Peace":25,"Christ Risen & Glorified":50,"The Person of Christ":25,"The Precious Blood / Atonement":25,"The Cross & Sufferings of Christ":25,"Assurance & Security":25,"Grace":25,"Service & Devotion":25,"Worship & Praise":25,"Heaven & The Father's House":25}},
"208":{"m":"10s.","a":"James George Deck (1802-1884)","tn":"Ellers","tc":"E. J. Hopkins (1818-1901)","fl":"In hope we lift our wishful, longing eyes,","v":[{"n":1,"t":"In hope we lift our wishful, longing eyes,\nWaiting to see the Morning Star arise;\nHow bright, how gladsome will His advent be,\nBefore the Sun shines forth in majesty!","th":["The Lord's Coming / Rapture","Joy & Thanksgiving"]},{"n":2,"t":"How will our eyes to see His face delight,\nWhose love has cheered us through the darksome night!\nHow will our ears drink in His well-known voice,\nWhose faintest whispers make our soul rejoice!","th":["The Lord's Coming / Rapture","Joy & Thanksgiving","Our Love for The Son/Christ"]},{"n":3,"t":"No stain within; no toes or snares around;\nNo jarring notes shall there discordant sound;\nAll pure without, all pure within the breast;\nNo thorns to wound, no toil to mar our rest.","th":["Rest & Peace","Heaven & The Father's House"]},{"n":4,"t":"If here on earth the thoughts of Jesus' love\nLift our poor hearts this weary world above;\nIf even here the taste of heavenly springs\nSo cheers the spirit that the pilgrim sings:","th":["Pilgrimage / Desert Journey","Joy & Thanksgiving","Our Love for The Son/Christ"]},{"n":5,"t":"What will the sunshine of His glory prove!\nWhat the unmingled fulness of His love!\nWhat hallelujahs will His presence raise!\nWhat but one loud, eternal burst of praise!","th":["Worship & Praise","Heaven & The Father's House","God's Love for Us","Joy & Thanksgiving"]}],"w":{"The Lord's Coming / Rapture":40,"Joy & Thanksgiving":80,"Our Love for The Son/Christ":40,"Rest & Peace":20,"Heaven & The Father's House":40,"Pilgrimage / Desert Journey":20,"Worship & Praise":20,"God's Love for Us":20}},
"209":{"m":"S.M.","a":"William. F. Lloyd (1791-1853)","tn":"Rhodes","tc":"C. W. Jordan (1840-1909)","fl":"Our times are in Thy hand,","v":[{"n":1,"t":"Our times are in Thy hand,\nFather, we wish them there;\nOur life, our soul, our all, we leave\nEntirely to Thy care.","th":["The Father","Assurance & Security","Rest & Peace"]},{"n":2,"t":"Our times are in Thy hand,\nWhatever they may be,\nPleasing or painful, dark or bright,\nAs best may seem to Thee.","th":["The Father","Assurance & Security","Trial & Conflict"]},{"n":3,"t":"Our times are in Thy hand;\nWhy should we doubt or fear?\nA Father's hand will never cause\nHis child a needless tear.","th":["The Father","Assurance & Security"]},{"n":4,"t":"Our times are in Thy hand;\nJesus once crucified,\nNow leads His own with tender care,\nOur Shepherd, Guard and Guide.","th":["The Person of Christ","The Cross & Sufferings of Christ","Pilgrimage / Desert Journey"]},{"n":5,"t":"Our times are in thy hand;\nChrist is our Advocate;\nNo creature power from love divine\nOur souls can separate.","th":["Christ's Intercession / Priesthood","Assurance & Security","God's Love for Us"]},{"n":6,"t":"Our times are in Thy hand,\nWe'd always trust in Thee,\nTill we have left this weary land,\nAnd all Thy glory see.","th":["Assurance & Security","Pilgrimage / Desert Journey","Heaven & The Father's House"]}],"w":{"The Father":50,"Assurance & Security":83,"Rest & Peace":17,"Trial & Conflict":17,"The Person of Christ":17,"The Cross & Sufferings of Christ":17,"Pilgrimage / Desert Journey":33,"Christ's Intercession / Priesthood":17,"God's Love for Us":17,"Heaven & The Father's House":17}},
"210":{"m":"S.M.","a":"Samuel Prideaux Tregelles (1813-1875)","tn":"Huddersfield","tc":"Anonymous","fl":"\"One Spirit with the Lord;\"","v":[{"n":1,"t":"\"One Spirit with the Lord;\"\nOh, bless\u00e8d, wondrous word!\nWhat heavenly light, what power divine,\nDoth that sweet word afford!","th":["The Holy Spirit","The Person of Christ"]},{"n":2,"t":"\"One spirit with the Lord:\"\nJesus, the glorified,\nEsteems the church for which He bled,\nHis body and His bride.","th":["The Church / Bride of Christ","The Precious Blood / Atonement","Christ Risen & Glorified"]},{"n":3,"t":"And though by storms assailed,\nAnd though by trials pressed,\nHimself our Life, He bears us up\nRight onward to the rest.","th":["Trial & Conflict","Assurance & Security","Rest & Peace"]},{"n":4,"t":"There we shall drink the stream\nOf endless bliss above:\nThere we shall know, without a cloud,\nHis full unbounded love.","th":["Heaven & The Father's House","God's Love for Us","Rest & Peace"]}],"w":{"The Holy Spirit":25,"The Person of Christ":25,"The Church / Bride of Christ":25,"The Precious Blood / Atonement":25,"Christ Risen & Glorified":25,"Trial & Conflict":25,"Assurance & Security":25,"Rest & Peace":50,"Heaven & The Father's House":25,"God's Love for Us":25}},
"211":{"m":"7.6.","a":"James George Deck (1802-1884)","tn":"Lancashire","tc":"H. T. Smart (1813-1879)","fl":"O Jesus Christ, the Saviour,","v":[{"n":1,"t":"O Jesus Christ, the Saviour,\nWe only look to Thee;\n'Tis in Thy love and favour\nOur souls find liberty.\nWhile Satan fiercely rages,\nAnd shipwreck we might fear,\n'Tis this our grief assuages\nThat Thou art always near.","th":["The Person of Christ","Assurance & Security","Trial & Conflict"]},{"n":2,"t":"Yes, though the tempest round us\nSeems safety to defy;\nThough rocks and shoals surround us,\nAnd billows swell on high,\nThou dost from all protect us,\nAnd cheer us by Thy love;\nThy counsels still direct us\nSafe to the rest above.","th":["Assurance & Security","God's Love for Us","Rest & Peace","Trial & Conflict"]},{"n":3,"t":"There with what joy reviewing\nPast conflicts, dangers, fears,\nThy hand our foes subduing,\nAnd drying all our tears;\nOur hearts with rapture burning,\nThe path we shall retrace,\nWhere now our souls are learning\nThe riches of Thy grace.","th":["Grace","Joy & Thanksgiving","Heaven & The Father's House"]},{"n":4,"t":"Oh, then how loud the chorus\nShall to Thy name resound\nFrom all at rest before us,\nFrom all Thy grace hath found!\nOne joyful song for ever\nEach heart, each lip shall raise,\nThe praise of our Redeemer,\nOur God and Father's praise.","th":["Worship & Praise","Redemption","The Father","Grace"]}],"w":{"The Person of Christ":25,"Assurance & Security":50,"Trial & Conflict":50,"God's Love for Us":25,"Rest & Peace":25,"Grace":50,"Joy & Thanksgiving":25,"Heaven & The Father's House":25,"Worship & Praise":25,"Redemption":25,"The Father":25}},
"212":{"m":"10s.","a":"James George Deck (1802-1884)","tn":"Eventide","tc":"W. H. Monk (1823-1889)","fl":"Called from above, and heavenly men by birth,","v":[{"n":1,"t":"Called from above, and heavenly men by birth,\n(Who once were but the citizens of earth)\nAs pilgrims here, we seek a heavenly home,\nOur portion in the ages yet to come.","th":["Pilgrimage / Desert Journey","Heaven & The Father's House","Sonship & Adoption"]},{"n":2,"t":"Where all the saints of every clime shall meet\nAnd each with all shall all the ransomed greet,\nBut oh, the height of bliss, our Lord, shall be\nTo owe it all, and share it all, with Thee.","th":["Fellowship & Gathering","Redemption","Heaven & The Father's House"]},{"n":3,"t":"Thou wast the image in man's lowly guise\nOf the invisible to mortal eyes;\nSon of His bosom, come from heaven above,\nWe see in Thee incarnate, \"God is love\".","th":["The Person of Christ","The Father","God's Love for Us"]},{"n":4,"t":"Thy lips the Father's name to us reveal;\nWhat burning power in all Thy words we feel,\nAs with enraptured hearts we hear Thee tell\nThe heavenly glories which Thou know'st so well!","th":["The Father","The Word of God","The Person of Christ"]},{"n":5,"t":"No curse of law, in Thee was sovereign grace,\nAnd now what glory in Thine unveiled face!\nThou didst attract the wretched and the weak,\nThy joy the wanderers and the lost to seek.","th":["Grace","The Person of Christ","The Cross & Sufferings of Christ"]},{"n":6,"t":"That precious stream of water and of blood\nWhich from Thy pierced side so freely flowed,\nHas put away our sins of scarlet dye,\nWashed us from every stain, and brought us nigh.","th":["The Precious Blood / Atonement","Forgiveness of Sins","Redemption"]},{"n":7,"t":"We are but strangers here, we do not crave\nA home on earth, which gave Thee but a grave:\nThy cross has severed ties which bound us here,\nThyself our treasure in a brighter sphere.","th":["Pilgrimage / Desert Journey","Separation from the World","The Cross & Sufferings of Christ"]}],"w":{"Pilgrimage / Desert Journey":29,"Heaven & The Father's House":29,"Sonship & Adoption":14,"Fellowship & Gathering":14,"Redemption":29,"The Person of Christ":43,"The Father":29,"God's Love for Us":14,"The Word of God":14,"Grace":14,"The Cross & Sufferings of Christ":29,"The Precious Blood / Atonement":14,"Forgiveness of Sins":14,"Separation from the World":14}},
"213":{"m":"P.M.","a":"James George Deck (1802-1884)","tn":"Collooney","tc":"J. Steven","fl":"Our sins were laid on the Saviour's head,","v":[{"n":1,"t":"Our sins were laid on the Saviour's head,\nThe curse by our Lord was borne;\nFor us a victim our Surety bled,\nAnd endured that death of scorn,\nHimself He gave our poor hearts to win\n(Lord, never was love like Thine!)\nFrom the paths of folly, and shame, and sin,\nAnd fill them with joys divine.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","God's Love for Us","Forgiveness of Sins","Redemption"]},{"n":2,"t":"Now void is the place where our Saviour lay\nWhen He entered the gloomy grave;\nThat by death He the power of death might slay\nAnd His lambs from the lion save.\nOh! glorious time when the Victor arose!\nHe liveth, no more to die;\nHe hath bruised the head of our mighty foes,\nFor us was His victory!","th":["Christ Risen & Glorified","Redemption","The Lamb of God"]},{"n":3,"t":"The gates of heaven are opened wide,\nAt His name all the angels bow;\nThe Son of man who was crucified\nIs the King of glory now:\nWe love to look up and behold Him there,\nThe Lamb for His chosen slain;\nAnd soon shall His saints all His glories share,\nWith their Head and their Lord shall reign.","th":["Christ Risen & Glorified","Heaven & The Father's House","The Lamb of God","The Eternal Kingdom / Reign of Christ","Worship & Praise"]}],"w":{"The Cross & Sufferings of Christ":33,"The Precious Blood / Atonement":33,"God's Love for Us":33,"Forgiveness of Sins":33,"Redemption":67,"Christ Risen & Glorified":67,"The Lamb of God":67,"Heaven & The Father's House":33,"The Eternal Kingdom / Reign of Christ":33,"Worship & Praise":33}},
"214":{"m":"10.10.10.10.10.12.","a":"James George Deck (1802-1884)","tn":"Pilgrims","tc":"H. T. Smart (1813-1879)","fl":"How bless\u00e8d is our portion! When we look","v":[{"n":1,"t":"How bless\u00e8d is our portion! When we look\nUpward, within the veil, our life is there:\nOur names are written in the Lamb's own book,\nFor grace hath made us each with Him an heir\nOf all those glories, which by right belong\nTo Him, whose worthiness is heaven's eternal song.","th":["Assurance & Security","The Lamb of God","Grace","Heaven & The Father's House","Worship & Praise"]},{"n":2,"t":"We have a Father in the heavens above,\nWe have a happy home prepared on high;\nWe have a Saviour, whose surpassing love\nMade Him content e'en for our sins to die;\nHe fought, and has our cruel foes o'ercome,\nAnd has engaged to guard, and bring us safely home.","th":["The Father","Heaven & The Father's House","God's Love for Us","The Cross & Sufferings of Christ","Assurance & Security"]},{"n":3,"t":"Yes, bless\u00e8d is our portion! bless\u00e8d He,\nWho, in His grace before the world began,\nDid set on us His love sovereign and free,\nOn us the sinful heirs of dying man;\nAnd blessed us with all blessings in His Son\nWhose priceless love our hearts from sin and folly won.","th":["Grace","God's Love for Us","Sonship & Adoption","Redemption"]}],"w":{"Assurance & Security":67,"The Lamb of God":33,"Grace":67,"Heaven & The Father's House":67,"Worship & Praise":33,"The Father":33,"God's Love for Us":67,"The Cross & Sufferings of Christ":33,"Sonship & Adoption":33,"Redemption":33}},
"215":{"m":"8.6.8.8.6.8.8.","a":"James George Deck (1802-1884)","tn":"Crucifixion","tc":"A. Hall (1785-1827)","fl":"Oh solemn hour! that hour alone","v":[{"n":1,"t":"Oh solemn hour! that hour alone\nIn solitary might,\nWhen God the Father's only Son,\nAs man for sinners to atone,\nExpires - amazing sight!\nThe Lord of glory crucified!\nThe Prince of life has bled and died!","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","The Person of Christ"]},{"n":2,"t":"O mystery of mysteries!\nOf life and death the tree;\nCentre of two eternities,\nWhich look, with rapt, adoring eyes,\nOnward and back to Thee.\nO cross of Christ, where all His pain\nAnd death is our eternal gain.","th":["The Cross & Sufferings of Christ","Worship & Praise"]},{"n":3,"t":"Oh, how our inmost hearts do move\nWhile gazing on that cross!\nThe death of the Incarnate Love!\nWhat shame, what grief, what joy we prove,\nThat He should die for us!\nOur hearts were broken by that cry,\n\"Eli, lama sabachthani?\"","th":["The Cross & Sufferings of Christ","God's Love for Us","Our Love for The Son/Christ"]},{"n":4,"t":"Worthy of death, O God, we were;\nThy judgment was our due;\nIn grace Thy spotless Lamb did bear\nHimself our sins and guilt and shame;\nJustice our surety slew,\nWith Him our surety we have died,\nWith Him we there were crucified.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","The Lamb of God","Forgiveness of Sins"]}],"w":{"The Cross & Sufferings of Christ":100,"The Precious Blood / Atonement":50,"The Person of Christ":25,"Worship & Praise":25,"God's Love for Us":25,"Our Love for The Son/Christ":25,"The Lamb of God":25,"Forgiveness of Sins":25}},
"216":{"m":"L.M.","a":"James George Deck (1802-1884)","tn":"Zephyr","tc":"W. B. Bradbury (1816-1868)","fl":"Lord, we rejoice, that Thou art gone","v":[{"n":1,"t":"Lord, we rejoice, that Thou art gone\nTo sit upon Thy Father's throne;\nThy path of shame and suffering o'er,\nThy heart shall grieve and mourn no more.","th":["Christ Risen & Glorified","The Cross & Sufferings of Christ","Joy & Thanksgiving"]},{"n":2,"t":"With joy our wondering hearts retrace\nThy ways on earth of power and grace;\nWe sit as learners at Thy feet,\nThy words than honey far more sweet.","th":["Grace","The Person of Christ","Worship & Praise"]},{"n":3,"t":"We gaze with wonder at Thy cross,\nWith all its suffering, shame and loss,\nWhere Thou for us wast crucified,\nAnd for our sins a ransom died.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","Redemption"]},{"n":4,"t":"We love to look within the tomb,\nRobbed by Thy death of all its gloom,\nThe stone for ever rolled away;\nThy death the power of death did slay.","th":["Christ Risen & Glorified","The Cross & Sufferings of Christ"]},{"n":5,"t":"We joy to see Thee, Lord, arise\nTriumphant through the opening skies;\nAnd hear all heaven united own\nThee worthy to ascend the throne.","th":["Christ Risen & Glorified","Worship & Praise","Joy & Thanksgiving"]},{"n":6,"t":"Lord, now we wait for Thee to come,\nAnd take us to Thy Father's home;\nWhat everlasting joy twill be\nTo spend eternity with Thee!","th":["The Lord's Coming / Rapture","Heaven & The Father's House","Joy & Thanksgiving"]}],"w":{"Christ Risen & Glorified":50,"The Cross & Sufferings of Christ":50,"Joy & Thanksgiving":50,"Grace":17,"The Person of Christ":17,"Worship & Praise":33,"The Precious Blood / Atonement":17,"Redemption":17,"The Lord's Coming / Rapture":17,"Heaven & The Father's House":17}},
"217":{"m":"S.M.D.","a":"G. J. Elvey (1816-1893)","tn":"Diademata","tc":"G. J. Elvey (1816-1893)","fl":"Soldiers of Christ, arise, and put your armour on,","v":[{"n":1,"t":"Soldiers of Christ, arise, and put your armour on,\nStrong in the strength which God supplies through His eternal Son:\nStrong in the Lord of Hosts, and in His mighty power,\nWho in the strength of Jesus trusts, is more than conqueror.","th":["Trial & Conflict","The Person of Christ","Assurance & Security"]},{"n":2,"t":"Your Canaan to possess - this is the Father's will,\nThough Satan all his powers address to keep you earthbound still;\nChrist in that heavenly sphere has conquering gone before.\nSee! your inheritance is there, and there your holy war.","th":["The Father","Heaven & The Father's House","Trial & Conflict"]},{"n":3,"t":"Stand then in His great might, with all His strength endued;\nBut take, to arm you in the fight, the Panoply of God:\nThat having all things done, and all your conflicts passed,\nYe may o'ercome, through Christ alone, and stand entire at last.","th":["Trial & Conflict","The Person of Christ","Assurance & Security"]},{"n":4,"t":"But, above all, lay hold on faith's victorious shield;\nArmed with that adamant and gold, be sure to win the field:\nIf faith surround your heart, Satan shall be subdued;\nRepelled his every fiery dart, and quenched with God's own Word.","th":["Trial & Conflict","The Word of God","Assurance & Security"]},{"n":5,"t":"From strength to strength go on, wrestle, and fight, and pray:\nTread all the powers of darkness down, and win the well-fought day:\nStill let the Spirit cry in all His soldiers, \"Come\";\nTill Christ the Lord descend from high, and take the conquerors home.","th":["Trial & Conflict","The Holy Spirit","The Lord's Coming / Rapture"]}],"w":{"Trial & Conflict":100,"The Person of Christ":40,"Assurance & Security":60,"The Father":20,"Heaven & The Father's House":20,"The Word of God":20,"The Holy Spirit":20,"The Lord's Coming / Rapture":20}},
"218":{"m":"6-10s.","a":"James George Deck (1802-1884)","tn":"Yorkshire","tc":"J. Wainwright (1723-1768)","fl":"Soon will the Master come: soon pass away","v":[{"n":1,"t":"Soon will the Master come: soon pass away\nOur times of conflict, grief, and suffering here;\nOur night of weeping end in cloudless day,\nAnd sorrow's moment like a dream appear:\nEternity - with Jesus - in the skies -\nHow soon that Sun of righteousness may rise!","th":["The Lord's Coming / Rapture","Trial & Conflict","Heaven & The Father's House"]},{"n":2,"t":"We shall behold Him, whom not seen we love;\nWe shall be with Him, whom we long to see;\nWe shall be like Him, fit for realms above,\nWith Him, and like Him, for eternity:\nIs now to sit at Jesus' feet our choice?\nHow will fruition then our souls rejoice!","th":["The Lord's Coming / Rapture","Heaven & The Father's House","Joy & Thanksgiving","Our Love for The Son/Christ"]}],"w":{"The Lord's Coming / Rapture":100,"Trial & Conflict":50,"Heaven & The Father's House":100,"Joy & Thanksgiving":50,"Our Love for The Son/Christ":50}},
"219":{"m":"6-8s.","a":"James George Deck (1802-1884)","tn":"Melita","tc":"J. B. Dykes (1823-1876)","fl":"Lord, what is man? 'Tis He who died","v":[{"n":1,"t":"Lord, what is man? 'Tis He who died\nAnd all Thy nature glorified,\nThy righteousness and grace displayed\nWhen He for sin atonement made,\nObedient unto death, was slain -\nWorthy is He o'er all to reign.","th":["The Person of Christ","The Precious Blood / Atonement","Worship & Praise","The Cross & Sufferings of Christ","The Eternal Kingdom / Reign of Christ"]},{"n":2,"t":"Thy counsels ere the world began\nAll centred in the Son of man,\nHim destined to the highest place,\nHead of His church through sovereign grace.\nTo Him, enthroned in Majesty,\nLet every creature bend the knee.","th":["The Person of Christ","The Church / Bride of Christ","Grace","The Eternal Kingdom / Reign of Christ"]},{"n":3,"t":"Worthy O Son of man, art Thou\nOf every crown that decks Thy brow;\nWorthy art Thou to be adored\nAnd owned as universal Lord;\nOh, hasten that long-promised day\nWhen all shall own Thy rightful sway!","th":["Worship & Praise","The Person of Christ","The Eternal Kingdom / Reign of Christ"]}],"w":{"The Person of Christ":100,"The Precious Blood / Atonement":33,"Worship & Praise":67,"The Cross & Sufferings of Christ":33,"The Eternal Kingdom / Reign of Christ":100,"The Church / Bride of Christ":33,"Grace":33}},
"220":{"m":"6-8s.","a":"C. Wesley (1707-1788)","tn":"Carey","tc":"H. Carey, c. 1690-1743","fl":"Our hearts are full of Christ, and long","v":[{"n":1,"t":"Our hearts are full of Christ, and long\nTheir glorious matter to declare!\nOf Him we make our loftier song -\nWe cannot from His praise forbear:\nOur ready tongues make haste to sing\nThe glories of the heavenly King.","th":["Worship & Praise","The Person of Christ","Our Love for The Son/Christ"]},{"n":2,"t":"Fairer than all the earth-born race,\nperfect in comeliness Thou art;\nReplenished are Thy lips with grace,\nAnd full of love Thy tender heart.\nGod ever blest! we bow the knee,\nAnd own all fulness dwells in Thee.","th":["The Person of Christ","Grace","Worship & Praise","God's Love for Us"]}],"w":{"Worship & Praise":100,"The Person of Christ":100,"Our Love for The Son/Christ":50,"Grace":50,"God's Love for Us":50}},
"221":{"m":"8.7.8.7.4.7.","a":"Thomas Kelly (1769-1854)","tn":"Cwm Rhondda","tc":"J. Hughes (1873-1932)","fl":"Happy they who trust in Jesus;","v":[{"n":1,"t":"Happy they who trust in Jesus;\nSweet their portion is and sure;\nWhen the foe on others seizes,\nGod will keep His own secure:\nHappy people!\nHappy, though despised and poor.","th":["Assurance & Security","Joy & Thanksgiving"]},{"n":2,"t":"Since His love and mercy found us,\nWe are precious in His sight;\nThousands now may fall around us,\nThousands more be put to flight,\nBut His presence\nKeeps us safe by day and night.","th":["God's Love for Us","Assurance & Security"]},{"n":3,"t":"Lo, our Saviour never slumbers,\nEver watchful is His care;\nThough we cannot boast of numbers,\nIn His strength secure we are:\nSweet their portion,\nWho our Saviour's kindness share.","th":["Assurance & Security","The Person of Christ"]},{"n":4,"t":"As the bird beneath her feathers\nGuards the objects of her care,\nSo the Lord His people gathers,\nSpreads His wings, and hides them there:\nThus protected,\nAll their foes they boldly dare.","th":["Assurance & Security","God's Love for Us"]}],"w":{"Assurance & Security":100,"Joy & Thanksgiving":25,"God's Love for Us":50,"The Person of Christ":25}},
