"54":{"m":"C.M.","a":"John Newton (1725-1807)","tn":"St. Peter","tc":"A. R. Reinagle (1799-1877)","fl":"How sweet the name of Jesus sounds","v":[{"n":1,"t":"How sweet the name of Jesus sounds\nIn a believer's ear!\nIt soothes his sorrows, heals his wounds,\nAnd drives away his fear.","th":["The Person of Christ","Rest & Peace"]},{"n":2,"t":"It makes the wounded spirit whole,\nIt calms the troubled breast;\nTis manna to the hungry soul,\nAnd to the weary rest.","th":["Rest & Peace","The Person of Christ"]},{"n":3,"t":"Blest Name, the rock on which we build,\nOur shield and hiding-place;\nOur never-failing treasury, filled\nWith boundless stores of grace.","th":["Grace","Assurance & Security","The Person of Christ"]},{"n":4,"t":"Jesus, our Saviour, Shepherd, Friend,\nThou Prophet, Priest and King,\nOur Lord, our Life, our Way, our End,\nAccept the praise we bring.","th":["The Person of Christ","Worship & Praise","Christ's Intercession / Priesthood"]},{"n":5,"t":"Weak is the effort of our heart,\nAnd cold our warmest thought;\nBut when we see Thee as Thou art,\nWe'll praise Thee as we ought.","th":["Worship & Praise","Our Love for The Son/Christ"]},{"n":6,"t":"Till then we would Thy love proclaim\nWith every fleeting breath;\nAnd triumph in Thy bless\u00e8d Name\nWhich quells the power of death.","th":["Worship & Praise","Our Love for The Son/Christ"]}],"w":{"The Person of Christ":67,"Rest & Peace":33,"Grace":17,"Assurance & Security":17,"Worship & Praise":50,"Christ's Intercession / Priesthood":17,"Our Love for The Son/Christ":33}},
"55":{"m":"S.M.","a":"P. Gerhardt (1607-1676)","tn":"St. Ethelwald","tc":"W. H. Monk (1823-1889)","fl":"THROUGH waves, through clouds and storms,","v":[{"n":1,"t":"THROUGH waves, through clouds and storms,\nGod gently clears the way;\nWe wait His time; so shall the night\nSoon end in blissful day.","th":["Trial & Conflict","Assurance & Security"]},{"n":2,"t":"He everywhere hath sway,\nAnd all things serve His might;\nHis every act pure blessing is,\nHis path unsullied light.","th":["The Father","Assurance & Security"]},{"n":3,"t":"When He makes bare His arm,\nWho shall His work withstand?\nWhen He His people's cause defends,\nWho then shall stay His hand?","th":["Assurance & Security","The Father"]},{"n":4,"t":"We leave it to Himself\nTo choose and to command,\nWith wonder filled, we soon shall see\nHow wise, how strong His hand.","th":["Assurance & Security","The Father"]},{"n":5,"t":"We comprehend Him not,\nYet earth and heaven tell\nGod sits as sovereign on the throne,\nAnd ruleth all things well.","th":["The Father","Assurance & Security"]}],"w":{"Trial & Conflict":20,"Assurance & Security":100,"The Father":80}},
"56":{"m":"7.6.","a":"Mary Bowley (Mrs Peters) (1813-1856)","tn":"Watcher","tc":"E. L. White","fl":"O LORD, how blest our journey,","v":[{"n":1,"t":"O LORD, how blest our journey,\nThough here on earth we roam,\nWho find in Abba's favour\nOur spirit's present home:\nFor where Thou now art sitting\nBy faith we've found repose,\nFree to look up to heaven,\nSince our blest Head arose.","th":["The Father","Sonship & Adoption","Pilgrimage / Desert Journey","Rest & Peace","Christ Risen & Glorified"]},{"n":2,"t":"In spirit there already;\nSoon we ourselves shall be\nIn soul and body perfect,\nAll glorified, with Thee:\nThy Father's love sustains us\nAlong the thorny way,\nThy Father's house, the dwelling\nMade ready for that day.","th":["Heaven & The Father's House","God's Love for Us","Pilgrimage / Desert Journey"]},{"n":3,"t":"The Comforter, now present,\nAssures us of Thy love;\nHe is the bless\u00e8d earnest\nOf glory there above:\nThe river of Thy pleasure\nIs what sustains us now,\nTill Thy new name's imprinted\nOn every sinless brow.","th":["The Holy Spirit","God's Love for Us","Assurance & Security"]},{"n":4,"t":"Lord, we await Thy glory;\nWe have no home but there,\nWhere the adopted family\nWith Thee Thy joy shall share.\nNo place can fully please us\nWhere Thou, O Lord, art not;\nIn Thee, and with Thee, ever\nIs found, by grace, our lot.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","Sonship & Adoption","Grace"]}],"w":{"The Father":25,"Sonship & Adoption":50,"Pilgrimage / Desert Journey":50,"Rest & Peace":25,"Christ Risen & Glorified":25,"Heaven & The Father's House":50,"God's Love for Us":50,"The Holy Spirit":25,"Assurance & Security":25,"The Lord's Coming / Rapture":25,"Grace":25}},
"57":{"m":"8.7.","a":"Julius Anton Eugen Wilhelm von Poseck,(1816-1896)","tn":"Rhineland","tc":"W. Brockhaus (1819-1888)","fl":"ON the Lamb our souls are resting,","v":[{"n":1,"t":"ON the Lamb our souls are resting,\nWhat His love no tongue can say;\nAll our sins, so great, so many,\nIn His blood are washed away.","th":["The Lamb of God","God's Love for Us","Forgiveness of Sins","The Precious Blood / Atonement"]},{"n":2,"t":"Sweetest rest and peace have filled us,\nSweeter praise than tongue can tell;\nGod is satisfied with Jesus,\nWe are satisfied as well.","th":["Rest & Peace","Worship & Praise"]},{"n":3,"t":"Conscience now no more condemns us,\nFor His own most precious blood\nOnce for all has washed and cleansed us -\nCleansed us in the eyes of God.","th":["Forgiveness of Sins","The Precious Blood / Atonement","Assurance & Security"]},{"n":4,"t":"Filled with this sweet peace for ever,\nOn we go, through strife and care,\nTill we find that peace around us\nIn the Lamb's high glory there.","th":["Rest & Peace","Pilgrimage / Desert Journey","Heaven & The Father's House"]}],"w":{"The Lamb of God":25,"God's Love for Us":25,"Forgiveness of Sins":50,"The Precious Blood / Atonement":50,"Rest & Peace":50,"Worship & Praise":25,"Assurance & Security":25,"Pilgrimage / Desert Journey":25,"Heaven & The Father's House":25}},
"58":{"m":"8.7.","a":"Miss Catherine Helene von Poseck (1859-1953)","tn":"Holy Care","tc":"Anonymous","fl":"\"ABBA, Father\", words of mercy,","v":[{"n":1,"t":"\"ABBA, Father\", words of mercy,\nWords of comfort, words of love,\nCovering all our needs and longings\nTill we reach our home above!","th":["The Father","Sonship & Adoption","God's Love for Us","Heaven & The Father's House"]},{"n":2,"t":"Jesus prayed for us, O Father,\nEre He left this world of woe,\nAsking Thee to guard and keep us\nSafely all our path below.","th":["Christ's Intercession / Priesthood","The Father","Assurance & Security"]},{"n":3,"t":"Holy Father - such His pleading -\nKeep, O keep them in Thy name;\nAs Thou lovedst Me, O Father,\nThou hast lov\u00e8d them the same.","th":["Christ's Intercession / Priesthood","The Father","God's Love for Us"]},{"n":4,"t":"Thus by God the Son committed\nTo the Father's tender care,\nThus by God the Father lov\u00e8d,\nCan we doubt, or can we fear?","th":["Assurance & Security","God's Love for Us","The Father"]}],"w":{"The Father":100,"Sonship & Adoption":25,"God's Love for Us":75,"Heaven & The Father's House":25,"Christ's Intercession / Priesthood":50,"Assurance & Security":50}},
"59":{"m":"L.M.","a":"Thomas Henry Reynolds (1830-1930)","tn":"Maryton","tc":"H. P. Smith (1825-1898)","fl":"O GOD, Thou hast engaged our hearts","v":[{"n":1,"t":"O GOD, Thou hast engaged our hearts\nWith Christ Thy well-belov\u00e8d Son;\nThy love a holy joy imparts,\nA joy which He for us hath won.","th":["The Father","The Person of Christ","God's Love for Us","Joy & Thanksgiving"]},{"n":2,"t":"Assured in faith we enter now\nThy presence, where, most bless\u00e8d God,\nThy glory rests upon His brow,\nWho brought us nigh to Thee by blood.","th":["The Precious Blood / Atonement","Worship & Praise","The Father"]},{"n":3,"t":"To Him Thy voice from out the cloud\nOnce spake Thy deep, Thy full delight;\nAnd now without a veil to shroud,\nIn Him shines forth Thy glory bright.","th":["The Father","The Person of Christ"]},{"n":4,"t":"'Tis Jesus fills that holy place\nWhere glory dwells, and Thy deep love\nIn its own fulness (known through grace)\nRests where He lives, in heaven above.","th":["The Person of Christ","Heaven & The Father's House","God's Love for Us","Grace"]},{"n":5,"t":"Yet, midst Thine own the Spirit still\nBears witness of His glory there,\nAnd from the sphere which He doth fill\nBrings knowledge of His fulness here.","th":["The Holy Spirit","The Person of Christ"]},{"n":6,"t":"Our God we bless Thee, Father Thou\nOf Him Thy well-belov\u00e8d Son;\nAs blest in Him before Thee bow,\nAnd joy in all that love has done.","th":["The Father","Worship & Praise","The Person of Christ"]}],"w":{"The Father":67,"The Person of Christ":83,"God's Love for Us":33,"Joy & Thanksgiving":17,"The Precious Blood / Atonement":17,"Worship & Praise":33,"Heaven & The Father's House":17,"Grace":17,"The Holy Spirit":17}},
"60":{"m":"6.6.6.6.8.8.","a":"I Watts (1674-1748)","tn":"Millennium","tc":"Anonymous","fl":"OUR thanks to God most high,","v":[{"n":1,"t":"OUR thanks to God most high,\nThe Father of our Lord,\nThe Saviour-God is He,\nAnd be His name adored;\nO God, Thy mercy shall endure,\nThy word abide for ever sure.","th":["Worship & Praise","The Father","The Word of God"]},{"n":2,"t":"He sent His only Son\nAnd saved us from our woe -\nFrom ruin, guilt, and hell,\nAnd every hurtful foe;\nThy mercy, Lord, shall still endure,\nThy word abide for ever sure.","th":["Redemption","God's Love for Us","Forgiveness of Sins"]},{"n":3,"t":"Give thanks aloud to God,\nTo God your praises bring,\nTo God upon His throne\nHis works and glories sing;\nHis power and grace are still the same\nLet endless praise exalt His name.","th":["Worship & Praise","The Father"]}],"w":{"Worship & Praise":67,"The Father":67,"The Word of God":33,"Redemption":33,"God's Love for Us":33,"Forgiveness of Sins":33}},
"61":{"m":"8s.","a":"Robert Hawker (1753-1827)","tn":"Elland","tc":"J. Langran (1835-1909)","fl":"How wondrous the glories that meet","v":[{"n":1,"t":"How wondrous the glories that meet\nIn Jesus, and from His face shine!\nHis love is eternal and sweet,\n'Tis human, 'tis also divine.","th":["The Person of Christ","God's Love for Us"]},{"n":2,"t":"His glory - not only God's Son,\nIn manhood He had His full part;\nAnd the union of both joined in one\nForms the fountain of love in His heart.","th":["The Person of Christ","God's Love for Us"]},{"n":3,"t":"The infinite worth of His blood\nHas freed us from hell and from fear,\nThat we, as the blest sons of God,\nMay make His good pleasure our care.","th":["The Precious Blood / Atonement","Sonship & Adoption","Redemption"]},{"n":4,"t":"O then may His glory and love\nMake us walk in the service of heaven,\n'Mid obedience and suffering to prove\nThat we to the Lamb have been given.","th":["Service & Devotion","The Lamb of God","Our Love for The Son/Christ"]}],"w":{"The Person of Christ":50,"God's Love for Us":50,"The Precious Blood / Atonement":25,"Sonship & Adoption":25,"Redemption":25,"Service & Devotion":25,"The Lamb of God":25,"Our Love for The Son/Christ":25}},
"62":{"m":"8.7.8.7.7.7.","a":"Thomas Kelly (1769-1854)","tn":"Irby","tc":"H. J. Gauntlett (1805-1876)","fl":"IN the Lord we have redemption,","v":[{"n":1,"t":"IN the Lord we have redemption,\nFull remission in His blood,\nFrom the curse entire exemption,\nFrom the curse pronounced by God:\nWhat a Saviour Jesus is!\nO what grace, what love is His!","th":["Redemption","The Precious Blood / Atonement","Forgiveness of Sins","Grace"]},{"n":2,"t":"Sweet His name, that name transcending\nEvery name on earth, in heaven:\nPraise, through ages never-ending,\nTo the Son of God be given!\nHe alone the Saviour is,\nEverlasting praise be His!","th":["The Person of Christ","Worship & Praise"]}],"w":{"Redemption":50,"The Precious Blood / Atonement":50,"Forgiveness of Sins":50,"Grace":50,"The Person of Christ":50,"Worship & Praise":50}},
"63":{"m":"8.7.","a":"Samuel Prideaux Tregelles (1813-1875)","tn":"Nettleton","tc":"J. Wyeth (1770-1858)","fl":"SON of God! with joy we praise Thee,","v":[{"n":1,"t":"SON of God! with joy we praise Thee,\nOn the Father's throne above;\nAll Thy wondrous work displays Thee,\nFull of grace and full of love!\nLord, accept our adoration -\nFor our sins Thou once wast slain;\nThrough Thy blood we have salvation,\nSoon shall share Thine endless reign.","th":["The Person of Christ","Christ Risen & Glorified","Worship & Praise","The Precious Blood / Atonement","Redemption","The Eternal Kingdom / Reign of Christ"]},{"n":2,"t":"God, in Thee His love unfolding,\nShows how vast, how rich His grace;\nBlest our lot, with joy beholding\nAll His glory in Thy face.\nOh! the mercy which hath blessed us,\nPurposed thus ere time began,\nMercy which in Thee hath kept us,\nMercy vast, like heaven's span.","th":["The Father","Grace","God's Love for Us"]}],"w":{"The Person of Christ":50,"Christ Risen & Glorified":50,"Worship & Praise":50,"The Precious Blood / Atonement":50,"Redemption":50,"The Eternal Kingdom / Reign of Christ":50,"The Father":50,"Grace":50,"God's Love for Us":50}},
"64":{"m":"S.M.","a":"John Nelson Darby (1800-1882)","tn":"Terra Beata","tc":"F. L. Shepherd (1852-1930)","fl":"OH bright and bless\u00e8d scenes!","v":[{"n":1,"t":"OH bright and bless\u00e8d scenes!\nWhere sin can never come,\nWhose sight our longing spirit weans\nFrom earth where yet we roam.","th":["Heaven & The Father's House","Separation from the World"]},{"n":2,"t":"And can we call our home\nOur Father's house on high,\nThe rest of God our rest to come,\nOur place of liberty?","th":["Heaven & The Father's House","The Father","Rest & Peace"]},{"n":3,"t":"Yes! in that light unstained,\nOur stainless souls shall live,\nOur heart's deep longings more than gained,\nWhen God His rest shall give.","th":["Heaven & The Father's House","Rest & Peace"]},{"n":4,"t":"His presence there, my soul\nIts rest, its joy untold\nShall find, when endless ages roll,\nAnd time shall ne'er grow old.","th":["Heaven & The Father's House","Rest & Peace","Joy & Thanksgiving"]},{"n":5,"t":"Our God the centre is,\nHis presence fills that land,\nAnd countless myriads owned as His,\nRound Him adoring stand.","th":["Heaven & The Father's House","Worship & Praise"]},{"n":6,"t":"Our God whom we have known,\nWell known in Jesus' love,\nRests in the blessing of His own,\nBefore Himself above.","th":["God's Love for Us","The Person of Christ","Rest & Peace"]},{"n":7,"t":"Glory supreme is there,\nGlory that shines through all,\nMore precious still that love to share\nAs those that love did call.","th":["Heaven & The Father's House","God's Love for Us"]},{"n":8,"t":"Like Jesus in that place\nOf light and love supreme!\nOnce Man of Sorrows full of grace,\nHeaven's blest and endless theme!","th":["The Person of Christ","Heaven & The Father's House","Grace"]},{"n":9,"t":"Like Him! O grace supreme!\nLike Him before Thy face,\nLike Him to know that glory beam\nUnhindered face to face!","th":["Heaven & The Father's House","Grace"]},{"n":10,"t":"Oh, love supreme and bright,\nGood to the feeblest heart,\nThat gives us now, as heavenly light,\nWhat soon shall be our part!","th":["God's Love for Us","Heaven & The Father's House"]}],"w":{"Heaven & The Father's House":90,"Separation from the World":10,"The Father":10,"Rest & Peace":40,"Joy & Thanksgiving":10,"Worship & Praise":10,"God's Love for Us":30,"The Person of Christ":20,"Grace":20}},
"65":{"m":"8.8.7.8.8.8.7.","a":"Joseph Swain (1761-1796)","tn":"Pearsfield","tc":"J. H. Knecht (1752-1817)","fl":"OH how the thought that I shall know","v":[{"n":1,"t":"OH how the thought that I shall know\nJesus who suffered here below,\nTo manifest God's favour\nFor me, and for the saints I love,\nBoth here, and with Himself above,\nDoth my renew\u00e8d nature move\nAt that sweet word, \"For ever!\"","th":["Heaven & The Father's House","The Person of Christ","Joy & Thanksgiving"]},{"n":2,"t":"For ever to behold Him shine!\nFor evermore to call Him mine!\nAnd see Him still before me:\nFor ever on His face to gaze,\nAnd meet the full assembled rays,\nWhile all His beauty He displays\nTo all the saints in glory!","th":["Heaven & The Father's House","The Person of Christ","Worship & Praise"]},{"n":3,"t":"Not all things else are half so dear\nAs is His blissful presence here,\nWhat will it be in heaven!\n'Tis heaven on earth that we can say,\nAs now we journey, day by day,\n\"Himself has borne our guilt away,\nOur sins are all forgiven.\"","th":["Forgiveness of Sins","Rest & Peace","Assurance & Security"]},{"n":4,"t":"But how will His celestial voice\nMake each enraptured heart rejoice,\nOf saints in glory near Him!\nWhen we no longer absent wait,\nBut like Him in His glorious state\nWhere nought our bliss can e'er abate,\nWith joy in heaven shall hear Him!","th":["Heaven & The Father's House","Joy & Thanksgiving"]}],"w":{"Heaven & The Father's House":75,"The Person of Christ":50,"Joy & Thanksgiving":50,"Worship & Praise":25,"Forgiveness of Sins":25,"Rest & Peace":25,"Assurance & Security":25}},
"66":{"m":"P.M.","a":"John Thomas Mawson (1871-1943)","tn":"Only Remembered","tc":"Ira D. Sankey (1840-1908)","fl":"LORD Thou hast sought, and with blood Thou hast bought me,","v":[{"n":1,"t":"LORD Thou hast sought, and with blood Thou hast bought me,\nSnapped are my fetters, the captive is free;\nOut of my sins unto God Thou hast brought me:\nHoly Redeemer, I sing unto Thee.","th":["Redemption","The Precious Blood / Atonement","Worship & Praise"]},{"n":2,"t":"Great was the love, Lord, that brought Thee from glory,\nGreat the compassion that led Thee to die,\nGreat is the joy of Thy wondrous salvation,\nGreat is Thy glory, my Saviour, I cry.","th":["God's Love for Us","The Cross & Sufferings of Christ","Joy & Thanksgiving","Redemption"]},{"n":3,"t":"Nought but Thy favour can please me, O Saviour,\nNought but Thy love can my soul satisfy;\nO keep me near Thee, and ne'er let me grieve Thee,\nFill Thou my heart with Thy grace from on high.","th":["Grace","Service & Devotion","Our Love for The Son/Christ"]}],"w":{"Redemption":67,"The Precious Blood / Atonement":33,"Worship & Praise":33,"God's Love for Us":33,"The Cross & Sufferings of Christ":33,"Joy & Thanksgiving":33,"Grace":33,"Service & Devotion":33,"Our Love for The Son/Christ":33}},
"67":{"m":"7.6.","a":"Alexander Carruthers (1860-1930)","tn":"Dublin","tc":"Mrs J. C. Trench, c. 1880","fl":"We bless Thee, God and Father,","v":[{"n":1,"t":"We bless Thee, God and Father,\nWe joy before Thy face;\nBeyond dark death for ever,\nWe share Thy Son's blest place.\nHe lives a Man before Thee,\nIn cloudless light above,\nIn Thine unbounded favour -\nThine everlasting love.","th":["The Father","Worship & Praise","Sonship & Adoption","God's Love for Us","Christ Risen & Glorified"]},{"n":2,"t":"His Father, and our Father,\nHis God and ours Thou art;\nAnd He is Thy Belov\u00e8d,\nThe gladness of Thy heart.\nWe're His, in joy He brings us\nTo share His part and place;\nTo know Thy love and favour,\nThe shining of Thy face.","th":["The Father","Sonship & Adoption","God's Love for Us","Joy & Thanksgiving"]},{"n":3,"t":"Thy love that now enfolds us\nCan ne'er wax cold or dim;\nIn Him that love doth centre,\nAnd we are loved in Him;\nIn Him Thy love and glory\nFind their eternal rest;\nThe many sons - His brethren -\nIn Him, how near, how blest!","th":["God's Love for Us","Assurance & Security","Sonship & Adoption"]}],"w":{"The Father":67,"Worship & Praise":33,"Sonship & Adoption":100,"God's Love for Us":100,"Christ Risen & Glorified":33,"Joy & Thanksgiving":33,"Assurance & Security":33}},
"68":{"m":"7.7.8.7.","a":"Samuel Prideaux Tregelles (1813-1875)","tn":"Cyprus","tc":"Anonymous","fl":"THY name we bless, Lord Jesus,","v":[{"n":1,"t":"THY name we bless, Lord Jesus,\nThat name all names excelling;\nHow great Thy love all praise above\nShould every tongue be telling.\nThe Father's loving-kindness\nIn giving Thee was shown us;\nNow by Thy blood redeemed to God,\nAs children He doth own us.","th":["The Person of Christ","Worship & Praise","The Father","Redemption","The Precious Blood / Atonement","Sonship & Adoption"]},{"n":2,"t":"From that eternal glory\nThou hadst with God the Father,\nHe gave His Son that He in one\nHis children all might gather:\nOur sins were all laid on Thee,\nGod's wrath Thou hast endured;\nIt was for us Thou sufferedst thus,\nAnd hast our peace secur\u00e8d.","th":["The Person of Christ","The Cross & Sufferings of Christ","Forgiveness of Sins","The Father","Rest & Peace"]},{"n":3,"t":"Thou from the dead wast raised,\nAnd from all condemnation\nThy saints are free, as risen in Thee,\nHead of the new creation.\nOn high Thou hast ascended\nTo God's right hand in heaven,\nThe Lamb once slain, alive again,\nTo Thee all power is given.","th":["Christ Risen & Glorified","New Creation","The Lamb of God"]},{"n":4,"t":"Thou hast bestowed the earnest\nOf that we shall inherit;\nTill Thou shalt come to take us home,\nWe're sealed by God the Spirit.\nWe wait for Thy returning,\nWhen we shall know more fully\nThe grace divine that made us Thine,\nThou Lamb of God most holy.","th":["The Holy Spirit","The Lord's Coming / Rapture","Grace","The Lamb of God","Assurance & Security"]}],"w":{"The Person of Christ":50,"Worship & Praise":25,"The Father":50,"Redemption":25,"The Precious Blood / Atonement":25,"Sonship & Adoption":25,"The Cross & Sufferings of Christ":25,"Forgiveness of Sins":25,"Rest & Peace":25,"Christ Risen & Glorified":25,"New Creation":25,"The Lamb of God":50,"The Holy Spirit":25,"The Lord's Coming / Rapture":25,"Grace":25,"Assurance & Security":25}},
"69":{"m":"L.M.","a":"Henri Abraham Cesar Malan (1787-1864)","tn":"Malan","tc":"Henri Abraham Cesar Malan (1787-1864)","fl":"THOU, Lamb of God, didst shed Thy blood,","v":[{"n":1,"t":"THOU, Lamb of God, didst shed Thy blood,\nThou didst our load of misery bear;\nAnd hast exalted us to share\nThe rank of kings and priests to God.","th":["The Lamb of God","The Precious Blood / Atonement","Redemption"]},{"n":2,"t":"To Thee we render evermore\nThe honour, glory, praise that's due;\nMight, power, and glad obedience too,\nAnd in our hearts we Thee adore,\nAmen! Amen! O Lord. Amen!","th":["Worship & Praise","Our Love for The Son/Christ"]}],"w":{"The Lamb of God":50,"The Precious Blood / Atonement":50,"Redemption":50,"Worship & Praise":50,"Our Love for The Son/Christ":50}},
"70":{"m":"6.5.","a":"Miss C. A. Wellesley","tn":"Penitence","tc":"S. Lane (1843-1903)","fl":"LORD, our hearts are burning","v":[{"n":1,"t":"LORD, our hearts are burning\nFor the glorious day,\nWhen at Thy returning\nAll shall own Thy sway.\nChains shall break before Thee,\nMighty King of kings;\nAngels will adore Thee,\nWhile creation sings.","th":["The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ","Worship & Praise"]},{"n":2,"t":"Tender, loving Saviour,\nLamb that once was slain,\nSaints will through Thy favour\nNever weep again.\nGently Thou wilt lead them\nWhere the river flows,\nOn its banks wilt feed them\nIn divine repose.","th":["The Lamb of God","God's Love for Us","Rest & Peace","Heaven & The Father's House"]},{"n":3,"t":"Prince of life and glory,\nShine before our eyes,\nAnd let Calvary's story\nSound through earth and skies;\nLamb of God, receive us\nTo yon peaceful shore;\nCome again, Lord Jesus,\nReign for evermore.","th":["The Lord's Coming / Rapture","The Cross & Sufferings of Christ","The Lamb of God","The Eternal Kingdom / Reign of Christ"]}],"w":{"The Lord's Coming / Rapture":67,"The Eternal Kingdom / Reign of Christ":67,"Worship & Praise":33,"The Lamb of God":67,"God's Love for Us":33,"Rest & Peace":33,"Heaven & The Father's House":33,"The Cross & Sufferings of Christ":33}},
"71":{"m":"7.7.7.7.","a":"Robert Cleaver Chapman (1803-1902)","tn":"Mercy","tc":"L. M. Gottschalk (1829-1869)","fl":"OH, my Saviour crucified","v":[{"n":1,"t":"OH, my Saviour crucified\nNear Thy cross would I abide,\nGazing with adoring eye\nOn Thy dying agony.","th":["The Cross & Sufferings of Christ","Worship & Praise"]},{"n":2,"t":"Jesus bruised and put to shame,\nTells the glories of God's name;\nHoly judgment there I found,\nGrace did there o'er sin abound.","th":["The Cross & Sufferings of Christ","Grace","Forgiveness of Sins"]},{"n":3,"t":"God is love I surely know,\nIn the Saviour's depth of woe,\nIn the Sinless, in God's sight,\nSin is justly brought to light.","th":["God's Love for Us","The Cross & Sufferings of Christ"]},{"n":4,"t":"In His spotless soul's distress,\nI have learnt my guiltiness;\nOh how vile my low estate,\nSince my ransom was so great!","th":["The Cross & Sufferings of Christ","Redemption"]},{"n":5,"t":"Rent the veil that closed the way\nTo my home of heavenly day,\nIn the flesh of Christ the Lord,\nEver be His name adored!","th":["The Cross & Sufferings of Christ","Heaven & The Father's House","Worship & Praise"]},{"n":6,"t":"Yet in sight of Calvary,\nContrite should my spirit be,\nRest and holiness there find\nFashioned like my Saviour's mind.","th":["The Cross & Sufferings of Christ","Rest & Peace"]}],"w":{"The Cross & Sufferings of Christ":100,"Worship & Praise":33,"Grace":17,"Forgiveness of Sins":17,"God's Love for Us":17,"Redemption":17,"Heaven & The Father's House":17,"Rest & Peace":17}},
"72":{"m":"CM.","a":"George V. Wigram (1805-1879)","tn":"Azmon","tc":"C. G. Glaeser (1784-1829)","fl":"WELL may we sing, with triumph sing,","v":[{"n":1,"t":"WELL may we sing, with triumph sing,\nThe great Redeemer's praise!\nThe glories of the living God,\nRevealed in Jesus' face.","th":["Worship & Praise","The Person of Christ","Redemption"]},{"n":2,"t":"The love of God it was that sought\nFrom sin to set us free.\nThat gave the Son, whose precious blood\nHas wrought our liberty.","th":["God's Love for Us","Redemption","The Precious Blood / Atonement"]},{"n":3,"t":"In Him we read the Father's love,\nAnd find eternal peace;\nWe meet in Him a Saviour-God,\nAnd fear and terror cease.","th":["The Father","Rest & Peace","The Person of Christ"]},{"n":4,"t":"Then gladly sing, and sound abroad\nThe great Redeemer's praise;\nThe glories of the living God,\nThe riches of His grace!","th":["Worship & Praise","Redemption","Grace"]}],"w":{"Worship & Praise":50,"The Person of Christ":50,"Redemption":75,"God's Love for Us":25,"The Precious Blood / Atonement":25,"The Father":25,"Rest & Peace":25,"Grace":25}},
"73":{"m":"6.5.","a":"John Samuel Bowley Monsell (1811-1875)","tn":"St. Albans","tc":"Franz Joseph Haydn (1732-1809)","fl":"ON our way rejoicing","v":[{"n":1,"t":"ON our way rejoicing\nAs we homeward move,\nHearken to our praises,\nO Thou God of love.\nIs there grief or sadness?\nThou our joy shalt be;\nIs our sky beclouded?\nLight is found in Thee.","th":["Pilgrimage / Desert Journey","Joy & Thanksgiving","God's Love for Us"]},{"n":2,"t":"On our way rejoicing,\nGladly let us go;\nJesus is our Leader,\nConquered is our foe.\nChrist without, our safety;\nChrist within, our joy;\nWho, if we but trust Him,\nCan our hope destroy?","th":["Joy & Thanksgiving","Assurance & Security","The Person of Christ"]},{"n":3,"t":"Unto God the Father\nJoyful songs we sing;\nUnto God the Saviour\nThankful hearts we bring;\nLed by God the Spirit,\nGladly we adore:\nOn our way rejoicing,\nNow and evermore.","th":["The Father","Worship & Praise","The Holy Spirit","Joy & Thanksgiving"]}],"w":{"Pilgrimage / Desert Journey":33,"Joy & Thanksgiving":100,"God's Love for Us":33,"Assurance & Security":33,"The Person of Christ":33,"The Father":33,"Worship & Praise":33,"The Holy Spirit":33}},
"74":{"m":"8.7.8.5.","a":"Kate Barclay Wilkinson (1859-1928)","tn":"St. Leonards","tc":"A. C. Barham-Gould (1891-1953)","fl":"MAY the mind of Christ my Saviour","v":[{"n":1,"t":"MAY the mind of Christ my Saviour\nLive in me from day to day,\nBy His love and power controlling\nAll I do and say.","th":["The Person of Christ","Service & Devotion"]},{"n":2,"t":"May the Word of God dwell richly\nIn my heart from hour to hour,\nSo that all may see I triumph\nOnly through His power.","th":["The Word of God","Service & Devotion"]},{"n":3,"t":"May the peace of God my Father\nRule my life in everything,\nThat I may be calm to comfort\nSick and sorrowing.","th":["Rest & Peace","The Father","Service & Devotion"]},{"n":4,"t":"May the love of Jesus fill me,\nAs the waters fill the sea;\nHim exalting, self abasing,\nThis is victory.","th":["Service & Devotion","Our Love for The Son/Christ"]},{"n":5,"t":"May I run the race before me,\nStrong and brave to face the foe,\nLooking only unto Jesus\nAs I onward go.","th":["Service & Devotion","Trial & Conflict"]},{"n":6,"t":"May His beauty rest upon me\nAs I seek the lost to win,\nAnd may they forget the channel,\nSeeing only Him.","th":["Service & Devotion","The Person of Christ"]}],"w":{"The Person of Christ":33,"Service & Devotion":100,"The Word of God":17,"Rest & Peace":17,"The Father":17,"Our Love for The Son/Christ":17,"Trial & Conflict":17}},
"75":{"m":"C.M.","a":"Albert Midlane (1825-1909)","tn":"Sawley","tc":"J. J. Walch (1837-1901)","fl":"\"NO separation\"! - O my soul,","v":[{"n":1,"t":"\"NO separation\"! - O my soul,\n'Tis God who speaks the word;\nSo close the Spirit thee unites\nWith Christ, thy risen Lord.","th":["The Holy Spirit","Assurance & Security","Christ Risen & Glorified"]},{"n":2,"t":"\"No separation\"! - thou art His,\nAnd His for evermore;\nUpon the cross thy debt He paid,\nAnd all thy judgment bore.","th":["Assurance & Security","The Cross & Sufferings of Christ","The Precious Blood / Atonement"]},{"n":3,"t":"\"No separation\"! - precious word!\nIn it, my soul, be glad;\nLoved with an everlasting love,\nAnd one with Jesus made.","th":["God's Love for Us","Assurance & Security","Joy & Thanksgiving"]},{"n":4,"t":"\"No separation\"! - Life nor death,\nThings present nor to come,\nCan part thee from His precious care,\nOr rob thee of thy home.","th":["Assurance & Security","God's Love for Us"]},{"n":5,"t":"\"No separation\"! - Linked with Him,\nHis glory - all is thine;\nOh, wondrous love, that thus could plan\nA union so divine!","th":["Assurance & Security","God's Love for Us","Heaven & The Father's House"]}],"w":{"The Holy Spirit":20,"Assurance & Security":100,"Christ Risen & Glorified":20,"The Cross & Sufferings of Christ":20,"The Precious Blood / Atonement":20,"God's Love for Us":60,"Joy & Thanksgiving":20,"Heaven & The Father's House":20}},
"76":{"m":"8.7.","a":"John Nelson Darby (1800-1882)","tn":"Beecher","tc":"J. Zundel (1815-1882)","fl":"RISE, my soul, thy God directs thee;","v":[{"n":1,"t":"RISE, my soul, thy God directs thee;\nStranger hands no more impede;\nPass thou on, His hand protects thee,\nStrength that has the captive freed.","th":["Pilgrimage / Desert Journey","Redemption","Assurance & Security"]},{"n":2,"t":"Is the wilderness before thee,\nDesert lands where drought abides?\nHeavenly springs shall there restore thee,\nFresh from God's exhaustless tides.","th":["Pilgrimage / Desert Journey","God's Love for Us"]},{"n":3,"t":"Light divine surrounds thy going,\nGod Himself shall mark thy way;\nSecret blessings, richly flowing,\nLead to everlasting day.","th":["Pilgrimage / Desert Journey","Assurance & Security"]},{"n":4,"t":"God, thine everlasting portion,\nFeeds thee with the mighty's meat;\nPrice of Egypt's hard extortion,\nEgypt's food no more to eat.","th":["Pilgrimage / Desert Journey","Separation from the World"]},{"n":5,"t":"Art thou weaned from Egypt's pleasures?\nGod in secret thee shall keep,\nThere unfold His hidden treasures,\nThere His love's exhaustless deep.","th":["Separation from the World","God's Love for Us"]},{"n":6,"t":"In the desert God will teach thee\nWhat the God that thou hast found,\nPatient, gracious, powerful, holy;\nAll His grace shall there abound.","th":["Pilgrimage / Desert Journey","Grace"]},{"n":7,"t":"On to Canaan's rest still wending,\nE'en thy wants and woes shall bring\nSuited grace from high descending,\nThou shalt taste of mercy's spring.","th":["Pilgrimage / Desert Journey","Rest & Peace","Grace"]},{"n":8,"t":"Though thy way be long and dreary,\nEagle strength He'll still renew:\nGarments fresh and foot unweary\nTell how God hath brought thee through.","th":["Pilgrimage / Desert Journey","Assurance & Security"]},{"n":9,"t":"When to Canaan's long-loved dwelling\nLove divine thy foot shall bring,\nThere with shouts of triumph swelling,\nZion's songs in rest to sing,","th":["Heaven & The Father's House","Rest & Peace","Worship & Praise"]},{"n":10,"t":"There no stranger - God shall meet thee,\nStranger thou in courts above.\nHe who to His rest shall greet thee,\nGreets thee with a well-known love.","th":["Heaven & The Father's House","God's Love for Us"]}],"w":{"Pilgrimage / Desert Journey":70,"Redemption":10,"Assurance & Security":30,"God's Love for Us":30,"Separation from the World":20,"Grace":20,"Rest & Peace":20,"Heaven & The Father's House":20,"Worship & Praise":10}},
"77":{"m":"11.10.11.10. Dactylic","a":"H. Sattler","tn":"Epiphany Hymn","tc":"J. F. Thrupp (1827-1867)","fl":"FATHER of glory, our songs we are raising;","v":[{"n":1,"t":"FATHER of glory, our songs we are raising;\nSuch is Thy love, and so blessedly shown!\nWe are united in heart and in praising;\nHigh we extol Thee, Thy glory we own.","th":["The Father","Worship & Praise","God's Love for Us"]},{"n":2,"t":"Him Thou hast given - unspeakable giving,\nFather of glory - the Son of Thy love!\nGlorious answer - response of the living -\nSons ever with Thee, O Father, above.","th":["The Father","Sonship & Adoption","God's Love for Us"]},{"n":3,"t":"Yea, He has told us the wonderful secrets,\nFather of glory, once hidden from man;\nFully revealed now to us by Thy Spirit,\nAll Thou desiredst - eternity's plan!","th":["The Holy Spirit","The Father"]},{"n":4,"t":"Father of glory, we bow and adore Thee!\nRestful our hearts as we wondering gaze.\nOh with what joy shall we offer before Thee\nIn the repose of Thy glory, our praise!","th":["The Father","Worship & Praise","Heaven & The Father's House"]}],"w":{"The Father":100,"Worship & Praise":50,"God's Love for Us":50,"Sonship & Adoption":25,"The Holy Spirit":25,"Heaven & The Father's House":25}},
"78":{"m":"7.6.","a":"Frances George Burkitt (1864-1929)","tn":"Ellacombe","tc":"Anonymous","fl":"LORD, while we wait the moment","v":[{"n":1,"t":"LORD, while we wait the moment\nWhen we shall see Thy face,\nWe daily prove the sweetness\nOf Thy sustaining grace;\nYea, daily find the comfort\nOf Thine unfailing love,\nTill we shall know its fulness\nWhen with Thee, Lord, above.","th":["The Lord's Coming / Rapture","Grace","God's Love for Us"]},{"n":2,"t":"And yet while in the desert,\nWhat lessons do we learn,\nAs on our homeward journey\nThou mak'st our hearts to burn!\nThe living water flowing\nFrom life's perennial spring,\nThe daily manna coming,\nFresh praises daily bring.","th":["Pilgrimage / Desert Journey","Joy & Thanksgiving"]},{"n":3,"t":"And oh, what loud thanksgiving\nShall fill that home of love,\nAs we survey the pathway\nWhich led to Thee above!\nThere in the light unsullied\nWe'll see how great Thy care,\nWhich watched our every footstep,\nTill we Thy rest should share.","th":["Heaven & The Father's House","Joy & Thanksgiving","Worship & Praise"]}],"w":{"The Lord's Coming / Rapture":33,"Grace":33,"God's Love for Us":33,"Pilgrimage / Desert Journey":33,"Joy & Thanksgiving":67,"Heaven & The Father's House":33,"Worship & Praise":33}},
"79":{"m":"S.M.","a":"John Nelson Darby (1800-1882)","tn":"Diademata","tc":"G. J. Elvey (1816-1893)","fl":"REST of the saints above,","v":[{"n":1,"t":"REST of the saints above,\nJerusalem of God,\nWho in thy palaces of love,\nThy golden streets have trod,","th":["Heaven & The Father's House","Rest & Peace"]},{"n":2,"t":"To me thy joy to tell -\nThose courts secure from ill,\nWhere God Himself vouchsafes to dwell,\nAnd every bosom fill?","th":["Heaven & The Father's House"]},{"n":3,"t":"Who shall to me that joy\nOf saint-thronged courts declare,\nTell of that constant sweet employ\nMy spirit longs to share?","th":["Heaven & The Father's House","Worship & Praise"]},{"n":4,"t":"That rest secure from ill,\nNo cloud of grief e'er stains;\nUnfailing praise each heart doth fill,\nAnd love eternal reigns.","th":["Rest & Peace","Heaven & The Father's House","God's Love for Us"]},{"n":5,"t":"The Lamb is there, my soul;\nThere, God Himself doth rest,\nIn love divine diffused through all\nWith Him supremely blest.","th":["The Lamb of God","God's Love for Us","Rest & Peace","Heaven & The Father's House"]},{"n":6,"t":"God and the Lamb - 'tis well,\nI know that source divine,\nOf joy and love no tongue can tell,\nYet know that all is mine.","th":["God's Love for Us","Joy & Thanksgiving"]},{"n":7,"t":"And see, the Spirit's power\nHas ope'd the heavenly door,\nHas brought me to that favoured hour\nWhen toil shall all be o'er.","th":["The Holy Spirit","Heaven & The Father's House"]},{"n":8,"t":"There on the hidden bread\nOf Christ - once humbled here -\nGod's treasured store - for ever fed,\nHis love my soul shall cheer.","th":["The Person of Christ","Heaven & The Father's House"]},{"n":9,"t":"Called by that secret name\nOf undisclosed delight,\n(Blest answer to reproach and shame)\nGraved on the stone of white.","th":["Heaven & The Father's House"]},{"n":10,"t":"There in effulgence bright,\nSaviour and Guide, with Thee\nI'll walk, and in Thy heavenly light\nWhiter my robe shall be.","th":["Heaven & The Father's House"]},{"n":11,"t":"There in the unsullied way\nWhich His own hand hath dressed,\nMy feet press on where brightest day\nShines forth on all the rest.","th":["Heaven & The Father's House"]},{"n":12,"t":"But who that glorious blaze\nOf living light shall tell,\nWhere all His brightness God displays,\nAnd the Lamb's glories dwell?","th":["Heaven & The Father's House","The Lamb of God"]},{"n":13,"t":"(There only to adore,\nMy soul its strength may find,\nIts life, its joy for evermore,\nBy sight, nor sense, defined.)","th":["Heaven & The Father's House","Worship & Praise"]},{"n":14,"t":"God and the Lamb shall there\nThe light and temple be,\nAnd radiant hosts for ever share\nThe unveiled mystery.","th":["Heaven & The Father's House","The Lamb of God","Worship & Praise"]}],"w":{"Heaven & The Father's House":93,"Rest & Peace":21,"Worship & Praise":21,"God's Love for Us":21,"The Lamb of God":21,"Joy & Thanksgiving":7,"The Holy Spirit":7,"The Person of Christ":7}},
"80":{"m":"6.6.6.6.8.8.","a":"Joseph Swain (1761-1796)","tn":"Fairford","tc":"Anonymous","fl":"ON earth the song begins;","v":[{"n":1,"t":"ON earth the song begins;\nIn heaven more sweet and loud -\n\"To Him that cleansed our sins\nBy His atoning blood;\nTo Him,\" we sing in joyful strain,\n\"Be honour, power, and praise, Amen.\"","th":["Worship & Praise","The Precious Blood / Atonement","Forgiveness of Sins"]},{"n":2,"t":"Alone He bore the cross,\nAlone its grief sustained;\nHis was the shame and loss,\nAnd He the victory gained;\nThe mighty work was all His own,\nThough we shall share His glorious throne.","th":["The Cross & Sufferings of Christ","The Eternal Kingdom / Reign of Christ"]}],"w":{"Worship & Praise":50,"The Precious Blood / Atonement":50,"Forgiveness of Sins":50,"The Cross & Sufferings of Christ":50,"The Eternal Kingdom / Reign of Christ":50}},
"81":{"m":"C.M.","a":"John Nelson Darby (1800-1882)","tn":"Claremont","tc":"J Foster (1807-1885)","fl":"O LORD, Thy glory we behold,","v":[{"n":1,"t":"O LORD, Thy glory we behold,\nThough not with mortal eyes;\nThat glory, on the Father's throne,\nNo human sight descries.","th":["Christ Risen & Glorified","The Person of Christ"]},{"n":2,"t":"'Tis thence - now Christ is gone on high,\nRedemption's work complete -\nThe Spirit brings His glory nigh,\nTo those who for Him wait.","th":["The Holy Spirit","Redemption","Christ Risen & Glorified"]},{"n":3,"t":"And we our great Forerunner see,\nIn His own glory there;\nYet not ashamed, with such as we,\nAs Firstborn, all to share.","th":["Christ Risen & Glorified","Sonship & Adoption"]},{"n":4,"t":"The Father's love, the source of all,\nSweeter than all it gives,\nShines on us now without recall,\nAnd lasts while Jesus lives.","th":["The Father","God's Love for Us","Assurance & Security"]},{"n":5,"t":"The new creation's stainless joy\nGleams through the present gloom;\nThat world of bliss without alloy,\nThe saint's eternal home.","th":["New Creation","Heaven & The Father's House"]}],"w":{"Christ Risen & Glorified":60,"The Person of Christ":20,"The Holy Spirit":20,"Redemption":20,"Sonship & Adoption":20,"The Father":20,"God's Love for Us":20,"Assurance & Security":20,"New Creation":20,"Heaven & The Father's House":20}},
"82":{"m":"8.7.","a":"Mrs. J. A. Trench (1843-1925)","tn":"Stuttgart","tc":"C. F. Witt (1660-1716)","fl":"JESUS, Thou alone are worthy","v":[{"n":1,"t":"JESUS, Thou alone are worthy\nCeaseless praises to receive;\nFor Thy love, and grace, and goodness\nRise o'er all our thoughts conceive.","th":["Worship & Praise","God's Love for Us","Grace","The Person of Christ"]},{"n":2,"t":"With adoring hearts, we render\nHonour to Thy precious name,\nOverflowing with Thy mercies,\nFar and wide Thy worth proclaim.","th":["Worship & Praise","The Person of Christ"]},{"n":3,"t":"Praise Him! praise Him! praise the Saviour.\nSaints, aloud your voices raise!\nPraise Him! praise Him! till in heaven\nPerfected we'll sing His praise.","th":["Worship & Praise","Heaven & The Father's House"]}],"w":{"Worship & Praise":100,"God's Love for Us":33,"Grace":33,"The Person of Christ":67,"Heaven & The Father's House":33}},
"83":{"m":"C.M.","a":"B. G. Hardingham (1894-1973)","tn":"Manoah","tc":"G. Rossini (1792-1868)","fl":"LORD Jesus, how our souls adore","v":[{"n":1,"t":"LORD Jesus, how our souls adore\nThat perfect love of Thine!\nWe'd sing its sweetness o'er and o'er,\nImmeasurable, divine.","th":["God's Love for Us","Worship & Praise","Our Love for The Son/Christ"]},{"n":2,"t":"We think of Thee, God's bless\u00e8d Son,\nWhom heavenly hosts obeyed,\nGirding Thyself to serve Thine own,\nAnd like a bondman made.","th":["The Person of Christ","Service & Devotion"]},{"n":3,"t":"What deep affections moved Thee here,\nAs Thou didst seek Thy bride,\nJoy of Thine heart, to Thee how dear!\nLove could not be denied.","th":["The Church / Bride of Christ","God's Love for Us"]},{"n":4,"t":"Thou gavest all that love could give,\nThe goodly pearl to gain;\nThou gav'st Thy life that we might live,\nAnd Thou Thy bride obtain.","th":["The Cross & Sufferings of Christ","God's Love for Us","The Church / Bride of Christ"]},{"n":5,"t":"Fruit of that wondrous love of Thine,\nWe praise, we worship Thee;\nThy love unsearchable, divine,\nOur endless song shall be.","th":["Worship & Praise","Our Love for The Son/Christ"]}],"w":{"God's Love for Us":60,"Worship & Praise":40,"Our Love for The Son/Christ":40,"The Person of Christ":20,"Service & Devotion":20,"The Church / Bride of Christ":40,"The Cross & Sufferings of Christ":20}},
"84":{"m":"S.M.","a":"Horatius Bonar (1808-1889)","tn":"St. Thomas","tc":"A. Williams (1731-1776)","fl":"WE hear the words of love;","v":[{"n":1,"t":"WE hear the words of love;\nWe gaze upon the blood,\nWe see the mighty sacrifice,\nAnd we have peace with God.","th":["Rest & Peace","The Precious Blood / Atonement"]},{"n":2,"t":"'Tis everlasting peace,\nSure as the Father's name;\n'Tis stable as His steadfast throne,\nFor evermore the same.","th":["Rest & Peace","The Father","Assurance & Security"]},{"n":3,"t":"Our love is ofttimes low;\nOur joy still ebbs and flows;\nBut peace with Him remains the same,\nNo change the Father knows.","th":["Rest & Peace","The Father"]},{"n":4,"t":"We change - He changes not,\nThough changing years roll by;\nHis love, not ours, the resting-place,\nWe on His truth rely.","th":["God's Love for Us","Assurance & Security"]},{"n":5,"t":"The cross still stands unchanged,\nThough heaven is now His home;\nThe mighty stone is rolled away,\nFor He has left the tomb.","th":["The Cross & Sufferings of Christ","Christ Risen & Glorified"]},{"n":6,"t":"That tomb has now become\nThe grave of all our woes;\nWe know the Son of God has come,\nWe know He died and rose.","th":["Christ Risen & Glorified","Redemption"]},{"n":7,"t":"We know He liveth now\nAt God's right hand above;\nWe know the throne on which He sits,\nWe know His truth and love.","th":["Christ Risen & Glorified","Assurance & Security","God's Love for Us"]}],"w":{"Rest & Peace":43,"The Precious Blood / Atonement":14,"The Father":29,"Assurance & Security":43,"God's Love for Us":29,"The Cross & Sufferings of Christ":14,"Christ Risen & Glorified":43,"Redemption":14}},
"85":{"m":"7.6.","a":"James George Deck (1802-1884)","tn":"Sovereign Grace","tc":"Franz Joseph Haydn (1732-1809)","fl":"O LORD, Thy love's unbounded","v":[{"n":1,"t":"O LORD, Thy love's unbounded\nSo full, so vast, so free!\nOur thoughts are all confounded\nWhene'er we think of Thee:\nFor us Thou cam'st from heaven,\nFor us to bleed and die,\nThat, purchased and forgiven,\nWe might ascend on high.","th":["God's Love for Us","The Cross & Sufferings of Christ","Forgiveness of Sins","Redemption","Heaven & The Father's House"]},{"n":2,"t":"But oh! the hope of being\nFor ever with the Lord,\nThe joyful hope of seeing\nThat face for us so marred!\nIt fills our heart with comfort,\nIt fills our lips with praise,\nSo that amidst our sorrow\nA joyful song we raise.","th":["The Lord's Coming / Rapture","Joy & Thanksgiving"]},{"n":3,"t":"O Lamb of God we thank Thee,\nWe bless Thy holy name;\nThy love once made Thee willing\nTo bear our sin and shame.\nAnd now Thy love is waiting\nThy saints like Thee to raise;\nFirstborn of many brethren,\nTo Thee be all the praise.","th":["The Lamb of God","Worship & Praise","Forgiveness of Sins","Sonship & Adoption"]}],"w":{"God's Love for Us":33,"The Cross & Sufferings of Christ":33,"Forgiveness of Sins":67,"Redemption":33,"Heaven & The Father's House":33,"The Lord's Coming / Rapture":33,"Joy & Thanksgiving":33,"The Lamb of God":33,"Worship & Praise":33,"Sonship & Adoption":33}},
"86":{"m":"7.6.","a":"James George Deck (1802-1884)","tn":"Farewell","tc":"Felix Mendelssohn-Bartholdy (1809-1847)","fl":"O LORD, Thou now art seated,","v":[{"n":1,"t":"O LORD, Thou now art seated,\nAbove the heavens, on high,\n(The gracious work completed,\nFor which Thou cam'st to die);\nTo Thee our hearts are lifted,\nWhile pilgrims wandering here,\nFor Thou alone art gifted\nOur every weight to bear.","th":["Christ Risen & Glorified","The Cross & Sufferings of Christ","Pilgrimage / Desert Journey","Christ's Intercession / Priesthood"]},{"n":2,"t":"We know, Lord, Thou hast bought us,\nAnd washed us in Thy blood;\nWe know Thy grace has brought us\nAs kings and priests to God.\nWe know that that blest morning,\nLong looked for, draweth near,\nWhen we, at Thy returning,\nIn glory shall appear.","th":["Redemption","The Precious Blood / Atonement","Grace","The Lord's Coming / Rapture"]},{"n":3,"t":"O by Thy love constrain us,\nAnd fix our hearts on Thee;\nLet nothing henceforth pain us,\nBut that which paineth Thee;\nOur joy, our blest endeavour -\nThrough suffering, conflict, shame, -\nTo serve Thee, gracious Saviour,\nAnd magnify Thy name.","th":["Service & Devotion","Trial & Conflict","Our Love for The Son/Christ"]}],"w":{"Christ Risen & Glorified":33,"The Cross & Sufferings of Christ":33,"Pilgrimage / Desert Journey":33,"Christ's Intercession / Priesthood":33,"Redemption":33,"The Precious Blood / Atonement":33,"Grace":33,"The Lord's Coming / Rapture":33,"Service & Devotion":33,"Trial & Conflict":33,"Our Love for The Son/Christ":33}},
"87":{"m":"L.M.","a":"I Watts (1674-1748)","tn":"Duke Street","tc":"J. Hatton, c. 1710-1793","fl":"JESUS shall reign where'er the sun","v":[{"n":1,"t":"JESUS shall reign where'er the sun\nDoth his successive journeys run;\nHis kingdom stretch from shore to shore,\nTill moons shall wax and wane no more.","th":["The Eternal Kingdom / Reign of Christ","The Person of Christ"]},{"n":2,"t":"To Him shall endless prayer be made,\nAnd praises throng to crown His head;\nHis Name like sweet perfume shall rise\nWith every morning sacrifice.","th":["Worship & Praise","The Eternal Kingdom / Reign of Christ"]},{"n":3,"t":"Blessings abound where'er He reigns:\nThe prisoner leaps to loose his chains,\nThe weary find eternal rest,\nAnd all the sons of want are blest.","th":["The Eternal Kingdom / Reign of Christ","Rest & Peace","Redemption"]},{"n":4,"t":"Let every creature rise and bring\nPeculiar honours to the King;\nAngels, descend with songs again\nAnd, earth, repeat the loud Amen.","th":["Worship & Praise","The Eternal Kingdom / Reign of Christ"]}],"w":{"The Eternal Kingdom / Reign of Christ":100,"The Person of Christ":25,"Worship & Praise":50,"Rest & Peace":25,"Redemption":25}},
"88":{"m":"C.M.","a":"Joseph Stennett (1663-1713)","tn":"Evan","tc":"W. H. Havergal (1793-1870)","fl":"O BLESSED Saviour, is Thy love","v":[{"n":1,"t":"O BLESSED Saviour, is Thy love\nSo great, so full, so free?\nFain would we have our thoughts, our hearts,\nOur lives, engaged with Thee.","th":["God's Love for Us","Our Love for The Son/Christ"]},{"n":2,"t":"We love Thee for the glorious worth\nWhich in Thyself we see;\nWe love Thee for that shameful cross,\nEndured so patiently.","th":["The Cross & Sufferings of Christ","The Person of Christ","Our Love for The Son/Christ"]},{"n":3,"t":"No man of greater love can boast\nThan for his friend to die,\nThou for Thine enemies wast slain;\nWhat love with Thine can vie?","th":["God's Love for Us","The Cross & Sufferings of Christ"]},{"n":4,"t":"Though in the very form of God,\nWith heavenly glory crowned,\nThou didst a servant's form assume,\nBeset with sorrow round.","th":["The Person of Christ","The Cross & Sufferings of Christ"]},{"n":5,"t":"Thou wouldst like wretched man be made\nIn everything but sin,\nThat we as like Thee might become\nAs we unlike had been:","th":["The Person of Christ","The Cross & Sufferings of Christ"]},{"n":6,"t":"Like Thee in faith, in meekness, love,\nIn every beauteous grace;\nFrom glory into glory changed,\nTill we behold Thy face.","th":["The Person of Christ","Grace"]},{"n":7,"t":"O Lord! we treasure in our souls\nThe memory of Thy love;\nAnd ever shall Thy name to us\nThe sweetest odour prove.","th":["The Lord's Supper / Remembrance","Our Love for The Son/Christ"]}],"w":{"God's Love for Us":29,"Our Love for The Son/Christ":43,"The Cross & Sufferings of Christ":57,"The Person of Christ":57,"Grace":14,"The Lord's Supper / Remembrance":14}},
"89":{"m":"6.10.10.6.","a":"Horatius Bonar (1808-1889)","tn":"Hereford New","tc":"Anonymous","fl":"BLESSED be God, our God!","v":[{"n":1,"t":"BLESSED be God, our God!\nWho gave for us His well-belov\u00e8d Son,\nThe gift of gifts, all other gifts in one -\nBless\u00e8d be God, our God!","th":["The Father","God's Love for Us","Worship & Praise"]},{"n":2,"t":"What will He not bestow,\nWho freely gave this mighty gift unbought,\nUnmerited, unheeded and unsought -\nWhat will He not bestow?","th":["Grace","God's Love for Us"]},{"n":3,"t":"He spared not His Son!\n'Tis this that silences each rising fear;\n'Tis this that bids the hard thought disappear -\nHe spar\u00e8d not His Son!","th":["Assurance & Security","God's Love for Us"]},{"n":4,"t":"Who shall condemn us now?\nSince Christ has died, and risen, and gone above\nFor us to plead at the right hand of Love,\nWho shall condemn us now?","th":["Assurance & Security","Christ's Intercession / Priesthood","Christ Risen & Glorified"]},{"n":5,"t":"'Tis God that justifies!\nWho shall recall the pardon or the grace,\nOr who the broken chain of guilt replace?\n'Tis God that justifies!","th":["Assurance & Security","Forgiveness of Sins","Grace"]},{"n":6,"t":"The victory is ours!\nFor us in might came forth the Mighty One;\nFor us He fought the fight, the triumph won -\nThe victory is ours!","th":["Assurance & Security","Redemption"]}],"w":{"The Father":17,"God's Love for Us":50,"Worship & Praise":17,"Grace":33,"Assurance & Security":67,"Christ's Intercession / Priesthood":17,"Christ Risen & Glorified":17,"Forgiveness of Sins":17,"Redemption":17}},
"90":{"m":"9.8.9.8.","a":"Mrs. H. A. Berg","tn":"Rachel","tc":"J. P. L. Hindle, 1951","fl":"THAT path way! O let it be treasured,","v":[{"n":1,"t":"THAT path way! O let it be treasured,\nFor none ever trod it before.\nThose steps of aloneness unmeasured!\nOur spirits must pause, and adore.","th":["The Cross & Sufferings of Christ","Worship & Praise"]},{"n":2,"t":"None, none had been laid in that manger,\nAnd none had been laid in that grave\nBut Jesus, the heavenly Stranger\nWho came wayward sinners to save.","th":["The Person of Christ","The Cross & Sufferings of Christ","Redemption"]},{"n":3,"t":"Alone - in the hall of decision,\nHis judgment was taken away:\nAlone - on the cross of derision,\nOf darkness, distress and dismay.","th":["The Cross & Sufferings of Christ"]},{"n":4,"t":"Alone - apprehended and taken,\nWhile lovers forsook Him and fled.\nAlone - and completely forsaken,\nGod's judgment was poured on His head.","th":["The Cross & Sufferings of Christ"]},{"n":5,"t":"And yet 'twas for us He endured it;\nAlone in perfection was He:\nOur blessing - He only secured it,\nBy dying alone on the tree.","th":["The Cross & Sufferings of Christ","Redemption"]},{"n":6,"t":"Lord, Thou art no longer deserted!\nThe Father is sharing His throne\nWith Thee, who our judgment endur\u00e8d\nThat we might be never alone.","th":["Christ Risen & Glorified","The Father"]},{"n":7,"t":"O love unsurpassed and unbounded!\nO love that will ever endure\nUntil in the glory surrounded\nWith those Thou hast died to secure.","th":["God's Love for Us","Assurance & Security"]}],"w":{"The Cross & Sufferings of Christ":71,"Worship & Praise":14,"The Person of Christ":14,"Redemption":29,"Christ Risen & Glorified":14,"The Father":14,"God's Love for Us":14,"Assurance & Security":14}},
"91":{"m":"S.M.","a":"George V. Wigram (1805-1879)","tn":"Solyma","tc":"G. Tredcroft","fl":"OH, what a debt we owe","v":[{"n":1,"t":"OH, what a debt we owe\nTo Him who shed His blood,\nAnd cleansed our souls and gave us power\nTo stand before His God!","th":["The Precious Blood / Atonement","Forgiveness of Sins","Redemption"]},{"n":2,"t":"Saviour and Lord, we own\nThe riches of Thy grace;\nFor we can call Thy God our God -\nCan bow before His face.","th":["Grace","Worship & Praise"]},{"n":3,"t":"Thy holy Father, too\nWe worship as our own,\nWho gave with Thee the Spirit's cry\nTo us His sons foreknown.","th":["The Father","Sonship & Adoption","The Holy Spirit"]}],"w":{"The Precious Blood / Atonement":33,"Forgiveness of Sins":33,"Redemption":33,"Grace":33,"Worship & Praise":33,"The Father":33,"Sonship & Adoption":33,"The Holy Spirit":33}},
"92":{"m":"8.7.","a":"H. P. Wells","tn":"Cross of Jesus","tc":"J. Stainer (1840-1901)","fl":"OH, the wondrous joy of dwelling","v":[{"n":1,"t":"OH, the wondrous joy of dwelling\nFather, in Thy house above!\nEvery feature Christ reflecting,\nAnd Thine own surpassing love.","th":["Heaven & The Father's House","The Father","The Person of Christ","God's Love for Us"]},{"n":2,"t":"Thoughts divine conceived in purpose,\nThere fulfilled for Thy delight;\nAll that shone in Christ, once humbled,\nThere expands in glory's light.","th":["The Person of Christ","Heaven & The Father's House"]},{"n":3,"t":"By the Spirit's power is strengthened\nEvery eye on Him to gaze;\nEvery view of Him unfolding\nWakes fresh bursts of joyful praise!","th":["The Holy Spirit","Worship & Praise","The Person of Christ"]},{"n":4,"t":"Every circle gathered round Thee\nYields of Christ some beauteous ray;\nAnd for Thy delight and pleasure\nShines throughout the eternal day.","th":["Worship & Praise","The Person of Christ"]},{"n":5,"t":"There Thy love o'er all transcendent\nShall for ever find its rest;\nWhile each heart, its joy outpouring,\nIn that love is ever blest.","th":["God's Love for Us","Rest & Peace"]}],"w":{"Heaven & The Father's House":40,"The Father":20,"The Person of Christ":80,"God's Love for Us":40,"The Holy Spirit":20,"Worship & Praise":40,"Rest & Peace":20}},
"93":{"m":"L.M.","a":"Anonymous","tn":"Brookfield","tc":"T. B. Southgate (1814-1868)","fl":"THE manner of Thy mighty love,","v":[{"n":1,"t":"THE manner of Thy mighty love,\nOur Father, we with joy behold;\nThy gracious name most gladly prove,\nFor we are Thine, by love made bold.","th":["The Father","God's Love for Us","Joy & Thanksgiving","Sonship & Adoption"]},{"n":2,"t":"Ah, had it been Thy sovereign will\nTo give us but a servant's place,\nSuch mercy should each bosom fill\nWith lasting praise, for all is grace.","th":["Grace"]},{"n":3,"t":"But children now, our God, are we,\nAnd through Thy favour dwell in love;\nThy love is sweet, and sweet will be\nThe Father's house, our home above.","th":["Sonship & Adoption","God's Love for Us","Heaven & The Father's House"]},{"n":4,"t":"What we shall be not yet appears,\nBut like the Lord each child shall shine;\nThen till we leave this vale of tears\nAccept our praise that we are Thine.","th":["The Lord's Coming / Rapture","Worship & Praise","The Person of Christ"]}],"w":{"The Father":25,"God's Love for Us":50,"Joy & Thanksgiving":25,"Sonship & Adoption":50,"Grace":25,"Heaven & The Father's House":25,"The Lord's Coming / Rapture":25,"Worship & Praise":25,"The Person of Christ":25}},
"94":{"m":"C.M.","a":"Sir Edward Denny (1796-1889)","tn":"Abridge","tc":"I. Smith (1725-1800)","fl":"A PILGRIM through this lonely world","v":[{"n":1,"t":"A PILGRIM through this lonely world\nThe bless\u00e8d Saviour passed;\nA mourner through His life was He,\nThe dying Lamb at last.","th":["Pilgrimage / Desert Journey","The Cross & Sufferings of Christ","The Lamb of God"]},{"n":2,"t":"That tender heart which felt for all,\nFor all its life-blood gave;\nIt found on earth no resting-place\nSave only in the grave.","th":["God's Love for Us","The Cross & Sufferings of Christ"]},{"n":3,"t":"Such was our Lord; and shall we fear\nThe cross with all its scorn,\nOr court a faithless evil world\nThat wreathed His brow with thorn?","th":["The Cross & Sufferings of Christ","Separation from the World","Trial & Conflict"]},{"n":4,"t":"No, facing all its frowns or smiles,\nLike Him, obedient still,\nWe homeward press through storm or calm\nTo yon celestial hill.","th":["Pilgrimage / Desert Journey","Separation from the World","Trial & Conflict"]},{"n":5,"t":"Dead to the world with Him who died\nTo win our hearts, our love,\nWe, risen with our Lord and Head\nIn spirit dwell above.","th":["Separation from the World","Christ Risen & Glorified"]}],"w":{"Pilgrimage / Desert Journey":40,"The Cross & Sufferings of Christ":60,"The Lamb of God":20,"God's Love for Us":20,"Separation from the World":60,"Trial & Conflict":40,"Christ Risen & Glorified":20}},
"95":{"m":"S.M.","a":"I Watts (1674-1748)","tn":"St. Thomas","tc":"A. Williams (1731-1776)","fl":"BREAK forth and sing the song","v":[{"n":1,"t":"BREAK forth and sing the song\nOf glory to the Lamb;\nWake every heart and every tongue,\nTo praise the Saviour's name.","th":["Worship & Praise","The Lamb of God"]},{"n":2,"t":"Sing of His dying love;\nSing of His rising power;\nSing how He intercedes above\nFor those whose sins He bore.","th":["God's Love for Us","Christ Risen & Glorified","Christ's Intercession / Priesthood","The Cross & Sufferings of Christ"]},{"n":3,"t":"Sing on your heavenly road,\nYe sons of glory, sing;\nTo the ascended Lamb of God,\nYour cheerful praises bring.","th":["Worship & Praise","The Lamb of God","Pilgrimage / Desert Journey"]},{"n":4,"t":"Soon shall we hear Him say,\n\"Ye ransomed pilgrims, come;\"\nSoon will He call us hence away,\nAnd take us to His home.","th":["The Lord's Coming / Rapture","Redemption","Heaven & The Father's House"]},{"n":5,"t":"Then shall each raptured tongue\nHis fullest praise proclaim;\nAnd sweeter voices wake the song\nOf glory to the Lamb.","th":["Heaven & The Father's House","Worship & Praise","The Lamb of God"]}],"w":{"Worship & Praise":60,"The Lamb of God":60,"God's Love for Us":20,"Christ Risen & Glorified":20,"Christ's Intercession / Priesthood":20,"The Cross & Sufferings of Christ":20,"Pilgrimage / Desert Journey":20,"The Lord's Coming / Rapture":20,"Redemption":20,"Heaven & The Father's House":40}},
"96":{"m":"L.M.","a":"Samuel Medley (1738-1799)","tn":"Duke Street","tc":"J. Hatton, c. 1710-1793","fl":"THE Saviour lives, no more to die;","v":[{"n":1,"t":"THE Saviour lives, no more to die;\nHe lives, our Head, enthroned on high;\nHe lives triumphant o'er the grave;\nHe lives eternally to save.","th":["Christ Risen & Glorified","Redemption","Assurance & Security"]},{"n":2,"t":"He lives to still His people's fears;\nHe lives to wipe away their tears;\nHe went their mansions to prepare;\nHe comes to bring them safely there.","th":["God's Love for Us","Heaven & The Father's House","The Lord's Coming / Rapture"]},{"n":3,"t":"Then let our souls in Him rejoice,\nAnd sing His praise with cheerful voice,\nOur doubts and fears for ever gone,\nFor Christ is on the Father's throne.","th":["Joy & Thanksgiving","Worship & Praise","Assurance & Security"]},{"n":4,"t":"The chief of sinners He receives;\nHis saints He loves and never leaves:\nHe'll guard us safe from every ill,\nAnd all His promises fulfil.","th":["God's Love for Us","Grace","Assurance & Security"]},{"n":5,"t":"Abundant grace will He afford,\nTill we are present with the Lord;\nAnd prove what we have sung before,\nThat Jesus lives for evermore.","th":["Grace","Christ Risen & Glorified"]}],"w":{"Christ Risen & Glorified":40,"Redemption":20,"Assurance & Security":60,"God's Love for Us":40,"Heaven & The Father's House":20,"The Lord's Coming / Rapture":20,"Joy & Thanksgiving":20,"Worship & Praise":20,"Grace":40}},
"97":{"m":"7.6.","a":"George West Frazer (1830-1896)","tn":"Ewing","tc":"A. Ewing (1830-1895)","fl":"BLEST be the God and Father","v":[{"n":1,"t":"BLEST be the God and Father\nOf Jesus Christ the Son,\nWho chose us for all blessing\nEre time had yet begun,\nThat we redeemed - His children -\nMight dwell with Him above,\nAnd know the depth and fulness\nOf His unbounded love,","th":["The Father","Sonship & Adoption","Redemption","God's Love for Us","Heaven & The Father's House"]},{"n":2,"t":"Where all those deep affections,\nWhich fill the Father's heart,\nShall find their satisfaction,\nTheir joy to us impart;\nWhere we, His throne surrounding,\nShall Abba, Father, say,\nWithin those many mansions,\nPrepar\u00e8d for that day.","th":["The Father","Heaven & The Father's House","Sonship & Adoption","Joy & Thanksgiving"]},{"n":3,"t":"E'en whilst we here are waiting\nHis rest on high to share,\nWe know our blest relation\nAs children to Him there;\nAnd by His Spirit's leading,\nWe Abba, Father, cry;\nWith ever-growing longing\nWe seek our home on high.","th":["Sonship & Adoption","The Holy Spirit","Pilgrimage / Desert Journey","Heaven & The Father's House"]}],"w":{"The Father":67,"Sonship & Adoption":100,"Redemption":33,"God's Love for Us":33,"Heaven & The Father's House":100,"Joy & Thanksgiving":33,"The Holy Spirit":33,"Pilgrimage / Desert Journey":33}},
"98":{"m":"8.7.","a":"Miss C. Thompson (1822-1909)","tn":"Rhineland","tc":"W. Brockhaus (1819-1888)","fl":"GAZING on Thee, Lord, in glory,","v":[{"n":1,"t":"GAZING on Thee, Lord, in glory,\nWhile our hearts in worship bow,\nThere we read the wondrous story\nOf the cross - its shame and woe.","th":["Christ Risen & Glorified","The Cross & Sufferings of Christ","Worship & Praise"]},{"n":2,"t":"Every mark of dark dishonour\nHeaped upon Thy thorn-crowned brow,\nAll the depths of Thy heart's sorrow\nTold in answering glory now.","th":["The Cross & Sufferings of Christ"]},{"n":3,"t":"On that cross alone - forsaken -\nWhere no pitying eye was found;\nNow to God's right hand exalted,\nWith Thy praise the heavens resound.","th":["The Cross & Sufferings of Christ","Christ Risen & Glorified"]},{"n":4,"t":"Did Thy God e'en then forsake Thee,\nHide His face from Thy deep need?\nIn Thy face, once marred and smitten,\nAll His glory now we read.","th":["The Cross & Sufferings of Christ","Christ Risen & Glorified"]},{"n":5,"t":"Gazing on it we adore Thee,\nBless\u00e8d, precious, holy Lord;\nThou, the Lamb, alone art worthy,\nThis be earth's and heaven's accord.","th":["Worship & Praise","The Lamb of God"]},{"n":6,"t":"Rise our hearts, and bless the Father,\nCeaseless song e'en here begun,\nEndless praise and adoration\nTo the Father and the Son.","th":["The Father","Worship & Praise"]}],"w":{"Christ Risen & Glorified":50,"The Cross & Sufferings of Christ":67,"Worship & Praise":50,"The Lamb of God":17,"The Father":17}},
"99":{"m":"L.M.","a":"Samuel Medley (1738-1799)","tn":"Hursley","tc":"P. Ritter (1760-1846)","fl":"On Christ salvation rests secure;","v":[{"n":1,"t":"On Christ salvation rests secure;\nThe Rock of ages must endure;\nNor can that faith be overthrown\nWhich rests upon the \"Living Stone\".","th":["Assurance & Security","The Person of Christ"]},{"n":2,"t":"No other hope shall intervene:\nTo Him we look, on Him we lean;\nOther foundations we disown,\nAnd build on Christ, the \"Living Stone\".","th":["Assurance & Security","The Person of Christ"]},{"n":3,"t":"In Him it is ordained to raise\nA temple to the Father's praise,\nComposed of all the saints who own\nNo Saviour but the \"Living Stone\".","th":["The Church / Bride of Christ","The Father","Worship & Praise"]},{"n":4,"t":"View the vast building, see it rise;\nThe work how great, the plan how wise!\nOh, wondrous fabric, power unknown\nThat rears it on the \"Living Stone\"!","th":["The Church / Bride of Christ"]},{"n":5,"t":"But most adore His precious name,\nHis glory and His grace proclaim:\nFor us, condemned, despised, undone,\nHe gave Himself, the \"Living Stone\".","th":["Worship & Praise","Grace","The Person of Christ"]}],"w":{"Assurance & Security":40,"The Person of Christ":60,"The Church / Bride of Christ":40,"The Father":20,"Worship & Praise":40,"Grace":20}},
"100":{"m":"L.M.","a":"Samuel Medley (1738-1799)","tn":"Grateful Praise","tc":"Anonymous","fl":"Now in a song of grateful praise,","v":[{"n":1,"t":"Now in a song of grateful praise,\nTo our dear Lord the voice we'll raise;\nWith all His saints we'll join to tell,\nThat Jesus hath done all things well.","th":["Worship & Praise","Joy & Thanksgiving","The Person of Christ"]},{"n":2,"t":"All worlds His glorious power confess;\nHis wisdom all His works express;\nBut, oh His love! - what tongue can tell?\nFor Jesus hath done all things well.","th":["Worship & Praise","The Person of Christ","God's Love for Us"]},{"n":3,"t":"And since our souls have known His love,\nWhat mercies has He made us prove;\nMercies which all our praise excel,\nFor Jesus hath done all things well.","th":["God's Love for Us","Joy & Thanksgiving","Grace"]},{"n":4,"t":"And when on that bright day we rise,\nAnd join the anthems of the skies,\nIn ceaseless song this note shall swell,\nThat Jesus hath done all things well","th":["Heaven & The Father's House","Worship & Praise"]}],"w":{"Worship & Praise":75,"Joy & Thanksgiving":50,"The Person of Christ":50,"God's Love for Us":50,"Grace":25,"Heaven & The Father's House":25}},
"101":{"m":"C.M.","a":"John Nelson Darby (1800-1882)","tn":"Crediton","tc":"T. Clark (1775-1859)","fl":"IT is not with uncertain step","v":[{"n":1,"t":"IT is not with uncertain step\nWe tread our desert way;\nA well-known voice has called us up\nTo everlasting day.","th":["Pilgrimage / Desert Journey","Assurance & Security","Heaven & The Father's House"]},{"n":2,"t":"The voice of Him who here has trod\nAlone the trackless way,\n(And marked the road which leads to God),\nWhere once we, lost, did stray.","th":["The Person of Christ","Pilgrimage / Desert Journey","Grace"]},{"n":3,"t":"He leaves us not alone to trace\nOur path across the waste;\nBut leads us still, with living grace,\nHomeward, whereto we haste.","th":["Grace","Pilgrimage / Desert Journey","Heaven & The Father's House"]},{"n":4,"t":"See! open stands the heavenly door,\nWhence glory shines below,\nTo light the way He's gone before,\nThe coming bliss to show.","th":["Heaven & The Father's House","Christ Risen & Glorified","The Lord's Coming / Rapture"]},{"n":5,"t":"In patience then we tread the road -\nOur faith and courage tried -\nAnd trust the love which bears each load,\nOur hearts from grief to hide.","th":["Pilgrimage / Desert Journey","Trial & Conflict","God's Love for Us","Rest & Peace"]}],"w":{"Pilgrimage / Desert Journey":80,"Assurance & Security":20,"Heaven & The Father's House":60,"The Person of Christ":20,"Grace":40,"Christ Risen & Glorified":20,"The Lord's Coming / Rapture":20,"Trial & Conflict":20,"God's Love for Us":20,"Rest & Peace":20}},
"102":{"m":"C.M.","a":"I Watts (1674-1748)","tn":"Crediton","tc":"T. Clark (1775-1859)","fl":"Come, let us join our cheerful songs,","v":[{"n":1,"t":"Come, let us join our cheerful songs,\nAnd thus approach the throne:\nHad we ten thousand thousand tongues,\nOur theme of joy's but one:","th":["Worship & Praise","Joy & Thanksgiving"]},{"n":2,"t":"Worthy the Lamb that's gone on high\nTo be exalted thus:\nWorthy the Lamb that died, we cry,\nFor He was slain for us.","th":["The Lamb of God","Worship & Praise","The Cross & Sufferings of Christ","The Precious Blood / Atonement"]},{"n":3,"t":"Jesus is worthy to receive\nHonour and power divine:\nAnd blessings more than we can give\nBe, Lord, for ever Thine.","th":["Worship & Praise","The Person of Christ"]},{"n":4,"t":"Soon shall the saints, exalted high,\nA glorious anthem raise;\nAnd all that dwell beneath the sky\nSpeak forth Thine endless praise.","th":["Worship & Praise","Heaven & The Father's House"]},{"n":5,"t":"Redeemed creation join in one\nTo bless the sacred name\nOf Him that sits upon the throne,\nAnd to adore the Lamb.","th":["Worship & Praise","Redemption","The Lamb of God","The Eternal Kingdom / Reign of Christ"]}],"w":{"Worship & Praise":100,"Joy & Thanksgiving":20,"The Lamb of God":40,"The Cross & Sufferings of Christ":20,"The Precious Blood / Atonement":20,"The Person of Christ":20,"Heaven & The Father's House":20,"Redemption":20,"The Eternal Kingdom / Reign of Christ":20}},
"103":{"m":"8s.","a":"Thomas Kelly (1769-1854)","tn":"Elland","tc":"J. Langran (1835-1909)","fl":"WE'LL sing of the Shepherd that died,","v":[{"n":1,"t":"WE'LL sing of the Shepherd that died,\nThat died for the sake of the flock;\nHis love to the utmost was tried,\nBut firmly endured as a rock.","th":["The Cross & Sufferings of Christ","God's Love for Us","The Lamb of God"]},{"n":2,"t":"When blood from a victim must flow,\nThis Shepherd, by pity, was led\nTo stand between us and the foe,\nAnd willingly died in our stead.","th":["The Precious Blood / Atonement","The Cross & Sufferings of Christ","The Lamb of God"]},{"n":3,"t":"Our song then for ever shall be\nOf the Shepherd who gave Himself thus:\nNo subject's so glorious as He,\nNo theme so affecting to us.","th":["Worship & Praise","The Lamb of God"]},{"n":4,"t":"Of Him and His love will we sing,\nHis praises our tongues shall employ,\nTill heavenly anthems we bring\nIn yonder bright regions of joy.","th":["Worship & Praise","God's Love for Us","Heaven & The Father's House"]}],"w":{"The Cross & Sufferings of Christ":50,"God's Love for Us":50,"The Lamb of God":75,"The Precious Blood / Atonement":25,"Worship & Praise":50,"Heaven & The Father's House":25}},
"104":{"m":"8.7.","a":"Robert Hawker (1753-1827)","tn":"Grebe","tc":"J. G. Ebeling (1637-1676)","fl":"ABBA, Father, thus we call Thee,","v":[{"n":1,"t":"ABBA, Father, thus we call Thee,\n(Hallowed name!) from day to day.\n'Tis Thy children's right to know Thee,\nNone but children, Abba say.\nThis high honour we inherit,\nThy free gift through Jesus' blood;\nGod the Spirit with our spirit\nWitnesseth we're sons of God.","th":["The Father","Sonship & Adoption","The Precious Blood / Atonement","The Holy Spirit"]},{"n":2,"t":"Abba's purpose gave us being\nWhen in Christ, in that vast plan,\nAbba chose the saints for glory\nLong before the world began;\nO what love the Father bore us!\nO how precious in His sight!\nWhen He gave the church to Jesus,\nJesus, His whole soul's delight!","th":["The Father","Sonship & Adoption","God's Love for Us","The Church / Bride of Christ"]},{"n":3,"t":"Though our nature's fall in Adam\nSeemed to shut us out from God,\nThus it was His counsel brought us\nNearer still through Jesus' blood;\nFor in Him we found redemption,\nGrace and glory in the Son;\nOh! the height and depth of mercy!\nChrist and we, through grace, are one.","th":["Redemption","The Precious Blood / Atonement","Grace","God's Love for Us"]}],"w":{"The Father":67,"Sonship & Adoption":67,"The Precious Blood / Atonement":67,"The Holy Spirit":33,"God's Love for Us":67,"The Church / Bride of Christ":33,"Redemption":33,"Grace":33}},
"105":{"m":"8.7.8.7.4.7.","a":"Thomas Kelly (1769-1854)","tn":"Helmsley","tc":"T. Olivers (1725-1799)","fl":"GLORY, glory everlasting","v":[{"n":1,"t":"GLORY, glory everlasting\nBe to Him who bore the cross,\nWho redeemed our souls by tasting\nDeath, the death deserved by us!\nSpread His glory\nWho redeemed His people thus.","th":["Worship & Praise","The Cross & Sufferings of Christ","Redemption","The Lamb of God"]},{"n":2,"t":"His is love, 'tis love unbounded,\nWithout measure, without end;\nHuman thought is here confounded;\n'Tis too vast to comprehend:\nPraise the Saviour,\nMagnify the sinner's Friend.","th":["God's Love for Us","Worship & Praise"]},{"n":3,"t":"While we tell the wondrous story\nOf the Saviour's cross and shame,\nSing we, Everlasting glory\nBe to God and to the Lamb.\nHallelujah,\nGive ye glory to His name.","th":["The Cross & Sufferings of Christ","Worship & Praise","The Lamb of God"]}],"w":{"Worship & Praise":100,"The Cross & Sufferings of Christ":67,"Redemption":33,"The Lamb of God":67,"God's Love for Us":33}},
"106":{"m":"8.8.6.","a":"James George Deck (1802-1884)","tn":"Pembroke","tc":"H. Isaak, c. 1450-1517","fl":"O JESUS, Lord, 'tis joy to know","v":[{"n":1,"t":"O JESUS, Lord, 'tis joy to know\nThy path is o'er of shame and woe\nFor us so meekly trod:\nAll finished is Thy work of toil;\nThou reapest now the fruit and spoil,\nExalted by our God.","th":["The Cross & Sufferings of Christ","Christ Risen & Glorified","Joy & Thanksgiving"]},{"n":2,"t":"Thy holy head, once bound with thorns,\nThe crown of glory now adorns,\nThy seat, the Father's throne:\nO Lord, e'en now we sing Thy praise,\nOurs the eternal song to raise,\nWorthy the Lord alone.","th":["Christ Risen & Glorified","Worship & Praise","The Cross & Sufferings of Christ"]},{"n":3,"t":"As Head for us Thou sittest there,\nThy members here the blessing share,\nOf all Thou dost receive:\nThy wisdom, riches, honours, powers,\nThy boundless love has all made ours,\nWho in Thy name believe.","th":["The Church / Bride of Christ","Christ Risen & Glorified","Grace"]},{"n":4,"t":"We triumph in Thy triumphs, Lord;\nThy joys our deepest joys afford,\nThe fruit of love divine:\nWhile sorrowing, suffering, toiling here,\nHow does the thought our spirits cheer,\nThe throne of glory's Thine!","th":["Joy & Thanksgiving","Christ Risen & Glorified","Trial & Conflict"]}],"w":{"The Cross & Sufferings of Christ":50,"Christ Risen & Glorified":100,"Joy & Thanksgiving":50,"Worship & Praise":25,"The Church / Bride of Christ":25,"Grace":25,"Trial & Conflict":25}},
"107":{"m":"C.M.","a":"James George Deck (1802-1884)","tn":"Irish","tc":"Anonymous","fl":"LORD, 'tis joy to look above","v":[{"n":1,"t":"LORD, 'tis joy to look above\nAnd see Thee on the throne,\nTo search the heights and depths of love\nWhich Thou to us hast shown;","th":["Christ Risen & Glorified","Worship & Praise","God's Love for Us"]},{"n":2,"t":"To look beyond the long dark night\nAnd hail the coming day,\nWhen Thou to all Thy saints in light\nThy glories wilt display.","th":["The Lord's Coming / Rapture","Heaven & The Father's House"]},{"n":3,"t":"And oh, 'tis joy the path to trace\nBy Thee so meekly trod,\nLearning of Thee to walk in grace\nAnd fellowship with God.","th":["The Person of Christ","Grace","Fellowship & Gathering"]},{"n":4,"t":"Joy to confess Thy bless\u00e8d name,\nThe virtues of Thy blood\nAnd to the wearied heart proclaim,\nBehold the Lamb of God.","th":["The Precious Blood / Atonement","The Lamb of God","Worship & Praise"]}],"w":{"Christ Risen & Glorified":25,"Worship & Praise":50,"God's Love for Us":25,"The Lord's Coming / Rapture":25,"Heaven & The Father's House":25,"The Person of Christ":25,"Grace":25,"Fellowship & Gathering":25,"The Precious Blood / Atonement":25,"The Lamb of God":25}},
"108":{"m":"7s.","a":"J. Wilson Smith (1842-1922)","tn":"Brandenburg","tc":"Anonymous","fl":"KING of kings and Lord of lords,","v":[{"n":1,"t":"KING of kings and Lord of lords,\nOh, how rich these glorious words!\nTitles high and boundless fame\nNow enhance the Saviour's name.","th":["Christ Risen & Glorified","The Person of Christ","The Eternal Kingdom / Reign of Christ"]},{"n":2,"t":"He who once was crowned with thorn\nCrowns of glory now adorn;\nJesus sits upon the throne,\nHosts His triumph gladly own!","th":["The Cross & Sufferings of Christ","Christ Risen & Glorified","Worship & Praise"]},{"n":3,"t":"Bless\u00e8d 'tis to see Him there,\nCentre of that glory fair;\nThus our highest praise we bring,\nFalling prostrate, worshipping.","th":["Worship & Praise","Christ Risen & Glorified"]},{"n":4,"t":"Now within the Father's house\nWell we know Him and rejoice;\nGlad that He, e'en now, should share\nAll the Father's glory there.","th":["The Father","Heaven & The Father's House","Joy & Thanksgiving"]},{"n":5,"t":"Soon will He appear again,\nThen His saints with Him shall reign;\nEcho far the glorious words:\nKing of kings and Lord of lords.","th":["The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ","Christ Risen & Glorified"]}],"w":{"Christ Risen & Glorified":80,"The Person of Christ":20,"The Eternal Kingdom / Reign of Christ":40,"The Cross & Sufferings of Christ":20,"Worship & Praise":40,"The Father":20,"Heaven & The Father's House":20,"Joy & Thanksgiving":20,"The Lord's Coming / Rapture":20}},
"109":{"m":"6.4.6.4.6.6.6.4.","a":"James George Deck (1802-1884)","tn":"Bethany","tc":"L. Mason (1792-1872)","fl":"JESUS! That name is Love,","v":[{"n":1,"t":"JESUS! That name is Love,\nJesus, our Lord!\nJesus,all names above,\nJesus, the Lord!\nThou, Lord, our all must be;\nNothing that's good have we,\nNothing apart from Thee,\nJesus, our Lord!","th":["The Person of Christ","Worship & Praise","Our Love for The Son/Christ"]},{"n":2,"t":"As Son of man it was,\nJesus, the Lord!\nThou gav'st Thy life for us,\nJesus, our Lord!\nGreat was indeed Thy love,\nAll other loves above,\nLove Thou didst dearly prove,\nJesus, our Lord!","th":["The Cross & Sufferings of Christ","God's Love for Us","The Person of Christ"]},{"n":3,"t":"Righteous alone in Thee,\nJesus, the Lord!\nThou wilt a refuge be,\nJesus, our Lord!\nWhom then have we to fear,\nWhat trouble, grief, or care,\nSince Thou art ever near,\nJesus, our Lord!","th":["Assurance & Security","Rest & Peace"]},{"n":4,"t":"Soon Thou wilt come again,\nJesus, the Lord!\nWe shall be happy then,\nJesus, our Lord!\nWhen Thine own face we see,\nThen shall we like Thee be,\nThen evermore with Thee,\nJesus, our Lord!","th":["The Lord's Coming / Rapture","Joy & Thanksgiving","Heaven & The Father's House"]}],"w":{"The Person of Christ":50,"Worship & Praise":25,"Our Love for The Son/Christ":25,"The Cross & Sufferings of Christ":25,"God's Love for Us":25,"Assurance & Security":25,"Rest & Peace":25,"The Lord's Coming / Rapture":25,"Joy & Thanksgiving":25,"Heaven & The Father's House":25}},
