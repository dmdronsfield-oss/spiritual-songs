"446":{"m":"11.10.","a":"H. D'Arcy Champney (1854-1942)","tn":"Epiphany Hymn","tc":"J. F. Thrupp (1827-1867)","fl":"Jesus, our Lord, with what joy we adore Thee;","v":[{"n":1,"t":"Jesus, our Lord, with what joy we adore Thee;\nChanting our praise to Thyself on the throne,\nBlest in Thy presence we worship before Thee,\nOwn Thou art worthy, and worthy alone.","th":["Worship & Praise","The Person of Christ","Our Love for The Son/Christ"]},{"n":2,"t":"How hast Thou triumphed, and triumphed with glory,\nBattled death's forces, rolled back every wave!\nCan we refrain then from telling the story,\nHow Thou art victor o'er death and the grave?","th":["Christ Risen & Glorified","Worship & Praise"]},{"n":3,"t":"\"Lord, what is man?\" we would break forth exclaiming;\nJesus, the crowned One, the Lamb that was slain!\nJoyful we own Thee, Thy praises proclaiming;\nDeath Thou hast vanquished by rising again!","th":["The Lamb of God","Christ Risen & Glorified","Worship & Praise"]},{"n":4,"t":"\"Lord, what is man?\" Yes, with deep adoration,\nGladly prolong we this wonderful theme;\nJesus, divine One, Thou Head of creation,\nHead of Thy church, which Thou cam'st to redeem!","th":["Worship & Praise","The Person of Christ","The Church / Bride of Christ","Redemption"]}],"w":{"Worship & Praise":100,"The Person of Christ":50,"Our Love for The Son/Christ":25,"Christ Risen & Glorified":50,"The Lamb of God":25,"The Church / Bride of Christ":25,"Redemption":25}},
"447":{"m":"C.M.","a":"Sir Edward Denny (1796-1889)","tn":"St. Agnes","tc":"J. B. Dykes (1823-1876)","fl":"Light of the lonely pilgrim's heart,","v":[{"n":1,"t":"Light of the lonely pilgrim's heart,\nStar of the coming day!\nArise, and, with Thy morning beams,\nChase all our griefs away.","th":["The Lord's Coming / Rapture","Pilgrimage / Desert Journey","The Person of Christ"]},{"n":2,"t":"Come, bless\u00e8d Lord, bid every shore\nAnd answering island sing\nThe praises of Thy royal name,\nAnd own Thee as their King.","th":["The Eternal Kingdom / Reign of Christ","Worship & Praise"]},{"n":3,"t":"Bid the whole earth, responsive now\nTo the bright world above,\nBreak forth in rapturous strains of joy\nIn memory of Thy love.","th":["Worship & Praise","God's Love for Us"]},{"n":4,"t":"Lord, Lord, Thy fair creation groans,\nThe air, the earth, the sea,\nIn unison with all our hearts,\nAnd calls aloud for Thee.","th":["The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ"]},{"n":5,"t":"Come, then, with all Thy quickening power,\nWith one awakening smile,\nAnd bid the serpent's trail no more\nThy beauteous realms defile.","th":["The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ"]},{"n":6,"t":"Thine was the cross, with all its fruits\nOf grace and peace divine;\nBe Thine the crown of glory now,\nThe palm of victory Thine!","th":["The Cross & Sufferings of Christ","Grace","The Eternal Kingdom / Reign of Christ"]}],"w":{"The Lord's Coming / Rapture":50,"Pilgrimage / Desert Journey":17,"The Person of Christ":17,"The Eternal Kingdom / Reign of Christ":67,"Worship & Praise":33,"God's Love for Us":17,"The Cross & Sufferings of Christ":17,"Grace":17}},
"448":{"m":"C.M.","a":"Susannah Harrison (1752-1784)","tn":"Richmond","tc":"Thomas Haweis (1732-1820)","fl":"Look, look, ye saints, within the veil,","v":[{"n":1,"t":"Look, look, ye saints, within the veil,\nAnd raise your happy song;\nYour joys can never, never fail,\nFor you to Christ belong.","th":["Joy & Thanksgiving","Assurance & Security","The Person of Christ"]},{"n":2,"t":"O happy saints, for ever freed\nFrom guilt and every care,\nDwell, dwell, with your exalted Head,\nAnd let your life be there,","th":["Assurance & Security","Christ Risen & Glorified","Forgiveness of Sins"]},{"n":3,"t":"And glory in your Lord and God;\nSee, see Him as He is;\nYour robes are spotless through His blood,\nYour happiness is His.","th":["The Precious Blood / Atonement","Worship & Praise"]},{"n":4,"t":"O think not of this world of woe,\nThough subject still to grief;\nBut seek your portion there to know,\nFor this will give relief.","th":["Separation from the World","Assurance & Security"]},{"n":5,"t":"Aye trust, for ever trust in God,\nFor every promise given;\nAnd dwell with Him through Jesus' blood,\nWithin the veil of heaven.","th":["Assurance & Security","Heaven & The Father's House","The Precious Blood / Atonement"]}],"w":{"Joy & Thanksgiving":20,"Assurance & Security":80,"The Person of Christ":20,"Christ Risen & Glorified":20,"Forgiveness of Sins":20,"The Precious Blood / Atonement":40,"Worship & Praise":20,"Separation from the World":20,"Heaven & The Father's House":20}},
"449":{"m":"4.6.8.8.4.","a":"Mrs. A. Dent","tn":"Venio","tc":"Anonymous","fl":"Lord Jesus, come,","v":[{"n":1,"t":"Lord Jesus, come,\nAnd take Thy rightful place\nAs Son of man, of all the theme;\nCome, Lord, to reign o'er all supreme;\nLord Jesus, come.","th":["The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ","The Person of Christ"]},{"n":2,"t":"Lord Jesus, come,\nThe Man of sorrows once,\nThe Man of patience waiting now -\nThe Man of joy, for ever, Thou;\nCome, Saviour, come.","th":["The Lord's Coming / Rapture","The Cross & Sufferings of Christ","Joy & Thanksgiving"]},{"n":3,"t":"Lord Jesus, come,\nCrowned with Thy many crowns -\nThe Crucified, the Lamb once slain,\nTo wash away sin's crimson stain;\nLord Jesus, come.","th":["The Lord's Coming / Rapture","The Lamb of God","The Cross & Sufferings of Christ","The Precious Blood / Atonement","Forgiveness of Sins"]},{"n":4,"t":"Lord Jesus, come,\nAnd take Thy Father's gift,\nThe people by Thy cross made Thine,\nThe trophy of Thy love divine;\nLord Jesus, come.","th":["The Lord's Coming / Rapture","The Cross & Sufferings of Christ","God's Love for Us"]},{"n":5,"t":"Lord Jesus, come,\nThat, lost in Thee, our souls,\nMay bow and worship and adore,\nIn Thy blest presence evermore;\nLord Jesus, come.","th":["The Lord's Coming / Rapture","Worship & Praise"]},{"n":6,"t":"Lord Jesus, come,\nAnd let Thy glory shine,\nThat quickly these changed bodies may\nEach one reflect a living ray;\nLord Jesus, come.","th":["The Lord's Coming / Rapture"]},{"n":7,"t":"Lord Jesus, come,\nLet every knee bow down,\nAnd every tongue to Thee confess,\nThe Lord of all come forth to bless;\nLord Jesus, come.","th":["The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ"]},{"n":8,"t":"Spirit and Bride\nWith longing voice say, Come;\nYea, Lord, Thy word from that bright home,\nIs, \"Surely, I will quickly come\";\nE'en so, Lord, come.","th":["The Lord's Coming / Rapture","The Holy Spirit","The Church / Bride of Christ"]}],"w":{"The Lord's Coming / Rapture":100,"The Eternal Kingdom / Reign of Christ":25,"The Person of Christ":12,"The Cross & Sufferings of Christ":38,"Joy & Thanksgiving":12,"The Lamb of God":12,"The Precious Blood / Atonement":12,"Forgiveness of Sins":12,"God's Love for Us":12,"Worship & Praise":12,"The Holy Spirit":12,"The Church / Bride of Christ":12}},
"450":{"m":"7.6.","a":"John Nelson Darby (1800-1882)","tn":"St. Hilda","tc":"J. H. Knecht (1752-1817) and E. Husband (1843-1908)","fl":"Lord Jesus, precious Saviour,","v":[{"n":1,"t":"Lord Jesus, precious Saviour,\nOh, when wilt Thou return?\nOur hearts with woe familiar\nTo Thee our Master turn.","th":["The Lord's Coming / Rapture","Trial & Conflict","Our Love for The Son/Christ"]},{"n":2,"t":"Our woe is Thine, Lord Jesus,\nOur joy is in Thy love;\nBut woe and joy all lead us\nTo Thee in heaven above.","th":["God's Love for Us","Heaven & The Father's House","Joy & Thanksgiving"]},{"n":3,"t":"To Thee we look, Lord Jesus\nTo Thee whose love we know;\nWe wait the power that frees us\nFrom bondage, sin, and woe.","th":["The Lord's Coming / Rapture","Redemption"]},{"n":4,"t":"We look for Thine appearing,\nThy presence here to bless;\nWe greet the day that's nearing,\nWhen all this woe shall cease -","th":["The Lord's Coming / Rapture"]},{"n":5,"t":"But oh, for us, blest Saviour,\nHow brighter far the lot\nTo be with Thee for ever,\nWhere evil enters not! -","th":["Heaven & The Father's House","Assurance & Security"]},{"n":6,"t":"To see Thee who so loved us\nThen face to face above,\nWhose grace at first had moved us\nTo taste and know Thy love.","th":["The Lord's Coming / Rapture","God's Love for Us"]},{"n":7,"t":"With Thee, O Lord, for ever\nOur souls shall be content:\nNor act nor thought shall ever\nFull joy with Thee prevent.","th":["Heaven & The Father's House","Rest & Peace","Joy & Thanksgiving"]},{"n":8,"t":"O come then soon, Lord Jesus,\nIn patience shall we wait\n(Await the power that frees us)\nOur longed-for heavenly seat.","th":["The Lord's Coming / Rapture","Heaven & The Father's House"]}],"w":{"The Lord's Coming / Rapture":62,"Trial & Conflict":12,"Our Love for The Son/Christ":12,"God's Love for Us":25,"Heaven & The Father's House":50,"Joy & Thanksgiving":25,"Redemption":12,"Assurance & Security":12,"Rest & Peace":12}},
"451":{"m":"8s.","a":"Thomas Haweis (1732-1820)","tn":"De Fleury","tc":"Anonymous","fl":"Lord Jesus, to tell of Thy love","v":[{"n":1,"t":"Lord Jesus, to tell of Thy love\nOur souls shall for ever delight,\nAnd sing of Thy glory above,\nIn praises by day and by night.\nWherever we follow Thee, Lord,\nAdmiring, adoring, we see\nThat love which was stronger than death,\nFlow out without limit, and free.","th":["Worship & Praise","God's Love for Us","The Cross & Sufferings of Christ","Our Love for The Son/Christ"]},{"n":2,"t":"Descending from glory on high,\nWith men Thy delight was to dwell,\nContented, our Surety to die,\nBy dying to save us from hell.\nEnduring the grief and the shame,\nThou barest our sins on the cross,\nOh! who would not boast of this love,\nAnd count the world's glory but loss?","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","Redemption","Forgiveness of Sins"]}],"w":{"Worship & Praise":50,"God's Love for Us":50,"The Cross & Sufferings of Christ":100,"Our Love for The Son/Christ":50,"The Precious Blood / Atonement":50,"Redemption":50,"Forgiveness of Sins":50}},
"452":{"m":"7.6.","a":"John Nelson Darby (1800-1882)","tn":"St. Alphege","tc":"H. J. Gauntlett (1805-1876)","fl":"Lord Jesus, homeless Stranger,","v":[{"n":1,"t":"Lord Jesus, homeless Stranger,\nThou dearest Friend to me,\nAn outcast in a manger,\nThat Thou might'st with us be;","th":["The Person of Christ","God's Love for Us"]},{"n":2,"t":"We gaze upon Thy meekness,\nThe manger and the cross;\nWe cling to Thee in weakness\nThrough suffering, pain, and loss.","th":["The Cross & Sufferings of Christ","The Person of Christ"]},{"n":3,"t":"We see the Godhead-glory\nShine through that human veil;\nAnd, willing, hear the story\nOf love come here to heal.","th":["The Person of Christ","God's Love for Us"]},{"n":4,"t":"But who Thy path of service,\nThy steps removed from ill,\nThy patient love to serve us,\nWith human tongue can tell?","th":["The Person of Christ","Service & Devotion"]},{"n":5,"t":"'Mid sin, and all corruption,\nWhere hatred did abound,\nThy path of true perfection\nShed light on all around.","th":["The Person of Christ","Separation from the World"]},{"n":6,"t":"O'er all, Thy perfect goodness\nRose blessedly divine;\nPoor hearts oppressed with sadness\nFound ever rest in Thine.","th":["The Person of Christ","God's Love for Us","Rest & Peace"]}],"w":{"The Person of Christ":100,"God's Love for Us":50,"The Cross & Sufferings of Christ":17,"Service & Devotion":17,"Separation from the World":17,"Rest & Peace":17}},
"453":{"m":"C.M.","a":"John Nelson Darby (1800-1882)","tn":"Orlington","tc":"J. Campbell (1807-1860)","fl":"Lord Jesus! source of every grace,","v":[{"n":1,"t":"Lord Jesus! source of every grace,\nGlorious in light divine,\nSoon shall we see Thee face to face,\nAnd in that glory shine,","th":["Grace","The Person of Christ","The Lord's Coming / Rapture","Heaven & The Father's House"]},{"n":2,"t":"Be ever with Thee, hear Thy voice,\nUnhindered then shall taste\nThe love which doth our hearts rejoice,\nThough absent in this waste.","th":["God's Love for Us","Joy & Thanksgiving","Pilgrimage / Desert Journey","Our Love for The Son/Christ"]},{"n":3,"t":"In peaceful wonder we adore\nThe thoughts of love divine,\nWhich in that world, for evermore,\nUnite our lot with Thine.","th":["God's Love for Us","Worship & Praise","Heaven & The Father's House"]}],"w":{"Grace":33,"The Person of Christ":33,"The Lord's Coming / Rapture":33,"Heaven & The Father's House":67,"God's Love for Us":67,"Joy & Thanksgiving":33,"Pilgrimage / Desert Journey":33,"Our Love for The Son/Christ":33,"Worship & Praise":33}},
"454":{"m":"11s.","a":"Miss Catherine Helene von Poseck (1859-1953)","tn":"Clarendon Street","tc":"A. J. Gordon (1836-1895)","fl":"Lord Jesus, we love Thee, and joyfully pour","v":[{"n":1,"t":"Lord Jesus, we love Thee, and joyfully pour\nThe praises of worshipping hearts at Thy feet;\nLord Jesus, we love Thee; we love and adore\nThe name that to God and to us is so sweet.","th":["Worship & Praise","The Person of Christ","Our Love for The Father","Our Love for The Son/Christ"]},{"n":2,"t":"Thy name bless\u00e8d Lord, is as ointment poured forth;\nAnd, e'en as we utter it, fragrance doth rise\nTo the Father, who only its excellent worth,\nIts matchless perfection, in fulness can prize.","th":["The Person of Christ","The Father","Worship & Praise"]},{"n":3,"t":"Oh, name of sweet savour, a savour of rest,\nThe name of the Victim, the Lamb that was slain!\nOh, name of God's loved One in whom we are blest!\nOh, name ever worthy all homage to gain!","th":["The Lamb of God","Worship & Praise","The Cross & Sufferings of Christ","God's Love for Us"]},{"n":4,"t":"Blest Lord, in Thy name would we boast all day long,\nAnd praise till we reach Thee on heaven's bright shore;\nThou shalt be for ever our joy and our song;\nLord Jesus, we love Thee, we love and adore.","th":["Worship & Praise","Joy & Thanksgiving","Heaven & The Father's House","Our Love for The Son/Christ"]}],"w":{"Worship & Praise":100,"The Person of Christ":50,"Our Love for The Father":25,"Our Love for The Son/Christ":50,"The Father":25,"The Lamb of God":25,"The Cross & Sufferings of Christ":25,"God's Love for Us":25,"Joy & Thanksgiving":25,"Heaven & The Father's House":25}},
"455":{"m":"8.7. Iambic","a":"E. O'Shaughnessy","tn":"Friend","tc":"G. C. Stebbins (1846-1945)","fl":"Lord, we can see, by faith in Thee,","v":[{"n":1,"t":"Lord, we can see, by faith in Thee,\nA prospect bright, unfailing,\nWhere God shall shine in light divine,\nIn glory never fading.","th":["Heaven & The Father's House","The Person of Christ"]},{"n":2,"t":"A home above, of peace and love,\nClose to Thy holy person!\nThy saints shall there see glory fair,\nAnd shine as Thy reflection.","th":["Heaven & The Father's House","Rest & Peace"]},{"n":3,"t":"Oh! how we thirst the chains to burst,\nThat weigh our spirits downward,\nAnd there to flow, in love's full glow,\nWith hearts like Thine surrounded.","th":["Heaven & The Father's House","Our Love for The Son/Christ"]},{"n":4,"t":"No more as here, 'mid snares to fear\nA thought or wish unholy!\nNo more to pain the Lamb once slain,\nBut live to love Thee wholly!","th":["Heaven & The Father's House","The Lamb of God","Our Love for The Son/Christ"]},{"n":5,"t":"No more to view Thy chosen few\nIn selfish strife divided!\nBut drink in peace the living grace\nThat gave them hearts united!","th":["Fellowship & Gathering","The Church / Bride of Christ","Heaven & The Father's House"]},{"n":6,"t":"Lord, haste that day of cloudless ray,\nThat prospect bright, unfailing,\nWhere God shall shine in light divine,\nIn glory never fading.","th":["The Lord's Coming / Rapture","Heaven & The Father's House"]}],"w":{"Heaven & The Father's House":100,"The Person of Christ":17,"Rest & Peace":17,"Our Love for The Son/Christ":33,"The Lamb of God":17,"Fellowship & Gathering":17,"The Church / Bride of Christ":17,"The Lord's Coming / Rapture":17}},
"456":{"m":"6-10s.","a":"Miss Hannah Kilham Burlingham (1842-1901)","tn":"Yorkshire","tc":"J. Wainwright (1723-1768)","fl":"Lord Thou hast left us to prepare the place,","v":[{"n":1,"t":"Lord Thou hast left us to prepare the place,\nWhere Thy redeemed ones soon with Thee shall dwell;\nNow, whilst we wait and long to see Thy face,\nTeach us, by loving much, to serve Thee well.\nAttune our hearts below to songs of praise,\nOur sweet employ above through endless days.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","Redemption","Service & Devotion","Worship & Praise","Our Love for The Son/Christ"]},{"n":2,"t":"Lord Jesus, every thought is read by Thee -\nThose heart-desires that cannot be expressed;\nHasten the day when like Thee we shall be,\nAnd in Thy glorious presence fully blessed.\nThen evermore will be our joyful part,\nTo know as known - to see Thee as Thou art.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","Our Love for The Son/Christ"]}],"w":{"The Lord's Coming / Rapture":100,"Heaven & The Father's House":100,"Redemption":50,"Service & Devotion":50,"Worship & Praise":50,"Our Love for The Son/Christ":100}},
"457":{"m":"L.M.D.","a":"Anonymous","tn":"Sweet Hour of Prayer","tc":"W. B. Bradbury (1816-1868)","fl":"Master, we would no longer be","v":[{"n":1,"t":"Master, we would no longer be\nLoved by the world that hated Thee,\nBut patient in Thy footsteps go,\nThy sorrow as Thy joy to know.\nWe would - and O confirm the power -\nWith meekness meet the darkest hour,\nBy shame, contempt, however tried,\nFor Thou wast scorned and crucified.","th":["Separation from the World","The Cross & Sufferings of Christ","Trial & Conflict","Service & Devotion"]},{"n":2,"t":"We welcome still Thy faithful word,\nThe cross shall meet its sure reward;\nFor soon must pass the little while,\nThen joy shall crown Thy servants' toil;\nAnd we shall hear Thee, Saviour, say,\n\"Arise, my love, and come away;\nLook up, for thou shalt weep no more,\nBut rest on heaven's eternal shore.\"","th":["The Lord's Coming / Rapture","The Church / Bride of Christ","Heaven & The Father's House","Assurance & Security"]}],"w":{"Separation from the World":50,"The Cross & Sufferings of Christ":50,"Trial & Conflict":50,"Service & Devotion":50,"The Lord's Coming / Rapture":50,"The Church / Bride of Christ":50,"Heaven & The Father's House":50,"Assurance & Security":50}},
"458":{"m":"7.7.7.6.","a":"Samuel Trevor Francis (1834-1925)","tn":"Bennett Park","tc":"F. E. Race","fl":"Now around Thee, Lord, we meet,","v":[{"n":1,"t":"Now around Thee, Lord, we meet,\nSitting lowly at Thy feet;\nSacred fellowship, how sweet!\nSaviour, we adore Thee.","th":["The Lord's Supper / Remembrance","Fellowship & Gathering","Worship & Praise"]},{"n":2,"t":"Bless\u00e8d Saviour, glorious Head,\nFrom Thyself we take the bread,\nToken of Thyself once dead,\nSaviour, we adore Thee.","th":["The Lord's Supper / Remembrance","The Person of Christ","The Cross & Sufferings of Christ","Worship & Praise"]},{"n":3,"t":"From love's hand - O Lord, 'tis Thine -\nWe would take this cup, this wine,\nSymbol of Thy grace divine:\nSaviour, we adore Thee.","th":["The Lord's Supper / Remembrance","Grace","God's Love for Us","Worship & Praise"]},{"n":4,"t":"Precious ointment we outpour,\nPraise Thy name for evermore,\nSpread Thy fame from shore to shore:\nSaviour, we adore Thee.","th":["Worship & Praise","The Person of Christ"]}],"w":{"The Lord's Supper / Remembrance":75,"Fellowship & Gathering":25,"Worship & Praise":100,"The Person of Christ":50,"The Cross & Sufferings of Christ":25,"Grace":25,"God's Love for Us":25}},
"459":{"m":"C.M.","a":"Mrs. J. A. Trench (1843-1925)","tn":"Winchester Old","tc":"Anonymous","fl":"O blessed Lord, we praise Thee now","v":[{"n":1,"t":"O blessed Lord, we praise Thee now\nFor all that Thou hast done,\nThine acts of untold grace and love,\nThe victory Thou hast won.","th":["Worship & Praise","Grace"]},{"n":2,"t":"We praise Thee for the bitter cross,\nThe judgment Thou didst bear,\nWhen, standing in the sinner's place,\nOur sins were on Thee there.","th":["The Cross & Sufferings of Christ","Worship & Praise","Forgiveness of Sins"]},{"n":3,"t":"But, more than all that Thou hast done,\nWe praise for what Thou art,\nThe Son of God, the Son of man,\nWith loving, tender heart.","th":["The Person of Christ","Worship & Praise","God's Love for Us"]},{"n":4,"t":"We praise Thee that Thou art our Lord,\nWhose ever gracious ways\nTransport our souls, and teach our hearts\nTo yield Thee fervent praise.","th":["Worship & Praise","Grace","Our Love for The Son/Christ"]},{"n":5,"t":"It is our greatest joy on earth\nThat Thou are with us here;\nOur greatest joy in heaven will be\nThat we are with Thee there.","th":["Joy & Thanksgiving","Fellowship & Gathering","Heaven & The Father's House"]}],"w":{"Worship & Praise":80,"Grace":40,"The Cross & Sufferings of Christ":20,"Forgiveness of Sins":20,"The Person of Christ":20,"God's Love for Us":20,"Our Love for The Son/Christ":20,"Joy & Thanksgiving":20,"Fellowship & Gathering":20,"Heaven & The Father's House":20}},
"460":{"m":"7.6.7.6.","a":"C. L. Smith (Mrs. Bancroft)","tn":"Work","tc":"L. Mason (1792-1872)","fl":"O for the robe of whiteness,","v":[{"n":1,"t":"O for the robe of whiteness,\nTo walk with Christ in light:\nO for the glorious brightness\nOf day without a night!","th":["Heaven & The Father's House"]},{"n":2,"t":"We would a name of favour,\nGraved on the stone of white;\nWe'd taste that manna's flavour,\nReserved for heaven's delight.","th":["Heaven & The Father's House"]},{"n":3,"t":"'Tis sweet, the thought of rising\nThe risen Lord to meet;\nOr changed, ourselves surprising,\nLike Him for whom we wait.","th":["The Lord's Coming / Rapture","Christ Risen & Glorified"]},{"n":4,"t":"What joy supreme in seeing\nThe Saviour face to face,\nThe peaceful joy of being\nFor ever in that place!","th":["The Lord's Coming / Rapture","Joy & Thanksgiving","Heaven & The Father's House"]},{"n":5,"t":"Jesus, Thou King of glory,\nWe soon shall dwell with Thee,\nAnd sing Thy love's bright story,\nWhen we Thy glory see.","th":["Heaven & The Father's House","The Eternal Kingdom / Reign of Christ","Worship & Praise"]},{"n":6,"t":"E'en now our souls would enter\nThe holiest on high,\nThat all our love might centre\nIn Thee who cam'st to die.","th":["Worship & Praise","The Cross & Sufferings of Christ","Our Love for The Son/Christ"]},{"n":7,"t":"At God's right hand in glory\nThou art, Thy work complete,\nTill perfected the story\nThat gives us too our seat.","th":["Christ Risen & Glorified","Redemption"]},{"n":8,"t":"Then o'er the wide creation\nThy power will stretch its arm -\nSecure from all temptation,\nFree from all human harm.","th":["The Eternal Kingdom / Reign of Christ","Assurance & Security"]}],"w":{"Heaven & The Father's House":50,"The Lord's Coming / Rapture":25,"Christ Risen & Glorified":25,"Joy & Thanksgiving":12,"The Eternal Kingdom / Reign of Christ":25,"Worship & Praise":25,"The Cross & Sufferings of Christ":12,"Our Love for The Son/Christ":12,"Redemption":12,"Assurance & Security":12}},
"461":{"m":"6.6.6.5.","a":"E. C. Rubie (1846-1942)","tn":"St. Denio","tc":"Anonymous","fl":"O Lord, we adore Thee,","v":[{"n":1,"t":"O Lord, we adore Thee,\nBlest Son of the Father,\nWhose love without measure\nSurpasses all praise.\nThyself Thou hast given,\nWe know Thee now - risen,\nAscended - in heaven,\nWhere on Thee we gaze.","th":["Worship & Praise","The Person of Christ","God's Love for Us","Christ Risen & Glorified"]},{"n":2,"t":"Our Father, we praise Thee,\nThou source of all blessing;\nThe Son has revealed Thee\nIn fulness of light.\nWe joy in Thy presence;\nWe worship before Thee,\nIn love, and all blameless,\nIn holiness bright.","th":["The Father","Worship & Praise","The Person of Christ","Joy & Thanksgiving"]}],"w":{"Worship & Praise":100,"The Person of Christ":100,"God's Love for Us":50,"Christ Risen & Glorified":50,"The Father":50,"Joy & Thanksgiving":50}},
"462":{"m":"7.6.","a":"William J. Hocking (1864-1953)","tn":"Thankfulness","tc":"Anonymous","fl":"O gracious God, our Father,","v":[{"n":1,"t":"O gracious God, our Father,\nWe thank Thee for Thy word,\nTo every saint so precious,\nThat speaks of Christ the Lord;\nWe thank Thee for Thy Spirit\nThat moved those men of old\nWho in the holy record\nThy truth and love unfold.","th":["The Father","The Word of God","Joy & Thanksgiving","The Person of Christ","The Holy Spirit"]},{"n":2,"t":"For that same One we thank Thee,\nThe earnest and the seal,\nWho doth to Thine own children\nThy mind and will reveal;\nAs none but He who knew it,\nThy truth could e'er impart,\nSo none but those He teacheth\nReceive it in the heart.","th":["The Holy Spirit","Joy & Thanksgiving","The Father"]},{"n":3,"t":"O may we then, blest Father,\nThy gracious word believe,\nThat we may by Thy Spirit\nThe truth in love receive;\nFor we would thus be girded\nTo serve our faithful Lord,\nAnd in this day of conflict\nCleave to His name and word.","th":["The Father","The Word of God","The Holy Spirit","Service & Devotion","Trial & Conflict"]}],"w":{"The Father":100,"The Word of God":67,"Joy & Thanksgiving":67,"The Person of Christ":33,"The Holy Spirit":100,"Service & Devotion":33,"Trial & Conflict":33}},
"463":{"m":"7.6.","a":"J. Hutton","tn":"Angel's Story","tc":"A. H. Mann (1850-1929)","fl":"O gracious Shepherd, bind us","v":[{"n":1,"t":"O gracious Shepherd, bind us\nWith cords of love to Thee,\nAnd evermore remind us\nHow mercy set us free.\nO may the Holy Spirit\nKeep this before our eyes,\nThat we Thy death and merit\nAbove all else may prize.","th":["God's Love for Us","The Holy Spirit","The Cross & Sufferings of Christ","Redemption"]},{"n":2,"t":"We are of God's salvation\nAssured through Thy love,\nYet oft, on slight occasion,\nHow faithless do we prove!\nThou hast our sins forgiven:\nThen leaving all behind,\nWe would press on to heaven,\nBearing the prize in mind.","th":["Assurance & Security","Forgiveness of Sins","Pilgrimage / Desert Journey"]},{"n":3,"t":"O may we then, Lord, ever,\nWhile in this vale of tears,\nLook up to Thee, and never\nGive way to anxious fears:\nFor Thou wilt not forsake us\nThough we are oft to blame;\nO let Thy love then make us\nTrue to Thy faith and name.","th":["Trial & Conflict","Assurance & Security","God's Love for Us"]}],"w":{"God's Love for Us":67,"The Holy Spirit":33,"The Cross & Sufferings of Christ":33,"Redemption":33,"Assurance & Security":67,"Forgiveness of Sins":33,"Pilgrimage / Desert Journey":33,"Trial & Conflict":33}},
"464":{"m":"C.M.","a":"I Watts (1674-1748)","tn":"St. Anne","tc":"W. Croft (1678-1727)","fl":"O God, how wide Thy glory shines,","v":[{"n":1,"t":"O God, how wide Thy glory shines,\nHow high Thy wonders rise!\nKnown through the earth by thousand signs,\nBy thousands through the skies.","th":["The Father","Worship & Praise"]},{"n":2,"t":"But when we view Thy love's design\nTo save rebellious worms,\nWhere vengeance and compassion join\nIn their divinest forms;","th":["God's Love for Us","Redemption"]},{"n":3,"t":"Here Thy full character is shown,\nNor dares a creature guess\nWhich of the glories brighter shone -\nThe justice or the grace.","th":["Grace","The Father"]},{"n":4,"t":"Now the full glories of the Lamb\nAdorn the heavenly throne,\nWhile saints on earth that know His name\nTheir Lord and Saviour own.","th":["The Lamb of God","Christ Risen & Glorified","Worship & Praise"]},{"n":5,"t":"How blest are we who have a part\nIn that immortal song!\nWonder and joy become our heart,\nAnd praise and thanks our tongue.","th":["Joy & Thanksgiving","Worship & Praise"]}],"w":{"The Father":40,"Worship & Praise":60,"God's Love for Us":20,"Redemption":20,"Grace":20,"The Lamb of God":20,"Christ Risen & Glorified":20,"Joy & Thanksgiving":20}},
"465":{"m":"8.8.8.6.","a":"Miss Charlotte Elliott (1789-1871)","tn":"Flemming","tc":"F. F. Flemming (1778-1813)","fl":"O holy Saviour, Friend unseen,","v":[{"n":1,"t":"O holy Saviour, Friend unseen,\nSince on Thine arm Thou bid'st us lean,\nHelp us throughout life's changing scene\nBy faith to cling to Thee.","th":["The Person of Christ","Pilgrimage / Desert Journey","Assurance & Security"]},{"n":2,"t":"When far from home, fatigued, oppressed,\nIn Thee we found our place of rest;\nAs exiles still, yet richly blest,\nWe cling, O Lord, to Thee.","th":["Pilgrimage / Desert Journey","Rest & Peace","Assurance & Security"]},{"n":3,"t":"What though the world deceitful prove,\nAnd earthly friends and hopes remove!\nWith patient, uncomplaining love,\nStill would we cling to Thee.","th":["Trial & Conflict","Separation from the World","Our Love for The Son/Christ"]},{"n":4,"t":"Though faith and hope are often tried,\nWe ask not, need not, ought beside;\nSo safe, so calm, so satisfied,\nThe soul that clings to Thee.","th":["Assurance & Security","Rest & Peace"]},{"n":5,"t":"Blest is our lot, whate'er befall;\nWhat can disturb or who appal?\nThou art our strength, our rock, our all,\nSaviour, we cling to Thee.","th":["Assurance & Security","The Person of Christ"]}],"w":{"The Person of Christ":40,"Pilgrimage / Desert Journey":40,"Assurance & Security":80,"Rest & Peace":40,"Trial & Conflict":20,"Separation from the World":20,"Our Love for The Son/Christ":20}},
"466":{"m":"7.6.","a":"Mary Bowley (Mrs Peters) (1813-1856)","tn":"Belmont","tc":"S. Webbe (1740-1816)","fl":"O Lord, of Thee we ne'er would tire;","v":[{"n":1,"t":"O Lord, of Thee we ne'er would tire;\nThe new and living food\nCan satisfy our heart's desire;\nAnd life is in Thy blood.","th":["The Person of Christ","The Precious Blood / Atonement","Our Love for The Son/Christ"]},{"n":2,"t":"If such the happy midnight song\nOur prisoned spirits raise,\nWhat are the joys that cause, ere long,\nEternal bursts of praise?","th":["Joy & Thanksgiving","Heaven & The Father's House","Worship & Praise"]},{"n":3,"t":"To look within and see no stain,\nAbroad no curse to trace;\nTo shed no tears, to feel no pain,\nBut see Thee face to face.","th":["Heaven & The Father's House","The Lord's Coming / Rapture"]},{"n":4,"t":"To find each hope of glory gained,\nFulfilled each precious word;\nAnd fully all to have attained\nThe image of our Lord.","th":["Heaven & The Father's House","The Word of God","The Person of Christ"]},{"n":5,"t":"For this we're pressing onward still;\nAnd in this hope would be\nMore subject to the Father's will,\nE'en now much more like Thee.","th":["Pilgrimage / Desert Journey","Service & Devotion","The Father"]}],"w":{"The Person of Christ":40,"The Precious Blood / Atonement":20,"Our Love for The Son/Christ":20,"Joy & Thanksgiving":20,"Heaven & The Father's House":60,"Worship & Praise":20,"The Lord's Coming / Rapture":20,"The Word of God":20,"Pilgrimage / Desert Journey":20,"Service & Devotion":20,"The Father":20}},
"467":{"m":"C.M.","a":"I Watts (1674-1748)","tn":"Dunfermline","tc":"Anonymous","fl":"O Lord, in Thee our eyes behold","v":[{"n":1,"t":"O Lord, in Thee our eyes behold\nA thousand glories more\nThan the rich gems and polished gold\nThe sons of Aaron wore.","th":["The Person of Christ","Christ's Intercession / Priesthood"]},{"n":2,"t":"They first their own sin-offering brought,\nTo purge themselves from sin;\nThy life was pure without a spot,\nAnd all Thy nature clean.","th":["Christ's Intercession / Priesthood","The Person of Christ"]},{"n":3,"t":"Fresh blood, as constant as the day,\nWas on their altars spilt;\nBut Thy one offering took away\nFor ever all our guilt.","th":["The Precious Blood / Atonement","Christ's Intercession / Priesthood","Forgiveness of Sins"]},{"n":4,"t":"Their priesthood ran through several hands,\nFor mortal was their race;\nThy never-changing office stands\nFirm as the throne of grace.","th":["Christ's Intercession / Priesthood","The Person of Christ"]},{"n":5,"t":"Their range was earth, nor higher soared;\nThe heaven of heavens is Thine;\nThy majesty and priesthood, Lord,\nIn peerless glory shine.","th":["Christ's Intercession / Priesthood","Heaven & The Father's House","The Person of Christ"]},{"n":6,"t":"Immortal honours crown Thy name,\nThou bless\u00e8d Priest and King:\nMay heaven and earth resound Thy fame,\nEach day fresh praises bring!","th":["Christ's Intercession / Priesthood","Worship & Praise","The Eternal Kingdom / Reign of Christ"]}],"w":{"The Person of Christ":67,"Christ's Intercession / Priesthood":100,"The Precious Blood / Atonement":17,"Forgiveness of Sins":17,"Heaven & The Father's House":17,"Worship & Praise":17,"The Eternal Kingdom / Reign of Christ":17}},
"468":{"m":"6-8s.","a":"E. L. Bevir (1847-1922)","tn":"St. Catherine","tc":"H. F. Hemy (1818-1888)","fl":"O Lord of glory! who couldst leave","v":[{"n":1,"t":"O Lord of glory! who couldst leave\nThe height supreme in death to lie,\nWhat tongue shall sing, what heart conceive\nThe love divine that made Thee die?\nBought with a price, for ever Thine,\nWe break this bread, and drink this wine.","th":["The Cross & Sufferings of Christ","God's Love for Us","The Lord's Supper / Remembrance","The Precious Blood / Atonement"]},{"n":2,"t":"When here on earth, Thou wast alone,\nProclaimer of this love to men;\nUpon the cross 'twas fully known,\nFor God came forth to meet us then;\nRent from above, the parted veil\nAnnounced to all that wondrous tale.","th":["The Cross & Sufferings of Christ","God's Love for Us","Redemption"]},{"n":3,"t":"But risen, the first-born from the dead,\nTriumphant hast Thou entered in,\nThe glorious Man, the living Head,\nThrice worthy Thou our hearts to win;\nIn Thy blest face all glories shine,\nAnd there we gaze on love divine.","th":["Christ Risen & Glorified","The Person of Christ","Worship & Praise","God's Love for Us"]}],"w":{"The Cross & Sufferings of Christ":67,"God's Love for Us":100,"The Lord's Supper / Remembrance":33,"The Precious Blood / Atonement":33,"Redemption":33,"Christ Risen & Glorified":33,"The Person of Christ":33,"Worship & Praise":33}},
"469":{"m":"L.M.","a":"G. de Mattos","tn":"St. Clement","tc":"C. C. Scholefield (1839-1904)","fl":"O Lord, Thou never-changing One,","v":[{"n":1,"t":"O Lord, Thou never-changing One,\nOur hearts delight to think of Thee;\nThy love, eternally the same,\nOur theme of endless praise shall be.","th":["The Person of Christ","God's Love for Us","Worship & Praise","Our Love for The Son/Christ"]},{"n":2,"t":"From every earthly reed we turn,\nLeaning on Thee to find our rest;\nAnd in the knowledge of Thy love\nAre fully and for ever blest.","th":["Rest & Peace","Assurance & Security","God's Love for Us"]},{"n":3,"t":"Oh, guard meanwhile these hearts of ours,\nAnd fill them, All-sufficient One;\nBe it our constant rest to know\nThat Thou art ours, and we Thine own.","th":["Assurance & Security","God's Love for Us"]},{"n":4,"t":"Thou soon our raptured gaze shalt meet,\nThy praise in heaven our tongues employ;\nWith Thee, and like Thee, then to be -\nOur perfect everlasting joy.","th":["The Lord's Coming / Rapture","Heaven & The Father's House","Joy & Thanksgiving"]}],"w":{"The Person of Christ":25,"God's Love for Us":75,"Worship & Praise":25,"Our Love for The Son/Christ":25,"Rest & Peace":25,"Assurance & Security":50,"The Lord's Coming / Rapture":25,"Heaven & The Father's House":25,"Joy & Thanksgiving":25}},
"470":{"m":"7.6.","a":"Miss Catherine Helene von Poseck (1859-1953)","tn":"Munich","tc":"Anonymous","fl":"O Saviour, great and glorious","v":[{"n":1,"t":"O Saviour, great and glorious\nBeyond all power to tell,\nWe hail Thee now victorious\nO'er all the hosts of hell:\nThough crucified in weakness,\nIn power Thou livest now;\nThough suffering once in meekness,\nGlory adorns Thy brow.","th":["The Person of Christ","Christ Risen & Glorified","The Cross & Sufferings of Christ","Worship & Praise"]},{"n":2,"t":"A life and death of sorrow\nWere here Thy portion, Lord;\nBut on the glorious morrow\nThy name shall be adored:\nOh, come then in Thy glory!\nWe long to see Thee reign,\nThy foes subdued before Thee:\nLord Jesus, come again.","th":["The Cross & Sufferings of Christ","The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ","Worship & Praise"]}],"w":{"The Person of Christ":50,"Christ Risen & Glorified":50,"The Cross & Sufferings of Christ":100,"Worship & Praise":100,"The Lord's Coming / Rapture":50,"The Eternal Kingdom / Reign of Christ":50}},
"471":{"m":"L.M.","a":"Miss Catherine Helene von Poseck (1859-1953)","tn":"Woodworth","tc":"W. B. Bradbury (1816-1868)","fl":"Once more around Thy table, Lord,","v":[{"n":1,"t":"Once more around Thy table, Lord,\nObedient to Thy parting word,\nOur hearts from earthly care set free\nHave in Thy death remembered Thee.","th":["The Lord's Supper / Remembrance","The Cross & Sufferings of Christ"]},{"n":2,"t":"Thyself Thou gavest, Son of God:\nIn love to us didst shed Thy blood;\nThyself Thou gavest to fulfil\nThe Father's own eternal will.","th":["The Cross & Sufferings of Christ","God's Love for Us","The Precious Blood / Atonement","The Father"]},{"n":3,"t":"Thyself Thou gavest: may that word\nRest with us now in parting, Lord,\nAnd lead us in devotion meet\nTo lay our lives at Thy blest feet.","th":["Service & Devotion","Our Love for The Son/Christ"]},{"n":4,"t":"Thyself Thou gavest, Lord: and we\nWould wholly give ourselves to Thee,\nIn simple faith and fervent love\nTo serve Thee till we meet above.","th":["Service & Devotion","Heaven & The Father's House","Our Love for The Son/Christ"]}],"w":{"The Lord's Supper / Remembrance":25,"The Cross & Sufferings of Christ":50,"God's Love for Us":25,"The Precious Blood / Atonement":25,"The Father":25,"Service & Devotion":50,"Our Love for The Son/Christ":50,"Heaven & The Father's House":25}},
"472":{"m":"8.7.","a":"George West Frazer (1830-1896)","tn":"Suffield","tc":"Anonymous","fl":"Once we stood in condemnation","v":[{"n":1,"t":"Once we stood in condemnation\nWaiting thus the sinner's doom,\nChrist in death hath wrought salvation,\nGod has raised Him from the tomb.","th":["Redemption","The Cross & Sufferings of Christ","Christ Risen & Glorified"]},{"n":2,"t":"Strangers then to God we lived,\nFilled with enmity and fear;\nSouls from death He has reprieved,\nLove revealed and brought us near.","th":["God's Love for Us","Redemption"]},{"n":3,"t":"Now we see in Christ's acceptance\nBut the measure of our own;\nHim who lay beneath our sentence,\nSeated high upon the throne.","th":["Christ Risen & Glorified","Assurance & Security"]},{"n":4,"t":"Quickened, raised, and in Him seated;\nWe a full deliverance know;\nEvery foe has been defeated,\nEvery enemy laid low.","th":["Redemption","Assurance & Security","New Creation"]},{"n":5,"t":"Now we have a life in union\nWith the risen life above;\nNow we drink in sweet communion\nSome rich foretaste of His love.","th":["Fellowship & Gathering","God's Love for Us","New Creation"]},{"n":6,"t":"Soon, O Lord, in brightest glory,\nAll its vastness we'll explore;\nSoon we'll cast our crowns before Thee,\nWhilst we worship and adore.","th":["The Lord's Coming / Rapture","Worship & Praise","Heaven & The Father's House"]}],"w":{"Redemption":50,"The Cross & Sufferings of Christ":17,"Christ Risen & Glorified":33,"God's Love for Us":33,"Assurance & Security":33,"New Creation":33,"Fellowship & Gathering":17,"The Lord's Coming / Rapture":17,"Worship & Praise":17,"Heaven & The Father's House":17}},
"473":{"m":"6-8s.","a":"Anonymous","tn":"St. Petersburg","tc":"D. S. Bortniansky (1752-1825)","fl":"Our God and Father, Thou hast made","v":[{"n":1,"t":"Our God and Father, Thou hast made\nIn grace our fellowship with Thee,\nAnd with Thy Son, our holy Lord,\nWho bled for us upon the tree:\nThis privilege is all divine,\nThis way of love is wholly Thine.","th":["The Father","Fellowship & Gathering","The Cross & Sufferings of Christ","Grace"]},{"n":2,"t":"By Thine own Spirit Thou hast given\nThy children in Thy Son to find\nTheir lasting joy, their heart's delight,\nTheir satisfaction for the mind:\nWe love to speak His praises forth\nAnd tell to Thee His matchless worth.","th":["The Holy Spirit","Joy & Thanksgiving","The Person of Christ","Worship & Praise"]},{"n":3,"t":"The Bless\u00e8d One is Thine own Son,\nHis life on earth an offering sweet,\nHis death rich sacrifice to Thee,\nHis present service - how complete!\nGod and the Lamb we now adore;\nTo both be glory evermore.","th":["The Person of Christ","The Cross & Sufferings of Christ","Christ's Intercession / Priesthood","Worship & Praise","The Lamb of God"]}],"w":{"The Father":33,"Fellowship & Gathering":33,"The Cross & Sufferings of Christ":67,"Grace":33,"The Holy Spirit":33,"Joy & Thanksgiving":33,"The Person of Christ":67,"Worship & Praise":67,"Christ's Intercession / Priesthood":33,"The Lamb of God":33}},
"474":{"m":"7.6.","a":"P. Gerhardt (1607-1676)","tn":"West View","tc":"Anonymous","fl":"Our God is our salvation,","v":[{"n":1,"t":"Our God is our salvation,\nOur refuge in distress;\nWhat earthly tribulation\nCan shake our steadfast peace?","th":["Assurance & Security","Redemption","Rest & Peace"]},{"n":2,"t":"The ground of our profession\nIs Jesus and His blood:\nHe gives us the possession\nOf everlasting good.","th":["The Precious Blood / Atonement","The Person of Christ"]},{"n":3,"t":"We know no condemnation,\nNo law that speaks despair:\nAnd Satan's accusation,\nWith Christ, we need not fear.","th":["Assurance & Security","Forgiveness of Sins"]},{"n":4,"t":"For us there is provided\nA city fair in view,\nTo it we shall be guided,\nJerusalem the new.","th":["Heaven & The Father's House"]},{"n":5,"t":"Our portion there is lying,\nA destined heavenly lot;\nAnd though we're daily dying,\nOur portion withers not.","th":["Assurance & Security","Heaven & The Father's House"]},{"n":6,"t":"The heart within us leapeth,\nAnd cannot down be cast,\nSince with our God it keepeth\nIts never-ending feast.","th":["Joy & Thanksgiving","Assurance & Security"]},{"n":7,"t":"The sun which, smiling, lights us,\nIs Jesus Christ alone:\nAnd what to song incites us\nIs heaven on earth begun.","th":["The Person of Christ","Joy & Thanksgiving"]}],"w":{"Assurance & Security":57,"Redemption":14,"Rest & Peace":14,"The Precious Blood / Atonement":14,"The Person of Christ":29,"Forgiveness of Sins":14,"Heaven & The Father's House":29,"Joy & Thanksgiving":29}},
"475":{"m":"C.M.","a":"Anonymous","tn":"Lloyd","tc":"C. Howard (1856-1927)","fl":"Our tongues must spread the Saviour's fame,","v":[{"n":1,"t":"Our tongues must spread the Saviour's fame,\nWhose grace we daily prove,\nFor since our souls have known His name\nHis banner has been - Love.","th":["God's Love for Us","Worship & Praise","The Person of Christ"]},{"n":2,"t":"When walking in the paths of sin,\nWe far from Him did rove,\nBy sweet constraint He drew us in,\nAnd waved His banner - Love.","th":["Grace","God's Love for Us","Redemption"]},{"n":3,"t":"He spread the banquet, made us eat,\nBid all our fears remove;\nYea, o'er our guilty rebel heads\nHe placed His banner - Love.","th":["God's Love for Us","Grace","Forgiveness of Sins"]},{"n":4,"t":"When careless of His rich repast\nWe've sought, alas, to rove,\nHe has recalled His faithless guest,\nAnd raised His banner - Love.","th":["God's Love for Us","Grace"]},{"n":5,"t":"In every conflict we sustain\nOur enemies shall prove,\nThrough Him the victory we obtain\nBeneath His banner - Love.","th":["Trial & Conflict","Assurance & Security","God's Love for Us"]},{"n":6,"t":"And when He calls us home at length\nTo feast with Him above,\nThrough all eternity we'll sing\nHis never-changing love.","th":["Heaven & The Father's House","God's Love for Us","Joy & Thanksgiving"]}],"w":{"God's Love for Us":100,"Worship & Praise":17,"The Person of Christ":17,"Grace":50,"Redemption":17,"Forgiveness of Sins":17,"Trial & Conflict":17,"Assurance & Security":17,"Heaven & The Father's House":17,"Joy & Thanksgiving":17}},
"476":{"m":"8.8.8.5.","a":"Thomas Kelly (1769-1854)","tn":"Acclaim","tc":"Anonymous","fl":"Praise the Saviour, ye who know Him,","v":[{"n":1,"t":"Praise the Saviour, ye who know Him,\nWho can tell how much we owe Him?\nGladly let us render to Him\nAll we have and are.","th":["Worship & Praise","The Person of Christ","Service & Devotion"]},{"n":2,"t":"Jesus is the name that charms us;\nHe for conflict fits and arms us;\nNothing moves and nothing harms us\nWhile we trust in Him.","th":["The Person of Christ","Assurance & Security","Trial & Conflict"]},{"n":3,"t":"Trust in Him, ye saints, for ever;\nHe is faithful, changing never;\nNeither force nor guile can sever\nThose He loves from Him.","th":["Assurance & Security","God's Love for Us"]},{"n":4,"t":"Keep us, Lord, O keep us cleaving\nTo Thyself and still believing,\nTill the hour of our receiving\nPromised joys with Thee!","th":["The Lord's Coming / Rapture","Assurance & Security","Our Love for The Son/Christ"]},{"n":5,"t":"Then we shall be where we would be;\nThen we shall be what we should be;\nThings that are not now nor could be\nSoon shall be our own.","th":["Heaven & The Father's House","The Lord's Coming / Rapture"]}],"w":{"Worship & Praise":20,"The Person of Christ":40,"Service & Devotion":20,"Assurance & Security":60,"Trial & Conflict":20,"God's Love for Us":20,"The Lord's Coming / Rapture":40,"Our Love for The Son/Christ":20,"Heaven & The Father's House":20}},
"477":{"m":"8.7.","a":"Miss Catherine Helene von Poseck (1859-1953)","tn":"Neander","tc":"J. Neander (1650-1680)","fl":"Risen Christ, our souls adore Thee:","v":[{"n":1,"t":"Risen Christ, our souls adore Thee:\nThou hast left the silent grave;\nDeath and Hades quail before Thee,\nThou art mighty now to save:\nGlory, glory, we adore Thee,\nAnd the Victor's banner wave.","th":["Christ Risen & Glorified","Worship & Praise","Redemption"]},{"n":2,"t":"Risen Lord, Thou now art seated\nOn the Father's throne on high:\nGod the place supreme has meted\nTo the One who came to die:\nAll completed, hell defeated,\nGlory, glory, Lord, we cry.","th":["Christ Risen & Glorified","The Father","The Cross & Sufferings of Christ"]},{"n":3,"t":"Risen Saviour, past for ever\nIs Thine hour of untold woe:\nWe rejoicing in Thy favour\nShare Thy blissful triumph now:\nRisen Saviour, now and ever\nAt Thy glorious feet we bow.","th":["Christ Risen & Glorified","Worship & Praise","Joy & Thanksgiving"]}],"w":{"Christ Risen & Glorified":100,"Worship & Praise":67,"Redemption":33,"The Father":33,"The Cross & Sufferings of Christ":33,"Joy & Thanksgiving":33}},
"478":{"m":"8.7.8.7.4.7.","a":"William Kelly (1821-1906)","tn":"Zion","tc":"T. Hastings (1784-1872)","fl":"Saviour, though the world despised Thee,","v":[{"n":1,"t":"Saviour, though the world despised Thee,\nAll God's angels to thee bow;\nAnd the Father's glory raised Thee,\nWhen man's hatred laid Thee low;\nLord of glory,\nBless\u00e8d evermore art Thou.","th":["The Person of Christ","Christ Risen & Glorified","The Cross & Sufferings of Christ","Worship & Praise"]},{"n":2,"t":"In that hour of shame unbounded,\nWhen Thine own in terror fled,\nWhen God's plans seemed all confounded\nIn Thee on the tree seen dead,\nThen, blest Saviour,\nWas the great atonement made.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement"]},{"n":3,"t":"Oh, for grace to share Thy sorrow\nWhere Thou, Lord, wast crucified!\nWhile we wait the cloudless morrow\nWhen Thou reignest glorified;\nThy confessors,\nNow Thy body, then Thy bride.","th":["The Cross & Sufferings of Christ","The Church / Bride of Christ","The Eternal Kingdom / Reign of Christ","Separation from the World"]}],"w":{"The Person of Christ":33,"Christ Risen & Glorified":33,"The Cross & Sufferings of Christ":100,"Worship & Praise":33,"The Precious Blood / Atonement":33,"The Church / Bride of Christ":33,"The Eternal Kingdom / Reign of Christ":33,"Separation from the World":33}},
"479":{"m":"8.7.8.7.7.7.","a":"Thomas Kelly (1769-1854)","tn":"Till He Come","tc":"L. Mason (1792-1872)","fl":"Soft the voice of mercy sounded,","v":[{"n":1,"t":"Soft the voice of mercy sounded,\nSweet as music to the ear;\nGrace abounds where sin abounded,\nThis the word that soothed our fear;\nGrace, the sweetest sound we know,\nGrace to sinners here below.","th":["Grace","Forgiveness of Sins","Rest & Peace"]},{"n":2,"t":"Grace we sing, God's grace through Jesus;\nGrace, the spring of peace to man;\nGrace, that from each sorrow frees us;\nGrace, too high for thought to scan;\nGrace, the theme of God's own love;\nGrace, the theme all themes above.","th":["Grace","God's Love for Us","Rest & Peace"]}],"w":{"Grace":100,"Forgiveness of Sins":50,"Rest & Peace":100,"God's Love for Us":50}},
"480":{"m":"S.M.","a":"Miss Hannah Kilham Burlingham (1842-1901)","tn":"Trentham","tc":"R. Jackson (1842-1914)","fl":"'Tis not far off - the hour","v":[{"n":1,"t":"'Tis not far off - the hour\nWhen Christ will claim His own!\nWe soon shall hear that voice of power;\nThe Lord Himself shall come.","th":["The Lord's Coming / Rapture"]},{"n":2,"t":"The days are passing by;\nThe years flow on apace;\nLord Jesus! Thy return draws nigh;\nWe long to see Thy face.","th":["The Lord's Coming / Rapture","Our Love for The Son/Christ"]},{"n":3,"t":"Eternal in the heavens,\nIs our prepared abode -\nRadiant and pure, in light divine,\nThe building of our God.","th":["Heaven & The Father's House"]},{"n":4,"t":"Then rest, divinely sweet,\nOur pilgrim feet shall know;\nAnd through that blest eternity\nWhat tides of praise shall flow!","th":["Rest & Peace","Pilgrimage / Desert Journey","Worship & Praise"]},{"n":5,"t":"Come quickly, bless\u00e8d Lord!\nLike exiles here we roam;\nFulfil to us Thy gracious word,\nLord Jesus, take us home.","th":["The Lord's Coming / Rapture","Pilgrimage / Desert Journey","Heaven & The Father's House"]}],"w":{"The Lord's Coming / Rapture":60,"Our Love for The Son/Christ":20,"Heaven & The Father's House":40,"Rest & Peace":20,"Pilgrimage / Desert Journey":40,"Worship & Praise":20}},
"481":{"m":"C.M.","a":"Anonymous","tn":"Nottingham","tc":"J. Clark, c. 1659-1707","fl":"The light of life we see Thee now,","v":[{"n":1,"t":"The light of life we see Thee now,\nLord Jesus, where Thou art;\nGlory and honour crown Thy brow;\nOur names are on Thy heart.","th":["The Person of Christ","Christ Risen & Glorified","God's Love for Us"]},{"n":2,"t":"The broken loaf, the cup we share,\nThy flesh, Thy blood, express;\nThy body, Lord, discerning there,\nThy precious name we bless.","th":["The Lord's Supper / Remembrance","The Precious Blood / Atonement","Worship & Praise"]},{"n":3,"t":"Our thanks to God, Thy God and ours,\nWith heart and voice we give,\nThy Father praise with all our powers,\nBecause through Thee we live.","th":["The Father","Joy & Thanksgiving","Worship & Praise"]},{"n":4,"t":"Called in one body to declare\nOur fellowship with Thee,\nLord, Thy rejection we would share\nTill we Thy glory see.","th":["The Church / Bride of Christ","Fellowship & Gathering","Separation from the World","The Lord's Coming / Rapture"]}],"w":{"The Person of Christ":25,"Christ Risen & Glorified":25,"God's Love for Us":25,"The Lord's Supper / Remembrance":25,"The Precious Blood / Atonement":25,"Worship & Praise":50,"The Father":25,"Joy & Thanksgiving":25,"The Church / Bride of Christ":25,"Fellowship & Gathering":25,"Separation from the World":25,"The Lord's Coming / Rapture":25}},
"482":{"m":"P.M.","a":"Philip Nicolai (1556-1608)","tn":"Nicolai","tc":"Philip Nicolai (1556-1608)","fl":"The Father, from eternity,","v":[{"n":1,"t":"The Father, from eternity,\nChose us, O Jesus Christ, in Thee,\nIn Thee, His well-belov\u00e8d;\nAnd we, as given to Thee - Thy bride,\nIn Thee, Lord Jesus, can confide:\nThy love remains unmov\u00e8d.\nFrom Thee daily\nStrength receiving - to Thee cleaving,\nBless\u00e8d Jesus!\nMay we all show forth Thy praises.","th":["The Father","The Person of Christ","The Church / Bride of Christ","God's Love for Us","Worship & Praise"]},{"n":2,"t":"Before the world we'd make our boast,\nThat Thou, in whom is all our trust,\nArt Lord of life and glory;\nAnd soon Thou'lt bring us to that place\nWhere we shall see Thee face to face,\nAnd, glorified, adore Thee.\nAmen! - Be then\nPraise and blessing - never ceasing\nTo Thee given\nHere, and when we come to heaven.","th":["Worship & Praise","The Lord's Coming / Rapture","Heaven & The Father's House","Christ Risen & Glorified"]}],"w":{"The Father":50,"The Person of Christ":50,"The Church / Bride of Christ":50,"God's Love for Us":50,"Worship & Praise":100,"The Lord's Coming / Rapture":50,"Heaven & The Father's House":50,"Christ Risen & Glorified":50}},
"483":{"m":"10s.","a":"William Patton Mackay (1839-1885)","tn":"National Hymn","tc":"G. W. Warren (1828-1902)","fl":"The Lord is risen: the Red Sea's judgment flood","v":[{"n":1,"t":"The Lord is risen: the Red Sea's judgment flood\nIs passed in Him, who bought us with His blood.\nThe Lord is risen: we stand beyond the doom\nOf all our sin, through Jesus' empty tomb.","th":["Christ Risen & Glorified","The Precious Blood / Atonement","Redemption","Forgiveness of Sins"]},{"n":2,"t":"The Lord is risen: with Him we also rose,\nAnd in His grave see vanquished all our foes.\nThe Lord is risen: beyond the judgment-land,\nIn Him, in resurrection life we stand.","th":["Christ Risen & Glorified","Redemption","New Creation"]},{"n":3,"t":"The Lord is risen: redeem\u00e8d now to God,\nWe tread the desert which His feet have trod.\nThe Lord is risen: The sanctuary's our place,\nWhere now we dwell before the Father's face.","th":["Christ Risen & Glorified","Pilgrimage / Desert Journey","Redemption","The Father"]},{"n":4,"t":"The Lord is risen: the Lord is gone before,\nWe long to see Him, and to sin no more.\nThe Lord is risen: our triumph-shout shall be,\n\"Thou hast prevailed. Thy people, Lord, are free\".","th":["Christ Risen & Glorified","The Lord's Coming / Rapture","Redemption"]}],"w":{"Christ Risen & Glorified":100,"The Precious Blood / Atonement":25,"Redemption":100,"Forgiveness of Sins":25,"New Creation":25,"Pilgrimage / Desert Journey":25,"The Father":25,"The Lord's Coming / Rapture":25}},
"484":{"m":"S.M.","a":"George West Frazer (1830-1896)","tn":"Summerfield","tc":"Anonymous","fl":"\"This do, remember Me\":","v":[{"n":1,"t":"\"This do, remember Me\":\nO bless\u00e8d, living Lord,\nWhat depths of grace we now can trace\nIn that most precious word!","th":["The Lord's Supper / Remembrance","Grace"]},{"n":2,"t":"\"This do, remember Me\":\nOh, deep desire of love\nAs round Thy soul those waves did roll\nOf wrath from God above.","th":["The Lord's Supper / Remembrance","The Cross & Sufferings of Christ","God's Love for Us"]},{"n":3,"t":"\"This do, remember Me\":\nOh, what a savour sweet\nTo God above! to man what love\nIs in Thy work complete!","th":["The Lord's Supper / Remembrance","The Cross & Sufferings of Christ","God's Love for Us"]},{"n":4,"t":"Now gathered round Thee here\nWith heart and conscience free,\nO Lord, once dead, whose blood was shed,\nWe do remember Thee.","th":["The Lord's Supper / Remembrance","The Precious Blood / Atonement","The Cross & Sufferings of Christ"]}],"w":{"The Lord's Supper / Remembrance":100,"Grace":25,"The Cross & Sufferings of Christ":75,"God's Love for Us":50,"The Precious Blood / Atonement":25}},
"485":{"m":"7.6.","a":"George West Frazer (1830-1896)","tn":"St. Theodulph","tc":"M. Teschner (1584-1635)","fl":"Thou art the First, Lord Jesus,","v":[{"n":1,"t":"Thou art the First, Lord Jesus,\nAnd so Thou art the Last;\nThou fillest all the future,\nThe present, and the past;\nThe Alpha, the Beginning,\nThe Omega, the End;\nOnce dead, alive for ever,\nTo whom each knee shall bend.","th":["The Person of Christ","Christ Risen & Glorified"]},{"n":2,"t":"Thou brightness of the glory\nWhich eye hath never seen!\nThou never hadst beginning,\nEternal Thou hast been;\nThou art the perfect Image\nOf God Invisible,\nIn light which none approacheth,\nIn love which none can tell.","th":["The Person of Christ"]},{"n":3,"t":"First-born of all creation\nUpon the eternal throne!\nPre-eminent in all things,\nThe universe Thine own!\nOf everything Creator,\nBy whom all things subsist!\nAll praise to Thee, Lord Jesus,\nFrom all that doth exist!","th":["The Person of Christ","Worship & Praise","The Eternal Kingdom / Reign of Christ"]}],"w":{"The Person of Christ":100,"Christ Risen & Glorified":33,"Worship & Praise":33,"The Eternal Kingdom / Reign of Christ":33}},
"486":{"m":"L.M.","a":"Sir Edward Denny (1796-1889)","tn":"Mendon","tc":"Anonymous","fl":"'Tis finished all - our souls to win","v":[{"n":1,"t":"'Tis finished all - our souls to win\nHis life the bless\u00e8d Jesus gave,\nAnd having borne our guilt and sin,\nHe rose triumphant from the grave.","th":["The Cross & Sufferings of Christ","Redemption","Christ Risen & Glorified","Forgiveness of Sins"]},{"n":2,"t":"Past suffering now, the tender heart\nOf Jesus on His Father's throne\nStill in our sorrow bears a part,\nAnd feels it as He felt His own.","th":["Christ's Intercession / Priesthood","The Father","God's Love for Us"]},{"n":3,"t":"Sweet thought! we have a Friend above\nOur feeble faltering steps to guide,\nWho follows with the eye of love\nThe little flock for which He died.","th":["God's Love for Us","Pilgrimage / Desert Journey","The Cross & Sufferings of Christ"]},{"n":4,"t":"Lord Jesus, teach us more and more\nOn Thee alone to cast our care,\nAnd, gazing on Thy cross, adore\nThe wondrous grace that brought Thee there.","th":["The Cross & Sufferings of Christ","Grace","Worship & Praise","Our Love for The Son/Christ"]}],"w":{"The Cross & Sufferings of Christ":75,"Redemption":25,"Christ Risen & Glorified":25,"Forgiveness of Sins":25,"Christ's Intercession / Priesthood":25,"The Father":25,"God's Love for Us":50,"Pilgrimage / Desert Journey":25,"Grace":25,"Worship & Praise":25,"Our Love for The Son/Christ":25}},
"487":{"m":"7s.","a":"Albert Midlane (1825-1909)","tn":"Clayton West","tc":"Anonymous","fl":"Sweet the theme of Jesus' love!","v":[{"n":1,"t":"Sweet the theme of Jesus' love!\nSweet that theme all themes above;\nLove, unmerited and free,\nOur triumphant song shall be.","th":["God's Love for Us","The Person of Christ","Worship & Praise"]},{"n":2,"t":"Love so vast that nought can bound,\nLove too deep for thought to sound,\nLove which brought the Lord of all\nTo the wormwood and the gall.","th":["God's Love for Us","The Cross & Sufferings of Christ"]},{"n":3,"t":"Love which led Him to the cross,\nBearing there unmeasured loss;\nLove which brought Him to the gloom\nOf the cold and darksome tomb.","th":["God's Love for Us","The Cross & Sufferings of Christ"]},{"n":4,"t":"Love which made Him hence arise\nFar above the starry skies;\nThere, with tender, loving care,\nAll His people's griefs to share.","th":["Christ Risen & Glorified","God's Love for Us","Christ's Intercession / Priesthood"]},{"n":5,"t":"Jesus, Lord, accept our praise;\nNow our hearts to Thee we raise,\nThough we know Thy boundless love\nEarthly praise is far above.","th":["Worship & Praise","God's Love for Us","Our Love for The Son/Christ"]}],"w":{"God's Love for Us":100,"The Person of Christ":20,"Worship & Praise":40,"The Cross & Sufferings of Christ":40,"Christ Risen & Glorified":20,"Christ's Intercession / Priesthood":20,"Our Love for The Son/Christ":20}},
"488":{"m":"C.M.","a":"Sir Edward Denny (1796-1889)","tn":"Grafenberg","tc":"J. Cruger (1598-1662)","fl":"'Tis past, the dark and dreary night:","v":[{"n":1,"t":"'Tis past, the dark and dreary night:\nAnd, Lord, we hail Thee now,\nThe Morning Star, without a cloud\nOf sadness on Thy brow.","th":["Christ Risen & Glorified","The Person of Christ"]},{"n":2,"t":"Thy path on earth, the cross, the grave,\nThy sorrows all are o'er,\nAnd, oh, sweet thought! Thine eye shall weep,\nThy heart shall break no more.","th":["The Cross & Sufferings of Christ","Christ Risen & Glorified"]},{"n":3,"t":"Deep were those sorrows, deeper still\nThe love that brought Thee low,\nThat bade the streams of life from Thee,\nA lifeless victim, flow.","th":["The Cross & Sufferings of Christ","God's Love for Us"]},{"n":4,"t":"Drawn from Thy pierced and bleeding side,\nThat pure and cleansing flood\nSpeaks peace to every heart that knows\nThe virtues of Thy blood.","th":["The Precious Blood / Atonement","Rest & Peace","Forgiveness of Sins"]},{"n":5,"t":"Yet 'tis not that we know the joy\nOf cancelled sin alone,\nBut, happier far, Thy saints are called\nTo share Thy glorious throne.","th":["Forgiveness of Sins","Heaven & The Father's House","Joy & Thanksgiving"]},{"n":6,"t":"Yes, when the storm of life is calmed,\nThe dreary desert past,\nOur way-worn hearts shall find in Thee\nTheir full repose at last.","th":["Rest & Peace","Pilgrimage / Desert Journey","Heaven & The Father's House"]}],"w":{"Christ Risen & Glorified":33,"The Person of Christ":17,"The Cross & Sufferings of Christ":33,"God's Love for Us":17,"The Precious Blood / Atonement":17,"Rest & Peace":33,"Forgiveness of Sins":33,"Heaven & The Father's House":33,"Joy & Thanksgiving":17,"Pilgrimage / Desert Journey":17}},
"489":{"m":"C.M.","a":"Sir Edward Denny (1796-1889)","tn":"Coventry","tc":"Anonymous","fl":"To Calvary, Lord, in spirit now","v":[{"n":1,"t":"To Calvary, Lord, in spirit now\nOur grateful souls repair,\nTo dwell upon Thy dying love,\nAnd taste its sweetness there.","th":["The Cross & Sufferings of Christ","God's Love for Us","Our Love for The Son/Christ"]},{"n":2,"t":"There through Thine hour of deepest woe\nThy suffering spirit passed;\nGrace there its wondrous victory gained,\nAnd love endured its last.","th":["The Cross & Sufferings of Christ","Grace"]},{"n":3,"t":"Our longing eyes would fain behold\nThat bright and bless\u00e8d brow,\nOnce wrung with bitterest anguish, wear\nThe crown of glory now.","th":["Christ Risen & Glorified","The Lord's Coming / Rapture"]},{"n":4,"t":"O Saviour, linger not but come,\nResponsive to our call;\nCome, claim Thy kingly power and reign,\nThe Heir and Lord of all.","th":["The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ"]}],"w":{"The Cross & Sufferings of Christ":50,"God's Love for Us":25,"Our Love for The Son/Christ":25,"Grace":25,"Christ Risen & Glorified":25,"The Lord's Coming / Rapture":50,"The Eternal Kingdom / Reign of Christ":25}},
"490":{"m":"8.8.8.4.","a":"Sir John Bowring (1792-1872)","tn":"Palestrina","tc":"G. P. Palestrina","fl":"We cannot always trace the way","v":[{"n":1,"t":"We cannot always trace the way\nWhere Thou, our gracious Lord, dost move;\nBut we can always surely say,\nThat God is love.","th":["God's Love for Us","Assurance & Security"]},{"n":2,"t":"If fear its gloomy cloud should fling\nO'er earth, our souls to heaven above,\nAs to their sanctuary, spring,\nFor God is love.","th":["God's Love for Us","Trial & Conflict","Assurance & Security"]},{"n":3,"t":"When clouds hang o'er our darkened path,\nWe'll check our dread, each doubt reprove;\nFor here each saint sweet comfort hath,\nThat God is love.","th":["God's Love for Us","Trial & Conflict","Assurance & Security"]},{"n":4,"t":"Yes, Thou art love: a truth like this\nCan every gloomy thought remove,\nAnd turn our tears and woes to bliss,\nOur God is love.","th":["God's Love for Us","Joy & Thanksgiving"]}],"w":{"God's Love for Us":100,"Assurance & Security":75,"Trial & Conflict":50,"Joy & Thanksgiving":25}},
"491":{"m":"8s.","a":"Anonymous","tn":"Celeste","tc":"Anonymous","fl":"We praise Thee, our Father and God,","v":[{"n":1,"t":"We praise Thee, our Father and God,\nFor the Son that came down from the throne,\nFor Thy Spirit that thou hast bestowed\nTo tell us what Jesus has done.","th":["Worship & Praise","The Father","The Person of Christ","The Holy Spirit"]},{"n":2,"t":"We praise Thee that once He appeared\nTo put sin for ever away\nBy Himself, as the Victim that bled\nFor us who had all gone astray.","th":["The Cross & Sufferings of Christ","The Precious Blood / Atonement","Forgiveness of Sins","Worship & Praise"]},{"n":3,"t":"We praise Thee His work is complete,\nAnd He has been raised by Thy hand,\nWhile in righteousness Thee we can meet,\nAnd accepted before Thee we stand.","th":["Christ Risen & Glorified","Redemption","Worship & Praise"]},{"n":4,"t":"We praise Thee that now by His blood\nHe has entered for us into heaven\nTo appear in the presence of God,\nSince the veil by Thy hand has been riven.","th":["The Precious Blood / Atonement","Christ's Intercession / Priesthood","Heaven & The Father's House","Worship & Praise"]},{"n":5,"t":"We praise Thee that Jesus is near,\nThat He in His glory will come;\nFor salvation He soon will appear,\nHis waiting ones all gathered home.","th":["The Lord's Coming / Rapture","Redemption","Worship & Praise"]}],"w":{"Worship & Praise":100,"The Father":20,"The Person of Christ":20,"The Holy Spirit":20,"The Cross & Sufferings of Christ":20,"The Precious Blood / Atonement":40,"Forgiveness of Sins":20,"Christ Risen & Glorified":20,"Redemption":40,"Christ's Intercession / Priesthood":20,"Heaven & The Father's House":20,"The Lord's Coming / Rapture":20}},
"492":{"m":"C.M.","a":"E. L. Bevir (1847-1922)","tn":"Maitland","tc":"G. N. Allen (1812-1877)","fl":"We seek the things that are above,","v":[{"n":1,"t":"We seek the things that are above,\nBeyond this earth and sky,\nWhence, Lord, Thou lookest down in love\nFrom God's right hand on high.","th":["Heaven & The Father's House","Christ Risen & Glorified"]},{"n":2,"t":"In yon refulgent realms of light\nOur part, our life we see;\nThou art the Father's own delight,\nAnd we are graced in Thee.","th":["The Father","Sonship & Adoption","Grace","The Person of Christ"]},{"n":3,"t":"Our hidden life in God art Thou,\nBut soon Thou shalt appear,\nIn radiant bliss shall every brow\nThy glorious image bear.","th":["The Lord's Coming / Rapture","Sonship & Adoption","Christ Risen & Glorified"]}],"w":{"Heaven & The Father's House":33,"Christ Risen & Glorified":67,"The Father":33,"Sonship & Adoption":67,"Grace":33,"The Person of Christ":33,"The Lord's Coming / Rapture":33}},
"493":{"m":"8.7.","a":"J. G. Arcus","tn":"Hymn to Joy","tc":"Ludwig Van Beethoven (1770-1827)","fl":"Holy Father, here before Thee,","v":[{"n":1,"t":"Holy Father, here before Thee,\nSee Thy children humbly bow,\nSeeking for Thy marriage blessing,\nThat alone can seal the vow:\nMay they know that mystic union,\nOnce, of old, ordained by Thee,\nStill reserved for Thy redeemed ones,\nWho have been to Calvary.","th":["The Father","The Cross & Sufferings of Christ","Redemption"]},{"n":2,"t":"Saviour, as at Cana's wedding,\nThou didst water change to wine,\nTurn their bridal cup of gladness\nTo an holy draught of Thine;\nMay the sacred ties of marriage\nIn their lives be ever seen,\nAnd, their home, Thy love reflecting,\nWitness Thou art Head supreme.","th":["The Person of Christ","Grace","The Church / Bride of Christ"]},{"n":3,"t":"May they know the constant guidance\nOf Thy Spirit through Thy Word,\nAnd, by Thy rich grace sufficient,\nBoth walk worthy of their Lord;\nAnd, throughout life's earthly journey,\nStrong in faith and hope and love,\nServe Thee with Thy love constraining,\nTill they reach that home above.","th":["The Holy Spirit","The Word of God","Service & Devotion","Pilgrimage / Desert Journey","Grace"]}],"w":{"The Father":33,"The Cross & Sufferings of Christ":33,"Redemption":33,"The Person of Christ":33,"Grace":67,"The Church / Bride of Christ":33,"The Holy Spirit":33,"The Word of God":33,"Service & Devotion":33,"Pilgrimage / Desert Journey":33}},
"494":{"m":"10s.","a":"Norman Anderson (1907-1986)","tn":"O Perfect Love","tc":"J. Barnby (1838-1896)","fl":"Lord in Thy grace and truth our souls delight,","v":[{"n":1,"t":"Lord in Thy grace and truth our souls delight,\nAs here in holy wedlock we unite,\nWhilst humbly at Thy holy feet we bow,\nAnd crave Thy blessing on our marriage vow.","th":["The Person of Christ","Grace","Worship & Praise"]},{"n":2,"t":"Be Thou our constant guide throughout the days,\nHelp us to honour Thee in all our ways,\nBlessing us ever, Lord, as man and wife,\nAnd heirs together of the grace of life.","th":["Pilgrimage / Desert Journey","Service & Devotion","Grace"]},{"n":3,"t":"May grace and holiness e'er mark our home,\nWhich we would sanctify before Thy throne,\nMake it for Thee, a Bethany, O Lord,\nWitness and worship may it e'er afford.","th":["Service & Devotion","Worship & Praise","Separation from the World"]},{"n":4,"t":"Should trial come and sore oppress our way,\nThen may we find in Thee our ready stay,\nTrusting in Thee whate'er may intervene,\nProving Thy faithful love - more brightly seen.","th":["Trial & Conflict","Assurance & Security","God's Love for Us"]},{"n":5,"t":"And when at length the evening shadows fall,\nBe this the sweetest memory we recall,\nThat from the outset of our nuptial day,\nThy love and grace have kept us all the way.","th":["God's Love for Us","Grace","Pilgrimage / Desert Journey"]},{"n":6,"t":"That way shall bring us to the \"Perfect Day\"\nWhen over all, Thou shalt have fullest sway,\nWhen, clad in garments spotless, by Thy side,\nWe'll share the \"lasting portion of Thy bride\".","th":["The Church / Bride of Christ","The Lord's Coming / Rapture","Heaven & The Father's House"]}],"w":{"The Person of Christ":17,"Grace":50,"Worship & Praise":33,"Pilgrimage / Desert Journey":33,"Service & Devotion":33,"Separation from the World":17,"Trial & Conflict":17,"Assurance & Security":17,"God's Love for Us":33,"The Church / Bride of Christ":17,"The Lord's Coming / Rapture":17,"Heaven & The Father's House":17}},
"495":{"m":"11s. or 12s.","a":"W. A. Lickley","tn":"To God be the Glory","tc":"W. H. Donnie (1832-1916)","fl":"Our God and our Father, we come to Thee now","v":[{"n":1,"t":"Our God and our Father, we come to Thee now\nIn the name of our Saviour, most humbly to bow,\nFor Thy servants who've gone forth, to serve far away,\nAnd pray for their safety and blessing today.","th":["The Father","Service & Devotion"]},{"n":2,"t":"With deep supplication, in the Spirit we ask\nFor Thy guidance and blessing, on their every task,\nThat with boldness of utterance, Thy Word may resound\nAnd the gospel go forth, with a glad joyful sound.","th":["The Holy Spirit","The Word of God","Service & Devotion"]},{"n":3,"t":"Help them to be fruitful in service and life,\nAnd keep them abiding and free from all strife,\nThat they may be blameless and harmless each day\nAnd hold forth the Word of life, brightly alway.","th":["Service & Devotion","The Word of God"]},{"n":4,"t":"Let them fight a good fight, and run a straight course,\nKeep true to the Faith and proclaim it with force,\nLet the Word of Christ richly in them always dwell,\nAnd give them Thy peace, as the umpire as well.","th":["Service & Devotion","The Word of God","Trial & Conflict"]},{"n":5,"t":"As we strive thus together, in prayer now for them,\nWe ask Thee to keep them from ungodly men.\nLet their service be always accepted by saints,\nAnd Thy Word have free course, without let or restraints.","th":["Service & Devotion","The Word of God","Trial & Conflict"]}],"w":{"The Father":20,"Service & Devotion":100,"The Holy Spirit":20,"The Word of God":80,"Trial & Conflict":40}},
"496":{"m":"8.7.8.7.4.7.","a":"Thomas Kelly (1769-1854)","tn":"Melbourne","tc":"W L Viner (1790-1867)","fl":"Speed Thy servants, Saviour, speed them,","v":[{"n":1,"t":"Speed Thy servants, Saviour, speed them,\nSafely through land, sea, and air,\nGo before them, guide, and lead them,\nIn their journeys everywhere.\nBe Thou with them;\nWe commit them to Thy care.","th":["Service & Devotion","The Person of Christ"]},{"n":2,"t":"Friend and home and all forsaking,\nThey have gone at Thy command,\nAs their stay, Thy promise taking;\nGrant them always from Thy hand,\nStrength and wisdom;\nHelp them faithfully to stand.","th":["Service & Devotion","Assurance & Security"]},{"n":3,"t":"Send them forth at Thy direction,\nTo the places of Thy choice,\nYielding in complete subjection,\nListening only to Thy voice;\nBless and use them,\nIn Thy service to rejoice.","th":["Service & Devotion","The Holy Spirit"]},{"n":4,"t":"Should no fruit appear to cheer them,\nAnd they seem to toil in vain,\nThen in mercy, Lord, draw near them,\nThen their sinking hopes sustain;\nThus supported,\nLet their zeal revive again.","th":["Service & Devotion","Trial & Conflict","God's Love for Us"]},{"n":5,"t":"In the midst of opposition,\nLet them trust, O Lord, in Thee;\nWhen success attends their mission,\nLet Thy servants humble be;\nNever leave them,\nTill Thy face in heaven they see.","th":["Service & Devotion","Trial & Conflict","Assurance & Security","Heaven & The Father's House"]},{"n":6,"t":"There to reap in joy for ever\nFruit that grows from seed here sown;\nThere to be with Him who never\nCeases to preserve His own,\nAnd with gladness\nGive the praise to Him alone.","th":["Heaven & The Father's House","Joy & Thanksgiving","Worship & Praise"]}],"w":{"Service & Devotion":83,"The Person of Christ":17,"Assurance & Security":33,"The Holy Spirit":17,"Trial & Conflict":33,"God's Love for Us":17,"Heaven & The Father's House":33,"Joy & Thanksgiving":17,"Worship & Praise":17}},
"497":{"m":"S.M.","a":"J. Kent","tn":"Rhodes","tc":"C. W. Jordan (1840-1909)","fl":"What cheering words are these!","v":[{"n":1,"t":"What cheering words are these!\nTheir sweetness who can tell?\nIn time and to eternal days -\n\" 'Tis with believers well!\"","th":["Assurance & Security"]},{"n":2,"t":"In every state secure,\nWatched by the Saviour's eye,\n'Tis well with them should life endure,\nAnd well if called to die.","th":["Assurance & Security","The Person of Christ"]},{"n":3,"t":"Well in affliction's ways,\nOr on the mount with God;\nWell when they joy, and sing, and praise,\nOr buffet with the flood.","th":["Assurance & Security","Trial & Conflict","Worship & Praise"]},{"n":4,"t":"'Tis well when joys arise,\n'Tis well when sorrows flow,\nOr darkness seems to veil the skies,\nAnd strong temptations grow.","th":["Assurance & Security","Trial & Conflict"]},{"n":5,"t":"'Tis well when on the mount,\nThey feast and joy in love;\nAnd 'tis as well, in God's account,\nWhen they the furnace prove.","th":["Assurance & Security","Trial & Conflict","God's Love for Us"]},{"n":6,"t":"But above all, how well\nWhen Jesus speaks the word,\nAnd, at the trumpet's sounding swell,\nThey rise to meet their Lord!","th":["The Lord's Coming / Rapture","Assurance & Security"]}],"w":{"Assurance & Security":100,"The Person of Christ":17,"Trial & Conflict":50,"Worship & Praise":17,"God's Love for Us":17,"The Lord's Coming / Rapture":17}},
"498":{"m":"6.7.6.6.D.","a":"H. L. Rossier (1834-1928)","tn":"Repos Eternal","tc":"Anonymous","fl":"Perfect eternal rest -","v":[{"n":1,"t":"Perfect eternal rest -\nEver to serve, adore Thee!\nDuring the endless day,\nThee, Lord, Thy saints shall praise;\nRapt, in mute ecstasy,\nCasting their crowns before Thee,\nProne at Thy feet they fall,\nAnthems of joy to raise.","th":["Rest & Peace","Worship & Praise","Heaven & The Father's House"]},{"n":2,"t":"Thee shall we contemplate -\nGaze on Thy face adoring,\nSaviour and Bridegroom - Lord,\nBeauty Supreme above!\nSounding the soundless depths,\nMeasureless heights exploring -\nHeights of Thy peerless grace,\nDepths of Thy boundless love!","th":["The Person of Christ","Worship & Praise","God's Love for Us","The Church / Bride of Christ"]},{"n":3,"t":"Jesus from Thee alone\nBorrowing light transcendent -\nSun, Thou, of Righteousness,\nLending Thy lustrous rays -\nRadiant, Thy bride shall wear,\nThrough the long age resplendent,\nGlory immaculate -\nThine own perfection's blaze.","th":["The Church / Bride of Christ","The Person of Christ","Heaven & The Father's House"]},{"n":4,"t":"Us will Thou contemplate -\nPearl of Thy heart's deep longing,\nTravail of Thy lone soul,\nFruit of Thy wondrous cross!\nThen wilt Thou rest in love!\nThou wilt rejoice in singing, -\nRest in triumphant love,\nSinging for joy o'er us.","th":["God's Love for Us","The Cross & Sufferings of Christ","Rest & Peace","Joy & Thanksgiving"]}],"w":{"Rest & Peace":50,"Worship & Praise":50,"Heaven & The Father's House":50,"The Person of Christ":50,"God's Love for Us":50,"The Church / Bride of Christ":50,"The Cross & Sufferings of Christ":25,"Joy & Thanksgiving":25}},
"499":{"m":"8.8.4.8.8.4.","a":"Miss S. M. Walker (1848-1918)","tn":"St. Aidan","tc":"Anonymous","fl":"O wondrous Saviour Jesus, Lord,","v":[{"n":1,"t":"O wondrous Saviour Jesus, Lord,\nWorthy alone to be adored,\nWe worship Thee!\nThou holy, spotless Son of God,\nTo Thee the incarnate living Word!\nAll glory be.","th":["Worship & Praise","The Person of Christ","The Word of God"]},{"n":2,"t":"In Thee all human graces blend,\nAnd to Thy Father e'er ascend,\nAs incense rare;\nFragrant to Him Thou ever art,\nSource of rejoicing to His heart,\nMost sweet and fair.","th":["The Person of Christ","The Father","Worship & Praise"]},{"n":3,"t":"Fairer than all the sons of men,\nBeyond all praise of tongue or pen,\nThou peerless One!\nIn grace, in patient tenderness,\nIn truth, in holy faithfulness,\nThine equal - none!","th":["The Person of Christ","Grace"]},{"n":4,"t":"Matchless, incomparable, divine!-\nIn Jesus all perfections shine -\nOh, bless\u00e8d Name!\nHow shall we tell its worth abroad,\nHow tell the praises of our Lord,\nOr spread His fame?","th":["The Person of Christ","Worship & Praise"]},{"n":5,"t":"This, this shall be our endless theme,\nWhen glorified we share with Him\nThe Father's home.\nAnd see in bless\u00e8d wondrous grace\nOur God revealed in Jesus' face,\nLord Jesus, come!","th":["Heaven & The Father's House","The Father","Worship & Praise","The Lord's Coming / Rapture","Grace"]}],"w":{"Worship & Praise":80,"The Person of Christ":80,"The Word of God":20,"The Father":40,"Grace":40,"Heaven & The Father's House":20,"The Lord's Coming / Rapture":20}},
"500":{"m":"6.5.","a":"Caroline Maria Noel (1817-1877)","tn":"Repose","tc":"Anonymous","fl":"At the Name of Jesus","v":[{"n":1,"t":"At the Name of Jesus\nEvery knee shall bow,\nEvery tongue confess Him\nKing of glory now;\n'Tis the Father's pleasure\nWe should call Him Lord,\nWho from the beginning\nWas the mighty Word.","th":["The Person of Christ","Worship & Praise","The Father","The Eternal Kingdom / Reign of Christ"]},{"n":2,"t":"Name Him, brothers, name Him,\nWith love strong as death,\nBut with awe and wonder,\nAnd with bated breath;\nHe is God the Saviour,\nHe is Christ the Lord,\nEver to be worshipped,\nTrusted and adored.","th":["The Person of Christ","Worship & Praise","Our Love for The Son/Christ"]},{"n":3,"t":"In your hearts enthrone Him;\nThere let Him subdue\nAll that is not holy,\nAll that is not true:\nCrown Him as your Captain\nIn temptation's hour;\nLet His will enfold you\nIn its light and power.","th":["Trial & Conflict","Separation from the World","Our Love for The Son/Christ"]},{"n":4,"t":"Brothers, this Lord Jesus\nShall return again,\nWith His Father's glory,\nWith His angel train;\nFor all wreaths of empire\nMeet upon His brow,\nAnd our hearts confess Him\nKing of glory now.","th":["The Lord's Coming / Rapture","The Eternal Kingdom / Reign of Christ","The Father","Worship & Praise"]}],"w":{"The Person of Christ":50,"Worship & Praise":75,"The Father":50,"The Eternal Kingdom / Reign of Christ":50,"Our Love for The Son/Christ":50,"Trial & Conflict":25,"Separation from the World":25,"The Lord's Coming / Rapture":25}}
